<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบตรวจสอบครุภัณฑ์คอมพิวเตอร์ IT</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #fdf2f4; min-height: 100vh; }
        .glass-card { background: rgba(255, 255, 255, 0.95); border-radius: 24px; box-shadow: 0 10px 30px rgba(255, 154, 178, 0.1); }
        .btn-primary { background: linear-gradient(135deg, #ff85a2 0%, #ff6384 100%); color: white; }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- Dashboard Header -->
    <div class="max-w-6xl mx-auto mb-10 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <div class="bg-white p-2 rounded-xl shadow-sm"><img src="https://img2.pic.in.th/-227e4f6f84f29f020.png" class="w-10 h-10"></div>
            <div>
                <h1 class="text-xl font-bold text-gray-800">ระบบสำรวจครุภัณฑ์คอมพิวเตอร์ IT</h1>
                <p class="text-pink-500 text-xs">โรงพยาบาลอุดรธานี (ปีงบประมาณ 2567)</p>
            </div>
        </div>
        <button onclick="loadDashboard()" class="text-gray-500 bg-white px-4 py-2 rounded-xl shadow-sm text-sm hover:bg-gray-50">รีเฟรชข้อมูล</button>
    </div>

    <div class="max-w-6xl mx-auto">
        <!-- Stats Row -->
        <div class="grid grid-cols-1 md:grid-cols-5 gap-4 mb-8">
            <div class="glass-card p-6 text-center border-b-4 border-blue-400">
                <p class="text-[10px] text-gray-400 font-bold uppercase mb-1">เป้าหมาย (GOAL)</p>
                <p id="stat-goal" class="text-2xl font-bold">0</p>
            </div>
            <div class="glass-card p-6 text-center border-b-4 border-emerald-400">
                <p class="text-[10px] text-gray-400 font-bold uppercase mb-1">IN DATABASE</p>
                <p id="stat-in" class="text-2xl font-bold text-emerald-500">0</p>
            </div>
            <div class="glass-card p-6 text-center border-b-4 border-amber-400">
                <p class="text-[10px] text-gray-400 font-bold uppercase mb-1">OUT DATABASE</p>
                <p id="stat-out" class="text-2xl font-bold text-amber-500">0</p>
            </div>
            <div class="glass-card p-6 text-center border-b-4 border-indigo-400">
                <p class="text-[10px] text-gray-400 font-bold uppercase mb-1">รวมที่สำรวจ (SUM)</p>
                <p id="stat-sum" class="text-2xl font-bold text-indigo-500">0</p>
            </div>
            <div class="glass-card p-6 text-center border-b-4 border-pink-500">
                <p class="text-[10px] text-gray-400 font-bold uppercase mb-1">ความสำเร็จ (%)</p>
                <p id="stat-perc" class="text-2xl font-bold text-pink-600">0%</p>
            </div>
        </div>

        <!-- Table -->
        <div class="glass-card overflow-hidden">
            <div class="p-6 border-b border-gray-100 flex justify-between items-center">
                <h3 class="font-bold text-gray-700">📊 รายการสำรวจแยกตามตึก/หน่วยงาน</h3>
                <input type="text" id="search" onkeyup="filterTable()" placeholder="ค้นหาหน่วยงาน..." class="border border-gray-200 rounded-lg px-4 py-1.5 text-sm outline-none focus:ring-2 focus:ring-pink-200">
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <thead class="bg-gray-50 text-gray-400 font-bold">
                        <tr>
                            <th class="px-6 py-4">อาคาร / ตึก</th>
                            <th class="px-6 py-4 text-center">ชั้น</th>
                            <th class="px-6 py-4">ชื่อหน่วยงาน</th>
                            <th class="px-6 py-4 text-center text-emerald-600">ในระบบ</th>
                            <th class="px-6 py-4 text-center text-amber-600">นอกระบบ</th>
                            <th class="px-6 py-4 text-center">รวม (ชิ้น)</th>
                        </tr>
                    </thead>
                    <tbody id="tbody" class="divide-y divide-gray-50">
                        <!-- Data will be loaded here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwml8efHi7YGiLFgBPFJcdVqOFxqEFYvGd6lz-neZIXevaemNaYwXwsPlF91VqfeUlm/exec"; // นำ URL จากการ Deploy Code.gs มาวางที่นี่

        async function loadDashboard() {
            try {
                const res = await fetch(`${API_URL}?action=getDashboard`);
                const data = await res.json();
                
                // Stats
                document.getElementById('stat-goal').innerText = data.goal_r.toLocaleString();
                document.getElementById('stat-in').innerText = data.activities[0].Asset_In_Databass.toLocaleString();
                document.getElementById('stat-out').innerText = data.activities[0].Asset_Out_Databass.toLocaleString();
                document.getElementById('stat-sum').innerText = data.activities[0].Sum.toLocaleString();
                document.getElementById('stat-perc').innerText = ((data.activities[0].Sum / data.goal_r) * 100).toFixed(1) + '%';

                // Map Departments
                const deptMap = {};
                data.deptList.forEach(d => { deptMap[d.deptId] = d; });

                const summary = {};
                const process = (logs, type) => {
                    logs.forEach(l => {
                        const id = l.DEP_ID;
                        if (id && deptMap[id]) {
                            if (!summary[id]) summary[id] = { ...deptMap[id], in: 0, out: 0 };
                            summary[id][type]++;
                        }
                    });
                };
                process(data.assetLogs, 'in');
                process(data.nonumberLogs, 'out');

                const tbody = document.getElementById('tbody');
                tbody.innerHTML = '';
                Object.values(summary).sort((a,b) => a.building.localeCompare(b.building)).forEach(item => {
                    tbody.innerHTML += `
                        <tr class="hover:bg-pink-50/30">
                            <td class="px-6 py-4 font-medium text-gray-600">🏢 ${item.building}</td>
                            <td class="px-6 py-4 text-center text-gray-400">${item.floor}</td>
                            <td class="px-6 py-4 text-gray-700">${item.deptName}</td>
                            <td class="px-6 py-4 text-center text-emerald-500 font-bold">${item.in}</td>
                            <td class="px-6 py-4 text-center text-amber-500 font-bold">${item.out}</td>
                            <td class="px-6 py-4 text-center"><span class="bg-gray-100 px-2 py-1 rounded text-xs font-bold">${item.in + item.out}</span></td>
                        </tr>`;
                });
            } catch (e) { console.error(e); }
        }
        window.onload = loadDashboard;
        function filterTable() {
            const val = document.getElementById('search').value.toUpperCase();
            const rows = document.getElementById('tbody').getElementsByTagName('tr');
            for (let row of rows) { row.style.display = row.innerText.toUpperCase().includes(val) ? "" : "none"; }
        }
    </script>
</body>
</html>
