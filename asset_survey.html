<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ระบบตรวจสอบครุภัณฑ์คอมพิวเตอร์</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
font-family:'Kanit',sans-serif;
background:linear-gradient(135deg,#ffd6e7,#ffffff);
margin:0;
}

header{
padding:20px;
background:#fff;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.container{
padding:20px;
}

.card{
background:#fff;
border-radius:12px;
padding:20px;
margin-bottom:15px;
box-shadow:0 4px 12px rgba(0,0,0,.08);
}

button{
background:#ff7fb0;
border:none;
padding:10px 18px;
color:#fff;
border-radius:8px;
cursor:pointer;
}

input{
padding:10px;
border-radius:8px;
border:1px solid #ddd;
width:100%;
}

.progress{
background:#eee;
border-radius:10px;
overflow:hidden;
}

.progress-bar{
height:14px;
background:#ff7fb0;
}

</style>
</head>

<body>

<header>
<h2>ระบบตรวจสอบครุภัณฑ์คอมพิวเตอร์</h2>
โรงพยาบาลอุดรธานี
</header>

<div class="container">

<div class="card">
<h3>Dashboard</h3>

Target : <span id="target"></span><br>
Asset In : <span id="in"></span><br>
Asset Out : <span id="out"></span><br>
Sum : <span id="sum"></span><br>

<div class="progress">
<div id="bar" class="progress-bar"></div>
</div>

<span id="progress"></span>

</div>

<div class="card">

<h3>เลือกหน่วยงาน</h3>

<select id="dept"></select>

</div>

<div class="card">

<h3>ค้นหาครุภัณฑ์</h3>

<input id="search" placeholder="ค้นหา AssetID">

<div id="result"></div>

</div>

<div class="card">

<h3>รายการที่เลือก</h3>

<ul id="selected"></ul>

<button onclick="save()">บันทึก</button>

</div>

</div>

<script>

const API="PASTE_WEBAPP_URL";

let selected=[];

async function loadDashboard(){

const r=await fetch(API+"?action=dashboard");
const d=await r.json();

target.innerText=d.target;
in.innerText=d.assetIn;
out.innerText=d.assetOut;
sum.innerText=d.sum;

progress.innerText=d.progress+"%";

bar.style.width=d.progress+"%";

}

async function loadDepartments(){

const r=await fetch(API+"?action=departments");
const data=await r.json();

data.forEach(d=>{
const o=document.createElement("option");
o.value=d.deptId;
o.textContent=d.deptName;
dept.appendChild(o);
});

}

search.onkeyup=async ()=>{

const q=search.value;

if(q.length<2)return;

const r=await fetch(API+"?action=searchAsset&q="+encodeURIComponent(q));
const data=await r.json();

result.innerHTML="";

data.forEach(a=>{

const div=document.createElement("div");
div.textContent=a.assetId;

div.onclick=()=>{
selected.push(a);
renderSelected();
}

result.appendChild(div);

});

}

function renderSelected(){

selectedList=selected.map(a=>"<li>"+a.assetId+"</li>").join("");

selected.innerHTML=selectedList;

}

async function save(){

const payload={
deptId:dept.value,
deptName:dept.options[dept.selectedIndex].text,
assets:selected,
activityId:""
};

await fetch(API+"?action=saveSurvey&data="+encodeURIComponent(JSON.stringify(payload)));

alert("บันทึกแล้ว");

}

loadDashboard();
loadDepartments();

</script>

</body>
</html>
