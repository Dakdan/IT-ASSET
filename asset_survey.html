<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<title>ระบบตรวจสอบครุภัณฑ์คอมพิวเตอร์</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit&display=swap" rel="stylesheet">

<style>

body{
font-family:Kanit;
margin:0;
background:linear-gradient(180deg,#ffe6f1,#ffffff);
}

header{
padding:20px;
text-align:center;
}

h1{
margin:0;
font-size:24px;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.card{
background:white;
border-radius:12px;
padding:20px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

button{
background:#ff6fa8;
border:none;
color:white;
padding:10px 16px;
border-radius:8px;
cursor:pointer;
}

input{
padding:10px;
width:100%;
margin-top:10px;
}

.asset-item{
padding:10px;
border-bottom:1px solid #eee;
cursor:pointer;
}

</style>

</head>

<body>

<header>

<h1>ระบบตรวจสอบครุภัณฑ์คอมพิวเตอร์</h1>
<div>โรงพยาบาลอุดรธานี</div>

</header>

<div class="container">

<div class="card">

<h3>Dashboard</h3>

<div class="grid">

<div>
<div>Target</div>
<h2 id="target">0</h2>
</div>

<div>
<div>Asset In</div>
<h2 id="assetIn">0</h2>
</div>

<div>
<div>Asset Out</div>
<h2 id="assetOut">0</h2>
</div>

<div>
<div>Progress</div>
<h2 id="progress">0%</h2>
</div>

</div>

</div>

<div class="card">

<h3>เลือกหน่วยงาน</h3>

<div id="deptList"></div>

</div>

<div class="card" id="surveyBox" style="display:none">

<h3 id="deptTitle"></h3>

<input id="searchBox" placeholder="ค้นหาครุภัณฑ์">

<div id="assetList"></div>

</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbwml8efHi7YGiLFgBPFJcdVqOFxqEFYvGd6lz-neZIXevaemNaYwXwsPlF91VqfeUlm/exec"

let currentDept=null

async function loadDashboard(){

const r=await fetch(API+"?action=dashboard")
const d=await r.json()

document.getElementById("target").innerText=d.target
document.getElementById("assetIn").innerText=d.assetIn
document.getElementById("assetOut").innerText=d.assetOut
document.getElementById("progress").innerText=d.progress+"%"

}

async function loadDepartments(){

const r=await fetch(API+"?action=departments")

const data=await r.json()

const box=document.getElementById("deptList")

box.innerHTML=""

data.forEach(d=>{

const div=document.createElement("div")

div.className="asset-item"

div.innerText=d.Building+" / "+d.Floor+" / "+d.DeptName

div.onclick=()=>openDept(d)

box.appendChild(div)

})

}

function openDept(d){

currentDept=d

document.getElementById("surveyBox").style.display="block"

document.getElementById("deptTitle").innerText=d.DeptName

}

document.getElementById("searchBox").addEventListener("keyup",async function(){

const q=this.value

if(q.length<2)return

const r=await fetch(API+"?action=searchAsset&q="+encodeURIComponent(q))

const data=await r.json()

const box=document.getElementById("assetList")

box.innerHTML=""

data.forEach(a=>{

const div=document.createElement("div")

div.className="asset-item"

div.innerText=a.AssetID+" "+a.Name

div.onclick=()=>saveAsset(a)

box.appendChild(div)

})

})

async function saveAsset(a){

await fetch(API+"?action=saveSurvey&dept="+currentDept.DEPT_ID+"&deptName="+currentDept.DeptName+"&assetId="+a.AssetID)

alert("บันทึกแล้ว")

}

loadDashboard()

loadDepartments()

</script>

</body>
</html>
