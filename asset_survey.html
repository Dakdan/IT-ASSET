<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ระบบตรวจสอบครุภัณฑ์คอมพิวเตอร์ - โรงพยาบาลอุดรธานี</title>

<link rel="icon" type="image/png" href="https://img2.pic.in.th/-227e4f6f84f29f020.png">

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@100;300;400;700;800&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:'Sarabun',sans-serif;
background:#fdf2f8;
margin:0;
display:flex;
justify-content:center;
}

#root{
width:100%;
max-width:448px;
background:white;
min-height:100vh;
}

.search-highlight{
background:#ff007f;
color:#fff;
padding:2px 4px;
border-radius:4px;
}

</style>
</head>

<body>

<div id="root"></div>

<script type="text/babel">

const {useState,useEffect,useMemo,useRef}=React;

const Icon=({name,className="",size=24,onClick})=>{

const ref=useRef(null);

useEffect(()=>{

if(window.lucide && ref.current){

ref.current.innerHTML=`<i data-lucide="${name}"></i>`;

window.lucide.createIcons({
attrs:{class:className,style:`width:${size}px;height:${size}px;`},
nameAttr:'data-lucide'
});

}

},[name,className,size]);

return <span ref={ref} onClick={onClick}></span>;

};

const App=()=>{

const[view,setView]=useState('dashboard');

const[allAssets,setAllAssets]=useState([]);

const[searchTerm,setSearchTerm]=useState('');

const[loading,setLoading]=useState(true);

const[scannerOpen,setScannerOpen]=useState(false);

const[alertMsg,setAlertMsg]=useState('');

const API="https://script.google.com/macros/s/AKfycbzhlc0yAeCjPvX6uwtXyFPxQWFk2llo-Yc7KWIsFkXGbl3EtAUjMZPY38TN4Hi2SoI/exec";

const scannerRef=useRef(null);

useEffect(()=>{

loadAssets();

},[]);

async function loadAssets(){

try{

const res=await fetch(`${API}?action=getAllAssets`);

const data=await res.json();

setAllAssets(data.assets || []);

}catch(e){

setAlertMsg("โหลดข้อมูลไม่สำเร็จ");

}

setLoading(false);

}

const filteredAssets=useMemo(()=>{

const term=searchTerm.trim().toLowerCase();

if(!term)return[];

return allAssets
.filter(a=>String(a.AssetID||"").toLowerCase().endsWith(term))
.slice(0,30);

},[searchTerm,allAssets]);

function highlight(text,term){

if(!term)return text;

const parts=String(text).split(new RegExp(`(${term})`,"gi"));

return(
<span>
{parts.map((p,i)=>
p.toLowerCase()===term.toLowerCase()
?<span key={i} className="search-highlight">{p}</span>
:p
)}
</span>
);

}

function startScanner(){

setScannerOpen(true);

setTimeout(async()=>{

try{

const scanner=new Html5Qrcode("reader");

scannerRef.current=scanner;

await scanner.start(
{facingMode:"environment"},
{fps:15,qrbox:250},

(decoded)=>{

setSearchTerm(decoded);

setView("search");

stopScanner();

}

);

}catch(e){

setAlertMsg("ไม่สามารถเปิดกล้องได้");

setScannerOpen(false);

}

},300);

}

async function stopScanner(){

if(scannerRef.current){

try{
await scannerRef.current.stop();
}catch(e){}

}

setScannerOpen(false);

}

return(

<div className="flex flex-col min-h-screen">

{loading && (
<div className="absolute inset-0 bg-white flex items-center justify-center z-50">
กำลังโหลด...
</div>
)}

<header className="bg-pink-600 text-white p-4 font-bold text-center">
ระบบตรวจสอบครุภัณฑ์
</header>

<main className="flex-1 p-4">

{view==="dashboard" && (

<div className="text-center text-gray-400">

<button
onClick={()=>setView("search")}
className="bg-pink-600 text-white px-6 py-3 rounded-xl"
>

ค้นหาครุภัณฑ์

</button>

</div>

)}

{view==="search" && (

<div>

<input
value={searchTerm}
onChange={(e)=>setSearchTerm(e.target.value)}
placeholder="พิมพ์รหัสท้าย..."
className="w-full border p-3 rounded-xl mb-4"
/>

{filteredAssets.length>0 ? (

filteredAssets.map((a,i)=>(

<div
key={i}
className="p-4 border rounded-xl mb-2"
>

<div className="font-bold text-pink-600">
{highlight(a.AssetID,searchTerm)}
</div>

<div className="text-gray-600">
{highlight(a.itemName,searchTerm)}
</div>

</div>

))

):(

<div className="text-gray-300 text-center py-10">
ไม่พบข้อมูล
</div>

)}

</div>

)}

</main>

<div className="fixed bottom-6 left-1/2 -translate-x-1/2">

<button
onClick={startScanner}
className="bg-pink-600 text-white w-16 h-16 rounded-full"
>

<Icon name="scan"/>

</button>

</div>

{scannerOpen && (

<div className="fixed inset-0 bg-black flex flex-col items-center justify-center">

<div id="reader" className="w-full max-w-sm mb-4"></div>

<button
onClick={stopScanner}
className="text-white border px-6 py-3 rounded-xl"
>

ปิด

</button>

</div>

)}

</div>

);

};

const root=ReactDOM.createRoot(document.getElementById("root"));

root.render(<App/>);

</script>

</body>
</html>
