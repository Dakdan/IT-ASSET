<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ระบบตรวจสอบครุภัณฑ์คอมพิวเตอร์</title>

<link rel="icon" type="image/png" href="https://img2.pic.in.th/pic/-227e4f6f84f29f020.png">

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:'Sarabun',sans-serif;
background:#fdf2f8;
margin:0;
display:flex;
justify-content:center;
}

#app{
width:100%;
max-width:420px;
background:white;
min-height:100vh;
}

.header{
background:linear-gradient(180deg,#e91e63,#ff4081);
color:white;
padding:30px;
border-bottom-left-radius:30px;
border-bottom-right-radius:30px;
}

.search-box{
margin-top:-30px;
padding:20px;
}

.search-card{
background:white;
border:3px solid #e91e63;
border-radius:20px;
padding:15px;
box-shadow:0 10px 20px rgba(0,0,0,0.15);
}

.asset-item{
padding:10px;
border-bottom:1px solid #eee;
font-weight:bold;
}

.search-highlight{
background:#ff007f;
color:white;
padding:2px 5px;
border-radius:4px;
}

#reader{
width:100%;
}

</style>
</head>

<body>

<div id="app">

<div class="header">
<h2>ระบบตรวจสอบครุภัณฑ์</h2>
<p>IT UDON HOSP</p>
</div>


<div class="search-box">

<div class="search-card">

<div class="flex gap-2">

<input
id="search-input"
type="text"
placeholder="ค้นหา AssetID"
class="border p-2 rounded w-full"
/>

<button onclick="startScanner()" class="bg-pink-600 text-white px-4 rounded">
QR
</button>

</div>

<div id="search-results" class="mt-3"></div>

</div>

</div>


<div id="reader"></div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbwml8efHi7YGiLFgBPFJcdVqOFxqEFYvGd6lz-neZIXevaemNaYwXwsPlF91VqfeUlm/exec"



function highlightText(text,term){

if(!term) return text

const reg=new RegExp(`(${term})`,"gi")

return text.replace(reg,'<span class="search-highlight">$1</span>')

}



function handleSearch(){

const q=document.getElementById("search-input").value.trim()

const container=document.getElementById("search-results")

if(!q){

container.innerHTML=""
return

}

fetch(`${API}?action=searchAssets&query=${encodeURIComponent(q)}`)

.then(r=>r.json())

.then(data=>{

if(!data || data.length==0){

container.innerHTML="<p class='text-gray-400'>ไม่พบข้อมูล</p>"
return

}

container.innerHTML=data.map(a=>`

<div class="asset-item">

${highlightText(a.AssetID,q)}

</div>

`).join("")

})

}



document.getElementById("search-input")
.addEventListener("input",handleSearch)



let scanner



function startScanner(){

const reader=document.getElementById("reader")

reader.innerHTML=""

scanner=new Html5Qrcode("reader")

scanner.start(
{ facingMode:"environment" },
{ fps:10, qrbox:250 },

qr=>{

document.getElementById("search-input").value=qr

handleSearch()

scanner.stop()

}

)

}

</script>

</body>
</html>
