<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Asset Survey - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background-color: #f8f9fa;
        }

        /* Header สีชมพูไล่เฉดตามต้นฉบับในรูป */
        .pink-gradient-header {
            background: linear-gradient(180deg, #b0124c 0%, #e91e63 60%, #f48fb1 100%);
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            box-shadow: 0 10px 25px rgba(233, 30, 99, 0.15);
        }

        /* กล่องสถิติ ปรับดีไซน์ตามรูปภาพ */
        .stat-card {
            background: white;
            border-radius: 24px;
            padding: 16px 8px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.04);
            border-bottom: 5px solid transparent;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100%;
        }

        /* สีขอบด้านล่างตามรูปภาพเป๊ะๆ */
        .border-blue { border-bottom-color: #60a5fa; }
        .border-green { border-bottom-color: #34d399; }
        .border-yellow { border-bottom-color: #fbbf24; }
        .border-pink { border-bottom-color: #f472b6; }
        .border-purple { border-bottom-color: #a78bfa; }

        .custom-scrollbar::-webkit-scrollbar { width: 3px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e91e63; border-radius: 10px; }
        
        .bldg-divider {
            background: #fff0f3;
            color: #d81b60;
            font-weight: 700;
            font-size: 11px;
            letter-spacing: 0.5px;
        }

        /* โลโก้วงกลมขาวตามรูป */
        .logo-container {
            background: white;
            padding: 10px;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="flex justify-center">

    <div class="w-full max-w-md bg-[#f8f9fa] min-h-screen relative flex flex-col overflow-hidden shadow-2xl">
        
        <!-- ส่วนหัว (Header) ตามรูป -->
        <div class="pink-gradient-header pt-10 pb-16 px-6 text-center text-white shrink-0 relative z-10">
            <div class="flex justify-center mb-4">
                <div class="logo-container">
                    <img src="https://img2.pic.in.th/-227e4f6f84f29f020.png" alt="Logo" class="w-14 h-14 object-contain">
                </div>
            </div>
            <h1 class="text-xl font-bold tracking-tight">ระบบตรวจสอบครุภัณฑ์คอมพิวเตอร์</h1>
            <p class="text-[10px] font-light opacity-90 mt-1 uppercase tracking-[0.2em]">โรงพยาบาลอุดรธานี : กลุ่มงานไอที</p>
        </div>

        <!-- เนื้อหาหลัก (ลด padding-bottom เพราะเอาบาร์ออกแล้ว) -->
        <main class="flex-grow px-5 -mt-10 relative z-20 pb-10">
            
            <!-- Dashboard สถิติ 3 กล่องบน ตามรูป -->
            <div class="grid grid-cols-3 gap-3 mb-3">
                <div class="stat-card border-blue">
                    <p class="text-[9px] text-gray-400 font-bold uppercase mb-2">เป้าหมาย (R)</p>
                    <h2 id="stat-goal" class="text-xl font-black text-gray-800">-</h2>
                </div>
                <div class="stat-card border-green">
                    <p class="text-[9px] text-gray-400 font-bold uppercase mb-2">In Database</p>
                    <h2 id="stat-in" class="text-xl font-black text-gray-800">-</h2>
                </div>
                <div class="stat-card border-yellow">
                    <p class="text-[9px] text-gray-400 font-bold uppercase mb-2">Out Database</p>
                    <h2 id="stat-out" class="text-xl font-black text-gray-800">-</h2>
                </div>
            </div>

            <!-- Dashboard สถิติ 2 กล่องล่าง ตามรูป -->
            <div class="grid grid-cols-2 gap-3 mb-8">
                <div class="stat-card border-pink">
                    <p class="text-[9px] text-gray-400 font-bold uppercase mb-2">รวมสำรวจ</p>
                    <h2 id="stat-sum" class="text-xl font-black text-gray-800">-</h2>
                </div>
                <div class="stat-card border-purple">
                    <p class="text-[9px] text-gray-400 font-bold uppercase mb-2">ความสำเร็จ</p>
                    <h2 id="stat-percent" class="text-xl font-black text-purple-600">-%</h2>
                </div>
            </div>

            <!-- รายการหน่วยงาน -->
            <div class="bg-white rounded-[32px] shadow-sm overflow-hidden border border-gray-100">
                <div class="p-5 border-b border-gray-50 flex justify-between items-center bg-white">
                    <h3 class="font-bold text-xs text-gray-600 flex items-center gap-2">
                        <i data-lucide="bar-chart-3" class="w-4 h-4 text-pink-500"></i>
                        รายการตรวจสอบแยกตามอาคาร
                    </h3>
                    <div id="loader" class="animate-spin rounded-full h-3 w-3 border-2 border-pink-500 border-t-transparent hidden"></div>
                </div>

                <div class="max-h-[500px] overflow-y-auto custom-scrollbar">
                    <table class="w-full text-left border-collapse">
                        <tbody id="survey-tbody">
                            <tr>
                                <td class="p-16 text-center text-gray-300 text-xs italic">
                                    กำลังดึงข้อมูลจากระบบ...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            
            <!-- ปุ่มเพิ่มข้อมูลแบบลอยตัว (Floating Action Button) แทนบาร์เมนู -->
            <div class="flex justify-center mt-6">
                <button onclick="location.href='asset_survey_form.html'" class="flex items-center gap-2 bg-pink-500 text-white px-8 py-4 rounded-full font-bold shadow-lg hover:bg-pink-600 active:scale-95 transition-all">
                    <i data-lucide="plus" class="w-5 h-5"></i>
                    เริ่มการสำรวจใหม่
                </button>
            </div>
        </main>

    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwml8efHi7YGiLFgBPFJcdVqOFxqEFYvGd6lz-neZIXevaemNaYwXwsPlF91VqfeUlm/exec";

        window.onload = () => {
            lucide.createIcons();
            fetchData();
        };

        async function fetchData() {
            document.getElementById('loader').classList.remove('hidden');
            try {
                const res = await fetch(`${API_URL}?action=getDashboard&t=${Date.now()}`);
                const data = await res.json();
                
                if (data.dashboard) {
                    updateDashboard(data);
                    renderTable(data.dashboard);
                }
            } catch (err) {
                console.error("Error fetching data:", err);
                document.getElementById('survey-tbody').innerHTML = '<tr><td class="p-10 text-center text-red-400 text-xs">เกิดข้อผิดพลาดในการเชื่อมต่อ</td></tr>';
            } finally {
                document.getElementById('loader').classList.add('hidden');
            }
        }

        function updateDashboard(data) {
            const goal = data.goal || 0;
            let totalIn = 0;
            let totalOut = 0;
            let totalSum = 0;

            data.dashboard.forEach(item => {
                totalIn += parseInt(item.Asset_On_In_Log || 0);
                totalOut += parseInt(item.Asset_On_Out_Log || 0);
                totalSum += parseInt(item.SUM || 0);
            });

            const percent = goal > 0 ? ((totalSum / goal) * 100).toFixed(1) : 0;

            document.getElementById('stat-goal').innerText = goal.toLocaleString();
            document.getElementById('stat-in').innerText = totalIn.toLocaleString();
            document.getElementById('stat-out').innerText = totalOut.toLocaleString();
            document.getElementById('stat-sum').innerText = totalSum.toLocaleString();
            document.getElementById('stat-percent').innerText = `${percent}%`;
        }

        function renderTable(details) {
            const tbody = document.getElementById('survey-tbody');
            if (!details || details.length === 0) {
                tbody.innerHTML = '<tr><td class="p-10 text-center text-gray-400 text-xs">ไม่พบข้อมูลในระบบ</td></tr>';
                return;
            }

            let html = "";
            let currentBldg = "";

            details.forEach(item => {
                const building = item.LOCATION_NAME || "ไม่ระบุตึก";
                const floor = item.FL || "-";
                const deptName = item.DEP_NAME_LOC || item.DEPNAME || "ไม่ระบุแผนก";
                const sum = item.SUM || 0;
                const deptId = item.DEPID;

                if (building !== currentBldg) {
                    currentBldg = building;
                    html += `
                        <tr class="bldg-divider">
                            <td colspan="3" class="px-5 py-2 uppercase tracking-tighter italic">
                                อาคาร: ${currentBldg}
                            </td>
                        </tr>
                    `;
                }

                html += `
                    <tr class="border-b border-gray-50 bg-white hover:bg-pink-50/20 transition-colors cursor-pointer" 
                        onclick="location.href='asset_survey_form.html?deptId=${deptId}'">
                        <td class="px-5 py-4">
                            <p class="text-[9px] font-bold text-pink-400 uppercase mb-1">ชั้น ${floor}</p>
                            <p class="text-[13px] font-semibold text-gray-700">${deptName}</p>
                        </td>
                        <td class="px-2 py-4 text-center">
                            <span class="text-[11px] font-black bg-gray-50 text-gray-700 px-3 py-1 rounded-full border border-gray-100">
                                ${sum}
                            </span>
                        </td>
                        <td class="pr-5 py-4 text-right">
                            <i data-lucide="chevron-right" class="w-4 h-4 text-gray-300"></i>
                        </td>
                    </tr>
                `;
            });

            tbody.innerHTML = html;
            lucide.createIcons();
        }
    </script>
</body>
</html>
