<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IT Asset Survey</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>

<style>

body{
font-family:'Kanit',sans-serif;
background:#f8f9fa;
}

.page{
display:none;
}

.page.active{
display:block;
}

.btn-pink{
background:#e91e63;
color:white;
}

.card{
background:white;
border-radius:20px;
box-shadow:0 10px 20px rgba(0,0,0,0.05);
}

</style>
</head>


<body class="flex justify-center">

<div class="w-full max-w-md min-h-screen">

<!-- HEADER -->

<div class="bg-pink-600 text-white text-center p-4">

<h1 class="font-bold text-lg">
ระบบตรวจสอบครุภัณฑ์คอมพิวเตอร์
</h1>

<p class="text-xs opacity-80">
IT UDON HOSP
</p>

</div>


<!-- DASHBOARD -->

<div id="page-dashboard" class="page active p-4">

<div class="card p-4 mb-4">

<div class="grid grid-cols-2 gap-2 text-center">

<div>
<p class="text-xs text-gray-400">เป้าหมาย</p>
<p id="dash-goal" class="font-bold text-lg">0</p>
</div>

<div>
<p class="text-xs text-gray-400">รวมสำรวจ</p>
<p id="dash-sum" class="font-bold text-lg">0</p>
</div>

</div>

</div>


<div class="card">

<div class="p-3 border-b font-bold text-sm">
รายชื่อหน่วยงาน
</div>

<div id="dept-list-container">

</div>

</div>


<div class="fixed bottom-6 left-1/2 -translate-x-1/2">

<button
onclick="navigateTo('page-form')"
class="btn-pink w-14 h-14 rounded-full text-xl">

+

</button>

</div>

</div>


<!-- FORM -->

<div id="page-form" class="page p-4">

<div class="card p-4 mb-4">

<select id="form-bldg" onchange="onBuildingChange()" class="w-full p-2 border rounded mb-2">
<option value="">เลือกอาคาร</option>
</select>

<select id="form-dept" class="w-full p-2 border rounded">
<option value="">เลือกหน่วยงาน</option>
</select>

</div>


<div class="card p-4 mb-4">

<div class="flex gap-2 mb-3">

<input
id="search-input"
type="text"
placeholder="ค้นหา AssetID"
class="flex-1 p-2 border rounded">

<button
onclick="handleSearch()"
class="btn-pink px-3 rounded">

ค้นหา

</button>

</div>

<div id="search-results" class="space-y-2">

</div>

<hr class="my-4">

<div class="text-xs text-gray-400 mb-2">
รายการที่เลือก
</div>

<div id="selected-list">

<p class="text-center text-gray-300 text-xs">
ยังไม่มีรายการ
</p>

</div>

</div>


<div class="flex gap-2">

<button
onclick="navigateTo('page-dashboard')"
class="flex-1 border rounded p-3">

ยกเลิก

</button>

<button
class="flex-1 btn-pink rounded p-3">

บันทึก

</button>

</div>

</div>

</div>



<script>

const API="https://script.google.com/macros/s/AKfycbwml8efHi7YGiLFgBPFJcdVqOFxqEFYvGd6lz-neZIXevaemNaYwXwsPlF91VqfeUlm/exec";

let masterDepts=[];
let selectedAssets=[];

window.onload=()=>{

lucide.createIcons();

initApp();

}


function navigateTo(page){

document.querySelectorAll('.page')
.forEach(p=>p.classList.remove('active'));

document.getElementById(page)
.classList.add('active');

}



async function initApp(){

try{

const dashRes=await fetch(API+"?action=getDashboard");
const deptRes=await fetch(API+"?action=getDepartments");

const dash=await dashRes.json();
masterDepts=await deptRes.json();

updateDashboard(dash);
initFormSelects();

}catch(e){

Swal.fire("Error","โหลดข้อมูลไม่ได้","error");

}

}



function updateDashboard(data){

document.getElementById("dash-goal").innerText=data.goal||0;
document.getElementById("dash-sum").innerText=data.totalSum||0;

const container=document.getElementById("dept-list-container");

if(!data.details){

container.innerHTML="<p class='text-center p-4 text-gray-400'>ไม่มีข้อมูล</p>";
return;

}

let html="";

data.details.forEach(item=>{

html+=`

<div
class="p-3 border-b flex justify-between cursor-pointer"
onclick="startSurveyFor('${item.DEPID}')">

<div>

<p class="text-xs text-pink-500">
ชั้น ${item.FL||'-'}
</p>

<p class="text-sm">
${item.DEPNAME}
</p>

</div>

<div class="font-bold">
${item.Sum||0}
</div>

</div>

`;

});

container.innerHTML=html;

}



function initFormSelects(){

const bldgSet=[...new Set(masterDepts.map(d=>d.building))];

const bSelect=document.getElementById("form-bldg");

bldgSet.forEach(b=>{

bSelect.innerHTML+=`<option value="${b}">${b}</option>`;

});

}



function onBuildingChange(){

const b=document.getElementById("form-bldg").value;
const dSelect=document.getElementById("form-dept");

dSelect.innerHTML='<option value="">เลือกหน่วยงาน</option>';

masterDepts
.filter(d=>d.building==b)
.forEach(d=>{

dSelect.innerHTML+=`
<option value="${d.deptId}">
${d.deptName}
</option>
`;

});

}



function startSurveyFor(id){

const d=masterDepts.find(x=>x.deptId==id);

if(!d)return;

document.getElementById("form-bldg").value=d.building;

onBuildingChange();

document.getElementById("form-dept").value=d.deptId;

selectedAssets=[];

renderSelected();

navigateTo("page-form");

}



async function handleSearch(){

const q=document.getElementById("search-input").value;

if(!q)return;

try{

const res=await fetch(API+"?action=searchAssets&query="+encodeURIComponent(q));

const data=await res.json();

const container=document.getElementById("search-results");

if(data.length==0){

container.innerHTML="<p class='text-center text-gray-400 text-xs'>ไม่พบข้อมูล</p>";
return;

}

container.innerHTML=data.map(item=>`

<div
class="p-3 bg-pink-50 border rounded flex justify-between cursor-pointer"
onclick='addAsset(${JSON.stringify(item)})'>

${item.AssetID}

</div>

`).join('');

}catch(e){

Swal.fire("Error","ค้นหาไม่สำเร็จ","error");

}

}



function addAsset(item){

if(selectedAssets.find(x=>x.AssetID==item.AssetID))return;

selectedAssets.push(item);

renderSelected();

}



function renderSelected(){

const container=document.getElementById("selected-list");

if(selectedAssets.length==0){

container.innerHTML="<p class='text-center text-gray-300 text-xs'>ยังไม่มีรายการ</p>";
return;

}

container.innerHTML=selectedAssets.map((a,i)=>`

<div class="flex justify-between border p-2 rounded">

<span>${a.AssetID}</span>

<button onclick="removeAsset(${i})" class="text-red-500">
ลบ
</button>

</div>

`).join('');

}



function removeAsset(i){

selectedAssets.splice(i,1);

renderSelected();

}

</script>


</body>
</html>
