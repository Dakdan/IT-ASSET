<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบตรวจสอบครุภัณฑ์คอมพิวเตอร์ - IT Udon Hospital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; background: #fff0f3; min-height: 100vh; color: #4a4a4a; }
        .glass-card { background: white; border-radius: 20px; border: 1px solid #ffdeeb; box-shadow: 0 4px 12px rgba(255, 133, 161, 0.05); }
        .btn-pink { background: #ff85a1; color: white; transition: all 0.2s ease; }
        .btn-pink:hover { background: #ff6b8d; }
        .btn-pink:active { transform: scale(0.98); }
        .loader-overlay { background: rgba(255, 255, 255, 0.85); display: none; position: fixed; inset: 0; z-index: 10000; align-items: center; justify-content: center; flex-direction: column; }
        .modal-backdrop { background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(4px); position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; padding: 1rem; z-index: 50; }
        .modal-content { background: white; width: 100%; max-width: 500px; border-radius: 24px; max-height: 90vh; overflow-y: auto; }
        .signature-pad-container { border: 2px dashed #ffb6c1; background: #fff; border-radius: 12px; width: 100%; height: 180px; }
        .signature-pad { width: 100%; height: 100%; touch-action: none; border-radius: 12px; }
        .form-input { width: 100%; padding: 0.75rem 1rem; border-radius: 12px; border: 1px solid #ffdeeb; outline: none; transition: all 0.2s; font-size: 14px; background: white; }
        .section-header { border-left: 5px solid #ff85a1; padding-left: 10px; margin-bottom: 20px; font-weight: 600; color: #333; }
        .badge-non { background: #fff0f0; color: #ff6b8d; font-size: 10px; padding: 2px 10px; border-radius: 50px; font-weight: 600; border: 1px solid #ffdeeb; }
        .img-preview { width: 100%; height: 150px; object-fit: cover; border-radius: 12px; border: 1px solid #ffdeeb; margin-top: 8px; }
        #reader { width: 100%; border-radius: 12px; overflow: hidden; border: 2px solid #ff85a1; }
    </style>
</head>
<body class="p-4 md:p-6 pb-32">

    <div id="loader" class="loader-overlay">
        <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-pink-500"></div>
        <p id="loader-text" class="text-pink-500 font-bold mt-4">กำลังประมวลผล...</p>
    </div>

    <header class="max-w-4xl mx-auto mb-6 text-center">
        <h1 class="text-2xl font-bold text-gray-800">ระบบตรวจสอบครุภัณฑ์คอมพิวเตอร์</h1>
        <p class="text-pink-400 text-sm font-bold uppercase tracking-widest">IT Udonthani Hospital</p>
    </header>

    <main class="max-w-4xl mx-auto space-y-6">
        <!-- Section 1: Location -->
        <section class="glass-card p-6">
            <h2 class="section-header">1. ข้อมูลสถานที่และหน่วยงาน</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <select id="building-select" onchange="filterDepartments()" class="form-input">
                    <option value="">-- เลือกอาคาร --</option>
                </select>
                <select id="dept-select" class="form-input">
                    <option value="">-- เลือกหน่วยงาน (แยกตามชั้น) --</option>
                </select>
            </div>
        </section>

        <!-- Section 2: Selected Assets -->
        <section class="glass-card p-6">
            <div class="flex justify-between items-center mb-6">
                <h2 class="section-header mb-0">2. รายการครุภัณฑ์ที่เลือก</h2>
                <button onclick="openSearchModal()" class="btn-pink px-6 py-2 rounded-full text-sm font-bold shadow-md">เพิ่มครุภัณฑ์ +</button>
            </div>
            <div id="selected-list" class="space-y-3">
                <div class="py-10 text-center text-gray-300 italic text-sm">ยังไม่มีข้อมูลครุภัณฑ์ที่เลือก</div>
            </div>
        </section>

        <div class="fixed bottom-0 left-0 right-0 p-4 bg-white/80 backdrop-blur-md border-t border-pink-100 z-40">
            <div class="max-w-4xl mx-auto">
                <button onclick="openFinalModal()" class="w-full btn-pink py-4 rounded-2xl font-bold text-lg shadow-xl">ถัดไป (ระบุผู้ส่งรายงาน)</button>
            </div>
        </div>
    </main>

    <!-- Scanner Modal -->
    <div id="scanner-modal" class="modal-backdrop hidden" style="z-index: 100;">
        <div class="modal-content p-4 text-center">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold text-pink-500">สแกนบาร์โค้ด</h3>
                <button onclick="stopScanner()" class="text-gray-400 text-2xl">&times;</button>
            </div>
            <div id="reader"></div>
        </div>
    </div>

    <!-- Search Modal -->
    <div id="search-modal" class="modal-backdrop hidden">
        <div class="modal-content p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold text-lg text-gray-700">ค้นหาทะเบียนครุภัณฑ์</h3>
                <button onclick="closeSearchModal()" class="text-gray-400 text-3xl">&times;</button>
            </div>
            <div class="relative flex gap-2 mb-4">
                <input type="text" id="search-input" placeholder="พิมพ์รหัส หรือ ชื่อครุภัณฑ์..." class="form-input" oninput="doSearch()">
                <button onclick="startScanner('search-input')" class="bg-pink-50 p-3 rounded-xl border border-pink-200 text-pink-500">
                    📸
                </button>
            </div>
            <div id="search-results" class="space-y-2 max-h-[350px] overflow-y-auto"></div>
            <div class="mt-4 pt-4 border-t border-gray-100">
                <button onclick="addNonSystem()" class="w-full py-3 bg-pink-50 text-pink-500 rounded-xl text-sm font-bold border border-dashed border-pink-200">
                    + กรณีไม่มีในทะเบียน (นอกระบบ)
                </button>
            </div>
        </div>
    </div>

    <!-- Detail Modal -->
    <div id="detail-modal" class="modal-backdrop hidden">
        <div class="modal-content p-6">
            <div id="asset-info-container"></div>
            <div class="space-y-4 mt-6">
                <div>
                    <label class="text-xs font-bold text-gray-400 ml-1">รูปภาพครุภัณฑ์ (Mapping: NOID)</label>
                    <div class="mt-1">
                        <input type="file" id="asset-image-input" accept="image/*" capture="environment" class="hidden" onchange="handleImageChange(this)">
                        <button id="btn-camera" onclick="document.getElementById('asset-image-input').click()" class="w-full py-3 bg-white border-2 border-dashed border-pink-200 rounded-xl text-pink-400 text-sm font-bold flex items-center justify-center gap-2">
                            📸 ถ่ายรูปครุภัณฑ์
                        </button>
                        <div id="image-preview-container" class="hidden">
                            <img id="image-preview-el" class="img-preview" src="">
                            <button onclick="removeImage()" class="text-xs text-red-400 mt-1 block mx-auto underline">ลบรูปภาพ</button>
                        </div>
                    </div>
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-400 ml-1">ความสำคัญ (PriorityJobe)</label>
                    <select id="sel-priority" class="form-input mt-1">
                        <option value="">-- เลือกความสำคัญ --</option>
                        <option value="PIO-001">PIO-001 ตรวจรักษา(แพทย์)</option>
                        <option value="PIO-002">PIO-002 ข้อมูลผู้ป่วย (พยาบาล)</option>
                        <option value="PIO-003">PIO-003 บริการ การเงิน ห้องบัตร ห้องยา Lab</option>
                        <option value="PIO-004">PIO-004 งานเอกสาร งานธุรการ</option>
                        <option value="PIO-005">PIO-005 บริการทั่วไป ซ่อมบำรุง</option>
                    </select>
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-400 ml-1">ประเภทอุปกรณ์ (AssetType)</label>
                    <select id="sel-type" class="form-input mt-1">
                        <option value="">-- เลือกประเภท --</option>
                        <option value="เครื่องคอมพิวเตอร์ (All In One)">🖥️ เครื่องคอมพิวเตอร์ (All In One)</option>
                        <option value="เครื่องคอมพิวเตอร์ (Case)">🗄️ เครื่องคอมพิวเตอร์ (Case)</option>
                        <option value="จอรับภาพ (Monitor)">📺 จอรับภาพ (Monitor)</option>
                        <option value="เครื่องสำรองไฟ">🔋 เครื่องสำรองไฟ</option>
                        <option value="เครื่องปริ้นเตอร์">🖨️ เครื่องปริ้นเตอร์</option>
                    </select>
                </div>
                <div class="flex items-center justify-between p-4 bg-pink-50 rounded-2xl">
                    <span class="text-sm font-bold text-pink-600">เครื่องระบบ Pacs</span>
                    <input type="checkbox" id="chk-pacs" class="w-6 h-6 accent-pink-500">
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-400 ml-1">ช่วงเวลาทำงาน (Shift_Work)</label>
                    <div class="flex gap-6 mt-2 ml-2">
                        <label class="inline-flex items-center text-sm"><input type="checkbox" value="เช้า" class="shift-cb mr-2"> เช้า</label>
                        <label class="inline-flex items-center text-sm"><input type="checkbox" value="บ่าย" class="shift-cb mr-2"> บ่าย</label>
                        <label class="inline-flex items-center text-sm"><input type="checkbox" value="ดึก" class="shift-cb mr-2"> ดึก</label>
                    </div>
                </div>
            </div>
            <div class="flex gap-3 mt-8">
                <button onclick="closeDetailModal()" class="flex-1 py-3 bg-gray-100 text-gray-500 rounded-xl font-bold">ยกเลิก</button>
                <button onclick="saveAssetToSelected()" class="flex-1 py-3 btn-pink rounded-xl font-bold shadow-lg">เพิ่มรายการ</button>
            </div>
        </div>
    </div>

    <!-- Final Confirmation Modal -->
    <div id="final-modal" class="modal-backdrop hidden">
        <div class="modal-content p-6">
            <h3 class="font-bold text-lg text-center mb-6">ผู้ยืนยันการตรวจสอบ</h3>
            <div class="space-y-4">
                <input type="text" id="inspector-name" placeholder="ชื่อ-นามสกุล ช่าง IT" class="form-input text-center font-bold">
                <div class="text-center">
                    <div class="signature-pad-container">
                        <canvas id="sign-canvas" class="signature-pad"></canvas>
                    </div>
                    <button onclick="clearSignature()" class="text-xs text-pink-400 underline mt-2">ล้างลายเซ็น</button>
                </div>
            </div>
            <button onclick="processSubmit(true)" class="w-full mt-8 py-4 btn-pink rounded-xl font-bold shadow-lg">ยืนยันและส่งรายงาน</button>
            <button onclick="closeFinalModal()" class="w-full py-3 text-gray-400 font-bold">ย้อนกลับ</button>
        </div>
    </div>

    <div id="alert-box" class="modal-backdrop hidden" style="z-index: 99999;">
        <div class="modal-content p-6 max-w-xs text-center border-2 border-pink-200">
            <p id="alert-msg" class="font-bold text-gray-700"></p>
            <button onclick="document.getElementById('alert-box').classList.add('hidden')" class="mt-6 px-10 py-2 btn-pink rounded-full font-bold text-sm">รับทราบ</button>
        </div>
    </div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyo-lZoaJ4WMvAyt7dtQ5jgXjLgcLhIHTTKdtC_OVf6E9_efuhLnT1CaWD6GmsmVEjB/exec";

    let departments = [], allAssets = [], selectedItems = [], activeAsset = null, signaturePad, currentBase64 = null;
    let html5QrCode = null;

    window.onload = async () => {
        setupSignature();
        await initializeData();
    };

    function setupSignature() {
        const canvas = document.getElementById('sign-canvas');
        signaturePad = new SignaturePad(canvas);
        const resize = () => {
            const ratio = Math.max(window.devicePixelRatio || 1, 1);
            canvas.width = canvas.offsetWidth * ratio;
            canvas.height = canvas.offsetHeight * ratio;
            canvas.getContext("2d").scale(ratio, ratio);
            signaturePad.clear();
        };
        window.onresize = resize; resize();
    }

    async function initializeData() {
        toggleLoader(true, "กำลังโหลดทะเบียน...");
        try {
            const [depts, assets] = await Promise.all([
                callAPI('getDepartments'),
                callAPI('getAssets')
            ]);
            departments = depts;
            allAssets = assets;
            renderBuildingOptions();
        } catch (e) { showAlert("โหลดข้อมูลไม่สำเร็จ"); }
        finally { toggleLoader(false); }
    }

    function renderBuildingOptions() {
        const buildings = [...new Set(departments.map(d => (d.LOCATION_NAME || "").toString().trim()))].filter(b => b !== "").sort();
        const select = document.getElementById('building-select');
        select.innerHTML = '<option value="">-- เลือกอาคาร --</option>' + buildings.map(b => `<option value="${b}">${b}</option>`).join('');
    }

    function filterDepartments() {
        const selectedBuilding = document.getElementById('building-select').value;
        const select = document.getElementById('dept-select');
        select.innerHTML = '<option value="">-- เลือกหน่วยงาน (แยกตามชั้น) --</option>';
        if(!selectedBuilding) return;

        const depts = departments.filter(d => d.LOCATION_NAME === selectedBuilding);
        const floors = [...new Set(depts.map(d => d.FLOOR_NAME || "ไม่ระบุชั้น"))].sort();

        floors.forEach(floor => {
            const group = document.createElement('optgroup');
            group.label = `📍 ชั้น: ${floor}`;
            depts.filter(d => d.FLOOR_NAME === floor).forEach(d => {
                const opt = document.createElement('option');
                opt.value = d.DEP_ID;
                opt.textContent = d.DEPNAME;
                group.appendChild(opt);
            });
            select.appendChild(group);
        });
    }

    function openSearchModal() { document.getElementById('search-modal').classList.remove('hidden'); }
    function closeSearchModal() { document.getElementById('search-modal').classList.add('hidden'); }

    function doSearch() {
        const q = document.getElementById('search-input').value.trim().toLowerCase();
        const container = document.getElementById('search-results');
        if(q.length < 2) { container.innerHTML = ''; return; }

        const filtered = allAssets.filter(x => String(x.AssetID).toLowerCase().includes(q) || String(x['ชื่อรายการครุภัณฑ์']).toLowerCase().includes(q)).slice(0, 10);
        container.innerHTML = filtered.map(x => `
            <div onclick='selectAsset(${JSON.stringify(x)})' class="p-4 border rounded-2xl hover:bg-pink-50 cursor-pointer mb-2">
                <span class="text-[10px] font-bold text-blue-500">${x.AssetID}</span>
                <p class="text-xs font-bold text-gray-700">${x['ชื่อรายการครุภัณฑ์']}</p>
            </div>
        `).join('');
    }

    function selectAsset(asset) {
        activeAsset = { ...asset, isNonumber: false, NOID: asset.NOID || Date.now() }; 
        closeSearchModal();
        openDetailModal();
    }

    function addNonSystem() {
        activeAsset = { AssetID: "", "ชื่อรายการครุภัณฑ์": "", isNonumber: true, NOID: "NON-" + Date.now() };
        closeSearchModal();
        openDetailModal();
    }

    function openDetailModal() {
        const container = document.getElementById('asset-info-container');
        removeImage();
        container.innerHTML = activeAsset.isNonumber ? `
            <div class="p-5 border-2 border-dashed border-pink-300 rounded-2xl">
                <input type="text" id="manual-asset-id" placeholder="รหัสครุภัณฑ์ (ถ้ามี)" class="form-input mb-3">
                <input type="text" id="manual-asset-name" placeholder="ชื่อรายการครุภัณฑ์" class="form-input">
            </div>
        ` : `
            <div class="p-5 bg-gray-50 rounded-2xl">
                <span class="text-xs font-bold text-blue-500">${activeAsset.AssetID}</span>
                <h4 class="font-bold text-gray-700">${activeAsset['ชื่อรายการครุภัณฑ์']}</h4>
            </div>
        `;
        document.getElementById('detail-modal').classList.remove('hidden');
    }

    function closeDetailModal() { document.getElementById('detail-modal').classList.add('hidden'); }

    function handleImageChange(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            currentBase64 = e.target.result;
            document.getElementById('image-preview-el').src = currentBase64;
            document.getElementById('image-preview-container').classList.remove('hidden');
            document.getElementById('btn-camera').classList.add('hidden');
        };
        reader.readAsDataURL(file);
    }

    function removeImage() {
        currentBase64 = null;
        document.getElementById('image-preview-container').classList.add('hidden');
        document.getElementById('btn-camera').classList.remove('hidden');
    }

    function saveAssetToSelected() {
        let finalAsset = { ...activeAsset };
        if(activeAsset.isNonumber) {
            const mId = document.getElementById('manual-asset-id').value.trim();
            const mName = document.getElementById('manual-asset-name').value.trim();
            if(!mName) return showAlert("กรุณากรอกชื่อครุภัณฑ์");
            finalAsset.AssetID = mId || "ไม่มีเลข";
            finalAsset['ชื่อรายการครุภัณฑ์'] = mName;
        }

        const prio = document.getElementById('sel-priority').value;
        const type = document.getElementById('sel-type').value;
        if(!prio || !type) return showAlert("กรุณาระบุความสำคัญและประเภท");

        selectedItems.push({
            ...finalAsset,
            priority: prio, // Mapping: PiorytyJobe
            assetType: type, // Mapping: Asset_Type
            isPacs: document.getElementById('chk-pacs').checked ? 'YES' : 'NO',
            shifts: Array.from(document.querySelectorAll('.shift-cb:checked')).map(x => x.value).join(','), // Mapping: Shift_Work
            imageBase64: currentBase64,
            deptId: document.getElementById('dept-select').value,
            deptName: departments.find(d => d.DEP_ID == document.getElementById('dept-select').value)?.DEPNAME
        });

        renderSelectedList();
        closeDetailModal();
    }

    function renderSelectedList() {
        const container = document.getElementById('selected-list');
        if(!selectedItems.length) { container.innerHTML = '<div class="py-10 text-center text-gray-300 italic text-sm">ยังไม่มีข้อมูลครุภัณฑ์ที่เลือก</div>'; return; }
        container.innerHTML = selectedItems.map((x, i) => `
            <div class="p-4 bg-white border border-pink-100 rounded-2xl flex justify-between items-center shadow-sm">
                <div class="flex gap-3 items-center">
                    ${x.imageBase64 ? `<img src="${x.imageBase64}" class="w-10 h-10 rounded object-cover">` : `<div class="w-10 h-10 bg-gray-100 flex items-center justify-center text-[8px]">No Img</div>`}
                    <div>
                        <span class="text-[10px] font-bold text-blue-500">${x.AssetID}</span>
                        <p class="text-xs font-bold text-gray-700">${x['ชื่อรายการครุภัณฑ์']}</p>
                    </div>
                </div>
                <button onclick="removeSelected(${i})" class="text-red-400 text-xs">ลบ</button>
            </div>
        `).join('');
    }

    function removeSelected(i) { selectedItems.splice(i, 1); renderSelectedList(); }

    function openFinalModal() {
        if(!document.getElementById('dept-select').value) return showAlert("กรุณาเลือกหน่วยงาน");
        if(!selectedItems.length) return showAlert("กรุณาเลือกครุภัณฑ์");
        document.getElementById('final-modal').classList.remove('hidden');
    }

    async function processSubmit() {
        const name = document.getElementById('inspector-name').value.trim();
        if(!name || signaturePad.isEmpty()) return showAlert("กรุณากรอกชื่อและลงลายเซ็น");

        toggleLoader(true, "กำลังส่งข้อมูล (Mapping: Act_No & NOID)...");
        try {
            // Step 1: สร้าง Action Log (Act_No)
            const logRes = await callAPI('saveActionLog', { actName: 'Survey 2026', itLogin: name });
            const actNo = logRes.actNo;

            // Step 2: วนลูปส่งแต่ละรายการ
            for(let item of selectedItems) {
                // อัปโหลดรูปภาพก่อนเพื่อเอา URL (Mapping: Asset_Image)
                let imageUrl = "";
                if(item.imageBase64) {
                    const imgRes = await callAPI('saveAssetImage', { NOID: item.NOID, imageBase64: item.imageBase64, actNo: actNo });
                    imageUrl = imgRes.url;
                }

                // เตรียม Data ตามโครงสร้างชีท (Mapping: Asset_On_Log / Asset_On_Nonumber_Log)
                const payload = {
                    actNo: actNo,
                    noid: item.NOID,
                    assetId: item.AssetID,
                    assetName: item['ชื่อรายการครุภัณฑ์'],
                    deptId: item.deptId,
                    deptName: item.deptName,
                    priority: item.priority, // PIO-XXX
                    assetType: item.assetType,
                    shifts: item.shifts,
                    isPacs: item.isPacs,
                    itUserMail: name,
                    imageUrl: imageUrl,
                    isNonumber: item.isNonumber
                };
                await callAPI('submitSurveyRow', payload);
            }

            // Step 3: บันทึกการยืนยัน (Mapping: Asset_Conferm)
            await callAPI('saveConfirmation', { actNo: actNo, actName: name, signature: signaturePad.toDataURL() });

            showAlert("ส่งข้อมูลและเชื่อมโยงระบบเรียบร้อยแล้ว");
            selectedItems = []; renderSelectedList();
            document.getElementById('final-modal').classList.add('hidden');
        } catch (e) { showAlert("เกิดข้อผิดพลาดในการส่งข้อมูล"); }
        finally { toggleLoader(false); }
    }

    async function callAPI(action, payload = null) {
        const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action, payload }) });
        return res.json();
    }
    function toggleLoader(s, t) { document.getElementById('loader-text').innerText = t; document.getElementById('loader').style.display = s ? 'flex' : 'none'; }
    function showAlert(m) { document.getElementById('alert-msg').innerText = m; document.getElementById('alert-box').classList.remove('hidden'); }
    function clearSignature() { signaturePad.clear(); }
    function closeFinalModal() { document.getElementById('final-modal').classList.add('hidden'); }
</script>
</body>
</html>
