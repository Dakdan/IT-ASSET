<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บันทึกการสำรวจครุภัณฑ์ - IT UDON HOSP</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        /* ===== GLOBAL & STYLE กลาง ===== */
        body {
            font-family: 'Kanit', sans-serif;
            background: linear-gradient(135deg, #fff, #fce4ec, #f8bbd0);
            min-height: 100vh;
        }

        .loading-overlay {
            position: fixed; inset: 0; background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(6px); display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
        }
        .loading-overlay.show { display: flex; }

        .loading-spinner {
            width: 50px; height: 50px; border: 4px solid rgba(233, 30, 99, 0.15);
            border-top: 4px solid #e91e63; border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.55);
            backdrop-filter: blur(5px); display: none; justify-content: center;
            align-items: center; z-index: 10000; padding: 20px;
        }
        .modal-overlay.show { display: flex; }

        .modal-card {
            background: #fff; width: 100%; max-width: 480px; max-height: 90vh;
            border-radius: 28px; padding: 24px; overflow-y: auto;
            box-shadow: 0 25px 50px rgba(0,0,0,0.25);
        }

        .btn-pink {
            background: linear-gradient(135deg, #d81b60, #f06292);
            color: #fff; border-radius: 16px; transition: all 0.2s ease;
            box-shadow: 0 6px 15px rgba(216,27,96,0.25);
        }
        .btn-pink:active { transform: scale(0.95); }

        .card {
            background: rgba(255,255,255,0.95); border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); backdrop-filter: blur(8px);
        }

        .pink-gradient-header {
            background: linear-gradient(135deg, #ad1457 0%, #f06292 100%);
            border-bottom-left-radius: 40px; border-bottom-right-radius: 40px;
        }

        canvas {
            border: 2px dashed #f8bbd0; background: #fff5f8;
            border-radius: 16px; width: 100%; height: 200px;
        }

        body::after {
            content: "IT UDON HOSP"; position: fixed; bottom: 20px; right: 20px;
            font-size: 40px; color: rgba(233,30,99,0.05); pointer-events: none; font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <span class="mt-4 font-bold text-pink-600">กำลังประมวลผล...</span>
    </div>

    <header class="pink-gradient-header p-8 text-white text-center shadow-lg">
        <h1 class="text-2xl font-bold">ระบบสำรวจครุภัณฑ์</h1>
        <p class="opacity-90" id="displayDeptName">กำลังโหลดข้อมูลหน่วยงาน...</p>
    </header>

    <main class="container mx-auto max-w-2xl p-4 -mt-6">
        <div class="card p-6 mb-4">
            <div class="flex justify-between items-center">
                <h2 class="font-semibold text-pink-800">หน่วยงานรับตรวจ</h2>
                <span id="displayDeptId" class="bg-pink-100 text-pink-600 px-3 py-1 rounded-full text-xs font-bold"></span>
            </div>
            <p id="displayBuilding" class="text-sm text-gray-500 mt-1"></p>
        </div>

        <div class="card p-6 mb-4">
            <h2 class="font-semibold text-pink-800 mb-3">ตรวจสอบครุภัณฑ์</h2>
            <div class="flex gap-2">
                <input type="text" id="assetSearchInput" placeholder="พิมพ์เลขครุภัณฑ์..." 
                    class="flex-1 border-2 border-pink-50 rounded-xl px-4 py-2 focus:outline-none focus:border-pink-300">
                <button onclick="startScanner()" class="bg-pink-100 text-pink-600 p-2 rounded-xl">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v-4m6 0h-2m4 0h-2m-4 11H8m0-4H6m4 0h2m0 4h2" />
                    </svg>
                </button>
                <button onclick="handleSearch()" class="btn-pink px-4 py-2 font-medium">ค้นหา</button>
            </div>

            <div id="assetList" class="mt-4 space-y-2"></div>
        </div>

        <button onclick="openSignatureModal()" class="btn-pink w-full py-4 text-lg font-bold shadow-xl">
            ยืนยันและลงชื่อรับรอง
        </button>
    </main>

    <div id="scannerOverlay" class="modal-overlay">
        <div class="modal-card">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold text-pink-800">สแกนรหัสครุภัณฑ์</h3>
                <button onclick="stopScanner()" class="text-gray-400">ปิด</button>
            </div>
            <div id="reader" class="rounded-xl overflow-hidden"></div>
        </div>
    </div>

    <div id="modalAssetDetail" class="modal-overlay">
        <div class="modal-card">
            <div class="text-center">
                <div class="w-full h-48 bg-pink-50 rounded-2xl mb-4 overflow-hidden flex items-center justify-center">
                    <img id="detailImage" class="hidden object-cover w-full h-full">
                    <div id="imagePlaceholder" class="text-pink-200">
                        <svg class="h-16 w-16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" stroke-width="2"/></svg>
                    </div>
                </div>
                <h3 id="detailAssetID" class="text-2xl font-bold text-pink-600"></h3>
                <p id="detailCategory" class="text-pink-400 mb-4"></p>
                <div class="bg-gray-50 p-4 rounded-xl text-left text-sm mb-6">
                    <p class="flex justify-between border-b py-1"><span>ซีเรียล:</span> <span id="detailSerial" class="font-bold">-</span></p>
                </div>
                <div class="flex gap-2">
                    <button onclick="closeAssetDetail()" class="flex-1 py-3 bg-gray-100 rounded-xl">ยกเลิก</button>
                    <button id="btnConfirmAdd" class="flex-[2] btn-pink py-3 font-bold">เพิ่มเข้าหน่วยงาน</button>
                </div>
            </div>
        </div>
    </div>

    <div id="modalSignature" class="modal-overlay">
        <div class="modal-card">
            <h3 class="text-xl font-bold text-pink-800 mb-4">ลงชื่อผู้รับรอง</h3>
            <input type="text" id="signerName" class="w-full border-2 border-pink-50 rounded-xl px-4 py-3 mb-4 focus:outline-none focus:border-pink-300" placeholder="ระบุชื่อ-นามสกุล">
            <canvas id="sigPad"></canvas>
            <div class="flex gap-2 mt-6">
                <button onclick="closeModal('modalSignature')" class="flex-1 py-3 bg-gray-50 rounded-xl">ปิด</button>
                <button onclick="sigPad.clear()" class="flex-1 py-3 bg-pink-50 text-pink-600 rounded-xl">ล้าง</button>
                <button onclick="finalSubmit()" class="flex-[2] btn-pink py-3 font-bold">ยืนยันบันทึก</button>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        let sigPad;
        let scannerRef = null;
        let selectedAssets = [];
        let currentDeptId = new URLSearchParams(window.location.search).get('deptId') || "D001";

        window.onload = async () => {
            sigPad = new SignaturePad(document.getElementById('sigPad'));
            
            // โหลดข้อมูลหน่วยงาน
            const dept = await getDeptInfo(currentDeptId);
            if (dept) {
                document.getElementById('displayDeptName').innerText = dept.deptName;
                document.getElementById('displayDeptId').innerText = dept.deptId;
                document.getElementById('displayBuilding').innerText = `ตึก: ${dept.building || '-'}`;
            }
        };

        // --- ระบบสแกนเนอร์ ---
        const startScanner = () => {
            document.getElementById('scannerOverlay').classList.add('show');
            setTimeout(async () => {
                try {
                    scannerRef = new Html5Qrcode("reader");
                    await scannerRef.start(
                        { facingMode: "environment" },
                        { fps: 15, qrbox: 250 },
                        (text) => {
                            let id = text.includes('IcmAssetDetail/') ? text.split('IcmAssetDetail/')[1].split('/')[0] : text.trim();
                            stopScanner();
                            handleSearch(id);
                        }
                    );
                } catch (e) { stopScanner(); }
            }, 300);
        };

        const stopScanner = async () => {
            if (scannerRef) { await scannerRef.stop(); scannerRef = null; }
            document.getElementById('scannerOverlay').classList.remove('show');
        };

        // --- ค้นหาและแสดงรายละเอียด ---
        async function handleSearch(manualId) {
            const query = manualId || document.getElementById('assetSearchInput').value;
            if (!query) return;

            const res = await searchAssets(query);
            if (res && res.length > 0) {
                showAssetDetail(res[0]);
            } else {
                Swal.fire("ไม่พบข้อมูล", "รหัสครุภัณฑ์ไม่ถูกต้อง", "warning");
            }
        }

        function showAssetDetail(item) {
            document.getElementById('detailAssetID').innerText = item.AssetID;
            document.getElementById('detailCategory').innerText = item.Category || "ทั่วไป";
            document.getElementById('detailSerial').innerText = item.Serial || "-";
            
            const btn = document.getElementById('btnConfirmAdd');
            btn.innerText = `เพิ่มเข้า ${document.getElementById('displayDeptName').innerText}`;
            btn.onclick = () => {
                if (!selectedAssets.find(a => a.AssetID === item.AssetID)) {
                    selectedAssets.push(item);
                    renderList();
                }
                closeAssetDetail();
                document.getElementById('assetSearchInput').value = "";
            };
            document.getElementById('modalAssetDetail').classList.add('show');
        }

        function closeAssetDetail() { document.getElementById('modalAssetDetail').classList.remove('show'); }

        function renderList() {
            document.getElementById('assetList').innerHTML = selectedAssets.map((a, i) => `
                <div class="flex justify-between items-center p-3 bg-white border border-pink-100 rounded-xl shadow-sm">
                    <div><b class="text-pink-600">${a.AssetID}</b><br><small class="text-gray-400">${a.Category || ''}</small></div>
                    <button onclick="selectedAssets.splice(${i},1);renderList();" class="text-red-300">ลบ</button>
                </div>
            `).join('');
        }

        // --- บันทึกผล ---
        function openSignatureModal() {
            if (selectedAssets.length === 0) return Swal.fire("แจ้งเตือน", "กรุณาเพิ่มครุภัณฑ์", "info");
            document.getElementById('modalSignature').classList.add('show');
        }

        function closeModal(id) { document.getElementById(id).classList.remove('show'); }

        async function finalSubmit() {
            const name = document.getElementById('signerName').value;
            if (!name || sigPad.isEmpty()) return Swal.fire("ไม่ครบถ้วน", "กรุณากรอกชื่อและเซ็นชื่อ", "error");

            // 1. บันทึกข้อมูล
            const survey = await saveAssetSurvey({
                deptId: currentDeptId,
                deptName: document.getElementById('displayDeptName').innerText,
                assets: selectedAssets
            });

            // 2. อัปโหลดรูป
            const sig = await uploadSignatureImage(survey.activityId, sigPad.toDataURL());

            // 3. ยืนยัน
            const ok = await confirmSurveyResult(survey.activityId, name, sig.url);
            if (ok) {
                Swal.fire("บันทึกสำเร็จ", "", "success").then(() => {
                    location.href = `asset_survey_detail.html?id=${survey.activityId}`;
                });
            }
        }
    </script>
</body>
</html>
