<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบตรวจสอบครุภัณฑ์คอมพิวเตอร์ - IT UDON HOSP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background: linear-gradient(135deg, #fff5f7 0%, #ffffff 100%);
            min-height: 100vh;
        }
        .card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(255, 133, 161, 0.1);
            border: 1px solid rgba(255, 182, 193, 0.3);
        }
        .btn-pink {
            background: #ff85a1;
            color: white;
            transition: all 0.3s;
        }
        .btn-pink:hover {
            background: #ff6384;
            transform: translateY(-2px);
        }
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .modal-bg {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
        }
        .img-preview {
            width: 100%;
            max-height: 200px;
            object-fit: contain;
            border-radius: 12px;
            border: 1px solid #eee;
        }
        /* Scanner Container Style */
        .scanner-wrapper {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 1.5rem;
            overflow: hidden;
            border: 4px solid #ff85a1;
            margin-bottom: 1rem;
        }
        #reader {
            width: 100% !important;
            border: none !important;
        }
        #reader video {
            object-fit: cover !important;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="loading" class="loading-overlay">
        <div class="text-center">
            <div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-pink-500 border-t-transparent"></div>
            <p class="mt-2 text-pink-600">กำลังดำเนินการ...</p>
        </div>
    </div>

    <header class="max-w-4xl mx-auto mb-8 p-6 bg-white/80 rounded-[24px] border-2 border-pink-200 shadow-sm relative flex items-center gap-4">
        <img src="https://img2.pic.in.th/-227e4f6f84f29f020.png" alt="Logo" class="h-12 object-contain">
        <div>
            <h1 class="text-xl md:text-2xl font-bold text-gray-800 leading-tight">It Asset Survey</h1>
            <h2 class="text-pink-600 font-medium text-sm md:text-base">ตรวจสอบครุภัณฑ์คอมพิวเตอร์ 2569</h2>
        </div>
    </header>

    <main class="max-w-4xl mx-auto space-y-6">
        
        <section id="scanner-section" class="hidden max-w-lg mx-auto">
            <div class="scanner-wrapper shadow-2xl">
                <div id="reader"></div>
                <div class="bg-pink-600 text-white text-center py-2 text-sm font-light flex justify-between px-4 items-center">
                    <span>กำลังสแกน...</span>
                    <button onclick="stopScanner()" class="bg-white/20 px-3 py-1 rounded-lg">✕ ปิดกล้อง</button>
                </div>
            </div>
        </section>

        <section id="step-dept" class="card p-6">
            <h2 class="text-lg font-semibold text-gray-700 mb-4 flex items-center">🏢 เลือกหน่วยงาน</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <select id="select-building" class="w-full p-3 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-pink-300">
                    <option value="">-- เลือกตึก --</option>
                </select>
                <select id="select-floor" class="w-full p-3 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-pink-300" disabled>
                    <option value="">-- เลือกชั้น --</option>
                </select>
            </div>
            <div id="dept-list" class="mt-6 grid grid-cols-1 sm:grid-cols-2 gap-3"></div>
        </section>

        <section id="step-survey" class="hidden space-y-6">
            <div class="card p-6 border-l-8 border-pink-400">
                <div class="flex flex-col md:flex-row gap-4">
                    <div class="relative flex-1">
                        <input type="text" id="asset-search-input" placeholder="พิมพ์รหัสครุภัณฑ์..." 
                               class="w-full p-4 pl-12 rounded-2xl border-none bg-gray-100 focus:ring-2 focus:ring-pink-300">
                        <span class="absolute left-4 top-4 opacity-40 text-xl">🔍</span>
                    </div>
                    <button onclick="toggleScanner('search')" class="p-4 bg-pink-100 text-pink-600 rounded-2xl hover:bg-pink-200 flex items-center justify-center gap-2 shadow-sm font-bold">
                        <span id="scan-icon">📸</span> สแกน QR
                    </button>
                </div>
                <button onclick="openNonNumberForm()" class="mt-4 w-full py-2 border-2 border-dashed border-gray-300 rounded-xl text-gray-400 text-sm hover:text-pink-500 hover:border-pink-300 transition-all">
                    ➕ ไม่พบรหัส? เพิ่มครุภัณฑ์นอกทะเบียน
                </button>
            </div>

            <div class="card p-6 overflow-hidden">
                <h3 class="font-semibold text-gray-700 mb-4">รายการที่พบในหน่วยงานนี้</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="text-xs text-gray-400 uppercase border-b">
                            <tr>
                                <th class="pb-2">รายการ</th>
                                <th class="pb-2 text-center">รูป</th>
                                <th class="pb-2 text-right">จัดการ</th>
                            </tr>
                        </thead>
                        <tbody id="survey-list" class="divide-y"></tbody>
                    </table>
                    <div id="empty-list-msg" class="py-10 text-center text-gray-400 text-sm italic">
                        ยังไม่มีรายการสำรวจ...
                    </div>
                </div>
            </div>

            <button onclick="openConfirmModal()" class="w-full btn-pink py-4 rounded-2xl font-bold shadow-lg text-lg">
                บันทึกและลงชื่อตรวจสอบ
            </button>
        </section>

    </main>

    <div id="modal-asset-detail" class="fixed inset-0 modal-bg hidden z-[60] flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-md shadow-2xl overflow-hidden flex flex-col max-h-[95vh]">
            <div class="p-5 bg-pink-50 border-b flex justify-between items-center">
                <h3 class="font-bold text-pink-700">รายละเอียดครุภัณฑ์</h3>
                <button onclick="closeModal('modal-asset-detail')" class="text-gray-400 p-2">✕</button>
            </div>
            <div class="p-6 space-y-4 overflow-y-auto">
                <div id="non-number-fields" class="hidden space-y-3 p-4 bg-gray-50 rounded-xl border-2 border-dashed">
                    <input type="text" id="field-asset-id-input" class="w-full p-3 rounded-lg border focus:ring-pink-300" placeholder="ระบุรหัสครุภัณฑ์">
                    <div class="flex gap-2">
                        <input type="text" id="field-serial-input" class="flex-1 p-3 rounded-lg border focus:ring-pink-300" placeholder="Serial Number">
                        <button onclick="toggleScanner('serial')" class="px-4 bg-gray-800 text-white rounded-lg">📸</button>
                    </div>
                    <input type="text" id="field-brand-input" class="w-full p-3 rounded-lg border focus:ring-pink-300" placeholder="ยี่ห้อ (Brand)">
                </div>

                <div id="regular-asset-header" class="p-4 bg-gray-50 rounded-xl">
                    <div class="text-xs text-gray-400">รหัสครุภัณฑ์</div>
                    <div id="detail-asset-id" class="font-mono font-bold text-lg text-gray-800">-</div>
                </div>

                <div>
                    <label class="block text-sm font-medium mb-1">ประเภทอุปกรณ์</label>
                    <select id="field-asset-type" class="w-full p-3 rounded-xl border border-gray-200">
                        <option value="">-- เลือกประเภท --</option>
                    </select>
                </div>

                <div class="flex items-center gap-3 p-4 bg-blue-50 rounded-xl">
                    <input type="checkbox" id="field-is-pace" class="w-6 h-6 accent-pink-500">
                    <label for="field-is-pace" class="text-sm font-medium text-blue-800">เครื่องนี้ใช้ในระบบ PACE</label>
                </div>

                <button onclick="confirmAddAsset()" class="w-full btn-pink py-4 rounded-2xl font-bold">เพิ่มลงในรายการ</button>
            </div>
        </div>
    </div>
    
    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwPlr01yTm5H18kf1iqAO1PjBbX4a45JAcf8jr0vA2wSl54_XihNaX9nXhlgFRgCof0/exec";
        
        let allDepts = [];
        let assetTypes = [];
        let selectedDept = null;
        let surveyAssets = [];
        let currentEditingAsset = null;
        let isNonNumberMode = false;
        let userGps = "";
        let html5QrCode = null;
        let isScannerOpen = false;
        let currentScanTarget = 'search';
        let selectedAssetImageData = null;
        let isScanningLocked = false;
       window.onload = async () => {
            showLoading(true);
            try {
                const respDept = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'getDepartments' }) });
                allDepts = await respDept.json();
                const respType = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'getAssetTypes' }) });
                assetTypes = await respType.json();
                populateBuildingSelect();
                populateAssetTypeSelect();
                // initSignature(); // ❌ เอาออกจากการโหลดครั้งแรก เพื่อป้องกัน Error getContext of null
                getGeoLocation();
            } catch (e) {
                Swal.fire('Error', 'ไม่สามารถเชื่อมต่อระบบได้: ' + e.message, 'error');
            }
            showLoading(false);
        };

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'flex' : 'none';
        }

        function getGeoLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    pos => {
                        userGps = `${pos.coords.latitude}, ${pos.coords.longitude}`;
                        console.log("GPS Locked: " + userGps);
                    }, 
                    err => {
                        let msg = "";
                        switch(err.code) {
                            case err.PERMISSION_DENIED: msg = "กรุณาอนุญาตสิทธิ์เข้าถึง GPS เพื่อบันทึกพิกัดการตรวจสอบ"; break;
                            case err.POSITION_UNAVAILABLE: msg = "ไม่สามารถระบุตำแหน่งพิกัดได้ในขณะนี้"; break;
                            case err.TIMEOUT: msg = "การดึงพิกัดใช้เวลานานเกินไป"; break;
                            default: msg = "เกิดข้อผิดพลาดในการดึงพิกัด GPS"; break;
                        }
                        Swal.fire({
                            title: 'คำแนะนำเรื่อง GPS',
                            text: msg,
                            icon: 'info',
                            toast: true,
                            position: 'top-end',
                            showConfirmButton: false,
                            timer: 4000
                        });
                    },
                    { enableHighAccuracy: true, timeout: 10000 } // เพิ่มความแม่นยำและกำหนดเวลา
                );
            } else {
                Swal.fire('Error', 'เบราว์เซอร์ของคุณไม่รองรับการดึงพิกัด GPS', 'error');
            }
        }

        function populateBuildingSelect() {
            const selectB = document.getElementById('select-building');
            const buildings = [...new Set(allDepts.map(d => d.LOCATION_NAME || d.LOCATION))].filter(Boolean).sort();
            buildings.forEach(b => selectB.add(new Option(b, b)));
            selectB.onchange = (e) => updateFloors(e.target.value);
        }

        function populateAssetTypeSelect() {
            const selectT = document.getElementById('field-asset-type');
            assetTypes.forEach(t => selectT.add(new Option(t, t)));
        }

        function updateFloors(building) {
            const selectF = document.getElementById('select-floor');
            selectF.innerHTML = '<option value="">-- กรุณาเลือกชั้น --</option>';
            if (!building) { selectF.disabled = true; return; }
            const floors = [...new Set(allDepts.filter(d => (d.LOCATION_NAME || d.LOCATION) === building).map(d => d.FL || d.FLOOR))].filter(Boolean).sort((a,b)=>a-b);
            floors.forEach(f => selectF.add(new Option(`ชั้น ${f}`, f)));
            selectF.disabled = false;
            selectF.onchange = (e) => renderDeptButtons(building, e.target.value);
        }

        function renderDeptButtons(building, floor) {
            const container = document.getElementById('dept-list');
            container.innerHTML = '';
            const depts = allDepts.filter(d => (d.LOCATION_NAME || d.LOCATION) === building && String(d.FL || d.FLOOR) === String(floor));
            depts.forEach(d => {
                const btn = document.createElement('button');
                btn.className = "p-4 text-left border border-pink-100 rounded-2xl hover:bg-pink-50 transition card flex items-center gap-3";
                const imgHtml = d.photoUrl ? `<img src="${d.photoUrl}" class="w-12 h-12 rounded-full object-cover">` : `<div class="w-12 h-12 bg-pink-50 rounded-full flex items-center justify-center text-xl">🏢</div>`;
                btn.innerHTML = `${imgHtml} <div><div class="font-bold text-gray-800">${d.DEPNAME || d.DEPT_NAME}</div><div class="text-xs text-gray-400">ID: ${d.DEP_ID || d.DEPT_ID}</div></div>`;
                btn.onclick = () => { selectedDept = d; goToSurvey(); };
                container.appendChild(btn);
            });
        }

        function goToSurvey() {
            document.getElementById('display-dept-name').textContent = selectedDept.DEPNAME || selectedDept.DEPT_NAME;
            document.getElementById('display-dept-info').textContent = `ตึก: ${selectedDept.LOCATION_NAME || selectedDept.LOCATION} | ชั้น: ${selectedDept.FL || selectedDept.FLOOR} | ID: ${selectedDept.DEP_ID || selectedDept.DEPT_ID}`;
            document.getElementById('step-dept').classList.add('hidden');
            document.getElementById('step-survey').classList.remove('hidden');
        }

        function openSearchModal() {
            document.getElementById('modal-search').classList.remove('hidden');
            document.getElementById('asset-search-input').focus();
        }

    async function toggleScanner(target = 'search') {
            currentScanTarget = target; // เก็บไว้ว่ารอบนี้สแกนให้ 'search' หรือ 'serial'
            const section = document.getElementById('scanner-section');
            
            if (isScannerOpen) { 
                await stopScanner(); 
                return; 
            }
        
            section.classList.remove('hidden');
            isScannerOpen = true;
            isScanningLocked = false; 
        
            html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 20, qrbox: { width: 250, height: 250 }, aspectRatio: 1.0 };
        
            html5QrCode.start({ facingMode: "environment" }, config, 
                async (decodedText) => {
                    if (isScanningLocked) return;
                    isScanningLocked = true;
                    await stopScanner();
        
                    let finalId = decodedText.trim().replace(/\s/g, '').toUpperCase();
                    // ... (ใส่ Logic ตัดคำ URL ของคุณตรงนี้) ...
        
                    // ✅ เช็คเป้าหมายก่อนส่งค่ากลับ
                    if (currentScanTarget === 'search') {
                        const input = document.getElementById('asset-search-input');
                        input.value = finalId;
                        // สั่งให้ช่องค้นหาทำงานทันที (Debounce จะทำงานต่อเอง)
                        input.dispatchEvent(new Event('input', { bubbles: true })); 
                    } else if (currentScanTarget === 'serial') {
                        // ส่งค่าเข้าช่อง Serial ใน Modal
                        document.getElementById('field-serial-input').value = finalId;
                    }
                }
            ).catch(() => stopScanner());
        }
     
            async function stopScanner() {
                if (html5QrCode) { 
                    await html5QrCode.stop().catch(() => {}); 
                    html5QrCode = null; 
                }
            
                document.getElementById('scanner-section').classList.add('hidden');
                document.getElementById('scan-icon').textContent = "📸";
                isScannerOpen = false;
            
                // ✅ reset lock
                isScanningLocked = false;
            }
        document.getElementById('asset-search-input').oninput = debounce(async (e) => {
            const q = e.target.value.trim();
            const container = document.getElementById('search-results-container');
            if (q.length < 1) { container.innerHTML = ''; return; }
            container.innerHTML = '<div class="p-10 text-center"><div class="animate-spin inline-block w-6 h-6 border-2 border-pink-400 border-t-transparent rounded-full"></div></div>';
    
            try {
                const resp = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'searchAssets', query: q }) });
                const results = await resp.json();
                renderSearchResults(results, q);
            } catch (err) { container.innerHTML = ''; }
        }, 400);

        // แก้ไขฟังก์ชันไฮไลท์คำที่ค้นเจอ
        function renderSearchResults(results, query) {
            const container = document.getElementById('search-results-container');
            container.innerHTML = '';
            if (!results || results.length === 0) return;

            // ฟังก์ชันช่วยเหลือสำหรับสร้างข้อความที่มีไฮไลท์
            const getHighlightedText = (text, q) => {
                if (!text) return '-';
                if (!q) return text;
            
                const lower = text.toLowerCase();
                const query = q.toLowerCase();
            
                if (lower.endsWith(query)) {
                    const start = text.length - q.length;
                    return text.substring(0, start) +
                           '<span class="highlight">' +
                           text.substring(start) +
                           '</span>';
                }
            
                return text;
            };

            results.forEach(a => {
                const div = document.createElement('div');
                div.className = "p-4 border-b hover:bg-pink-50 cursor-pointer flex justify-between items-center";
                
                const highlightedId = getHighlightedText(a.AssetID, query);
                const highlightedName = getHighlightedText(a['ชื่อรายการครุภัณฑ์'], query);

                div.innerHTML = `
                    <div>
                        <div class="font-mono font-bold">${highlightedId}</div>
                        <div class="text-xs text-gray-500">${highlightedName}</div>
                    </div>
                    <div class="text-pink-400 text-xl">⊕</div>
                `;
                div.onclick = () => openAssetDetailForm(a);
                container.appendChild(div);
            });
        }

        function openNonNumberForm() {
            isNonNumberMode = true;
            openAssetDetailForm({ AssetID: "นอกทะเบียน", 'ชื่อรายการครุภัณฑ์': "", IMAGE_NAME: "New Upload" });
        }

        function openAssetDetailForm(asset) {
            if (asset.AssetID !== "นอกทะเบียน") {
                isNonNumberMode = false;
            }
            currentEditingAsset = asset;
            
            // 1. จัดการแสดงผลโหมด นอกทะเบียน/ในทะเบียน
            document.getElementById('non-number-fields').classList.toggle('hidden', !isNonNumberMode);
            document.getElementById('regular-asset-header').classList.toggle('hidden', isNonNumberMode);
            document.getElementById('detail-modal-title').textContent = isNonNumberMode ? "เพิ่มครุภัณฑ์นอกทะเบียน" : "รายละเอียดครุภัณฑ์";
            
            // 2. เคลียร์ค่า Input ทุกครั้งที่เปิด (สำคัญมาก!)
            document.getElementById('field-asset-id-input').value = ""; // ล้าง ID นอกทะเบียน
            document.getElementById('field-serial-input').value = "";   // ล้าง Serial
            document.getElementById('field-priority').value = "";       // ล้างลำดับความสำคัญ
            document.getElementById('field-is-pace').checked = false;   // ล้างติ๊ก Pace
            document.querySelectorAll('input[name="shift-work"]').forEach(cb => cb.checked = false);
            // เพิ่มบรรทัดเหล่านี้ในฟังก์ชัน openAssetDetailForm ที่เราคุยกันก่อนหน้า
            document.getElementById('field-brand-input').value = "";
            document.getElementById('field-detail-input').value = "";
            document.getElementById('field-date-in').value = "";// ล้างกะ
            
            // 3. แสดงข้อมูลพื้นฐาน
            if (!isNonNumberMode) {
                document.getElementById('detail-asset-id').textContent = asset.AssetID || '-';
                document.getElementById('name-container-readonly').textContent = asset['ชื่อรายการครุภัณฑ์'] || '-';
                
                
                // ถ้าในฐานข้อมูลมีหมวดหมู่อยู่แล้ว ให้เลือกให้อัตโนมัติ
                const typeSelect = document.getElementById('field-asset-type');
                const existingType = asset['หมวดครุภัณฑ์'];
                typeSelect.value = (existingType && assetTypes.includes(existingType)) ? existingType : "";
            } else {
                // ถ้าเป็นนอกทะเบียน ให้ล้างตัวเลือกหมวดหมู่เป็นค่าว่าง
                document.getElementById('field-asset-type').value = "";
            }
        
            // 4. ล้างรูปภาพที่เคยเลือกค้างไว้
            removeSelectedImage();
            
            // 5. แสดง Modal
            document.getElementById('modal-asset-detail').classList.remove('hidden');
        }
        function handleImageSelect(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    selectedAssetImageData = e.target.result;
                    document.getElementById('asset-image-preview').src = selectedAssetImageData;
                    document.getElementById('image-preview-container').classList.remove('hidden');
                    document.getElementById('image-placeholder-area').classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        }

        function removeSelectedImage() {
            selectedAssetImageData = null;
            document.getElementById('asset-image-input').value = '';
            document.getElementById('image-preview-container').classList.add('hidden');
            document.getElementById('image-placeholder-area').classList.remove('hidden');
        }

        function confirmAddAsset() {
                try {
                    // 1. ดึงค่าส่วนกลางที่ต้องมี "ทุกโหมด"
                    const typeEl = document.getElementById('field-asset-type');
                    const priorityEl = document.getElementById('field-priority');
                    const type = typeEl ? typeEl.value : "";
                    const priority = priorityEl ? priorityEl.value : "";
                    
                    // ดึงค่ากะ (Checkboxes)
                    const shiftElements = document.querySelectorAll('input[name="shift-work"]:checked');
                    const shifts = Array.from(shiftElements).map(cb => cb.value);
            
                    // 2. ตรวจสอบค่าบังคับ (ถ้าไม่ครบให้หยุด)
                    if (!type || !priority || shifts.length === 0) {
                        return Swal.fire('ข้อมูลไม่ครบ', 'กรุณาเลือกประเภท, ความสำคัญ และกะการทำงาน', 'warning');
                    }
            
                    // 3. เตรียมโครงสร้าง Object (ใช้ข้อมูลเดิมที่มีอยู่)
                    let item = { 
                        ...currentEditingAsset, 
                        surveyType: type, 
                        surveyPriority: priority, 
                        surveyShift: shifts.join(','), 
                        isPace: document.getElementById('field-is-pace')?.checked || false, 
                        newImageData: selectedAssetImageData || null, 
                        isNonNumber: isNonNumberMode 
                    };
            
                    // 4. แยก Logic ตามโหมด (จุดที่ทำให้ก็นิ่งจะอยู่ตรงนี้)
                    if (isNonNumberMode === true) {
                        // โหมดนอกทะเบียน: ดึงจาก Input fields
                        item.AssetID = document.getElementById('field-asset-id-input')?.value || "นอกทะเบียน";
                        item['ชื่อรายการครุภัณฑ์'] = type; 
                        item.serial = document.getElementById('field-serial-input')?.value || "";
                        item.brand = document.getElementById('field-brand-input')?.value || "";
                        item.detail = document.getElementById('field-detail-input')?.value || "";
                        item.dateIn = document.getElementById('field-date-in')?.value || "";
                    } else {
                        // โหมดปกติ (มีข้อมูลอยู่แล้ว): 
                        // ไม่ต้องไปดึงค่าจาก field-asset-id-input เพราะมันไม่มีในหน้าจอโหมดนี้
                        // ค่า AssetID และชื่อ จะถูกดึงมาจาก currentEditingAsset ตั้งแต่ตอนเปิด Modal แล้ว
                        console.log("Adding existing asset:", item.AssetID);
                    }
            
                    // 5. บันทึกลงรายการและอัปเดตหน้าจอ
                    surveyAssets.push(item);
                    renderSurveyList();
                    
                    // 6. ปิดหน้าต่าง (ลำดับสำคัญ)
                    closeModal('modal-asset-detail');
                    
                    const searchModal = document.getElementById('modal-search');
                    if (searchModal) searchModal.classList.add('hidden');
            
                    // แจ้งเตือนเล็กน้อย
                    Swal.fire({ icon: 'success', title: 'เพิ่มรายการแล้ว', toast: true, position: 'top-end', showConfirmButton: false, timer: 1500 });
            
                } catch (err) {
                    console.error("Critical Error in confirmAddAsset:", err);
                    // ถ้า Error ให้แจ้งชื่อตัวแปรที่มีปัญหาออกมาเลย
                    Swal.fire('เกิดข้อผิดพลาด', 'ไม่สามารถเพิ่มได้: ' + err.message, 'error');
                }
            }
        function renderSurveyList() {
            const tbody = document.getElementById('survey-list');
            const emptyMsg = document.getElementById('empty-list-msg');
            
            if (!tbody) return;
            
            tbody.innerHTML = ''; // ล้างตารางเดิมก่อนวาดใหม่
            
            if (surveyAssets.length === 0) {
                if (emptyMsg) emptyMsg.classList.remove('hidden');
            } else {
                if (emptyMsg) emptyMsg.classList.add('hidden');
                
                surveyAssets.forEach((item, index) => {
                    const tr = document.createElement('tr');
                    tr.className = "border-b border-pink-50"; // ตกแต่งตามธีมชมพู
                    tr.innerHTML = `
                        <td class="py-3 px-2">
                            <div class="font-bold text-gray-800">${item.AssetID || '-'}</div>
                            <div class="text-xs text-gray-400">${item['ชื่อรายการครุภัณฑ์'] || ''}</div>
                        </td>
                        <td class="text-center">
                            ${item.newImageData ? '📸' : '🖼️'}
                        </td>
                        <td class="py-3 px-2 text-xs">
                            <div class="text-pink-600 font-semibold">${item.surveyType}</div>
                            <div class="text-gray-400">${item.surveyPriority}</div>
                        </td>
                        <td class="text-right">
                            <button onclick="removeAsset(${index})" class="text-red-400 p-2">✕</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            }
        }
        function removeAsset(i) { surveyAssets.splice(i, 1); renderSurveyList(); }

        function initSignature() {
            const canvas = document.getElementById('signature-pad');
            const ctx = canvas.getContext('2d');
            let isDrawing = false;

            const resize = () => {
                const ratio = Math.max(window.devicePixelRatio || 1, 1);
                canvas.width = canvas.offsetWidth * ratio;
                canvas.height = canvas.offsetHeight * ratio;
                ctx.scale(ratio, ratio);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            };
            window.addEventListener('resize', resize);
            resize();

            const getCoords = (e) => {
                const rect = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return { x: clientX - rect.left, y: clientY - rect.top };
            };

            const start = (e) => {
                isDrawing = true;
                const { x, y } = getCoords(e);
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.lineWidth = 2;
                ctx.lineCap = 'round';
                ctx.strokeStyle = '#000';
            };

            const move = (e) => {
                if (!isDrawing) return;
                const { x, y } = getCoords(e);
                ctx.lineTo(x, y);
                ctx.stroke();
            };

            const stop = () => { isDrawing = false; ctx.closePath(); };

            canvas.addEventListener('mousedown', start);
            canvas.addEventListener('mousemove', move);
            window.addEventListener('mouseup', stop);

            canvas.addEventListener('touchstart', (e) => { e.preventDefault(); start(e); }, { passive: false });
            canvas.addEventListener('touchmove', (e) => { e.preventDefault(); move(e); }, { passive: false });
            canvas.addEventListener('touchend', stop);
        }

        function clearSignature() {
            const canvas = document.getElementById('signature-pad');
            canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
        }

        function openConfirmModal() {
            if (surveyAssets.length === 0) return Swal.fire('เตือน', 'กรุณาเพิ่มครุภัณฑ์ก่อน', 'info');
            
            // แสดง Modal ยืนยัน
            const modal = document.getElementById('modal-confirm');
            modal.classList.remove('hidden');
            
            // ✅ เรียกใช้การตั้งค่าลายเซ็นตอนเปิดหน้าต่างนี้ และใช้ setTimeout เพื่อให้ DOM พร้อม 100%
            setTimeout(() => {
                initSignature();
            }, 100);
        }

      async function submitFinalSurvey(isDraft = false) {
            const name = document.getElementById('signer-name').value.trim();
            if (!isDraft && !name) return Swal.fire('ข้อมูลไม่ครบ', 'กรุณาระบุชื่อผู้รับรอง', 'warning');
            
            showLoading(true);
            const signature = isDraft ? null : document.getElementById('signature-pad').toDataURL();
        
            // --- คง Logic การส่งค่าและชื่อคอลัมน์เดิมไว้ทั้งหมด ---
            const payload = {
                action: 'saveSurvey',
                data: {
                    deptId: selectedDept.DEP_ID || selectedDept.DEPT_ID,
                    deptName: selectedDept.DEPNAME || selectedDept.DEPT_NAME,
                    jobeSystem: selectedDept.JOBE_SYSTEMP || "", 
                    userEmail: "dakdan224@gmail.com",      
                    approverName: name || "Draft",
                    signature: signature,
                    isDraft: isDraft,
                    gps: userGps,
                    
                    assetsOnLog: surveyAssets.filter(a => !a.isNonNumber).map(a => ({ 
                        noid: a.noid || a.NOID || a.NO_ID || "",
                        assetId: a.AssetID, 
                        priority: a.surveyPriority, 
                        type: a.surveyType, 
                        shiftWork: a.surveyShift, 
                        isPace: a.isPace, 
                        newPhoto: a.newImageData 
                    })),
        
                    assetsNonLog: surveyAssets.filter(a => a.isNonNumber).map(a => ({
                        assetId: a.AssetID,
                        serial: a.serial || "",
                        brand: a.brand || "",
                        detail: a.detail || "",
                        dateIn: a.dateIn || "",
                        priority: a.surveyPriority,
                        type: a.surveyType,
                        shiftWork: a.surveyShift,
                        isPace: a.isPace,
                        newPhoto: a.newImageData
                    }))
                }
            };
        
            try {
                const resp = await fetch(API_URL, { 
                    method: 'POST', 
                    body: JSON.stringify(payload) 
                });
                const result = await resp.json();
                
                if (result.success) {
                    document.getElementById('modal-confirm').classList.add('hidden');
                    document.getElementById('step-survey').classList.add('hidden');
                    document.getElementById('step-result').classList.remove('hidden');
                    
                    // แสดงเลขที่ใบงาน (actNo) ตามปกติ
                    document.getElementById('res-act-no').textContent = result.actNo;
                    
                    // --- แก้ไขเฉพาะส่วนการ Generate QR Code ---
                    const qrContainer = document.getElementById('qrcode-result');
                    qrContainer.innerHTML = ""; 
                    
                    // ดึง DEP_ID จากตัวแปรที่มีอยู่ (คงชื่อเดิมไว้)
                    const currentDepId = selectedDept.DEP_ID || selectedDept.DEPT_ID;
                    
                    // สร้างลิงก์ไปยัง GitHub ตามที่ระบุ
                    const targetUrl = `https://dakdan.github.io/IT-ASSET/department_asset.html?DEP_ID=${currentDepId}`;
                    
                    new QRCode(qrContainer, { 
                        text: targetUrl, 
                        width: 140, 
                        height: 140,
                        colorDark : "#000000",
                        colorLight : "#ffffff",
                        correctLevel : QRCode.CorrectLevel.M
                    });
        
                } else { 
                    throw new Error(result.error); 
                }
            } catch (e) { 
                Swal.fire('Error', 'เกิดข้อผิดพลาด: ' + e.message, 'error'); 
            } finally {
                showLoading(false);
            }
        }
        function closeModal(id) { 
            document.getElementById(id).classList.add('hidden'); 
            
            // --- เพิ่มส่วนนี้ ---
            if (id === 'modal-asset-detail') {
                isNonNumberMode = false; // รีเซ็ตโหมดทุกครั้งที่ปิดหน้ากรอกข้อมูล
            }
            // ------------------
        
            if (isScannerOpen) stopScanner(); 
        }
        function resetApp() { location.reload(); }
        function debounce(f, t) { let id; return (...a) => { clearTimeout(id); id = setTimeout(() => f(...a), t); }; }
    </script>
   
    <script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs/qrcode.min.js"></script>
