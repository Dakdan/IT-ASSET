<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บันทึกการสำรวจครุภัณฑ์ - IT UDON HOSP</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body { font-family: 'Kanit', sans-serif; background: linear-gradient(135deg, #fff, #fce4ec, #f8bbd0); min-height: 100vh; }
        .loading-overlay { position: fixed; inset: 0; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(6px); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .loading-overlay.show { display: flex; }
        .loading-spinner { width: 50px; height: 50px; border: 4px solid rgba(233, 30, 99, 0.15); border-top: 4px solid #e91e63; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; z-index: 10000; padding: 20px; }
        .modal-overlay.show { display: flex; }
        .modal-card { background: #fff; width: 100%; max-width: 480px; max-height: 90vh; border-radius: 28px; padding: 24px; overflow-y: auto; box-shadow: 0 25px 50px rgba(0,0,0,0.25); }
        .btn-pink { background: linear-gradient(135deg, #d81b60, #f06292); color: #fff; border-radius: 16px; transition: all 0.2s ease; box-shadow: 0 6px 15px rgba(216,27,96,0.25); }
        .card { background: rgba(255,255,255,0.95); border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .pink-gradient-header { background: linear-gradient(135deg, #ad1457 0%, #f06292 100%); border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; }
        
        /* สไตล์สำหรับเลือกกะ */
        .shift-checkbox:checked + span { background-color: #d81b60; color: white; border-color: #d81b60; }
    </style>
</head>
<body>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <span class="mt-4 font-bold text-pink-600">กำลังประมวลผล...</span>
    </div>

    <header class="pink-gradient-header p-8 text-white text-center shadow-lg">
        <h1 class="text-2xl font-bold">ระบบสำรวจครุภัณฑ์</h1>
        <p class="opacity-90" id="displayDeptName">กำลังโหลดข้อมูลหน่วยงาน...</p>
    </header>

    <main class="container mx-auto max-w-2xl p-4 -mt-6">
        <div class="card p-6 mb-4">
            <div class="flex justify-between items-center text-sm">
                <span id="displayDeptId" class="bg-pink-100 text-pink-600 px-3 py-1 rounded-full font-bold"></span>
                <span id="displayBuilding" class="text-gray-500"></span>
            </div>
        </div>

      <div class="card p-6 mb-4">
                <h2 class="font-semibold text-pink-800 mb-3 underline decoration-pink-200">ตรวจสอบครุภัณฑ์</h2>
                <div class="flex gap-2">
                    <input type="text" id="assetSearchInput" 
                           oninput="handleLiveSearch(this.value)" 
                           placeholder="พิมพ์เพื่อค้นหา (จากคอลัมน์ E)..." 
                           class="flex-1 border-2 border-pink-50 rounded-xl px-4 py-2 focus:outline-none focus:border-pink-300 text-sm shadow-sm">
                    
                    <button onclick="startScanner()" class="bg-pink-100 text-pink-600 p-2 rounded-xl hover:bg-pink-200 transition-colors">
                        <i class="fas fa-qrcode text-xl"></i>
                    </button>
                </div>
                <div id="assetSearchResult" class="mt-4 space-y-2"></div>
            </div>

        <div class="mb-4">
            <h3 class="px-2 font-bold text-gray-600 mb-2">รายการที่เลือก (<span id="count">0</span>)</h3>
            <div id="selectedList" class="space-y-2"></div>
        </div>

        <button onclick="submitSurvey()" class="btn-pink w-full py-4 text-lg font-bold shadow-xl mb-10">
            บันทึกข้อมูลและไปหน้าลงนาม
        </button>
    </main>

    <div id="scannerSection" class="hidden fixed inset-0 bg-black z-[10001] flex flex-col">
        <div class="p-4 flex justify-between items-center text-white bg-pink-800">
            <span class="font-bold"><i class="fas fa-camera mr-2"></i>สแกนรหัสครุภัณฑ์</span>
            <button onclick="stopScanner()" class="text-3xl">&times;</button>
        </div>
        <div id="reader" class="w-full flex-grow bg-black"></div>
    </div>

    <div id="modalAssetDetail" class="modal-overlay">
        <div class="modal-card">
            <div class="flex justify-between items-start mb-4">
                <h3 class="text-xl font-bold text-pink-700">รายละเอียดครุภัณฑ์</h3>
                <button onclick="closeModal('modalAssetDetail')" class="text-gray-400 text-2xl">&times;</button>
            </div>
            
            <div class="bg-pink-50 p-4 rounded-2xl mb-4 border border-pink-100">
                <p class="text-xs text-pink-400 font-bold uppercase">Asset ID</p>
                <p id="showAssetID" class="text-xl font-bold text-gray-800"></p>
                <p id="showItemName" class="text-sm text-gray-600 mt-1"></p>
            </div>

            <div class="grid grid-cols-2 gap-2 text-[11px] mb-6">
                <div class="p-2 bg-gray-50 rounded-lg">
                    <span class="text-gray-400 block">วันที่รับเข้า:</span>
                    <span id="showReceiveDate" class="font-medium text-gray-700"></span>
                </div>
                <div class="p-2 bg-gray-50 rounded-lg">
                    <span class="text-gray-400 block">อายุการใช้งาน:</span>
                    <span id="showAge" class="font-medium text-gray-700"></span>
                </div>
                <div class="col-span-2 p-2 bg-gray-50 rounded-lg">
                    <span class="text-gray-400 block">สเปค/รายละเอียด:</span>
                    <span id="showSpec" class="font-medium text-gray-700"></span>
                </div>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="text-sm font-bold text-gray-600 block mb-1">ความสำคัญ (Priority)</label>
                    <select id="inpPriority" class="w-full border-2 border-gray-100 rounded-xl px-3 py-2 text-sm focus:border-pink-300 outline-none">
                        <option value="ปกติ">ปกติ (ใช้งานทั่วไป)</option>
                        <option value="ด่วน">ด่วน (ต้องการการบำรุงรักษา)</option>
                        <option value="ส่งซ่อม">ส่งซ่อม (ใช้งานไม่ได้)</option>
                    </select>
                </div>

                <div>
                    <label class="text-sm font-bold text-gray-600 block mb-2">ช่วงเวลาที่ใช้งาน (Shift Work)</label>
                    <div class="flex gap-2">
                        <label class="flex-1 cursor-pointer">
                            <input type="checkbox" name="shift" value="เช้า" class="hidden shift-checkbox">
                            <span class="block text-center py-2 border-2 border-gray-100 rounded-xl text-xs font-medium transition-all text-gray-500">เช้า</span>
                        </label>
                        <label class="flex-1 cursor-pointer">
                            <input type="checkbox" name="shift" value="บ่าย" class="hidden shift-checkbox">
                            <span class="block text-center py-2 border-2 border-gray-100 rounded-xl text-xs font-medium transition-all text-gray-500">บ่าย</span>
                        </label>
                        <label class="flex-1 cursor-pointer">
                            <input type="checkbox" name="shift" value="ดึก" class="hidden shift-checkbox">
                            <span class="block text-center py-2 border-2 border-gray-100 rounded-xl text-xs font-medium transition-all text-gray-500">ดึก</span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="flex gap-3 mt-8">
                <button onclick="closeModal('modalAssetDetail')" class="flex-1 py-3 bg-gray-100 text-gray-500 rounded-xl font-bold">ยกเลิก</button>
                <button id="btnConfirmAdd" class="flex-[2] btn-pink py-3 font-bold">เพิ่มลงรายการสำรวจ</button>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        let selectedAssets = [];
        let scannerRef = null;
        let currentDeptId = new URLSearchParams(window.location.search).get('deptId') || "";
        let currentDeptName = "";

        window.onload = async () => {
            if (!currentDeptId) {
                Swal.fire("ผิดพลาด", "ไม่พบรหัสหน่วยงาน", "error");
                return;
            }
            const res = await getDeptInfo(currentDeptId);
            if (res && !res.error) {
                currentDeptName = res.deptName;
                document.getElementById('displayDeptName').innerText = res.deptName;
                document.getElementById('displayDeptId').innerText = `ID: ${res.deptId}`;
                document.getElementById('displayBuilding').innerText = `อาคาร: ${res.building || '-'}`;
            }
        };

        // --- 1. ระบบสแกนเนอร์ (Logic ตัด URL เป๊ะๆ จาก React) ---
        const startScanner = () => {
            document.getElementById('scannerSection').classList.remove('hidden');
            setTimeout(async () => {
                try {
                    const html5QrCode = new Html5Qrcode("reader");
                    scannerRef = html5QrCode;
                    await html5QrCode.start(
                        { facingMode: "environment" },
                        { fps: 15, qrbox: { width: 250, height: 250 } },
                        (decodedText) => {
                            // --- เรียกใช้ Logic ตัด URL เหมือน React ---
                            let rawId = decodedText.trim();
                            let targetId = rawId;

                            if (rawId.includes('IcmAssetDetail/')) {
                                const parts = rawId.split('IcmAssetDetail/')[1];
                                if (parts) {
                                    targetId = parts.split('/')[0];
                                }
                            }
                            
                            // ปิดสแกนเนอร์และส่งค่าไปค้นหาทันที
                            stopScanner();
                            document.getElementById('assetSearchInput').value = targetId;
                            handleLiveSearch(targetId);
                        }
                    );
                } catch (err) {
                    Swal.fire("กล้องทำงานไม่ได้", "กรุณาอนุญาตให้ใช้งานกล้อง", "error");
                    stopScanner();
                }
            }, 300);
        };

        const stopScanner = async () => {
            if (scannerRef) {
                try { await scannerRef.stop(); } catch (e) {}
                scannerRef = null;
            }
            document.getElementById('scannerSection').classList.add('hidden');
        };

        // --- 2. ระบบค้นหา Live Search (Debounce 300ms) ---
      let allAssets = []; // เก็บข้อมูลทั้งหมดไว้ที่นี่

window.onload = async () => {
    // 1. โหลดข้อมูลหน่วยงาน
    if (!currentDeptId) return;
    const res = await getDeptInfo(currentDeptId);
    if (res) {
        document.getElementById('displayDeptName').innerText = res.deptName;
        // ... แสดงข้อมูลอื่นๆ ...
    }

    // 2. โหลดข้อมูลครุภัณฑ์ทั้งหมดมาเตรียมไว้ (เพื่อให้ค้นหาได้ทันทีไม่รอ Overlay)
    allAssets = await getAllAssets(); // ฟังก์ชันใน api.js ที่ดึงข้อมูลทั้งหมด
};

// ฟังก์ชันกรองข้อมูล (Logic: endsWith จากขวาไปซ้าย ตาม React เป๊ะๆ)
function filterAssets(value) {
    const term = value.trim().toLowerCase();
    const container = document.getElementById('assetSearchResult');
    
    if (!term) {
        container.innerHTML = "";
        return;
    }

    // ใช้ endsWith เหมือนใน React เป๊ะ: ค้นหาจากท้ายข้อความ
    const filtered = allAssets.filter(asset => 
        String(asset.AssetID || "").toLowerCase().endsWith(term)
    ).slice(0, 30); // จำกัด 30 รายการตาม React

    renderSearchResults(filtered, term);
}

function renderSearchResults(items, highlight) {
    const container = document.getElementById('assetSearchResult');
    let html = '';

    if (items.length === 0) {
        container.innerHTML = '<p class="text-center text-gray-400 py-2 text-xs">-- ไม่พบข้อมูลท้ายรหัสนี้ --</p>';
        return;
    }

    items.forEach(item => {
        // ทำ Highlight เฉพาะส่วนที่ตรงกับเลขท้ายที่พิมพ์
        const text = String(item.AssetID);
        const parts = text.split(new RegExp(`(${highlight})`, 'gi'));
        const highlightedHTML = parts.map(p => 
            p.toLowerCase() === highlight.toLowerCase() 
            ? `<span class="bg-yellow-200 text-pink-600 font-bold">${p}</span>` 
            : p
        ).join('');

        html += `
        <div onclick='openAssetModal(${JSON.stringify(item)})' 
             class="bg-white p-3 rounded-xl border border-pink-50 hover:border-pink-200 mb-2 cursor-pointer shadow-sm">
            <div class="flex justify-between items-center">
                <div>
                    <p class="text-[10px] text-gray-400 font-mono">KEY: ${item.KeyID}</p>
                    <p class="text-sm text-gray-800 font-medium">${highlightedHTML}</p>
                    <p class="text-[11px] text-gray-500">${item.ItemName || ''}</p>
                </div>
                <i class="fas fa-plus-circle text-pink-300"></i>
            </div>
        </div>`;
    });
    container.innerHTML = html;
}
        // --- 4. จัดการ Modal และการเลือกครุภัณฑ์ ---
        function openAssetModal(item) {
            // ล้างผลการค้นหา
            document.getElementById('assetSearchResult').innerHTML = ""; 
            
            // แสดงรายละเอียด (ใช้ AssetID ที่ส่งมาจาก Code.gs)
            document.getElementById('showAssetID').innerText = item.AssetID;
            document.getElementById('showItemName').innerText = item.ItemName || 'ไม่ระบุชื่อรายการ';
            document.getElementById('showSpec').innerText = item.Spec || '-';
            document.getElementById('showReceiveDate').innerText = item.ReceiveDate || '-';
            document.getElementById('showAge').innerText = item.Age || '-';
            
            document.getElementById('btnConfirmAdd').onclick = () => {
                const shifts = Array.from(document.querySelectorAll('input[name="shift"]:checked')).map(el => el.value);
                const assetData = {
                    AssetID: item.AssetID,
                    KeyID: item.KeyID,
                    Priority: document.getElementById('inpPriority').value,
                    ShiftWork: shifts.join(',') || 'ทุกช่วงเวลา',
                    AssetType: item.Category || "ทั่วไป"
                };
                addToList(assetData);
                closeModal('modalAssetDetail');
            };
            document.getElementById('modalAssetDetail').classList.add('show');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('show');
            document.querySelectorAll('input[name="shift"]').forEach(el => el.checked = false);
            document.getElementById('inpPriority').value = "ปกติ";
            document.getElementById('assetSearchInput').value = "";
        }

        function addToList(item) {
            if (selectedAssets.find(a => a.AssetID === item.AssetID)) {
                return Swal.fire("ซ้ำ", "รายการนี้อยู่ในรายการสำรวจแล้ว", "info");
            }
            selectedAssets.push(item);
            renderSelectedList();
        }

        function renderSelectedList() {
            let html = '';
            selectedAssets.forEach((item, index) => {
                html += `
                <div class="bg-white p-3 rounded-xl shadow-sm flex justify-between items-center border-l-4 border-pink-500 animate-fade-in text-sm">
                    <div>
                        <p class="font-bold text-gray-700">${item.AssetID}</p>
                        <p class="text-[10px] text-gray-400">${item.Priority} | ${item.ShiftWork}</p>
                    </div>
                    <button onclick="selectedAssets.splice(${index},1); renderSelectedList();" class="text-red-400 p-2">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </div>`;
            });
            document.getElementById('selectedList').innerHTML = html;
            document.getElementById('count').innerText = selectedAssets.length;
        }

        async function submitSurvey() {
            if (selectedAssets.length === 0) return Swal.fire("แจ้งเตือน", "กรุณาเลือกอย่างน้อย 1 รายการ", "warning");
            
            const payload = {
                deptId: currentDeptId,
                deptName: currentDeptName,
                assets: selectedAssets
            };

            document.getElementById('loadingOverlay').classList.add('show');
            const res = await saveAssetSurvey(payload);
            document.getElementById('loadingOverlay').classList.remove('show');

            if (res.success || res.activityId) {
                Swal.fire("สำเร็จ", "บันทึกข้อมูลเรียบร้อย", "success").then(() => {
                    window.location.href = `signature_page.html?activityId=${res.activityId}`;
                });
            } else {
                Swal.fire("ผิดพลาด", res.message || "ไม่สามารถบันทึกได้", "error");
            }
        }
    </script>
</body>
</html>
