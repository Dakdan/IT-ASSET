<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบตรวจสอบครุภัณฑ์คอมพิวเตอร์ - IT Udon Hospital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; background: #fff0f3; min-height: 100vh; color: #4a4a4a; overflow-x: hidden; }
        .glass-card { background: white; border-radius: 24px; border: 1px solid #ffdeeb; box-shadow: 0 4px 16px rgba(255, 133, 161, 0.08); }
        .btn-pink { background: #ff85a1; color: white; transition: all 0.2s ease; }
        .btn-pink:hover { background: #ff6b8d; }
        .loader-overlay { background: rgba(255, 255, 255, 0.9); display: none; position: fixed; inset: 0; z-index: 10000; align-items: center; justify-content: center; flex-direction: column; }
        .modal-backdrop { background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(6px); position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; padding: 1rem; z-index: 50; }
        .modal-content { background: white; width: 100%; max-width: 550px; border-radius: 32px; max-height: 92vh; overflow-y: auto; }
        .form-input { width: 100%; padding: 0.85rem 1.25rem; border-radius: 16px; border: 1px solid #ffdeeb; outline: none; transition: all 0.2s; font-size: 15px; background: white; color: #555; -webkit-appearance: none; }
        .form-input:focus { border-color: #ff85a1; box-shadow: 0 0 0 4px rgba(255, 133, 161, 0.1); }
        
        .asset-card-header { background: #f8faff; border-radius: 20px; padding: 20px; border: 1px solid #eef2ff; position: relative; }
        .badge-orange { background: #fff4e6; color: #fd7e14; font-size: 11px; padding: 4px 12px; border-radius: 10px; font-weight: 600; }
        .label-gray { color: #adb5bd; font-size: 12px; font-weight: 600; }
        
        .highlight { background-color: #ffdae3; color: #d63384; font-weight: bold; border-radius: 4px; padding: 0 2px; }
        
        /* สไตล์ Signature Pad ปรับปรุงใหม่ */
        .signature-wrapper { position: relative; width: 100%; height: 220px; background: #fff; border: 2px dashed #ffb6c1; border-radius: 20px; touch-action: none; overflow: hidden; }
        .signature-pad { position: absolute; left: 0; top: 0; width: 100%; height: 100%; cursor: crosshair; touch-action: none; }
        
        .img-preview { width: 100%; height: 200px; object-fit: cover; border-radius: 16px; border: 1px solid #ffdeeb; }
        #reader { width: 100%; border-radius: 20px; overflow: hidden; border: 2px solid #ff85a1; }
        
        /* สไตล์สำหรับ optgroup */
        optgroup { font-style: normal; font-weight: bold; color: #ff85a1; background: #fffaff; }
        option { font-weight: normal; color: #4a4a4a; padding: 8px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="loader" class="loader-overlay">
        <div class="animate-spin rounded-full h-14 w-14 border-t-4 border-pink-500"></div>
        <p class="text-pink-500 font-bold mt-4">กำลังดำเนินการ...</p>
    </div>

    <header class="max-w-4xl mx-auto mb-8 text-center">
        <h1 class="text-2xl font-bold text-gray-800">ระบบตรวจสอบครุภัณฑ์คอมพิวเตอร์</h1>
        <p class="text-pink-400 text-sm font-bold tracking-widest mt-1 uppercase">IT Udonthani Hospital</p>
    </header>

    <main class="max-w-4xl mx-auto space-y-6">
        <section class="glass-card p-8">
            <h2 class="text-gray-700 font-bold mb-4 flex items-center gap-2">
                <span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-full flex items-center justify-center text-sm">1</span>
                ข้อมูลสถานที่และหน่วยงาน
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <select id="building-select" onchange="filterDepartments()" class="form-input">
                    <option value="">-- เลือกอาคาร --</option>
                </select>
                <select id="dept-select" class="form-input">
                    <option value="">-- เลือกหน่วยงาน (กรุณาเลือกอาคารก่อน) --</option>
                </select>
            </div>
        </section>

        <section class="glass-card p-8 pb-28">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-gray-700 font-bold flex items-center gap-2">
                    <span class="w-8 h-8 bg-pink-100 text-pink-500 rounded-full flex items-center justify-center text-sm">2</span>
                    รายการครุภัณฑ์ที่เลือก
                </h2>
                <button onclick="openSearchModal()" class="btn-pink px-6 py-2.5 rounded-2xl text-sm font-bold shadow-lg shadow-pink-200">เพิ่มครุภัณฑ์ +</button>
            </div>
            <div id="selected-list" class="space-y-4">
                <div class="py-16 text-center text-gray-300 italic text-sm">ยังไม่มีข้อมูลครุภัณฑ์ที่เลือก</div>
            </div>
        </section>

        <div class="fixed bottom-0 left-0 right-0 p-6 bg-white/70 backdrop-blur-xl border-t border-pink-50 z-40">
            <div class="max-w-4xl mx-auto">
                <button onclick="openFinalModal()" class="w-full btn-pink py-4.5 rounded-2xl font-bold text-lg shadow-xl shadow-pink-200">ยืนยันการตรวจสอบและส่งรายงาน</button>
            </div>
        </div>
    </main>

    <!-- Modal ค้นหา -->
    <div id="search-modal" class="modal-backdrop hidden">
        <div class="modal-content p-8">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-bold text-xl text-gray-800">ค้นหาทะเบียนครุภัณฑ์</h3>
                <button onclick="closeSearchModal()" class="text-gray-400 text-4xl">&times;</button>
            </div>
            <div class="flex gap-3 mb-6">
                <input type="text" id="search-input" placeholder="พิมพ์รหัส หรือ ชื่อครุภัณฑ์..." class="form-input" oninput="doSearch()">
                <button onclick="startScanner('search-input')" class="bg-pink-50 px-4 rounded-2xl border border-pink-100 text-pink-500">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                </button>
            </div>
            <div id="search-results" class="space-y-3 max-h-[380px] overflow-y-auto"></div>
            <button onclick="addNonSystem()" class="w-full mt-6 py-4 bg-pink-50 text-pink-500 rounded-2xl text-sm font-bold border-2 border-dashed border-pink-200">
                + กรณีไม่มีในทะเบียน (นอกระบบ)
            </button>
        </div>
    </div>

    <!-- Modal รายละเอียด -->
    <div id="detail-modal" class="modal-backdrop hidden">
        <div class="modal-content p-8">
            <div id="asset-header-container"></div>
            <div class="space-y-5 mt-6">
                <div>
                    <label class="label-gray uppercase mb-2 block">ความสำคัญ (PRIORITY)</label>
                    <select id="sel-priority" class="form-input">
                        <option value="">-- เลือกความสำคัญ --</option>
                        <option value="ตรวจรักษา(แพทย์)">ตรวจรักษา(แพทย์)</option>
                        <option value="ข้อมูลผู้ป่วย (พยาบาล)">ข้อมูลผู้ป่วย (พยาบาล)</option>
                        <option value="บริการ การเงิน ห้องบัตร ห้องยา Lab">บริการ การเงิน ห้องบัตร ห้องยา Lab</option>
                        <option value="งานเอกสาร งานธุรการ">งานเอกสาร งานธุรการ</option>
                        <option value="บริการทั่วไป ซ่อมบำรุง">บริการทั่วไป ซ่อมบำรุง</option>
                    </select>
                </div>
                <div>
                    <label class="label-gray uppercase mb-2 block">ประเภทอุปกรณ์</label>
                    <select id="sel-type" class="form-input">
                        <option value="">-- เลือกประเภท --</option>
                        <option value="เครื่องคอมพิวเตอร์ (All In One)">🖥️ เครื่องคอมพิวเตอร์ (All In One)</option>
                        <option value="เครื่องคอมพิวเตอร์ (Case)">🗄️ เครื่องคอมพิวเตอร์ (Case)</option>
                        <option value="จอรับภาพ (Monitor)">📺 จอรับภาพ (Monitor)</option>
                        <option value="เครื่องสำรองไฟ">🔋 เครื่องสำรองไฟ</option>
                        <option value="เครื่องปริ้นเตอร์">🖨️ เครื่องปริ้นเตอร์</option>
                        <option value="เครื่องแสกนเนอร์">📠 เครื่องแสกนเนอร์</option>
                        <option value="เครื่องอ่านบัตรประชาชน">💳 เครื่องอ่านบัตรประชาชน</option>
                    </select>
                </div>
                <div class="flex items-center justify-between p-4 bg-pink-50/50 rounded-2xl border border-pink-100">
                    <span class="text-sm font-bold text-pink-600">เครื่องระบบ Pacs</span>
                    <input type="checkbox" id="chk-pacs" class="w-6 h-6 accent-pink-500">
                </div>
                <div>
                    <label class="label-gray uppercase mb-2 block">ช่วงเวลาทำงาน</label>
                    <div class="flex gap-6 mt-2">
                        <label class="flex items-center gap-2"><input type="checkbox" value="เช้า" class="shift-cb w-5 h-5 accent-pink-500"> เช้า</label>
                        <label class="flex items-center gap-2"><input type="checkbox" value="บ่าย" class="shift-cb w-5 h-5 accent-pink-500"> บ่าย</label>
                        <label class="flex items-center gap-2"><input type="checkbox" value="ดึก" class="shift-cb w-5 h-5 accent-pink-500"> ดึก</label>
                    </div>
                </div>
                <textarea id="txt-note" placeholder="ระบุหมายเหตุเพิ่มเติม (ถ้ามี)..." class="form-input h-24 resize-none"></textarea>
                <div id="image-area">
                    <input type="file" id="asset-image-input" accept="image/*" capture="environment" class="hidden" onchange="handleImageChange(this)">
                    <button id="btn-camera" onclick="document.getElementById('asset-image-input').click()" class="w-full py-4 bg-white border-2 border-dashed border-pink-200 rounded-2xl text-pink-400 text-sm font-bold">📸 ถ่ายรูปหรือเลือกภาพ</button>
                    <div id="image-preview-container" class="hidden relative mt-2">
                        <img id="image-preview-el" class="img-preview" src="">
                        <button onclick="removeImage()" class="absolute top-3 right-3 bg-red-500 text-white rounded-full w-8 h-8 flex items-center justify-center">×</button>
                    </div>
                </div>
            </div>
            <div class="flex gap-4 mt-8">
                <button onclick="closeDetailModal()" class="flex-1 py-4 bg-gray-50 text-gray-400 rounded-2xl font-bold">ยกเลิก</button>
                <button onclick="saveAssetToSelected()" class="flex-1 py-4 btn-pink rounded-2xl font-bold">บันทึกข้อมูล</button>
            </div>
        </div>
    </div>

    <!-- Modal ลายเซ็น -->
    <div id="final-modal" class="modal-backdrop hidden">
        <div class="modal-content p-8">
            <h3 class="font-bold text-xl text-center mb-6">ผู้ยืนยันการตรวจสอบ</h3>
            <input type="text" id="inspector-name" placeholder="ชื่อ-นามสกุล ช่าง IT" class="form-input text-center font-bold mb-6">
            <div class="signature-wrapper">
                <canvas id="sign-canvas" class="signature-pad"></canvas>
            </div>
            <button onclick="clearSignature()" class="text-xs text-pink-400 font-bold mt-3 block mx-auto underline">ล้างลายเซ็น</button>
            <div class="flex gap-4 mt-8">
                <button onclick="closeFinalModal()" class="flex-1 py-4 text-gray-400 border rounded-2xl font-bold">ปิด</button>
                <button onclick="processSubmit()" class="flex-1 py-4 btn-pink rounded-2xl font-bold">ส่งรายงาน</button>
            </div>
        </div>
    </div>

    <div id="scanner-modal" class="modal-backdrop hidden" style="z-index: 60;">
        <div class="modal-content p-4"><div id="reader"></div><button onclick="stopScanner()" class="w-full mt-4 py-3 bg-gray-100 rounded-xl font-bold text-gray-500">ยกเลิกสแกน</button></div>
    </div>

    <div id="alert-box" class="modal-backdrop hidden" style="z-index: 99999;">
        <div class="modal-content p-8 max-w-xs text-center border-2 border-pink-100 rounded-[32px]">
            <p id="alert-msg" class="font-bold text-gray-700"></p>
            <button onclick="document.getElementById('alert-box').classList.add('hidden')" class="mt-8 w-full py-3 btn-pink rounded-2xl font-bold text-sm">รับทราบ</button>
        </div>
    </div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyo-lZoaJ4WMvAyt7dtQ5jgXjLgcLhIHTTKdtC_OVf6E9_efuhLnT1CaWD6GmsmVEjB/exec";
    let departments = [], allAssets = [], selectedItems = [], activeAsset = null, signaturePad, currentBase64 = null, html5QrCode = null;

    window.onload = async () => { 
        initSignature(); 
        await initializeData(); 
        loadLocalDraft(); 
    };

    // ปรับปรุงฟังก์ชันลายเซ็นให้เซ็นได้แน่นอน
    function initSignature() {
        const canvas = document.getElementById('sign-canvas');
        signaturePad = new SignaturePad(canvas, {
            backgroundColor: 'rgba(255, 255, 255, 0)',
            penColor: 'rgb(0, 0, 0)'
        });

        function resizeCanvas() {
            const ratio = Math.max(window.devicePixelRatio || 1, 1);
            canvas.width = canvas.offsetWidth * ratio;
            canvas.height = canvas.offsetHeight * ratio;
            canvas.getContext("2d").scale(ratio, ratio);
            signaturePad.clear(); 
        }

        window.addEventListener("resize", resizeCanvas);
        // เรียกครั้งแรกหลังจาก Modal เปิด หรือหลังจากโหลดหน้า
        setTimeout(resizeCanvas, 500);
    }

    async function initializeData() {
        toggleLoader(true);
        try {
            const [depts, assets] = await Promise.all([callAPI('getDepartments'), callAPI('getAssets')]);
            departments = depts; allAssets = assets;
            renderBuildingOptions();
        } catch (e) { showAlert("การเชื่อมต่อล้มเหลว"); }
        finally { toggleLoader(false); }
    }

    function renderBuildingOptions() {
        const buildings = [...new Set(departments.map(d => String(d.LOCATION_NAME || "")))].filter(b => b && b !== "undefined").sort();
        const select = document.getElementById('building-select');
        select.innerHTML = '<option value="">-- เลือกอาคาร --</option>';
        buildings.forEach(b => { select.innerHTML += `<option value="${b}">${b}</option>`; });
    }

    // แก้ไข: จัดกลุ่มหน่วยงานตามชั้น (Group by Floor)
    function filterDepartments() {
        const building = document.getElementById('building-select').value;
        const select = document.getElementById('dept-select');
        select.innerHTML = '<option value="">-- เลือกหน่วยงาน (แยกตามชั้น) --</option>';
        if(!building) return;

        const filteredDepts = departments.filter(d => String(d.LOCATION_NAME) === building);
        // หาชั้นทั้งหมดที่มีในอาคารนี้
        const floors = [...new Set(filteredDepts.map(d => String(d.FLOOR_NAME || "ไม่ระบุชั้น")))].sort((a, b) => a.localeCompare(b));

        floors.forEach(floor => {
            const group = document.createElement('optgroup');
            group.label = `📍 ชั้น: ${floor}`;
            
            filteredDepts
                .filter(d => String(d.FLOOR_NAME || "ไม่ระบุชั้น") === floor)
                .forEach(d => {
                    const opt = document.createElement('option');
                    opt.value = d.DEP_ID;
                    opt.textContent = d.DEPNAME;
                    group.appendChild(opt);
                });
            select.appendChild(group);
        });
    }

    function highlightMatch(text, query) {
        if (!query) return text;
        const regex = new RegExp(`(${query})`, "gi");
        return text.replace(regex, '<span class="highlight">$1</span>');
    }

    function doSearch() {
        const q = document.getElementById('search-input').value.trim();
        const container = document.getElementById('search-results');
        if(q.length < 2) { container.innerHTML = ""; return; }
        
        const filtered = allAssets.filter(x => 
            String(x.AssetID).toLowerCase().includes(q.toLowerCase()) || 
            String(x['ชื่อรายการครุภัณฑ์']).toLowerCase().includes(q.toLowerCase())
        ).slice(0, 15);
        
        container.innerHTML = filtered.map(x => `
            <div onclick='selectAsset(${JSON.stringify(x).replace(/'/g, "&apos;")})' class="p-4 bg-white border border-gray-100 rounded-2xl cursor-pointer hover:bg-pink-50 transition-all">
                <span class="text-[11px] font-bold text-blue-500 uppercase">${highlightMatch(String(x.AssetID), q)}</span>
                <p class="text-sm font-bold text-gray-700">${highlightMatch(String(x['ชื่อรายการครุภัณฑ์']), q)}</p>
            </div>
        `).join('');
    }

    async function selectAsset(x) { activeAsset = { ...x, isNonumber: false }; closeSearchModal(); openDetailModal(); }
    function addNonSystem() { activeAsset = { AssetID: "NON-" + Date.now().toString().slice(-5), "ชื่อรายการครุภัณฑ์": "รายการนอกทะเบียน", isNonumber: true }; closeSearchModal(); openDetailModal(); }

    function openDetailModal() {
        const container = document.getElementById('asset-header-container');
        removeImage();
        if(activeAsset.isNonumber) {
            container.innerHTML = `<div class="p-4 bg-pink-50 rounded-2xl border border-pink-100 mb-4"><p class="text-xs font-bold text-pink-500 mb-2 uppercase">ระบุข้อมูลครุภัณฑ์ใหม่</p><input type="text" id="manual-asset-id" placeholder="รหัสครุภัณฑ์..." class="form-input font-bold text-pink-600 mb-2"><input type="text" id="manual-asset-name" placeholder="ชื่อเรียกครุภัณฑ์..." class="form-input"></div>`;
        } else {
            container.innerHTML = `<div class="asset-card-header"><div class="flex justify-between items-start mb-2"><h4 class="text-xl font-bold text-blue-600">${activeAsset.AssetID}</h4><span class="badge-orange">ในระบบ</span></div><p class="font-bold text-gray-700">${activeAsset['ชื่อรายการครุภัณฑ์']}</p></div>`;
        }
        document.getElementById('detail-modal').classList.remove('hidden');
    }

    function handleImageChange(input) {
        const file = input.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            currentBase64 = e.target.result;
            document.getElementById('image-preview-el').src = currentBase64;
            document.getElementById('image-preview-container').classList.remove('hidden');
            document.getElementById('btn-camera').classList.add('hidden');
        };
        reader.readAsDataURL(file);
    }

    function removeImage() { currentBase64 = null; document.getElementById('image-preview-container').classList.add('hidden'); document.getElementById('btn-camera').classList.remove('hidden'); }

    function saveAssetToSelected() {
        if(activeAsset.isNonumber) { 
            activeAsset.AssetID = document.getElementById('manual-asset-id').value; 
            activeAsset['ชื่อรายการครุภัณฑ์'] = document.getElementById('manual-asset-name').value; 
        }
        if(!activeAsset.AssetID) return showAlert("กรุณาระบุรหัสครุภัณฑ์");
        
        selectedItems.push({ 
            ...activeAsset, 
            priority: document.getElementById('sel-priority').value, 
            assetType: document.getElementById('sel-type').value, 
            isPac: document.getElementById('chk-pacs').checked, 
            shifts: Array.from(document.querySelectorAll('.shift-cb:checked')).map(x => x.value).join(','), 
            note: document.getElementById('txt-note').value, 
            imageBase64: currentBase64, 
            deptId: document.getElementById('dept-select').value,
            noid: activeAsset.noid || Date.now()
        });
        saveLocalDraft(); renderSelectedList(); closeDetailModal();
    }

    function renderSelectedList() {
        const container = document.getElementById('selected-list');
        if(!selectedItems.length) { container.innerHTML = '<div class="py-16 text-center text-gray-300 italic text-sm">ยังไม่มีข้อมูลครุภัณฑ์ที่เลือก</div>'; return; }
        container.innerHTML = selectedItems.map((x, i) => `
            <div class="p-4 bg-white border border-pink-50 rounded-2xl flex justify-between items-center shadow-sm">
                <div class="flex items-center gap-4">
                    <img src="${x.imageBase64 || 'https://via.placeholder.com/60'}" class="w-12 h-12 rounded-xl object-cover">
                    <div class="text-xs">
                        <b class="text-pink-500">${x.AssetID}</b>
                        <p class="text-gray-600 line-clamp-1">${x['ชื่อรายการครุภัณฑ์']}</p>
                    </div>
                </div>
                <button onclick="removeSelected(${i})" class="w-10 h-10 flex items-center justify-center bg-red-50 text-red-400 rounded-full">🗑️</button>
            </div>
        `).join('');
    }

    async function processSubmit() {
        const name = document.getElementById('inspector-name').value;
        if(!name || signaturePad.isEmpty()) return showAlert("กรุณาระบุชื่อและเซ็นชื่อผู้ตรวจสอบ");
        toggleLoader(true);
        try {
            const { actNo } = await callAPI('saveActionLog', { actName: 'Survey', itLogin: name });
            for(let item of selectedItems) {
                if(item.imageBase64 && item.imageBase64.startsWith('data:image')) {
                    const imgRes = await callAPI('saveAssetImage', { noid: item.noid, imageBase64: item.imageBase64, actNo });
                    item.assImage = imgRes.url;
                } else { item.assImage = ""; }
            }
            await callAPI('submitFullSurvey', { actNo, itUserMail: name, data: selectedItems });
            await callAPI('saveConfirmation', { actionId: actNo, actName: name, signature: signaturePad.toDataURL() });
            
            selectedItems = []; 
            localStorage.removeItem('survey_v3_draft');
            renderSelectedList(); 
            showAlert("ส่งรายงานการตรวจสอบเรียบร้อยแล้ว"); 
            closeFinalModal();
        } catch (e) { showAlert("เกิดข้อผิดพลาดในการส่งข้อมูล"); }
        finally { toggleLoader(false); }
    }

    async function startScanner(targetId) {
        document.getElementById('scanner-modal').classList.remove('hidden');
        html5QrCode = new Html5Qrcode("reader");
        try { 
            await html5QrCode.start({ facingMode: "environment" }, { fps: 12, qrbox: 260 }, (text) => { 
                document.getElementById(targetId).value = text; 
                if(targetId === 'search-input') doSearch(); 
                stopScanner(); 
            }); 
        } catch (e) { 
            showAlert("ไม่สามารถเข้าถึงกล้องได้"); 
            stopScanner(); 
        }
    }

    async function stopScanner() { 
        if (html5QrCode) {
            try { await html5QrCode.stop(); } catch(e) {}
        }
        html5QrCode = null; 
        document.getElementById('scanner-modal').classList.add('hidden'); 
    }

    function openFinalModal() { 
        if(!selectedItems.length) return showAlert("กรุณาเพิ่มรายการครุภัณฑ์อย่างน้อย 1 รายการ");
        document.getElementById('final-modal').classList.remove('hidden');
        // บังคับให้ Canvas คำนวณขนาดใหม่เมื่อ Modal เปิด
        setTimeout(() => {
            const canvas = document.getElementById('sign-canvas');
            const ratio = Math.max(window.devicePixelRatio || 1, 1);
            canvas.width = canvas.offsetWidth * ratio;
            canvas.height = canvas.offsetHeight * ratio;
            canvas.getContext("2d").scale(ratio, ratio);
            signaturePad.clear();
        }, 300);
    }

    function closeDetailModal() { document.getElementById('detail-modal').classList.add('hidden'); }
    function closeSearchModal() { document.getElementById('search-modal').classList.add('hidden'); }
    function closeFinalModal() { document.getElementById('final-modal').classList.add('hidden'); }
    function openSearchModal() { document.getElementById('search-modal').classList.remove('hidden'); }
    async function callAPI(action, payload) { const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action, payload }) }); return res.json(); }
    function saveLocalDraft() { localStorage.setItem('survey_v3_draft', JSON.stringify(selectedItems)); }
    function loadLocalDraft() { const d = localStorage.getItem('survey_v3_draft'); if(d) { selectedItems = JSON.parse(d); renderSelectedList(); } }
    function clearSignature() { signaturePad.clear(); }
    function toggleLoader(s) { document.getElementById('loader').style.display = s ? 'flex' : 'none'; }
    function showAlert(m) { document.getElementById('alert-msg').innerText = m; document.getElementById('alert-box').classList.remove('hidden'); }
    function removeSelected(i) { selectedItems.splice(i, 1); saveLocalDraft(); renderSelectedList(); }
</script>
</body>
</html>
