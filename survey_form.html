<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Udon Hospital - Asset Survey V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
    <style>
        body { 
            font-family: 'Kanit', sans-serif; 
            background: linear-gradient(to bottom, #ffe4ec, #ffffff);
            min-height: 100vh; color: #4a4a4a;
        }
        .glass-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); border-radius: 24px; border: 2px solid #ffe4e8; box-shadow: 0 4px 20px rgba(255, 182, 193, 0.2); }
        .btn-pink { background: linear-gradient(90deg, #ff85a1 0%, #ffb6c1 100%); color: white; transition: all 0.3s ease; }
        .loader-overlay { background: rgba(255, 255, 255, 0.85); display: none; position: fixed; inset: 0; z-index: 9999; align-items: center; justify-content: center; flex-direction: column; gap: 1rem; }
        .signature-pad { border: 2px dashed #ffb6c1; background: #fff; border-radius: 12px; }
        .form-input { width: 100%; padding: 0.75rem; border-radius: 0.75rem; border: 1px solid #ffe4e8; outline: none; background: white; }
        .badge-info { padding: 2px 8px; border-radius: 99px; font-size: 10px; font-weight: bold; }
        .status-active { background: #e0f2fe; color: #0369a1; }
        .status-none { background: #f3f4f6; color: #9ca3af; }
        mark { background-color: #ff85a1; color: white; border-radius: 2px; }
        body::before {
            content: "ช่างคอมๆ IT UDH App"; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-20deg);
            font-size: 8vw; color: rgba(255, 133, 161, 0.05); pointer-events: none; z-index: 0;
        }
        main, header, #alert-modal, #log-modal, #search-modal, #final-modal { position: relative; z-index: 10; }
    </style>
</head>
<body class="p-4 md:p-6 pb-20">

    <div id="loader" class="loader-overlay">
        <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-pink-500"></div>
        <p class="text-pink-600 font-medium">กำลังโหลดข้อมูล...</p>
    </div>

    <header class="max-w-4xl mx-auto mb-6 text-center">
        <img src="https://img2.pic.in.th/-227e4f6f84f29f020.png" class="w-14 h-14 mx-auto mb-2 rounded-full border-2 border-pink-200 object-cover">
        <h1 class="text-xl font-bold text-gray-800">ตรวจสอบครุภัณฑ์คอมพิวเตอร์</h1>
        <p class="text-pink-500 font-bold text-[10px] tracking-widest uppercase">IT Udonthani Hospital</p>
    </header>

    <main class="max-w-4xl mx-auto space-y-6">
        <section class="glass-card p-6">
            <h2 class="text-lg font-bold border-l-4 border-pink-500 pl-3 mb-4 text-gray-700">1. ข้อมูลหน่วยงาน</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <select id="building-select" onchange="filterDepartments()" class="form-input bg-pink-50/50"><option value="">-- โหลดข้อมูลอาคาร --</option></select>
                <select id="dept-select" onchange="updateDeptUI()" class="form-input bg-pink-50/50"><option value="">-- เลือกหน่วยงาน --</option></select>
            </div>
            <div id="dept-preview" class="mt-4 hidden p-3 bg-pink-50 rounded-2xl border border-pink-100 flex items-center gap-4">
                <div class="flex-1">
                    <p id="ui-dept-name" class="font-bold text-sm text-gray-800">-</p>
                    <p id="ui-dept-loc" class="text-[10px] text-gray-500">-</p>
                </div>
            </div>
        </section>

        <section class="glass-card p-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold border-l-4 border-pink-500 pl-3 text-gray-700">2. รายการครุภัณฑ์ที่เลือก</h2>
                <button onclick="openSearchModal()" class="px-4 py-2 btn-pink rounded-xl text-xs font-bold">เพิ่มครุภัณฑ์ +</button>
            </div>
            <div id="selected-assets-container" class="space-y-2">
                <p class="text-center text-gray-300 py-10 italic text-sm">ยังไม่มีข้อมูลครุภัณฑ์ที่ถูกเลือก</p>
            </div>
        </section>

        <section class="flex flex-col gap-3">
            <button onclick="openFinalModal()" class="w-full btn-pink py-4 rounded-2xl font-black text-sm shadow-lg tracking-widest">ยืนยันและส่งรายงาน</button>
        </section>
    </main>

    <div id="search-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-xl rounded-[32px] p-6 space-y-4 max-h-[90vh] flex flex-col border-2 border-pink-100">
            <div class="flex justify-between items-center">
                <h3 class="font-bold text-gray-700">ค้นหาครุภัณฑ์</h3>
                <button onclick="closeSearchModal()" class="text-gray-400 text-3xl">&times;</button>
            </div>
            <input type="text" id="query-input" placeholder="พิมพ์รหัสครุภัณฑ์..." class="form-input" oninput="runSearch()">
            <div id="search-results" class="flex-1 overflow-y-auto space-y-2 min-h-[200px]"></div>
            <div class="border-t pt-4">
                <button onclick="openNonAssetForm()" class="w-full py-3 bg-slate-100 text-slate-600 rounded-2xl font-bold text-sm border border-slate-200">เพิ่มครุภัณฑ์นอกระบบ</button>
            </div>
        </div>
    </div>

    <div id="log-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-2xl rounded-[32px] p-6 max-h-[90vh] overflow-y-auto border-2 border-pink-100">
            <div class="space-y-6">
                <div id="asset-detail-ui" class="bg-slate-50 p-4 rounded-2xl border border-slate-200"></div>
                <div class="space-y-4">
                    <div>
                        <label class="text-xs font-bold text-gray-500 uppercase">ความสำคัญ (Priority)</label>
                        <select id="log-priority" class="form-input mt-1">
                            <option value="">-- เลือกความสำคัญ --</option>
                            <option value="ตรวจรักษา(แพทย์)">ตรวจรักษา(แพทย์)</option>
                            <option value="ข้อมูลผู้ป่วย (พยาบาล)">ข้อมูลผู้ป่วย (พยาบาล)</option>
                            <option value="บริการ การเงิน ห้องบัตร ห้องยา Lab">บริการ การเงิน ห้องบัตร ห้องยา Lab</option>
                            <option value="งานเอกสาร งานธุรการ">งานเอกสาร งานธุรการ</option>
                            <option value="บริการทั่วไป ซ่อมบำรุง">บริการทั่วไป ซ่อมบำรุง</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-500">ประเภทอุปกรณ์</label>
                        <select id="asset-type-select" class="form-input mt-1">
                            <option value="">-- เลือกประเภท --</option>
                            <option value="เครื่องคอมพิวเตอร์ (All In One)">🖥️ All In One</option>
                            <option value="เครื่องคอมพิวเตอร์ (Case)">🖥 Case</option>
                            <option value="จอรับภาพ (Monitor)">📺 Monitor</option>
                            <option value="UPS">🔋 UPS</option>
                            <option value="Printer">🖨️ Printer</option>
                            <option value="Scanner">📠 Scanner</option>
                        </select>
                    </div>
                    <div class="flex items-center justify-between p-3 bg-pink-50 rounded-2xl">
                        <span class="text-xs font-bold text-pink-600">เครื่องระบบ Pacs</span>
                        <input type="checkbox" id="pac-mode" class="w-5 h-5 accent-pink-500">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-500 uppercase">ช่วงเวลาทำงาน</label>
                        <div class="flex gap-4 mt-1">
                            <label class="flex items-center gap-2"><input type="checkbox" value="เช้า" class="shift-check"> เช้า</label>
                            <label class="flex items-center gap-2"><input type="checkbox" value="บ่าย" class="shift-check"> บ่าย</label>
                            <label class="flex items-center gap-2"><input type="checkbox" value="ดึก" class="shift-check"> ดึก</label>
                        </div>
                    </div>
                    <textarea id="log-note" placeholder="ระบุหมายเหตุ..." class="form-input h-24"></textarea>
                </div>
                <div class="flex gap-3">
                    <button onclick="closeLogModal()" class="flex-1 py-3 bg-gray-100 text-gray-500 rounded-xl font-bold">ยกเลิก</button>
                    <button onclick="commitAssetLog()" class="flex-1 py-3 btn-pink rounded-xl font-bold">ตกลง</button>
                </div>
            </div>
        </div>
    </div>

    <div id="final-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[32px] p-8 space-y-6 border-2 border-pink-100 text-center">
            <h3 class="text-lg font-bold">ยืนยันส่งข้อมูล</h3>
            <input type="text" id="user-name" placeholder="ชื่อผู้ตรวจสอบ" class="form-input text-center">
            <canvas id="sign-pad" class="signature-pad w-full h-40"></canvas>
            <button onclick="clearSign()" class="text-xs text-gray-400 underline">ล้างลายเซ็น</button>
            <div class="flex gap-3">
                <button onclick="closeFinalModal()" class="flex-1 text-gray-400 font-bold">ปิด</button>
                <button onclick="sendEverything()" class="flex-1 btn-pink py-3 rounded-2xl font-bold">ส่งรายงาน</button>
            </div>
        </div>
    </div>

    <div id="alert-modal" class="fixed inset-0 bg-black/50 hidden z-[9999] flex items-center justify-center">
        <div class="bg-white rounded-2xl p-6 w-full max-w-sm text-center shadow-xl">
            <p id="alert-text" class="text-gray-700 font-bold mb-4"></p>
            <button onclick="closeAlert()" class="px-6 py-2 btn-pink rounded-xl font-bold">ตกลง</button>
        </div>
    </div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyo-lZoaJ4WMvAyt7dtQ5jgXjLgcLhIHTTKdtC_OVf6E9_efuhLnT1CaWD6GmsmVEjB/exec";
    let departments = [], allAssets = [], selectedLogs = [], currentAsset = null, signPad;

    window.onload = async () => {
        signPad = new SignaturePad(document.getElementById('sign-pad'));
        await loadInitialData();
        const draft = localStorage.getItem('udh_asset_draft');
        if(draft) { selectedLogs = JSON.parse(draft); renderSelectedUI(); }
    };

    async function loadInitialData() {
        showLoader(true);
        try {
            const [dResp, aResp] = await Promise.all([
                fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'getDepartments' }) }),
                fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'getAssets' }) })
            ]);
            departments = await dResp.json();
            allAssets = await aResp.json();
            populateBuilding();
        } catch (e) { console.error(e); } finally { showLoader(false); }
    }

    function populateBuilding() {
        const unique = [...new Set(departments.map(d => d.LOCATION_NAME).filter(Boolean))].sort();
        document.getElementById('building-select').innerHTML = '<option value="">-- เลือกอาคาร --</option>' + unique.map(b => `<option value="${b}">${b}</option>`).join('');
    }

    function filterDepartments() {
        const bVal = document.getElementById('building-select').value;
        const select = document.getElementById('dept-select');
        select.innerHTML = '<option value="">-- เลือกหน่วยงาน --</option>';
        if(!bVal) return;
        departments.filter(d => d.LOCATION_NAME === bVal).forEach(d => {
            const opt = document.createElement('option');
            opt.value = d.DEP_ID; opt.textContent = d.DEPNAME;
            select.appendChild(opt);
        });
    }

    function updateDeptUI() {
        const id = document.getElementById('dept-select').value;
        const dept = departments.find(d => d.DEP_ID == id);
        if(dept) {
            document.getElementById('ui-dept-name').innerText = dept.DEPNAME;
            document.getElementById('ui-dept-loc').innerText = `${dept.LOCATION_NAME} ชั้น ${dept.FL || '-'}`;
            document.getElementById('dept-preview').classList.remove('hidden');
        }
    }

   function runSearch() {
    const query = document.getElementById('query-input').value.toLowerCase(); // ไม่ใช้ trim() ตามสั่ง
    const resBox = document.getElementById('search-results');
    const currentYear = 2026; // ปีปัจจุบันตามระบบ
    resBox.innerHTML = '';
    
    if (!query) return;

    // กรองข้อมูลจาก allAssets
    const hits = allAssets.filter(a => String(a.AssetID).toLowerCase().includes(query)).slice(0, 20);

        hits.forEach(a => {
            // คำนวณอายุครุภัณฑ์ (สมมติว่าคอลัมน์ปีคือ a.Year)
            const assetYear = parseInt(a.Year) || currentYear;
            const age = currentYear - assetYear;
            
            const div = document.createElement('div');
            div.className = "p-4 border-2 border-pink-50 rounded-2xl mb-3 cursor-pointer hover:bg-pink-50 transition-all bg-white shadow-sm";
            div.innerHTML = `
                <div class="flex justify-between items-start">
                    <div class="flex-1">
                        <p class="font-bold text-blue-600 text-sm">${a.AssetID}</p>
                        <p class="text-xs text-gray-700 font-medium mt-1">${a['ชื่อรายการครุภัณฑ์'] || 'ไม่ระบุชื่อรายการ'}</p>
                        <p class="text-[10px] text-gray-400 mt-1 italic">สเปก: ${a.Spec || '-'}</p>
                    </div>
                    <div class="text-right">
                        <span class="inline-block px-2 py-1 rounded-lg bg-pink-100 text-pink-600 text-[10px] font-bold">
                            อายุ: ${age} ปี
                        </span>
                    </div>
                </div>
            `;
            div.onclick = () => { 
                currentAsset = a; 
                closeSearchModal(); 
                openLogModal(a); 
            };
            resBox.appendChild(div);
        });
    }
    // --- ส่วนล้างข้อมูล (สำคัญ) ---
    function resetLogForm() {
        document.getElementById('log-priority').value = "";
        document.getElementById('asset-type-select').value = "";
        document.getElementById('pac-mode').checked = false;
        document.getElementById('log-note').value = "";
        document.querySelectorAll('.shift-check').forEach(c => c.checked = false);
        document.getElementById('query-input').value = "";
        document.getElementById('search-results').innerHTML = "";
    }

    function openLogModal(a) {
        resetLogForm();
        document.getElementById('log-modal').classList.remove('hidden');
        document.getElementById('asset-detail-ui').innerHTML = `<p class="font-bold text-blue-600">${a.AssetID}</p><p class="text-xs">${a['ชื่อรายการครุภัณฑ์'] || 'นอกระบบ'}</p>`;
    }

    function closeLogModal() {
        document.getElementById('log-modal').classList.add('hidden');
        resetLogForm();
    }

    function commitAssetLog() {
        const deptId = document.getElementById('dept-select').value;
        if(!deptId) return alert("เลือกหน่วยงานก่อน");
        
        selectedLogs.push({
            ...currentAsset,
            assetType: document.getElementById('asset-type-select').value,
            isPac: document.getElementById('pac-mode').checked,
            priority: document.getElementById('log-priority').value,
            note4: document.getElementById('log-note').value,
            shifts: Array.from(document.querySelectorAll('.shift-check:checked')).map(c => c.value).join(',')
        });
        localStorage.setItem('udh_asset_draft', JSON.stringify(selectedLogs));
        renderSelectedUI();
        closeLogModal();
    }

    function renderSelectedUI() {
        const container = document.getElementById('selected-assets-container');
        if(selectedLogs.length === 0) { container.innerHTML = '<p class="text-center text-gray-300 py-10">ไม่มีข้อมูล</p>'; return; }
        container.innerHTML = selectedLogs.map((log, idx) => `
            <div class="flex justify-between items-center p-3 border rounded-xl">
                <div><p class="font-bold text-xs">${log.AssetID}</p><p class="text-[10px]">${log.assetType}</p></div>
                <button onclick="removeLog(${idx})" class="text-red-400 text-xs">ลบ</button>
            </div>
        `).join('');
    }

    function removeLog(idx) { selectedLogs.splice(idx, 1); renderSelectedUI(); }
    function openSearchModal() { document.getElementById('search-modal').classList.remove('hidden'); }
    function closeSearchModal() { document.getElementById('search-modal').classList.add('hidden'); resetLogForm(); }
    function openFinalModal() { document.getElementById('final-modal').classList.remove('hidden'); }
    function closeFinalModal() { document.getElementById('final-modal').classList.add('hidden'); }
    function clearSign() { signPad.clear(); }
    function showLoader(s) { document.getElementById('loader').style.display = s ? 'flex' : 'none'; }
    window.alert = function(m) { document.getElementById('alert-text').innerText = m; document.getElementById('alert-modal').classList.remove('hidden'); };
    function closeAlert() { document.getElementById('alert-modal').classList.add('hidden'); }
    function openNonAssetForm() { currentAsset = { AssetID: "NON-"+Date.now().toString().slice(-5), isNonumber: true }; closeSearchModal(); openLogModal(currentAsset); }
</script>
</body>
</html>
