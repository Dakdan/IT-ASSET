<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT ASSET - รพ.อุดรธานี</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #fff1f2; }
        .pink-bg { background: linear-gradient(135deg, #be185d 0%, #9d174d 100%); }
    </style>
</head>
<body>

    <header class="pink-bg px-6 py-12 shadow-xl text-white">
        <div class="container mx-auto flex flex-col md:flex-row items-center justify-between gap-6">
            <div>
                <h1 class="text-3xl font-bold italic">IT ASSET DASHBOARD</h1>
                <p class="opacity-90 font-light">ระบบตรวจสอบข้อมูลจริงจากฐานข้อมูลไอที</p>
            </div>
            
            <div class="w-full md:w-80 flex bg-white rounded-2xl p-1 shadow-lg">
                <input type="text" id="inputDepId" placeholder="ระบุ DEP_ID..." 
                    class="w-full px-4 py-2 rounded-xl outline-none text-slate-700">
                <button onclick="searchByDepId()" class="bg-pink-700 text-white px-6 py-2 rounded-xl font-bold hover:bg-pink-800">ไป</button>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 mt-10 pb-20">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            
            <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-pink-100">
                <h2 class="text-pink-700 font-bold border-b pb-4 mb-6 flex items-center gap-2">
                    <span class="w-2 h-6 bg-pink-600 rounded-full"></span> ลำดับความสำคัญ (Priorities)
                </h2>
                <div id="priorityContainer" class="space-y-4">
                    </div>
            </div>

            <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-pink-100">
                <h2 class="text-pink-700 font-bold border-b pb-4 mb-6 flex items-center gap-2">
                    <span class="w-2 h-6 bg-pink-600 rounded-full"></span> ประเภทครุภัณฑ์ (Asset Types)
                </h2>
                <div id="typeContainer" class="space-y-3">
                    </div>
            </div>

        </div>
    </main>

    <script>
        const LOOKUP = {
            priorities: {
                "PIO-001": "ตรวจรักษา (แพทย์)",
                "PIO-002": "ข้อมูลผู้ป่วย (พยาบาล)",
                "PIO-003": "บริการ/การเงิน/ห้องบัตร/ห้องยา/Lab",
                "PIO-004": "งานเอกสาร/ธุรการ",
                "PIO-005": "บริการทั่วไป/ซ่อมบำรุง/ช่างต่างๆ/โรงรถ"
            },
            assetTypes: {
                "COM-001-0001": "เครื่องคอมพิวเตอร์ (All In One)",
                "COM-001-0002": "เครื่องคอมพิวเตอร์ (Case)",
                "COM-001-0003": "จอรับภาพ (Monitor)",
                "UPS-002-0004": "เครื่องสำรองไฟ (UPS)",
                "PRI-003-0005": "เครื่องปริ้นเตอร์ (Printer Lasers)",
                "SCA-004-0006": "เครื่องแสกนเนอร์",
                "CAR-005-0007": "เครื่องอ่านบัตรประชาชน",
                "PRI-003-0008": "เครื่องปริ้นเตอร์ (Thermal)"
            }
        };

        const API_URL = 'https://script.google.com/macros/s/AKfycbznFwIHQsiqqydWSyR7eweKVsfchRyWtbQPZ_ogHma4ZL2X9QnHFb6sqVXvEeXJqwTx/exec';

        window.onload = async () => {
            const res = await fetch(`${API_URL}?action=getGlobalDashboard`);
            const data = await res.json();
            
            // แสดงผล Priorities
            const pArea = document.getElementById('priorityContainer');
            Object.entries(LOOKUP.priorities).forEach(([id, name]) => {
                const count = data.priorityDistribution[name] || 0;
                pArea.innerHTML += `
                    <div class="flex justify-between items-center p-4 bg-pink-50 rounded-2xl border border-pink-100">
                        <span class="text-slate-600 text-sm font-medium">${name}</span>
                        <span class="text-xl font-black text-pink-700">${count}</span>
                    </div>`;
            });

            // แสดงผล Asset Types
            const tArea = document.getElementById('typeContainer');
            Object.entries(LOOKUP.assetTypes).forEach(([id, name]) => {
                const count = data.typeDistribution[name] || 0;
                tArea.innerHTML += `
                    <div class="flex justify-between py-3 border-b border-pink-50 text-sm">
                        <span class="text-slate-500">${name}</span>
                        <span class="font-bold text-slate-800">${count}</span>
                    </div>`;
            });
        };

        function searchByDepId() {
            const id = document.getElementById('inputDepId').value.trim();
            if (id) {
                // ส่งค่า DEP_ID ไปที่ URL ตรงๆ ตามโครงสร้างโครงการ
                window.location.href = `https://dakdan.github.io/IT-ASSET/dept_detail.html?DEP_ID=${id}`;
            }
        }
    </script>
</body>
</html>
