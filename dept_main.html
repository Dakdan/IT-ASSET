<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Asset Audit Dashboard - รพ.อุดรธานี</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary-pink: #be185d; }
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; }
        .pink-gradient { background: linear-gradient(135deg, #9d174d 0%, #be185d 50%, #f472b6 85%); }
        .soft-card { background: white; border-radius: 20px; box-shadow: 0 4px 20px -5px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="text-slate-800">

    <header class="pink-gradient px-6 py-10 shadow-lg text-white">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <img src="https://img2.pic.in.th/-227e4f6f84f29f020.png" class="h-14 bg-white p-1 rounded-xl">
                <div>
                    <h1 class="text-2xl font-bold">Dashboard สรุปผลการตรวจสอบครุภัณฑ์</h1>
                    <p class="text-white/80 font-light text-sm">อ้างอิงข้อมูลจากระบบ IT Asset Audit 2569</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="loadData()" class="bg-white/20 hover:bg-white/30 px-4 py-2 rounded-xl backdrop-blur-md transition-all">
                    <i class="fas fa-sync-alt mr-2"></i>รีเฟรชข้อมูล
                </button>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 -mt-8 pb-20">
        <div id="statsContainer" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            </div>

        <div class="soft-card overflow-hidden">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-white">
                <h3 class="font-bold text-lg"><i class="fas fa-table text-pink-600 mr-2"></i>ตารางสรุปรายการตรวจสอบ</h3>
                <input type="text" id="filterInput" onkeyup="filterTable()" placeholder="ค้นหารหัส/ประเภท/สถานะ..." 
                    class="border border-slate-200 rounded-xl px-4 py-2 text-sm focus:ring-2 focus:ring-pink-500 outline-none w-64">
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 text-[11px] text-slate-400 uppercase tracking-widest border-b">
                            <th class="px-6 py-4 text-center">ลำดับ</th>
                            <th class="px-6 py-4">รหัสครุภัณฑ์</th>
                            <th class="px-6 py-4">ความสำคัญ (Priority)</th>
                            <th class="px-6 py-4">ประเภท (Type)</th>
                            <th class="px-6 py-4 text-center">สถานะ</th>
                            <th class="px-6 py-4 text-center">อายุ (ปี)</th>
                        </tr>
                    </thead>
                    <tbody id="auditTableBody" class="text-[13px] divide-y divide-slate-50">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // ข้อมูลเปรียบเทียบ (Lookup Tables) ตามที่คุณให้มา
        const LOOKUP = {
            priorities: {
                "PIO-001": "ตรวจรักษา (แพทย์)",
                "PIO-002": "ข้อมูลผู้ป่วย (พยาบาล)",
                "PIO-003": "บริการ/การเงิน/ห้องบัตร/ห้องยา/Lab",
                "PIO-004": "งานเอกสาร/ธุรการ",
                "PIO-005": "บริการทั่วไป/ซ่อมบำรุง/ช่างต่างๆ/โรงรถ"
            },
            assetTypes: {
                "COM-001-0001": "เครื่องคอมพิวเตอร์ (All In One)",
                "COM-001-0002": "เครื่องคอมพิวเตอร์ (Case)",
                "COM-001-0003": "จอรับภาพ (Monitor)",
                "UPS-002-0004": "เครื่องสำรองไฟ (UPS)",
                "PRI-003-0005": "เครื่องปริ้นเตอร์ (Printer Lasers)",
                "SCA-004-0006": "เครื่องแสกนเนอร์",
                "CAR-005-0007": "เครื่องอ่านบัตรประชาชน",
                "PRI-003-0008": "เครื่องปริ้นเตอร์ (Thermal)"
            }
        };

        const API_URL = 'https://script.google.com/macros/s/AKfycbznFwIHQsiqqydWSyR7eweKVsfchRyWtbQPZ_ogHma4ZL2X9QnHFb6sqVXvEeXJqwTx/exec';
        let rawData = [];

        window.onload = loadData;

        async function loadData() {
            try {
                // ดึงข้อมูล Dashboard ภาพรวมจาก Code.gs
                const res = await fetch(`${API_URL}?action=getGlobalDashboard`);
                const dashboard = await res.json();
                
                // 1. แสดงตัวเลข Stats
                renderStats(dashboard);

                // 2. ดึง Log ทั้งหมดเพื่อมา Map กับ LOOKUP
                // หมายเหตุ: ใช้ action=getAuditLogs ที่คุณเขียนไว้ใน Code.gs
                const logRes = await fetch(`${API_URL}?action=getAuditLogs&DEP_ID=ALL`);
                rawData = await logRes.json();
                renderTable(rawData);
            } catch (e) {
                console.error("Load Error:", e);
            }
        }

        function renderStats(d) {
            const container = document.getElementById('statsContainer');
            container.innerHTML = `
                <div class="soft-card p-6 border-b-4 border-pink-500">
                    <p class="text-xs text-slate-400 uppercase font-bold">ตรวจสอบแล้วทั้งหมด</p>
                    <h2 class="text-3xl font-black text-slate-800">${d.totalRecords}</h2>
                </div>
                <div class="soft-card p-6 border-b-4 border-emerald-500">
                    <p class="text-xs text-slate-400 uppercase font-bold">สถานะปกติ</p>
                    <h2 class="text-3xl font-black text-emerald-600">${d.statusSummary["ปกติ"] || 0}</h2>
                </div>
                <div class="soft-card p-6 border-b-4 border-amber-500">
                    <p class="text-xs text-slate-400 uppercase font-bold">ไม่ปกติ/รอซ่อม</p>
                    <h2 class="text-3xl font-black text-amber-600">${d.statusSummary["ไม่ปกติ"] || 0}</h2>
                </div>
            `;
        }

        function renderTable(data) {
            const tbody = document.getElementById('auditTableBody');
            tbody.innerHTML = data.map((item, idx) => {
                // --- ทำการ LOOKUP ข้อมูลที่นี่ ---
                const priorityLabel = LOOKUP.priorities[item.Priority] || item.Priority || '-';
                const typeLabel = LOOKUP.assetTypes[item.Asset_Type] || item.Asset_Type || '-';
                
                return `
                    <tr class="hover:bg-pink-50/30 transition-colors">
                        <td class="px-6 py-4 text-center font-mono text-slate-400">${idx + 1}</td>
                        <td class="px-6 py-4 font-bold text-slate-700">${item.Asset_ID || item.NOID}</td>
                        <td class="px-6 py-4 text-pink-700 font-medium">${priorityLabel}</td>
                        <td class="px-6 py-4 text-slate-600">${typeLabel}</td>
                        <td class="px-6 py-4 text-center">
                            <span class="px-3 py-1 rounded-full text-[10px] font-bold ${item.CoStatus === 'ปกติ' ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700'}">
                                ${item.CoStatus || 'ปกติ'}
                            </span>
                        </td>
                        <td class="px-6 py-4 text-center font-bold">${item.DB_Age || 0}</td>
                    </tr>
                `;
            }).join('');
        }

        function filterTable() {
            const q = document.getElementById('filterInput').value.toLowerCase();
            const filtered = rawData.filter(i => 
                String(i.Asset_ID).toLowerCase().includes(q) || 
                (LOOKUP.priorities[i.Priority] || "").toLowerCase().includes(q) ||
                (LOOKUP.assetTypes[i.Asset_Type] || "").toLowerCase().includes(q)
            );
            renderTable(filtered);
        }
    </script>
</body>
</html>
