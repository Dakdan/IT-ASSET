<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT ASSET DASHBOARD - รพ.อุดรธานี</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --pink-primary: #be185d; --pink-light: #fdf2f8; }
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; }
        .pink-gradient { background: linear-gradient(135deg, #9d174d 0%, #be185d 50%, #f472b6 100%); }
        .glass-card { background: white; border-radius: 20px; border: 1px solid rgba(226, 232, 240, 0.8); box-shadow: 0 4px 20px -5px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="text-slate-800">

    <div id="loader" class="fixed inset-0 z-[100] flex items-center justify-center bg-white/90 backdrop-blur-sm">
        <div class="text-center">
            <div class="w-12 h-12 border-4 border-pink-100 border-t-pink-600 rounded-full animate-spin mb-2"></div>
            <p class="text-pink-800 text-sm font-bold">กำลังประมวลผลตามโครงสร้าง LOOKUP...</p>
        </div>
    </div>

    <header class="pink-gradient px-4 py-12 shadow-xl no-print">
        <div class="container mx-auto">
            <div class="flex flex-col md:flex-row items-center justify-between gap-6 mb-10">
                <div class="flex items-center gap-4">
                    <div class="bg-white p-2 rounded-xl"><img src="https://img2.pic.in.th/-227e4f6f84f29f020.png" class="h-10"></div>
                    <div class="text-white">
                        <h1 class="text-2xl font-bold tracking-tight">ระบบตรวจสอบครุภัณฑ์ไอที (DASHBOARD)</h1>
                        <p class="text-white/80 text-sm font-light uppercase tracking-wider">IT Department - Udon Thani Hospital</p>
                    </div>
                </div>
                <div class="w-full md:w-96 relative">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-pink-300"></i>
                    <input type="text" id="deptInput" onkeypress="checkEnter(event)" placeholder="พิมพ์รหัสแผนกเพื่อดูรายละเอียด..." 
                        class="w-full pl-12 pr-4 py-3 rounded-xl border-none outline-none shadow-lg text-slate-700 focus:ring-4 focus:ring-white/20">
                </div>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="bg-white/10 backdrop-blur-md p-5 rounded-2xl border border-white/20 text-white">
                    <p class="text-[10px] font-bold uppercase opacity-80 mb-1">ตรวจสอบแล้ว</p>
                    <h3 id="statTotal" class="text-3xl font-black">0</h3>
                </div>
                <div class="bg-white/10 backdrop-blur-md p-5 rounded-2xl border border-white/20 text-white">
                    <p class="text-[10px] font-bold uppercase opacity-80 mb-1">สถานะปกติ</p>
                    <h3 id="statNormal" class="text-3xl font-black text-emerald-300">0</h3>
                </div>
                <div class="bg-white/10 backdrop-blur-md p-5 rounded-2xl border border-white/20 text-white">
                    <p class="text-[10px] font-bold uppercase opacity-80 mb-1">สถานะชำรุด/ซ่อม</p>
                    <h3 id="statAbnormal" class="text-3xl font-black text-orange-300">0</h3>
                </div>
                <div class="bg-white/10 backdrop-blur-md p-5 rounded-2xl border border-white/20 text-white">
                    <p class="text-[10px] font-bold uppercase opacity-80 mb-1">ในทะเบียน</p>
                    <h3 id="statReg" class="text-3xl font-black text-pink-200">0%</h3>
                </div>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 -mt-8 pb-20">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1 space-y-6">
                <div class="glass-card p-6">
                    <h4 class="font-bold text-slate-700 mb-4 flex items-center gap-2 border-b pb-2 text-sm uppercase">
                        <i class="fas fa-layer-group text-pink-600"></i> แยกตามกลุ่มงาน (Priorities)
                    </h4>
                    <div id="priorityList" class="space-y-3 text-xs">
                        </div>
                </div>

                <div class="glass-card p-6">
                    <h4 class="font-bold text-slate-700 mb-4 flex items-center gap-2 border-b pb-2 text-sm uppercase">
                        <i class="fas fa-desktop text-pink-600"></i> แยกตามประเภท (Asset Types)
                    </h4>
                    <div id="typeList" class="space-y-3 text-xs">
                        </div>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="glass-card overflow-hidden">
                    <div class="px-6 py-4 bg-slate-50 border-b border-slate-100 flex justify-between items-center">
                        <h4 class="font-bold text-slate-700 text-sm">ประวัติการตรวจสอบล่าสุด</h4>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-xs">
                            <thead>
                                <tr class="bg-white text-slate-400 border-b uppercase font-semibold">
                                    <th class="px-6 py-4">รหัสครุภัณฑ์</th>
                                    <th class="px-6 py-4">ประเภท/กลุ่มงาน</th>
                                    <th class="px-6 py-4 text-center">สถานะ</th>
                                </tr>
                            </thead>
                            <tbody id="logTbody" class="divide-y divide-slate-100 italic text-slate-400">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbznFwIHQsiqqydWSyR7eweKVsfchRyWtbQPZ_ogHma4ZL2X9QnHFb6sqVXvEeXJqwTx/exec';
        
        // คัดลอก LOOKUP มาไว้ฝั่ง Client เพื่อแสดงผลชื่อไทยให้ตรงกับ Backend
        const LOOKUP = {
            priorities: {
                "PIO-001": "ตรวจรักษา (แพทย์)",
                "PIO-002": "ข้อมูลผู้ป่วย (พยาบาล)",
                "PIO-003": "บริการ/การเงิน/ห้องบัตร/ห้องยา/Lab",
                "PIO-004": "งานเอกสาร/ธุรการ",
                "PIO-005": "บริการทั่วไป/ซ่อมบำรุง/ช่างต่างๆ/โรงรถ"
            },
            assetTypes: {
                "COM-001-0001": "เครื่องคอมพิวเตอร์ (All In One)",
                "COM-001-0002": "เครื่องคอมพิวเตอร์ (Case)",
                "COM-001-0003": "จอรับภาพ (Monitor)",
                "UPS-002-0004": "เครื่องสำรองไฟ (UPS)",
                "PRI-003-0005": "เครื่องปริ้นเตอร์ (Printer Lasers)",
                "SCA-004-0006": "เครื่องแสกนเนอร์",
                "CAR-005-0007": "เครื่องอ่านบัตรประชาชน",
                "PRI-003-0008": "เครื่องปริ้นเตอร์ (Thermal)"
            }
        };

        window.onload = fetchDashboard;

       async function init() {
            const res = await fetch(`${API_URL}?action=getGlobalDashboard`);
            const data = await res.json();
            
            // Render Priorities
            const pList = document.getElementById('pList');
            Object.entries(LOOKUP.priorities).forEach(([id, name]) => {
                const val = data.priorityStats[name] || 0;
                pList.innerHTML += `<div class="flex justify-between p-3 bg-pink-50 rounded-xl">
                    <span>${name}</span> <span class="font-bold text-pink-700">${val}</span>
                </div>`;
            });

            // Render Asset Types
            const tList = document.getElementById('tList');
            Object.entries(LOOKUP.assetTypes).forEach(([id, name]) => {
                const val = data.typeStats[name] || 0;
                tList.innerHTML += `<div class="flex justify-between py-2 border-b">
                    <span class="text-slate-500">${name}</span> <span class="font-bold">${val}</span>
                </div>`;
            });
        }

        function goToDetail() {
            const id = document.getElementById('targetDep').value.trim();
            if (id) window.location.href = `https://dakdan.github.io/IT-ASSET/dept_detail.html?DEP_ID=${id}`;
        }
    </script>
</body>
</html>
