<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบตรวจสอบครุภัณฑ์คอมพิวเตอร์ - รพ.อุดรธานี</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background: linear-gradient(135deg, #fff5f7 0%, #ffffff 100%);
            min-height: 100vh;
        }
        .pink-gradient { background: linear-gradient(90deg, #db2777 0%, #f472b6 100%); }
        .modal-overlay { background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(4px); }
        .card-shadow { box-shadow: 0 4px 20px rgba(219, 39, 119, 0.08); }
        #reader video { border-radius: 20px; object-fit: cover; }
    </style>
</head>
<body class="text-gray-700">

    <!-- Login Section -->
    <div id="loginPage" class="fixed inset-0 z-[100] bg-white flex items-center justify-center p-4">
        <div class="w-full max-w-md bg-white p-8 rounded-[40px] shadow-2xl text-center border border-pink-50">
            <img src="https://img2.pic.in.th/-227e4f6f84f29f020.png" alt="Logo" class="h-24 w-24 mx-auto mb-6 bg-pink-50 p-2 rounded-full">
            <h2 class="text-2xl font-bold text-pink-600 mb-2">เข้าสู่ระบบ IT Audit</h2>
            <p class="text-gray-400 text-sm mb-8">รพ.อุดรธานี (เชื่อมต่อ Apps Script)</p>
            
            <div class="space-y-4 text-left">
                <div>
                    <label class="text-xs font-bold text-gray-400 uppercase ml-4">Email Address</label>
                    <input type="email" id="email" class="w-full bg-gray-50 border-none rounded-full px-6 py-3 mt-1 focus:ring-2 focus:ring-pink-500 outline-none" placeholder="khowit7@gmail.com">
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-400 uppercase ml-4">Password</label>
                    <input type="password" id="password" class="w-full bg-gray-50 border-none rounded-full px-6 py-3 mt-1 focus:ring-2 focus:ring-pink-500 outline-none" placeholder="••••••••">
                </div>
                <div id="loginMsg" class="text-red-500 text-xs text-center min-h-[1.5rem] font-medium"></div>
                <button onclick="handleLogin()" id="loginBtn" class="w-full pink-gradient text-white font-bold py-4 rounded-full shadow-lg active:scale-95 transition">เข้าสู่ระบบ</button>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div id="mainApp" class="hidden">
        <header class="pink-gradient text-white p-4 shadow-lg rounded-b-[40px]">
            <div class="max-w-6xl mx-auto flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <img id="userAvatar" src="https://img2.pic.in.th/-227e4f6f84f29f020.png" class="h-12 w-12 bg-white rounded-full object-cover">
                    <div class="text-left">
                        <h1 class="text-sm font-bold opacity-80">ระบบตรวจสอบครุภัณฑ์ IT</h1>
                        <p id="userDisplay" class="text-xs font-medium">ยินดีต้อนรับ: ...</p>
                    </div>
                </div>
                <button onclick="handleLogout()" class="text-xs bg-white/20 px-4 py-2 rounded-full">ออก</button>
            </div>
        </header>

        <main class="max-w-6xl mx-auto p-4 md:p-8">
            <section class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                <button onclick="openScanner()" class="flex flex-col items-center justify-center bg-white p-6 rounded-[30px] card-shadow border-b-4 border-pink-500">
                    <span class="text-3xl mb-2">📸</span>
                    <span class="font-bold text-pink-600">สแกน QR</span>
                </button>
                <button onclick="alert('เร็วๆ นี้')" class="flex flex-col items-center justify-center bg-white p-6 rounded-[30px] card-shadow border-b-4 border-blue-500">
                    <span class="text-3xl mb-2">➕</span>
                    <span class="font-bold text-blue-600">นอกระบบ</span>
                </button>
            </section>

            <section class="bg-white rounded-[35px] card-shadow overflow-hidden">
                <div class="p-6 bg-pink-50 border-b border-pink-100 flex flex-col md:flex-row justify-between gap-4">
                    <h2 class="font-bold text-pink-700">ผลการค้นหา</h2>
                    <input type="text" id="searchInput" onkeyup="if(event.key === 'Enter') handleSearch(this.value)" placeholder="เลขครุภัณฑ์ / S/N..." class="text-sm border border-pink-200 rounded-full px-5 py-2 w-full md:w-64">
                </div>
                <div class="overflow-x-auto p-4">
                    <table class="w-full text-sm">
                        <thead class="text-pink-600 font-bold border-b">
                            <tr>
                                <th class="p-4 text-left">รหัสครุภัณฑ์</th>
                                <th class="p-4 text-left">รายการ</th>
                                <th class="p-4 text-center">จัดการ</th>
                            </tr>
                        </thead>
                        <tbody id="assetTableBody">
                            <tr><td colspan="3" class="p-10 text-center text-gray-400">ระบุเลขครุภัณฑ์เพื่อเริ่มการค้นหา...</td></tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <!-- Modals -->
    <div id="scannerModal" class="fixed inset-0 modal-overlay z-50 flex items-center justify-center hidden p-4">
        <div class="bg-white w-full max-w-lg rounded-[40px] p-6 text-center">
            <h3 class="text-pink-600 font-bold mb-4">สแกน QR Code</h3>
            <div id="reader" class="bg-black rounded-3xl overflow-hidden mb-4"></div>
            <button onclick="closeScanner()" class="w-full bg-gray-100 py-3 rounded-full font-bold">ยกเลิก</button>
        </div>
    </div>

    <div id="surveyModal" class="fixed inset-0 modal-overlay z-50 flex items-center justify-center hidden p-4">
        <div class="bg-white w-full max-w-2xl rounded-[40px] shadow-2xl overflow-hidden">
            <div class="pink-gradient p-6 text-white flex justify-between items-center">
                <h3 class="font-bold">แบบฟอร์มตรวจสอบ (Survey)</h3>
                <button onclick="closeModal('surveyModal')" class="text-2xl">×</button>
            </div>
            <div id="surveyFormContent" class="p-8 space-y-6 max-h-[80vh] overflow-y-auto"></div>
        </div>
    </div>

    <!-- Loading -->
    <div id="loadingOverlay" class="fixed inset-0 modal-overlay z-[200] flex flex-col items-center justify-center hidden">
        <div class="bg-white p-8 rounded-[40px] shadow-2xl flex flex-col items-center">
            <div class="animate-spin rounded-full h-10 w-10 border-4 border-pink-500 border-t-transparent mb-4"></div>
            <p id="loadingText" class="text-pink-600 text-xs font-bold tracking-widest">กำลังดำเนินการ...</p>
        </div>
    </div>

    <script>
        // API URLs จาก Code.gs
        const APP_URL = "https://script.google.com/macros/s/AKfycbxWen2TesZqgTrmFVOHmeiqRv9qZPZCgjHC93oSeWGIxoSubocHP7kDdgaz4xVSGie8/exec";
        
        let html5QrCode;
        let currentAsset = null;

        async function handleLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const msg = document.getElementById('loginMsg');
            
            if (!email || !password) {
                msg.innerText = "❌ กรุณากรอกข้อมูลให้ครบ";
                return;
            }

            showLoading(true, "กำลังตรวจสอบสิทธิ์...");
            try {
                const response = await fetch(APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ action: 'login', email, password })
                });
                const result = await response.json();

                if (result.status === 'success') {
                    sessionStorage.setItem('isLoggedIn', 'true');
                    sessionStorage.setItem('userMail', result.userData.email);
                    sessionStorage.setItem('userName', result.userData.name);
                    checkAuth();
                } else {
                    msg.innerText = "❌ " + result.message;
                }
            } catch (e) {
                msg.innerText = "❌ ไม่สามารถเชื่อมต่อ API ได้";
            } finally {
                showLoading(false);
            }
        }

        function checkAuth() {
            if (sessionStorage.getItem('isLoggedIn') === 'true') {
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                document.getElementById('userDisplay').innerText = `ยินดีต้อนรับ: ${sessionStorage.getItem('userName')}`;
            }
        }

        function handleLogout() {
            sessionStorage.clear();
            location.reload();
        }

        async function handleSearch(query) {
            if (!query) return;
            showLoading(true, "กำลังค้นหาครุภัณฑ์...");
            try {
                // อิงตาม action 'searchAsset' ใน doGet
                const res = await fetch(`${APP_URL}?action=searchAsset&query=${encodeURIComponent(query)}`);
                const data = await res.json();
                renderTable(data);
            } catch (e) {
                alert("เกิดข้อผิดพลาดในการค้นหา");
            } finally {
                showLoading(false);
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('assetTableBody');
            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" class="p-10 text-center text-gray-400">ไม่พบข้อมูล...</td></tr>';
                return;
            }
            tbody.innerHTML = data.map(item => `
                <tr class="border-b hover:bg-pink-50 cursor-pointer">
                    <td class="p-4 font-bold text-pink-600">${item.AssetID || '-'}</td>
                    <td class="p-4 text-gray-700">${item.AssetName || '-'}</td>
                    <td class="p-4 text-center">
                        <button onclick='openSurveyModal(${JSON.stringify(item)})' class="bg-pink-500 text-white px-4 py-2 rounded-full text-xs font-bold">สำรวจ</button>
                    </td>
                </tr>
            `).join('');
        }

        async function openSurveyModal(asset) {
            currentAsset = asset;
            const content = document.getElementById('surveyFormContent');
            content.innerHTML = `
                <div class="bg-pink-50 p-6 rounded-3xl flex items-center gap-4 border border-pink-100">
                    <img src="${asset.imageUrl || ''}" onerror="this.src='https://via.placeholder.com/150?text=No+Photo'" class="w-20 h-20 bg-white rounded-2xl object-cover shadow-sm">
                    <div>
                        <p class="text-pink-600 font-bold">${asset.AssetID}</p>
                        <p class="text-xs text-gray-600">${asset.AssetName || '-'}</p>
                        <p class="text-[10px] text-gray-400 uppercase">S/N: ${asset.Serial || '-'}</p>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-gray-400 uppercase">สถานะ (MAStatus)</label>
                        <select id="maStatus" class="w-full border-b-2 py-2 outline-none bg-transparent">
                            <option value="ใช้งานปกติ">ใช้งานปกติ</option>
                            <option value="ชำรุด">ชำรุด</option>
                            <option value="รอซ่อม">รอซ่อม</option>
                        </select>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-gray-400 uppercase">พิกัด GPS</label>
                        <input type="text" id="gpsDisplay" readonly class="w-full border-b-2 py-2 text-pink-500 text-sm italic" value="กำลังระบุพิกัด...">
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-gray-400 uppercase">หมายเหตุ (Note1)</label>
                    <textarea id="note1" class="w-full border-2 border-gray-50 rounded-2xl p-4 outline-none focus:border-pink-200" rows="2" placeholder="ระบุรายละเอียด..."></textarea>
                </div>
                <button onclick="submitSurvey()" class="w-full pink-gradient text-white font-bold py-4 rounded-full shadow-lg active:scale-95 transition">บันทึกข้อมูลการสำรวจ</button>
            `;
            document.getElementById('surveyModal').classList.remove('hidden');
            
            try {
                const pos = await new Promise((res, rej) => {
                    navigator.geolocation.getCurrentPosition(res, rej, { enableHighAccuracy: true });
                });
                document.getElementById('gpsDisplay').value = `${pos.coords.latitude},${pos.coords.longitude}`;
            } catch (e) {
                document.getElementById('gpsDisplay').value = "ไม่พบพิกัด";
            }
        }

        async function submitSurvey() {
            showLoading(true, "กำลังบันทึกข้อมูล...");
            
            // เตรียมข้อมูลตามฟังก์ชัน saveSurveyData ใน Code.gs
            const payload = {
                action: 'saveSurvey',
                data: {
                    Asset_NO: currentAsset.No || "",      // อ้างอิงลำดับใน Sheet Asset_DB
                    NOID: currentAsset.NOID || "",
                    Asset_ID: currentAsset.AssetID,
                    Serial: currentAsset.Serial,
                    Asset_Type_ID: currentAsset.AssetTypeID || "",
                    Detail_ID: currentAsset.DetailID || "",
                    DEPT_ID: currentAsset.DeptID || "",
                    Job_Type_ID: "SURVEY-2024",           // ค่าคงที่ตัวอย่าง
                    PIORITY_ID: "PIO-001",               // ค่าคงที่ตัวอย่าง
                    MAStatus: document.getElementById('maStatus').value,
                    CoStatus: "PENDING",                  // ค่าคงที่ตัวอย่าง
                    Shift_Work: "เช้า",                   // ค่าคงที่ตัวอย่าง
                    IT_User_Mail: sessionStorage.getItem('userMail'),
                    IMAGE_NAME: currentAsset.AssetID + ".jpg",
                    Asset_Gps: document.getElementById('gpsDisplay').value,
                    Activity_ID: "ACT-" + Date.now(),
                    Action_ID: "LOG-" + Date.now(),
                    Note1: document.getElementById('note1').value,
                    S_ON_OUT: "IN_SYSTEM"
                }
            };

            try {
                const res = await fetch(APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify(payload)
                });
                const result = await res.json();
                if (result.status === 'success') {
                    alert("✅ บันทึกสำเร็จ: " + result.message);
                    closeModal('surveyModal');
                    handleSearch(currentAsset.AssetID); // Refresh data
                }
            } catch (e) {
                alert("❌ บันทึกล้มเหลว");
            } finally {
                showLoading(false);
            }
        }

        function openScanner() {
            document.getElementById('scannerModal').classList.remove('hidden');
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (text) => {
                let id = text.includes("/") ? text.split("/").pop() : text;
                closeScanner();
                handleSearch(id);
            });
        }

        function closeScanner() {
            if(html5QrCode) html5QrCode.stop().finally(() => document.getElementById('scannerModal').classList.add('hidden'));
            else document.getElementById('scannerModal').classList.add('hidden');
        }

        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function showLoading(show, text) { 
            document.getElementById('loadingText').innerText = text;
            document.getElementById('loadingOverlay').classList.toggle('hidden', !show); 
        }

        window.onload = checkAuth;
    </script>
</body>
</html>
