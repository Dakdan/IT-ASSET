<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Audit Dashboard - UDH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; }
        .pink-gradient { background: linear-gradient(135deg, #ec4899 0%, #be185d 100%); }
        .spec-text { display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; font-size: 11px; }
        .modal-enter { animation: modalSlideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes modalSlideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .building-card { transition: all 0.3s ease; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-slate-700 pb-10">

    <nav class="bg-white sticky top-0 z-40 border-b border-slate-200 px-4 py-4 shadow-sm">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 pink-gradient rounded-xl flex items-center justify-center shadow-md">
                    <img src="https://img2.pic.in.th/-227e4f6f84f29f020.png" class="w-6 h-6 brightness-110" alt="Logo">
                </div>
                <div>
                    <h1 class="text-md font-bold text-slate-800 leading-tight">IT ASSET AUDIT</h1>
                    <p class="text-[9px] text-pink-500 font-bold uppercase tracking-wider">Udonthani Hospital</p>
                </div>
            </div>
            <div id="lastUpdate" class="text-[10px] text-slate-400 font-medium bg-slate-50 px-3 py-1 rounded-full">กำลังโหลดข้อมูล...</div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 mt-8">
        <div class="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-4">
            <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                <span class="w-1.5 h-6 pink-gradient rounded-full"></span>
                สรุปผลการตรวจสอบรายอาคาร
            </h2>
            <input type="text" id="searchInput" oninput="renderDashboard()" placeholder="ค้นหาหน่วยงาน/อาคาร..." 
                   class="w-full md:w-72 bg-white border border-slate-200 rounded-xl px-4 py-2 text-sm outline-none focus:ring-2 ring-pink-500/20">
        </div>

        <div id="dashboardContent" class="space-y-8">
            <!-- ข้อมูลจะถูกเติมที่นี่ในรูปแบบ Group by Building > Floor -->
        </div>
    </main>

    <!-- Modal: Dept Detail -->
    <div id="modalDept" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-sm hidden p-4">
        <div class="bg-white w-full max-w-4xl rounded-3xl shadow-2xl overflow-hidden modal-enter flex flex-col max-h-[90vh]">
            <!-- Header & Dept Info (แสดงบนสุด) -->
            <div class="p-6 border-b border-slate-100 bg-slate-50/80">
                <div class="flex justify-between items-start">
                    <div class="flex gap-5 items-center">
                        <div id="mDeptPic" class="w-20 h-20 rounded-2xl bg-white border-2 border-white flex items-center justify-center overflow-hidden shadow-lg">
                             <img src="" class="w-full h-full object-cover">
                        </div>
                        <div>
                            <span class="text-[10px] font-bold text-pink-500 uppercase tracking-widest bg-pink-50 px-2 py-0.5 rounded mb-1 inline-block">ข้อมูลหน่วยงาน</span>
                            <h3 id="mDeptName" class="text-2xl font-bold text-slate-800 tracking-tight">ชื่อหน่วยงาน</h3>
                            <div class="flex flex-wrap gap-x-6 gap-y-1 mt-2">
                                <p id="mDeptLoc" class="text-sm text-slate-500 flex items-center gap-1.5 font-medium">
                                    <svg class="w-4 h-4 text-pink-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                                    ที่ตั้ง
                                </p>
                                <p id="mDeptTel" class="text-sm text-slate-500 flex items-center gap-1.5 font-medium">
                                    <svg class="w-4 h-4 text-pink-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
                                    โทร: -
                                </p>
                            </div>
                        </div>
                    </div>
                    <button onclick="closeModal()" class="p-2.5 bg-white rounded-full text-slate-400 hover:text-pink-600 shadow-sm border border-slate-100 hover:border-pink-100 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                    </button>
                </div>
            </div>
            
            <!-- Asset Lists Grouped by Category -->
            <div class="p-6 overflow-y-auto flex-1 bg-white">
                <div id="mAssetGroupContainer" class="space-y-8">
                    <!-- รายการครุภัณฑ์แยกประเภทจะถูกเติมที่นี่ -->
                </div>
            </div>

            <div class="p-5 border-t border-slate-100 text-center bg-slate-50/50">
                <button onclick="closeModal()" class="px-12 py-3 pink-gradient text-white rounded-2xl text-sm font-bold shadow-lg shadow-pink-500/20 active:scale-95 transition-transform">ปิดหน้าต่าง</button>
            </div>
        </div>
    </div>

    <script>
        const APP_URL = "https://script.google.com/macros/s/AKfycbwb_1Yppy3h_hy4dX1RkN3-l_YKKlC3FWKewmzCHM-q6SHrlbxsm-U-SGMUj1mYXwkMuQ/exec";
        let state = { logs: [], depts: [], assetTypes: [] };

        async function init() {
            try {
                const ts = new Date().getTime();
                const [logRes, deptRes, initRes] = await Promise.all([
                    fetch(`${APP_URL}?action=getAuditLogs&_=${ts}`).then(r => r.json()),
                    fetch(`${APP_URL}?action=getDeptList&_=${ts}`).then(r => r.json()),
                    fetch(`${APP_URL}?action=getInitialData&_=${ts}`).then(r => r.json())
                ]);
                state.logs = logRes || [];
                state.depts = deptRes || [];
                state.assetTypes = initRes.assetTypes || [];
                document.getElementById('lastUpdate').innerText = "อัปเดต: " + new Date().toLocaleTimeString('th-TH');
                renderDashboard();
            } catch (err) {
                console.error(err);
            }
        }

        function renderDashboard() {
            const container = document.getElementById('dashboardContent');
            const search = document.getElementById('searchInput').value.toLowerCase();
            
            const auditDeptIds = [...new Set(state.logs.map(l => String(l.DEPT_ID).trim()))];
            const filteredDepts = state.depts.filter(d => 
                auditDeptIds.includes(String(d.DEP_ID).trim()) &&
                (d.DEPNAME.toLowerCase().includes(search) || d.BUILDING.toLowerCase().includes(search))
            );

            const grouped = {};
            filteredDepts.forEach(d => {
                if (!grouped[d.BUILDING]) grouped[d.BUILDING] = {};
                if (!grouped[d.BUILDING][d.FL]) grouped[d.BUILDING][d.FL] = [];
                grouped[d.BUILDING][d.FL].push(d);
            });

            if (Object.keys(grouped).length === 0) {
                container.innerHTML = `<div class="text-center py-20 text-slate-400 font-light"> ไม่พบข้อมูลที่ค้นหา </div>`;
                return;
            }

            container.innerHTML = Object.keys(grouped).sort().map(building => `
                <div class="building-section">
                    <h3 class="text-sm font-bold text-pink-600 mb-4 flex items-center gap-2">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M10.394 2.08a1 1 0 00-.788 0l-7 3a1 1 0 000 1.84L5.25 8.051a.999.999 0 01.356-.257l4-1.714a1 1 0 11.788 1.838L7.667 9.088l1.94.831a1 1 0 00.787 0l7-3a1 1 0 000-1.838l-7-3zM3.31 9.397L5 10.12v4.102a8.969 8.969 0 00-1.05-.174 1 1 0 01-.89-.89 11.115 11.115 0 01.25-3.762zM9.3 16.573A9.026 9.026 0 007 14.935v-3.957l1.818.78a3 3 0 002.364 0l5.508-2.361a11.026 11.026 0 01.25 3.762 1 1 0 01-.89.89 8.968 8.968 0 00-5.35 2.524 1 1 0 01-1.4 0z"></path></svg>
                        ${building}
                    </h3>
                    <div class="space-y-6">
                        ${Object.keys(grouped[building]).sort((a,b) => a-b).map(floor => `
                            <div class="bg-white rounded-2xl p-4 border border-slate-100 shadow-sm">
                                <div class="flex items-center gap-2 mb-4">
                                    <span class="text-[10px] font-bold bg-slate-100 text-slate-500 px-2 py-0.5 rounded uppercase tracking-wider">ชั้น ${floor}</span>
                                    <div class="h-px bg-slate-50 flex-1"></div>
                                </div>
                                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                    ${grouped[building][floor].map(dept => {
                                        const deptLogs = state.logs.filter(l => String(l.DEPT_ID).trim() === String(dept.DEP_ID).trim());
                                        const count = deptLogs.length;
                                        const typeCounts = {};
                                        deptLogs.forEach(l => {
                                            const type = state.assetTypes.find(t => String(t.id).trim() === String(l.Asset_Type_ID).trim());
                                            const name = type ? type.name.split(' ')[0] : 'อื่นๆ';
                                            typeCounts[name] = (typeCounts[name] || 0) + 1;
                                        });

                                        // เปลี่ยนมาดึงรูปจาก Google Drive ตาม PIC_ID (ที่เก็บ NOTE1 มา)
                                        const deptImgUrl = dept.PIC_ID ? `https://lh3.googleusercontent.com/d/${dept.PIC_ID}` : `https://placehold.co/100x100?text=${dept.DEPNAME.substring(0,1)}`;

                                        return `
                                        <div onclick="showDetail('${dept.DEP_ID}')" class="p-4 rounded-2xl border border-slate-50 hover:border-pink-200 hover:bg-pink-50/20 transition-all cursor-pointer group bg-slate-50/40 relative overflow-hidden shadow-sm hover:shadow-md">
                                            <div class="flex gap-4 items-start relative z-10">
                                                <div class="w-14 h-14 rounded-xl bg-white border border-slate-100 flex-shrink-0 flex items-center justify-center overflow-hidden shadow-sm group-hover:scale-105 transition-transform">
                                                     <img src="${deptImgUrl}" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/100x100?text=${dept.DEPNAME.substring(0,1)}'">
                                                </div>
                                                <div class="flex-1 min-w-0">
                                                    <div class="flex justify-between items-center mb-1">
                                                        <h4 class="text-sm font-bold text-slate-700 group-hover:text-pink-700 truncate">${dept.DEPNAME}</h4>
                                                        <span class="text-xs font-black text-pink-500 ml-2">${count}</span>
                                                    </div>
                                                    <div class="flex flex-wrap gap-1 mt-2 hide-scrollbar">
                                                        ${Object.entries(typeCounts).map(([name, val]) => `
                                                            <span class="text-[9px] bg-white border border-slate-100 text-slate-400 px-1.5 py-0.5 rounded-md font-medium">
                                                                ${name}: ${val}
                                                            </span>
                                                        `).join('')}
                                                    </div>
                                                </div>
                                            </div>
                                        </div>`;
                                    }).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function showDetail(deptId) {
            const dept = state.depts.find(d => String(d.DEP_ID).trim() === String(deptId).trim());
            const deptLogs = state.logs.filter(l => String(l.DEPT_ID).trim() === String(deptId).trim());
            
            document.getElementById('mDeptName').innerText = dept.DEPNAME;
            document.getElementById('mDeptLoc').innerText = `${dept.BUILDING} ชั้น ${dept.FL}`;
            document.getElementById('mDeptTel').innerText = `โทร: ${dept.PIC_ID_PHONE || '-'}`; // เปลี่ยนมาใช้เบอร์โทรหากมี
            
            const deptPicImg = document.getElementById('mDeptPic').querySelector('img');
            deptPicImg.src = dept.PIC_ID ? `https://lh3.googleusercontent.com/d/${dept.PIC_ID}` : `https://placehold.co/100x100?text=${dept.DEPNAME.substring(0,2)}`;

            const groupedAssets = {};
            deptLogs.forEach(a => {
                const type = state.assetTypes.find(t => String(t.id).trim() === String(a.Asset_Type_ID).trim());
                const typeName = type ? type.name : 'อื่น ๆ / ไม่ระบุประเภท';
                if (!groupedAssets[typeName]) groupedAssets[typeName] = [];
                groupedAssets[typeName].push(a);
            });

            const container = document.getElementById('mAssetGroupContainer');
            if (deptLogs.length === 0) {
                container.innerHTML = `<div class="text-center py-10 text-slate-400 italic">ไม่พบประวัติการตรวจสอบ</div>`;
            } else {
                container.innerHTML = Object.keys(groupedAssets).sort().map(cat => `
                    <div class="category-block">
                        <h4 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                            <span class="w-1 h-3 bg-pink-500 rounded-full"></span>
                            ${cat} (${groupedAssets[cat].length})
                        </h4>
                        <div class="grid grid-cols-1 gap-4">
                            ${groupedAssets[cat].map(a => `
                                <div class="flex gap-4 p-4 bg-slate-50 rounded-2xl border border-slate-100 items-start hover:bg-white hover:shadow-md transition-all">
                                    <div class="w-20 h-20 bg-white rounded-xl border border-slate-200 flex-shrink-0 overflow-hidden shadow-sm">
                                        <img src="${a.ASSET_IMG_DB ? 'https://lh3.googleusercontent.com/d/' + a.ASSET_IMG_DB : 'https://placehold.co/100x100?text=NO+IMG'}" class="w-full h-full object-cover">
                                    </div>
                                    <div class="flex-1 min-w-0">
                                        <div class="flex justify-between items-start mb-1">
                                            <span class="text-[10px] font-bold text-pink-600 bg-pink-50 px-2 py-0.5 rounded border border-pink-100 uppercase leading-none">ID: ${a.NOID}</span>
                                            <span class="text-[9px] font-bold text-slate-400">อายุ: ${a.ASSET_AGE} ปี</span>
                                        </div>
                                        <h5 class="text-sm font-bold text-slate-800 leading-tight truncate">${a.Asset_ID}</h5>
                                        <p class="text-[10px] text-slate-400 mb-2">Serial: ${a.Serial || '-'}</p>
                                        <div class="bg-white/60 p-2 rounded-xl border border-slate-100 shadow-inner">
                                             <p class="spec-text text-slate-500 leading-normal">${a.SPEC_DETAIL}</p>
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `).join('');
            }
            document.getElementById('modalDept').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('modalDept').classList.add('hidden'); }
        window.onload = init;
    </script>
</body>
</html>
