<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Audit System - UDH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f1f5f9; }
        .pink-gradient { background: linear-gradient(135deg, #ec4899 0%, #be185d 100%); }
        .blue-gradient { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); }
        .signature-pad { border: 2px dashed #cbd5e1; border-radius: 1rem; background: #fff; cursor: crosshair; }
        .custom-shadow { box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.04); }
        .tab-active { border-bottom: 4px solid #ec4899; color: #ec4899; }
    </style>
</head>
<body class="text-slate-700 pb-20">

    <nav class="bg-white sticky top-0 z-40 border-b border-slate-200 px-4 py-3 shadow-sm">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 pink-gradient rounded-xl flex items-center justify-center shadow-lg">
                    <img src="https://img2.pic.in.th/-227e4f6f84f29f020.png" class="w-7 h-7 brightness-110" alt="Logo">
                </div>
                <div>
                    <h1 class="text-sm font-bold text-slate-800 leading-tight">IT ASSET AUDIT</h1>
                    <p class="text-[10px] text-pink-500 font-medium uppercase tracking-widest">Udon Thani Hospital</p>
                </div>
            </div>
            <div class="flex bg-slate-100 p-1 rounded-xl">
                <button onclick="switchTab('dashboard')" id="btn-dashboard" class="px-4 py-2 text-xs font-bold rounded-lg transition-all tab-active">หน้าหลัก</button>
                <button onclick="switchTab('survey')" id="btn-survey" class="px-4 py-2 text-xs font-bold rounded-lg transition-all text-slate-500">บันทึกข้อมูล</button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 mt-6">
        
        <div id="view-dashboard" class="space-y-6">
            <div id="statsContainer" class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="bg-white p-5 rounded-[2rem] custom-shadow animate-pulse">
                    <div class="w-8 h-8 bg-slate-100 rounded-lg mb-3"></div>
                    <div class="h-4 bg-slate-100 w-2/3 rounded mb-2"></div>
                    <div class="h-6 bg-slate-100 w-1/2 rounded"></div>
                </div>
            </div>

            <div class="bg-white rounded-[2.5rem] custom-shadow overflow-hidden border border-slate-100">
                <div class="p-6 border-b border-slate-50 flex flex-col md:flex-row md:items-center justify-between gap-4">
                    <h2 class="text-lg font-bold flex items-center gap-2 text-slate-800">
                        <span class="w-2 h-6 pink-gradient rounded-full"></span>
                        รายการที่ดำเนินการเสร็จแล้ว (กรุปตามตึก/ชั้น)
                    </h2>
                    <div class="relative w-full md:w-72">
                        <input type="text" id="tableSearch" oninput="filterTable()" placeholder="ค้นหาชื่อหน่วยงาน..." 
                               class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-4 py-2.5 text-sm outline-none focus:ring-2 ring-pink-100">
                    </div>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-slate-50 text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                            <tr>
                                <th class="px-6 py-4">อาคาร / ชั้น</th>
                                <th class="px-6 py-4">หน่วยงาน</th>
                                <th class="px-6 py-4">สถานะการสำรวจ</th>
                                <th class="px-6 py-4 text-center">จัดการ</th>
                            </tr>
                        </thead>
                        <tbody id="logsTableBody" class="text-sm divide-y divide-slate-50"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="view-survey" class="hidden space-y-6">
            <div class="bg-white p-8 rounded-[2.5rem] custom-shadow border border-slate-100">
                <h3 class="text-md font-bold mb-6 flex items-center gap-2 text-blue-600">
                    <span class="w-8 h-8 rounded-full bg-blue-50 flex items-center justify-center text-xs">1</span>
                    เลือกหน่วยงานเพื่อเริ่มสำรวจ
                </h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">เลือกอาคาร (Building)</label>
                        <select id="surveyBuilding" onchange="loadFloorsForSurvey()" class="w-full bg-slate-50 p-4 rounded-2xl text-sm border-2 border-transparent focus:border-blue-200 outline-none transition-all"></select>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">เลือกชั้น (Floor)</label>
                        <select id="surveyFloor" onchange="loadDeptsForSurvey()" class="w-full bg-slate-50 p-4 rounded-2xl text-sm border-2 border-transparent focus:border-blue-200 outline-none transition-all"></select>
                    </div>
                </div>
                <div id="deptSelectionGrid" class="grid grid-cols-1 md:grid-cols-3 gap-3 mt-8"></div>
            </div>

            <div id="assetSearchContainer" class="hidden bg-white p-8 rounded-[2.5rem] custom-shadow border border-slate-100">
                <div class="flex items-center justify-between mb-6">
                    <h3 class="text-md font-bold flex items-center gap-2 text-pink-600">
                        <span class="w-8 h-8 rounded-full bg-pink-50 flex items-center justify-center text-xs">2</span>
                        ตรวจสอบ/เพิ่มข้อมูลครุภัณฑ์
                    </h3>
                    <div id="activeDeptBadge" class="bg-slate-800 text-white px-4 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-wider">---</div>
                </div>
                <input type="text" id="assetSearchInput" oninput="handleAssetLiveSearch(this.value)" placeholder="ค้นหาด้วยรหัสครุภัณฑ์ หรือชื่อรายการ..." 
                       class="w-full bg-slate-50 border-2 border-transparent focus:border-pink-200 rounded-3xl px-6 py-5 outline-none text-sm font-medium">
                <div id="assetSearchResults" class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-6"></div>
            </div>
        </div>
    </main>

    <div id="loading" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/40 backdrop-blur-sm hidden">
        <div class="bg-white p-8 rounded-[2rem] text-center shadow-2xl">
            <div class="animate-spin rounded-full h-10 w-10 border-4 border-pink-500 border-t-transparent mx-auto mb-4"></div>
            <p class="text-xs font-bold text-slate-500 tracking-widest uppercase">กำลังโหลดข้อมูล...</p>
        </div>
    </div>

    <script>
        const APP_URL = "https://script.google.com/macros/s/AKfycbxWen2TesZqgTrmFVOHmeiqRv9qZPZCgjHC93oSeWGIxoSubocHP7kDdgaz4xVSGie8/exec";
        let masterData = null;

        async function initApp() {
            toggleLoading(true);
            try {
                const res = await fetch(`${APP_URL}?action=getInitialData`);
                masterData = await res.json();
                renderDashboard();
                renderLogsTable();
                setupSurveyFilters();
            } catch (e) { console.error(e); } 
            finally { toggleLoading(false); }
        }

        function renderDashboard() {
            const container = document.getElementById('statsContainer');
            if (!masterData.dashboard) return;
            container.innerHTML = masterData.dashboard.map(stat => `
                <div class="bg-white p-5 rounded-[2rem] custom-shadow border-b-4 border-b-pink-400">
                    <div class="w-10 h-10 bg-pink-50 rounded-xl flex items-center justify-center text-pink-500 mb-3 font-bold text-xs">${stat.typeId}</div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">${stat.typeName}</p>
                    <h3 class="text-2xl font-bold text-slate-800">${stat.count} <span class="text-xs font-normal text-slate-400">รายการ</span></h3>
                </div>
            `).join('');
        }

        function renderLogsTable() {
            const tbody = document.getElementById('logsTableBody');
            if (!masterData.recentLogs) return;
            tbody.innerHTML = masterData.recentLogs.map(log => `
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="px-6 py-4">
                        <div class="flex flex-col">
                            <span class="font-bold text-slate-700">${log.building}</span>
                            <span class="text-[10px] text-slate-400 uppercase">ชั้น ${log.floor}</span>
                        </div>
                    </td>
                    <td class="px-6 py-4 font-medium text-slate-600">${log.deptName}</td>
                    <td class="px-6 py-4">
                        <span class="bg-green-50 text-green-600 px-3 py-1 rounded-full text-xs font-bold">${log.assetCount} รายการเสร็จสิ้น</span>
                    </td>
                    <td class="px-6 py-4 text-center">
                        <button class="bg-slate-100 hover:bg-pink-500 hover:text-white px-4 py-2 rounded-xl text-xs font-bold transition">ตรวจสอบข้อมูล</button>
                    </td>
                </tr>
            `).join('');
        }

        function setupSurveyFilters() {
            const bSelect = document.getElementById('surveyBuilding');
            const buildings = Object.keys(masterData.buildingMap || {});
            bSelect.innerHTML = '<option value="">-- เลือกอาคาร --</option>' + 
                buildings.map(b => `<option value="${b}">${b}</option>`).join('');
        }

        function loadFloorsForSurvey() {
            const b = document.getElementById('surveyBuilding').value;
            const fSelect = document.getElementById('surveyFloor');
            if(!b) { fSelect.innerHTML = ''; return; }
            const floors = Object.keys(masterData.buildingMap[b]);
            fSelect.innerHTML = '<option value="">-- เลือกชั้น --</option>' + 
                floors.map(f => `<option value="${f}">ชั้น ${f}</option>`).join('');
        }

        function loadDeptsForSurvey() {
            const b = document.getElementById('surveyBuilding').value;
            const f = document.getElementById('surveyFloor').value;
            const container = document.getElementById('deptSelectionGrid');
            if(!b || !f) return;
            const depts = masterData.buildingMap[b][f] || [];
            container.innerHTML = depts.map(d => `
                <div onclick="selectDeptForSurvey('${d.id}', '${d.name}')" 
                     class="p-4 bg-white border border-slate-100 rounded-2xl hover:border-blue-400 hover:bg-blue-50 cursor-pointer transition-all custom-shadow">
                    <p class="text-xs font-bold text-slate-700">${d.name}</p>
                </div>
            `).join('');
        }

        function selectDeptForSurvey(id, name) {
            document.getElementById('activeDeptBadge').innerText = name;
            document.getElementById('assetSearchContainer').classList.remove('hidden');
        }

        function switchTab(tab) {
            const isDash = tab === 'dashboard';
            document.getElementById('view-dashboard').classList.toggle('hidden', !isDash);
            document.getElementById('view-survey').classList.toggle('hidden', isDash);
            document.getElementById('btn-dashboard').className = `px-4 py-2 text-xs font-bold rounded-lg transition-all ${isDash ? 'tab-active' : 'text-slate-500'}`;
            document.getElementById('btn-survey').className = `px-4 py-2 text-xs font-bold rounded-lg transition-all ${!isDash ? 'tab-active' : 'text-slate-500'}`;
        }

        function toggleLoading(s) { document.getElementById('loading').classList.toggle('hidden', !s); }
        window.onload = initApp;
    </script>
</body>
</html>
