<!DOCTYPE html>
<html>
  <head>
    <title>GPS Map Viewer</title>
    <script src="<iframe src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d239.93096625444014!2d102.78317392857615!3d17.415706115500342!2m3!1f270.7031250000003!2f57.49179041621857!3f0!3m2!1i1024!2i768!4f35!5e1!3m2!1sth!2sth!4v1773760047761!5m2!1sth!2sth" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>"></script>
    <style>
      /* กำหนดขนาดแผนที่ */
      #map { height: 600px; width: 100%; border-radius: 8px; }
    </style>
  </head>
  <body>
    <h2>ระบบแสดงพิกัด GPS จากไฟล์ GeoJSON</h2>
    <div id="map"></div>

    <script>
      function initMap() {
        // 2. ตั้งค่าจุดกึ่งกลางแผนที่ (เช่น พิกัดโรงพยาบาล)
        const centerCoords = { lat: 17.4075, lng: 102.8127 };
        const map = new google.maps.Map(document.getElementById("map"), {
          zoom: 14,
          center: centerCoords,
          mapTypeId: 'terrain' // หรือ 'hybrid' สำหรับภาพดาวเทียม
        });

        // 3. คำสั่งสำคัญ: โหลดไฟล์ .geojson มาแสดงผล
        // ถ้าไฟล์ชื่อ data.geojson อยู่ในโฟลเดอร์เดียวกัน ให้ใส่ชื่อไฟล์ได้เลย
        map.data.loadGeoJson('location_map.geojson');

        // 4. ตกแต่งสีของจุดพิกัด (Optional)
        map.data.setStyle({
          fillColor: 'blue',
          strokeWeight: 1,
          icon: 'https://maps.google.com/mapfiles/ms/icons/red-dot.png'
        });
      }

      // เรียกใช้งานฟังก์ชันเมื่อโหลดหน้าเว็บเสร็จ
      window.onload = initMap;
    </script>
  </body>
</html>
