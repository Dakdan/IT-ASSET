<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>IT Asset Survey UDH - Dashboard & Reports</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --pink-main: #ec4899;
            --slate-body: #f8fafc;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: var(--slate-body);
            min-height: 100vh;
        }

        .main-nav-head {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 3px solid var(--pink-main);
        }

        .search-input-box {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.05);
            border: 2px solid #e2e8f0;
            display: flex;
            align-items: center;
            transition: all 0.3s ease;
        }

        .search-input-box:focus-within { border-color: var(--pink-main); }

        .building-container {
            background: white;
            border-radius: 2.5rem;
            border: 2px solid #e2e8f0;
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            margin-bottom: 3rem;
        }

        .building-header {
            background: #fff;
            padding: 2rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #f1f5f9;
        }

        .pink-gradient {
            background: linear-gradient(135deg, #ec4899 0%, #be185d 100%);
        }

        .header-gradient {
            background: linear-gradient(135deg, #f472b6 0%, #db2777 100%);
        }

        .floor-wrapper {
            border-radius: 2rem;
            padding: 2rem;
            margin-bottom: 2rem;
            border-width: 2px;
            border-style: solid;
        }

        .dept-card {
            background: white;
            border-radius: 1.5rem;
            border-width: 2px;
            border-style: solid;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
        }

        .dept-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            border-color: var(--pink-main) !important;
        }

        .soft-card {
            border: 2px solid #f1f5f9;
            border-radius: 2rem;
            transition: all 0.3s ease;
        }

        .view-controls {
            display: flex;
            background: #f1f5f9;
            padding: 0.25rem;
            border-radius: 1rem;
            gap: 0.25rem;
        }
        
        .view-btn-main {
            padding: 0.5rem 1rem;
            border-radius: 0.75rem;
            font-size: 0.75rem;
            font-weight: 700;
            transition: all 0.2s;
            color: #64748b;
        }
        
        .view-btn-main.active {
            background: white;
            color: var(--pink-main);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        
        .main-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 0.5rem;
        }
        
        .main-table th {
            background: #f8fafc;
            padding: 1.25rem 1rem;
            text-align: left;
            font-size: 0.75rem;
            font-weight: 800;
            color: #64748b;
            text-transform: uppercase;
            border-bottom: 2px solid #e2e8f0;
        }
        
        .main-table tr.dept-row td {
            background: white;
            padding: 1.25rem 1rem;
            border-top: 2px solid #f1f5f9;
            border-bottom: 2px solid #f1f5f9;
            vertical-align: middle;
        }

        .main-table tr.dept-row td:first-child {
            border-left: 2px solid #f1f5f9;
            border-top-left-radius: 1rem;
            border-bottom-left-radius: 1rem;
        }

        .main-table tr.dept-row td:last-child {
            border-right: 2px solid #f1f5f9;
            border-top-right-radius: 1rem;
            border-bottom-right-radius: 1rem;
        }

        .main-table tr.dept-row:hover td {
            border-color: #f9a8d4;
            background: #fffdf9;
        }

        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* Modal & Print Styles */
        @media print {
            body * { visibility: hidden; }
            #reportPrintArea, #reportPrintArea * { visibility: visible; }
            #reportPrintArea { position: absolute; left: 0; top: 0; width: 100%; }
            .no-print { display: none !important; }
        }

        #modalDept.flex, #modalReport.flex { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .report-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        .report-table th, .report-table td {
            border: 1px solid #e2e8f0;
            padding: 8px;
            text-align: left;
        }
        .report-table th { background: #f8fafc; font-weight: bold; }
        .row-group-header { background-color: #f1f5f9; font-weight: 800; color: #1e293b; }
        .row-sub-total { background-color: #f8fafc; font-weight: 700; color: #ec4899; }
    </style>
</head>

 <script>
        const APP_URL = "https://script.google.com/macros/s/AKfycbwb_1Yppy3h_hy4dX1RkN3-l_YKKlC3FWKewmzCHM-q6SHrlbxsm-U-SGMUj1mYXwkMuQ/exec";
        let state = { logs: [], depts: [], assetTypes: [], priorities: [] };
        let mainDisplayMode = 'grid';
        let filters = { building: '', floor: '', deptName: '', priority: [], assetType: [], age: [] };

        async function init() {
            const icon = document.getElementById('refreshIcon');
            icon?.classList.add('animate-spin');
            try {
                const ts = new Date().getTime();
                const [logRes, deptRes, initRes] = await Promise.all([
                    fetch(`${APP_URL}?action=getAuditLogs&_=${ts}`).then(r => r.json()),
                    fetch(`${APP_URL}?action=getDeptList&_=${ts}`).then(r => r.json()),
                    fetch(`${APP_URL}?action=getInitialData&_=${ts}`).then(r => r.json())
                ]);
                state.logs = Array.isArray(logRes) ? logRes : [];
                state.depts = Array.isArray(deptRes) ? deptRes : [];
                state.assetTypes = initRes.assetTypes || [];
                state.priorities = initRes.priorities || [];
                document.getElementById('lastUpdate').innerText = `SYNCED: ${new Date().toLocaleTimeString('th-TH')}`;
                
                setupModalFilters();
                renderDashboard();
            } catch (err) { console.error(err); } finally { icon?.classList.remove('animate-spin'); }
        }

        function setupModalFilters() {
            const bSelect = document.getElementById('fBuilding');
            const buildings = [...new Set(state.depts.map(d => d.BUILDING).filter(Boolean))].sort();
            bSelect.innerHTML = '<option value="">ทุกตึก</option>' + buildings.map(b => `<option value="${b}">${b}</option>`).join('');
            
            document.getElementById('rPriorityFilters').innerHTML = state.priorities.map(p => `
                <button onclick="toggleFilter(this, 'priority', '${p.id}')" class="multi-select-chip px-3 py-1 bg-slate-50 rounded-lg text-[10px] font-bold text-slate-500 uppercase">${p.name}</button>
            `).join('');

            document.getElementById('rAssetTypeFilters').innerHTML = state.assetTypes.map(t => `
                <button onclick="toggleFilter(this, 'assetType', '${t.id}')" class="multi-select-chip px-3 py-1 bg-slate-50 rounded-lg text-[10px] font-bold text-slate-500 uppercase">${t.name}</button>
            `).join('');

            handleBuildingChange();
        }

        function handleBuildingChange() {
            filters.building = document.getElementById('fBuilding').value;
            const fSelect = document.getElementById('fFloor');
            let floors = !filters.building ? [...new Set(state.depts.map(d => d.FL).filter(Boolean))] : [...new Set(state.depts.filter(d => d.BUILDING === filters.building).map(d => d.FL).filter(Boolean))];
            floors.sort((a,b) => String(a).localeCompare(String(b), undefined, {numeric: true}));
            fSelect.innerHTML = '<option value="">ทุกชั้น</option>' + floors.map(f => `<option value="${f}">${f}</option>`).join('');
            handleFloorChange();
        }

        function handleFloorChange() {
            filters.floor = document.getElementById('fFloor').value;
            const dSelect = document.getElementById('fDept');
            let filtered = state.depts;
            if (filters.building) filtered = filtered.filter(d => d.BUILDING === filters.building);
            if (filters.floor) filtered = filtered.filter(d => d.FL === filters.floor);
            const names = [...new Set(filtered.map(d => d.DEPNAME).filter(Boolean))].sort();
            dSelect.innerHTML = '<option value="">ทุกหน่วยงาน</option>' + names.map(d => `<option value="${d}">${d}</option>`).join('');
            updateReportPreview();
        }

        function toggleFilter(btn, category, value) {
            btn.classList.toggle('active');
            const idx = filters[category].indexOf(value);
            if (idx > -1) filters[category].splice(idx, 1);
            else filters[category].push(value);
            updateReportPreview();
        }

        function checkAge(ageStr) {
            if (!ageStr) return false;
            const years = parseInt(ageStr.match(/(\d+)/)?.[1] || 0);
            if (filters.age.includes('low') && years < 4) return true;
            if (filters.age.includes('mid') && years >= 4 && years <= 6) return true;
            if (filters.age.includes('high') && years > 6 && years <= 9) return true;
            if (filters.age.includes('old') && years >= 10) return true;
            return false;
        }

        function renderDashboard() {
            const area = document.getElementById('contentArea');
            const search = document.getElementById('searchInput').value.toLowerCase();
            let filteredDepts = state.depts.filter(d => d.DEPNAME.toLowerCase().includes(search));

            document.getElementById('statDepts').innerText = state.depts.length;
            document.getElementById('statAssets').innerText = state.logs.length.toLocaleString();

            const structure = {};
            filteredDepts.forEach(d => {
                const b = d.BUILDING || "อื่นๆ";
                const f = d.FL || "ไม่ระบุ";
                if (!structure[b]) structure[b] = {};
                if (!structure[b][f]) structure[b][f] = [];
                structure[b][f].push(d);
            });

            let html = "";
            Object.keys(structure).sort().forEach(building => {
                html += `<div class="bg-white shadow-sm border-2 border-slate-100 rounded-[2.5rem] overflow-hidden mb-12"><div class="header-gradient p-6 text-white font-black uppercase">${building}</div><div class="p-8">`;
                Object.keys(structure[building]).sort((a,b) => String(a).localeCompare(String(b), undefined, {numeric:true})).forEach(floor => {
                    html += `<div class="mb-6"><div class="flex items-center gap-3 mb-4"><span class="bg-pink-500 text-white px-3 py-1 rounded-lg font-black text-[10px] uppercase">${floor}</span></div><div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">`;
                    structure[building][floor].forEach(dept => {
                        const count = state.logs.filter(l => String(l.DEPT_ID).trim() === String(dept.DEP_ID).trim()).length;
                        html += `<div class="dept-card bg-white p-4 flex flex-col justify-between" onclick="showDetail('${dept.DEP_ID}')"><h4 class="text-xs font-bold text-slate-800">${dept.DEPNAME}</h4><p class="text-[10px] text-slate-400 mt-2">${count} items</p></div>`;
                    });
                    html += `</div></div>`;
                });
                html += `</div></div>`;
            });
            area.innerHTML = html;
        }

        function showDetail(deptId) {
            const dept = state.depts.find(d => String(d.DEP_ID).trim() === String(deptId).trim());
            const logs = state.logs.filter(l => String(l.DEPT_ID).trim() === String(deptId).trim());
            if(!dept) return;
            document.getElementById('mDeptName').innerText = dept.DEPNAME;
            document.getElementById('mDeptLoc').innerText = `${dept.BUILDING} ชั้น ${dept.FL}`;
            document.getElementById('mDeptPic').querySelector('img').src = dept.PIC_ID ? `https://drive.google.com/thumbnail?id=${dept.PIC_ID}&sz=w400` : `https://placehold.co/100?text=DEPT`;
            
            document.getElementById('mAssetGroupContainer').innerHTML = `<div class="grid grid-cols-1 md:grid-cols-2 gap-4">` + logs.map(a => `<div class="bg-white p-4 rounded-2xl border border-slate-100"><p class="text-[10px] font-black text-pink-500">${a.AssetID}</p><p class="text-xs font-bold text-slate-700">${a.FullDescription}</p></div>`).join('') + `</div>`;
            document.getElementById('modalDept').classList.remove('hidden');
            document.getElementById('modalDept').classList.add('flex');
        }

        function updateReportPreview() {
            filters.deptName = document.getElementById('fDept').value;
            const preview = document.getElementById('reportPreviewContent');
            
            const filteredLogs = state.logs.filter(l => {
                const matchP = filters.priority.length === 0 || filters.priority.includes(String(l.Priority_ID || l.PIORITY_ID));
                const matchT = filters.assetType.length === 0 || filters.assetType.includes(String(l.Asset_Type_ID));
                const matchA = filters.age.length === 0 || checkAge(l.AgeInfo || l.Age);
                return matchP && matchT && matchA;
            });

            const activeDeptIds = [...new Set(filteredLogs.map(l => String(l.DEPT_ID).trim()))];
            const filteredDepts = state.depts.filter(d => {
                const matchB = !filters.building || d.BUILDING === filters.building;
                const matchF = !filters.floor || d.FL === filters.floor;
                const matchD = !filters.deptName || d.DEPNAME === filters.deptName;
                return matchB && matchF && matchD && activeDeptIds.includes(String(d.DEP_ID).trim());
            });

            let html = `<div class="text-center mb-10"><h1 class="text-2xl font-black">รายงานครุภัณฑ์คอมพิวเตอร์</h1><p class="text-slate-500">โรงพยาบาลอุดรธานี</p></div><table class="report-table"><thead><tr><th>#</th><th>รหัส</th><th>รายละเอียด</th><th class="text-center">อายุ</th></tr></thead><tbody>`;
            filteredDepts.forEach(dept => {
                const dLogs = filteredLogs.filter(l => String(l.DEPT_ID).trim() === String(dept.DEP_ID).trim());
                html += `<tr class="row-group-header"><td colspan="3">${dept.DEPNAME} (${dept.BUILDING})</td><td class="text-center">${dLogs.length}</td></tr>`;
                dLogs.forEach((l, i) => html += `<tr><td class="text-center">${i+1}</td><td class="font-bold">${l.AssetID}</td><td>${l.FullDescription}</td><td class="text-center">${l.AgeInfo || l.Age || '-'}</td></tr>`);
            });
            html += `</tbody></table>`;
            preview.innerHTML = html;
        }

        function openReportModal() { document.getElementById('modalReport').classList.remove('hidden'); document.getElementById('modalReport').classList.add('flex'); updateReportPreview(); }
        function closeReportModal() { document.getElementById('modalReport').classList.add('hidden'); }
        function closeModal() { document.getElementById('modalDept').classList.add('hidden'); }
        function switchMainView(m) { mainDisplayMode = m; renderDashboard(); }
        function printReport() { window.print(); }
        function exportToExcel() { /* Export logic */ }

        window.onload = init;
    </script>
</body>
</html>
