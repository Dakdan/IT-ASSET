<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>IT Asset Survey UDH - Dashboard & Reports</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- SheetJS for Excel Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root {
            --pink-main: #ec4899;
            --slate-body: #f8fafc;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: var(--slate-body);
            min-height: 100vh;
        }

        .main-nav-head {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 3px solid var(--pink-main);
        }

        .search-input-box {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.05);
            border: 2px solid #e2e8f0;
            display: flex;
            align-items: center;
            transition: all 0.3s ease;
        }

        .search-input-box:focus-within { border-color: var(--pink-main); }

        .building-container {
            background: white;
            border-radius: 2.5rem;
            border: 2px solid #e2e8f0;
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            margin-bottom: 3rem;
        }

        .building-header {
            background: #fff;
            padding: 2rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #f1f5f9;
        }

        .pink-gradient {
            background: linear-gradient(135deg, #ec4899 0%, #be185d 100%);
        }

        .floor-wrapper {
            border-radius: 2rem;
            padding: 2rem;
            margin-bottom: 2rem;
            border-width: 2px;
            border-style: solid;
        }

        .dept-card {
            background: white;
            border-radius: 1.5rem;
            border-width: 2px;
            border-style: solid;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
        }

        .dept-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            border-color: var(--pink-main) !important;
        }

        .view-controls {
            display: flex;
            background: #f1f5f9;
            padding: 0.25rem;
            border-radius: 1rem;
            gap: 0.25rem;
        }
        
        .view-btn-main {
            padding: 0.5rem 1rem;
            border-radius: 0.75rem;
            font-size: 0.75rem;
            font-weight: 700;
            transition: all 0.2s;
            color: #64748b;
        }
        
        .view-btn-main.active {
            background: white;
            color: var(--pink-main);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        
        .main-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 0.5rem;
        }
        
        .main-table th {
            background: #f8fafc;
            padding: 1.25rem 1rem;
            text-align: left;
            font-size: 0.75rem;
            font-weight: 800;
            color: #64748b;
            text-transform: uppercase;
            border-bottom: 2px solid #e2e8f0;
        }
        
        .main-table tr.dept-row td {
            background: white;
            padding: 1.25rem 1rem;
            border-top: 2px solid #f1f5f9;
            border-bottom: 2px solid #f1f5f9;
            vertical-align: middle;
        }

        .main-table tr.dept-row td:first-child {
            border-left: 2px solid #f1f5f9;
            border-top-left-radius: 1rem;
            border-bottom-left-radius: 1rem;
        }

        .main-table tr.dept-row td:last-child {
            border-right: 2px solid #f1f5f9;
            border-top-right-radius: 1rem;
            border-bottom-right-radius: 1rem;
        }

        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        @media print {
            body * { visibility: hidden; }
            #reportPrintArea, #reportPrintArea * { visibility: visible; }
            #reportPrintArea { position: absolute; left: 0; top: 0; width: 100%; }
            .no-print { display: none !important; }
        }

        #modalDept.flex, #modalReport.flex { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .report-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
        }
        .report-table th, .report-table td {
            border: 1px solid #e2e8f0;
            padding: 8px;
            text-align: left;
        }
        .report-table th { background: #f8fafc; font-weight: bold; color: #64748b; }
        .row-group-header { background-color: #f1f5f9; font-weight: 800; color: #1e293b; }

        .filter-chip {
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 700;
            background: #f1f5f9;
            color: #64748b;
            border: 1px solid #e2e8f0;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }
        .filter-chip.active {
            background: var(--pink-main);
            color: white;
            border-color: var(--pink-main);
            box-shadow: 0 4px 6px -1px rgba(236, 72, 153, 0.3);
        }

        /* Detail Modal Specific */
        .asset-detail-card {
            background: white;
            border-radius: 1.5rem;
            border: 2px solid #f1f5f9;
            transition: all 0.3s ease;
        }
        .asset-detail-card:hover {
            border-color: var(--pink-main);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }
        
        .report-group-container {
            margin-bottom: 2rem;
            border-radius: 1.5rem;
            border: 2px solid #f1f5f9;
            overflow: hidden;
            background: white;
        }
        
        .report-group-header {
            padding: 1rem 1.5rem;
            background: #f8fafc;
            border-bottom: 2px solid #f1f5f9;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>

<body class="text-slate-700">

<nav class="main-nav-head no-print">
    <div class="max-w-[1440px] mx-auto px-6 h-20 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 rounded-xl overflow-hidden shadow-md border border-slate-100 flex items-center justify-center bg-white">
                <img src="https://img2.pic.in.th/-227e4f6f84f29f020.png" alt="Logo" class="h-12">
            </div>
            <div>
                <h1 class="text-xl font-black text-slate-800 leading-none">IT ASSET <span class="text-pink-500">Audit</span></h1>
                <p class="text-[10px] text-slate-400 font-bold tracking-widest mt-1 uppercase">Udonthani Hospital</p>
            </div>
        </div>

        <div class="hidden md:flex flex-1 max-w-md mx-10">
            <div class="search-input-box w-full px-4 py-2">
                <i class="fas fa-search text-slate-300 mr-3"></i>
                <input id="searchInput" oninput="renderDashboard()" placeholder="ค้นหาชื่อหน่วยงาน, ตึก หรือชั้น..." class="w-full outline-none text-sm font-semibold text-slate-600 bg-transparent">
            </div>
        </div>

        <div class="flex items-center gap-4">
            <button onclick="openReportModal()" class="flex items-center gap-2 px-4 py-2 bg-slate-800 text-white rounded-xl font-bold text-sm hover:bg-slate-700 transition-all shadow-lg">
                <i class="fas fa-file-alt"></i> สร้างรายงาน
            </button>
            <div class="view-controls">
                <button onclick="switchMainView('grid')" id="vGrid" class="view-btn-main active"><i class="fas fa-th-large"></i></button>
                <button onclick="switchMainView('table')" id="vTable" class="view-btn-main"><i class="fas fa-list"></i></button>
            </div>
            <button onclick="init()" class="w-10 h-10 flex items-center justify-center text-slate-400 hover:bg-slate-50 rounded-xl transition-all">
                <i id="refreshIcon" class="fas fa-sync-alt"></i>
            </button>
        </div>
    </div>
</nav>

<main class="max-w-[1440px] mx-auto px-6 pt-10 pb-20 no-print">
    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10">
        <div class="md:col-span-2">
            <h2 class="text-3xl font-black text-slate-900 tracking-tight">สรุปข้อมูลตรวจสอบครุภัณฑ์<span class="text-pink-500"> ประจำปี 2569</span></h2>
            <p class="text-slate-500 text-sm font-medium mt-1">กลุ่มงาน: เทคโนโลยีสารสนเทศทางการแพทย์</p>
            <p id="lastUpdate" class="text-[10px] font-bold text-slate-400 mt-2 uppercase tracking-widest">กำลังโหลดข้อมูล...</p>
        </div>
        <div class="bg-white p-6 rounded-3xl border-2 border-slate-100 flex items-center gap-5 shadow-sm">
            <div class="w-12 h-12 bg-pink-50 text-pink-500 rounded-2xl flex items-center justify-center text-xl shadow-sm"><i class="fas fa-hospital"></i></div>
            <div><p id="statDepts" class="text-2xl font-black text-slate-800">-</p><p class="text-[9px] font-bold text-slate-400 uppercase tracking-wider">หน่วยงานที่สำรวจ</p></div>
        </div>
        <div class="bg-white p-6 rounded-3xl border-2 border-slate-100 flex items-center gap-5 shadow-sm">
            <div class="w-12 h-12 bg-blue-50 text-blue-500 rounded-2xl flex items-center justify-center text-xl shadow-sm"><i class="fas fa-laptop"></i></div>
            <div><p id="statAssets" class="text-2xl font-black text-slate-800">-</p><p class="text-[9px] font-bold text-slate-400 uppercase tracking-wider">รายการครุภัณฑ์รวม</p></div>
        </div>
    </div>
    <div id="contentArea" class="space-y-6"></div>
</main>

<!-- Modal: Report -->
<div id="modalReport" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md hidden items-center justify-center z-[300] p-4" onclick="closeReportModal()">
    <div class="bg-white w-full max-w-6xl max-h-[95vh] rounded-[2.5rem] shadow-2xl flex flex-col overflow-hidden border-4 border-white" onclick="event.stopPropagation()">
        <div class="p-6 border-b-2 border-slate-50 bg-slate-50/50">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                <div>
                    <h3 class="text-xl font-black text-slate-800"><i class="fas fa-print text-pink-500 mr-2"></i> ระบบออกรายงานตรวจสอบ</h3>
                </div>
                <div class="flex gap-2">
                    <button onclick="exportToExcel()" class="px-5 py-2.5 bg-emerald-500 text-white rounded-xl font-bold text-sm hover:bg-emerald-600 transition-all shadow-lg flex items-center gap-2">
                        <i class="fas fa-file-excel"></i> Export Excel
                    </button>
                    <button onclick="printReport()" class="px-5 py-2.5 bg-pink-500 text-white rounded-xl font-bold text-sm hover:bg-pink-600 transition-all shadow-lg flex items-center gap-2">
                        <i class="fas fa-print"></i> พิมพ์ / PDF
                    </button>
                    <button onclick="closeReportModal()" class="w-10 h-10 rounded-full bg-white border-2 border-slate-100 text-slate-400 hover:text-pink-500 flex items-center justify-center transition-all">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-6">
                <select id="fBuilding" onchange="handleBuildingFilterChange()" class="w-full bg-white border-2 border-slate-200 rounded-xl px-4 py-2 text-sm font-bold text-slate-600 outline-none focus:border-pink-500 cursor-pointer"><option value="">ทุกตึก</option></select>
                <select id="fFloor" onchange="handleFloorFilterChange()" class="w-full bg-white border-2 border-slate-200 rounded-xl px-4 py-2 text-sm font-bold text-slate-600 outline-none focus:border-pink-500 cursor-pointer"><option value="">ทุกชั้น</option></select>
                <select id="fDept" onchange="updateReportPreview()" class="w-full bg-white border-2 border-slate-200 rounded-xl px-4 py-2 text-sm font-bold text-slate-600 outline-none focus:border-pink-500 cursor-pointer"><option value="">ทุกหน่วยงาน</option></select>
            </div>

            <div class="mt-4 space-y-3 p-4 bg-white rounded-2xl border border-slate-200 shadow-inner">
                <div class="flex flex-wrap items-center gap-3"><span class="text-[10px] font-black text-slate-400 uppercase">Priority:</span><div id="rPriorityFilters" class="flex flex-wrap gap-1.5"></div></div>
                <div class="flex flex-wrap items-center gap-3"><span class="text-[10px] font-black text-slate-400 uppercase">ประเภท:</span><div id="rTypeFilters" class="flex flex-wrap gap-1.5"></div></div>
                <div class="flex flex-wrap items-center gap-3"><span class="text-[10px] font-black text-slate-400 uppercase">อายุ:</span><div id="rAgeFilters" class="flex flex-wrap gap-1.5">
                    <button onclick="toggleReportAdvancedFilter(this, 'age', 'low')" class="filter-chip">&lt; 4 ปี</button>
                    <button onclick="toggleReportAdvancedFilter(this, 'age', 'mid')" class="filter-chip">4-6 ปี</button>
                    <button onclick="toggleReportAdvancedFilter(this, 'age', 'high')" class="filter-chip">6-9 ปี</button>
                    <button onclick="toggleReportAdvancedFilter(this, 'age', 'old')" class="filter-chip">&gt; 10 ปี</button>
                </div></div>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-8 bg-white custom-scroll" id="reportPrintArea">
            <div id="reportPreviewContent"></div>
        </div>
    </div>
</div>

<!-- Modal: Dept Detail -->
<div id="modalDept" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md hidden items-center justify-center z-[200] p-4 no-print" onclick="closeModal()">
    <div class="bg-white w-full max-w-6xl max-h-[90vh] rounded-[2.5rem] shadow-2xl flex flex-col overflow-hidden border-4 border-white" onclick="event.stopPropagation()">
        <!-- Header Modal -->
        <div class="p-6 md:p-8 border-b-2 border-slate-50 flex flex-col md:flex-row justify-between items-center bg-white sticky top-0 z-10 gap-4 shadow-sm">
            <div class="flex items-center gap-6 w-full md:w-auto">
                <div id="mDeptPicWrapper" class="w-16 h-16 md:w-20 md:h-20 rounded-2xl overflow-hidden bg-slate-50 border-2 border-slate-100 flex-shrink-0 shadow-inner">
                    <img id="mDeptPic" src="" class="w-full h-full object-cover">
                </div>
                <div class="min-w-0 flex-1">
                    <h3 id="mDeptName" class="text-xl md:text-2xl font-black text-slate-800 truncate"></h3>
                    <div id="mDeptLoc" class="mt-1 text-xs md:text-sm font-bold text-slate-400 uppercase flex items-center gap-2"></div>
                </div>
            </div>
            
            <div class="flex items-center gap-3 w-full md:w-auto justify-end">
                <a id="mDeptDetailBtn" href="#" target="_blank" 
                   class="flex items-center gap-2 px-5 py-2.5 rounded-xl border-2 border-pink-100 text-pink-500 font-bold text-sm hover:bg-pink-50 transition-all">
                    <i class="fas fa-external-link-alt text-xs"></i> ดูหน้าแยก
                </a>
                <button onclick="closeModal()" class="w-12 h-12 rounded-full bg-slate-100 text-slate-400 hover:bg-pink-500 hover:text-white transition-all flex items-center justify-center">
                    <i class="fas fa-times"></i>
                </button>
            </div>
        </div>

        <!-- Body Modal Content -->
        <div id="mAssetGroupContainer" class="p-4 md:p-8 overflow-y-auto flex-1 bg-slate-50/30 custom-scroll">
            <!-- Asset Cards will be injected here -->
        </div>
    </div>
</div>

<script>
    const APP_URL = "https://script.google.com/macros/s/AKfycbwb_1Yppy3h_hy4dX1RkN3-l_YKKlC3FWKewmzCHM-q6SHrlbxsm-U-SGMUj1mYXwkMuQ/exec";
    let state = { logs: [], depts: [], assetTypes: [], priorities: [] };
    let mainDisplayMode = 'grid';
    let advFilters = { priority: [], type: [], age: [] };
    let currentReportData = [];

    const floorColorThemes = [
        { bg: 'bg-emerald-50', border: 'border-emerald-200', text: 'text-emerald-600', badge: 'bg-emerald-500', cardBorder: 'border-emerald-100' },
        { bg: 'bg-blue-50', border: 'border-blue-200', text: 'text-blue-600', badge: 'bg-blue-500', cardBorder: 'border-blue-100' },
        { bg: 'bg-amber-50', border: 'border-amber-200', text: 'text-amber-600', badge: 'bg-amber-500', cardBorder: 'border-amber-100' },
        { bg: 'bg-rose-50', border: 'border-rose-200', text: 'text-rose-600', badge: 'bg-rose-500', cardBorder: 'border-rose-100' }
    ];

    async function init() {
        const icon = document.getElementById('refreshIcon');
        icon?.classList.add('animate-spin');
        try {
            const ts = new Date().getTime();
            const [logRes, deptRes, initRes] = await Promise.all([
                fetch(`${APP_URL}?action=getAuditLogs&_=${ts}`).then(r => r.json()),
                fetch(`${APP_URL}?action=getDeptList&_=${ts}`).then(r => r.json()),
                fetch(`${APP_URL}?action=getInitialData&_=${ts}`).then(r => r.json())
            ]);
            state.logs = Array.isArray(logRes) ? logRes : [];
            state.depts = Array.isArray(deptRes) ? deptRes : [];
            state.assetTypes = initRes.assetTypes || [];
            state.priorities = initRes.priorities || [];
            document.getElementById('lastUpdate').innerText = `SYNCED AT: ${new Date().toLocaleTimeString('th-TH')}`;
            populateFilterOptions();
            renderDashboard();
        } catch (err) { console.error(err); } finally { icon?.classList.remove('animate-spin'); }
    }

    function populateFilterOptions() {
        const bSelect = document.getElementById('fBuilding');
        const buildings = [...new Set(state.depts.map(d => d.BUILDING).filter(Boolean))].sort();
        bSelect.innerHTML = '<option value="">ทุกตึก</option>' + buildings.map(b => `<option value="${b}">${b}</option>`).join('');
        document.getElementById('rPriorityFilters').innerHTML = state.priorities.map(p => `<button onclick="toggleReportAdvancedFilter(this, 'priority', '${p.id}')" class="filter-chip">${p.name}</button>`).join('');
        document.getElementById('rTypeFilters').innerHTML = state.assetTypes.map(t => `<button onclick="toggleReportAdvancedFilter(this, 'type', '${t.id}')" class="filter-chip">${t.name}</button>`).join('');
        handleBuildingFilterChange();
    }

    function toggleReportAdvancedFilter(btn, category, value) {
        btn.classList.toggle('active');
        const idx = advFilters[category].indexOf(value);
        if (idx > -1) advFilters[category].splice(idx, 1);
        else advFilters[category].push(value);
        updateReportPreview();
    }

    function handleBuildingFilterChange() {
        const bVal = document.getElementById('fBuilding').value;
        const fSelect = document.getElementById('fFloor');
        let avF = !bVal ? [...new Set(state.depts.map(d => d.FL).filter(Boolean))] : [...new Set(state.depts.filter(d => d.BUILDING === bVal).map(d => d.FL).filter(Boolean))];
        avF.sort((a,b) => String(a).localeCompare(String(b), undefined, {numeric: true}));
        fSelect.innerHTML = '<option value="">ทุกชั้น</option>' + avF.map(f => `<option value="${f}">${f}</option>`).join('');
        handleFloorFilterChange();
    }

    function handleFloorFilterChange() {
        const bVal = document.getElementById('fBuilding').value;
        const fVal = document.getElementById('fFloor').value;
        const dSelect = document.getElementById('fDept');
        let filtered = state.depts;
        if (bVal) filtered = filtered.filter(d => d.BUILDING === bVal);
        if (fVal) filtered = filtered.filter(d => d.FL === fVal);
        const names = [...new Set(filtered.map(d => d.DEPNAME).filter(Boolean))].sort();
        dSelect.innerHTML = '<option value="">ทุกหน่วยงาน</option>' + names.map(d => `<option value="${d}">${d}</option>`).join('');
        updateReportPreview();
    }

    function checkAgeMatch(ageStr) {
        if (!ageStr) return false;
        const years = parseInt(ageStr.match(/(\d+)/)?.[1] || 0);
        const sel = advFilters.age;
        if (sel.length === 0) return true;
        if (sel.includes('low') && years < 4) return true;
        if (sel.includes('mid') && (years >= 4 && years <= 6)) return true;
        if (sel.includes('high') && (years >= 7 && years <= 9)) return true;
        if (sel.includes('old') && years >= 10) return true;
        return false;
    }

    function updateReportPreview() {
        const bVal = document.getElementById('fBuilding').value;
        const fVal = document.getElementById('fFloor').value;
        const dVal = document.getElementById('fDept').value;
        const filteredDepts = state.depts.filter(d => (!bVal || d.BUILDING === bVal) && (!fVal || d.FL === fVal) && (!dVal || d.DEPNAME === dVal));
        const dIds = filteredDepts.map(d => String(d.DEP_ID).trim());
        
        currentReportData = state.logs.filter(l => {
            const isDeptMatch = dIds.includes(String(l.DEPT_ID).trim());
            const isPriorityMatch = advFilters.priority.length === 0 || advFilters.priority.includes(String(l.Priority_ID || l.PIORITY_ID));
            const isTypeMatch = advFilters.type.length === 0 || advFilters.type.includes(String(l.Asset_Type_ID));
            const isAgeMatch = advFilters.age.length === 0 || checkAgeMatch(l.AgeInfo || l.Age);
            return isDeptMatch && isPriorityMatch && isTypeMatch && isAgeMatch;
        });

        const groups = {}; 
        currentReportData.forEach(l => {
            const dept = state.depts.find(d => String(d.DEP_ID).trim() === String(l.DEPT_ID).trim());
            const dName = dept?.DEPNAME || "ไม่ระบุหน่วยงาน";
            if (!groups[dName]) groups[dName] = { info: dept, items: [] };
            groups[dName].items.push(l);
        });

        let html = `
            <div class="text-center mb-10">
                <h1 class="text-2xl font-black text-slate-800 uppercase tracking-tight">รายงานตรวจสอบครุภัณฑ์คอมพิวเตอร์</h1>
                <p class="text-sm font-bold text-slate-400 mt-1">ประจำปีงบประมาณ 2569 | โรงพยาบาลอุดรธานี</p>
                <div class="mt-4 flex justify-center gap-4">
                    <span class="text-[10px] font-black px-3 py-1 bg-slate-100 rounded-full text-slate-500 border border-slate-200 uppercase">รวม ${currentReportData.length} รายการ</span>
                    <span class="text-[10px] font-black px-3 py-1 bg-pink-50 rounded-full text-pink-500 border border-pink-100 uppercase">แยกตามหน่วยงาน</span>
                </div>
            </div>`;

        if (!currentReportData.length) {
            html += `<div class="py-20 text-center text-slate-300 font-bold">ไม่พบข้อมูลตามเงื่อนไขที่เลือก</div>`;
        } else {
            Object.keys(groups).sort().forEach(deptName => {
                const group = groups[deptName];
                const deptInfo = group.info;
                html += `
                <div class="report-group-container">
                    <div class="report-group-header">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-xl bg-white shadow-sm border border-slate-100 flex items-center justify-center overflow-hidden">
                                <img src="${deptInfo?.PIC_ID ? 'https://drive.google.com/thumbnail?id=' + deptInfo.PIC_ID + '&sz=w100' : 'https://placehold.co/100?text=' + deptName.charAt(0)}" class="w-full h-full object-cover">
                            </div>
                            <div>
                                <h2 class="text-sm font-black text-slate-800 leading-none">${deptName}</h2>
                                <p class="text-[9px] font-bold text-slate-400 mt-1 uppercase tracking-wider">${deptInfo?.BUILDING || '-'} ชั้น ${deptInfo?.FL || '-'}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-xs font-black text-pink-500">${group.items.length} รายการ</p>
                        </div>
                    </div>
                    <table class="report-table">
                        <thead>
                            <tr>
                                <th class="w-10 text-center">#</th>
                                <th class="w-36">รหัสครุภัณฑ์</th>
                                <th>รายละเอียดครุภัณฑ์</th>
                                <th class="w-20 text-center">อายุ</th>
                                <th class="w-24 text-center">ความสำคัญ</th>
                            </tr>
                        </thead>
                        <tbody>`;
                
                group.items.forEach((item, idx) => {
                    const pName = state.priorities.find(p => String(p.id) === String(item.Priority_ID || item.PIORITY_ID))?.name || '-';
                    const ageDisplay = item.AgeInfo || item.Age || '-';
                    html += `
                        <tr>
                            <td class="text-center font-bold text-slate-400">${idx + 1}</td>
                            <td><span class="font-black text-slate-800">${item.AssetID || '-'}</span></td>
                            <td>
                                <div class="font-bold text-slate-700">${item.FullDescription || '-'}</div>
                                <div class="text-[9px] text-slate-400 mt-0.5">S/N: ${item.Serial_Number || 'ไม่ระบุ'}</div>
                            </td>
                            <td class="text-center font-black text-slate-600">${ageDisplay}</td>
                            <td class="text-center">
                                <span class="text-[9px] font-black px-2 py-0.5 bg-pink-50 text-pink-500 rounded border border-pink-100 uppercase">${pName}</span>
                            </td>
                        </tr>`;
                });
                
                html += `</tbody></table></div>`;
            });
        }
        document.getElementById('reportPreviewContent').innerHTML = html;
    }

    function renderDashboard() {
        const area = document.getElementById('contentArea');
        const search = (document.getElementById('searchInput')?.value || "").toLowerCase().trim();
        const activeIds = [...new Set(state.logs.map(l => String(l.DEPT_ID).trim()))];
        const filteredDepts = state.depts.filter(d => (d.DEPNAME.toLowerCase().includes(search) || (d.BUILDING && d.BUILDING.toLowerCase().includes(search))) && activeIds.includes(String(d.DEP_ID).trim()));
        document.getElementById('statDepts').innerText = filteredDepts.length;
        document.getElementById('statAssets').innerText = state.logs.length.toLocaleString();

        if (mainDisplayMode === 'grid') {
            const structure = {};
            filteredDepts.forEach(d => {
                const b = d.BUILDING || "อื่นๆ";
                const f = d.FL || "ไม่ระบุชั้น";
                if (!structure[b]) structure[b] = {};
                if (!structure[b][f]) structure[b][f] = [];
                structure[b][f].push(d);
            });
            let html = "";
            Object.keys(structure).sort().forEach(building => {
                const total = filteredDepts.filter(d => d.BUILDING === building).reduce((a, c) => a + state.logs.filter(l => String(l.DEPT_ID).trim() === String(c.DEP_ID).trim()).length, 0);
                html += `<div class="building-container"><div class="building-header"><div class="flex items-center gap-5"><div class="w-12 h-12 pink-gradient rounded-2xl flex items-center justify-center text-white shadow-lg text-xl"><i class="fas fa-hospital"></i></div><div><h3 class="text-2xl font-black text-slate-800 uppercase tracking-tight">${building}</h3><p class="text-[10px] text-slate-400 font-bold tracking-widest uppercase">Udon Thani Hospital</p></div></div><div class="text-right"><p class="text-3xl font-black text-pink-500 leading-none">${total}</p><p class="text-[10px] font-bold text-slate-400 uppercase mt-1">รายการสำรวจ</p></div></div><div class="p-8">`;
                Object.keys(structure[building]).sort((a,b) => String(a).localeCompare(String(b), undefined, {numeric:true})).forEach((floor, idx) => {
                    const theme = floorColorThemes[idx % floorColorThemes.length];
                    html += `<div class="floor-wrapper ${theme.bg} ${theme.border} mb-8"><div class="flex items-center gap-4 mb-6"><span class="${theme.badge} text-white px-5 py-1.5 rounded-xl font-black text-sm shadow-md">${floor}</span><div class="flex-1 h-[2px] bg-white/50"></div></div><div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">`;
                    structure[building][floor].forEach(dept => {
                        const count = state.logs.filter(l => String(l.DEPT_ID).trim() === String(dept.DEP_ID).trim()).length;
                        const dImg = dept.PIC_ID ? `https://drive.google.com/thumbnail?id=${dept.PIC_ID}&sz=w200` : `https://placehold.co/100?text=${dept.DEPNAME.charAt(0)}`;
                        html += `<div class="dept-card bg-white p-5 border-2 ${theme.cardBorder}" onclick="showDetail('${dept.DEP_ID}')"><div class="flex items-center gap-4 mb-4"><div class="w-14 h-14 rounded-2xl overflow-hidden border-2 border-slate-100 flex-shrink-0 bg-slate-50"><img src="${dImg}" class="w-full h-full object-cover"></div><div class="min-w-0"><h4 class="text-sm font-black text-slate-800 leading-tight line-clamp-2">${dept.DEPNAME}</h4><p class="text-[10px] font-bold text-slate-400 mt-1 uppercase">ID: ${dept.DEP_ID}</p></div></div><div class="flex items-center justify-between pt-4 border-t-2 border-slate-50"><span class="px-3 py-1 rounded-lg ${theme.bg} ${theme.text} font-black text-xs border ${theme.cardBorder}">${count} รายการ</span></div></div>`;
                    });
                    html += `</div></div>`;
                });
                html += `</div></div>`;
            });
            area.innerHTML = html || `<div class="text-center py-20 text-slate-300">ไม่พบข้อมูล</div>`;
        } else {
            let html = `<div class="bg-white rounded-[2.5rem] border-2 border-slate-200 overflow-hidden shadow-sm"><table class="main-table"><thead><tr><th class="text-center w-24">รูป</th><th>หน่วยงาน / สถานที่</th><th class="text-center">จำนวน</th><th class="text-center">สถานะ</th><th class="w-20"></th></tr></thead><tbody>`;
            filteredDepts.forEach(d => {
                const count = state.logs.filter(l => String(l.DEPT_ID).trim() === String(d.DEP_ID).trim()).length;
                const dImg = d.PIC_ID ? `https://drive.google.com/thumbnail?id=${d.PIC_ID}&sz=w100` : `https://placehold.co/100?text=${d.DEPNAME.charAt(0)}`;
                html += `<tr class="dept-row group cursor-pointer" onclick="showDetail('${d.DEP_ID}')"><td class="text-center"><div class="w-12 h-12 mx-auto rounded-xl overflow-hidden border-2 border-slate-100"><img src="${dImg}" class="w-full h-full object-cover"></div></td><td><div class="font-bold text-slate-800 group-hover:text-pink-500 transition-colors">${d.DEPNAME}</div><div class="text-[10px] font-bold text-slate-400 uppercase mt-1">${d.BUILDING} - ${d.FL}</div></td><td class="text-center font-black text-slate-700">${count}</td><td class="text-center"><span class="px-3 py-1 rounded-full bg-emerald-50 text-emerald-500 font-bold text-[10px] border border-emerald-100">สำรวจแล้ว</span></td><td class="text-center"><i class="fas fa-chevron-right text-slate-200 group-hover:text-pink-400"></i></td></tr>`;
            });
            html += `</tbody></table></div>`;
            area.innerHTML = html;
        }
    }

    function showDetail(deptId) {
        const dept = state.depts.find(d => String(d.DEP_ID).trim() === String(deptId).trim());
        if (!dept) return;
        
        // Update Modal Header Information
        document.getElementById('mDeptName').innerText = dept.DEPNAME;
        document.getElementById('mDeptLoc').innerHTML = `<i class="fas fa-map-marker-alt text-pink-500"></i> ${dept.BUILDING} ชั้น ${dept.FL}`;
        document.getElementById('mDeptPic').src = dept.PIC_ID ? `https://drive.google.com/thumbnail?id=${dept.PIC_ID}&sz=w400` : `https://placehold.co/100?text=${dept.DEPNAME.charAt(0)}`;
        document.getElementById('mDeptDetailBtn').href = `dept_detail.html?DEP_ID=${dept.DEP_ID}`;

        const logs = state.logs.filter(l => String(l.DEPT_ID).trim() === String(deptId).trim());
        
        // Build Asset Grid Content
        let html = `<div class="grid grid-cols-1 md:grid-cols-2 gap-6">` + logs.map(l => {
            const assetImg = l.PIC_ID ? `https://drive.google.com/thumbnail?id=${l.PIC_ID}&sz=w400` : `https://placehold.co/200?text=NO+IMAGE`;
            const pName = state.priorities.find(p => String(p.id) === String(l.Priority_ID || l.PIORITY_ID))?.name || 'ทั่วไป';
            const ageVal = l.AgeInfo || l.Age || '-';
            
            return `
            <div class="asset-detail-card p-5 flex flex-col sm:flex-row gap-5 items-start">
                <div class="w-full sm:w-28 h-28 rounded-xl overflow-hidden bg-slate-100 flex-shrink-0 shadow-inner border border-slate-50">
                    <img src="${assetImg}" class="w-full h-full object-cover">
                </div>
                <div class="flex-1 min-w-0">
                    <div class="flex flex-wrap items-center gap-2 mb-2">
                        <span class="text-[9px] font-black text-pink-500 bg-pink-50 px-2 py-0.5 rounded border border-pink-100 uppercase tracking-tighter">${l.AssetID || 'ไม่มีรหัส'}</span>
                        <span class="text-[9px] font-bold text-slate-400 bg-slate-50 px-2 py-0.5 rounded border border-slate-100">อายุ: ${ageVal}</span>
                    </div>
                    <h4 class="text-sm font-black text-slate-800 leading-tight mb-2 line-clamp-2">${l.FullDescription || '-'}</h4>
                    <div class="text-[10px] font-bold text-slate-400 uppercase flex items-center gap-1.5 mb-2">
                        <i class="fas fa-barcode"></i> SN: ${l.Serial_Number || 'ไม่ระบุ'}
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-[9px] font-black px-2 py-0.5 rounded-full bg-blue-50 text-blue-500 border border-blue-100 uppercase">${pName}</span>
                    </div>
                </div>
            </div>`;
        }).join('') + `</div>`;
        
        document.getElementById('mAssetGroupContainer').innerHTML = html || `<div class="text-center py-20 text-slate-300 font-bold">ไม่พบรายการครุภัณฑ์</div>`;
        
        // Open Modal
        const modal = document.getElementById('modalDept');
        modal.classList.remove('hidden'); 
        modal.classList.add('flex');
    }

    function openReportModal() { updateReportPreview(); document.getElementById('modalReport').classList.remove('hidden'); document.getElementById('modalReport').classList.add('flex'); }
    function closeReportModal() { document.getElementById('modalReport').classList.add('hidden'); }
    function closeModal() { document.getElementById('modalDept').classList.add('hidden'); }
    function switchMainView(m) { mainDisplayMode = m; document.getElementById('vGrid').classList.toggle('active', m === 'grid'); document.getElementById('vTable').classList.toggle('active', m === 'table'); renderDashboard(); }
    
    function printReport() { window.print(); }
    
    function exportToExcel() {
        if (!currentReportData.length) return alert('ไม่มีข้อมูลสำหรับส่งออก');
        const excelData = currentReportData.map((l, index) => {
            const dept = state.depts.find(d => String(d.DEP_ID).trim() === String(l.DEPT_ID).trim());
            const pName = state.priorities.find(p => String(p.id) === String(l.Priority_ID || l.PIORITY_ID))?.name || '-';
            const ageVal = l.AgeInfo || l.Age || '-';
            return {
                "#": index + 1,
                "หน่วยงาน": dept?.DEPNAME || "ไม่ระบุ",
                "ตึก": dept?.BUILDING || "-",
                "ชั้น": dept?.FL || "-",
                "รหัสครุภัณฑ์": l.AssetID || "-",
                "รายละเอียด": l.FullDescription || "-",
                "Serial Number": l.Serial_Number || "-",
                "อายุ": ageVal,
                "Priority": pName
            };
        });
        const worksheet = XLSX.utils.json_to_sheet(excelData);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "Audit Report");
        XLSX.writeFile(workbook, `IT_Asset_Report_${new Date().toLocaleDateString('th-TH')}.xlsx`);
    }

    window.onload = init;
</script>
</body>
</html>
