<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>IT Asset Survey UDH - Dashboard & Reports</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root {
            --pink-main: #ec4899;
            --slate-body: #f8fafc;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: var(--slate-body);
            min-height: 100vh;
        }

        .main-nav-head {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 3px solid var(--pink-main);
        }

        .search-input-box {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.05);
            border: 2px solid #e2e8f0;
            display: flex;
            align-items: center;
            transition: all 0.3s ease;
        }

        .building-container {
            background: white;
            border-radius: 2.5rem;
            border: 2px solid #e2e8f0;
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            margin-bottom: 3rem;
        }

        .building-header {
            background: #fff;
            padding: 1.5rem 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #f1f5f9;
        }

        .pink-gradient {
            background: linear-gradient(135deg, #ec4899 0%, #be185d 100%);
        }

        .floor-wrapper {
            border-radius: 2rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border-width: 2px;
            border-style: solid;
        }

        .dept-card {
            background: white;
            border-radius: 1.5rem;
            border-width: 2px;
            border-style: solid;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .dept-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            border-color: var(--pink-main) !important;
        }

        .view-controls {
            display: flex;
            background: #f1f5f9;
            padding: 0.25rem;
            border-radius: 1rem;
            gap: 0.25rem;
        }
        
        .view-btn-main {
            padding: 0.5rem 1rem;
            border-radius: 0.75rem;
            font-size: 0.75rem;
            font-weight: 700;
            transition: all 0.2s;
            color: #64748b;
        }
        
        .view-btn-main.active {
            background: white;
            color: var(--pink-main);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        
        .grouped-table-container {
            background: white;
            border-radius: 1.5rem;
            overflow: hidden;
            margin-bottom: 2rem;
            border: 2px solid #f1f5f9;
        }

        .table-floor-header {
            background: #f8fafc;
            padding: 0.75rem 1.5rem;
            font-weight: 800;
            font-size: 0.85rem;
            color: #475569;
            border-bottom: 2px solid #f1f5f9;
        }

        .main-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .main-table th {
            background: #fff;
            padding: 1rem;
            text-align: left;
            font-size: 0.75rem;
            font-weight: 800;
            color: #94a3b8;
            text-transform: uppercase;
            border-bottom: 2px solid #f1f5f9;
        }
        
        .main-table tr.dept-row td {
            padding: 1rem;
            border-bottom: 1px solid #f8fafc;
            transition: all 0.2s;
        }

        .main-table tr.dept-row:hover td {
            background: #fff1f2;
        }

        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .asset-category-header {
            padding: 1rem 0;
            margin-top: 2rem;
            margin-bottom: 1rem;
            border-bottom: 2px solid #f1f5f9;
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .multi-select-chip {
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #e2e8f0;
        }

        .multi-select-chip.active {
            background-color: var(--pink-main) !important;
            color: white !important;
            border-color: var(--pink-main) !important;
        }

        .report-table {
            width: 100%;
            border-collapse: collapse;
        }

        .report-table th {
            background: #f1f5f9;
            padding: 12px;
            font-size: 11px;
            text-align: left;
            border-bottom: 2px solid #e2e8f0;
        }

        .report-table td {
            padding: 10px;
            font-size: 13px;
            border-bottom: 1px solid #f1f5f9;
        }

        .row-group-header {
            background: #fff1f2;
            font-weight: 800;
            color: #be185d;
        }

        @media print {
            .no-print { display: none !important; }
            body { background: white; }
            #reportPrintArea { position: relative; padding: 0; margin: 0; }
        }
    </style>
</head>

<body class="text-slate-700">

<nav class="main-nav-head no-print">
    <div class="max-w-[1440px] mx-auto px-6 h-20 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 rounded-xl overflow-hidden shadow-md border border-slate-100 flex items-center justify-center bg-white">
                <img src="https://img2.pic.in.th/-227e4f6f84f29f020.png" alt="Logo" class="h-12">
            </div>
            <div>
                <h1 class="text-xl font-black text-slate-800 leading-none">IT ASSET Inventory<span class="text-pink-500">CHECK</span></h1>
                <p class="text-[10px] text-slate-400 font-bold tracking-widest mt-1 uppercase">Udonthani Hospital</p>
            </div>
        </div>

        <div class="hidden md:flex flex-1 max-w-md mx-10">
            <div class="search-input-box w-full px-4 py-2">
                <i class="fas fa-search text-slate-300 mr-3"></i>
                <input id="searchInput" oninput="renderDashboard()" placeholder="ค้นหาชื่อหน่วยงาน, ตึก หรือชั้น..." class="w-full outline-none text-sm font-semibold text-slate-600 bg-transparent">
            </div>
        </div>

        <div class="flex items-center gap-4">
            <button onclick="openReportModal()" class="flex items-center gap-2 px-4 py-2 bg-slate-800 text-white rounded-xl font-bold text-sm hover:bg-slate-700 transition-all shadow-lg">
                <i class="fas fa-file-alt"></i> รายงาน
            </button>
            <div class="view-controls">
                <button onclick="switchMainView('grid')" id="vGrid" class="view-btn-main active"><i class="fas fa-th-large"></i></button>
                <button onclick="switchMainView('table')" id="vTable" class="view-btn-main"><i class="fas fa-list"></i></button>
            </div>
            <button onclick="init()" class="w-10 h-10 flex items-center justify-center text-slate-400 hover:bg-slate-50 rounded-xl transition-all">
                <i id="refreshIcon" class="fas fa-sync-alt"></i>
            </button>
        </div>
    </div>
</nav>

<main class="max-w-[1440px] mx-auto px-6 pt-10 pb-20 no-print">
    <!-- สถิติสรุปหน้าแรก -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10">
        <div class="md:col-span-2">
            <h2 class="text-3xl font-black text-slate-900 tracking-tight">สรุปข้อมูลตรวจสอบ<span class="text-pink-500"> 2569</span></h2>
            <p id="lastUpdate" class="text-[10px] font-bold text-slate-400 mt-2 uppercase tracking-widest">กำลังโหลดข้อมูล...</p>
        </div>
        <div class="bg-white p-6 rounded-3xl border-2 border-slate-100 flex items-center gap-5 shadow-sm">
            <div class="w-12 h-12 bg-pink-50 text-pink-500 rounded-2xl flex items-center justify-center text-xl"><i class="fas fa-hospital"></i></div>
            <div><p id="statDepts" class="text-2xl font-black text-slate-800">-</p><p class="text-[9px] font-bold text-slate-400 uppercase tracking-wider">หน่วยงาน</p></div>
        </div>
        <div class="bg-white p-6 rounded-3xl border-2 border-slate-100 flex items-center gap-5 shadow-sm">
            <div class="w-12 h-12 bg-blue-50 text-blue-500 rounded-2xl flex items-center justify-center text-xl"><i class="fas fa-laptop"></i></div>
            <div><p id="statAssets" class="text-2xl font-black text-slate-800">-</p><p class="text-[9px] font-bold text-slate-400 uppercase tracking-wider">ครุภัณฑ์</p></div>
        </div>
    </div>
    <div id="contentArea" class="space-y-6"></div>
</main>

<!-- Modal: Dept Detail -->
<div id="modalDept" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md hidden items-center justify-center z-[200] p-4 no-print" onclick="closeModal()">
    <div class="bg-white w-full max-w-6xl max-h-[90vh] rounded-[2.5rem] shadow-2xl flex flex-col overflow-hidden" onclick="event.stopPropagation()">
        <div class="p-6 md:p-8 border-b-2 border-slate-50 flex justify-between items-center bg-white sticky top-0 z-10">
            <div class="flex items-center gap-6">
                <div class="w-16 h-16 rounded-2xl overflow-hidden bg-slate-50 border-2 border-slate-100 flex-shrink-0">
                    <img id="mDeptPic" src="" class="w-full h-full object-cover">
                </div>
                <div>
                    <h3 id="mDeptName" class="text-xl md:text-2xl font-black text-slate-800"></h3>
                    <div id="mDeptLoc" class="text-xs md:text-sm font-bold text-slate-400 uppercase flex items-center gap-2"></div>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <!-- เพิ่มปุ่ม ดูรายละเอียดเชิงลึก -->
                <a id="mDeptDetailBtn" href="#" target="_blank" class="px-6 py-3 bg-pink-500 text-white rounded-2xl font-bold text-sm shadow-lg shadow-pink-200 hover:bg-pink-600 transition-all flex items-center gap-2">
                    <i class="fas fa-external-link-alt"></i> ดูรายละเอียดเชิงลึก
                </a>
                <button onclick="closeModal()" class="w-12 h-12 rounded-full bg-slate-100 text-slate-400 hover:bg-pink-500 hover:text-white transition-all flex items-center justify-center">
                    <i class="fas fa-times"></i>
                </button>
            </div>
        </div>
        <div id="mAssetGroupContainer" class="p-4 md:p-8 overflow-y-auto flex-1 bg-slate-50/30 custom-scroll"></div>
    </div>
</div>

<!-- Modal Report (Advanced) -->
<div id="modalReport" class="fixed inset-0 bg-slate-900/80 backdrop-blur-md hidden items-center justify-center z-[300] p-0 md:p-4" onclick="closeReportModal()">
    <div class="bg-white w-full max-w-[1200px] h-full md:h-[95vh] md:rounded-[3rem] shadow-2xl flex flex-col overflow-hidden" onclick="event.stopPropagation()">
        
        <div class="p-6 bg-slate-50 border-b no-print">
            <div class="flex justify-between items-center mb-6">
                <div class="flex items-center gap-4">
                    <h3 class="text-xl font-black uppercase"><i class="fas fa-file-invoice text-pink-500 mr-2"></i>รายงานและตัวกรอง</h3>
                    <button onclick="clearReportFilters()" class="text-[10px] font-black text-pink-500 hover:text-pink-700 underline uppercase tracking-widest"><i class="fas fa-trash-alt mr-1"></i> Clear Filters</button>
                </div>
                <div class="flex gap-2">
                    <button onclick="exportToExcel()" class="px-5 py-2 bg-emerald-600 text-white rounded-xl text-xs font-bold hover:bg-emerald-700 shadow-md">
                        <i class="fas fa-file-excel mr-2"></i> Export Excel
                    </button>
                    <button onclick="window.print()" class="px-5 py-2 bg-pink-500 text-white rounded-xl text-xs font-bold hover:bg-pink-600 shadow-md">
                        <i class="fas fa-print mr-2"></i> พิมพ์ PDF
                    </button>
                    <button onclick="closeReportModal()" class="px-5 py-2 bg-slate-200 text-slate-600 rounded-xl text-xs font-bold">ปิด</button>
                </div>
            </div>

            <!-- Report Filters -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="space-y-3">
                    <div class="flex items-center gap-2 p-2 bg-white rounded-xl border border-slate-200">
                        <span class="text-[10px] font-black text-slate-400 uppercase px-2 border-r min-w-[50px]">พื้นที่:</span>
                        <select id="fBuilding" onchange="handleBuildingChange()" class="text-xs font-bold outline-none w-1/3"></select>
                        <select id="fFloor" onchange="handleFloorChange()" class="text-xs font-bold outline-none w-1/3"></select>
                        <select id="fDept" onchange="handleDeptChange()" class="text-xs font-bold outline-none w-1/3 border-l pl-2"></select>
                    </div>
                    <div class="flex items-center gap-2 p-2 bg-white rounded-xl border border-slate-200">
                        <span class="text-[10px] font-black text-slate-400 uppercase px-2 border-r min-w-[50px]">ประเภท:</span>
                        <div id="rAssetTypeFilters" class="flex flex-wrap gap-1 overflow-x-auto"></div>
                    </div>
                </div>
                <div class="space-y-3">
                    <div class="flex items-center gap-2 p-2 bg-white rounded-xl border border-slate-200">
                        <span class="text-[10px] font-black text-slate-400 uppercase px-2 border-r min-w-[50px]">ความสำคัญ:</span>
                        <div id="rPriorityFilters" class="flex flex-wrap gap-1"></div>
                    </div>
                    <div class="flex items-center gap-2 p-2 bg-white rounded-xl border border-slate-200">
                        <span class="text-[10px] font-black text-slate-400 uppercase px-2 border-r min-w-[50px]">อายุ:</span>
                        <div id="rAgeFilters" class="flex flex-wrap gap-1">
                            <button onclick="toggleReportFilter(this, 'age', 'low')" class="multi-select-chip px-2 py-1 bg-slate-50 rounded text-[9px] font-bold text-slate-500">&lt; 4 ปี</button>
                            <button onclick="toggleReportFilter(this, 'age', 'mid')" class="multi-select-chip px-2 py-1 bg-slate-50 rounded text-[9px] font-bold text-slate-500">4-6 ปี</button>
                            <button onclick="toggleReportFilter(this, 'age', 'high')" class="multi-select-chip px-2 py-1 bg-slate-50 rounded text-[9px] font-bold text-slate-500">7-9 ปี</button>
                            <button onclick="toggleReportFilter(this, 'age', 'old')" class="multi-select-chip px-2 py-1 bg-slate-50 rounded text-[9px] font-bold text-slate-500">10+ ปี</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Report Content -->
        <div id="reportPrintArea" class="flex-1 overflow-y-auto p-10 bg-white custom-scroll">
            <div id="reportPreviewContent"></div>
        </div>
    </div>
</div>

<script>
    const APP_URL = "https://script.google.com/macros/s/AKfycbwb_1Yppy3h_hy4dX1RkN3-l_YKKlC3FWKewmzCHM-q6SHrlbxsm-U-SGMUj1mYXwkMuQ/exec";
    let state = { logs: [], depts: [], assetTypes: [], priorities: [] };
    let mainDisplayMode = 'grid';
    let reportFilters = { building: '', floor: '', deptId: '', priority: [], assetType: [], age: [] };

    const floorThemes = [
        { bg: 'bg-emerald-50', border: 'border-emerald-200', badge: 'bg-emerald-500', cardBorder: 'border-emerald-100' },
        { bg: 'bg-blue-50', border: 'border-blue-200', badge: 'bg-blue-500', cardBorder: 'border-blue-100' },
        { bg: 'bg-amber-50', border: 'border-amber-200', badge: 'bg-amber-500', cardBorder: 'border-amber-100' },
        { bg: 'bg-rose-50', border: 'border-rose-200', badge: 'bg-rose-500', cardBorder: 'border-rose-100' }
    ];

    async function init() {
        const icon = document.getElementById('refreshIcon');
        icon?.classList.add('animate-spin');
        try {
            const ts = new Date().getTime();
            const [logRes, deptRes, initRes] = await Promise.all([
                fetch(`${APP_URL}?action=getAuditLogs&_=${ts}`).then(r => r.json()),
                fetch(`${APP_URL}?action=getDeptList&_=${ts}`).then(r => r.json()),
                fetch(`${APP_URL}?action=getInitialData&_=${ts}`).then(r => r.json())
            ]);
            state.logs = logRes || [];
            state.depts = deptRes || [];
            state.assetTypes = initRes.assetTypes || [];
            state.priorities = initRes.priorities || [];
            
            document.getElementById('lastUpdate').innerText = `อัปเดต: ${new Date().toLocaleTimeString('th-TH')}`;
            setupReportUI();
            renderDashboard();
        } catch (err) { console.error(err); } finally { icon?.classList.remove('animate-spin'); }
    }

    function setupReportUI() {
        const buildings = [...new Set(state.depts.map(d => d.BUILDING).filter(Boolean))].sort();
        document.getElementById('fBuilding').innerHTML = '<option value="">ทุกตึก</option>' + buildings.map(b => `<option value="${b}">${b}</option>`).join('');
        
        document.getElementById('rAssetTypeFilters').innerHTML = state.assetTypes.map(t => `
            <button onclick="toggleReportFilter(this, 'assetType', '${t.id}')" class="multi-select-chip px-2 py-1 bg-slate-50 rounded text-[9px] font-bold text-slate-500 uppercase whitespace-nowrap">${t.name}</button>
        `).join('');

        document.getElementById('rPriorityFilters').innerHTML = state.priorities.map(p => `
            <button onclick="toggleReportFilter(this, 'priority', '${p.id}')" class="multi-select-chip px-2 py-1 bg-slate-50 rounded text-[9px] font-bold text-slate-500 uppercase">${p.name}</button>
        `).join('');

        handleBuildingChange();
    }

    function handleBuildingChange() {
        reportFilters.building = document.getElementById('fBuilding').value;
        const floors = !reportFilters.building ? 
            [...new Set(state.depts.map(d => d.FL).filter(Boolean))] : 
            [...new Set(state.depts.filter(d => d.BUILDING === reportFilters.building).map(d => d.FL).filter(Boolean))];
        floors.sort((a,b) => String(a).localeCompare(String(b), undefined, {numeric:true}));
        document.getElementById('fFloor').innerHTML = '<option value="">ทุกชั้น</option>' + floors.map(f => `<option value="${f}">${f}</option>`).join('');
        handleFloorChange();
    }

    function handleFloorChange() {
        reportFilters.floor = document.getElementById('fFloor').value;
        const filteredDepts = state.depts.filter(d => {
            const matchB = !reportFilters.building || d.BUILDING === reportFilters.building;
            const matchF = !reportFilters.floor || d.FL === reportFilters.floor;
            return matchB && matchF;
        });
        document.getElementById('fDept').innerHTML = '<option value="">ทุกหน่วยงาน</option>' + filteredDepts.map(d => `<option value="${d.DEP_ID}">${d.DEPNAME}</option>`).join('');
        reportFilters.deptId = '';
        updateReportPreview();
    }

    function handleDeptChange() {
        reportFilters.deptId = document.getElementById('fDept').value;
        updateReportPreview();
    }

    function clearReportFilters() {
        reportFilters = { building: '', floor: '', deptId: '', priority: [], assetType: [], age: [] };
        document.getElementById('fBuilding').value = '';
        document.getElementById('fFloor').innerHTML = '<option value="">ทุกชั้น</option>';
        document.getElementById('fDept').innerHTML = '<option value="">ทุกหน่วยงาน</option>';
        document.querySelectorAll('.multi-select-chip').forEach(btn => btn.classList.remove('active'));
        handleBuildingChange();
    }

    function toggleReportFilter(btn, category, value) {
        btn.classList.toggle('active');
        const idx = reportFilters[category].indexOf(value);
        if (idx > -1) reportFilters[category].splice(idx, 1);
        else reportFilters[category].push(value);
        updateReportPreview();
    }

    function checkAgeMatch(ageStr) {
        if (!ageStr) return false;
        const years = parseInt(ageStr.match(/(\d+)/)?.[1] || 0);
        if (reportFilters.age.includes('low') && years < 4) return true;
        if (reportFilters.age.includes('mid') && years >= 4 && years <= 6) return true;
        if (reportFilters.age.includes('high') && years >= 7 && years <= 9) return true;
        if (reportFilters.age.includes('old') && years >= 10) return true;
        return false;
    }

    function getPriorityName(pId) {
        if (!pId) return '-';
        const found = state.priorities.find(p => String(p.id) === String(pId));
        return found ? found.name : pId;
    }

    function getAssetTypeName(tId) {
        if (!tId) return '-';
        const found = state.assetTypes.find(t => String(t.id) === String(tId));
        return found ? found.name : tId;
    }

    function renderDashboard() {
        const search = (document.getElementById('searchInput')?.value || "").toLowerCase();
        const activeIds = [...new Set(state.logs.map(l => String(l.DEPT_ID).trim()))];
        
        const filteredDepts = state.depts.filter(d => 
            (d.DEPNAME.toLowerCase().includes(search) || (d.BUILDING && d.BUILDING.toLowerCase().includes(search))) 
            && activeIds.includes(String(d.DEP_ID).trim())
        );

        document.getElementById('statDepts').innerText = filteredDepts.length;
        document.getElementById('statAssets').innerText = state.logs.length.toLocaleString();

        const structure = {};
        filteredDepts.forEach(d => {
            const b = d.BUILDING || "อื่นๆ";
            const f = d.FL || "ไม่ระบุชั้น";
            if (!structure[b]) structure[b] = {};
            if (!structure[b][f]) structure[b][f] = [];
            structure[b][f].push(d);
        });

        if (mainDisplayMode === 'grid') renderGridView(structure);
        else renderTableView(structure);
    }

    function renderGridView(structure) {
        let html = "";
        Object.keys(structure).sort().forEach(building => {
            html += `<div class="building-container"><div class="building-header"><div class="flex items-center gap-4"><div class="w-10 h-10 pink-gradient rounded-xl flex items-center justify-center text-white text-lg shadow-md"><i class="fas fa-hospital"></i></div><h3 class="text-xl font-black text-slate-800 uppercase tracking-tight">${building}</h3></div></div><div class="p-6">`;
            Object.keys(structure[building]).sort((a,b) => String(a).localeCompare(String(b), undefined, {numeric:true})).forEach((floor, idx) => {
                const theme = floorThemes[idx % floorThemes.length];
                html += `<div class="floor-wrapper ${theme.bg} ${theme.border}"><div class="flex items-center gap-3 mb-4"><span class="${theme.badge} text-white px-4 py-1 rounded-lg font-black text-xs">${floor}</span></div><div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">`;
                structure[building][floor].forEach(dept => {
                    const count = state.logs.filter(l => String(l.DEPT_ID).trim() === String(dept.DEP_ID).trim()).length;
                    const dImg = dept.PIC_ID ? `https://drive.google.com/thumbnail?id=${dept.PIC_ID}&sz=w200` : `https://placehold.co/100?text=${dept.DEPNAME.charAt(0)}`;
                    html += `<div class="dept-card bg-white p-4 border-2 ${theme.cardBorder}" onclick="showDetail('${dept.DEP_ID}')"><div class="flex items-center gap-3 mb-3"><div class="w-12 h-12 rounded-xl overflow-hidden border border-slate-100 bg-slate-50 flex-shrink-0"><img src="${dImg}" class="w-full h-full object-cover"></div><div><h4 class="text-xs font-black text-slate-800 leading-tight line-clamp-2">${dept.DEPNAME}</h4></div></div><div class="pt-2 border-t border-slate-50 flex justify-between items-center"><span class="text-[10px] font-bold text-slate-400 uppercase">${count} รายการ</span></div></div>`;
                });
                html += `</div></div>`;
            });
            html += `</div></div>`;
        });
        document.getElementById('contentArea').innerHTML = html;
    }

    function renderTableView(structure) {
        let html = "";
        Object.keys(structure).sort().forEach(building => {
            html += `<div class="building-container"><div class="building-header pink-gradient !text-white rounded-t-[2.5rem]"><div class="flex items-center gap-3"><i class="fas fa-city"></i><h3 class="text-xl font-black uppercase">${building}</h3></div></div><div class="p-2 md:p-6">`;
            Object.keys(structure[building]).sort((a,b) => String(a).localeCompare(String(b), undefined, {numeric:true})).forEach(floor => {
                html += `<div class="grouped-table-container"><div class="table-floor-header"><i class="fas fa-layer-group text-pink-500 mr-2"></i> ชั้น ${floor}</div><table class="main-table"><thead><tr><th class="w-16">รูป</th><th>หน่วยงาน</th><th class="text-center w-24">ID</th><th class="text-center w-24">จำนวน</th><th class="w-12"></th></tr></thead><tbody>`;
                structure[building][floor].forEach(dept => {
                    const count = state.logs.filter(l => String(l.DEPT_ID).trim() === String(dept.DEP_ID).trim()).length;
                    const dImg = dept.PIC_ID ? `https://drive.google.com/thumbnail?id=${dept.PIC_ID}&sz=w100` : `https://placehold.co/100?text=H`;
                    html += `<tr class="dept-row cursor-pointer" onclick="showDetail('${dept.DEP_ID}')"><td><div class="w-10 h-10 rounded-lg overflow-hidden border"><img src="${dImg}" class="w-full h-full object-cover"></div></td><td class="font-bold text-sm">${dept.DEPNAME}</td><td class="text-center text-xs text-slate-400">${dept.DEP_ID}</td><td class="text-center font-black text-pink-500">${count}</td><td class="text-center text-slate-300"><i class="fas fa-chevron-right text-xs"></i></td></tr>`;
                });
                html += `</tbody></table></div>`;
            });
            html += `</div></div>`;
        });
        document.getElementById('contentArea').innerHTML = html;
    }

    function showDetail(deptId) {
        const dept = state.depts.find(d => String(d.DEP_ID).trim() === String(deptId).trim());
        if (!dept) return;

        // อัปเดตข้อมูลหัว Modal
        document.getElementById('mDeptName').innerText = dept.DEPNAME;
        document.getElementById('mDeptLoc').innerHTML = `<i class="fas fa-map-marker-alt text-pink-500"></i> ${dept.BUILDING} • ชั้น ${dept.FL}`;
        document.getElementById('mDeptPic').src = dept.PIC_ID ? `https://drive.google.com/thumbnail?id=${dept.PIC_ID}&sz=w400` : `https://placehold.co/100?text=D`;

        // อัปเดตลิงก์ปุ่ม ดูรายละเอียดเชิงลึก
        document.getElementById('mDeptDetailBtn').href = `dept_detail.html?DEP_ID=${dept.DEP_ID}`;

        const logs = state.logs.filter(l => String(l.DEPT_ID).trim() === String(deptId).trim());
        const assetGroups = {};
        logs.forEach(l => {
            const cat = getAssetTypeName(l.Asset_Type_ID);
            if (!assetGroups[cat]) assetGroups[cat] = [];
            assetGroups[cat].push(l);
        });

        let html = "";
        Object.keys(assetGroups).sort().forEach(cat => {
            html += `
                <div class="asset-category-header">
                    <span class="w-1.5 h-6 bg-pink-500 rounded-full mr-3 shadow-sm shadow-pink-200"></span>
                    <h4 class="font-black text-slate-800 uppercase tracking-tight text-lg">${cat}</h4>
                    <span class="ml-3 px-2 py-0.5 bg-slate-100 text-[11px] font-black text-slate-500 rounded-lg">
                        ${assetGroups[cat].length}
                    </span>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-8">`;
            
            assetGroups[cat].forEach(l => {
                const assetImg = l.PIC_ID ? `https://drive.google.com/thumbnail?id=${l.PIC_ID}&sz=w300` : `https://placehold.co/200?text=NO+IMAGE`;
                const pName = getPriorityName(l.Priority_ID || l.PIORITY_ID);
                html += `
                    <div class="bg-white p-4 rounded-3xl border-2 border-slate-100 flex gap-4 items-center transition-all hover:border-pink-200 hover:shadow-lg group">
                        <div class="w-24 h-24 rounded-2xl overflow-hidden bg-slate-50 flex-shrink-0 border-2 border-slate-50 group-hover:border-pink-50">
                            <img src="${assetImg}" class="w-full h-full object-cover">
                        </div>
                        <div class="flex-1">
                            <div class="flex justify-between items-start mb-1">
                                <p class="text-[10px] font-black text-pink-500 tracking-wider">${l.AssetID}</p>
                                <span class="text-[9px] font-black text-slate-400 uppercase">${pName}</span>
                            </div>
                            <h5 class="text-sm font-black text-slate-800 line-clamp-1 mb-1">${l.FullDescription}</h5>
                            <p class="text-[10px] font-bold text-slate-400 mb-2">SN: ${l.Serial_Number || '-'}</p>
                            <div class="flex flex-wrap gap-1">
                                <span class="text-[9px] font-black px-2 py-0.5 bg-slate-100 text-slate-600 rounded-full border border-slate-200">
                                    <i class="far fa-calendar-alt mr-1"></i> ${l.AgeInfo || '-'}
                                </span>
                            </div>
                        </div>
                    </div>`;
            });
            html += `</div>`;
        });

        document.getElementById('mAssetGroupContainer').innerHTML = html || `<div class="py-32 text-center"><i class="fas fa-folder-open text-slate-200 text-6xl mb-4"></i><p class="font-bold text-slate-300">ไม่พบรายการครุภัณฑ์ในหน่วยงานนี้</p></div>`;
        document.getElementById('modalDept').classList.replace('hidden', 'flex');
    }

    function updateReportPreview() {
        const preview = document.getElementById('reportPreviewContent');
        const filteredLogs = getFilteredLogs();
        const activeDeptIds = [...new Set(filteredLogs.map(l => String(l.DEPT_ID).trim()))];
        const filteredDepts = state.depts.filter(d => {
            const matchB = !reportFilters.building || d.BUILDING === reportFilters.building;
            const matchF = !reportFilters.floor || d.FL === reportFilters.floor;
            const matchD = !reportFilters.deptId || String(d.DEP_ID).trim() === String(reportFilters.deptId).trim();
            return matchB && matchF && matchD && activeDeptIds.includes(String(d.DEP_ID).trim());
        });

        let html = `
        <div class="text-center mb-8">
            <h1 class="text-2xl font-black">รายงานสรุปผลการตรวจสอบครุภัณฑ์ IT</h1>
            <p class="text-slate-500 text-sm font-bold uppercase tracking-widest">Udonthani Hospital • ข้อมูล ณ วันที่ ${new Date().toLocaleDateString('th-TH')}</p>
        </div>
        <table class="report-table">
            <thead>
                <tr>
                    <th class="text-center w-12">ลำดับ</th>
                    <th class="w-32">รหัสครุภัณฑ์</th>
                    <th>รายละเอียด / ยี่ห้อ / รุ่น</th>
                    <th class="text-center w-28">ความสำคัญ</th>
                    <th class="text-center w-24">อายุการใช้งาน</th>
                </tr>
            </thead>
            <tbody>`;

        filteredDepts.forEach(dept => {
            const dLogs = filteredLogs.filter(l => String(l.DEPT_ID).trim() === String(dept.DEP_ID).trim());
            html += `<tr class="row-group-header"><td colspan="4">${dept.DEPNAME} (${dept.BUILDING} - ชั้น ${dept.FL})</td><td class="text-center">${dLogs.length} รายการ</td></tr>`;
            dLogs.forEach((l, i) => {
                html += `<tr><td class="text-center text-slate-400">${i+1}</td><td class="font-bold">${l.AssetID}</td><td>${l.FullDescription}</td><td class="text-center font-bold">${getPriorityName(l.Priority_ID || l.PIORITY_ID)}</td><td class="text-center">${l.AgeInfo || '-'}</td></tr>`;
            });
        });

        html += `<tr class="bg-slate-800 text-white font-bold"><td colspan="4" class="text-right p-4 uppercase tracking-wider text-xs">Grand Total</td><td class="text-center p-4">${filteredLogs.length.toLocaleString()}</td></tr></tbody></table>`;
        preview.innerHTML = html;
    }

    function getFilteredLogs() {
        return state.logs.filter(l => {
            const matchP = reportFilters.priority.length === 0 || reportFilters.priority.includes(String(l.Priority_ID || l.PIORITY_ID));
            const matchT = reportFilters.assetType.length === 0 || reportFilters.assetType.includes(String(l.Asset_Type_ID));
            const matchA = reportFilters.age.length === 0 || checkAgeMatch(l.AgeInfo);
            const matchD = !reportFilters.deptId || String(l.DEPT_ID).trim() === String(reportFilters.deptId).trim();
            return matchP && matchT && matchA && matchD;
        });
    }

    function exportToExcel() {
        const filteredLogs = getFilteredLogs();
        if (filteredLogs.length === 0) {
            alert("ไม่มีข้อมูลที่จะส่งออก");
            return;
        }

        const exportData = [];
        const activeDeptIds = [...new Set(filteredLogs.map(l => String(l.DEPT_ID).trim()))];
        const filteredDepts = state.depts.filter(d => activeDeptIds.includes(String(d.DEP_ID).trim()));

        filteredDepts.forEach(dept => {
            const dLogs = filteredLogs.filter(l => String(l.DEPT_ID).trim() === String(dept.DEP_ID).trim());
            dLogs.forEach((l, i) => {
                exportData.push({
                    "หน่วยงาน": dept.DEPNAME,
                    "ตึก": dept.BUILDING,
                    "ชั้น": dept.FL,
                    "ลำดับ": i + 1,
                    "รหัสครุภัณฑ์": l.AssetID,
                    "รายละเอียด": l.FullDescription,
                    "ยี่ห้อ/รุ่น": l.Model_Number || '-',
                    "Serial Number": l.Serial_Number || '-',
                    "ความสำคัญ": getPriorityName(l.Priority_ID || l.PIORITY_ID),
                    "ประเภท": getAssetTypeName(l.Asset_Type_ID),
                    "อายุการใช้งาน": l.AgeInfo || '-'
                });
            });
        });

        const ws = XLSX.utils.json_to_sheet(exportData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "AssetAuditReport");
        const fileName = `IT_Asset_Report_${new Date().toISOString().slice(0, 10)}.xlsx`;
        XLSX.writeFile(wb, fileName);
    }

    function switchMainView(m) {
        mainDisplayMode = m;
        document.getElementById('vGrid').classList.toggle('active', m === 'grid');
        document.getElementById('vTable').classList.toggle('active', m === 'table');
        renderDashboard();
    }

    function openReportModal() { document.getElementById('modalReport').classList.replace('hidden', 'flex'); updateReportPreview(); }
    function closeReportModal() { document.getElementById('modalReport').classList.replace('flex', 'hidden'); }
    function closeModal() { document.getElementById('modalDept').classList.replace('flex', 'hidden'); }

    window.onload = init;
</script>
</body>
</html>
