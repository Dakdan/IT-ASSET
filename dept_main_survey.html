<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>IT Asset Survey UDH - Dashboard & Reports</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --pink-main: #ec4899;
            --slate-body: #f8fafc;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: var(--slate-body);
            min-height: 100vh;
        }

        .main-nav-head {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 3px solid var(--pink-main);
        }

        .search-input-box {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.05);
            border: 2px solid #e2e8f0;
            display: flex;
            align-items: center;
            transition: all 0.3s ease;
        }

        .search-input-box:focus-within { border-color: var(--pink-main); }

        .building-container {
            background: white;
            border-radius: 2.5rem;
            border: 2px solid #e2e8f0;
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            margin-bottom: 3rem;
        }

        .building-header {
            background: #fff;
            padding: 2rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #f1f5f9;
        }

        .pink-gradient {
            background: linear-gradient(135deg, #ec4899 0%, #be185d 100%);
        }

        .header-gradient {
            background: linear-gradient(135deg, #f472b6 0%, #db2777 100%);
        }

        .floor-wrapper {
            border-radius: 2rem;
            padding: 2rem;
            margin-bottom: 2rem;
            border-width: 2px;
            border-style: solid;
        }

        .dept-card {
            background: white;
            border-radius: 1.5rem;
            border-width: 2px;
            border-style: solid;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
        }

        .dept-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            border-color: var(--pink-main) !important;
        }

        .soft-card {
            border: 2px solid #f1f5f9;
            border-radius: 2rem;
            transition: all 0.3s ease;
        }

        .view-controls {
            display: flex;
            background: #f1f5f9;
            padding: 0.25rem;
            border-radius: 1rem;
            gap: 0.25rem;
        }
        
        .view-btn-main {
            padding: 0.5rem 1rem;
            border-radius: 0.75rem;
            font-size: 0.75rem;
            font-weight: 700;
            transition: all 0.2s;
            color: #64748b;
        }
        
        .view-btn-main.active {
            background: white;
            color: var(--pink-main);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        
        .main-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 0.5rem;
        }
        
        .main-table th {
            background: #f8fafc;
            padding: 1.25rem 1rem;
            text-align: left;
            font-size: 0.75rem;
            font-weight: 800;
            color: #64748b;
            text-transform: uppercase;
            border-bottom: 2px solid #e2e8f0;
        }
        
        .main-table tr.dept-row td {
            background: white;
            padding: 1.25rem 1rem;
            border-top: 2px solid #f1f5f9;
            border-bottom: 2px solid #f1f5f9;
            vertical-align: middle;
        }

        .main-table tr.dept-row td:first-child {
            border-left: 2px solid #f1f5f9;
            border-top-left-radius: 1rem;
            border-bottom-left-radius: 1rem;
        }

        .main-table tr.dept-row td:last-child {
            border-right: 2px solid #f1f5f9;
            border-top-right-radius: 1rem;
            border-bottom-right-radius: 1rem;
        }

        .main-table tr.dept-row:hover td {
            border-color: #f9a8d4;
            background: #fffdf9;
        }

        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* Modal & Print Styles */
        @media print {
            body * { visibility: hidden; }
            #reportPrintArea, #reportPrintArea * { visibility: visible; }
            #reportPrintArea { position: absolute; left: 0; top: 0; width: 100%; }
            .no-print { display: none !important; }
        }

        #modalDept.flex, #modalReport.flex { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .report-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        .report-table th, .report-table td {
            border: 1px solid #e2e8f0;
            padding: 8px;
            text-align: left;
        }
        .report-table th { background: #f8fafc; font-weight: bold; }
        .row-group-header { background-color: #f1f5f9; font-weight: 800; color: #1e293b; }
        .row-sub-total { background-color: #f8fafc; font-weight: 700; color: #ec4899; }
    </style>
</head>

<body class="text-slate-700">

<nav class="main-nav-head no-print">
    <div class="max-w-[1440px] mx-auto px-6 h-20 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 rounded-xl overflow-hidden shadow-md border border-slate-100 flex items-center justify-center bg-white">
                <img src="https://img2.pic.in.th/-227e4f6f84f29f020.png" alt="Logo" class="h-12">
            </div>
            <div>
                <h1 class="text-xl font-black text-slate-800 leading-none">IT ASSET <span class="text-pink-500">Audit</span></h1>
                <p class="text-[10px] text-slate-400 font-bold tracking-widest mt-1 uppercase">Udonthani Hospital</p>
            </div>
        </div>

        <div class="hidden md:flex flex-1 max-w-md mx-10">
            <div class="search-input-box w-full px-4 py-2">
                <i class="fas fa-search text-slate-300 mr-3"></i>
                <input id="searchInput" oninput="renderDashboard()" placeholder="ค้นหาชื่อหน่วยงาน, ตึก หรือชั้น..." class="w-full outline-none text-sm font-semibold text-slate-600 bg-transparent">
            </div>
        </div>

        <div class="flex items-center gap-4">
            <button onclick="openReportModal()" class="flex items-center gap-2 px-4 py-2 bg-slate-800 text-white rounded-xl font-bold text-sm hover:bg-slate-700 transition-all shadow-lg">
                <i class="fas fa-file-alt"></i> สร้างรายงาน
            </button>
            <div class="view-controls">
                <button onclick="switchMainView('grid')" id="vGrid" class="view-btn-main active">
                    <i class="fas fa-th-large"></i>
                </button>
                <button onclick="switchMainView('table')" id="vTable" class="view-btn-main">
                    <i class="fas fa-list"></i>
                </button>
            </div>
            <button onclick="init()" class="w-10 h-10 flex items-center justify-center text-slate-400 hover:bg-slate-50 rounded-xl transition-all">
                <i id="refreshIcon" class="fas fa-sync-alt"></i>
            </button>
        </div>
    </div>
</nav>

<main class="max-w-[1440px] mx-auto px-6 pt-10 pb-20 no-print">
    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10">
        <div class="md:col-span-2">
            <h2 class="text-3xl font-black text-slate-900 tracking-tight">สรุปข้อมูลตรวจสอบครุภัณฑ์<span class="text-pink-500"> ประจำปี 2569</span></h2>
            <p class="text-slate-500 text-sm font-medium mt-1">จำแนกตามผังอาคารและชั้นหน่วยงานที่ได้รับการสำรวจแล้ว</p>
            <p id="lastUpdate" class="text-[10px] font-bold text-slate-400 mt-2 uppercase tracking-widest">กำลังโหลดข้อมูล...</p>
        </div>
        <div class="bg-white p-6 rounded-3xl border-2 border-slate-100 flex items-center gap-5 shadow-sm">
            <div class="w-12 h-12 bg-pink-50 text-pink-500 rounded-2xl flex items-center justify-center text-xl shadow-sm">
                <i class="fas fa-building"></i>
            </div>
            <div>
                <p id="statDepts" class="text-2xl font-black text-slate-800">-</p>
                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-wider">หน่วยงานที่พบ</p>
            </div>
        </div>
        <div class="bg-white p-6 rounded-3xl border-2 border-slate-100 flex items-center gap-5 shadow-sm">
            <div class="w-12 h-12 bg-blue-50 text-blue-500 rounded-2xl flex items-center justify-center text-xl shadow-sm">
                <i class="fas fa-box"></i>
            </div>
            <div>
                <p id="statAssets" class="text-2xl font-black text-slate-800">-</p>
                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-wider">รายการครุภัณฑ์รวม</p>
            </div>
        </div>
    </div>
    <div id="contentArea" class="space-y-6"></div>
</main>

<!-- Modal: Report Generation -->
<div id="modalReport" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md hidden items-center justify-center z-[300] p-4" onclick="closeReportModal()">
    <div class="bg-white w-full max-w-6xl max-h-[90vh] rounded-[2.5rem] shadow-2xl flex flex-col overflow-hidden border-4 border-white" onclick="event.stopPropagation()">
        <!-- Filter Header -->
        <div class="p-6 border-b-2 border-slate-50 bg-slate-50/50">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                <div>
                    <h3 class="text-xl font-black text-slate-800"><i class="fas fa-print text-pink-500 mr-2"></i> ระบบออกรายงานตรวจสอบ</h3>
                    <p class="text-xs font-bold text-slate-400 mt-1 uppercase">Filter & Export Information</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="exportToExcel()" class="px-5 py-2.5 bg-emerald-500 text-white rounded-xl font-bold text-sm hover:bg-emerald-600 transition-all shadow-lg flex items-center gap-2">
                        <i class="fas fa-file-excel"></i> Export Excel
                    </button>
                    <button onclick="printReport()" class="px-5 py-2.5 bg-pink-500 text-white rounded-xl font-bold text-sm hover:bg-pink-600 transition-all shadow-lg flex items-center gap-2">
                        <i class="fas fa-print"></i> พิมพ์ / PDF
                    </button>
                    <button onclick="closeReportModal()" class="w-10 h-10 rounded-full bg-white border-2 border-slate-100 text-slate-400 hover:text-pink-500 flex items-center justify-center transition-all">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>
            
            <!-- Filters (สัมพันธ์กัน) -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-6">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase mb-1 block ml-2">ตึก / อาคาร</label>
                    <select id="fBuilding" onchange="handleBuildingFilterChange()" class="w-full bg-white border-2 border-slate-200 rounded-xl px-4 py-2.5 text-sm font-bold text-slate-600 outline-none focus:border-pink-500 cursor-pointer">
                        <option value="">ทั้งหมด</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase mb-1 block ml-2">ชั้น</label>
                    <select id="fFloor" onchange="handleFloorFilterChange()" class="w-full bg-white border-2 border-slate-200 rounded-xl px-4 py-2.5 text-sm font-bold text-slate-600 outline-none focus:border-pink-500 cursor-pointer">
                        <option value="">ทั้งหมด</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase mb-1 block ml-2">หน่วยงาน</label>
                    <select id="fDept" onchange="updateReportPreview()" class="w-full bg-white border-2 border-slate-200 rounded-xl px-4 py-2.5 text-sm font-bold text-slate-600 outline-none focus:border-pink-500 cursor-pointer">
                        <option value="">ทั้งหมด</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Preview Area -->
        <div class="flex-1 overflow-y-auto p-8 bg-white custom-scroll" id="reportPrintArea">
            <div id="reportPreviewContent"></div>
        </div>
    </div>
</div>

<!-- Modal: Dept Detail -->
<div id="modalDept" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md hidden items-center justify-center z-[200] p-4 no-print" onclick="closeModal()">
    <div class="bg-white w-full max-w-5xl max-h-[90vh] rounded-[2.5rem] shadow-2xl flex flex-col overflow-hidden border-4 border-white" onclick="event.stopPropagation()">
        <div class="p-6 md:p-8 border-b-2 border-slate-50 flex flex-col md:flex-row justify-between items-center bg-white sticky top-0 z-10 gap-4">
            <div class="flex items-center gap-6 w-full md:w-auto">
                <div id="mDeptPic" class="w-16 h-16 rounded-2xl overflow-hidden bg-slate-50 border-2 border-slate-100 flex-shrink-0 shadow-inner">
                    <img src="" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/100?text=DEPT'">

                <div class="min-w-0 flex-1">
                    <h3 id="mDeptName" class="text-xl font-black text-slate-800 truncate"></h3>

                <!-- ปุ่มดูรายละเอียดเพิ่มเติม -->
                <a id="mDeptDetailBtn" href="#" 
                   class="flex items-center gap-2 px-5 py-2.5 rounded-xl border-2 border-pink-100 text-pink-500 font-bold text-sm hover:bg-pink-50 transition-all">
                    <i class="fas fa-external-link-alt text-xs"></i> ดูรายละเอียดเพิ่มเติม
                </a>
                <button onclick="closeModal()" class="w-12 h-12 rounded-full bg-slate-100 text-slate-400 hover:bg-pink-500 hover:text-white transition-all flex items-center justify-center">
                    ❌
                </button>
            </div>
        <div id="mAssetGroupContainer" class="p-8 overflow-y-auto flex-1 bg-slate-50/30 custom-scroll"></div>
    </div>
</div>

<script>
    const APP_URL = "https://script.google.com/macros/s/AKfycbwb_1Yppy3h_hy4dX1RkN3-l_YKKlC3FWKewmzCHM-q6SHrlbxsm-U-SGMUj1mYXwkMuQ/exec";
    let state = { logs: [], depts: [], assetTypes: [], priorities: [] };
    let mainDisplayMode = 'grid';

    const floorColorThemes = [
        { bg: 'bg-emerald-50', border: 'border-emerald-200', text: 'text-emerald-600', badge: 'bg-emerald-500', cardBorder: 'border-emerald-100' },
        { bg: 'bg-blue-50', border: 'border-blue-200', text: 'text-blue-600', badge: 'bg-blue-500', cardBorder: 'border-blue-100' },
        { bg: 'bg-amber-50', border: 'border-amber-200', text: 'text-amber-600', badge: 'bg-amber-500', cardBorder: 'border-amber-100' },
        { bg: 'bg-rose-50', border: 'border-rose-200', text: 'text-rose-600', badge: 'bg-rose-500', cardBorder: 'border-rose-100' }
    ];

    async function init() {
        const icon = document.getElementById('refreshIcon');
        icon?.classList.add('animate-spin');
        try {
            const ts = new Date().getTime();
            const [logRes, deptRes, initRes] = await Promise.all([
                fetch(`${APP_URL}?action=getAuditLogs&_=${ts}`).then(r => r.json()),
                fetch(`${APP_URL}?action=getDeptList&_=${ts}`).then(r => r.json()),
                fetch(`${APP_URL}?action=getInitialData&_=${ts}`).then(r => r.json())
            ]);
            state.logs = Array.isArray(logRes) ? logRes : [];
            state.depts = Array.isArray(deptRes) ? deptRes : [];
            state.assetTypes = initRes.assetTypes || [];
            state.priorities = initRes.priorities || []; 
            
            document.getElementById('lastUpdate').innerText = `SYNCED AT: ${new Date().toLocaleTimeString('th-TH')}`;
            populateFilterOptions();
            renderDashboard();
        } catch (err) { 
            console.error(err); 
            document.getElementById('lastUpdate').innerText = "SYNC FAILED";
        } finally { 
            icon?.classList.remove('animate-spin'); 
        }
    }

    // --- Filter Logic (Relationship) ---

    function populateFilterOptions() {
        const bSelect = document.getElementById('fBuilding');
        if (!state.depts || state.depts.length === 0) return;

        const buildings = [...new Set(state.depts.map(d => d.BUILDING).filter(Boolean))].sort();
        bSelect.innerHTML = '<option value="">ทั้งหมด</option>' + buildings.map(b => `<option value="${b}">${b}</option>`).join('');
        
        // เริ่มต้นด้วยการล้างฟิลเตอร์ชั้นและหน่วยงาน
        handleBuildingFilterChange();
    }

    function handleBuildingFilterChange() {
        const bVal = document.getElementById('fBuilding').value;
        const fSelect = document.getElementById('fFloor');
        
        // กรองชั้นที่อยู่ในตึกที่เลือก
        let availableFloors = [];
        if (!bVal) {
            availableFloors = [...new Set(state.depts.map(d => d.FL).filter(Boolean))];
        } else {
            availableFloors = [...new Set(state.depts.filter(d => d.BUILDING === bVal).map(d => d.FL).filter(Boolean))];
        }
        
        availableFloors.sort((a,b) => String(a).localeCompare(String(b), undefined, {numeric: true}));
        fSelect.innerHTML = '<option value="">ทั้งหมด</option>' + availableFloors.map(f => `<option value="${f}">${f}</option>`).join('');
        fSelect.value = ""; // Reset
        
        handleFloorFilterChange();
    }

    function handleFloorFilterChange() {
        const bVal = document.getElementById('fBuilding').value;
        const fVal = document.getElementById('fFloor').value;
        const dSelect = document.getElementById('fDept');

        let filteredDepts = state.depts;
        if (bVal) filteredDepts = filteredDepts.filter(d => d.BUILDING === bVal);
        if (fVal) filteredDepts = filteredDepts.filter(d => d.FL === fVal);

        const deptNames = [...new Set(filteredDepts.map(d => d.DEPNAME).filter(Boolean))].sort();
        dSelect.innerHTML = '<option value="">ทั้งหมด</option>' + deptNames.map(d => `<option value="${d}">${d}</option>`).join('');
        dSelect.value = ""; // Reset
        
        updateReportPreview();
    }

    // --- Report & Grouping Logic ---

    function openReportModal() {
        document.getElementById('modalReport').classList.remove('hidden');
        document.getElementById('modalReport').classList.add('flex');
        
        // รีเซ็ตการเลือกทั้งหมดเมื่อเปิดหน้าจอใหม่
        document.getElementById('fBuilding').value = "";
        handleBuildingFilterChange();
    }

    function closeReportModal() {
        document.getElementById('modalReport').classList.add('hidden');
    }

    function printReport() {
        window.print();
    }

    function exportToExcel() {
        const html = document.getElementById('reportPrintArea').innerHTML;
        const blob = new Blob([html], { type: 'application/vnd.ms-excel' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `IT_Asset_Report_${new Date().getTime()}.xls`;
        a.click();
    }

    function updateReportPreview() {
        const bVal = document.getElementById('fBuilding').value;
        const fVal = document.getElementById('fFloor').value;
        const dVal = document.getElementById('fDept').value;

        // 1. กรองหน่วยงาน
        const filteredDepts = state.depts.filter(d => {
            const matchB = !bVal || String(d.BUILDING) === bVal;
            const matchF = !fVal || String(d.FL) === fVal;
            const matchD = !dVal || String(d.DEPNAME) === dVal;
            return matchB && matchF && matchD;
        });

        const deptIds = filteredDepts.map(d => String(d.DEP_ID).trim());
        const filteredLogs = state.logs.filter(l => deptIds.includes(String(l.DEPT_ID).trim()));

        // 2. จัดกลุ่มข้อมูล: หน่วยงาน -> ประเภทครุภัณฑ์
        const reportGroups = {}; // { 'DEPNAME': { 'TYPE': [logs] } }
        
        filteredLogs.forEach(l => {
            const dept = state.depts.find(d => String(d.DEP_ID).trim() === String(l.DEPT_ID).trim());
            const dName = dept?.DEPNAME || "ไม่ระบุหน่วยงาน";
            const typeName = state.assetTypes.find(t => String(t.id) === String(l.Asset_Type_ID))?.name || 'อื่นๆ';

            if (!reportGroups[dName]) reportGroups[dName] = {};
            if (!reportGroups[dName][typeName]) reportGroups[dName][typeName] = [];
            reportGroups[dName][typeName].push(l);
        });

        const preview = document.getElementById('reportPreviewContent');
        let html = `
            <div class="text-center mb-8">
                <h1 class="text-2xl font-black text-slate-800">รายงานตรวจสอบครุภัณฑ์คอมพิวเตอร์ (แยกตามหน่วยงาน)</h1>
                <p class="text-sm font-bold text-slate-500 mt-1">โรงพยาบาลอุดรธานี | ประจำปี 2569</p>
                <div class="mt-4 inline-flex flex-wrap justify-center gap-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest border-t border-b py-2 border-slate-100">
                    <span>ตึก: ${bVal || 'ทั้งหมด'}</span>
                    <span>ชั้น: ${fVal || 'ทั้งหมด'}</span>
                    <span>หน่วยงาน: ${dVal || 'ทั้งหมด'}</span>
                    <span class="text-pink-500 font-black">รวมทั้งหมด: ${filteredLogs.length} รายการ</span>
                </div>
            </div>
        `;

        if (filteredLogs.length === 0) {
            html += `<div class="py-20 text-center text-slate-300 font-bold flex flex-col items-center">
                        <i class="fas fa-folder-open text-5xl mb-4 opacity-20"></i>
                        ไม่พบข้อมูลตามเงื่อนไขที่เลือก
                    </div>`;
        } else {
            // สร้างตารางแบบ Grouped
            html += `
                <table class="report-table rounded-xl overflow-hidden shadow-sm">
                    <thead>
                        <tr>
                            <th class="w-12 text-center">ลำดับ</th>
                            <th class="w-40">รหัสครุภัณฑ์</th>
                            <th>รายละเอียด / ยี่ห้อ / รุ่น / S/N</th>
                            <th class="w-20 text-center">อายุ (ปี)</th>
                            <th class="w-24 text-center">สถานะ</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            // เรียงชื่อหน่วยงาน
            Object.keys(reportGroups).sort().forEach((deptName) => {
                const types = reportGroups[deptName];
                let deptTotal = 0;
                Object.values(types).forEach(arr => deptTotal += arr.length);

                // แถวหัวข้อหน่วยงาน (Header Group)
                html += `
                    <tr class="row-group-header">
                        <td colspan="3" class="p-3">
                            <i class="fas fa-hospital text-pink-500 mr-2"></i> ${deptName}
                        </td>
                        <td colspan="2" class="text-right p-3 text-pink-600">
                            รวมหน่วยงาน: ${deptTotal} รายการ
                        </td>
                    </tr>
                `;

                // วนลูปแยกตามประเภทครุภัณฑ์
                Object.keys(types).sort().forEach(typeName => {
                    const logs = types[typeName];
                    
                    // แถวย่อยประเภทครุภัณฑ์
                    html += `
                        <tr class="bg-pink-50/30">
                            <td colspan="5" class="px-6 py-2 font-bold text-slate-600 text-[11px]">
                                <i class="fas fa-caret-right mr-2"></i>ประเภท: ${typeName} (${logs.length})
                            </td>
                        </tr>
                    `;

                    logs.forEach((item, index) => {
                        const age = calculateAge(item.Purchase_Date || item.Acquisition_Date);
                        html += `
                            <tr>
                                <td class="text-center text-slate-400 font-medium">${index + 1}</td>
                                <td class="font-black text-slate-700">${item.AssetID || '-'}</td>
                                <td>
                                    <div class="font-bold text-slate-800">${item.FullDescription || '-'}</div>
                                    <div class="text-[10px] text-slate-500 mt-0.5 uppercase">SN: ${item.Serial_Number || 'ไม่ระบุ'}</div>
                                </td>
                                
                                <td class="text-center font-black text-slate-600">${a.AgeInfo}</td>
                                <td class="text-center">
                                    <span class="text-[9px] font-bold text-emerald-500 bg-emerald-50 px-2 py-0.5 rounded border border-emerald-100">ตรวจสอบแล้ว</span>
                                </td>
                            </tr>
                        `;
                    });
                });
            });

            html += `</tbody>
                <tfoot>
                    <tr class="bg-slate-800 text-white font-black">
                        <td colspan="2" class="p-4 text-center text-sm uppercase tracking-widest">สรุปยอดรวมทั้งสิ้น</td>
                        <td colspan="3" class="p-4 text-right text-lg">${filteredLogs.length} รายการ</td>
                    </tr>
                </tfoot>
            </table>`;
        }

        // ส่วนท้ายเอกสาร
        html += `
            <div class="mt-20 flex justify-between px-10 no-print-visible mb-10">
                <div class="text-center">
                    <div class="w-48 border-b-2 border-slate-300 mb-2 mx-auto"></div>
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">เจ้าหน้าที่ตรวจสอบ</p>
                </div>
                <div class="text-center">
                    <div class="w-48 border-b-2 border-slate-300 mb-2 mx-auto"></div>
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">หัวหน้าหน่วยงาน / พยาน</p>
                </div>
            </div>
            <div class="text-right text-[8px] text-slate-300 font-bold border-t pt-4">
                พิมพ์เมื่อ: ${new Date().toLocaleString('th-TH')} | ระบบ IT Asset Audit UDH
            </div>
        `;

        preview.innerHTML = html;
    }

   

    // --- Dashboard UI Logic (Grid/Table) ---

    function switchMainView(mode) {
        mainDisplayMode = mode;
        document.getElementById('vGrid').classList.toggle('active', mode === 'grid');
        document.getElementById('vTable').classList.toggle('active', mode === 'table');
        renderDashboard();
    }

    function renderDashboard() {
        const area = document.getElementById('contentArea');
        const search = (document.getElementById('searchInput')?.value || "").toLowerCase().trim();
        
        const activeDeptIds = [...new Set(state.logs.map(l => String(l.DEPT_ID).trim()))];
        const filteredDepts = state.depts.filter(d => 
            activeDeptIds.includes(String(d.DEP_ID).trim()) && 
            (d.DEPNAME.toLowerCase().includes(search) || 
             (d.BUILDING && d.BUILDING.toLowerCase().includes(search)) ||
             (d.FL && d.FL.toLowerCase().includes(search)))
        );

        document.getElementById('statDepts').innerText = filteredDepts.length;
        document.getElementById('statAssets').innerText = state.logs.length.toLocaleString();

        if (mainDisplayMode === 'grid') renderGridMode(area, filteredDepts);
        else renderTableMode(area, filteredDepts);
    }

    function renderGridMode(container, filteredDepts) {
        const structure = {};
        filteredDepts.forEach(d => {
            const b = d.BUILDING || "อื่นๆ";
            const f = d.FL || "ไม่ระบุชั้น";
            if (!structure[b]) structure[b] = {};
            if (!structure[b][f]) structure[b][f] = [];
            structure[b][f].push(d);
        });

        let html = "";
        Object.keys(structure).sort().forEach(building => {
            const bDepts = filteredDepts.filter(d => d.BUILDING === building);
            const bTotal = bDepts.reduce((acc, curr) => acc + state.logs.filter(l => String(l.DEPT_ID).trim() === String(curr.DEP_ID).trim()).length, 0);

            html += `
                <div class="building-container">
                    <div class="building-header">
                        <div class="flex items-center gap-5">
                            <div class="w-12 h-12 pink-gradient rounded-2xl flex items-center justify-center text-white shadow-lg text-xl"><i class="fas fa-hospital"></i></div>
                            <div>
                                <h3 class="text-2xl font-black text-slate-800 uppercase tracking-tight">${building}</h3>
                                <p class="text-[10px] text-slate-400 font-bold tracking-widest uppercase">Udon Thani Hospital</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-3xl font-black text-pink-500 leading-none">${bTotal}</p>
                            <p class="text-[10px] font-bold text-slate-400 uppercase mt-1">รายการรวม</p>
                        </div>
                    </div>
                    <div class="p-8">`;

            Object.keys(structure[building]).sort((a,b) => String(a).localeCompare(String(b), undefined, {numeric:true})).forEach((floor, idx) => {
                const theme = floorColorThemes[idx % floorColorThemes.length];
                html += `
                    <div class="floor-wrapper ${theme.bg} ${theme.border} mb-8 last:mb-0">
                        <div class="flex items-center gap-4 mb-6">
                            <span class="${theme.badge} text-white px-5 py-1.5 rounded-xl font-black text-sm shadow-md border-2 border-white/20">${floor}</span>
                            <div class="flex-1 h-[2px] bg-white/50"></div>
                        </div>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">`;

                structure[building][floor].forEach(dept => {
                    const dLogs = state.logs.filter(l => String(l.DEPT_ID).trim() === String(dept.DEP_ID).trim());
                    const dImg = dept.PIC_ID ? `https://lh3.googleusercontent.com/d/${dept.PIC_ID}` : `https://placehold.co/100?text=${dept.DEPNAME.charAt(0)}`;
                    html += `
                        <div class="dept-card bg-white p-5 border-2 ${theme.cardBorder}" onclick="showDetail('${dept.DEP_ID}')">
                            <div class="flex items-center gap-4 mb-4">
                                <div class="w-14 h-14 rounded-2xl overflow-hidden border-2 border-slate-100 flex-shrink-0 shadow-inner bg-slate-50">
                                    <img src="${dImg}" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/100?text=${dept.DEPNAME.charAt(0)}'">
                                </div>
                                <div class="min-w-0">
                                    <h4 class="text-sm font-black text-slate-800 leading-tight line-clamp-2">${dept.DEPNAME}</h4>
                                    <p class="text-[10px] font-bold text-slate-400 mt-1 uppercase tracking-tight">ID: ${dept.DEP_ID}</p>
                                </div>
                            </div>
                            <div class="flex items-center justify-between pt-4 border-t-2 border-slate-50">
                                 <span class="text-[9px] bg-slate-100 text-slate-500 px-2 py-0.5 rounded font-black uppercase">${a.AgeInfo || 'N/A'}</span>
                                <span class="px-3 py-1 rounded-lg ${theme.bg} ${theme.text} font-black text-xs border ${theme.cardBorder}">${dLogs.length} รายการ</span>
                            </div>
                        </div>`;
                });
                html += `</div></div>`;
            });
            html += `</div></div>`;
        });
        container.innerHTML = html || `<div class="p-20 text-center text-slate-300 font-bold text-xl"><i class="fas fa-search mb-4 text-5xl opacity-20 block"></i> ไม่พบข้อมูลที่ค้นหา</div>`;
    }

    function renderTableMode(container, filteredDepts) {
        const structure = {};
        filteredDepts.forEach(d => {
            const b = d.BUILDING || "อื่นๆ";
            const f = d.FL || "ไม่ระบุชั้น";
            if (!structure[b]) structure[b] = {};
            if (!structure[b][f]) structure[b][f] = [];
            structure[b][f].push(d);
        });

        let html = "";
        Object.keys(structure).sort().forEach(building => {
            html += `
                <div class="building-container bg-white mb-10 overflow-hidden shadow-sm border-2 border-slate-200 rounded-[2.5rem]">
                    <div class="header-gradient p-6 flex justify-between items-center text-white border-b-2 border-pink-600/20">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 bg-white/20 backdrop-blur-md rounded-lg flex items-center justify-center text-xl border border-white/30"><i class="fas fa-hospital text-white"></i></div>
                            <h3 class="text-xl font-black uppercase tracking-tight">${building}</h3>
                        </div>
                    </div>
                    <div class="p-4 sm:p-6">`;

            Object.keys(structure[building]).sort((a,b) => String(a).localeCompare(String(b), undefined, {numeric:true})).forEach(floor => {
                html += `
                    <div class="mb-6 last:mb-0">
                        <div class="bg-slate-50/80 px-6 py-3 border-2 border-slate-100 rounded-2xl flex items-center gap-3 mb-4">
                            <span class="bg-pink-500 text-white px-3 py-1 rounded-md font-bold text-[10px] uppercase shadow-sm border border-white/20">${floor}</span>
                            <div class="h-[2px] flex-1 bg-slate-200"></div>
                        </div>
                        <div class="overflow-x-auto px-1">
                            <table class="main-table w-full border-separate">
                                <thead>
                                    <tr>
                                        <th class="w-[80px] px-6 py-4 text-center">รูป</th>
                                        <th class="px-6 py-4">หน่วยงาน</th>
                                        <th class="text-center px-6 py-4">จำนวนสำรวจ</th>
                                        <th class="text-center px-6 py-4">สถานะ</th>
                                        <th class="w-[60px] text-center px-6 py-4"></th>
                                    </tr>
                                </thead>
                                <tbody>`;

                structure[building][floor].forEach(d => {
                    const dLogs = state.logs.filter(l => String(l.DEPT_ID).trim() === String(d.DEP_ID).trim());
                    const dImg = d.PIC_ID ? `https://lh3.googleusercontent.com/d/${d.PIC_ID}` : `https://placehold.co/100?text=${d.DEPNAME.charAt(0)} `;
                    html += `
                        <tr class="dept-row group cursor-pointer" onclick="showDetail('${d.DEP_ID}')">
                            <td class="text-center">
                                <div class="w-12 h-12 mx-auto rounded-xl overflow-hidden border-2 border-slate-100 shadow-inner bg-slate-50 transition-transform group-hover:scale-110 flex items-center justify-center">
                                    <img src="${dImg}" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/100?text=${d.DEPNAME.charAt(0)}'">
                                </div>
                            </td>
                            <td>
                                <div>
                                    <span class="font-bold text-slate-800 group-hover:text-pink-600 block text-sm transition-colors">${d.DEPNAME}</span>
                                    <span class="text-[9px] font-bold text-slate-400 uppercase tracking-tighter block mt-0.5">DEP_ID: ${d.DEP_ID}</span>
                                </div>
                            </td>
                            <td class="text-center">
                                <span class="text-base font-black text-slate-700">${dLogs.length}</span>
                            </td>
                            <td class="text-center">
                                <span class="px-3 py-1 rounded-lg bg-emerald-50 text-emerald-600 font-black text-[9px] uppercase border border-emerald-100">สำรวจเรียบร้อย</span>
                            </td>
                            <td class="text-center">
                                <i class="fas fa-chevron-right text-xs text-slate-300 group-hover:text-pink-500 transition-all"></i>
                            </td>
                        </tr>`;
                });
                html += `</tbody></table></div></div>`;
            });
            html += `</div></div>`;
        });
        container.innerHTML = html;
    }

    function showDetail(deptId) {
        const dept = state.depts.find(d => String(d.DEP_ID).trim() === String(deptId).trim());
        const logs = state.logs.filter(l => String(l.DEPT_ID).trim() === String(deptId).trim());
        if(!dept) return;
        
        document.getElementById('mDeptName').innerText = dept.DEPNAME;
        document.getElementById('mDeptLoc').innerHTML = `<i class="fas fa-building text-pink-500"></i> ${dept.BUILDING} | ชั้น ${dept.FL}`;
        
        const mImg = dept.PIC_ID ? `https://lh3.googleusercontent.com/d/${dept.PIC_ID}` : `https://placehold.co/100?text=DEPT`;
        document.getElementById('mDeptPic').querySelector('img').src = mImg;

        const byType = {};
        logs.forEach(l => { 
            const typeName = state.assetTypes.find(x => String(x.id) === String(l.Asset_Type_ID))?.name || 'อื่นๆ';
            if(!byType[typeName]) byType[typeName] = []; 
            byType[typeName].push(l); 
        });
        
        const container = document.getElementById('mAssetGroupContainer');
        container.innerHTML = Object.keys(byType).sort().map(type => `
            <div class="mb-10">
                <div class="flex items-center gap-3 mb-5 border-l-4 border-pink-500 pl-4">
                    <h4 class="text-sm font-black text-slate-800 uppercase">${type} (${byType[type].length})</h4>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    ${byType[type].map(a => {
                        const pri = getPriority(a.Priority_ID || a.PIORITY_ID);
                        const aImg = a.ASSET_IMG_DB ? `https://lh3.googleusercontent.com/d/${a.ASSET_IMG_DB}` : 'https://placehold.co/200?text=NO+IMAGE';
                        return `
                        <div class="soft-card bg-white p-5 flex flex-col sm:flex-row gap-6 border-2 border-slate-100 rounded-2xl">
                            <div class="w-full sm:w-24 h-48 sm:h-24 rounded-2xl border-2 border-slate-50 flex-shrink-0 overflow-hidden bg-slate-50 shadow-inner flex items-center justify-center">
                                <img src="${aImg}" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/200?text=NO+IMAGE'">
                            </div>
                            <div class="flex-1 min-w-0">
                                <div class="bg-pink-600 text-white px-4 py-2 rounded-xl mb-3 shadow-sm border border-white/20">
                                    <p class="text-[9px] text-pink-200 font-bold uppercase">รหัสครุภัณฑ์</p>
                                    <p class="text-sm font-black truncate">🆔 ${a.AssetID || 'N/A'}</p>
                                </div>
                                <h5 class="text-sm font-bold text-slate-700 leading-normal line-clamp-2 mb-2">${a.FullDescription || '-'}</h5>
                                <div class="flex flex-wrap gap-2 pt-2 border-t-2 border-slate-50">
                                    <span class="text-[9px] font-black px-3 py-1 rounded-lg border-2 ${pri.color} uppercase">
                                     <span class="text-[9px] bg-slate-100 text-slate-500 px-2 py-0.5 rounded font-black uppercase">${a.AgeInfo || 'N/A'}</span>
                                        <i class="fas ${pri.icon} mr-1"></i> ${pri.name}
                                    </span>
                                </div>
                            </div>
                        </div>`;
                    }).join('')}
                </div>
            </div>
        `).join('');
        
        document.getElementById('modalDept').classList.remove('hidden');
        document.getElementById('modalDept').classList.add('flex');
        document.body.style.overflow = 'hidden';
    }

   

    function closeModal() { 
        document.getElementById('modalDept').classList.add('hidden'); 
        document.body.style.overflow = 'auto'; 
    }

    window.onload = init;
</script>
