<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>IT Asset Survey UDH - Dashboard</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --pink-main: #ec4899;
            --slate-body: #f8fafc;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: var(--slate-body);
            min-height: 100vh;
        }

        .main-nav-head {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 3px solid var(--pink-main);
        }

        .search-input-box {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.05);
            border: 2px solid #e2e8f0;
            display: flex;
            align-items: center;
            transition: all 0.3s ease;
        }

        .search-input-box:focus-within { border-color: var(--pink-main); }

        .building-container {
            background: white;
            border-radius: 2.5rem;
            border: 1px solid #e2e8f0;
            box-shadow: 0 15px 35px -10px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            margin-bottom: 3rem;
        }

        .building-header {
            background: #fff;
            padding: 2rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #f1f5f9;
        }

        .pink-gradient {
            background: linear-gradient(135deg, #ec4899 0%, #be185d 100%);
        }

        .floor-wrapper {
            border-radius: 2rem;
            padding: 2rem;
            margin-bottom: 2rem;
            border-width: 1px;
            border-style: solid;
        }

        .dept-card {
            background: white;
            border-radius: 1.5rem;
            border-width: 2px;
            border-style: solid;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .dept-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.1);
        }

        .soft-card {
            border: 1px solid #f1f5f9;
            border-radius: 2rem;
            transition: all 0.3s ease;
        }
        .soft-card:hover {
            border-color: #f9a8d4;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }
        /* เพิ่มเติมจากเดิม */
        .custom-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
        }
        .custom-table th {
            background: #f8fafc;
            color: #64748b;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            padding: 1rem;
            border-bottom: 2px solid #f1f5f9;
            text-align: left;
        }
        .custom-table td {
            padding: 1rem;
            border-bottom: 1px solid #f1f5f9;
            font-size: 0.875rem;
        }
        /* ส่วนควบคุมการสลับ View ที่หน้าหลัก */
        .view-controls {
            display: flex;
            background: #f1f5f9;
            padding: 0.25rem;
            border-radius: 1rem;
            gap: 0.25rem;
        }
        
        .view-btn-main {
            padding: 0.5rem 1rem;
            border-radius: 0.75rem;
            font-size: 0.75rem;
            font-weight: 700;
            transition: all 0.2s;
            color: #64748b;
        }
        
        .view-btn-main.active {
            background: white;
            color: var(--pink-main);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        
        /* สไตล์ตารางหน้าหลัก */
        .main-table-container {
            background: white;
            border-radius: 2rem;
            border: 1px solid #e2e8f0;
            overflow: hidden;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }
        
        .main-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .main-table th {
            background: #f8fafc;
            padding: 1.25rem 1rem;
            text-align: left;
            font-size: 0.75rem;
            font-weight: 800;
            color: #64748b;
            text-transform: uppercase;
            border-bottom: 2px solid #f1f5f9;
        }
        
        .main-table td {
            padding: 1.25rem 1rem;
            border-bottom: 1px solid #f1f5f9;
            vertical-align: middle;
        }
        .view-btn.active {
            background-color: #ec4899;
            color: white;
            border-color: #ec4899;
        }

        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        #modalDept.flex { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>

<body class="text-slate-700">

<nav class="main-nav-head">
    <div class="max-w-[1440px] mx-auto px-6 h-20 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 rounded-xl overflow-hidden shadow-md border border-slate-100 flex items-center justify-center bg-white">
                <img src="https://img2.pic.in.th/-227e4f6f84f29f020.png" alt="Logo" class="h-12">
            </div>
            <div>
                <h1 class="text-xl font-black text-slate-800 leading-none">IT ASSET <span class="text-pink-500">Audit</span></h1>
                <p class="text-[10px] text-slate-400 font-bold tracking-widest mt-1 uppercase">Udonthani Hospital</p>
            </div>
        </div>

        <div class="hidden md:flex flex-1 max-w-md mx-10">
            <div class="search-input-box w-full px-4 py-2">
                <i class="fas fa-search text-slate-300 mr-3"></i>
                <input id="searchInput" oninput="renderDashboard()" placeholder="ค้นหาชื่อหน่วยงาน, ตึก หรือชั้น..." class="w-full outline-none text-sm font-semibold text-slate-600 bg-transparent">
                <div class="flex justify-end mb-6">
    
            </div>
        </div>
        <div class="view-controls">
                <button onclick="switchMainView('grid')" id="vGrid" class="view-btn-main active">
                    <i class="fas fa-th-large mr-2"></i> ผังอาคาร
                </button>
                <button onclick="switchMainView('table')" id="vTable" class="view-btn-main">
                    <i class="fas fa-list mr-2"></i> ตารางสรุป
                </button>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <div id="lastUpdate" class="text-[10px] font-bold text-slate-400 text-right leading-tight uppercase">
                LOADING DATA...
            </div>
            <button onclick="init()" class="w-10 h-10 flex items-center justify-center text-slate-400 hover:bg-slate-50 rounded-xl transition-all">
                <i id="refreshIcon" class="fas fa-sync-alt"></i>
            </button>
        </div>
    </div>
</nav>

<main class="max-w-[1440px] mx-auto px-6 pt-10 pb-20">
    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10">
        <div class="md:col-span-2">
            <h2 class="text-3xl font-black text-slate-900 tracking-tight">สรุปข้อมูลตรวจสอบครุภัณฑ์<span class="text-pink-500"> ประจำปี 2569</span></h2>
            <p class="text-slate-500 text-sm font-medium mt-1">จำแนกตามผังอาคารและชั้นหน่วยงานที่ได้รับการสำรวจแล้ว</p>
        </div>
        <div class="bg-white p-6 rounded-3xl border border-slate-100 flex items-center gap-5">
            <div class="w-12 h-12 bg-pink-50 text-pink-500 rounded-2xl flex items-center justify-center text-xl shadow-sm">
                <i class="fas fa-building"></i>
            </div>
            <div>
                <p id="statDepts" class="text-2xl font-black text-slate-800">-</p>
                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-wider">หน่วยงานที่พบ</p>
            </div>
        </div>
        <div class="bg-white p-6 rounded-3xl border border-slate-100 flex items-center gap-5">
            <div class="w-12 h-12 bg-blue-50 text-blue-500 rounded-2xl flex items-center justify-center text-xl shadow-sm">
                <i class="fas fa-box"></i>
            </div>
            <div>
                <p id="statAssets" class="text-2xl font-black text-slate-800">-</p>
                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-wider">รายการครุภัณฑ์รวม</p>
            </div>
        </div>
    </div>
    <div id="contentArea" class="space-y-6"></div>
</main>

<!-- Modal -->
<div id="modalDept" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md hidden items-center justify-center z-[200] p-4" onclick="closeModal()">
    <div class="bg-white w-full max-w-5xl max-h-[90vh] rounded-[2.5rem] shadow-2xl flex flex-col overflow-hidden" onclick="event.stopPropagation()">
        <div class="p-6 md:p-8 border-b-2 border-slate-50 flex flex-col md:flex-row justify-between items-center bg-white sticky top-0 z-10 gap-4">
            <div class="flex items-center gap-6 w-full md:w-auto">
                <div id="mDeptPic" class="w-16 h-16 rounded-2xl overflow-hidden bg-slate-50 border-2 border-slate-100 flex-shrink-0 shadow-inner">
                    <img src="" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/100?text=DEPT'">
                </div>
                <div class="min-w-0 flex-1">
                    <h3 id="mDeptName" class="text-xl font-black text-slate-800 truncate"></h3>
                    <div id="mDeptLoc" class="mt-1 text-xs font-bold text-slate-400 uppercase flex items-center gap-2"></div>
                </div>
            </div>
            <div class="flex items-center gap-3 w-full md:w-auto justify-end">
                <!-- ปุ่มดูรายละเอียดเพิ่มเติม -->
                <a id="mDeptDetailBtn" href="#" 
                   class="flex items-center gap-2 px-5 py-2.5 rounded-xl border-2 border-pink-100 text-pink-500 font-bold text-sm hover:bg-pink-50 transition-all">
                    <i class="fas fa-external-link-alt text-xs"></i> ดูรายละเอียดเพิ่มเติม
                </a>
                <button onclick="closeModal()" class="w-12 h-12 rounded-full bg-slate-100 text-slate-400 hover:bg-pink-500 hover:text-white transition-all flex items-center justify-center">
                    ❌
                </button>
            </div>
        </div>
        <div id="mAssetGroupContainer" class="p-8 overflow-y-auto flex-1 bg-slate-50/30 custom-scroll"></div>
    </div>
</div>

<script>
    const APP_URL = "https://script.google.com/macros/s/AKfycbwb_1Yppy3h_hy4dX1RkN3-l_YKKlC3FWKewmzCHM-q6SHrlbxsm-U-SGMUj1mYXwkMuQ/exec";
    
    let state = { logs: [], depts: [], assetTypes: [], priorities: [] };

    function calculateAge(buyDate) {
        if (!buyDate) return "ไม่ระบุ";
        try {
            const buy = new Date(buyDate);
            const now = new Date();
            if (isNaN(buy)) return "ข้อมูลวันที่ผิด";
            let years = now.getFullYear() - buy.getFullYear();
            let months = now.getMonth() - buy.getMonth();
            if (months < 0) { years--; months += 12; }
            if (years > 0) return `${years} ปี ${months} เดือน`;
            return `${months} เดือน`;
        } catch(e) { return "-"; }
    }

    // Logic ดึงข้อมูล Priority (ห้ามแก้ไขตามต้นฉบับ)
    function getPriority(id) {
        const p = state.priorities.find(x => String(x.id).trim() === String(id).trim());
        if (p) return p;
        const config = {
            'PIO-001': { color: 'border-red-100 text-red-500 bg-red-50', icon: 'fa-fire', name: 'ด่วนมาก' },
            'PIO-002': { color: 'border-blue-100 text-blue-500 bg-blue-50', icon: 'fa-star', name: 'ด่วน' },
            'PIO-003': { color: 'border-emerald-100 text-emerald-500 bg-emerald-50', icon: 'fa-check-circle', name: 'ปกติ' },
            'PIO-004': { color: 'border-amber-100 text-amber-500 bg-amber-50', icon: 'fa-clock', name: 'รอตรวจสอบ' }
        };
        return config[id] || { color: 'border-slate-100 text-slate-400 bg-slate-50', icon: 'fa-info-circle', name: '-' };
    }

    const floorColorThemes = [
        { bg: 'bg-emerald-50', border: 'border-emerald-100', text: 'text-emerald-500', badge: 'bg-emerald-500', cardBorder: 'border-emerald-50' },
        { bg: 'bg-blue-50', border: 'border-blue-100', text: 'text-blue-500', badge: 'bg-blue-500', cardBorder: 'border-blue-50' },
        { bg: 'bg-amber-50', border: 'border-amber-100', text: 'text-amber-500', badge: 'bg-amber-500', cardBorder: 'border-amber-50' },
        { bg: 'bg-rose-50', border: 'border-rose-100', text: 'text-rose-500', badge: 'bg-rose-500', cardBorder: 'border-rose-50' }
    ];

    async function init() {
        const icon = document.getElementById('refreshIcon');
        icon?.classList.add('animate-spin');
        try {
            const ts = new Date().getTime();
            const [logRes, deptRes, initRes] = await Promise.all([
                fetch(`${APP_URL}?action=getAuditLogs&_=${ts}`).then(r => r.json()),
                fetch(`${APP_URL}?action=getDeptList&_=${ts}`).then(r => r.json()),
                fetch(`${APP_URL}?action=getInitialData&_=${ts}`).then(r => r.json())
            ]);
            state.logs = logRes || [];
            state.depts = deptRes || [];
            state.assetTypes = initRes.assetTypes || [];
            state.priorities = initRes.priorities || []; 
            
            document.getElementById('lastUpdate').innerText = `SYNCED AT: ${new Date().toLocaleTimeString('th-TH')}`;
            renderDashboard();
        } catch (err) { 
            console.error(err); 
            document.getElementById('lastUpdate').innerText = "SYNC FAILED";
        } finally { 
            icon?.classList.remove('animate-spin'); 
        }
    }

    let mainDisplayMode = 'grid'; // เก็บสถานะหน้าหลัก

    // ฟังก์ชันสลับโหมด
    function switchMainView(mode) {
        mainDisplayMode = mode;
        document.getElementById('vGrid').classList.toggle('active', mode === 'grid');
        document.getElementById('vTable').classList.toggle('active', mode === 'table');
        renderDashboard();
    }

    function renderDashboard() {
        const area = document.getElementById('contentArea');
        const search = document.getElementById('searchInput')?.value.toLowerCase() || "";
        
        const activeDeptIds = [...new Set(state.logs.map(l => String(l.DEPT_ID).trim()))];
        const filteredDepts = state.depts.filter(d => 
            activeDeptIds.includes(String(d.DEP_ID).trim()) && 
            (d.DEPNAME.toLowerCase().includes(search) || (d.BUILDING && d.BUILDING.toLowerCase().includes(search)))
        );

        document.getElementById('statDepts').innerText = filteredDepts.length;
        document.getElementById('statAssets').innerText = state.logs.length.toLocaleString();

        if (mainDisplayMode === 'grid') {
            renderGridMode(area, filteredDepts);
        } else {
            renderTableMode(area, filteredDepts);
        }
    }

    // --- ฟังก์ชันย่อยสำหรับวาดแบบตาราง ---
    // --- ฟังก์ชันย่อยสำหรับวาดแบบตาราง โดยกรุ๊ปตามอาคารและชั้น ---
    // --- ฟังก์ชันย่อยสำหรับวาดแบบตาราง โดยกรุ๊ปตามอาคารและชั้น (แก้ไขเรื่องรูปภาพ) ---
// --- ฟังก์ชันย่อยสำหรับวาดแบบตาราง โดยกรุ๊ปตามอาคารและชั้น ---
function renderTableMode(container, filteredDepts) {
    const structure = {};
    filteredDepts.forEach(d => {
        const b = d.BUILDING || "อาคารทั่วไป";
        const f = d.FL || "ชั้น 1";
        if (!structure[b]) structure[b] = {};
        if (!structure[b][f]) structure[b][f] = [];
        structure[b][f].push(d);
    });

    let html = "";
    Object.keys(structure).sort().forEach(building => {
        html += `
            <div class="building-container bg-white mb-10 overflow-hidden shadow-sm border border-slate-200 rounded-[2.5rem]">
                <div class="bg-slate-800 p-6 flex justify-between items-center text-white">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 pink-gradient rounded-lg flex items-center justify-center text-xl">
                            <i class="fas fa-hospital"></i>
                        </div>
                        <h3 class="text-xl font-black uppercase tracking-tight">${building}</h3>
                    </div>
                </div>
                <div class="p-0">`;

        const floors = Object.keys(structure[building]).sort();
        floors.forEach(floor => {
            html += `
                <div class="border-b border-slate-100 last:border-0">
                    <div class="bg-slate-50 px-6 py-3 border-y border-slate-100 flex items-center gap-3">
                        <span class="bg-pink-100 text-pink-600 px-3 py-1 rounded-md font-bold text-xs">${floor}</span>
                        <div class="h-[1px] flex-1 bg-slate-200"></div>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="main-table w-full">
                            <thead>
                                <tr>
                                    <th class="w-[45%] px-6 py-4 text-left text-xs font-bold text-slate-400 uppercase">หน่วยงาน</th>
                                    <th class="text-center px-6 py-4 text-xs font-bold text-slate-400 uppercase">จำนวนครุภัณฑ์</th>
                                    <th class="text-center px-6 py-4 text-xs font-bold text-slate-400 uppercase">จัดการ</th>
                                </tr>
                            </thead>
                            <tbody>`;

            structure[building][floor].forEach(d => {
                const dLogs = state.logs.filter(l => String(l.DEPT_ID).trim() === String(d.DEP_ID).trim());
                
                // แก้ไขจุดนี้: ลบเลข 0 และ { ที่เกินมาออก
                const dImg = d.PIC_ID ? `http://googleusercontent.com/profile/picture/${d.PIC_ID}` : `https://placehold.co/100?text=${d.DEPNAME.charAt(0)}`;
                
                html += `
                    <tr class="hover:bg-pink-50/50 transition-colors cursor-pointer group" onclick="showDetail('${d.DEP_ID}')">
                        <td class="py-4 px-6">
                            <div class="flex items-center gap-4">
                                <div class="w-12 h-12 rounded-xl overflow-hidden border border-slate-100 shadow-sm flex-shrink-0 bg-white">
                                    <img src="${dImg}" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/100?text=${d.DEPNAME.charAt(0)}'">
                                </div>
                                <span class="font-bold text-slate-700 group-hover:text-pink-600 truncate">${d.DEPNAME}</span>
                            </div>
                        </td>
                        <td class="text-center py-4 px-6">
                            <span class="px-3 py-1 rounded-full bg-slate-100 text-slate-600 font-black text-[11px] group-hover:bg-pink-500 group-hover:text-white transition-all">
                                ${dLogs.length} รายการ
                            </span>
                        </td>
                        <td class="text-center py-4 px-6">
                            <div class="w-8 h-8 rounded-full bg-slate-50 inline-flex items-center justify-center group-hover:bg-pink-100">
                                <i class="fas fa-chevron-right text-slate-300 group-hover:text-pink-500 transition-all text-xs"></i>
                            </div>
                        </td>
                    </tr>`;
            });

            html += `</tbody></table></div></div>`;
        });
        html += `</div></div>`;
    });
    container.innerHTML = html || `<div class="p-20 text-center text-slate-400 font-bold text-xl">ไม่พบข้อมูล</div>`;
}
   function showDetail(deptId) {
    const dept = state.depts.find(d => String(d.DEP_ID).trim() === String(deptId).trim());
    const logs = state.logs.filter(l => String(l.DEPT_ID).trim() === String(deptId).trim());
    if(!dept) return;
    
    document.getElementById('mDeptName').innerText = dept.DEPNAME;
    document.getElementById('mDeptLoc').innerHTML = `<i class="fas fa-building text-pink-500"></i> ${dept.BUILDING} | ชั้น ${dept.FL}`;
    
    // แก้ไขจุดนี้: แก้ไขรูปแบบ Template String ให้ถูกต้อง
    const mImg = dept.PIC_ID ? `http://googleusercontent.com/profile/picture/${dept.PIC_ID}` : `https://placehold.co/100?text=DEPT`;
    document.getElementById('mDeptPic').querySelector('img').src = mImg;
    
    document.getElementById('mDeptDetailBtn').href = `dept_detail.html?DEP_ID=${dept.DEP_ID}`;

    const byType = {};
    logs.forEach(l => { 
        const typeName = state.assetTypes.find(x => String(x.id) === String(l.Asset_Type_ID))?.name || 'อื่นๆ';
        if(!byType[typeName]) byType[typeName] = []; 
        byType[typeName].push(l); 
    });
    
    const container = document.getElementById('mAssetGroupContainer');
    container.innerHTML = Object.keys(byType).sort().map(type => `
        <div class="mb-10">
            <div class="flex items-center gap-3 mb-5 border-l-4 border-pink-500 pl-4">
                <h4 class="text-sm font-black text-slate-800 uppercase">${type} (${byType[type].length})</h4>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                ${byType[type].map(a => {
                    const pri = getPriority(a.Priority_ID || a.PIORITY_ID);
                    // แก้ไขจุดนี้: ปิด String ให้ครบ
                    const aImg = a.ASSET_IMG_DB ? `http://googleusercontent.com/profile/picture/${a.ASSET_IMG_DB}` : 'https://placehold.co/200?text=NO+IMAGE';
                    const ageStr = a.AgeInfo || calculateAge(a.DateOfPurchase || a.DATE_PURCHASE);
                    return `
                    <div class="soft-card bg-white p-5 flex flex-col sm:flex-row gap-6 border border-slate-100 rounded-2xl">
                        <div class="w-full sm:w-24 h-48 sm:h-24 rounded-2xl border flex-shrink-0 overflow-hidden bg-slate-50 shadow-inner">
                            <img src="${aImg}" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/200?text=NO+IMAGE'">
                        </div>
                        <div class="flex-1 min-w-0 flex flex-col justify-between">
                            <div>
                                <div class="flex flex-col sm:flex-row justify-between items-start mb-3 gap-2">
                                    <div class="bg-pink-600 text-white px-4 py-2 rounded-xl shadow-lg w-full sm:w-auto">
                                        <p class="text-[9px] text-pink-200 font-bold uppercase mb-1">รหัสครุภัณฑ์</p>
                                        <p class="text-sm font-black">🆔 ${a.AssetID || 'N/A'}</p>
                                    </div>
                                    <div class="text-right w-full sm:w-auto">
                                        <span class="text-[10px] font-bold text-slate-400 uppercase block">อายุการใช้งาน</span>
                                        <span class="text-[11px] font-black text-pink-500">${ageStr}</span>
                                    </div>
                                </div>
                                <h5 class="text-sm font-bold text-slate-700 leading-normal line-clamp-2 mb-2">${a.FullDescription || '-'}</h5>
                            </div>
                            <div class="mt-2 flex flex-wrap gap-2 pt-2 border-t border-slate-50">
                                <p class="text-[10px] text-slate-400 font-bold uppercase w-full">S/N: ${a.Serial || '-'}</p>
                                <span class="text-[9px] font-black px-3 py-2 rounded-xl border ${pri.color} uppercase flex items-center gap-2">
                                    <i class="fas ${pri.icon}"></i> ${pri.name}
                                </span>
                            </div>
                        </div>
                    </div>`;
                }).join('')}
            </div>
        </div>
    `).join('');
    
    document.getElementById('modalDept').classList.remove('hidden');
    document.getElementById('modalDept').classList.add('flex');
    document.body.style.overflow = 'hidden';
}

    function closeModal() { 
        document.getElementById('modalDept').classList.add('hidden'); 
        document.body.style.overflow = 'auto'; 
    }
    window.onload = init;
</script>
</body>
</html>
