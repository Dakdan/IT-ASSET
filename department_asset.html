<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบตรวจสอบครุภัณฑ์คอมพิวเตอร์ - IT UDON HOSP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background-color: #f8fafc;
            min-height: 100vh;
        }
        .pink-gradient {
            background: linear-gradient(90deg, #be185d 0%, #db2777 100%);
        }
        .card-shadow {
            box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05);
        }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #be185d;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* สไตล์สำหรับการพิมพ์ */
        @media print {
            .no-print { display: none !important; }
            body { background-color: white; padding-bottom: 0; }
            .card-shadow { box-shadow: none; border: 1px solid #eee; }
            .print-only { display: block !important; }
            .page-break { page-break-before: always; }
        }
        .print-only { display: none; }
    </style>
</head>
<body class="text-gray-800 pb-10">

    <!-- Loading Overlay -->
    <div id="loaderModal" class="fixed inset-0 z-50 flex items-center justify-center bg-white/80 backdrop-blur-sm transition-opacity duration-300">
        <div class="flex flex-col items-center">
            <div class="loader mb-3"></div>
            <p id="loaderText" class="text-pink-800 font-medium animate-pulse">กำลังเรียกข้อมูลจากฐานข้อมูลครุภัณฑ์...</p>
        </div>
    </div>

    <!-- Header -->
    <header class="pink-gradient text-white p-6 shadow-md mb-8 no-print">
        <div class="container mx-auto flex flex-col md:flex-row items-center justify-between">
            <div class="flex items-center space-x-4">
                <div class="bg-white p-1 rounded-xl shadow-inner">
                    <img src="https://img2.pic.in.th/-227e4f6f84f29f020.png" alt="Hospital Logo" class="h-12 w-auto object-contain">
                </div>
                <div>
                    <h1 class="text-xl md:text-2xl font-bold">ระบบตรวจสอบครุภัณฑ์คอมพิวเตอร์</h1>
                    <p class="text-xs opacity-80 uppercase tracking-widest">IT UDON HOSPITAL</p>
                </div>
            </div>
            <div id="currentDate" class="mt-4 md:mt-0 text-sm font-light"></div>
        </div>
    </header>

    <main class="container mx-auto px-4">
        <!-- Error Display -->
        <div id="errorMessage" class="hidden mb-6 p-4 bg-red-50 border-l-4 border-red-500 text-red-700 rounded-r-xl">
            <div class="flex flex-col">
                <div class="flex items-center font-bold mb-1">
                    <i class="fas fa-exclamation-triangle mr-3"></i>
                    <span>เกิดข้อผิดพลาดในการดึงข้อมูล</span>
                </div>
                <span id="errorText" class="text-sm ml-8"></span>
                <div class="mt-3 ml-8">
                    <button onclick="location.reload()" class="text-xs bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-700 transition shadow-sm">
                        <i class="fas fa-sync-alt mr-1"></i> ลองใหม่อีกครั้ง
                    </button>
                </div>
            </div>
        </div>

        <!-- Department Summary Section -->
        <div id="deptSection" class="hidden grid grid-cols-1 lg:grid-cols-4 gap-6 mb-8">
            <div class="lg:col-span-1 bg-white p-6 rounded-2xl card-shadow border border-gray-100 flex flex-col items-center justify-center">
                <div id="deptImageContainer" class="w-32 h-32 bg-gray-50 rounded-2xl flex items-center justify-center mb-4 border border-pink-100 overflow-hidden shadow-inner">
                    <img src="https://img2.pic.in.th/-227e4f6f84f29f020.png" class="w-20 opacity-30 grayscale">
                </div>
                <h2 id="displayDeptName" class="text-xl font-bold text-center text-gray-800 leading-tight"></h2>
                <p id="displayDeptId" class="text-sm text-pink-600 font-mono mt-1"></p>
            </div>
            
            <div class="lg:col-span-3 bg-white p-6 rounded-2xl card-shadow border border-gray-100">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-3">
                        <div class="flex items-center text-gray-600">
                            <i class="fas fa-map-marker-alt w-8 text-pink-500"></i>
                            <div>
                                <p class="text-xs text-gray-400 uppercase">สถานที่ตั้ง</p>
                                <p id="displayLocation" class="font-medium">-</p>
                            </div>
                        </div>
                        <div class="flex items-center text-gray-600">
                            <i class="fas fa-layer-group w-8 text-pink-500"></i>
                            <div>
                                <p class="text-xs text-gray-400 uppercase">ชั้น</p>
                                <p id="displayFloor" class="font-medium">-</p>
                            </div>
                        </div>
                    </div>
                    <div class="space-y-3">
                        <div class="flex items-center text-gray-600">
                            <i class="fas fa-phone-alt w-8 text-pink-500"></i>
                            <div>
                                <p class="text-xs text-gray-400 uppercase">เบอร์โทรศัพท์</p>
                                <p id="displayPhone" class="font-medium">-</p>
                            </div>
                        </div>
                        <div class="pt-2 no-print">
                            <button onclick="window.print()" class="px-4 py-2 bg-gray-800 text-white rounded-lg text-sm hover:bg-gray-700 transition flex items-center shadow-md">
                                <i class="fas fa-print mr-2"></i> พิมพ์รายงานสรุปทั้งหมด
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- สรุปสถิติ (Tabs Summary) -->
        <div id="statSummary" class="hidden mb-6 grid grid-cols-2 md:grid-cols-4 gap-4 no-print">
            <div class="bg-white p-4 rounded-xl border border-gray-100 card-shadow">
                <p class="text-xs text-gray-400 uppercase">ในระบบ</p>
                <p id="countOn" class="text-2xl font-bold text-pink-600">0</p>
            </div>
            <div class="bg-white p-4 rounded-xl border border-gray-100 card-shadow">
                <p class="text-xs text-gray-400 uppercase">นอกระบบ</p>
                <p id="countNon" class="text-2xl font-bold text-blue-600">0</p>
            </div>
            <div class="bg-white p-4 rounded-xl border border-gray-100 card-shadow">
                <p class="text-xs text-gray-400 uppercase">ปกติ</p>
                <p id="countNormal" class="text-2xl font-bold text-green-600">0</p>
            </div>
            <div class="bg-white p-4 rounded-xl border border-gray-100 card-shadow">
                <p class="text-xs text-gray-400 uppercase">ชำรุด/รอจำหน่าย</p>
                <p id="countBroken" class="text-2xl font-bold text-amber-600">0</p>
            </div>
        </div>

        <!-- Toolbar -->
        <div id="toolbar" class="hidden mb-4 flex flex-col md:flex-row gap-4 items-center justify-between no-print">
            <div class="inline-flex p-1 bg-gray-200 rounded-xl">
                <button onclick="switchTab('on-log')" id="tab-on-log" class="px-6 py-2 rounded-lg text-sm font-medium transition-all">ในระบบ (Asset_On)</button>
                <button onclick="switchTab('non-log')" id="tab-non-log" class="px-6 py-2 rounded-lg text-sm font-medium transition-all">นอกระบบ (Non-Number)</button>
            </div>
            <div class="relative w-full md:w-72">
                <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                <input type="text" id="searchInput" onkeyup="filterAssets()" placeholder="ค้นหา รหัส/ประเภท/รายละเอียด..." 
                    class="w-full pl-10 pr-4 py-2 rounded-xl border border-gray-200 focus:ring-2 focus:ring-pink-500 focus:outline-none text-sm transition-all shadow-sm">
            </div>
        </div>

        <!-- Assets List (Screen Display) -->
        <div id="assetContainer" class="hidden space-y-4 no-print"></div>

        <!-- Print View Content (Hidden on Screen) -->
        <div id="printContainer" class="print-only space-y-8">
            <!-- ข้อมูลจะถูกเติมโดย JS -->
        </div>

        <!-- No Data State -->
        <div id="emptyState" class="hidden py-20 flex flex-col items-center justify-center text-gray-400">
            <i class="fas fa-box-open text-6xl mb-4 opacity-20"></i>
            <p>ไม่พบรายการครุภัณฑ์ที่เชื่อมโยงกับหน่วยงานนี้</p>
        </div>
    </main>

    <script>
        // API URL จาก Web App ที่ใช้งาน
        const API_URL = 'https://script.google.com/macros/s/AKfycbxiOY15Idt7KJgQQn60_MAtVJmAICWT2wvNLS3C4h_SI7uaFD23Z6mzSp8nSrBd4TGVNA/exec';
        const DEFAULT_LOGO = 'https://img2.pic.in.th/-227e4f6f84f29f020.png';
        
        let rawData = { department: null, assetsOn: [], assetsNon: [] };
        let activeTab = 'on-log';
        const params = new URLSearchParams(window.location.search);
        const depId = params.get('DEP_ID');

        document.getElementById('currentDate').innerText = new Date().toLocaleDateString('th-TH', { 
            year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' 
        });

        window.onload = () => {
            if (!depId) {
                showError("กรุณาระบุรหัสหน่วยงานใน URL เช่น ?DEP_ID=101");
                hideLoader();
                return;
            }
            init();
        };

        async function init() {
            try {
                const response = await fetch(`${API_URL}?DEP_ID=${depId}&action=getFullData`);
                const data = await response.json();
                
                if (data.error) {
                    showError(data.error);
                } else {
                    rawData = data;
                    renderDepartment();
                    updateStats();
                    document.getElementById('deptSection').classList.remove('hidden');
                    document.getElementById('statSummary').classList.remove('hidden');
                    document.getElementById('toolbar').classList.remove('hidden');
                    document.getElementById('assetContainer').classList.remove('hidden');
                    switchTab('on-log');
                    preparePrintContent();
                }
            } catch (err) {
                showError("ไม่สามารถเชื่อมต่อฐานข้อมูลได้: " + err.message);
            } finally {
                hideLoader();
            }
        }

        function renderDepartment() {
            const d = rawData.department;
            if (!d) return;
            document.getElementById('displayDeptName').innerText = d.DEPNAME || 'ไม่ระบุชื่อหน่วยงาน';
            document.getElementById('displayDeptId').innerText = `รหัสหน่วยงาน: ${d.DEP_ID}`;
            document.getElementById('displayLocation').innerText = d.LOCATION_NAME || '-';
            document.getElementById('displayFloor').innerText = d.FL || '-';
            document.getElementById('displayPhone').innerText = d.Tell || '-';

            if (d.Image_URL) {
                document.getElementById('deptImageContainer').innerHTML = `<img src="${d.Image_URL}" class="w-full h-full object-cover">`;
            }
        }

        function updateStats() {
            const onLen = (rawData.assetsOn || []).length;
            const nonLen = (rawData.assetsNon || []).length;
            const allAssets = [...(rawData.assetsOn || []), ...(rawData.assetsNon || [])];
            
            const normalCount = allAssets.filter(a => (a.CoStatus || 'ปกติ') === 'ปกติ').length;
            const brokenCount = allAssets.length - normalCount;

            document.getElementById('countOn').innerText = onLen;
            document.getElementById('countNon').innerText = nonLen;
            document.getElementById('countNormal').innerText = normalCount;
            document.getElementById('countBroken').innerText = brokenCount;
        }

        function switchTab(tab) {
            activeTab = tab;
            const btnOn = document.getElementById('tab-on-log');
            const btnNon = document.getElementById('tab-non-log');
            
            if (tab === 'on-log') {
                btnOn.className = "px-6 py-2 rounded-lg text-sm font-medium transition-all bg-white text-pink-700 shadow-sm";
                btnNon.className = "px-6 py-2 rounded-lg text-sm font-medium transition-all text-gray-500 hover:text-gray-700";
            } else {
                btnNon.className = "px-6 py-2 rounded-lg text-sm font-medium transition-all bg-white text-pink-700 shadow-sm";
                btnOn.className = "px-6 py-2 rounded-lg text-sm font-medium transition-all text-gray-500 hover:text-gray-700";
            }
            filterAssets();
        }

        function filterAssets() {
            const list = activeTab === 'on-log' ? (rawData.assetsOn || []) : (rawData.assetsNon || []);
            const query = document.getElementById('searchInput').value.toLowerCase();
            
            const filtered = list.filter(item => {
                const id = String(item.AssetID || item.NOID || '').toLowerCase();
                const type = String(item.Asset_Type || item.AssetType || '').toLowerCase();
                const detail = String(item.Detail || '').toLowerCase();
                return id.includes(query) || type.includes(query) || detail.includes(query);
            });

            renderAssetTable(filtered);
        }

        function renderAssetTable(data) {
            const container = document.getElementById('assetContainer');
            
            if (data.length === 0) {
                container.innerHTML = `
                    <div class="bg-white p-12 rounded-2xl border border-dashed border-gray-200 text-center text-gray-400">
                        <i class="fas fa-search mb-2 text-2xl"></i>
                        <p>ไม่พบรายการครุภัณฑ์ในหมวดนี้</p>
                    </div>
                `;
                return;
            }

            let html = `
                <div class="bg-white rounded-2xl card-shadow overflow-hidden border border-gray-100">
                    <div class="p-4 bg-gray-50 border-b border-gray-100 flex justify-between items-center">
                        <h3 class="font-bold text-gray-700">รายการ${activeTab === 'on-log' ? 'ในระบบ' : 'นอกระบบ'} (${data.length} รายการ)</h3>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-gray-50 text-gray-500 text-xs uppercase tracking-wider">
                                    <th class="px-6 py-4 font-semibold whitespace-nowrap">รหัสครุภัณฑ์</th>
                                    <th class="px-6 py-4 font-semibold text-center">รูปภาพ</th>
                                    <th class="px-6 py-4 font-semibold">รายละเอียดครุภัณฑ์</th>
                                    <th class="px-6 py-4 font-semibold text-center">สถานะ</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-100 text-sm">
            `;

            data.forEach(item => {
                const id = item.AssetID || item.NOID || '-';
                const type = item.Asset_Type || item.AssetType || 'ไม่ระบุประเภท';
                const detail = item.Detail || '';
                const status = item.CoStatus || 'ปกติ';
                const imgUrl = item.Image || item.Image_URL || null;

                html += `
                    <tr class="hover:bg-pink-50/20 transition-colors">
                        <td class="px-6 py-4 font-mono font-bold text-gray-700 whitespace-nowrap">${id}</td>
                        <td class="px-6 py-4 text-center">
                            <div class="w-14 h-14 rounded-lg bg-gray-50 mx-auto flex items-center justify-center overflow-hidden border border-gray-200">
                                ${imgUrl ? `<img src="${imgUrl}" class="w-full h-full object-cover">` : `<img src="${DEFAULT_LOGO}" class="w-8 opacity-20 grayscale">`}
                            </div>
                        </td>
                        <td class="px-6 py-4">
                            <p class="font-medium text-gray-900">${type}</p>
                            <p class="text-xs text-gray-500 mt-0.5 line-clamp-2">${detail}</p>
                        </td>
                        <td class="px-6 py-4 text-center">
                            <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${status === 'ปกติ' ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700'}">
                                ${status}
                            </span>
                        </td>
                    </tr>
                `;
            });

            html += `</tbody></table></div></div>`;
            container.innerHTML = html;
        }

        // ฟังก์ชันเตรียมเนื้อหาสำหรับการพิมพ์รายงาน
        function preparePrintContent() {
            const printContainer = document.getElementById('printContainer');
            const d = rawData.department;
            
            let html = `
                <div class="text-center mb-8 border-b-2 border-pink-600 pb-4">
                    <h1 class="text-2xl font-bold">รายงานสรุปข้อมูลครุภัณฑ์คอมพิวเตอร์</h1>
                    <p class="text-lg">หน่วยงาน: ${d.DEPNAME} (${d.DEP_ID})</p>
                    <p class="text-sm text-gray-500">พิมพ์เมื่อ: ${new Date().toLocaleString('th-TH')}</p>
                </div>

                <div class="grid grid-cols-2 gap-8 mb-8">
                    <div>
                        <h4 class="font-bold border-b mb-2">ข้อมูลหน่วยงาน</h4>
                        <p><b>สถานที่ตั้ง:</b> ${d.LOCATION_NAME || '-'}</p>
                        <p><b>ชั้น:</b> ${d.FL || '-'}</p>
                        <p><b>เบอร์โทรศัพท์:</b> ${d.Tell || '-'}</p>
                    </div>
                    <div>
                        <h4 class="font-bold border-b mb-2 text-pink-700">สรุปจำนวน (Summary)</h4>
                        <table class="w-full text-sm">
                            <tr><td>รายการในระบบ (Asset_On):</td><td class="text-right font-bold">${rawData.assetsOn.length}</td></tr>
                            <tr><td>รายการนอกระบบ (Non-Number):</td><td class="text-right font-bold">${rawData.assetsNon.length}</td></tr>
                            <tr class="border-t"><td><b>รวมทั้งหมด:</b></td><td class="text-right font-bold text-lg text-pink-600">${rawData.assetsOn.length + rawData.assetsNon.length}</td></tr>
                        </table>
                    </div>
                </div>

                <!-- Section: Asset_On -->
                <div>
                    <h3 class="text-xl font-bold text-gray-800 mb-3 bg-gray-100 p-2 rounded">1. รายการครุภัณฑ์ในระบบ (Asset_On_Log)</h3>
                    ${renderPrintTable(rawData.assetsOn)}
                </div>

                <!-- Section: Asset_Non -->
                <div class="page-break pt-8">
                    <h3 class="text-xl font-bold text-gray-800 mb-3 bg-gray-100 p-2 rounded">2. รายการครุภัณฑ์นอกระบบ (Asset_On_Nonumber_Log)</h3>
                    ${renderPrintTable(rawData.assetsNon)}
                </div>

                <div class="mt-12 grid grid-cols-2 text-center gap-10">
                    <div class="pt-10 border-t border-gray-300">
                        <p>(...........................................................)</p>
                        <p class="mt-2 font-bold">ผู้รายงาน / ผู้รับผิดชอบ</p>
                    </div>
                    <div class="pt-10 border-t border-gray-300">
                        <p>(...........................................................)</p>
                        <p class="mt-2 font-bold">หัวหน้าหน่วยงาน / ผู้รับรอง</p>
                    </div>
                </div>
            `;
            
            printContainer.innerHTML = html;
        }

        function renderPrintTable(data) {
            if (!data || data.length === 0) return '<p class="text-gray-400 italic">--- ไม่พบข้อมูล ---</p>';
            
            let table = `
                <table class="w-full text-xs border-collapse border border-gray-300">
                    <thead>
                        <tr class="bg-gray-50">
                            <th class="border border-gray-300 p-2 text-left w-32">รหัส</th>
                            <th class="border border-gray-300 p-2 text-left">ประเภท</th>
                            <th class="border border-gray-300 p-2 text-left">รายละเอียด</th>
                            <th class="border border-gray-300 p-2 text-center w-20">สถานะ</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            data.forEach(item => {
                table += `
                    <tr>
                        <td class="border border-gray-300 p-2 font-mono">${item.AssetID || item.NOID || '-'}</td>
                        <td class="border border-gray-300 p-2 font-bold">${item.Asset_Type || item.AssetType || '-'}</td>
                        <td class="border border-gray-300 p-2">${item.Detail || '-'}</td>
                        <td class="border border-gray-300 p-2 text-center">${item.CoStatus || 'ปกติ'}</td>
                    </tr>
                `;
            });
            
            table += '</tbody></table>';
            return table;
        }

        function hideLoader() {
            const loader = document.getElementById('loaderModal');
            loader.style.opacity = '0';
            setTimeout(() => loader.classList.add('hidden'), 300);
        }

        function showError(msg) {
            const errDiv = document.getElementById('errorMessage');
            document.getElementById('errorText').innerText = msg;
            errDiv.classList.remove('hidden');
            document.getElementById('emptyState').classList.remove('hidden');
        }
    </script>
</body>
</html>
