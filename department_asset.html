<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบตรวจสอบครุภัณฑ์คอมพิวเตอร์ - IT UDON HOSP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background-color: #f8fafc;
            min-height: 100vh;
        }
        .pink-gradient {
            background: linear-gradient(90deg, #be185d 0%, #db2777 100%);
        }
        .card-shadow {
            box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05);
        }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #be185d;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        @media print {
            .no-print { display: none !important; }
            body { background-color: white; }
            .card-shadow { box-shadow: none; border: 1px solid #eee; }
        }
    </style>
</head>
<body class="text-gray-800 pb-10">

    <!-- Loading Overlay -->
    <div id="loaderModal" class="fixed inset-0 z-50 flex items-center justify-center bg-white/80 backdrop-blur-sm transition-opacity duration-300">
        <div class="flex flex-col items-center">
            <div class="loader mb-3"></div>
            <p id="loaderText" class="text-pink-800 font-medium animate-pulse">กำลังเรียกข้อมูลจากฐานข้อมูล...</p>
        </div>
    </div>

    <!-- Header -->
    <header class="pink-gradient text-white p-6 shadow-md mb-8 no-print">
        <div class="container mx-auto flex flex-col md:flex-row items-center justify-between">
            <div class="flex items-center space-x-4">
                <div class="bg-white p-1 rounded-xl shadow-inner">
                    <img src="https://img2.pic.in.th/-227e4f6f84f29f020.png" alt="Hospital Logo" class="h-12 w-auto object-contain">
                </div>
                <div>
                    <h1 class="text-xl md:text-2xl font-bold">ระบบตรวจสอบครุภัณฑ์คอมพิวเตอร์</h1>
                    <p class="text-xs opacity-80 uppercase tracking-widest">IT UDON HOSPITAL</p>
                </div>
            </div>
            <div id="currentDate" class="mt-4 md:mt-0 text-sm font-light"></div>
        </div>
    </header>

    <main class="container mx-auto px-4">
        <!-- Error Display -->
        <div id="errorMessage" class="hidden mb-6 p-4 bg-red-50 border-l-4 border-red-500 text-red-700 rounded-r-xl">
            <div class="flex flex-col">
                <div class="flex items-center font-bold mb-1">
                    <i class="fas fa-exclamation-triangle mr-3"></i>
                    <span>เกิดข้อผิดพลาดในการเชื่อมต่อ</span>
                </div>
                <span id="errorText" class="text-sm ml-8"></span>
                <button onclick="location.reload()" class="mt-3 ml-8 text-xs bg-red-600 text-white px-3 py-1 rounded hover:bg-red-700 w-fit transition shadow-sm">
                    <i class="fas fa-sync-alt mr-1"></i> ลองใหม่อีกครั้ง
                </button>
            </div>
        </div>

        <!-- Department Summary Section -->
        <div id="deptSection" class="hidden grid grid-cols-1 lg:grid-cols-4 gap-6 mb-8">
            <div class="lg:col-span-1 bg-white p-6 rounded-2xl card-shadow border border-gray-100 flex flex-col items-center justify-center">
                <div id="deptImageContainer" class="w-32 h-32 bg-gray-50 rounded-2xl flex items-center justify-center mb-4 border border-pink-100 overflow-hidden shadow-inner">
                    <img src="https://img2.pic.in.th/-227e4f6f84f29f020.png" class="w-20 opacity-30 grayscale">
                </div>
                <h2 id="displayDeptName" class="text-xl font-bold text-center text-gray-800 leading-tight"></h2>
                <p id="displayDeptId" class="text-sm text-pink-600 font-mono mt-1"></p>
            </div>
            
            <div class="lg:col-span-3 bg-white p-6 rounded-2xl card-shadow border border-gray-100">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-3">
                        <div class="flex items-center text-gray-600">
                            <i class="fas fa-map-marker-alt w-8 text-pink-500"></i>
                            <div>
                                <p class="text-xs text-gray-400 uppercase">สถานที่ตั้ง</p>
                                <p id="displayLocation" class="font-medium">-</p>
                            </div>
                        </div>
                        <div class="flex items-center text-gray-600">
                            <i class="fas fa-layer-group w-8 text-pink-500"></i>
                            <div>
                                <p class="text-xs text-gray-400 uppercase">ชั้น</p>
                                <p id="displayFloor" class="font-medium">-</p>
                            </div>
                        </div>
                    </div>
                    <div class="space-y-3">
                        <div class="flex items-center text-gray-600">
                            <i class="fas fa-phone-alt w-8 text-pink-500"></i>
                            <div>
                                <p class="text-xs text-gray-400 uppercase">เบอร์โทรศัพท์</p>
                                <p id="displayPhone" class="font-medium">-</p>
                            </div>
                        </div>
                        <div class="pt-2 no-print">
                            <button onclick="window.print()" class="px-4 py-2 bg-gray-800 text-white rounded-lg text-sm hover:bg-gray-700 transition flex items-center shadow-md">
                                <i class="fas fa-print mr-2"></i> พิมพ์รายงานสรุป
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Toolbar -->
        <div id="toolbar" class="hidden mb-4 flex flex-col md:flex-row gap-4 items-center justify-between no-print">
            <div class="inline-flex p-1 bg-gray-200 rounded-xl">
                <button onclick="switchTab('on-log')" id="tab-on-log" class="px-6 py-2 rounded-lg text-sm font-medium transition-all">ในระบบ</button>
                <button onclick="switchTab('non-log')" id="tab-non-log" class="px-6 py-2 rounded-lg text-sm font-medium transition-all">นอกระบบ</button>
            </div>
            <div class="relative w-full md:w-72">
                <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                <input type="text" id="searchInput" onkeyup="filterAssets()" placeholder="ค้นหา รหัส/ประเภท/รายละเอียด..." 
                    class="w-full pl-10 pr-4 py-2 rounded-xl border border-gray-200 focus:ring-2 focus:ring-pink-500 focus:outline-none text-sm transition-all shadow-sm">
            </div>
        </div>

        <!-- Assets List -->
        <div id="assetContainer" class="hidden space-y-4"></div>

        <!-- No Data State -->
        <div id="emptyState" class="hidden py-20 flex flex-col items-center justify-center text-gray-400">
            <i class="fas fa-box-open text-6xl mb-4 opacity-20"></i>
            <p>ไม่พบรายการครุภัณฑ์ในหน่วยงานนี้</p>
        </div>
    </main>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbwml8efHi7YGiLFgBPFJcdVqOFxqEFYvGd6lz-neZIXevaemNaYwXwsPlF91VqfeUlm/exec';
        const DEFAULT_LOGO = 'https://img2.pic.in.th/-227e4f6f84f29f020.png';
        
        let rawData = { department: null, assetsOn: [], assetsNon: [] };
        let activeTab = 'on-log';
        const params = new URLSearchParams(window.location.search);
        const depId = params.get('DEP_ID');

        document.getElementById('currentDate').innerText = new Date().toLocaleDateString('th-TH', { 
            year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' 
        });

        window.onload = () => {
            if (!depId) {
                showError("กรุณาระบุรหัสหน่วยงานใน URL เช่น ?DEP_ID=101");
                hideLoader();
                return;
            }
            init();
        };

        async function fetchWithRetry(url, options = {}, retries = 3, backoff = 1000) {
            try {
                const response = await fetch(url, options);
                if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
                return await response.json();
            } catch (err) {
                if (retries > 0) {
                    document.getElementById('loaderText').innerText = `การเชื่อมต่อขัดข้อง กำลังลองใหม่... (${retries})`;
                    await new Promise(resolve => setTimeout(resolve, backoff));
                    return fetchWithRetry(url, options, retries - 1, backoff * 2);
                }
                throw err;
            }
        }

        async function init() {
            try {
                // เรียก action=getFullData ตามที่กำหนดใน Apps Script
                const data = await fetchWithRetry(`${API_URL}?DEP_ID=${depId}&action=getFullData`);
                
                if (data.error) {
                    showError("ระบบฐานข้อมูลแจ้งว่า: " + data.error);
                    document.getElementById('emptyState').classList.remove('hidden');
                } else {
                    rawData = data;
                    renderDepartment();
                    document.getElementById('deptSection').classList.remove('hidden');
                    document.getElementById('toolbar').classList.remove('hidden');
                    document.getElementById('assetContainer').classList.remove('hidden');
                    switchTab('on-log');
                }
            } catch (err) {
                showError("ไม่สามารถดึงข้อมูลได้: " + err.message + " กรุณาตรวจสอบว่าได้ทำการ Deploy Apps Script และตั้งค่า Permissions เป็น 'Anyone' แล้ว");
            } finally {
                hideLoader();
            }
        }

        function renderDepartment() {
            const d = rawData.department;
            if (!d) return;
            document.getElementById('displayDeptName').innerText = d.DEPNAME || 'ไม่ระบุชื่อหน่วยงาน';
            document.getElementById('displayDeptId').innerText = `ID: ${d.DEP_ID}`;
            document.getElementById('displayLocation').innerText = d.LOCATION_NAME || '-';
            document.getElementById('displayFloor').innerText = d.FL || '-';
            document.getElementById('displayPhone').innerText = d.Tell || '-';

            if (d.Image_URL) {
                document.getElementById('deptImageContainer').innerHTML = `<img src="${d.Image_URL}" class="w-full h-full object-cover">`;
            }
        }

        function switchTab(tab) {
            activeTab = tab;
            const btnOn = document.getElementById('tab-on-log');
            const btnNon = document.getElementById('tab-non-log');
            
            if (tab === 'on-log') {
                btnOn.className = "px-6 py-2 rounded-lg text-sm font-medium transition-all bg-white text-pink-700 shadow-sm";
                btnNon.className = "px-6 py-2 rounded-lg text-sm font-medium transition-all text-gray-500 hover:text-gray-700";
            } else {
                btnNon.className = "px-6 py-2 rounded-lg text-sm font-medium transition-all bg-white text-pink-700 shadow-sm";
                btnOn.className = "px-6 py-2 rounded-lg text-sm font-medium transition-all text-gray-500 hover:text-gray-700";
            }
            filterAssets();
        }

        function filterAssets() {
            const list = activeTab === 'on-log' ? (rawData.assetsOn || []) : (rawData.assetsNon || []);
            const query = document.getElementById('searchInput').value.toLowerCase();
            
            const filtered = list.filter(item => {
                const id = String(item.AssetID || item.NOID || '').toLowerCase();
                const type = String(item.Asset_Type || item.AssetType || '').toLowerCase();
                const detail = String(item.Detail || '').toLowerCase();
                return id.includes(query) || type.includes(query) || detail.includes(query);
            });

            renderAssetTable(filtered);
        }

        function renderAssetTable(data) {
            const container = document.getElementById('assetContainer');
            
            if (data.length === 0) {
                container.innerHTML = `
                    <div class="bg-white p-12 rounded-2xl border border-dashed border-gray-200 text-center text-gray-400">
                        <i class="fas fa-search mb-2 text-2xl"></i>
                        <p>ไม่พบรายการที่ต้องการค้นหา</p>
                    </div>
                `;
                return;
            }

            let html = `
                <div class="bg-white rounded-2xl card-shadow overflow-hidden border border-gray-100">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-gray-50 text-gray-500 text-xs uppercase tracking-wider">
                                    <th class="px-6 py-4 font-semibold whitespace-nowrap">รหัสครุภัณฑ์</th>
                                    <th class="px-6 py-4 font-semibold text-center whitespace-nowrap">รูปภาพ</th>
                                    <th class="px-6 py-4 font-semibold">รายละเอียด</th>
                                    <th class="px-6 py-4 font-semibold text-center whitespace-nowrap">สถานะ</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-100 text-sm">
            `;

            data.forEach(item => {
                // รองรับทั้งคอลัมน์ AssetID (ในระบบ) และ NOID (นอกระบบ)
                const id = item.AssetID || item.NOID || '-';
                const type = item.Asset_Type || item.AssetType || 'ไม่ระบุประเภท';
                const detail = item.Detail || '';
                const status = item.CoStatus || 'ปกติ';
                const imgUrl = item.Image || null;

                html += `
                    <tr class="hover:bg-pink-50/20 transition-colors">
                        <td class="px-6 py-4 font-mono font-bold text-gray-700 whitespace-nowrap">${id}</td>
                        <td class="px-6 py-4">
                            <div class="w-14 h-14 rounded-lg bg-gray-50 mx-auto flex items-center justify-center overflow-hidden border border-gray-100">
                                ${imgUrl ? `<img src="${imgUrl}" class="w-full h-full object-cover">` : `<img src="${DEFAULT_LOGO}" class="w-8 opacity-20 grayscale">`}
                            </div>
                        </td>
                        <td class="px-6 py-4">
                            <p class="font-medium text-gray-900">${type}</p>
                            <p class="text-xs text-gray-500 mt-0.5 line-clamp-2">${detail}</p>
                        </td>
                        <td class="px-6 py-4 text-center">
                            <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${status === 'ปกติ' ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700'}">
                                <span class="w-1.5 h-1.5 rounded-full mr-1.5 ${status === 'ปกติ' ? 'bg-green-500' : 'bg-amber-500'}"></span>
                                ${status}
                            </span>
                        </td>
                    </tr>
                `;
            });

            html += `</tbody></table></div></div>`;
            container.innerHTML = html;
        }

        function hideLoader() {
            const loader = document.getElementById('loaderModal');
            loader.style.opacity = '0';
            setTimeout(() => loader.classList.add('hidden'), 300);
        }

        function showError(msg) {
            const errDiv = document.getElementById('errorMessage');
            document.getElementById('errorText').innerText = msg;
            errDiv.classList.remove('hidden');
            document.getElementById('emptyState').classList.remove('hidden');
        }
    </script>
</body>
</html>
