<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบตรวจสอบครุภัณฑ์คอมพิวเตอร์ - โรงพยาบาลอุดรธานี</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-pink: #be185d;
            --medium-pink: #ec4899;
            --soft-pink: #fdf2f8;
            --gradient-header: linear-gradient(135deg, #9d174d 0%, #be185d 50%, #f472b6 100%);
        }
        body {
            font-family: 'Kanit', sans-serif;
            background-color: #fffafa;
            background-image: url("data:image/svg+xml,%3Csvg width='400' height='400' viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='50%25' y='50%25' font-size='24' fill='%23be185d' fill-opacity='0.03' font-family='Kanit' text-anchor='middle' transform='rotate(-30, 200, 200)'%3EIT UDON HOSP%3C/text%3E%3C/svg%3E");
            min-height: 100vh;
        }
        .soft-card {
            background: white;
            border-radius: 24px;
            border: 1px solid rgba(190, 24, 93, 0.08);
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.03);
            transition: all 0.3s ease;
        }
        
        .pink-header {
            background: var(--gradient-header);
            position: relative;
            overflow: hidden;
            border-bottom-left-radius: 50px;
            border-bottom-right-radius: 50px;
            border-bottom: 6px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 25px -5px rgba(157, 23, 77, 0.3);
        }

        /* ปรับปรุง CSS รูปภาพหน่วยงาน */
        .dept-photo-frame {
            width: 100%;
            height: 200px;
            background-color: #f8f9fa;
            border-radius: 1.5rem;
            overflow: hidden;
            border: 2px solid #fce7f3;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        @media (min-width: 768px) {
            .dept-photo-frame { width: 220px; height: 220px; }
        }
        .dept-photo-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        .dept-photo-frame:hover .dept-photo-img {
            transform: scale(1.1);
        }
        
        .asset-table thead th {
            background-color: #fdf2f8;
            color: #be185d;
            font-weight: 500;
            border-bottom: 2px solid #fbcfe8;
        }

        .loader-overlay {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
        }

        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
        }
        .print-only { display: none; }
    </style>
</head>
<body class="text-gray-700 pb-12">

    <div id="loaderModal" class="fixed inset-0 z-[100] flex items-center justify-center loader-overlay hidden no-print">
        <div class="text-center">
            <div class="inline-block w-12 h-12 border-4 border-pink-200 border-t-pink-700 rounded-full animate-spin mb-4"></div>
            <p class="text-pink-800 font-medium">กำลังดำเนินการ...</p>
        </div>
    </div>

    <header class="pink-header px-6 py-12 shadow-xl no-print">
        <div class="container mx-auto relative z-10">
            <div class="flex flex-col md:flex-row items-center justify-between gap-6">
                <div class="flex items-center gap-5">
                    <div class="bg-white p-2.5 rounded-2xl shadow-2xl ring-4 ring-white/20 flex-shrink-0">
                        <img src="https://img2.pic.in.th/-227e4f6f84f29f020.png" alt="Logo" class="h-14 md:h-20 w-auto">
                    </div>
                    <div class="text-left">
                        <h1 class="text-2xl md:text-4xl font-extrabold tracking-tight text-white drop-shadow-lg leading-tight">ครุภัณฑ์คอมพิวเตอร์</h1>
                        <p class="text-white/90 font-medium text-base md:text-xl">โรงพยาบาลอุดรธานี</p>
                    </div>
                </div>
                <div class="flex flex-wrap justify-center gap-3">
                    <button onclick="goHome()" class="bg-white/15 backdrop-blur-md text-white border border-white/30 px-5 py-2.5 rounded-2xl flex items-center text-xs font-semibold hover:bg-white/25 transition-all">
                        <i class="fas fa-home mr-2 text-sm"></i> หน้าหลัก
                    </button>
                    <button id="mainPrintBtn" onclick="handlePrint()" class="bg-white text-pink-700 px-6 py-2.5 rounded-2xl shadow-xl flex items-center text-xs font-bold hover:scale-105 active:scale-95 transition-all">
                        <i class="fas fa-print mr-2 text-sm"></i> พิมพ์รายงาน
                    </button>
                </div>
            </div>
            <div id="headerDate" class="mt-8 flex justify-center md:justify-start">
                <div class="bg-black/10 backdrop-blur-sm p-2 px-5 rounded-full border border-white/10">
                    <p class="text-white font-medium text-xs" id="currentDateStr"></p>
                </div>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 mt-8">
        <!-- ปรับปรุงส่วนข้อมูลหน่วยงานและรูปภาพ -->
        <div id="deptInfo" class="soft-card p-8 mb-8 no-print">
            <div class="flex flex-col md:flex-row gap-8 items-center md:items-start">
                <div class="dept-photo-frame shadow-inner">
                    <img id="deptAvatar" src="" alt="Agency Photo" class="dept-photo-img hidden">
                    <div id="deptAvatarPlaceholder" class="flex flex-col items-center justify-center text-pink-200">
                        <i class="fas fa-hospital text-6xl"></i>
                        <span class="text-[10px] mt-2 font-bold uppercase tracking-widest text-pink-300">No Image</span>
                    </div>
                </div>
                <div class="flex-grow text-center md:text-left">
                    <div>
                        <span class="px-3 py-1 bg-pink-100 text-pink-700 text-xs font-bold rounded-full uppercase tracking-wider">ข้อมูลหน่วยงาน</span>
                        <h2 id="deptName" class="text-2xl md:text-3xl font-bold text-gray-800 mt-2">กำลังโหลดข้อมูล...</h2>
                        <p id="deptId" class="text-pink-500 font-mono text-sm mt-1"></p>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 mt-6 border-t border-gray-100 pt-6">
                        <div class="flex items-center justify-center md:justify-start gap-3 text-gray-600 bg-gray-50/50 p-3 rounded-xl">
                            <i class="fas fa-location-arrow text-pink-500"></i>
                            <span id="locName" class="text-sm">สถานที่: -</span>
                        </div>
                        <div class="flex items-center justify-center md:justify-start gap-3 text-gray-600 bg-gray-50/50 p-3 rounded-xl">
                            <i class="fas fa-layer-group text-pink-500"></i>
                            <span id="locFloor" class="text-sm">ชั้น: -</span>
                        </div>
                        <div class="flex items-center justify-center md:justify-start gap-3 text-gray-600 bg-gray-50/50 p-3 rounded-xl">
                            <i class="fas fa-phone text-pink-500"></i>
                            <span id="locPhone" class="text-sm">โทรศัพท์: -</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Dashboard & Table (คงเดิม) -->
        <div id="statsDashboard" class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-10 no-print">
            <div class="soft-card p-4 flex items-center gap-4 border-l-4 border-l-pink-500">
                <div class="w-12 h-12 bg-pink-50 rounded-xl flex items-center justify-center text-pink-600"><i class="fas fa-laptop text-xl"></i></div>
                <div><p class="text-xs text-gray-500 font-medium">ในระบบ</p><h3 id="statOnCount" class="text-2xl font-bold text-pink-700">0</h3></div>
            </div>
            <div class="soft-card p-4 flex items-center gap-4 border-l-4 border-l-blue-500">
                <div class="w-12 h-12 bg-blue-50 rounded-xl flex items-center justify-center text-blue-600"><i class="fas fa-boxes text-xl"></i></div>
                <div><p class="text-xs text-gray-500 font-medium">นอกระบบ</p><h3 id="statNonCount" class="text-2xl font-bold text-blue-700">0</h3></div>
            </div>
            <div class="soft-card p-4 flex items-center gap-4 bg-gradient-to-br from-pink-50 to-white border-pink-200 border-l-4 border-l-pink-700">
                <div class="w-12 h-12 bg-pink-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-pink-200"><i class="fas fa-list-check text-xl"></i></div>
                <div><p class="text-xs text-pink-600 font-bold">รวมทั้งสิ้น</p><h3 id="statTotalCount" class="text-2xl font-bold text-gray-800">0</h3></div>
            </div>
        </div>

        <div class="no-print">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-6">
                <div class="inline-flex bg-pink-50 p-1.5 rounded-2xl border border-pink-100">
                    <button onclick="switchTab('on')" id="btnTabOn" class="px-6 py-2.5 rounded-xl text-sm font-bold transition-all bg-white text-pink-700 shadow-sm border border-pink-100">ในระบบ</button>
                    <button onclick="switchTab('non')" id="btnTabNon" class="px-6 py-2.5 rounded-xl text-sm font-bold transition-all text-gray-500 hover:text-pink-600">นอกระบบ</button>
                </div>
                <input type="text" id="searchInput" onkeyup="filterAssets()" placeholder="ค้นหารหัส หรือประเภท..." class="w-full md:w-72 px-4 py-2.5 rounded-2xl border border-gray-200 text-sm">
            </div>

            <div id="tableContainer" class="soft-card overflow-hidden border-t-4 border-t-pink-600">
                <div class="p-5 border-b border-gray-50 flex justify-between items-center bg-pink-50/30">
                    <h4 class="font-bold text-pink-900" id="tableTitle">รายการครุภัณฑ์</h4>
                    <span id="rowCount" class="text-xs bg-pink-600 px-3 py-1 rounded-full text-white font-bold">0 รายการ</span>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left asset-table">
                        <thead>
                            <tr class="text-xs uppercase tracking-wider">
                                <th class="px-6 py-4 font-bold text-center w-16">ลำดับ</th>
                                <th class="px-6 py-4 font-bold">รหัสครุภัณฑ์</th>
                                <th class="px-6 py-4 font-bold">ประเภท</th>
                                <th class="px-6 py-4 font-bold">รายละเอียด</th>
                                <th class="px-6 py-4 font-bold text-center">สถานะ</th>
                            </tr>
                        </thead>
                        <tbody id="assetTbody" class="divide-y divide-gray-50 text-sm"></tbody>
                    </table>
                </div>
                <div id="emptyState" class="py-24 text-center text-gray-400 hidden"><p class="text-lg font-medium">ไม่พบข้อมูล</p></div>
            </div>
        </div>
    </main>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxiOY15Idt7KJgQQn60_MAtVJmAICWT2wvNLS3C4h_SI7uaFD23Z6mzSp8nSrBd4TGVNA/exec';
        let rawData = { department: {}, assetsOn: [], assetsNon: [] };
        let activeTab = 'on';
        const params = new URLSearchParams(window.location.search);
        const depId = params.get('DEP_ID');

        window.onload = () => {
            document.getElementById('currentDateStr').innerText = new Date().toLocaleDateString('th-TH', { 
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' 
            });
            if (depId) fetchData();
        };

        async function fetchData() {
            showModal();
            try {
                const res = await fetch(`${API_URL}?DEP_ID=${depId}&action=getFullData`);
                const data = await res.json();
                if (data.error) throw new Error(data.error);
                rawData = data;
                renderUI();
            } catch (err) {
                document.getElementById('deptName').innerText = "เกิดข้อผิดพลาดในการโหลดข้อมูล";
            } finally {
                hideModal();
            }
        }

        function renderUI() {
            const d = rawData.department;
            document.getElementById('deptName').innerText = d.DEPNAME || 'ไม่พบชื่อหน่วยงาน';
            document.getElementById('deptId').innerText = `รหัสหน่วยงาน: ${d.DEP_ID}`;
            document.getElementById('locName').innerText = `สถานที่: ${d.LOCATION_NAME || '-'}`;
            document.getElementById('locFloor').innerText = `ชั้น: ${d.FL || '-'}`;
            document.getElementById('locPhone').innerText = `โทรศัพท์: ${d.Tell || '-'}`;

            // จัดการรูปภาพหน่วยงาน
            const avatar = document.getElementById('deptAvatar');
            const placeholder = document.getElementById('deptAvatarPlaceholder');
            
            // ใช้ photoUrl ที่ประมวลผลมาจาก Backend (Thumbnail)
            if (d.photoUrl) {
                avatar.src = d.photoUrl;
                avatar.onload = () => {
                    avatar.classList.remove('hidden');
                    placeholder.classList.add('hidden');
                };
                avatar.onerror = () => {
                    // หากรูป Thumbnail โหลดไม่ได้ ให้ลองใช้ Image_URL หรือแสดง Placeholder
                    if (d.Image_URL && d.Image_URL !== d.photoUrl) {
                        avatar.src = d.Image_URL;
                    } else {
                        avatar.classList.add('hidden');
                        placeholder.classList.remove('hidden');
                    }
                };
            } else {
                avatar.classList.add('hidden');
                placeholder.classList.remove('hidden');
            }

            const onLen = rawData.assetsOn.length;
            const nonLen = rawData.assetsNon.length;
            document.getElementById('statOnCount').innerText = onLen;
            document.getElementById('statNonCount').innerText = nonLen;
            document.getElementById('statTotalCount').innerText = onLen + nonLen;
            switchTab('on');
        }

        function switchTab(type) {
            activeTab = type;
            const btnOn = document.getElementById('btnTabOn');
            const btnNon = document.getElementById('btnTabNon');
            const title = document.getElementById('tableTitle');
            
            if (type === 'on') {
                btnOn.className = "px-6 py-2.5 rounded-xl text-sm font-bold bg-white text-pink-700 shadow-sm border border-pink-100";
                btnNon.className = "px-6 py-2.5 rounded-xl text-sm font-bold text-gray-500";
                title.innerText = `รายการในระบบ (${rawData.assetsOn.length} รายการ)`;
            } else {
                btnNon.className = "px-6 py-2.5 rounded-xl text-sm font-bold bg-white text-pink-700 shadow-sm border border-pink-100";
                btnOn.className = "px-6 py-2.5 rounded-xl text-sm font-bold text-gray-500";
                title.innerText = `รายการนอกระบบ (${rawData.assetsNon.length} รายการ)`;
            }
            filterAssets();
        }

        function filterAssets() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const data = activeTab === 'on' ? rawData.assetsOn : rawData.assetsNon;
            const filtered = data.filter(item => {
                const text = `${item.AssetID} ${item.NOID} ${item.Asset_Type} ${item.AssetType} ${item.Detail}`.toLowerCase();
                return text.includes(search);
            });
            document.getElementById('rowCount').innerText = `${filtered.length} รายการ`;
            renderTable(filtered);
        }

        function renderTable(data) {
            const tbody = document.getElementById('assetTbody');
            const empty = document.getElementById('emptyState');
            tbody.innerHTML = '';
            if (data.length === 0) {
                empty.classList.remove('hidden');
                return;
            }
            empty.classList.add('hidden');
            data.forEach((item, index) => {
                const status = item.CoStatus || 'ปกติ';
                const statusColor = status.includes('ปกติ') ? 'bg-green-100 text-green-700' : 'bg-orange-100 text-orange-700';
                const row = `
                    <tr class="hover:bg-pink-50 transition-colors">
                        <td class="px-6 py-4 text-center font-mono text-gray-400 text-xs">${index + 1}</td>
                        <td class="px-6 py-4 font-bold text-gray-700">${item.AssetID || item.NOID || '-'}</td>
                        <td class="px-6 py-4 text-pink-700 font-semibold">${item.Asset_Type || item.AssetType || '-'}</td>
                        <td class="px-6 py-4"><p class="line-clamp-1 text-gray-500 text-xs">${item.Detail || '-'}</p></td>
                        <td class="px-6 py-4 text-center"><span class="px-3 py-1 rounded-full text-[10px] font-bold ${statusColor}">${status}</span></td>
                    </tr>
                `;
                tbody.insertAdjacentHTML('beforeend', row);
            });
        }

        function goHome() { window.location.href = 'https://dakdan.github.io/IT-ASSET/asset_survey.html'; }
        function showModal() { document.getElementById('loaderModal').classList.remove('hidden'); }
        function hideModal() { document.getElementById('loaderModal').classList.add('hidden'); }
        function handlePrint() { window.print(); }
    </script>
</body>
</html>
