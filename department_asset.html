<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT ASSET TRACKING - UDON THANI HOSPITAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #fdf2f8; }
        .pink-gradient { background: linear-gradient(135deg, #9d174d 0%, #db2777 100%); }
        .tab-active { background-color: #be185d; color: white; }
        .tab-inactive { background-color: white; color: #64748b; border: 1px solid #fce7f3; }
        @media print { .no-print { display: none !important; } .print-only { display: block !important; } }
        .print-only { display: none; }
        
        .shimmer {
            background: linear-gradient(90deg, #f3f4f6 25%, #f9fafb 50%, #f3f4f6 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="pb-10">

    <!-- Loading Screen -->
    <div id="loadingOverlay" class="fixed inset-0 bg-white/95 z-50 flex flex-col items-center justify-center transition-opacity duration-300">
        <div class="w-12 h-12 border-4 border-pink-100 border-t-pink-600 rounded-full animate-spin"></div>
        <p id="loadingText" class="mt-4 text-pink-600 font-medium text-sm">กำลังโหลดข้อมูลครุภัณฑ์...</p>
        <button id="retryBtn" onclick="location.reload()" class="hidden mt-4 px-6 py-2 bg-pink-600 text-white rounded-xl font-bold text-sm shadow-lg shadow-pink-100">ลองใหม่อีกครั้ง</button>
    </div>

    <header class="pink-gradient px-10 py-8 no-print text-white">
        <div class="max-w-7xl mx-auto flex items-center gap-4">
            <div class="bg-white p-2 rounded-2xl shadow-lg">
                <img src="https://www.udh.go.th/images/logo_udh.png" alt="UDH" class="w-10 h-10 object-contain">
            </div>
            <div>
                <h1 class="text-2xl font-bold tracking-tight uppercase">IT ASSET TRACKING</h1>
                <p class="text-xs opacity-80">ศูนย์เทคโนโลยีสารสนเทศ โรงพยาบาลอุดรธานี</p>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 -mt-6">
        
        <!-- Header Card -->
        <div class="bg-white rounded-[2rem] p-8 shadow-xl shadow-pink-100/50 flex flex-col md:flex-row gap-8 mb-8 no-print border border-white relative overflow-hidden">
            <div class="flex flex-col md:flex-row gap-8 w-full">
                <!-- Agency Photo Box -->
                <div id="agencyPhoto" class="w-44 h-44 bg-pink-50 rounded-[2.5rem] flex items-center justify-center border border-pink-100 shrink-0 overflow-hidden shadow-inner">
                    <svg class="w-16 h-16 text-pink-200" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                </div>

                <!-- Department Info -->
                <div class="flex-1 space-y-4 py-2">
                    <div class="flex items-center gap-3">
                        <span id="displayDepId" class="bg-pink-100 text-pink-700 px-3 py-1 rounded-lg text-xs font-bold italic">ID: ---</span>
                        <span class="text-gray-400 text-xs italic">ข้อมูล ณ วันที่: <span id="currentDate">-</span></span>
                    </div>
                    <h2 id="deptName" class="text-5xl font-black text-slate-800 tracking-tight">กำลังโหลด...</h2>
                    
                    <div class="grid grid-cols-3 gap-6 pt-6 border-t border-gray-50 max-w-lg">
                        <div class="flex items-center gap-2">
                            <span class="text-pink-400">📍</span>
                            <div class="text-xs text-gray-400 font-medium">อาคาร<br><span id="bldg" class="text-sm font-bold text-gray-700">-</span></div>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="text-pink-400">📈</span>
                            <div class="text-xs text-gray-400 font-medium">ชั้น<br><span id="floor" class="text-sm font-bold text-gray-700">-</span></div>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="text-pink-400">📞</span>
                            <div class="text-xs text-gray-400 font-medium">เบอร์ภายใน<br><span id="tel" class="text-sm font-bold text-gray-700">-</span></div>
                        </div>
                    </div>
                </div>

                <!-- Actions -->
                <div class="flex flex-col gap-3 justify-center min-w-[200px]">
                    <button onclick="window.print()" class="bg-slate-800 text-white px-8 py-3 rounded-2xl font-bold text-sm flex items-center justify-center gap-2 hover:bg-black transition shadow-lg shadow-slate-200">
                        <span>🖨️</span> พิมพ์รายงานสรุป
                    </button>
                    <button class="bg-[#10b981] text-white px-8 py-3 rounded-2xl font-bold text-sm flex items-center justify-center gap-2 hover:bg-emerald-600 transition shadow-lg shadow-emerald-100">
                        <span>📊</span> ส่งออก Excel
                    </button>
                </div>
            </div>
        </div>

        <!-- Controls -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-6 no-print gap-4">
            <div class="flex bg-white p-1.5 rounded-2xl shadow-sm border border-pink-50">
                <button onclick="switchTab('on')" id="btnOn" class="px-8 py-3 rounded-xl font-bold text-sm tab-active transition-all duration-300">ในระบบ (Asset_On)</button>
                <button onclick="switchTab('non')" id="btnNon" class="px-8 py-3 rounded-xl font-bold text-sm tab-inactive transition-all duration-300">นอกระบบ (Non-Number)</button>
            </div>
            <div class="relative w-full md:w-96 group">
                <input type="text" id="q" onkeyup="doSearch()" placeholder="ค้นหารหัส หรือ รายละเอียด..." 
                       class="w-full bg-white border border-pink-100 rounded-2xl px-6 py-4 text-sm focus:ring-4 focus:ring-pink-500/10 focus:border-pink-500 outline-none shadow-sm transition-all">
                <span class="absolute right-5 top-4 opacity-30 group-focus-within:opacity-100">🔍</span>
            </div>
        </div>

        <!-- Data Table -->
        <div class="bg-white rounded-[2.5rem] shadow-sm overflow-hidden border border-pink-50 no-print">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-pink-50/50 text-pink-900 text-xs font-bold uppercase tracking-wider">
                        <tr>
                            <th class="px-8 py-6 text-center">ลำดับ</th>
                            <th class="px-6 py-6">หมายเลขครุภัณฑ์</th>
                            <th class="px-6 py-6">ประเภท/รายการ</th>
                            <th class="px-6 py-6">รายละเอียด</th>
                            <th class="px-6 py-6 text-center">อายุ (ปี)</th>
                            <th class="px-8 py-6 text-center">สถานะ</th>
                        </tr>
                    </thead>
                    <tbody id="tbody" class="divide-y divide-pink-50 text-slate-600 text-sm">
                        <!-- Initial Skeleton -->
                        <script>
                            for(let i=0; i<6; i++) document.write(`<tr><td colspan="6" class="px-8 py-6"><div class="h-6 shimmer rounded-xl"></div></td></tr>`);
                        </script>
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <script>
        const API = 'https://script.google.com/macros/s/AKfycbxiOY15Idt7KJgQQn60_MAtVJmAICWT2wvNLS3C4h_SI7uaFD23Z6mzSp8nSrBd4TGVNA/exec';
        let rawData = { assetsOn: [], assetsNon: [], department: {} };
        let currentTab = 'on';
        const depId = new URLSearchParams(window.location.search).get('DEP_ID');

        // ฟังก์ชันหัวใจสำคัญ: แก้ปัญหาชื่อ Key ไม่ตรงกันจาก Google Sheets (ไม่แก้ UI)
        function getVal(obj, keys) {
            if (!obj) return '-';
            for (let k of keys) {
                if (obj[k] !== undefined && obj[k] !== null && obj[k] !== '') return obj[k];
                // ค้นหาแบบไม่สนตัวเล็กใหญ่และเครื่องหมายขีดล่าง
                let foundKey = Object.keys(obj).find(key => key.toLowerCase().replace(/_/g, '') === k.toLowerCase().replace(/_/g, ''));
                if (foundKey && obj[foundKey] !== '') return obj[foundKey];
            }
            return '-';
        }

        async function init() {
            if (!depId) {
                updateLoadingText('❌ ไม่พบรหัสหน่วยงานใน URL', true);
                return;
            }

            try {
                const res = await fetch(`${API}?action=getFullData&DEP_ID=${depId}`);
                if (!res.ok) throw new Error('Network response error');
                rawData = await res.json();
                
                if (rawData.error) throw new Error(rawData.error);

                const d = rawData.department || {};
                document.getElementById('displayDepId').innerText = `ID: ${depId}`;
                document.getElementById('deptName').innerText = getVal(d, ['DEPNAME', 'DEP_NAME', 'NAME']);
                document.getElementById('currentDate').innerText = new Date().toLocaleDateString('th-TH');
                document.getElementById('bldg').innerText = getVal(d, ['Building', 'BLDG']);
                document.getElementById('floor').innerText = getVal(d, ['Floor', 'FL']);
                document.getElementById('tel').innerText = getVal(d, ['Tel', 'PHONE']);

                if (d.photoUrl) {
                    document.getElementById('agencyPhoto').innerHTML = `<img src="${d.photoUrl}" class="w-full h-full object-cover" onerror="this.style.display='none'">`;
                }

                render();
                
                const overlay = document.getElementById('loadingOverlay');
                overlay.classList.add('opacity-0');
                setTimeout(() => overlay.style.display = 'none', 300);

            } catch (e) {
                updateLoadingText(`❌ เกิดข้อผิดพลาด: ${e.message}`, true);
            }
        }

        function render() {
            const list = currentTab === 'on' ? (rawData.assetsOn || []) : (rawData.assetsNon || []);
            const tbody = document.getElementById('tbody');
            tbody.innerHTML = '';

            if (list.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="py-32 text-center text-slate-400 font-medium italic text-lg">--- ไม่พบข้อมูลครุภัณฑ์ในหมวดนี้ ---</td></tr>`;
                return;
            }

            list.forEach((item, i) => {
                // แก้จุดสำคัญ: ใช้ getVal เพื่อดึงข้อมูลแม้ชื่อ Key ใน JSON จะไม่ตรงกับโค้ดเป๊ะๆ
                const assetId = getVal(item, ['ASSET_ID', 'ID', 'หมายเลขครุภัณฑ์', 'รหัสครุภัณฑ์']);
                const type = getVal(item, ['TYPE_NAME', 'TYPE', 'รายการ', 'ประเภท']);
                const detail = getVal(item, ['DETAIL_I', 'DETAIL', 'รายละเอียด']);
                const age = getVal(item, ['AGE_V', 'AGE', 'อายุ']);

                const tr = document.createElement('tr');
                tr.className = "hover:bg-pink-50/30 transition-all duration-200 group";
                tr.innerHTML = `
                    <td class="px-8 py-6 text-center text-slate-300 font-bold group-hover:text-pink-400 transition-colors">${i+1}</td>
                    <td class="px-6 py-6 font-bold text-slate-800">${assetId}</td>
                    <td class="px-6 py-6 text-slate-700 font-medium">${type}</td>
                    <td class="px-6 py-6 text-xs text-slate-400 leading-relaxed max-w-xs truncate group-hover:whitespace-normal group-hover:overflow-visible transition-all">${detail}</td>
                    <td class="px-6 py-6 text-center font-black text-pink-600">${age} ${age !== '-' ? 'ปี' : ''}</td>
                    <td class="px-8 py-6 text-center">
                        <span class="bg-pink-50 text-pink-600 border border-pink-100 px-4 py-1.5 rounded-full text-[10px] font-bold tracking-widest uppercase">Verified</span>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('btnOn').className = tab === 'on' ? 'px-8 py-3 rounded-xl font-bold text-sm tab-active shadow-lg shadow-pink-100' : 'px-8 py-3 rounded-xl font-bold text-sm tab-inactive';
            document.getElementById('btnNon').className = tab === 'non' ? 'px-8 py-3 rounded-xl font-bold text-sm tab-active shadow-lg shadow-pink-100' : 'px-8 py-3 rounded-xl font-bold text-sm tab-inactive';
            render();
        }

        function doSearch() {
            const val = document.getElementById('q').value.toLowerCase();
            const rows = document.querySelectorAll('#tbody tr');
            rows.forEach(r => r.style.display = r.innerText.toLowerCase().includes(val) ? '' : 'none');
        }

        function updateLoadingText(msg, showRetry = false) {
            document.getElementById('loadingText').innerText = msg;
            if (showRetry) {
                document.getElementById('retryBtn').classList.remove('hidden');
                document.querySelector('.animate-spin').classList.add('hidden');
            }
        }

        window.onload = init;
    </script>
</body>
</html>
