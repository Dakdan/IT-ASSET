<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบตรวจสอบครุภัณฑ์คอมพิวเตอร์ - โรงพยาบาลอุดรธานี</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-pink: #be185d;
            --medium-pink: #ec4899;
            --soft-pink: #fdf2f8;
            --gradient-header: linear-gradient(135deg, #9d174d 0%, #be185d 50%, #f472b6 85%);
        }
        body {
            font-family: 'Kanit', sans-serif;
            background-color: #fcfcfc;
            min-height: 100vh;
        }
        .soft-card {
            background: white;
            border-radius: 20px;
            border: 1px solid rgba(190, 24, 93, 0.06);
            box-shadow: 0 4px 20px -5px rgba(0, 0, 0, 0.04);
        }
        .pink-header {
            background: var(--gradient-header);
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
        }
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background: white !important; }
            table { width: 100%; border-collapse: collapse; margin-top: 10px; }
            th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
            th { background-color: #f3f4f6 !important; }
        }
        .print-only { display: none; }
    </style>
</head>
<body class="text-gray-800">

    <div id="loaderModal" class="fixed inset-0 z-[100] flex items-center justify-center bg-white/90 backdrop-blur-sm hidden no-print">
        <div class="text-center p-6 bg-white rounded-3xl shadow-2xl">
            <div class="inline-block w-10 h-10 border-4 border-pink-100 border-t-pink-600 rounded-full animate-spin mb-4"></div>
            <p class="text-pink-800 font-medium text-sm">กำลังโหลดข้อมูล...</p>
        </div>
    </div>

    <header class="pink-header px-4 py-6 shadow-lg no-print">
        <div class="container mx-auto">
            <div class="flex flex-col md:flex-row items-center justify-between gap-4">
                <div class="flex items-center gap-3">
                    <img src="https://img2.pic.in.th/-227e4f6f84f29f020.png" alt="Logo" class="h-10">
                    <div class="text-left text-white">
                        <h1 class="text-lg font-bold">รายงานการตรวจสอบครุภัณฑ์คอมพิวเตอร์ 2569</h1>
                        <p class="text-xs opacity-80">โรงพยาบาลอุดรธานี</p>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="goHome()" class="bg-white/20 text-white px-3 py-1.5 rounded-lg text-xs flex items-center gap-1">
                        <i class="fas fa-home"></i> หน้าหลัก
                    </button>
                    <button onclick="handlePrint()" class="bg-white text-pink-700 px-3 py-1.5 rounded-lg text-xs font-bold shadow-md flex items-center gap-1">
                        <i class="fas fa-print"></i> พิมพ์รายงาน
                    </button>
                    <button onclick="exportToExcel()" class="bg-green-600 text-white px-3 py-1.5 rounded-lg text-xs font-bold shadow-md flex items-center gap-1">
                        <i class="fas fa-file-excel"></i> Export Excel
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 mt-6 pb-20">
        <!-- ข้อมูลหน่วยงาน -->
        <div class="soft-card p-5 mb-4 no-print">
            <div class="flex flex-row gap-4 items-center mb-4">
                <div class="w-16 h-16 rounded-2xl bg-gray-50 border overflow-hidden flex-shrink-0">
                    <img src="" id="deptAvatar" class="w-full h-full object-cover hidden">
                    <div id="deptAvatarPlaceholder" class="w-full h-full flex items-center justify-center text-gray-300">
                        <i class="fas fa-hospital text-2xl"></i>
                    </div>
                </div>
                <div>
                    <h2 id="deptName" class="text-lg font-bold text-gray-800">กำลังโหลด...</h2>
                    <p id="deptId" class="text-pink-500 font-mono text-xs"></p>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 pt-4 border-t">
                <div class="flex items-center gap-2 text-sm text-gray-600">
                    <i class="fas fa-location-dot text-pink-500"></i> <span id="locName">สถานที่: -</span>
                </div>
                <div class="flex items-center gap-2 text-sm text-gray-600">
                    <i class="fas fa-building text-pink-500"></i> <span id="locFloor">ชั้น: -</span>
                </div>
                <div class="flex items-center gap-2 text-sm text-gray-600">
                    <i class="fas fa-phone text-pink-500"></i> <span id="locPhone">โทรศัพท์: -</span>
                </div>
            </div>
        </div>

        <!-- รายการข้อมูล -->
        <div class="no-print">
            <div class="flex bg-gray-100 p-1 rounded-xl mb-4">
                <button onclick="switchTab('on')" id="btnTabOn" class="flex-1 py-2 rounded-lg text-xs font-bold bg-white text-pink-700 shadow-sm">ในทะเบียน</button>
                <button onclick="switchTab('non')" id="btnTabNon" class="flex-1 py-2 rounded-lg text-xs font-bold text-gray-500">นอกทะเบียน</button>
            </div>

            <div class="soft-card overflow-hidden">
                <table class="w-full text-left text-xs">
                    <thead class="bg-gray-50 text-gray-500">
                        <tr>
                            <th class="px-4 py-3">#</th>
                            <th class="px-4 py-3">รหัส/รายละเอียด</th>
                            <th class="px-4 py-3">อายุครุภัณฑ์</th>
                            <th class="px-4 py-3">สถานะ</th>
                        </tr>
                    </thead>
                    <tbody id="assetTbody" class="divide-y"></tbody>
                </table>
            </div>
        </div>

        <!-- พื้นที่สำหรับ Print -->
        <div id="printArea" class="print-only">
            <h1 class="text-center font-bold text-xl mb-4">รายงานตรวจสอบครุภัณฑ์คอมพิวเตอร์</h1>
            <div id="printDeptDetail" class="mb-6 text-sm"></div>
            <div id="printTableContainer"></div>
        </div>
    </main>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxiOY15Idt7KJgQQn60_MAtVJmAICWT2wvNLS3C4h_SI7uaFD23Z6mzSp8nSrBd4TGVNA/exec';
        let rawData = { department: {}, assetsOn: [], assetsNon: [] };
        let activeTab = 'on';
        const params = new URLSearchParams(window.location.search);
        const depId = params.get('DEP_ID');

        window.onload = () => { if (depId) fetchData(); };

        async function fetchData() {
            document.getElementById('loaderModal').classList.remove('hidden');
            try {
                const res = await fetch(`${API_URL}?DEP_ID=${depId}&action=getFullData`);
                rawData = await res.json();
                renderUI();
            } catch (e) { console.error(e); }
            document.getElementById('loaderModal').classList.add('hidden');
        }

        function renderUI() {
            const d = rawData.department;
            document.getElementById('deptName').innerText = d.DEPNAME || '-';
            document.getElementById('deptId').innerText = `หน่วยงานรหัส: ${d.DEP_ID}`;
            document.getElementById('locName').innerText = `สถานที่: ${d.LOCNAME || '-'}`;
            document.getElementById('locFloor').innerText = `ชั้น: ${d.FLOOR || '-'}`;
            document.getElementById('locPhone').innerText = `โทรศัพท์: ${d.TEL || '-'}`;

            if (d.photoUrl) {
                document.getElementById('deptAvatar').src = d.photoUrl;
                document.getElementById('deptAvatar').classList.remove('hidden');
                document.getElementById('deptAvatarPlaceholder').classList.add('hidden');
            }
            switchTab('on');
        }

        function switchTab(type) {
            activeTab = type;
            const btnOn = document.getElementById('btnTabOn');
            const btnNon = document.getElementById('btnTabNon');
            if(type === 'on') {
                btnOn.className = "flex-1 py-2 rounded-lg text-xs font-bold bg-white text-pink-700 shadow-sm";
                btnNon.className = "flex-1 py-2 rounded-lg text-xs font-bold text-gray-500";
                renderTable(rawData.assetsOn);
            } else {
                btnNon.className = "flex-1 py-2 rounded-lg text-xs font-bold bg-white text-pink-700 shadow-sm";
                btnOn.className = "flex-1 py-2 rounded-lg text-xs font-bold text-gray-500";
                renderTable(rawData.assetsNon);
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('assetTbody');
            tbody.innerHTML = '';
            data.forEach((item, index) => {
                tbody.insertAdjacentHTML('beforeend', `
                    <tr>
                        <td class="px-4 py-3 text-gray-400">${index + 1}</td>
                        <td class="px-4 py-3">
                            <div class="font-bold text-pink-700">${item.AssetID || item.NOID || '-'}</div>
                            <div class="text-[10px] text-gray-500">${item.Asset_Type || ''} ${item.Detail || ''}</div>
                        </td>
                        <td class="px-4 py-3 font-medium text-gray-700">${item.Age || '-'}</td>
                        <td class="px-4 py-3">
                            <span class="px-2 py-0.5 rounded-full text-[10px] font-bold ${item.CoStatus === 'ปกติ' ? 'bg-green-100 text-green-700' : 'bg-orange-100 text-orange-700'}">
                                ${item.CoStatus || 'ปกติ'}
                            </span>
                        </td>
                    </tr>
                `);
            });
        }

        function handlePrint() {
            const d = rawData.department;
            document.getElementById('printDeptDetail').innerHTML = `
                <p>หน่วยงาน: ${d.DEPNAME} | สถานที่: ${d.LOCNAME} | ชั้น: ${d.FLOOR} | โทร: ${d.TEL}</p>
                <p>วันที่พิมพ์: ${new Date().toLocaleString('th-TH')}</p>
            `;
            let tableHtml = '<table><thead><tr><th>#</th><th>รหัส</th><th>ประเภท</th><th>รายละเอียด</th><th>อายุครุภัณฑ์</th><th>สถานะ</th></tr></thead><tbody>';
            [...rawData.assetsOn, ...rawData.assetsNon].forEach((item, index) => {
                tableHtml += `<tr><td align="center">${index+1}</td><td>${item.AssetID || item.NOID || '-'}</td><td>${item.Asset_Type || '-'}</td><td>${item.Detail || '-'}</td><td>${item.Age || '-'}</td><td align="center">${item.CoStatus || 'ปกติ'}</td></tr>`;
            });
            tableHtml += '</tbody></table>';
            document.getElementById('printTableContainer').innerHTML = tableHtml;
            window.print();
        }

        function exportToExcel() {
            const d = rawData.department;
            const data = [...rawData.assetsOn, ...rawData.assetsNon];
            let csv = "\uFEFFลำดับ,รหัสครุภัณฑ์,ประเภท,รายละเอียด,อายุครุภัณฑ์,สถานะ\n";
            data.forEach((item, index) => {
                csv += `${index+1},"${item.AssetID || item.NOID || '-'}","${item.Asset_Type || '-'}","${item.Detail || '-'}","${item.Age || '-'}","${item.CoStatus || 'ปกติ'}"\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", `รายงาน_${d.DEPNAME}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function goHome() { window.location.href = 'asset_survey.html'; }
    </script>
</body>
</html>
