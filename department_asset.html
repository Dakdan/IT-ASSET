<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบตรวจสอบครุภัณฑ์คอมพิวเตอร์ - โรงพยาบาลอุดรธานี</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-pink: #be185d;
            --gradient-header: linear-gradient(135deg, #9d174d 0%, #be185d 50%, #f472b6 85%);
        }
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; }
        .soft-card { background: white; border-radius: 24px; border: 1px solid #e2e8f0; box-shadow: 0 4px 20px -5px rgba(0,0,0,0.05); }
        .pink-header { background: var(--gradient-header); border-bottom-left-radius: 32px; border-bottom-right-radius: 32px; }
        .tab-active { background-color: white; color: var(--primary-pink); shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .loader-overlay { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); display: none; }
        
        @media (max-width: 768px) {
            .asset-table thead { display: none; }
            .asset-table tr { display: block; margin-bottom: 1rem; padding: 1rem; background: white; border-radius: 16px; border: 1px solid #eee; }
            .asset-table td { display: flex; justify-content: space-between; padding: 0.5rem 0; border: none !important; text-align: right; }
            .asset-table td::before { content: attr(data-label); font-weight: 600; color: #64748b; text-align: left; }
        }
    </style>
</head>
<body class="text-slate-800">

    <!-- Loading Modal -->
    <div id="loaderModal" class="fixed inset-0 z-[100] flex items-center justify-center loader-overlay no-print">
        <div class="text-center p-10 bg-white rounded-3xl shadow-2xl">
            <div class="inline-block w-12 h-12 border-4 border-pink-100 border-t-pink-600 rounded-full animate-spin mb-4"></div>
            <p class="text-pink-800 font-bold">กำลังซิงค์ข้อมูลกับ Code.gs...</p>
        </div>
    </div>

    <!-- Header -->
    <header class="pink-header px-4 py-8 shadow-lg no-print">
        <div class="container mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-4">
                <div class="bg-white p-2 rounded-xl shadow-inner">
                    <img src="https://img2.pic.in.th/-227e4f6f84f29f020.png" alt="Logo" class="h-10">
                </div>
                <div>
                    <h1 class="text-xl font-bold text-white leading-tight">ระบบตรวจสอบครุภัณฑ์</h1>
                    <p class="text-white/70 text-xs">Udonthani Hospital IT Asset Management</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="goHome()" class="bg-white/10 text-white px-4 py-2 rounded-lg text-sm border border-white/20 hover:bg-white/20 transition-all">หน้าหลัก</button>
                <button onclick="window.print()" class="bg-white text-pink-700 px-4 py-2 rounded-lg text-sm font-bold shadow hover:bg-pink-50">พิมพ์รายงาน</button>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 mt-8 pb-10">
        <!-- Dashboard Section -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8 no-print">
            <div class="lg:col-span-2 soft-card p-6 flex items-center gap-6">
                <div class="w-24 h-24 bg-slate-100 rounded-2xl overflow-hidden border-2 border-white shadow">
                    <img id="deptPhoto" src="" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/150?text=Logo'">
                </div>
                <div>
                    <h2 id="deptName" class="text-2xl font-bold text-slate-800">กำลังโหลด...</h2>
                    <p id="deptIdDisplay" class="text-slate-400 text-sm">หน่วยงาน ID: -</p>
                </div>
            </div>
            <div class="soft-card p-6 bg-slate-900 text-white flex flex-col justify-center">
                <p class="text-white/50 text-xs uppercase tracking-wider font-semibold">ครุภัณฑ์รวม</p>
                <h3 id="totalAssetsCount" class="text-4xl font-bold mt-1">0 <span class="text-sm font-normal opacity-50">เครื่อง</span></h3>
            </div>
        </div>

        <!-- Filter Controls -->
        <div class="no-print grid grid-cols-1 lg:grid-cols-12 gap-4 mb-6">
            <div class="lg:col-span-8 relative">
                <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="text" id="searchInput" onkeyup="filterAssets()" placeholder="ค้นหารหัส หรือ รายละเอียดครุภัณฑ์..." 
                    class="w-full pl-12 pr-6 py-4 rounded-2xl border border-slate-200 outline-none focus:ring-2 focus:ring-pink-500/20 transition-all">
            </div>
            <div class="lg:col-span-4 flex bg-slate-200/50 p-1 rounded-2xl">
                <button onclick="switchTab('on')" id="btnTabOn" class="flex-1 py-3 rounded-xl text-sm font-bold transition-all tab-active">ในทะเบียน</button>
                <button onclick="switchTab('non')" id="btnTabNon" class="flex-1 py-3 rounded-xl text-sm font-bold transition-all text-slate-500">นอกทะเบียน</button>
            </div>
        </div>

        <!-- Data Table -->
        <div class="soft-card overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left asset-table">
                    <thead class="no-print">
                        <tr class="text-[11px] bg-slate-50 text-slate-400 border-b uppercase font-bold">
                            <th class="px-6 py-4 text-center">ลำดับ</th>
                            <th class="px-6 py-4">รหัสครุภัณฑ์</th>
                            <th class="px-6 py-4">ประเภท</th>
                            <th class="px-6 py-4">รายละเอียด</th>
                            <th class="px-6 py-4 text-center">อายุ (ปี)</th>
                            <th class="px-6 py-4 text-center">สถานะ</th>
                        </tr>
                    </thead>
                    <tbody id="assetTbody" class="divide-y divide-slate-100 text-sm">
                        <tr><td colspan="6" class="py-20 text-center text-slate-400">กำลังดึงข้อมูลจาก Google Sheets...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // API Configuration - ยึดตาม Code.gs ล่าสุด
        const API_URL = 'https://script.google.com/macros/s/AKfycbxiOY15Idt7KJgQQn60_MAtVJmAICWT2wvNLS3C4h_SI7uaFD23Z6mzSp8nSrBd4TGVNA/exec';
        let rawData = { department: {}, assetsOn: [], assetsNon: [] };
        let activeTab = 'on';
        
        const params = new URLSearchParams(window.location.search);
        const depId = params.get('DEP_ID');

        window.onload = () => { 
            if(depId) {
                fetchData(); 
            } else {
                showError("กรุณาระบุรหัสหน่วยงาน (DEP_ID)");
            }
        };

        async function fetchData() {
            showLoader();
            try {
                // เพิ่ม action=getFullData ให้ตรงกับ switch-case ใน Code.gs
                const targetUrl = `${API_URL}?action=getFullData&DEP_ID=${encodeURIComponent(depId)}&v=${Date.now()}`;
                const response = await fetch(targetUrl);
                
                if (!response.ok) throw new Error("HTTP Error " + response.status);
                
                const data = await response.json();
                
                if (data.error) throw new Error(data.error);

                // Mapping ข้อมูลจาก JSON Response (Code.gs: getFullData)
                rawData = {
                    department: data.department || {},
                    assetsOn: Array.isArray(data.assetsOn) ? data.assetsOn : [],
                    assetsNon: Array.isArray(data.assetsNon) ? data.assetsNon : []
                };

                renderUI();
            } catch (error) {
                console.error("Fetch Error:", error);
                showError("ไม่สามารถเข้าถึงฐานข้อมูล: " + error.message);
            } finally {
                hideLoader();
            }
        }

        function renderUI() {
            const dept = rawData.department;
            // Mapping ชื่อหน่วยงาน (ยึดตาม Header จาก Code.gs)
            document.getElementById('deptName').innerText = dept.DEPNAME || dept.DEP_NAME || 'ไม่พบข้อมูลหน่วยงาน';
            document.getElementById('deptIdDisplay').innerText = `หน่วยงาน ID: ${depId}`;
            
            const total = rawData.assetsOn.length + rawData.assetsNon.length;
            document.getElementById('totalAssetsCount').innerText = total;
            
            // Photo Mapping (ถ้ามีคอลัมน์รูปใน Sheet)
            if (dept.photoUrl) document.getElementById('deptPhoto').src = dept.photoUrl;
            
            filterAssets();
        }

        function switchTab(type) {
            activeTab = type;
            document.getElementById('btnTabOn').className = type === 'on' ? "flex-1 py-3 rounded-xl text-sm font-bold transition-all tab-active shadow-sm" : "flex-1 py-3 rounded-xl text-sm font-bold transition-all text-slate-500";
            document.getElementById('btnTabNon').className = type === 'non' ? "flex-1 py-3 rounded-xl text-sm font-bold transition-all tab-active shadow-sm" : "flex-1 py-3 rounded-xl text-sm font-bold transition-all text-slate-500";
            filterAssets();
        }

        function filterAssets() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const pool = activeTab === 'on' ? rawData.assetsOn : rawData.assetsNon;
            
            const filtered = pool.filter(item => {
                // ตรวจสอบชื่อ Field ให้ตรงกับคอลัมน์ใน Sheet (มักเป็นตัวพิมพ์ใหญ่)
                return String(item.ASSET_ID || '').toLowerCase().includes(term) || 
                       String(item.DETAIL_I || '').toLowerCase().includes(term) ||
                       String(item.TYPE_NAME || '').toLowerCase().includes(term);
            });
            
            renderTable(filtered);
        }

        function renderTable(data) {
            const tbody = document.getElementById('assetTbody');
            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="py-20 text-center text-slate-400 italic">ไม่พบรายการครุภัณฑ์ในหมวด ${activeTab === 'on' ? 'ในทะเบียน' : 'นอกทะเบียน'}</td></tr>`;
                return;
            }

            tbody.innerHTML = data.map((item, idx) => {
                // ตรวจสอบสถานะการตรวจสอบ (Header: CONFIRM_NAME)
                const isConfirmed = item.CONFIRM_NAME && item.CONFIRM_NAME !== '-';
                return `
                    <tr class="hover:bg-slate-50/50 transition-colors">
                        <td class="px-6 py-4 text-center text-slate-400 font-mono text-[10px]" data-label="ลำดับ">${idx + 1}</td>
                        <td class="px-6 py-4 font-bold text-slate-700" data-label="รหัสครุภัณฑ์">${item.ASSET_ID || '-'}</td>
                        <td class="px-6 py-4" data-label="ประเภท">${item.TYPE_NAME || '-'}</td>
                        <td class="px-6 py-4 text-slate-500 text-xs leading-relaxed" data-label="รายละเอียด">${item.DETAIL_I || '-'}</td>
                        <td class="px-6 py-4 text-center font-bold text-pink-600" data-label="อายุ">${item.AGE_V || '0'}</td>
                        <td class="px-6 py-4 text-center" data-label="สถานะ">
                            <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-[10px] font-bold ${isConfirmed ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700'}">
                                ${isConfirmed ? '<i class="fas fa-check-circle mr-1"></i>ตรวจสอบแล้ว' : '<i class="fas fa-clock mr-1"></i>รอตรวจ'}
                            </span>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function showError(msg) {
            hideLoader();
            document.getElementById('deptName').innerText = "เกิดข้อผิดพลาด";
            document.getElementById('assetTbody').innerHTML = `<tr><td colspan="6" class="py-20 text-center"><div class="text-red-500 font-bold">${msg}</div><button onclick="location.reload()" class="mt-4 text-xs text-slate-500 underline">ลองใหม่อีกครั้ง</button></td></tr>`;
        }

        function showLoader() { document.getElementById('loaderModal').style.display = 'flex'; }
        function hideLoader() { document.getElementById('loaderModal').style.display = 'none'; }
        function goHome() { window.location.href = 'https://dakdan.github.io/IT-ASSET/asset_survey.html'; }
    </script>
</body>
</html>
