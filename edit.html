<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>IT Asset Survey UDH - Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    :root {
        --pink-soft: #fdf2f8;
        --pink-main: #ec4899;
        --pink-dark: #be185d;
    }

    body {
        font-family: 'Kanit', sans-serif;
        background-color: #fff9fb;
        min-height: 100vh;
        background-image: radial-gradient(at 0% 0%, rgba(253, 242, 248, 1) 0, transparent 50%);
    }

    .pink-gradient {
        background: linear-gradient(135deg, #f472b6 0%, #db2777 100%);
    }

    /* สไตล์สำหรับ Head (Navigation Bar) */
    .main-nav-head {
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(15px);
        position: sticky;
        top: 0;
        z-index: 100;
        border-bottom: 1px solid rgba(236, 72, 153, 0.1);
    }

    /* Container สำหรับวางช่องค้นหาเกยขอบล่างของ Head */
    .nav-search-anchor {
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translate(-50%, 50%);
        width: 100%;
        max-width: 700px;
        padding: 0 1.5rem;
        z-index: 110;
    }

    .search-input-box {
        background: white;
        border: 2px solid #fce7f3;
        border-radius: 2rem;
        box-shadow: 0 12px 30px -10px rgba(236, 72, 153, 0.2);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        display: flex;
        align-items: center;
    }

    .search-input-box:focus-within {
        border-color: #ec4899;
        box-shadow: 0 20px 40px -15px rgba(236, 72, 153, 0.3);
        transform: scale(1.02) translateY(2px);
    }

    .soft-card {
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(5px);
        border: 1px solid #fce7f3;
        border-radius: 1.5rem;
        box-shadow: 0 10px 20px -5px rgba(236, 72, 153, 0.05);
        transition: all 0.3s ease;
    }

    .soft-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 20px 30px -10px rgba(236, 72, 153, 0.15);
        border-color: #fbcfe8;
    }

    .type-badge {
        font-size: 10px;
        font-weight: 700;
        padding: 2px 8px;
        border-radius: 8px;
        background: white;
        color: #ec4899;
        border: 1px solid #fce7f3;
    }

    @media print {
        .no-print { display: none !important; }
        .nav-search-anchor { display: none !important; }
        body { background: white !important; padding: 0 !important; }
        main { margin-top: 0 !important; }
        .main-nav-head { position: relative !important; border: none !important; }
        .soft-card { break-inside: avoid; box-shadow: none !important; border: 1px solid #eee !important; }
    }
</style>
</head>

<body class="text-slate-700">

<!-- Head (Navigation Bar) -->
<nav class="main-nav-head no-print">
    <div class="max-w-[1600px] mx-auto px-4 md:px-10 py-5 flex items-center justify-between relative h-24">
        <div class="flex items-center gap-4">
           <div class="bg-white p-2 rounded-2xl shadow-inner">
                    <img src="https://img2.pic.in.th/-227e4f6f84f29f020.png" alt="Logo" class="h-12">
                </div>
            <div>
                <h1 class="text-xl font-black text-slate-800 leading-none tracking-tight">IT ASSET <span class="text-pink-500 uppercase">Audit</span></h1>
                <p class="text-[10px] text-pink-400 font-bold uppercase tracking-[0.2em] mt-1">Udonthani Hospital</p>
            </div>
        </div>

        <div class="flex items-center gap-2">
            <button onclick="init()" class="w-10 h-10 flex items-center justify-center text-slate-400 hover:text-pink-500 transition-all rounded-xl hover:bg-pink-50" title="รีเฟรชข้อมูล">
                <i id="refreshIcon" class="fas fa-sync-alt"></i>
            </button>
            <button onclick="window.print()" class="w-10 h-10 flex items-center justify-center text-slate-400 hover:text-pink-500 transition-all rounded-xl hover:bg-pink-50" title="พิมพ์รายงาน">
                <i class="fas fa-print text-lg"></i>
            </button>
            <button onclick="window.location.href='survey_v4_form.html'" 
                    class="pink-gradient ml-2 px-6 py-2.5 rounded-xl text-white font-bold text-sm shadow-lg shadow-pink-100 hover:scale-105 transition-all">
                <i class="fas fa-plus mr-2"></i> เพิ่มข้อมูล
            </button>
        </div>

        <div class="nav-search-anchor">
            <div class="search-input-box px-6 py-3.5">
                <i class="fas fa-search text-pink-400 text-lg mr-4"></i>
                <input id="searchInput" oninput="renderDashboard()"
                    placeholder="ค้นหาชื่อหน่วยงาน, อาคาร หรือชั้น..."
                    class="w-full outline-none text-base font-medium text-slate-700 placeholder:text-slate-300">
                <div id="lastUpdate" class="hidden md:block text-[10px] text-pink-500 font-bold ml-4 whitespace-nowrap">...</div>
            </div>
        </div>
    </div>
</nav>

<main class="max-w-[1600px] mx-auto px-4 md:px-8 mt-16">
    <div class="bg-white/80 rounded-[2.5rem] p-8 md:p-12 border border-pink-50 shadow-sm mb-16 flex flex-col lg:flex-row justify-between items-center gap-8">
        <div class="text-center lg:text-left">
            <h2 class="text-3xl md:text-4xl font-black text-slate-800 tracking-tight">สรุปรายการครุภัณฑ์คอมพิวเตอร์ <span class="text-pink-500">IT Asset</span></h2>
            <p class="text-slate-400 font-medium mt-2">ติดตามและตรวจสอบพัสดุ-ครุภัณฑ์คอมพิวเตอร์และอุปกรณ์ไอที ประจำปีงบประมาณ 2569</p>
        </div>
        <div class="flex gap-6 w-full lg:w-auto">
            <div class="flex-1 lg:flex-none text-center px-8 py-6 bg-white rounded-3xl border border-pink-50 min-w-[160px] shadow-sm">
                <p id="statDepts" class="text-4xl font-black text-slate-800">-</p>
                <p class="text-[11px] font-bold text-slate-400 uppercase mt-1 tracking-widest">หน่วยงาน</p>
            </div>
            <div class="flex-1 lg:flex-none text-center px-8 py-6 pink-gradient rounded-3xl min-w-[160px] shadow-xl shadow-pink-100">
                <p id="statAssets" class="text-4xl font-black text-white">-</p>
                <p class="text-[11px] font-bold text-pink-100 uppercase mt-1 tracking-widest">พัสดุรวม</p>
            </div>
        </div>
    </div>

    <div id="contentArea" class="min-h-[500px] space-y-16"></div>
</main>

<!-- Modal -->
<div id="modalDept" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md hidden items-center justify-center z-[200] p-4 no-print" onclick="closeModal()">
    <div class="bg-white w-full max-w-6xl max-h-[92vh] rounded-[2.5rem] shadow-2xl flex flex-col overflow-hidden" onclick="event.stopPropagation()">
        <div class="p-8 border-b border-pink-50 flex flex-col md:flex-row justify-between items-start md:items-center bg-white sticky top-0 z-10 gap-4">
            <div class="flex items-center gap-6">
                <div id="mDeptPic" class="w-16 h-16 md:w-20 md:h-20 rounded-2xl overflow-hidden bg-pink-50 border-2 border-pink-100 shadow-inner">
                    <img src="" class="w-full h-full object-cover">
                </div>
                <div>
                    <h3 id="mDeptName" class="text-xl md:text-2xl font-black text-slate-800 tracking-tight"></h3>
                    <p id="mDeptLoc" class="text-xs md:text-sm text-slate-400 font-bold mt-1 flex items-center gap-2"></p>
                </div>
            </div>
            <div class="flex items-center gap-3 w-full md:w-auto justify-end">
                <!-- ปุ่มดูรายละเอียดเพิ่มเติม -->
                <a id="mDeptDetailBtn" href="#" 
                   class="flex items-center gap-2 px-5 py-2.5 rounded-xl border-2 border-pink-100 text-pink-500 font-bold text-sm hover:bg-pink-50 transition-all">
                    <i class="fas fa-external-link-alt text-xs"></i> ดูรายละเอียดเพิ่มเติม
                </a>
                <button onclick="closeModal()" class="w-12 h-12 rounded-full bg-slate-100 text-slate-400 hover:bg-pink-500 hover:text-white transition-all flex items-center justify-center">
                    <i class="fas fa-times text-xl"></i>❌
                </button>
            </div>
        </div>
        <div id="mAssetGroupContainer" class="p-8 md:p-12 overflow-y-auto flex-1 bg-slate-50/30"></div>
    </div>
</div>

<script>
    const APP_URL = "https://script.google.com/macros/s/AKfycbwb_1Yppy3h_hy4dX1RkN3-l_YKKlC3FWKewmzCHM-q6SHrlbxsm-U-SGMUj1mYXwkMuQ/exec";
    let state = { logs: [], depts: [], assetTypes: [], priorities: [] };

    async function init() {
        const icon = document.getElementById('refreshIcon');
        icon?.classList.add('animate-spin');
        try {
            const ts = new Date().getTime();
            const [logRes, deptRes, initRes] = await Promise.all([
                fetch(`${APP_URL}?action=getAuditLogs&_=${ts}`).then(r => r.json()),
                fetch(`${APP_URL}?action=getDeptList&_=${ts}`).then(r => r.json()),
                fetch(`${APP_URL}?action=getInitialData&_=${ts}`).then(r => r.json())
            ]);
            state.logs = logRes || [];
            state.depts = deptRes || [];
            state.assetTypes = initRes.assetTypes || [];
            state.priorities = initRes.priorities || [];
            document.getElementById('lastUpdate').innerText = `อัปเดต: ${new Date().toLocaleTimeString('th-TH')}`;
            renderDashboard();
        } catch (err) {
            console.error(err);
        } finally {
            icon?.classList.remove('animate-spin');
        }
    }

    function getTypeName(typeId) {
        const t = state.assetTypes.find(x => String(x.id).trim() === String(typeId).trim());
        return t ? t.name : 'อื่นๆ';
    }

    function getPriority(id) {
        const p = state.priorities.find(x => String(x.id).trim() === String(id).trim());
        const config = {
            'PIO-001': { color: 'border-red-100 text-red-500 bg-red-50', icon: 'fa-fire' },
            'PIO-002': { color: 'border-blue-100 text-blue-500 bg-blue-50', icon: 'fa-star' },
            'PIO-003': { color: 'border-emerald-100 text-emerald-500 bg-emerald-50', icon: 'fa-check-circle' },
            'PIO-004': { color: 'border-amber-100 text-amber-500 bg-amber-50', icon: 'fa-clock' }
        };
        return { name: p ? p.name : 'ปกติ', ...(config[id] || { color: 'border-slate-100 text-slate-400 bg-slate-50', icon: 'fa-info-circle' }) };
    }

    function renderDashboard() {
        const area = document.getElementById('contentArea');
        const searchInput = document.getElementById('searchInput');
        const search = searchInput ? searchInput.value.toLowerCase() : "";
        
        const activeIds = [...new Set(state.logs.map(l => String(l.DEPT_ID).trim()))];
        const filtered = state.depts.filter(d => 
            activeIds.includes(String(d.DEP_ID).trim()) && 
            (d.DEPNAME.toLowerCase().includes(search) || (d.BUILDING && d.BUILDING.toLowerCase().includes(search)))
        );

        document.getElementById('statDepts').innerText = filtered.length;
        document.getElementById('statAssets').innerText = state.logs.length.toLocaleString();

        const grouped = {};
        filtered.forEach(d => { const b = d.BUILDING || "อื่นๆ"; if (!grouped[b]) grouped[b] = []; grouped[b].push(d); });

        let html = "";
        Object.keys(grouped).sort().forEach(building => {
            html += `
                <div>
                    <div class="flex items-center gap-4 mb-8 border-b-2 border-pink-100 pb-3">
                        <i class="fas fa-building text-pink-500 text-2xl"></i>
                        <h3 class="text-2xl font-black text-slate-800 uppercase tracking-tight">${building}</h3>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            `;
            grouped[building].forEach(dept => {
                const logs = state.logs.filter(l => String(l.DEPT_ID).trim() === String(dept.DEP_ID).trim());
                const img = dept.PIC_ID ? `https://lh3.googleusercontent.com/d/${dept.PIC_ID}` : `https://placehold.co/200x200/fff1f2/ec4899?text=${dept.DEPNAME.charAt(0)}`;
                
                const types = {};
                logs.forEach(l => { const t = getTypeName(l.Asset_Type_ID); types[t] = (types[t] || 0) + 1; });
                const typeEntries = Object.entries(types).sort((a,b) => b[1] - a[1]).slice(0, 3);

                html += `
                    <div onclick="showDetail('${dept.DEP_ID}')" class="soft-card p-6 cursor-pointer group flex flex-col h-full">
                        <div class="flex items-start gap-5 mb-6">
                            <div class="w-16 h-16 rounded-2xl overflow-hidden shadow-sm flex-shrink-0 bg-white border border-pink-50">
                                <img src="${img}" class="w-full h-full object-cover">
                            </div>
                            <div class="min-w-0">
                                <h4 class="text-sm font-bold text-slate-800 line-clamp-2 leading-tight group-hover:text-pink-600 transition-colors uppercase tracking-tight">${dept.DEPNAME}</h4>
                                <p class="text-[10px] text-pink-400 font-bold mt-2 uppercase tracking-widest">ชั้น ${dept.FL || '-'}</p>
                            </div>
                        </div>

                        <div class="flex-1 bg-pink-50/40 rounded-2xl p-4 mb-6 space-y-2.5 border border-white/50">
                            ${typeEntries.map(([name, count]) => `
                                <div class="flex justify-between items-center">
                                    <span class="text-[11px] font-bold text-slate-500 truncate mr-2">${name}</span>
                                    <span class="type-badge shadow-sm">${count}</span>
                                </div>
                            `).join('')}
                            ${Object.keys(types).length > 3 ? `<p class="text-[9px] text-slate-400 text-center font-bold mt-1 tracking-tight">+ อีก ${Object.keys(types).length - 3} หมวดหมู่</p>` : ''}
                        </div>

                        <div class="mt-auto flex justify-between items-end border-t border-pink-50 pt-5">
                            <div>
                                <p class="text-[9px] text-slate-400 font-black uppercase tracking-tighter">พัสดุตรวจแล้ว</p>
                                <p class="text-2xl font-black text-slate-800">${logs.length}</p>
                            </div>
                            <div class="w-10 h-10 rounded-xl bg-pink-50 text-pink-400 flex items-center justify-center group-hover:bg-pink-500 group-hover:text-white transition-all shadow-sm">
                                <i class="fas fa-chevron-right text-xs"></i>
                            </div>
                        </div>
                    </div>
                `;
            });
            html += `</div></div>`;
        });
        area.innerHTML = html || `<div class="text-center py-32 text-slate-300 font-black uppercase tracking-widest italic opacity-50">ไม่พบข้อมูลที่ต้องการ</div>`;
    }

    function showDetail(deptId) {
        const dept = state.depts.find(d => String(d.DEP_ID).trim() === String(deptId).trim());
        const logs = state.logs.filter(l => String(l.DEPT_ID).trim() === String(deptId).trim());
        if(!dept) return;
        
        // อัปเดตหัวข้อและลิงก์
        document.getElementById('mDeptName').innerText = dept.DEPNAME;
        document.getElementById('mDeptLoc').innerHTML = `<i class="fas fa-map-marker-alt text-pink-500"></i> ${dept.BUILDING} • ชั้น ${dept.FL}`;
        document.getElementById('mDeptPic').querySelector('img').src = dept.PIC_ID ? `https://lh3.googleusercontent.com/d/${dept.PIC_ID}` : `https://placehold.co/200x200/fff1f2/ec4899?text=D`;
        
        // ตั้งค่าลิงก์ไปยังหน้าละเอียดเพิ่มเติม
        document.getElementById('mDeptDetailBtn').href = `dept_detail.html?DEP_ID=${dept.DEP_ID}`;

        const byType = {};
        logs.forEach(l => { const t = getTypeName(l.Asset_Type_ID); if(!byType[t]) byType[t] = []; byType[t].push(l); });
        
        document.getElementById('mAssetGroupContainer').innerHTML = Object.keys(byType).sort().map(type => `
            <div class="mb-12">
                <div class="flex items-center gap-4 mb-6">
                    <span class="w-2 h-6 pink-gradient rounded-full"></span>
                    <h4 class="text-lg font-black text-slate-800 uppercase tracking-tight">${type} <span class="text-pink-500 ml-1">(${byType[type].length})</span></h4>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    ${byType[type].map(a => { 
                        const pri = getPriority(a.PIORITY_ID); 
                        const aImg = a.ASSET_IMG_DB ? `https://lh3.googleusercontent.com/d/${a.ASSET_IMG_DB}` : 'https://placehold.co/400x400/f8fafc/cbd5e1?text=NO+IMAGE'; 
                        return `
                            <div class="soft-card bg-white p-5 flex gap-6">
                                <div class="w-24 h-24 rounded-2xl border flex-shrink-0 overflow-hidden bg-slate-50">
                                    <img src="${aImg}" class="w-full h-full object-cover">
                                </div>
                                <div class="flex-1 min-w-0 flex flex-col justify-between">
                                    <div>
                                        <div class="flex justify-between items-start mb-2">
                                            <span class="text-[9px] font-black bg-slate-800 text-white px-2 py-0.5 rounded-lg shadow-sm">#${a.AssetID || 'N/A'}</span>
                                            <span class="text-[9px] font-black px-2 py-0.5 rounded-lg border ${pri.color} uppercase"><i class="fas ${pri.icon} mr-1.5"></i>${pri.name}</span>
                                        </div>
                                        <h5 class="text-xs font-bold text-slate-700 uppercase leading-normal line-clamp-2">${a.FullDescription}</h5>
                                    </div>
                                    <div class="mt-4 flex flex-wrap gap-2">
                                        <p class="text-[10px] text-slate-400 font-bold uppercase w-full">S/N: ${a.Serial || '-'}</p>
                                        <span class="text-[9px] bg-slate-100 text-slate-500 px-2 py-0.5 rounded font-black uppercase">${a.AgeInfo || 'N/A'}</span>
                                    </div>
                                </div>
                            </div>`; 
                    }).join('')}
                </div>
            </div>
        `).join('');
        document.getElementById('modalDept').classList.remove('hidden'); document.getElementById('modalDept').classList.add('flex'); document.body.style.overflow = 'hidden';
    }

    function closeModal() { document.getElementById('modalDept').classList.add('hidden'); document.getElementById('modalDept').classList.remove('flex'); document.body.style.overflow = 'auto'; }
    window.onload = init;
</script>
</body>
</html>
