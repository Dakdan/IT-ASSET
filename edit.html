<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT ASSET AUDIT</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#f8fafc; }
.sticky-header {
    position: sticky;
    top: 0;
    background: #f8fafc;
    z-index: 10;
}
</style>
</head>

<body class="min-h-screen">

<!-- HEADER -->
<header class="bg-white border-b border-slate-200 px-6 py-5 sticky top-0 z-20">
    <div class="max-w-7xl mx-auto flex flex-col md:flex-row md:items-center md:justify-between gap-4">
        <div>
            <h1 class="text-2xl font-black text-slate-800">IT ASSET AUDIT</h1>
            <p id="lastUpdate" class="text-xs text-slate-400 mt-1"></p>
        </div>

        <div class="flex items-center gap-4">
            <input id="searchInput"
                   type="text"
                   oninput="renderDashboard()"
                   placeholder="ค้นหาหน่วยงาน / อาคาร"
                   class="px-4 py-2 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-pink-400 text-sm w-64">

            <div class="text-sm text-slate-600">
                หน่วยงาน: <span id="statDepts" class="font-bold text-slate-800">0</span>
            </div>

            <div class="text-sm text-slate-600">
                ครุภัณฑ์: <span id="statAssets" class="font-bold text-slate-800">0</span>
            </div>
        </div>
    </div>
</header>

<!-- CONTENT -->
<main class="max-w-7xl mx-auto px-6 py-10">
    <div id="contentArea"></div>
</main>

<!-- MODAL -->
<div id="modalDept"
     class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden items-center justify-center z-50">

    <div class="bg-white w-full max-w-7xl max-h-[95vh] rounded-3xl shadow-2xl flex flex-col overflow-hidden">

        <!-- Header -->
        <div class="p-8 border-b border-slate-200 flex justify-between items-start bg-white">

            <div class="flex items-center gap-6">

                <div id="mDeptPic"
                     class="w-24 h-24 rounded-2xl overflow-hidden bg-slate-100 border border-slate-200 shadow-inner">
                    <img src="" class="w-full h-full object-cover">
                </div>

                <div>
                    <h3 id="mDeptName" class="text-3xl font-black text-slate-800"></h3>
                    <div id="mDeptLoc" class="text-slate-500 mt-2 text-sm font-medium"></div>
                </div>

            </div>

            <button onclick="closeModal()"
                    class="text-slate-400 hover:text-slate-700 text-xl font-bold">
                ✕
            </button>
        </div>

        <!-- Detail Container -->
        <div id="mAssetGroupContainer"
             class="p-10 overflow-y-auto flex-1 bg-slate-50">
        </div>

    </div>
</div>

<script>
const APP_URL = "https://script.google.com/macros/s/AKfycbwb_1Yppy3h_hy4dX1RkN3-l_YKKlC3FWKewmzCHM-q6SHrlbxsm-U-SGMUj1mYXwkMuQ/exec";
let state = { logs: [], depts: [], assetTypes: [] };

async function init() {
    try {
        const ts = new Date().getTime();
        const [logRes, deptRes, initRes] = await Promise.all([
            fetch(`${APP_URL}?action=getAuditLogs&_=${ts}`).then(r => r.json()),
            fetch(`${APP_URL}?action=getDeptList&_=${ts}`).then(r => r.json()),
            fetch(`${APP_URL}?action=getInitialData&_=${ts}`).then(r => r.json())
        ]);
        state.logs = logRes || [];
        state.depts = deptRes || [];
        state.assetTypes = initRes.assetTypes || [];
        document.getElementById('lastUpdate').innerText = `อัปเดตข้อมูลเมื่อ: ${new Date().toLocaleString('th-TH')}`;
        renderDashboard();
    } catch (err) {
        console.error(err);
        document.getElementById('contentArea').innerHTML = `<p class="text-center py-20 text-red-500 font-bold">ไม่สามารถเชื่อมต่อ Google Sheets ได้</p>`;
    }
}

function getTypeName(typeId) {
    const t = state.assetTypes.find(x => String(x.id).trim() === String(typeId).trim());
    return t ? t.name : 'อุปกรณ์อื่นๆ';
}

function renderDashboard() {
/* --------- เหมือนของคุณทุกบรรทัด --------- */
const contentArea = document.getElementById('contentArea');
const search = document.getElementById('searchInput').value.toLowerCase();

const activeDeptIds = [...new Set(state.logs.map(l => String(l.DEPT_ID).trim()))];
let filteredDepts = state.depts.filter(d => 
    activeDeptIds.includes(String(d.DEP_ID).trim()) &&
    (d.DEPNAME.toLowerCase().includes(search) || d.BUILDING.toLowerCase().includes(search))
);

document.getElementById('statDepts').innerText = filteredDepts.length;
document.getElementById('statAssets').innerText = state.logs.length.toLocaleString();

const groupedData = {};
filteredDepts.forEach(d => {
    const b = d.BUILDING || "ไม่ระบุอาคาร";
    const f = `ชั้น ${d.FL || '?'}`;
    if (!groupedData[b]) groupedData[b] = {};
    if (!groupedData[b][f]) groupedData[b][f] = [];
    groupedData[b][f].push(d);
});

const buildings = Object.keys(groupedData).sort();
if (buildings.length === 0) {
    contentArea.innerHTML = `<div class="text-center py-20 text-slate-400 italic">ไม่พบข้อมูลหน่วยงานที่ตรวจสอบ</div>`;
    return;
}

let html = "";
buildings.forEach(building => {
    html += `
    <section>
        <div class="sticky-header py-4 mb-8 border-b border-slate-200">
            <h3 class="text-xl font-black text-slate-800 uppercase tracking-tight">${building}</h3>
        </div>`;

    const floors = Object.keys(groupedData[building]).sort();
    floors.forEach(floor => {
        html += `
            <div class="mb-12">
                <h4 class="text-xs font-black text-pink-500 uppercase tracking-[0.2em] mb-6 flex items-center gap-3 ml-2">
                    ${floor} <span class="flex-1 h-px bg-pink-100"></span>
                </h4>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    ${groupedData[building][floor].map(dept => {
                        const deptLogs = state.logs.filter(l => String(l.DEPT_ID).trim() === String(dept.DEP_ID).trim());
                        const deptImg = dept.PIC_ID ? `https://lh3.googleusercontent.com/d/${dept.PIC_ID}` : `https://placehold.co/200x120/f1f5f9/94a3b8?text=${dept.DEPNAME.substring(0,1)}`;
                        return `
                        <div onclick="showDetail('${dept.DEP_ID}')" 
                             class="bg-white rounded-[2.5rem] p-7 border border-slate-100 shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all cursor-pointer group">
                            <div class="flex items-start gap-5 mb-6">
                                <div class="w-20 h-20 rounded-3xl bg-slate-50 border border-slate-100 overflow-hidden flex-shrink-0 group-hover:scale-105 transition-transform shadow-inner">
                                    <img src="${deptImg}" class="w-full h-full object-cover">
                                </div>
                                <div class="min-w-0 flex-1 pt-1">
                                    <h5 class="text-base font-bold text-slate-800 leading-tight mb-1 group-hover:text-pink-600 transition-colors line-clamp-2">${dept.DEPNAME}</h5>
                                    <p class="text-[10px] text-slate-400 font-bold tracking-widest uppercase">${building} &bull; ${floor}</p>
                                </div>
                            </div>
                            <div class="flex items-center justify-between bg-slate-800 rounded-3xl px-6 py-4">
                                <div class="flex flex-col">
                                    <span class="text-[9px] text-slate-400 font-bold uppercase tracking-wider mb-0.5">รวมทั้งหมด</span>
                                    <span class="text-xl font-black text-white leading-none">${deptLogs.length} <small class="text-[11px] font-bold text-slate-400 ml-1">เครื่อง</small></span>
                                </div>
                            </div>
                        </div>`;
                    }).join('')}
                </div>
            </div>`;
    });
    html += `</section>`;
});
contentArea.innerHTML = html;
}

function showDetail(deptId) {

const dept = state.depts.find(d => String(d.DEP_ID).trim() === String(deptId).trim());
const deptLogs = state.logs.filter(l => String(l.DEPT_ID).trim() === String(deptId).trim());

document.getElementById('mDeptName').innerText = dept.DEPNAME;
document.getElementById('mDeptLoc').innerHTML = `${dept.BUILDING} ชั้น ${dept.FL}`;

const pic = document.getElementById('mDeptPic').querySelector('img');
pic.src = dept.PIC_ID ? `https://lh3.googleusercontent.com/d/${dept.PIC_ID}` : '';

const groupedAssets = {};
deptLogs.forEach(a => {
    const typeName = getTypeName(a.Asset_Type_ID);
    if (!groupedAssets[typeName]) groupedAssets[typeName] = [];
    groupedAssets[typeName].push(a);
});

const container = document.getElementById('mAssetGroupContainer');

container.innerHTML = Object.keys(groupedAssets).sort().map(cat => `
    <div class="mb-10">
        <div class="flex items-center gap-3 mb-5">
            <div class="w-1.5 h-6 bg-pink-500 rounded-full"></div>
            <h4 class="text-lg font-black text-slate-800">
                ${cat}
                <span class="text-pink-500 text-sm ml-2">(${groupedAssets[cat].length})</span>
            </h4>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
            ${groupedAssets[cat].map(a => `
                <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm hover:shadow-md transition">
                    <div class="text-xs text-slate-400 font-bold uppercase mb-1">Asset ID</div>
                    <div class="font-black text-slate-800 mb-2">${a.AssetID || '-'}</div>
                    <div class="text-sm text-slate-600 leading-relaxed">${a.specdetail || ''}</div>
                </div>
            `).join('')}
        </div>
    </div>
`).join('');

document.getElementById('modalDept').classList.remove('hidden');
document.body.style.overflow = 'hidden';
}

function closeModal() { 
    document.getElementById('modalDept').classList.add('hidden'); 
    document.body.style.overflow = 'auto';
}

window.onclick = function(e) { if (e.target == document.getElementById('modalDept')) closeModal(); }
window.onload = init;
</script>

</body>
</html>
