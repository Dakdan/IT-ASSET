<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT Asset Audit</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
    body{
        background:#f8fafc;
    }

    .pink-gradient{
        background:linear-gradient(135deg,#ec4899,#f472b6);
    }

    .main-card{
        background:white;
        border-radius:2rem;
        border:1px solid #f1f5f9;
        box-shadow:0 10px 30px rgba(0,0,0,0.04);
    }

    .nav-container{
        display:flex;
        gap:1rem;
        flex-wrap:wrap;
        justify-content:center;
        margin-top:1.5rem;
    }

    .nav-btn{
        padding:.75rem 1.5rem;
        border-radius:999px;
        font-weight:600;
        font-size:.9rem;
        transition:.2s;
    }

    .nav-btn.active{
        background:#ec4899;
        color:white;
    }

    .nav-btn.inactive{
        background:white;
        border:1px solid #e2e8f0;
        color:#334155;
    }

    /* Responsive container */
    .page-container{
        max-width:1400px;
        margin:auto;
        padding:1.5rem;
    }

    @media (max-width:768px){
        .main-card{
            padding:2rem !important;
        }

        .nav-container{
            flex-direction:column;
            align-items:stretch;
        }

        .nav-btn{
            width:100%;
        }
    }

    /* Modal Responsive */
    .modal-overlay{
        position:fixed;
        inset:0;
        background:rgba(15,23,42,.5);
        display:flex;
        align-items:center;
        justify-content:center;
        padding:1rem;
        z-index:50;
    }

    .modal-content{
        background:white;
        width:100%;
        max-width:900px;
        max-height:90vh;
        overflow:auto;
        border-radius:2rem;
        padding:2rem;
        box-shadow:0 25px 50px rgba(0,0,0,.15);
    }

    @media(max-width:640px){
        .modal-content{
            border-radius:1.5rem;
            padding:1.5rem;
        }
    }
</style>
</head>

<body>

<div class="page-container">

    <!-- Header -->
    <div class="flex flex-col items-center text-center mb-8">
        <div class="text-3xl font-black tracking-wide text-slate-800">Logo</div>
        <h1 class="text-3xl md:text-4xl font-black text-slate-900 mt-4"># IT ASSET AUDIT</h1>
        <p class="text-slate-500 mt-2">Udonthani Hospital</p>
    </div>

    <!-- Navigation -->
    <div class="nav-container">
        <button class="nav-btn active">หน้าหลัก</button>
        <button class="nav-btn inactive" onclick="window.location.href='survey_v4_form.html'">เพิ่มการตรวจสอบ</button>
    </div>

    <!-- Welcome Card -->
    <div class="main-card p-10 mb-8 flex flex-col md:flex-row items-start md:items-center gap-8 relative overflow-hidden mt-8">
        <div class="relative z-10">
            <div class="w-12 h-12 bg-slate-100 rounded-2xl mb-4"></div>
            <div class="h-4 w-48 bg-slate-100 rounded-full mb-3"></div>
            <div class="h-8 w-32 bg-slate-100 rounded-full"></div>
        </div>
        <div class="absolute right-0 top-0 w-64 h-64 bg-pink-50 rounded-full -mr-20 -mt-20 opacity-50"></div>
    </div>

    <!-- Search & Title -->
    <div class="mb-10 flex flex-col md:flex-row md:items-end justify-between gap-6">
        <div>
            <h2 class="text-2xl font-bold text-slate-800 flex items-center gap-3">
                <span class="w-2 h-8 pink-gradient rounded-full"></span>
                หน่วยงานที่ตรวจสอบแล้ว
            </h2>
            <p id="lastUpdate" class="text-slate-400 text-sm ml-5 mt-1">
                สรุปจำนวนอุปกรณ์แยกตามประเภท และรายละเอียดการตรวจสอบ
            </p>
        </div>

        <div class="relative w-full md:w-auto">
            <input type="text"
                   id="searchInput"
                   oninput="renderDashboard()"
                   placeholder="ค้นหาหน่วยงาน หรือ อาคาร..."
                   class="w-full md:w-96 bg-white border border-slate-200 rounded-2xl px-6 py-4 text-sm outline-none focus:ring-4 ring-pink-500/10 shadow-sm transition-all">

            <svg class="w-5 h-5 absolute right-5 top-4 text-slate-300"
                 fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
                      stroke-width="2.5"
                      stroke-linecap="round">
                </path>
            </svg>
        </div>
    </div>

    <!-- Summary Stats -->
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-6 mb-12">
        <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm">
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1">
                หน่วยงานที่ตรวจแล้ว
            </p>
            <div id="statDepts" class="text-3xl font-black text-slate-800">-</div>
        </div>

        <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm">
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1">
                อุปกรณ์ทั้งหมดที่พบ
            </p>
            <div id="statAssets" class="text-3xl font-black text-pink-500">-</div>
        </div>

        <div class="bg-slate-800 p-6 rounded-[2rem] text-white shadow-xl shadow-slate-200">
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1">
                สถานะระบบ
            </p>
            <div class="text-sm font-bold text-emerald-400 flex items-center gap-2">
                <span class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></span>
                พร้อมเชื่อมต่อข้อมูล Master Sheet
            </div>
        </div>
    </div>

    <!-- Content Area (Logic เดิมทำงานที่นี่) -->
    <div id="contentArea" class="space-y-16">
        <div class="text-center py-32 text-slate-300 font-medium italic">
            กำลังรวบรวมข้อมูลจาก Master Sheets...
        </div>
    </div>

</div>

<!-- Modal (โครงสร้างเดิม ไม่แตะ logic) -->
<div id="detailModal" class="modal-overlay hidden">
    <div class="modal-content">
        <h3 class="text-2xl font-bold mb-6 text-slate-800">
            ชื่อหน่วยงาน
        </h3>

        <div id="modalContent">
            <!-- Logic showDetail() เติมข้อมูลตรงนี้ -->
        </div>

        <div class="mt-8 text-right">
            <button onclick="closeModal()"
                    class="px-6 py-3 bg-slate-800 text-white rounded-xl hover:opacity-90 transition">
                ปิดหน้าต่างนี้
            </button>
        </div>
    </div>
</div>

</body>
</html>
