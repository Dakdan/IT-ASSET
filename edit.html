<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Udon Hospital - Asset Survey V2</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        body { 
            font-family: 'Kanit', sans-serif; 
            background: linear-gradient(to bottom, #ffe4ec, #ffffff);
            min-height: 100vh; 
        }

        .loader-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: rgba(255,255,255,0.85);
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
    </style>
</head>

<body class="p-4">

<!-- ALERT -->
<div id="alert-modal" class="fixed inset-0 bg-black/50 hidden z-[9999] flex items-center justify-center">
    <div class="bg-white p-6 rounded-xl text-center">
        <p id="alert-message">-</p>
        <button id="alert-ok">ตกลง</button>
    </div>
</div>

<!-- LOADER (เหลืออันเดียว) -->
<div id="loader" class="loader-overlay">
    <div>Loading...</div>
</div>

<button onclick="openSearchModal()">เปิดค้นหา</button>

<!-- SEARCH -->
<div id="search-modal" class="hidden">
    <input id="query-input" oninput="runSearch()">
    <div id="search-results"></div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyo-lZoaJ4WMvAyt7dtQ5jgXjLgcLhIHTTKdtC_OVf6E9_efuhLnT1CaWD6GmsmVEjB/exec";

let allAssets = [];
let qrScanner = null;

function showLoader(s){
    document.getElementById('loader').style.display = s ? 'flex' : 'none';
}

function openSearchModal(){
    document.getElementById('search-modal').classList.remove('hidden');
}

function runSearch(){
    const q = document.getElementById('query-input').value.toLowerCase();
    const box = document.getElementById('search-results');

    const hits = allAssets.filter(a =>
        String(a.AssetID).toLowerCase().includes(q)
    );

    box.innerHTML = hits.map(a => `<div>${a.AssetID}</div>`).join('');
}

/* ✅ แก้ QR ให้ถูก */
async function toggleQR(){
    try {
        qrScanner = new Html5Qrcode("qr-reader");

        await qrScanner.start(
            { facingMode: "environment" },
            { fps: 10, qrbox: 250 },
            (txt) => {
                document.getElementById('query-input').value = txt;
                runSearch();
                stopQR();
            }
        );
    } catch (e){
        showAlert("เปิดกล้องไม่ได้");
    }
}

/* ✅ ต้องอยู่นอก function */
async function stopQR(){
    if(qrScanner){
        try { await qrScanner.stop(); } catch(e){}
        qrScanner = null;
    }
}

function showAlert(msg){
    const modal = document.getElementById('alert-modal');
    document.getElementById('alert-message').innerText = msg;

    modal.classList.remove('hidden');

    document.getElementById('alert-ok').onclick = ()=>{
        modal.classList.add('hidden');
    }
}
</script>

</body>
</html>
