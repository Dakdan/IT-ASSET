<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>IT Audit Dashboard - UDH</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;800;900&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Kanit',sans-serif;
    background:#f4f7fb;
    overflow-x:hidden;
}

.pink-gradient{
    background:linear-gradient(135deg,#ec4899 0%,#be185d 100%);
}

.main-card{
    background:white;
    border-radius:2rem;
    box-shadow:0 20px 40px -10px rgba(0,0,0,.08);
}

.sticky-header{
    position:sticky;
    top:64px;
    z-index:30;
    background:rgba(244,247,251,.85);
    backdrop-filter:blur(12px);
}

.spec-text{
    display:-webkit-box;
    -webkit-line-clamp:3;
    -webkit-box-orient:vertical;
    overflow:hidden;
}

.modal-enter{
    animation:modalUp .35s cubic-bezier(.16,1,.3,1);
}

@keyframes modalUp{
    from{opacity:0;transform:translateY(20px);}
    to{opacity:1;transform:translateY(0);}
}

/* responsive polish */
@media(max-width:768px){
    .sticky-header{ top:60px; }
}

button{ min-height:42px; }
img{ max-width:100%; height:auto; }
</style>
</head>

<body class="text-slate-700 pb-20">

<!-- NAV -->
<nav class="bg-white px-4 md:px-8 py-3 md:py-4
sticky top-0 z-50 shadow-sm border-b border-slate-100
flex flex-col md:flex-row md:items-center md:justify-between gap-4">

<div class="flex items-center gap-3">
    <div class="w-10 h-10 pink-gradient rounded-xl flex items-center justify-center shadow-lg">
        <img src="https://img2.pic.in.th/-227e4f6f84f29f020.png" class="w-7 h-7 brightness-110">
    </div>
    <div>
        <h1 class="text-base font-bold text-slate-800 leading-tight">IT ASSET AUDIT</h1>
        <p class="text-[9px] text-pink-500 font-bold uppercase tracking-widest">Udonthani Hospital</p>
    </div>
</div>

<div class="flex gap-2 bg-slate-100 p-1 rounded-xl w-full md:w-auto justify-center md:justify-end">
    <button class="px-6 py-2 bg-white rounded-lg text-pink-600 font-semibold shadow">หน้าหลัก</button>
    <button onclick="window.location.href='survey_v4_form.html'"
        class="px-6 py-2 text-slate-500 font-semibold">เพิ่มการตรวจสอบ</button>
</div>

</nav>

<!-- MAIN -->
<main class="w-full max-w-[1800px] mx-auto px-4 sm:px-6 lg:px-10 2xl:px-16 mt-6 md:mt-10">

<!-- Welcome Card -->
<div class="main-card p-6 md:p-10 mb-10 flex flex-col md:flex-row gap-8 items-start md:items-center relative overflow-hidden">
    <div class="relative z-10">
        <div class="w-12 h-12 bg-slate-100 rounded-2xl mb-4"></div>
        <div class="h-4 w-48 bg-slate-100 rounded-full mb-3"></div>
        <div class="h-8 w-32 bg-slate-100 rounded-full"></div>
    </div>
    <div class="absolute right-0 top-0 w-72 h-72 bg-pink-50 rounded-full -mr-20 -mt-20 opacity-50"></div>
</div>

<!-- Header + Search -->
<div class="mb-12 flex flex-col xl:flex-row xl:items-end justify-between gap-6">
    <div>
        <h2 class="text-2xl font-black text-slate-800 flex items-center gap-3">
            <span class="w-2 h-8 pink-gradient rounded-full"></span>
            หน่วยงานที่ตรวจสอบแล้ว
        </h2>
        <p id="lastUpdate" class="text-slate-400 text-sm ml-5 mt-1">
            สรุปจำนวนอุปกรณ์แยกตามประเภท
        </p>
    </div>

    <div class="relative w-full xl:w-96">
        <input id="searchInput" oninput="renderDashboard()"
        placeholder="ค้นหาหน่วยงาน หรือ อาคาร..."
        class="w-full bg-white border border-slate-200 rounded-2xl px-6 py-4 text-sm outline-none focus:ring-4 ring-pink-500/10 shadow-sm">
    </div>
</div>

<!-- Summary -->
<div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6 mb-14">
    <div class="bg-white p-6 rounded-3xl shadow border border-slate-100">
        <p class="text-xs text-slate-400 font-bold uppercase mb-1">หน่วยงานที่ตรวจแล้ว</p>
        <div id="statDepts" class="text-3xl font-black">-</div>
    </div>

    <div class="bg-white p-6 rounded-3xl shadow border border-slate-100">
        <p class="text-xs text-slate-400 font-bold uppercase mb-1">อุปกรณ์ทั้งหมด</p>
        <div id="statAssets" class="text-3xl font-black text-pink-500">-</div>
    </div>

    <div class="bg-slate-800 p-6 rounded-3xl text-white shadow-xl">
        <p class="text-xs text-slate-400 font-bold uppercase mb-1">สถานะระบบ</p>
        <div class="text-emerald-400 font-bold">● พร้อมเชื่อมต่อ Master Sheet</div>
    </div>
</div>

<!-- Dynamic Content -->
<div id="contentArea" class="space-y-16">
    <div class="text-center py-32 text-slate-300 italic">
        กำลังรวบรวมข้อมูลจาก Master Sheets...
    </div>
</div>

</main>

<!-- MODAL -->
<div id="modalDept" class="fixed inset-0 z-50 bg-black/60 backdrop-blur-sm hidden flex items-center justify-center p-4">

<div class="bg-white w-full max-w-full md:max-w-6xl
h-full md:h-auto rounded-none md:rounded-[3rem]
modal-enter flex flex-col max-h-full md:max-h-[92vh] shadow-2xl">

<!-- Header -->
<div class="p-6 md:p-8 border-b border-slate-100 bg-slate-50 flex justify-between">
    <h3 id="mDeptName" class="text-xl md:text-3xl font-black"></h3>
    <button onclick="closeModal()" class="text-slate-500 hover:text-pink-500">ปิด</button>
</div>

<!-- Body -->
<div id="mAssetGroupContainer"
class="p-6 md:p-8 overflow-y-auto flex-1 bg-slate-50/30 space-y-12">
</div>

</div>
</div>

<script>
/* === JS เดิมของคุณวางตรงนี้ได้เลย === */

</script>

</body>
</html>
