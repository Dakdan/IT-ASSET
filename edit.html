<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>IT Asset Survey UDH</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;800;900&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Kanit',sans-serif;
    background:#f4f7fb;
    overflow-x:hidden;
}

.pink-gradient{
    background:linear-gradient(135deg,#ec4899 0%,#be185d 100%);
}

.main-card{
    background:white;
    border-radius:2rem;
    box-shadow:0 20px 40px -10px rgba(0,0,0,.08);
}

.sticky-header{
    position:sticky;
    top:64px;
    z-index:30;
    background:rgba(244,247,251,.85);
    backdrop-filter:blur(12px);
}

.spec-text{
    display:-webkit-box;
    -webkit-line-clamp:3;
    -webkit-box-orient:vertical;
    overflow:hidden;
}

.modal-enter{
    animation:modalUp .35s cubic-bezier(.16,1,.3,1);
}

@keyframes modalUp{
    from{opacity:0;transform:translateY(20px);}
    to{opacity:1;transform:translateY(0);}
}

/* responsive polish */
@media(max-width:768px){
    .sticky-header{ top:60px; }
}

button{ min-height:42px; }
img{ max-width:100%; height:auto; }
</style>
</head>

<body class="text-slate-700 pb-20">

<!-- NAV -->
<nav class="bg-white px-4 md:px-8 py-3 md:py-4
sticky top-0 z-50 shadow-sm border-b border-slate-100
flex flex-col md:flex-row md:items-center md:justify-between gap-4">

<div class="flex items-center gap-3">
    <div class="w-10 h-10 pink-gradient rounded-xl flex items-center justify-center shadow-lg">
        <img src="https://img2.pic.in.th/-227e4f6f84f29f020.png" class="w-7 h-7 brightness-110">
    </div>
    <div>
        <h1 class="text-base font-bold text-slate-800 leading-tight">IT ASSET AUDIT</h1>
        <p class="text-[9px] text-pink-500 font-bold uppercase tracking-widest">Udonthani Hospital</p>
    </div>
</div>

<div class="flex gap-2 bg-slate-100 p-1 rounded-xl w-full md:w-auto justify-center md:justify-end">
    <button class="px-6 py-2 bg-white rounded-lg text-pink-600 font-semibold shadow">หน้าหลัก</button>
    <button onclick="window.location.href='survey_v4_form.html'"
        class="px-6 py-2 text-slate-500 font-semibold">เพิ่มการตรวจสอบ</button>
</div>

</nav>

<!-- MAIN -->
<main class="w-full max-w-[1800px] mx-auto px-4 sm:px-6 lg:px-10 2xl:px-16 mt-6 md:mt-10">

<!-- Welcome Card -->
<div class="main-card p-6 md:p-10 mb-10 flex flex-col md:flex-row gap-8 items-start md:items-center relative overflow-hidden">
    <div class="relative z-10">
        <div class="w-12 h-12 bg-slate-100 rounded-2xl mb-4"></div>
        <div class="h-4 w-48 bg-slate-100 rounded-full mb-3"></div>
        <div class="h-8 w-32 bg-slate-100 rounded-full"></div>
    </div>
    <div class="absolute right-0 top-0 w-72 h-72 bg-pink-50 rounded-full -mr-20 -mt-20 opacity-50"></div>
</div>

<!-- Header + Search -->
<div class="mb-12 flex flex-col xl:flex-row xl:items-end justify-between gap-6">
    <div>
        <h2 class="text-2xl font-black text-slate-800 flex items-center gap-3">
            <span class="w-2 h-8 pink-gradient rounded-full"></span>
            หน่วยงานที่ตรวจสอบแล้ว
        </h2>
        <p id="lastUpdate" class="text-slate-400 text-sm ml-5 mt-1">
            สรุปจำนวนอุปกรณ์แยกตามประเภท
        </p>
    </div>

    <div class="relative w-full xl:w-96">
        <input id="searchInput" oninput="renderDashboard()"
        placeholder="ค้นหาหน่วยงาน หรือ อาคาร..."
        class="w-full bg-white border border-slate-200 rounded-2xl px-6 py-4 text-sm outline-none focus:ring-4 ring-pink-500/10 shadow-sm">
    </div>
</div>

<!-- Summary -->
<div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6 mb-14">
    <div class="bg-white p-6 rounded-3xl shadow border border-slate-100">
        <p class="text-xs text-slate-400 font-bold uppercase mb-1">หน่วยงานที่ตรวจแล้ว</p>
        <div id="statDepts" class="text-3xl font-black">-</div>
    </div>

    <div class="bg-white p-6 rounded-3xl shadow border border-slate-100">
        <p class="text-xs text-slate-400 font-bold uppercase mb-1">อุปกรณ์ทั้งหมด</p>
        <div id="statAssets" class="text-3xl font-black text-pink-500">-</div>
    </div>

    <div class="bg-slate-800 p-6 rounded-3xl text-white shadow-xl">
        <p class="text-xs text-slate-400 font-bold uppercase mb-1">สถานะระบบ</p>
        <div class="text-emerald-400 font-bold">● พร้อมเชื่อมต่อ Master Sheet</div>
    </div>
</div>

<!-- Dynamic Content -->
<div id="contentArea" class="space-y-16">
    <div class="text-center py-32 text-slate-300 italic">
        กำลังรวบรวมข้อมูลจาก Master Sheets...
    </div>
</div>

</main>

<div id="modalDept"
     class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden items-center justify-center z-50">

    <div class="bg-white w-full max-w-6xl max-h-[90vh] rounded-3xl shadow-2xl flex flex-col overflow-hidden">

        <!-- Modal Header -->
        <div class="p-8 border-b border-slate-200 flex justify-between items-start">

            <div class="flex items-center gap-6">

                <!-- สำคัญ: ต้องมี id นี้ -->
                <div id="mDeptPic"
                     class="w-24 h-24 rounded-2xl overflow-hidden bg-slate-100 border border-slate-200">
                    <img src="" class="w-full h-full object-cover">
                </div>

                <div>
                    <h3 id="mDeptName" class="text-3xl font-black text-slate-800"></h3>
                    <div id="mDeptLoc" class="text-slate-500 mt-1 text-sm flex items-center gap-2"></div>
                </div>

            </div>

            <button onclick="closeModal()"
                    class="text-slate-400 hover:text-slate-700 text-xl font-bold">
                ✕
            </button>
        </div>

        <!-- Modal Body -->
        <div id="mAssetGroupContainer"
             class="p-8 overflow-y-auto flex-1 bg-slate-50">
        </div>

    </div>
</div>
<!-- Body -->
<div id="mAssetGroupContainer"
class="p-6 md:p-8 overflow-y-auto flex-1 bg-slate-50/30 space-y-12">
</div>

</div>
</div>

    <script>
        const APP_URL = "https://script.google.com/macros/s/AKfycbwb_1Yppy3h_hy4dX1RkN3-l_YKKlC3FWKewmzCHM-q6SHrlbxsm-U-SGMUj1mYXwkMuQ/exec";
        let state = { logs: [], depts: [], assetTypes: [] };

        async function init() {
            try {
                const ts = new Date().getTime();
                const [logRes, deptRes, initRes] = await Promise.all([
                    fetch(`${APP_URL}?action=getAuditLogs&_=${ts}`).then(r => r.json()),
                    fetch(`${APP_URL}?action=getDeptList&_=${ts}`).then(r => r.json()),
                    fetch(`${APP_URL}?action=getInitialData&_=${ts}`).then(r => r.json())
                ]);
                state.logs = logRes || [];
                state.depts = deptRes || [];
                state.assetTypes = initRes.assetTypes || [];
                document.getElementById('lastUpdate').innerText = `อัปเดตข้อมูลเมื่อ: ${new Date().toLocaleString('th-TH')}`;
                renderDashboard();
            } catch (err) {
                console.error(err);
                document.getElementById('contentArea').innerHTML = `<p class="text-center py-20 text-red-500 font-bold">ไม่สามารถเชื่อมต่อ Google Sheets ได้</p>`;
            }
        }

        function getTypeName(typeId) {
            const t = state.assetTypes.find(x => String(x.id).trim() === String(typeId).trim());
            return t ? t.name : 'อุปกรณ์อื่นๆ';
        }

        function renderDashboard() {
            const contentArea = document.getElementById('contentArea');
            const search = document.getElementById('searchInput').value.toLowerCase();

            const activeDeptIds = [...new Set(state.logs.map(l => String(l.DEPT_ID).trim()))];
            let filteredDepts = state.depts.filter(d => 
                activeDeptIds.includes(String(d.DEP_ID).trim()) &&
                (d.DEPNAME.toLowerCase().includes(search) || d.BUILDING.toLowerCase().includes(search))
            );

            document.getElementById('statDepts').innerText = filteredDepts.length;
            document.getElementById('statAssets').innerText = state.logs.length.toLocaleString();

            const groupedData = {};
            filteredDepts.forEach(d => {
                const b = d.BUILDING || "ไม่ระบุอาคาร";
                const f = `ชั้น ${d.FL || '?'}`;
                if (!groupedData[b]) groupedData[b] = {};
                if (!groupedData[b][f]) groupedData[b][f] = [];
                groupedData[b][f].push(d);
            });

            const buildings = Object.keys(groupedData).sort();
            if (buildings.length === 0) {
                contentArea.innerHTML = `<div class="text-center py-20 text-slate-400 italic">ไม่พบข้อมูลหน่วยงานที่ตรวจสอบ</div>`;
                return;
            }

            let html = "";
            buildings.forEach(building => {
                html += `
                <section>
                    <div class="sticky-header py-4 mb-8 border-b border-slate-200">
                        <h3 class="text-xl font-black text-slate-800 uppercase tracking-tight">${building}</h3>
                    </div>`;

                const floors = Object.keys(groupedData[building]).sort();
                floors.forEach(floor => {
                    html += `
                        <div class="mb-12">
                            <h4 class="text-xs font-black text-pink-500 uppercase tracking-[0.2em] mb-6 flex items-center gap-3 ml-2">
                                ${floor} <span class="flex-1 h-px bg-pink-100"></span>
                            </h4>
                            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                ${groupedData[building][floor].map(dept => {
                                    const deptLogs = state.logs.filter(l => String(l.DEPT_ID).trim() === String(dept.DEP_ID).trim());
                                    const typeCounts = {};
                                    deptLogs.forEach(l => {
                                        const tName = getTypeName(l.Asset_Type_ID);
                                        typeCounts[tName] = (typeCounts[tName] || 0) + 1;
                                    });
                                    const deptImg = dept.PIC_ID ? `https://lh3.googleusercontent.com/d/${dept.PIC_ID}` : `https://placehold.co/200x120/f1f5f9/94a3b8?text=${dept.DEPNAME.substring(0,1)}`;
                                    return `
                                    <div onclick="showDetail('${dept.DEP_ID}')" 
                                         class="bg-white rounded-[2.5rem] p-7 border border-slate-100 shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all cursor-pointer group">
                                        <div class="flex items-start gap-5 mb-6">
                                            <div class="w-20 h-20 rounded-3xl bg-slate-50 border border-slate-100 overflow-hidden flex-shrink-0 group-hover:scale-105 transition-transform shadow-inner">
                                                <img src="${deptImg}" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/100x100?text=${dept.DEPNAME.substring(0,1)}'">
                                            </div>
                                            <div class="min-w-0 flex-1 pt-1">
                                                <h5 class="text-base font-bold text-slate-800 leading-tight mb-1 group-hover:text-pink-600 transition-colors line-clamp-2">${dept.DEPNAME}</h5>
                                                <p class="text-[10px] text-slate-400 font-bold tracking-widest uppercase">${building} &bull; ${floor}</p>
                                            </div>
                                        </div>
                                        <div class="bg-slate-50/50 rounded-2xl p-4 mb-6 border border-slate-100/50">
                                            <div class="flex flex-wrap gap-y-2">
                                                ${Object.entries(typeCounts).map(([name, count]) => `
                                                    <div class="w-1/2 flex items-center justify-between pr-4 border-r border-slate-100 last:border-r-0">
                                                        <span class="text-[10px] text-slate-500 truncate mr-1">${name}</span>
                                                        <span class="text-[11px] font-bold text-slate-800">${count}</span>
                                                    </div>
                                                `).join('')}
                                            </div>
                                        </div>
                                        <div class="flex items-center justify-between bg-slate-800 rounded-3xl px-6 py-4">
                                            <div class="flex flex-col">
                                                <span class="text-[9px] text-slate-400 font-bold uppercase tracking-wider mb-0.5">รวมทั้งหมด</span>
                                                <span class="text-xl font-black text-white leading-none">${deptLogs.length} <small class="text-[11px] font-bold text-slate-400 ml-1">เครื่อง</small></span>
                                            </div>
                                            <div class="w-12 h-12 rounded-2xl bg-white/10 flex items-center justify-center text-white group-hover:bg-pink-500 transition-all">
                                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                                            </div>
                                        </div>
                                    </div>`;
                                }).join('')}
                            </div>
                        </div>`;
                });
                html += `</section>`;
            });
            contentArea.innerHTML = html;
        }

        function showDetail(deptId) {
            const dept = state.depts.find(d => String(d.DEP_ID).trim() === String(deptId).trim());
            const deptLogs = state.logs.filter(l => String(l.DEPT_ID).trim() === String(deptId).trim());

            document.getElementById('mDeptName').innerText = dept.DEPNAME;
            document.getElementById('mDeptLoc').innerHTML = `
                <svg class="w-4 h-4 text-pink-500" fill="currentColor" viewBox="0 0 20 20"><path d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z"></path></svg>
                ${dept.BUILDING} ชั้น ${dept.FL}
            `;

            const pic = document.getElementById('mDeptPic').querySelector('img');
            pic.src = dept.PIC_ID ? `https://lh3.googleusercontent.com/d/${dept.PIC_ID}` : `https://placehold.co/100x100?text=${dept.DEPNAME.substring(0,2)}`;

            const groupedAssets = {};
            deptLogs.forEach(a => {
                const typeName = getTypeName(a.Asset_Type_ID);
                if (!groupedAssets[typeName]) groupedAssets[typeName] = [];
                groupedAssets[typeName].push(a);
            });

            const container = document.getElementById('mAssetGroupContainer');

            container.innerHTML = Object.keys(groupedAssets).sort().map(cat => `
            <div class="mb-10">
                <div class="flex items-center gap-4 mb-6">
                    <span class="w-2 h-6 bg-gradient-to-b from-pink-500 to-pink-300 rounded-full"></span>
                    <h4 class="text-lg font-black text-slate-800 tracking-tight">${cat} <span class="text-pink-500 ml-1">(${groupedAssets[cat].length})</span></h4>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    ${groupedAssets[cat].map(a => `
                        <div class="flex flex-col sm:flex-row gap-6 p-6 bg-white rounded-[2.5rem] border border-slate-100 shadow-sm hover:shadow-xl transition-all group overflow-hidden relative">
                            <div class="w-full sm:w-32 h-32 bg-slate-50 rounded-3xl border border-slate-100 flex-shrink-0 overflow-hidden shadow-inner group-hover:scale-105 transition-transform duration-500">
                                <img src="${a.ASSET_IMG_DB ? 'https://lh3.googleusercontent.com/d/' + a.ASSET_IMG_DB : 'https://placehold.co/300x300/f1f5f9/94a3b8?text=NO+IMAGE'}" 
                                     class="w-full h-full object-cover" 
                                     onerror="this.src='https://placehold.co/300x300/f1f5f9/94a3b8?text=ERROR'">
                            </div>
        
                            <div class="flex-1 min-w-0 flex flex-col">
                                    <div class="flex items-center justify-between gap-2 mb-4">
                                        <div class="flex-1 bg-slate-800 text-white rounded-xl px-4 py-2 shadow-lg">
                                            <span class="block text-[8px] uppercase text-slate-400 font-black">รหัสครุภัณฑ์</span>
                                            <span class="text-sm font-black">${a.AssetID || '-'}</span>
                                        </div>
                                        <div class="bg-pink-500 text-white rounded-xl px-4 py-2 shadow-lg text-center min-w-[85px]">
                                            <span class="block text-[8px] uppercase text-pink-200 font-black">อายุการใช้งาน</span>
                                            <span class="text-[11px] font-black leading-none">${a.AgeInfo}</span>
                                        </div>
                                    </div>
                                    
                                    <h5 class="text-base font-black text-slate-800 mb-1 leading-tight line-clamp-2">
                                        ${a.specdetail}
                                    </h5>       
                                     
                                <div class="flex items-center gap-3 mb-4 text-[11px] font-bold">
                                    <span class="text-slate-400">S/N:</span>
                                    <span class="text-slate-600 bg-slate-100 px-2 py-0.5 rounded-lg">${a.Serial || 'N/A'}</span>
                                    <span class="text-slate-200">|</span>
                                    <span class="text-slate-400">NOID:</span>
                                    <span class="text-slate-500">${a.NOID || '-'}</span>
                                </div>
        
                                <div class="bg-slate-50/80 p-4 rounded-2xl border border-dashed border-slate-200 flex-1">
                                     <p class="spec-text text-slate-500 font-medium leading-relaxed text-[11px]">
                                        ${a.FullDescription}
                                     </p>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            </div>
        `).join('');

            document.getElementById('modalDept').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() { 
            document.getElementById('modalDept').classList.add('hidden'); 
            document.body.style.overflow = 'auto';
        }

        window.onclick = function(e) { if (e.target == document.getElementById('modalDept')) closeModal(); }
        window.onload = init;
    </script>

</body>
</html>
