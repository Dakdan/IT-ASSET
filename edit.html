<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT Asset Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#f8fafc; }
.sticky-header { position:sticky; top:0; background:#f8fafc; z-index:10; }
.hidden { display:none; }
</style>
</head>

<body class="min-h-screen">

<!-- HEADER -->
<header class="bg-white shadow-sm border-b border-slate-200">
    <div class="max-w-7xl mx-auto px-6 py-6">
        <h1 class="text-2xl font-black text-slate-800">IT Asset Dashboard</h1>
        <p id="lastUpdate" class="text-xs text-slate-400 mt-1"></p>
    </div>
</header>

<!-- SEARCH + STATS -->
<section class="max-w-7xl mx-auto px-6 py-8">
    <div class="flex flex-col md:flex-row gap-6 md:items-center md:justify-between mb-10">

        <input id="searchInput" oninput="renderDashboard()" 
            placeholder="ค้นหาหน่วยงาน / อาคาร..."
            class="w-full md:w-96 px-6 py-3 rounded-2xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-pink-400">

        <div class="flex gap-10">
            <div>
                <div class="text-3xl font-black text-slate-800" id="statDepts">0</div>
                <div class="text-xs text-slate-400 uppercase">หน่วยงาน</div>
            </div>
            <div>
                <div class="text-3xl font-black text-slate-800" id="statAssets">0</div>
                <div class="text-xs text-slate-400 uppercase">ครุภัณฑ์</div>
            </div>
        </div>
    </div>

    <div id="contentArea"></div>
</section>

<!-- MODAL DETAIL -->
<div id="modalDept" class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden z-50 flex items-center justify-center p-6">

    <div class="bg-slate-50 w-full max-w-6xl max-h-[90vh] overflow-y-auto rounded-[3rem] shadow-2xl relative p-10">

        <button onclick="closeModal()" 
            class="absolute top-6 right-6 bg-white rounded-full w-12 h-12 shadow-md flex items-center justify-center hover:bg-pink-500 hover:text-white transition">
            ✕
        </button>

        <!-- HEADER DETAIL -->
        <div class="flex items-center gap-6 mb-10">
            <div id="mDeptPic" class="w-24 h-24 rounded-3xl overflow-hidden border border-slate-200 shadow-inner bg-white">
                <img src="" class="w-full h-full object-cover">
            </div>
            <div>
                <h2 id="mDeptName" class="text-2xl font-black text-slate-800"></h2>
                <div id="mDeptLoc" class="flex items-center gap-2 text-slate-500 mt-2 text-sm"></div>
            </div>
        </div>

        <!-- ASSET GROUP -->
        <div id="mAssetGroupContainer"></div>

    </div>
</div>


<script>
const APP_URL = "https://script.google.com/macros/s/AKfycbwb_1Yppy3h_hy4dX1RkN3-l_YKKlC3FWKewmzCHM-q6SHrlbxsm-U-SGMUj1mYXwkMuQ/exec";
let state = { logs: [], depts: [], assetTypes: [] };

async function init() {
    try {
        const ts = new Date().getTime();
        const [logRes, deptRes, initRes] = await Promise.all([
            fetch(`${APP_URL}?action=getAuditLogs&_=${ts}`).then(r => r.json()),
            fetch(`${APP_URL}?action=getDeptList&_=${ts}`).then(r => r.json()),
            fetch(`${APP_URL}?action=getInitialData&_=${ts}`).then(r => r.json())
        ]);

        state.logs = logRes || [];
        state.depts = deptRes || [];
        state.assetTypes = initRes.assetTypes || [];

        document.getElementById('lastUpdate').innerText =
            `อัปเดตข้อมูลเมื่อ: ${new Date().toLocaleString('th-TH')}`;

        renderDashboard();

    } catch (err) {
        console.error(err);
        document.getElementById('contentArea').innerHTML =
            `<p class="text-center py-20 text-red-500 font-bold">ไม่สามารถเชื่อมต่อ Google Sheets ได้</p>`;
    }
}

function getTypeName(typeId) {
    const t = state.assetTypes.find(x =>
        String(x.id).trim() === String(typeId).trim());
    return t ? t.name : 'อุปกรณ์อื่นๆ';
}

function renderDashboard() {
    const contentArea = document.getElementById('contentArea');
    const search = document.getElementById('searchInput').value.toLowerCase();

    const activeDeptIds =
        [...new Set(state.logs.map(l => String(l.DEPT_ID).trim()))];

    let filteredDepts = state.depts.filter(d =>
        activeDeptIds.includes(String(d.DEP_ID).trim()) &&
        (d.DEPNAME.toLowerCase().includes(search) ||
         d.BUILDING.toLowerCase().includes(search))
    );

    document.getElementById('statDepts').innerText =
        filteredDepts.length;
    document.getElementById('statAssets').innerText =
        state.logs.length.toLocaleString();

    if (filteredDepts.length === 0) {
        contentArea.innerHTML =
            `<div class="text-center py-20 text-slate-400 italic">ไม่พบข้อมูล</div>`;
        return;
    }

    contentArea.innerHTML = filteredDepts.map(dept => `
        <div onclick="showDetail('${dept.DEP_ID}')"
            class="bg-white p-6 rounded-3xl shadow hover:shadow-xl transition cursor-pointer mb-6">
            <h3 class="text-lg font-bold text-slate-800">${dept.DEPNAME}</h3>
            <p class="text-xs text-slate-400">${dept.BUILDING} ชั้น ${dept.FL}</p>
        </div>
    `).join('');
}

function showDetail(deptId) {

    const dept =
        state.depts.find(d => String(d.DEP_ID).trim() === String(deptId).trim());
    const deptLogs =
        state.logs.filter(l => String(l.DEPT_ID).trim() === String(deptId).trim());

    document.getElementById('mDeptName').innerText = dept.DEPNAME;
    document.getElementById('mDeptLoc').innerHTML =
        `${dept.BUILDING} ชั้น ${dept.FL}`;

    const pic = document.getElementById('mDeptPic').querySelector('img');
    pic.src = dept.PIC_ID ?
        `https://lh3.googleusercontent.com/d/${dept.PIC_ID}` :
        `https://placehold.co/100x100?text=${dept.DEPNAME.substring(0,2)}`;

    const container =
        document.getElementById('mAssetGroupContainer');

    container.innerHTML = deptLogs.map(a => `
        <div class="bg-white p-6 rounded-3xl shadow mb-6">
            <div class="font-bold text-slate-800">${a.AssetID}</div>
            <div class="text-sm text-slate-500">${a.specdetail}</div>
            <div class="text-xs text-slate-400 mt-2">${a.FullDescription || ''}</div>
        </div>
    `).join('');

    document.getElementById('modalDept').classList.remove('hidden');
    document.body.style.overflow = 'hidden';
}

function closeModal() {
    document.getElementById('modalDept').classList.add('hidden');
    document.body.style.overflow = 'auto';
}

window.onclick = function(e) {
    if (e.target == document.getElementById('modalDept')) closeModal();
}

window.onload = init;
</script>

</body>
</html>
