<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Editor</title>
<link rel="stylesheet" href="css/style.css">

</head>
<body>

<div class="login-wrapper">

  <!-- HEADER -->
  <div class="login-header">
    <h1>บันทึกข้อมูล</h1>
    <p>Asset Survey</p>
  </div>

  <!-- CARD -->
  <div class="login-card">

    <!-- SEARCH -->
    <div class="form-group">
      <label>ค้นหา Asset</label>
      <input id="search" placeholder="พิมพ์ AssetID">
    </div>

    <button class="btn-login" onclick="search()">ค้นหา</button>

    <!-- RESULT -->
    <div id="results"></div>

    <!-- SELECTED -->
    <h3 style="margin-top:15px;">รายการที่เลือก</h3>
    <div id="selected"></div>

    <!-- SAVE -->
    <button class="btn-login" onclick="save()">บันทึก</button>

  </div>
</div>

<!-- LOADER -->
<div class="loader-overlay" id="loader">
  <div class="spinner"></div>
</div>

<!-- POPUP -->
<div class="popup-overlay" id="popup">
  <div class="popup-box" id="popupBox">
    <h3 id="popupTitle"></h3>
    <p id="popupMsg"></p>
    <button class="btn-login" onclick="closePopup()">ตกลง</button>
  </div>
</div>

<script src="js/api.js"></script>

<script>
let selected = [];

/* ===== SEARCH ===== */
async function search(){
  const q = document.getElementById("search").value;

  if(!q){
    showPopup("warning","แจ้งเตือน","กรุณากรอกคำค้นหา");
    return;
  }

  showLoader();

  try{
    const data = await API.searchAssets(q);

    document.getElementById("results").innerHTML = data.map(item => `
      <div class="form-group">
        <button class="btn-login" onclick='add(${JSON.stringify(item)})'>
          ${item.AssetID}
        </button>
      </div>
    `).join("");

  }catch(err){
    showPopup("error","Error","ค้นหาไม่สำเร็จ");
  }

  hideLoader();
}

/* ===== ADD ===== */
function add(item){
  if(selected.find(x => x.AssetID === item.AssetID)){
    showPopup("warning","ซ้ำ","มีรายการนี้แล้ว");
    return;
  }

  selected.push(item);
  render();
}

/* ===== RENDER ===== */
function render(){
  document.getElementById("selected").innerHTML =
    selected.map(x => `
      <div class="form-group">
        <input value="${x.AssetID}" disabled>
      </div>
    `).join("");
}

/* ===== SAVE ===== */
async function save(){
  if(selected.length === 0){
    showPopup("warning","แจ้งเตือน","ยังไม่มีรายการ");
    return;
  }

  showLoader();

  try{
    await API.saveSurvey({
      deptId: getDeptId(),
      assets: selected
    });

    selected = [];
    render();

    showPopup("success","สำเร็จ","บันทึกข้อมูลเรียบร้อย");

  }catch(err){
    showPopup("error","Error","บันทึกไม่สำเร็จ");
  }

  hideLoader();
}

/* ===== UTIL ===== */
function getDeptId(){
  const url = new URLSearchParams(window.location.search);
  return url.get("deptId");
}

/* ===== UI ===== */
function showLoader(){
  document.getElementById("loader").style.display = "flex";
}

function hideLoader(){
  document.getElementById("loader").style.display = "none";
}

function showPopup(type,title,msg){
  const popup = document.getElementById("popup");
  const box = document.getElementById("popupBox");

  box.className = "popup-box " + type;
  document.getElementById("popupTitle").innerText = title;
  document.getElementById("popupMsg").innerText = msg;

  popup.style.display = "flex";
}

function closePopup(){
  document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
