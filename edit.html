<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Survey Editor</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 p-4">

<h1 class="text-lg font-bold mb-4">บันทึกการสำรวจ</h1>

<input id="search" placeholder="ค้นหา Asset..." 
class="w-full p-3 border rounded mb-3">

<button onclick="searchAsset()" 
class="bg-blue-500 text-white px-4 py-2 rounded">
ค้นหา
</button>

<div id="result" class="mt-3"></div>

<hr class="my-4">

<h3 class="font-bold">รายการที่เลือก</h3>
<div id="selected"></div>

<button onclick="save()" 
class="mt-4 bg-green-500 text-white px-4 py-3 w-full rounded">
บันทึก
</button>

<script>
const API = "YOUR_WEBAPP_URL";

const state = {
  deptId: null,
  selected: []
};

window.onload = () => {
  const url = new URLSearchParams(location.search);
  state.deptId = url.get("deptId");
};

async function searchAsset(){
  const q = document.getElementById("search").value;

  const res = await fetch(`${API}?action=searchAssets&q=${q}`);
  const data = await res.json();

  const el = document.getElementById("result");

  el.innerHTML = data.map(a => `
    <div onclick='add(${JSON.stringify(a)})'
    class="p-2 border mb-1 cursor-pointer">
      ${a.AssetID}
    </div>
  `).join("");
}

function add(item){
  if(state.selected.find(x=>x.AssetID===item.AssetID)) return;
  state.selected.push(item);
  renderSelected();
}

function renderSelected(){
  const el = document.getElementById("selected");

  el.innerHTML = state.selected.map(a=>`
    <div class="p-2 bg-white border mb-1">
      ${a.AssetID}
    </div>
  `).join("");
}

async function save(){
  const payload = {
    action: "saveSurvey",
    deptId: state.deptId,
    assets: state.selected
  };

  const res = await fetch(API,{
    method:"POST",
    body: JSON.stringify(payload)
  });

  const result = await res.json();

  if(result.success){
    alert("บันทึกสำเร็จ");
    location.href = "viewer.html";
  }
}

</script>
</script>

</body>
</html>
