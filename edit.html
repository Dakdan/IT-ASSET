<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>IT Asset Survey UDH - Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    :root {
        --pink-soft: #fdf2f8;
        --pink-main: #ec4899;
        --pink-dark: #be185d;
    }

    body {
        font-family: 'Kanit', sans-serif;
        background-color: #fff9fb;
        background-image: radial-gradient(at 0% 0%, rgba(253, 242, 248, 1) 0, transparent 50%), 
                          radial-gradient(at 50% 0%, rgba(255, 255, 255, 1) 0, transparent 50%);
        min-height: 100vh;
        position: relative;
    }

    /* ลายน้ำพื้นหลัง */
    body::before {
        content: "IT UDON HOSP";
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) rotate(-30deg);
        font-size: 8rem;
        font-weight: 900;
        color: rgba(236, 72, 153, 0.03);
        white-space: nowrap;
        pointer-events: none;
        z-index: -1;
    }

    .pink-gradient {
        background: linear-gradient(135deg, #f472b6 0%, #db2777 100%);
    }

    .soft-card {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(252, 231, 243, 0.8);
        border-radius: 1.5rem;
        box-shadow: 0 10px 25px -5px rgba(236, 72, 153, 0.05);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .soft-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 20px 30px -10px rgba(236, 72, 153, 0.12);
        border-color: rgba(236, 72, 153, 0.3);
    }

    .sticky-header {
        position: sticky;
        top: 72px;
        z-index: 30;
        background: rgba(255, 249, 251, 0.85);
        backdrop-filter: blur(15px);
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #fff1f2; }
    ::-webkit-scrollbar-thumb { background: #fbcfe8; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #f472b6; }

    @media print {
        @page { size: landscape; margin: 1cm; }
        body { background: white !important; padding: 0 !important; }
        body::before { display: none; }
        .no-print { display: none !important; }
        .soft-card { break-inside: avoid; border: 1px solid #fce7f3 !important; box-shadow: none !important; transform: none !important; }
        .sticky-header { position: static !important; background: white !important; }
    }

    /* Animation สำหรับการโหลด */
    @keyframes pulse-soft {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.7; }
    }
    .animate-pulse-soft { animation: pulse-soft 2s infinite; }
</style>
</head>

<body class="text-slate-700 pb-10">

<!-- Navigation -->
<nav class="bg-white/80 backdrop-blur-md px-4 md:px-10 py-4 sticky top-0 z-50 border-b border-pink-50 flex items-center justify-between no-print">
    <div class="flex items-center gap-4">
        <div class="w-10 h-10 md:w-12 md:h-12 pink-gradient rounded-2xl flex items-center justify-center shadow-lg shadow-pink-200">
            <i class="fas fa-microchip text-white text-lg md:text-xl"></i>
        </div>
        <div>
            <h1 class="text-md md:text-lg font-extrabold text-slate-800 leading-none tracking-tight">IT ASSET <span class="text-pink-500">AUDIT</span></h1>
            <p class="text-[9px] md:text-[10px] text-pink-400 font-bold uppercase tracking-[0.2em] mt-1">Udonthani Hospital</p>
        </div>
    </div>

    <div class="flex gap-2">
        <button onclick="window.print()" class="hidden md:flex items-center gap-2 px-4 py-2 text-slate-500 hover:bg-slate-50 rounded-xl transition-all font-medium text-sm">
            <i class="fas fa-print"></i> พิมพ์
        </button>
        <button onclick="init()" class="w-10 h-10 flex items-center justify-center text-slate-400 hover:text-pink-500 bg-slate-50 rounded-xl transition-all">
            <i id="refreshIcon" class="fas fa-sync-alt text-sm"></i>
        </button>
    </div>
</nav>

<main class="max-w-[1600px] mx-auto px-4 md:px-8 mt-8">

    <!-- Hero Stats -->
    <div class="soft-card p-6 md:p-10 mb-8 overflow-hidden relative group">
        <div class="relative z-10 flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="text-center md:text-left">
                <span class="px-3 py-1 bg-pink-100 text-pink-600 rounded-full text-[10px] font-bold uppercase tracking-widest">Master Dashboard</span>
                <h2 class="text-2xl md:text-4xl font-black text-slate-800 mt-3 mb-2">สรุปผลการสำรวจ <span class="text-pink-500">UDH</span></h2>
                <p class="text-sm text-slate-500 font-medium">รวมข้อมูลพัสดุคอมพิวเตอร์ที่ได้รับการตรวจสอบแล้ว</p>
            </div>
            <div class="flex gap-3 w-full md:w-auto">
                <div class="flex-1 md:flex-none bg-white/60 p-4 rounded-2xl border border-white text-center min-w-[110px]">
                    <p id="statDepts" class="text-2xl md:text-3xl font-black text-slate-800">-</p>
                    <p class="text-[9px] font-bold text-slate-400 uppercase tracking-tighter">หน่วยงาน</p>
                </div>
                <div class="flex-1 md:flex-none pink-gradient p-4 rounded-2xl text-center min-w-[110px] shadow-lg shadow-pink-100">
                    <p id="statAssets" class="text-2xl md:text-3xl font-black text-white">-</p>
                    <p class="text-[9px] font-bold text-pink-100 uppercase tracking-tighter">พัสดุทั้งหมด</p>
                </div>
            </div>
        </div>
        <div class="absolute -right-10 -bottom-10 w-48 h-48 bg-pink-100/40 rounded-full blur-3xl"></div>
    </div>

    <!-- Toolbar -->
    <div class="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-4 no-print">
        <div class="flex items-center gap-3">
            <div class="w-1.5 h-6 pink-gradient rounded-full"></div>
            <div>
                <h3 class="text-lg font-bold text-slate-800">รายการหน่วยงาน</h3>
                <p id="lastUpdate" class="text-[10px] text-slate-400 font-medium italic">รอโหลดข้อมูล...</p>
            </div>
        </div>

        <div class="relative w-full md:w-[400px]">
            <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-pink-300 text-sm"></i>
            <input id="searchInput" oninput="renderDashboard()"
                placeholder="ค้นหาชื่อหน่วยงาน, อาคาร หรือชั้น..."
                class="w-full bg-white border border-pink-100 rounded-2xl pl-11 pr-5 py-3.5 text-sm shadow-sm outline-none focus:ring-4 focus:ring-pink-500/10 transition-all">
        </div>
    </div>

    <!-- Content Grid -->
    <div id="contentArea" class="min-h-[400px]">
        <div class="flex flex-col items-center justify-center py-32 space-y-4">
            <div class="w-10 h-10 border-4 border-pink-100 border-t-pink-500 rounded-full animate-spin"></div>
            <p class="text-slate-400 text-sm font-medium animate-pulse">กำลังซิงค์ข้อมูลจากคลาวด์...</p>
        </div>
    </div>
</main>

<!-- Detail Modal -->
<div id="modalDept" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md hidden items-center justify-center z-[60] p-3 md:p-6" onclick="closeModal()">
    <div class="bg-white w-full max-w-6xl max-h-[92vh] rounded-[2rem] shadow-2xl flex flex-col overflow-hidden" onclick="event.stopPropagation()">
        <div class="p-5 md:p-7 border-b border-pink-50 flex justify-between items-center bg-white sticky top-0 z-10">
            <div class="flex items-center gap-4">
                <div id="mDeptPic" class="w-14 h-14 md:w-16 md:h-16 rounded-xl overflow-hidden bg-pink-50 border border-pink-100 flex-shrink-0">
                    <img src="" class="w-full h-full object-cover">
                </div>
                <div>
                    <h3 id="mDeptName" class="text-lg md:text-xl font-black text-slate-800 line-clamp-1 uppercase"></h3>
                    <p id="mDeptLoc" class="text-[10px] md:text-xs text-slate-400 font-bold mt-1"></p>
                </div>
            </div>
            <button onclick="closeModal()" class="w-9 h-9 rounded-full bg-slate-100 text-slate-400 hover:bg-pink-500 hover:text-white transition-all flex items-center justify-center">
                <i class="fas fa-times text-sm"></i>
            </button>
        </div>
        
        <div id="mAssetGroupContainer" class="p-5 md:p-8 overflow-y-auto flex-1 bg-slate-50/30 space-y-8">
            <!-- Content Injected Here -->
        </div>
        
        <div class="p-4 bg-white border-t border-pink-50 flex justify-end no-print">
            <button onclick="closeModal()" class="px-6 py-2 text-xs font-bold text-slate-400 uppercase tracking-widest hover:text-pink-500 transition-colors">Close Viewer</button>
        </div>
    </div>
</div>

<script>
    const APP_URL = "https://script.google.com/macros/s/AKfycbwb_1Yppy3h_hy4dX1RkN3-l_YKKlC3FWKewmzCHM-q6SHrlbxsm-U-SGMUj1mYXwkMuQ/exec";
    let state = { logs: [], depts: [], assetTypes: [], priorities: [] };

    async function init() {
        const icon = document.getElementById('refreshIcon');
        icon?.classList.add('animate-spin');
        try {
            const ts = new Date().getTime();
            const [logRes, deptRes, initRes] = await Promise.all([
                fetch(`${APP_URL}?action=getAuditLogs&_=${ts}`).then(r => r.json()),
                fetch(`${APP_URL}?action=getDeptList&_=${ts}`).then(r => r.json()),
                fetch(`${APP_URL}?action=getInitialData&_=${ts}`).then(r => r.json())
            ]);
            state.logs = logRes || [];
            state.depts = deptRes || [];
            state.assetTypes = initRes.assetTypes || [];
            state.priorities = initRes.priorities || [];
            document.getElementById('lastUpdate').innerHTML = `<i class="far fa-clock mr-1"></i> ล่าสุด: ${new Date().toLocaleTimeString('th-TH')}`;
            renderDashboard();
        } catch (err) {
            document.getElementById('contentArea').innerHTML = `<div class="text-center py-20 text-red-400"><i class="fas fa-unlink text-3xl mb-3"></i><p>ไม่สามารถเชื่อมต่อข้อมูลได้</p></div>`;
        } finally {
            icon?.classList.remove('animate-spin');
        }
    }

    function getTypeName(typeId) {
        const t = state.assetTypes.find(x => String(x.id).trim() === String(typeId).trim());
        return t ? t.name : 'อื่นๆ';
    }

    function getPriority(id) {
        const p = state.priorities.find(x => String(x.id).trim() === String(id).trim());
        const config = {
            'PIO-001': { color: 'border-red-100 text-red-500 bg-red-50', icon: 'fa-fire' },
            'PIO-002': { color: 'border-blue-100 text-blue-500 bg-blue-50', icon: 'fa-star' },
            'PIO-003': { color: 'border-emerald-100 text-emerald-500 bg-emerald-50', icon: 'fa-check-circle' },
            'PIO-004': { color: 'border-amber-100 text-amber-500 bg-amber-50', icon: 'fa-clock' }
        };
        return {
            name: p ? p.name : 'ปกติ',
            ...(config[id] || { color: 'border-slate-100 text-slate-400 bg-slate-50', icon: 'fa-info-circle' })
        };
    }

    function renderDashboard() {
        const area = document.getElementById('contentArea');
        const search = document.getElementById('searchInput').value.toLowerCase();
        
        const activeIds = [...new Set(state.logs.map(l => String(l.DEPT_ID).trim()))];
        const filtered = state.depts.filter(d => 
            activeIds.includes(String(d.DEP_ID).trim()) &&
            (d.DEPNAME.toLowerCase().includes(search) || (d.BUILDING && d.BUILDING.toLowerCase().includes(search)))
        );

        document.getElementById('statDepts').innerText = filtered.length;
        document.getElementById('statAssets').innerText = state.logs.length.toLocaleString();

        const grouped = {};
        filtered.forEach(d => {
            const b = d.BUILDING || "อาคารอื่นๆ";
            if (!grouped[b]) grouped[b] = [];
            grouped[b].push(d);
        });

        let html = "";
        Object.keys(grouped).sort().forEach(building => {
            html += `
                <section class="mb-10">
                    <div class="sticky-header py-3 border-b-2 border-pink-100 mb-6 flex items-center gap-3">
                        <i class="fas fa-hospital text-pink-500 text-lg"></i>
                        <h3 class="text-lg font-black text-slate-800 uppercase tracking-tight">${building}</h3>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">
            `;
            
            grouped[building].forEach(dept => {
                const logs = state.logs.filter(l => String(l.DEPT_ID).trim() === String(dept.DEP_ID).trim());
                const img = dept.PIC_ID ? `https://lh3.googleusercontent.com/d/${dept.PIC_ID}` : `https://placehold.co/120x120/fff1f2/ec4899?text=${dept.DEPNAME.charAt(0)}`;
                
                // สรุปสถิติประเภทคร่าวๆ (3 อันดับแรก)
                const types = {};
                logs.forEach(l => { const t = getTypeName(l.Asset_Type_ID); types[t] = (types[t]||0)+1; });
                const typeSummary = Object.entries(types).sort((a,b)=>b[1]-a[1]).slice(0,2);

                html += `
                    <div onclick="showDetail('${dept.DEP_ID}')" class="soft-card p-5 cursor-pointer group flex flex-col h-full">
                        <div class="flex items-start gap-4 mb-4">
                            <div class="w-14 h-14 rounded-2xl bg-white border border-pink-50 overflow-hidden flex-shrink-0 group-hover:scale-110 transition-transform duration-500 shadow-sm">
                                <img src="${img}" class="w-full h-full object-cover">
                            </div>
                            <div class="flex-1 min-w-0">
                                <h4 class="text-[13px] font-bold text-slate-800 leading-tight group-hover:text-pink-600 transition-colors uppercase line-clamp-2">${dept.DEPNAME}</h4>
                                <p class="text-[10px] text-pink-400 font-bold uppercase tracking-wider mt-1">ชั้น ${dept.FL || '-'}</p>
                            </div>
                        </div>

                        <div class="flex-1 bg-pink-50/30 rounded-xl p-3 mb-4 space-y-1.5 border border-white">
                            ${typeSummary.map(([n, c]) => `
                                <div class="flex justify-between items-center text-[10px] font-bold">
                                    <span class="text-slate-500 truncate mr-2">${n}</span>
                                    <span class="text-pink-600">${c}</span>
                                </div>
                            `).join('')}
                        </div>

                        <div class="mt-auto flex items-end justify-between">
                            <div>
                                <p class="text-[8px] text-slate-400 font-bold uppercase tracking-tighter">Verified Items</p>
                                <p class="text-xl font-black text-slate-800">${logs.length}</p>
                            </div>
                            <div class="w-8 h-8 rounded-lg bg-slate-50 group-hover:bg-pink-500 group-hover:text-white flex items-center justify-center text-slate-300 transition-all">
                                <i class="fas fa-arrow-right text-xs"></i>
                            </div>
                        </div>
                    </div>
                `;
            });
            html += `</div></section>`;
        });
        area.innerHTML = html || `<div class="text-center py-20 text-slate-300 italic uppercase tracking-widest">No matching results</div>`;
    }

    function showDetail(deptId) {
        const dept = state.depts.find(d => String(d.DEP_ID).trim() === String(deptId).trim());
        const logs = state.logs.filter(l => String(l.DEPT_ID).trim() === String(deptId).trim());
        if(!dept) return;

        document.getElementById('mDeptName').innerText = dept.DEPNAME;
        document.getElementById('mDeptLoc').innerHTML = `<i class="fas fa-map-marker-alt text-pink-400 mr-1"></i> ${dept.BUILDING} • ชั้น ${dept.FL}`;
        document.getElementById('mDeptPic').querySelector('img').src = dept.PIC_ID ? `https://lh3.googleusercontent.com/d/${dept.PIC_ID}` : `https://placehold.co/120x120/fff1f2/ec4899?text=D`;

        const byType = {};
        logs.forEach(l => {
            const t = getTypeName(l.Asset_Type_ID);
            if(!byType[t]) byType[t] = [];
            byType[t].push(l);
        });

        const container = document.getElementById('mAssetGroupContainer');
        container.innerHTML = Object.keys(byType).sort().map(type => `
            <div>
                <div class="flex items-center gap-3 mb-4">
                    <span class="w-2 h-5 pink-gradient rounded-full"></span>
                    <h4 class="text-md font-black text-slate-800 uppercase tracking-tight">${type} <span class="text-pink-500 ml-1">(${byType[type].length})</span></h4>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    ${byType[type].map(a => {
                        const pri = getPriority(a.PIORITY_ID);
                        const aImg = a.ASSET_IMG_DB ? `https://lh3.googleusercontent.com/d/${a.ASSET_IMG_DB}` : 'https://placehold.co/400x400/f8fafc/cbd5e1?text=NO+IMAGE';
                        return `
                            <div class="soft-card bg-white p-4 flex gap-4 hover:border-pink-200">
                                <div class="w-24 h-24 rounded-xl border border-slate-100 flex-shrink-0 overflow-hidden bg-slate-50">
                                    <img src="${aImg}" class="w-full h-full object-cover">
                                </div>
                                <div class="flex-1 min-w-0 flex flex-col justify-between">
                                    <div>
                                        <div class="flex justify-between items-start mb-1">
                                            <span class="text-[9px] font-black bg-slate-800 text-white px-1.5 py-0.5 rounded">#${a.AssetID || 'N/A'}</span>
                                            <span class="text-[9px] font-bold px-1.5 py-0.5 rounded border ${pri.color}"><i class="fas ${pri.icon} mr-1"></i>${pri.name}</span>
                                        </div>
                                        <h5 class="text-[11px] font-bold text-slate-800 line-clamp-2 uppercase">${a.FullDescription}</h5>
                                    </div>
                                    <div class="mt-2 space-y-1">
                                        <p class="text-[10px] text-slate-400 font-medium">S/N: ${a.Serial || '-'}</p>
                                        <div class="flex flex-wrap gap-1">
                                            <span class="text-[8px] bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded font-bold uppercase">${a.AgeInfo || 'N/A'}</span>
                                            <span class="text-[8px] bg-pink-50 text-pink-500 px-1.5 py-0.5 rounded font-bold uppercase">${a.CoStatus || 'N/A'}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            </div>
        `).join('');

        document.getElementById('modalDept').classList.remove('hidden');
        document.getElementById('modalDept').classList.add('flex');
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        document.getElementById('modalDept').classList.add('hidden');
        document.getElementById('modalDept').classList.remove('flex');
        document.body.style.overflow = 'auto';
    }

    window.onload = init;
</script>
</body>
</html>
