<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT Audit Dashboard - UDH</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
body { font-family: 'Kanit', sans-serif; background:#f1f5f9; }
.pink-gradient { background: linear-gradient(135deg,#ec4899 0%,#be185d 100%); }
.spec-text { display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden; }
</style>
</head>

<body class="text-slate-700">

<nav class="bg-white shadow-sm border-b px-6 py-4 flex justify-between items-center">
    <div class="flex items-center gap-3">
        <div class="w-10 h-10 pink-gradient rounded-xl"></div>
        <div>
            <div class="font-bold text-slate-800">IT ASSET AUDIT</div>
            <div class="text-xs text-pink-500 font-bold">Udonthani Hospital</div>
        </div>
    </div>
</nav>

<main class="max-w-7xl mx-auto px-6 py-8">
    <div id="contentArea"></div>
</main>

<!-- Modal -->
<div id="modalDept" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-50 p-4">
    <div class="bg-white w-full max-w-7xl rounded-3xl shadow-2xl flex flex-col max-h-[95vh] overflow-hidden">

        <!-- Header -->
        <div class="p-8 border-b flex justify-between items-start bg-slate-50">
            <div class="flex items-center gap-6">
                <div id="mDeptPic" class="w-24 h-24 rounded-2xl overflow-hidden bg-slate-100">
                    <img src="" class="w-full h-full object-cover">
                </div>
                <div>
                    <h3 id="mDeptName" class="text-3xl font-black text-slate-800"></h3>
                    <div id="mDeptLoc" class="text-slate-500 mt-2"></div>
                </div>
            </div>
            <button onclick="closeModal()" class="text-slate-400 hover:text-pink-500 text-2xl font-bold">&times;</button>
        </div>

        <!-- Body -->
        <div id="mAssetGroupContainer" class="p-8 overflow-y-auto flex-1 bg-slate-50"></div>

        <!-- Footer -->
        <div class="p-6 border-t bg-white text-center">
            <button onclick="closeModal()" class="px-12 py-3 pink-gradient text-white rounded-xl font-bold">
                ปิดหน้าต่าง
            </button>
        </div>

    </div>
</div>

<script>
const APP_URL = "https://script.google.com/macros/s/AKfycbwb_1Yppy3h_hy4dX1RkN3-l_YKKlC3FWKewmzCHM-q6SHrlbxsm-U-SGMUj1mYXwkMuQ/exec";
let state = { logs: [], depts: [], assetTypes: [] };

async function init() {
    try {
        const ts = new Date().getTime();
        const [logRes, deptRes, initRes] = await Promise.all([
            fetch(`${APP_URL}?action=getAuditLogs&_=${ts}`).then(r => r.json()),
            fetch(`${APP_URL}?action=getDeptList&_=${ts}`).then(r => r.json()),
            fetch(`${APP_URL}?action=getInitialData&_=${ts}`).then(r => r.json())
        ]);
        state.logs = logRes || [];
        state.depts = deptRes || [];
        state.assetTypes = initRes.assetTypes || [];
        renderDashboard();
    } catch (err) {
        console.error(err);
    }
}

function getTypeName(typeId) {
    const t = state.assetTypes.find(x => String(x.id).trim() === String(typeId).trim());
    return t ? t.name : 'อุปกรณ์อื่นๆ';
}

function renderDashboard() {
    const contentArea = document.getElementById('contentArea');
    const activeDeptIds = [...new Set(state.logs.map(l => String(l.DEPT_ID).trim()))];
    let filteredDepts = state.depts.filter(d =>
        activeDeptIds.includes(String(d.DEP_ID).trim())
    );

    contentArea.innerHTML = filteredDepts.map(dept => `
        <div onclick="showDetail('${dept.DEP_ID}')"
            class="bg-white p-6 rounded-2xl shadow mb-4 cursor-pointer hover:shadow-lg transition">
            <div class="font-bold text-lg">${dept.DEPNAME}</div>
            <div class="text-sm text-slate-400">${dept.BUILDING} ชั้น ${dept.FL}</div>
        </div>
    `).join('');
}

function showDetail(deptId) {
    const dept = state.depts.find(d => String(d.DEP_ID).trim() === String(deptId).trim());
    const deptLogs = state.logs.filter(l => String(l.DEPT_ID).trim() === String(deptId).trim());

    document.getElementById('mDeptName').innerText = dept.DEPNAME;
    document.getElementById('mDeptLoc').innerHTML = `${dept.BUILDING} ชั้น ${dept.FL}`;

    const pic = document.getElementById('mDeptPic').querySelector('img');
    pic.src = dept.PIC_ID ? `https://lh3.googleusercontent.com/d/${dept.PIC_ID}` : `https://placehold.co/200x200`;

    const groupedAssets = {};
    deptLogs.forEach(a => {
        const typeName = getTypeName(a.Asset_Type_ID);
        if (!groupedAssets[typeName]) groupedAssets[typeName] = [];
        groupedAssets[typeName].push(a);
    });

    const container = document.getElementById('mAssetGroupContainer');

    container.innerHTML = Object.keys(groupedAssets).sort().map(cat => `
        <section class="mb-12">
            <div class="flex items-center gap-3 mb-6">
                <div class="w-1.5 h-8 bg-pink-500 rounded-full"></div>
                <h4 class="text-xl font-black text-slate-800">
                    ${cat}
                    <span class="text-pink-500 ml-2">(${groupedAssets[cat].length})</span>
                </h4>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                ${groupedAssets[cat].map(a => `
                    <div class="bg-white rounded-2xl shadow-sm border overflow-hidden flex flex-col hover:shadow-lg transition">

                        <div class="h-48 bg-slate-100">
                            <img src="${a.ASSET_IMG_DB ? 'https://lh3.googleusercontent.com/d/' + a.ASSET_IMG_DB : 'https://placehold.co/600x400'}"
                                 class="w-full h-full object-cover">
                        </div>

                        <div class="p-5 flex flex-col flex-1">

                            <div class="flex justify-between mb-3">
                                <div>
                                    <div class="text-xs text-slate-400 font-bold">รหัสครุภัณฑ์</div>
                                    <div class="font-black">${a.AssetID || '-'}</div>
                                </div>
                                <div class="text-right">
                                    <div class="text-xs text-slate-400 font-bold">อายุการใช้งาน</div>
                                    <div class="font-bold text-pink-600">${a.AgeInfo || '-'}</div>
                                </div>
                            </div>

                            <div class="font-semibold mb-2">${a.specdetail || ''}</div>

                            <div class="text-xs text-slate-500 mb-3">
                                S/N: ${a.Serial || 'N/A'} | NOID: ${a.NOID || '-'}
                            </div>

                            <div class="mt-auto text-xs text-slate-600 bg-slate-50 p-3 rounded-lg">
                                ${a.FullDescription || ''}
                            </div>

                        </div>
                    </div>
                `).join('')}
            </div>
        </section>
    `).join('');

    document.getElementById('modalDept').classList.remove('hidden');
    document.getElementById('modalDept').classList.add('flex');
    document.body.style.overflow = 'hidden';
}

function closeModal() {
    document.getElementById('modalDept').classList.add('hidden');
    document.body.style.overflow = 'auto';
}

window.onload = init;
</script>

</body>
</html>
