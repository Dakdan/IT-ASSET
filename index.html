<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบตรวจสอบครุภัณฑ์คอมพิวเตอร์ - โรงพยาบาลอุดรธานี</title>
    
    <link rel="icon" type="image/png" href="https://img2.pic.in.th/-227e4f6f84f29f020.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sarabun: ['Sarabun', 'sans-serif'] },
                    colors: {
                        hospital: { primary: '#e91e63', accent: '#db2777', light: '#fdf2f8' }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@100;300;400;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { 
            font-family: 'Sarabun', sans-serif; 
            background: linear-gradient(0deg, #f2f2f2 0%, #fdf2f8 50%, #ffffff 100%); 
            min-height: 100vh; 
            margin: 0; 
            background-attachment: fixed;
        }
        
        .header-pink-vibrant { 
            background: linear-gradient(180deg, #ad1457 0%, #d81b60 30%, #f472b6 100%); 
            border-bottom-left-radius: 28px;
            border-bottom-right-radius: 28px;
            box-shadow: 0 6px 25px rgba(173, 20, 87, 0.4);
            border-bottom: 5px solid #880e4f;
        }

        .header-title { color: #ffffff; text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3); }
        .header-subtitle { color: #ffe4e6; text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2); }

        .glass-card { 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px); 
            border: 2px solid #e91e63;
        }
        
        .sticky-search {
            position: sticky;
            top: 80px;
            z-index: 40;
            background: transparent;
            padding-bottom: 1rem;
        }

        .highlight-match { 
            color: #ffffff; 
            font-weight: 800; 
            background-color: #e91e63;
            padding: 0 4px;
            border-radius: 4px;
        }
        
        .scan-fab { 
            background: linear-gradient(135deg, #ff4081 0%, #e91e63 100%); 
            color: white; 
            width: 72px; 
            height: 72px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-radius: 50%; 
            box-shadow: 0 10px 25px rgba(233, 30, 99, 0.5);
            border: 4px solid #ffffff;
            position: absolute;
            top: -36px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .nav-container { position: fixed; bottom: 0; left: 0; right: 0; padding: 16px; display: flex; justify-content: center; z-index: 1000; }
        .nav-bar { 
            width: 100%; 
            max-width: 420px; 
            height: 72px; 
            border-radius: 32px; 
            position: relative; 
            background: rgba(15, 23, 42, 0.98); 
            border: 3px solid #334155;
            backdrop-filter: blur(15px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }
        
        .active-nav { color: #f472b6; filter: drop-shadow(0 0 8px rgba(244, 114, 182, 0.5)); }
        .inactive-nav { color: #94a3b8; }

        .dash-table th { 
            padding: 14px 8px; 
            font-size: 0.75rem; 
            font-weight: 900;
            text-transform: uppercase;
            border-bottom: 4px solid rgba(0,0,0,0.1);
        }
        
        .col-opd { background-color: #00ff88; color: #004d2c; } 
        .col-ipd { background-color: #00d4ff; color: #00404d; } 
        .col-backoffice { background-color: #ffaa00; color: #4d3300; } 
        .col-group { background-color: #ffffff; color: #475569; text-align: left !important; padding-left: 16px !important; }

        .dash-table td { 
            padding: 12px 8px; 
            font-size: 0.85rem; 
            font-weight: 700;
            border-bottom: 2px solid #f1f5f9; 
            border-right: 1px solid rgba(0,0,0,0.05);
            text-align: center; 
        }

        .asset-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid #f472b6;
            background: white;
        }

        .scan-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 11000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .scan-frame {
            width: 260px;
            height: 260px;
            border: 4px solid #f472b6;
            position: relative;
            border-radius: 24px;
            overflow: hidden;
        }
        .scan-line {
            width: 100%;
            height: 3px;
            background: #f472b6;
            position: absolute;
            top: 0;
            left: 0;
            box-shadow: 0 0 20px #f472b6;
            animation: scanAnim 2s infinite linear;
        }
        @keyframes scanAnim {
            0% { top: 0; }
            50% { top: 100%; }
            100% { top: 0; }
        }

        /* Modern Modal Action Buttons */
        .modal-action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 12px 8px;
            border-radius: 20px;
            transition: all 0.2s;
            flex: 1;
            height: 64px;
        }
        .modal-action-btn:active { transform: scale(0.95); }

        .modal-footer {
            background: white;
            padding: 16px 24px 32px 24px;
            border-top: 2px solid #f1f5f9;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.05);
        }

        @media (min-width: 1024px) {
            .asset-grid {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const Icon = ({ name, className = "", size = 24, onClick }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({
                        attrs: { class: className, style: `width: ${size}px; height: ${size}px;` },
                        nameAttr: 'data-lucide'
                    });
                }
            }, [name, className, size]);
            return <span ref={iconRef} className={`inline-flex items-center justify-center ${onClick ? 'cursor-pointer' : ''}`} onClick={onClick}></span>;
        };

        const App = () => {
            const [view, setView] = useState('dashboard');
            const [allAssets, setAllAssets] = useState([]);
            const [dashData, setDashData] = useState([]);
            const [loading, setLoading] = useState(true);
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedAsset, setSelectedAsset] = useState(null);
            const [modalOpen, setModalOpen] = useState(false);
            const [alertMsg, setAlertMsg] = useState('');
            const [isScanning, setIsScanning] = useState(false);
            
            const API_URL = "https://script.google.com/macros/s/AKfycbzhlc0yAeCjPvX6uwtXyFPxQWFk2llo-Yc7KWIsFkXGbl3EtAUjMZPY38TN4Hi2SoI/exec";

            useEffect(() => {
                fetchInitialData();
            }, []);

            const fetchInitialData = async () => {
                setLoading(true);
                try {
                    const [assetsResp, dashResp] = await Promise.all([
                        fetch(`${API_URL}?action=getAllAssets`),
                        fetch(`${API_URL}?action=getDashboard`)
                    ]);
                    const assets = await assetsResp.json();
                    const dash = await dashResp.json();
                    setAllAssets(Array.isArray(assets) ? assets : (assets.assets || []));
                    setDashData(dash || []);
                } catch (err) { console.error(err); } 
                finally { setLoading(false); }
            };

            const handleViewDetail = async (noid) => {
                setLoading(true);
                try {
                    const resp = await fetch(`${API_URL}?action=getAsset&noid=${noid}`);
                    const data = await resp.json();
                    if (data && data.success) {
                        setSelectedAsset(data);
                        setModalOpen(true);
                    }
                } catch (err) { console.error("Fetch error:", err); } 
                finally { setLoading(false); }
            };

            const showDevAlert = (msg = 'ระบบอยู่ในขั้นตอนพัฒนา จะสามารถใช้งานได้เร็วๆ นี้') => {
                setAlertMsg(msg);
                setTimeout(() => setAlertMsg(''), 3000);
            };

            const handleScanClick = () => {
                setIsScanning(true);
                setTimeout(() => {
                    setIsScanning(false);
                    showDevAlert('ไม่สามารถเข้าถึงกล้องได้ในขณะนี้ กรุณาตรวจสอบสิทธิ์การเข้าถึง');
                }, 3500);
            };

            const filteredAssets = useMemo(() => {
                const term = searchTerm.trim().toLowerCase();
                if (!term) return [];
                return allAssets.filter(asset => String(asset.AssetID || "").toLowerCase().includes(term)).slice(0, 50); 
            }, [searchTerm, allAssets]);

            const highlightText = (text, target) => {
                if (!target.trim()) return text;
                const fullText = String(text);
                const parts = fullText.split(new RegExp(`(${target})`, 'gi'));
                return parts.map((part, i) => 
                    part.toLowerCase() === target.toLowerCase() 
                    ? <span key={i} className="highlight-match">{part}</span> 
                    : part
                );
            };

            const DetailRow = ({ label, value, icon, highlight = false }) => (
                <div className={`py-3.5 border-b-2 border-slate-100 ${highlight ? 'bg-gradient-to-r from-pink-50 to-transparent px-4 rounded-2xl border-l-4 border-l-pink-500' : ''}`}>
                    <div className="flex items-center gap-2 mb-1">
                        {icon && <Icon name={icon} size={12} className="text-pink-400" />}
                        <p className="text-[10px] font-bold text-pink-400 uppercase tracking-widest">{label}</p>
                    </div>
                    <div className="pl-5">
                        <p className={`text-[13px] font-bold ${highlight ? 'text-hospital-primary' : 'text-slate-700'}`}>
                            {value || "-"}
                        </p>
                    </div>
                </div>
            );

            return (
                <div className="flex flex-col min-h-screen">
                    {loading && (
                        <div className="fixed inset-0 bg-white/80 backdrop-blur-md z-[9999] flex items-center justify-center">
                            <div className="flex flex-col items-center gap-4">
                                <div className="w-14 h-14 border-4 border-pink-100 border-t-pink-500 rounded-full animate-spin"></div>
                                <p className="text-pink-500 font-bold text-sm text-center">กำลังเชื่อมต่อฐานข้อมูล...</p>
                            </div>
                        </div>
                    )}

                    {isScanning && (
                        <div className="scan-overlay animate-in fade-in duration-300">
                            <div className="mb-10 text-center">
                                <Icon name="qr-code" size={48} className="text-pink-400 mb-4" />
                                <h2 className="text-xl font-black">สแกน QR Code ครุภัณฑ์</h2>
                            </div>
                            <div className="scan-frame">
                                <div className="scan-line"></div>
                                <div className="w-full h-full flex items-center justify-center bg-slate-800">
                                     <Icon name="camera" size={40} className="text-slate-600 animate-pulse" />
                                </div>
                            </div>
                            <button onClick={() => setIsScanning(false)} className="mt-12 bg-white/10 px-8 py-3 rounded-full font-bold text-sm border-2 border-white/20">ยกเลิก</button>
                        </div>
                    )}

                    <header className="header-pink-vibrant px-5 py-8 text-white sticky top-0 z-50">
                        <div className="max-w-6xl mx-auto flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <div className="w-14 h-14 bg-white rounded-2xl p-1.5 shadow-lg flex items-center justify-center border-2 border-white/50 overflow-hidden">
                                    <img src="https://img2.pic.in.th/-227e4f6f84f29f020.png" className="w-full h-full object-contain" />
                                </div>
                                <div className="overflow-hidden">
                                    <h1 className="text-lg font-black header-title truncate">ระบบตรวจสอบครุภัณฑ์คอมพิวเตอร์</h1>
                                    <p className="text-[10px] font-black uppercase header-subtitle truncate flex items-center gap-1">
                                        <Icon name="activity" size={10} /> กลุ่มงาน IT โรงพยาบาลอุดรธานี
                                    </p>
                                </div>
                            </div>
                            <button onClick={fetchInitialData} className="w-10 h-10 bg-white/20 hover:bg-white/30 rounded-xl flex items-center justify-center border-2 border-white/40">
                                <Icon name="rotate-cw" size={20} className="text-white" />
                            </button>
                        </div>
                    </header>

                    <main className="flex-1 px-4 pt-8 pb-32 max-w-6xl mx-auto w-full">
                        {view === 'dashboard' ? (
                            <div className="space-y-8 animate-in fade-in duration-500">
                                <div className="flex items-center justify-between px-1">
                                    <h2 className="text-2xl font-black text-slate-800">สถิติภาพรวม</h2>
                                    <div className="bg-slate-800 text-pink-400 px-5 py-2 rounded-full text-[10px] font-black uppercase tracking-widest border-2 border-pink-500">Overview</div>
                                </div>

                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                                    {[
                                        { label: "ครุภัณฑ์ทั้งหมด", val: allAssets.length.toLocaleString(), unit: "รายการ", icon: "monitor", border: "border-blue-500", bg: "bg-blue-50", text: "text-blue-600" },
                                        { label: "ความพร้อมใช้", val: "100", unit: "%", icon: "zap", border: "border-pink-500", bg: "bg-pink-50", text: "text-pink-600" },
                                        { label: "สถานะระบบ", val: "ปกติ", unit: "", icon: "shield-check", border: "border-green-500", bg: "bg-green-50", text: "text-green-600" }
                                    ].map((stat, i) => (
                                        <div key={i} className={`bg-white p-6 rounded-[32px] shadow-sm flex items-center gap-5 border-2 ${stat.border}`}>
                                            <div className={`w-14 h-14 ${stat.bg} ${stat.text} rounded-[22px] flex items-center justify-center flex-shrink-0`}>
                                                <Icon name={stat.icon} size={28} />
                                            </div>
                                            <div>
                                                <p className="text-[10px] font-black text-slate-400 uppercase mb-0.5">{stat.label}</p>
                                                <p className="text-2xl font-black text-slate-800">{stat.val} <span className="text-sm font-bold text-slate-300 ml-1">{stat.unit}</span></p>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <div className="bg-white rounded-[36px] shadow-xl border-4 border-slate-800 overflow-hidden">
                                    <div className="p-5 bg-slate-800 flex items-center justify-between text-white">
                                        <span className="text-[11px] font-black uppercase tracking-widest">จำแนกตามประเภทและกลุ่มงาน</span>
                                    </div>
                                    <div className="overflow-x-auto">
                                        <table className="dash-table w-full border-collapse">
                                            <thead>
                                                <tr>
                                                    <th className="col-group border-r-4 border-slate-100">กลุ่มลำดับ</th>
                                                    <th className="col-opd">OPD</th>
                                                    <th className="col-ipd">IPD</th>
                                                    <th className="col-backoffice">Back Office</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {dashData.map((row, idx) => (
                                                    <tr key={idx} className={row.PIORITY_NAME === 'รวม' ? 'bg-slate-100 font-black' : ''}>
                                                        <td className="col-group font-bold border-r-4 border-slate-100">{row.PIORITY_NAME}</td>
                                                        <td className="bg-[#00ff88]/10">{row.OPD}</td>
                                                        <td className="bg-[#00d4ff]/10">{row.IPD}</td>
                                                        <td className="bg-[#ffaa00]/10">{row['Back Office']}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-6 animate-in slide-in-from-right duration-300">
                                <div className="sticky-search">
                                    <div className="relative glass-card rounded-[28px] shadow-2xl overflow-hidden border-4 border-pink-500">
                                        <span className="absolute left-6 top-1/2 -translate-y-1/2 text-pink-500"><Icon name="search" size={24} /></span>
                                        <input 
                                            autoFocus type="text" 
                                            className="w-full py-7 pl-16 pr-14 outline-none font-bold text-slate-800 bg-transparent text-lg"
                                            placeholder="กรอกเลขรหัสครุภัณฑ์..."
                                            value={searchTerm}
                                            onChange={(e) => setSearchTerm(e.target.value)}
                                        />
                                    </div>
                                </div>
                                <div className="asset-grid pb-16">
                                    {filteredAssets.map((asset, idx) => (
                                        <div key={idx} onClick={() => handleViewDetail(asset.NOID)} className="asset-card p-6 rounded-[32px] flex items-center justify-between cursor-pointer shadow-sm border-2 border-pink-300">
                                            <div className="flex-1 pr-4">
                                                <p className="text-[12px] font-black text-pink-500 mb-1">{highlightText(asset.AssetID, searchTerm)}</p>
                                                <p className="text-[15px] font-black text-slate-800">{asset.itemName}</p>
                                            </div>
                                            <Icon name="arrow-right" className="text-pink-500" />
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    <div className="nav-container">
                        <nav className="nav-bar flex items-center justify-around px-8 relative">
                            <button onClick={() => setView('dashboard')} className={`flex flex-col items-center gap-1.5 ${view === 'dashboard' ? 'active-nav' : 'inactive-nav'}`}>
                                <Icon name="layout-grid" size={24} /><span className="text-[9px] font-black uppercase">Summary</span>
                            </button>
                            <div className="scan-fab border-4 border-white" onClick={handleScanClick}><Icon name="scan" size={32} /></div>
                            <button onClick={() => setView('search')} className={`flex flex-col items-center gap-1.5 ${view === 'search' ? 'active-nav' : 'inactive-nav'}`}>
                                <Icon name="search-check" size={24} /><span className="text-[9px] font-black uppercase">Verify</span>
                            </button>
                        </nav>
                    </div>

                    {modalOpen && selectedAsset && (
                        <div className="fixed inset-0 z-[10000] bg-slate-900/80 backdrop-blur-md flex items-end sm:items-center justify-center p-0 sm:p-4 animate-in fade-in duration-200">
                            <div className="bg-white w-full max-w-xl rounded-t-[48px] sm:rounded-[48px] overflow-hidden flex flex-col max-h-[96vh] shadow-2xl border-t-8 border-pink-500 animate-in slide-in-from-bottom duration-300">
                                
                                <div className="p-8 pb-4 flex items-center gap-4 flex-shrink-0">
                                    <div className="w-2.5 h-10 bg-pink-500 rounded-full shadow-[0_0_10px_rgba(233,30,99,0.3)]"></div>
                                    <div>
                                        <h3 className="text-xl font-black text-slate-800">รายละเอียดครุภัณฑ์</h3>
                                        <p className="text-[10px] text-pink-400 font-black uppercase tracking-widest">Specification & History</p>
                                    </div>
                                </div>
                                
                                <div className="p-8 pt-4 overflow-y-auto space-y-6 flex-1">
                                    <div className="aspect-[16/10] bg-slate-100 rounded-[40px] overflow-hidden border-4 border-pink-100 flex items-center justify-center">
                                        {selectedAsset.imgUrl ? <img src={selectedAsset.imgUrl} className="w-full h-full object-cover" /> : <Icon name="image-off" size={60} className="text-slate-300" />}
                                    </div>

                                    <div className="space-y-1 bg-slate-50/50 p-2 rounded-[40px] border-2 border-slate-100">
                                        <DetailRow label="เลขรหัสครุภัณฑ์" value={selectedAsset.AssetID} icon="key" highlight={true} />
                                        <DetailRow label="ชื่อรายการอุปกรณ์" value={selectedAsset.itemName} icon="cpu" highlight={true} />
                                        <DetailRow label="ยี่ห้อ/รุ่น/สเปค" value={selectedAsset.spec} icon="info" />
                                        <DetailRow label="วันที่รับเข้า" value={selectedAsset.receiveDate} icon="calendar" />
                                        <DetailRow label="แหล่งเงิน" value={selectedAsset.budgetSource} icon="wallet" />
                                        <DetailRow label="ราคา" value={`${selectedAsset.price ? Number(selectedAsset.price).toLocaleString() : "-"} บาท`} icon="banknote" />
                                        <DetailRow label="สถานะครุภัณฑ์" value={selectedAsset.coStatus} icon="activity" />
                                        <DetailRow label="การรับประกัน" value={selectedAsset.maStatus} icon="shield" />
                                        <DetailRow label="สถานที่ติดตั้ง" value={selectedAsset.location} icon="map-pin" />
                                        <DetailRow label="อายุการใช้งาน" value={`${selectedAsset.age} ปี`} icon="history" />
                                        
                                        {selectedAsset.logData && (
                                            <div className="mt-5 p-6 bg-white rounded-[32px] border-4 border-pink-400 shadow-sm">
                                                <div className="flex items-center gap-2 mb-4">
                                                    <Icon name="activity" size={20} className="text-pink-500" />
                                                    <p className="text-[12px] font-black text-pink-500 uppercase">สถานะปัจจุบัน (Log)</p>
                                                </div>
                                                <div className="space-y-4">
                                                    <div>
                                                        <p className="text-[10px] font-black text-slate-400 uppercase mb-1">วัตถุประสงค์</p>
                                                        <p className="text-sm font-black text-slate-800 leading-relaxed">{selectedAsset.logData.g}</p>
                                                    </div>
                                                    <div>
                                                        <p className="text-[10px] font-black text-slate-400 uppercase mb-1">ผู้รับผิดชอบ</p>
                                                        <p className="text-sm font-black text-slate-800">{selectedAsset.logData.i}</p>
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>

                                {/* Modern Sticky Bottom Footer with 3 Action Buttons */}
                                <div className="modal-footer flex-shrink-0">
                                    <div className="flex gap-3">
                                        <button 
                                            onClick={() => setModalOpen(false)} 
                                            className="modal-action-btn bg-slate-100 hover:bg-slate-200 text-slate-600 border border-slate-200"
                                        >
                                            <Icon name="x-circle" size={24} className="text-slate-400" />
                                            <span className="text-[10px] font-black uppercase">ปิดหน้าจอ</span>
                                        </button>
                                        
                                        <button 
                                            onClick={() => showDevAlert('กำลังเตรียมไฟล์สำหรับพิมพ์สติกเกอร์...')} 
                                            className="modal-action-btn bg-white hover:bg-pink-50 text-hospital-primary border-2 border-pink-500"
                                        >
                                            <Icon name="printer" size={24} className="text-pink-500" />
                                            <span className="text-[10px] font-black uppercase">พิมพ์/สแกน</span>
                                        </button>

                                        <button 
                                            onClick={() => showDevAlert('กำลังเปิดโหมดแก้ไขข้อมูล...')} 
                                            className="modal-action-btn bg-slate-800 hover:bg-slate-700 text-white shadow-lg"
                                        >
                                            <Icon name="edit-3" size={24} className="text-pink-400" />
                                            <span className="text-[10px] font-black uppercase">แก้ไขข้อมูล</span>
                                        </button>
                                    </div>
                                </div>

                            </div>
                        </div>
                    )}

                    {alertMsg && (
                        <div className="fixed top-32 left-1/2 -translate-x-1/2 z-[10001] bg-slate-900 text-white px-8 py-4 rounded-2xl shadow-2xl text-[13px] font-black flex items-center gap-3 border-b-4 border-pink-500 animate-in zoom-in duration-200">
                            <Icon name="bell" size={14} className="text-pink-500" />
                            {alertMsg}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
