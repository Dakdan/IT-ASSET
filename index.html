<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบตรวจสอบครุภัณฑ์คอมพิวเตอร์ - โรงพยาบาลอุดรธานี</title>
    
    <link rel="icon" type="image/png" href="https://img2.pic.in.th/-227e4f6f84f29f020.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sarabun: ['Sarabun', 'sans-serif'] },
                    colors: {
                        hospital: { primary: '#e91e63', accent: '#db2777', light: '#fdf2f8' }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@100;300;400;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { 
            font-family: 'Sarabun', sans-serif; 
            background: #f1f5f9; 
            min-height: 100vh; 
            margin: 0; 
            display: flex;
            justify-content: center;
        }
        
        .main-app-container {
            width: 100%;
            max-width: 500px;
            background: #ffffff; 
            min-height: 100vh;
            box-shadow: 0 0 40px rgba(0,0,0,0.1);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .header-pink-vibrant {
            background: linear-gradient(135deg, #f06292 0%, #e91e63 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(233, 30, 99, 0.2);
        }

        .nav-container { 
            position: fixed; 
            bottom: 0; 
            width: 100%;
            max-width: 500px;
            padding: 16px; 
            z-index: 2000; 
            display: flex; 
            justify-content: center;
            pointer-events: none;
        }

        .nav-bar {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            width: 100%;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 10px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            pointer-events: auto;
        }

        .scan-fab { 
            background: linear-gradient(135deg, #ff4081 0%, #e91e63 100%); 
            width: 60px; 
            height: 60px; 
            border-radius: 50%; 
            border: 4px solid #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: -40px;
            box-shadow: 0 8px 20px rgba(233, 30, 99, 0.4);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .scan-fab:active { transform: scale(0.9); }

        .dash-table { width: 100%; border-collapse: separate; border-spacing: 0; }
        .dash-table th { background: #f8fafc; padding: 12px 8px; font-size: 11px; text-transform: uppercase; border-bottom: 2px solid #e2e8f0; }
        .dash-table td { padding: 12px 8px; font-size: 13px; border-bottom: 1px solid #f1f5f9; text-align: center; font-weight: bold; }

        .modal-content-scroll {
            max-height: calc(90vh - 160px);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .sticky-search-container {
            padding: 12px 16px;
            background: white;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .glass-search-card {
            background: #f8fafc;
            border-radius: 18px;
            border: 2px solid #f1f5f9;
        }

        .search-highlight {
            background-color: #ff007f;
            color: #ffffff;
            padding: 2px 4px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const Icon = ({ name, className = "", size = 24, onClick }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({
                        attrs: { class: className, style: `width: ${size}px; height: ${size}px;` },
                        nameAttr: 'data-lucide'
                    });
                }
            }, [name, className, size]);
            return <span ref={iconRef} className={`inline-flex items-center ${onClick ? 'cursor-pointer' : ''}`} onClick={onClick}></span>;
        };

        const App = () => {
            const [view, setView] = useState('dashboard');
            const [allAssets, setAllAssets] = useState([]);
            const [dashData, setDashData] = useState([]);
            const [loading, setLoading] = useState(true);
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedAsset, setSelectedAsset] = useState(null);
            const [modalOpen, setModalOpen] = useState(false);
            const [scannerOpen, setScannerOpen] = useState(false);
            const [alertMsg, setAlertMsg] = useState('');
            const [showSearch, setShowSearch] = useState(false);
            
            const API_URL = "https://script.google.com/macros/s/AKfycbzhlc0yAeCjPvX6uwtXyFPxQWFk2llo-Yc7KWIsFkXGbl3EtAUjMZPY38TN4Hi2SoI/exec";
            const scannerRef = useRef(null);

            const fetchInitialData = async () => {
                setLoading(true);
                try {
                    const [assetsResp, dashResp] = await Promise.all([
                        fetch(`${API_URL}?action=getAllAssets`),
                        fetch(`${API_URL}?action=getDashboard`)
                    ]);
                    const assetsJson = await assetsResp.json();
                    const dash = await dashResp.json();
                    setAllAssets(assetsJson.assets || []);
                    setDashData(dash || []);
                } catch (err) { 
                    setAlertMsg('ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้');
                } finally { 
                    setLoading(false); 
                }
            };

            useEffect(() => { fetchInitialData(); }, []);

            const filteredAssets = useMemo(() => {
                const term = searchTerm.trim().toLowerCase();
                if (!term) return [];
                return allAssets.filter(asset => 
                    String(asset.AssetID || "").toLowerCase().endsWith(term) ||
                    String(asset.itemName || "").toLowerCase().includes(term)
                ).slice(0, 30); 
            }, [searchTerm, allAssets]);

            const verifiedCount = useMemo(() => {
                return allAssets.filter(a => a.note4 == 1 || a.note4 == "1").length;
            }, [allAssets]);

            const handleViewDetail = async (noid) => {
                setLoading(true);
                try {
                    const resp = await fetch(`${API_URL}?action=getAsset&noid=${noid}`);
                    const data = await resp.json();
                    if (data && data.success) {
                        setSelectedAsset(data);
                        setModalOpen(true);
                    } else {
                        setAlertMsg('ไม่พบข้อมูลครุภัณฑ์นี้');
                    }
                } catch (err) { console.error(err); } 
                finally { setLoading(false); }
            };

            const stopScanner = async () => {
                if (scannerRef.current) {
                    try { await scannerRef.current.stop(); scannerRef.current = null; } catch (e) {}
                }
                setScannerOpen(false);
            };

            const startScanner = () => {
                setScannerOpen(true);
                setTimeout(async () => {
                    try {
                        const html5QrCode = new Html5Qrcode("reader");
                        scannerRef.current = html5QrCode;
                        await html5QrCode.start(
                            { facingMode: "environment" },
                            { fps: 15, qrbox: { width: 250, height: 250 } },
                            (decodedText) => {
                                let rawId = decodedText.trim();
                                stopScanner();
                                handleViewDetail(rawId.split('/').pop());
                            }
                        );
                    } catch (err) {
                        setAlertMsg('กรุณาอนุญาตการเข้าถึงกล้อง');
                        setScannerOpen(false);
                    }
                }, 300);
            };

            const getHighlightedText = (text, highlight) => {
                if (!highlight.trim()) return text;
                const parts = String(text).split(new RegExp(`(${highlight})`, 'gi'));
                return (
                    <span>
                        {parts.map((part, i) => 
                            part.toLowerCase() === highlight.toLowerCase() 
                            ? <span key={i} className="search-highlight">{part}</span> 
                            : part
                        )}
                    </span>
                );
            };

            return (
                <div className="main-app-container overflow-x-hidden relative">
                    {loading && (
                        <div className="absolute inset-0 bg-white/70 backdrop-blur-sm z-[9999] flex items-center justify-center">
                            <div className="text-pink-500 flex flex-col items-center gap-2">
                                <div className="w-10 h-10 border-4 border-pink-200 border-t-pink-600 rounded-full animate-spin"></div>
                                <span className="font-bold text-sm">กำลังโหลด...</span>
                            </div>
                        </div>
                    )}

                    <header className="header-pink-vibrant p-5 flex-shrink-0">
                        <div className="flex items-center gap-3">
                            <div className="w-12 h-12 bg-white rounded-xl p-1 shadow-md">
                                <img src="https://img2.pic.in.th/-227e4f6f84f29f020.png" className="w-full h-full object-contain" />
                            </div>
                            <div className="flex-1">
                                <h1 className="text-lg font-black leading-tight">ระบบตรวจสอบครุภัณฑ์</h1>
                                <p className="text-[10px] text-pink-100 font-bold">โรงพยาบาลอุดรธานี</p>
                            </div>
                            <button onClick={fetchInitialData} className="w-9 h-9 bg-white/20 rounded-xl flex items-center justify-center active:scale-90 transition-transform">
                                <Icon name="rotate-cw" size={20} />
                            </button>
                        </div>
                    </header>

                    {showSearch && (
                        <div className="sticky-search-container">
                            <div className="glass-search-card flex items-center px-4 py-3 gap-3">
                                <Icon name="search" size={20} className="text-pink-500" />
                                <input 
                                    type="text" 
                                    className="flex-1 bg-transparent outline-none font-bold text-slate-700"
                                    placeholder="ค้นหารหัส หรือ ชื่อครุภัณฑ์..."
                                    value={searchTerm}
                                    onChange={(e) => {
                                        setSearchTerm(e.target.value);
                                        if(view !== 'search') setView('search');
                                    }}
                                />
                                <Icon name="x" size={18} className="text-slate-400" onClick={() => { setShowSearch(false); setView('dashboard'); setSearchTerm(''); }} />
                            </div>
                        </div>
                    )}

                    <main className="flex-1 px-4 py-6 pb-24">
                        {view === 'dashboard' ? (
                            <div className="space-y-6">
                                <div className="grid grid-cols-2 gap-3">
                                    <div className="bg-pink-50 p-4 rounded-3xl border border-pink-100">
                                        <p className="text-[10px] font-black text-pink-400 uppercase">ทั้งหมด</p>
                                        <p className="text-2xl font-black text-slate-800">{allAssets.length}</p>
                                    </div>
                                    <div className="bg-emerald-50 p-4 rounded-3xl border border-emerald-100">
                                        <p className="text-[10px] font-black text-emerald-400 uppercase">ตรวจสอบแล้ว</p>
                                        <p className="text-2xl font-black text-slate-800">{verifiedCount}</p>
                                    </div>
                                </div>
                                <div className="bg-white rounded-3xl border-2 border-slate-50 shadow-sm overflow-hidden">
                                    <div className="p-3 bg-slate-800 text-white text-[10px] font-black text-center uppercase tracking-widest">จำแนกกลุ่มงาน</div>
                                    <table className="dash-table">
                                        <thead>
                                            <tr><th className="text-left pl-4">กลุ่มงาน</th><th>OPD</th><th>IPD</th><th>Back</th></tr>
                                        </thead>
                                        <tbody>
                                            {dashData.map((row, i) => (
                                                <tr key={i} className={row.PIORITY_NAME === 'รวม' ? 'bg-slate-50' : ''}>
                                                    <td className="text-left pl-4 text-slate-500 font-medium">{row.PIORITY_NAME}</td>
                                                    <td className="text-emerald-600">{row.OPD}</td>
                                                    <td className="text-cyan-600">{row.IPD}</td>
                                                    <td className="text-amber-600">{row['Back Office']}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-3">
                                {filteredAssets.length > 0 ? filteredAssets.map((asset, idx) => (
                                    <div key={idx} onClick={() => handleViewDetail(asset.NOID)} className="p-4 bg-white rounded-2xl border-2 border-slate-50 shadow-sm flex items-center justify-between active:scale-95 transition-transform">
                                        <div className="min-w-0 pr-4">
                                            <p className="text-[12px] font-bold text-pink-500">{getHighlightedText(asset.AssetID, searchTerm)}</p>
                                            <p className="font-black text-slate-800 truncate">{getHighlightedText(asset.itemName, searchTerm)}</p>
                                        </div>
                                        <Icon name="chevron-right" size={20} className="text-slate-300" />
                                    </div>
                                )) : (
                                    <div className="text-center py-20 text-slate-300 font-bold italic">ไม่พบข้อมูล</div>
                                )}
                            </div>
                        )}
                    </main>

                    <div className="nav-container">
                        <nav className="nav-bar">
                            <button onClick={() => { setView('dashboard'); setShowSearch(false); }} className={`flex flex-col items-center ${view === 'dashboard' ? 'text-pink-500' : 'text-slate-400'}`}>
                                <Icon name="home" size={22} /><span className="text-[8px] font-black">HOME</span>
                            </button>
                            <div className="scan-fab" onClick={startScanner}>
                                <Icon name="scan" size={28} className="text-white" />
                            </div>
                            <button onClick={() => { setShowSearch(true); setView('search'); }} className={`flex flex-col items-center ${view === 'search' ? 'text-pink-500' : 'text-slate-400'}`}>
                                <Icon name="search" size={22} /><span className="text-[8px] font-black">SEARCH</span>
                            </button>
                        </nav>
                    </div>

                    {scannerOpen && (
                        <div className="fixed inset-0 z-[6000] bg-black flex flex-col items-center justify-center p-6">
                            <div id="reader" className="w-full"></div>
                            <button onClick={stopScanner} className="mt-8 px-10 py-3 bg-white/10 text-white rounded-full font-bold">ยกเลิก</button>
                        </div>
                    )}

                    {modalOpen && selectedAsset && (
                        <div className="fixed inset-0 z-[5000] bg-slate-900/60 backdrop-blur-sm flex items-end justify-center">
                            <div className="bg-white w-full max-w-[500px] rounded-t-[40px] animate-in slide-in-from-bottom flex flex-col max-h-[90vh]">
                                <div className="p-6 flex items-center justify-between">
                                    <button onClick={() => setModalOpen(false)} className="flex items-center gap-2 px-4 py-2 bg-slate-100 rounded-full text-xs font-bold text-slate-600">
                                        <Icon name="chevron-left" size={14} /> ปิด
                                    </button>
                                    <span className="font-black text-slate-800">รายละเอียดครุภัณฑ์</span>
                                </div>
                                <div className="p-6 pt-0 overflow-y-auto space-y-4">
                                    <div className="aspect-video bg-slate-100 rounded-3xl overflow-hidden shadow-inner">
                                        {selectedAsset.imgUrl ? <img src={selectedAsset.imgUrl} className="w-full h-full object-cover" /> : <div className="h-full flex items-center justify-center text-slate-400 text-xs">ไม่มีรูปภาพ</div>}
                                    </div>
                                    <div className="grid gap-3">
                                        {[
                                            { label: "รหัสครุภัณฑ์", val: selectedAsset.AssetID, hl: true, icon: "tag" },
                                            { label: "ชื่ออุปกรณ์", val: selectedAsset.itemName, hl: true, icon: "monitor" },
                                            { label: "สถานที่ใช้งาน", val: selectedAsset.location, icon: "map-pin" },
                                            { label: "ยี่ห้อ/รุ่น/สเปค", val: selectedAsset.spec, icon: "cpu" }
                                        ].map((item, i) => (
                                            <div key={i} className={`p-4 rounded-2xl border ${item.hl ? 'bg-pink-50 border-pink-100' : 'bg-slate-50 border-slate-100'} flex gap-3`}>
                                                <Icon name={item.icon} size={18} className={item.hl ? 'text-pink-500' : 'text-slate-400'} />
                                                <div>
                                                    <p className="text-[9px] font-black text-slate-400 uppercase">{item.label}</p>
                                                    <p className={`font-bold ${item.hl ? 'text-pink-600' : 'text-slate-700'}`}>{item.val || '-'}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="flex gap-3 py-4">
                                        <button onClick={() => setAlertMsg('ยังไม่เปิดใช้งาน')} className="flex-1 py-4 border-2 border-pink-500 text-pink-500 rounded-2xl font-black text-xs uppercase">แก้ไขข้อมูล</button>
                                        <button onClick={() => setAlertMsg('กำลังพิมพ์...')} className="flex-1 py-4 bg-slate-900 text-white rounded-2xl font-black text-xs uppercase">พิมพ์สติกเกอร์</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {alertMsg && (
                        <div className="fixed top-6 left-1/2 -translate-x-1/2 z-[9999] bg-slate-900 text-white px-6 py-3 rounded-full shadow-2xl flex items-center gap-3 animate-in fade-in zoom-in" onClick={() => setAlertMsg('')}>
                            <Icon name="info" size={16} className="text-pink-400" />
                            <span className="text-xs font-bold">{alertMsg}</span>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
