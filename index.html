<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Asset & Maintenance System</title>
    <!-- Google Fonts & Material Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <!-- QR Code Scanner Library -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --primary: #ff4081;
            --primary-light: #ff80ab;
            --primary-dark: #f50057;
            --secondary: #fff0f6;
            --text-dark: #37474f;
            --text-muted: #78909c;
            --white: #ffffff;
            --bg-gradient: linear-gradient(135deg, #ff80ab 0%, #fff0f6 50%, #fce4ec 100%);
            --shadow: 0 8px 20px rgba(255, 64, 129, 0.15);
            --radius: 18px;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            margin: 0;
            padding: 0;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-dark);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: "IT MAINTENANCE TEAM";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            font-size: 8vw;
            font-weight: 900;
            color: rgba(255, 64, 129, 0.03);
            display: flex;
            flex-wrap: wrap;
            align-content: space-around;
            justify-content: center;
            pointer-events: none;
            z-index: -1;
            transform: rotate(-30deg) scale(1.5);
            text-transform: uppercase;
            white-space: nowrap;
        }

        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid var(--secondary);
            border-top: 5px solid var(--primary);
            border-radius: 50%;
            animation: spin 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55) infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .page {
            display: none;
            padding: 20px 20px 100px 20px;
            animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            max-width: 600px;
            margin: 0 auto;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            font-weight: 600;
            color: var(--primary-dark);
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 12px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 25px 20px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            text-align: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .stat-card:hover { 
            transform: translateY(-8px); 
            background: var(--white);
            box-shadow: 0 12px 25px rgba(255, 64, 129, 0.25);
        }

        .stat-card .icon {
            font-size: 36px;
            color: var(--primary);
            margin-bottom: 12px;
            display: block;
        }

        .stat-card .number {
            font-size: 28px;
            font-weight: 800;
            display: block;
            color: var(--text-dark);
            margin-bottom: 4px;
        }

        .stat-card .label {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .search-container {
            position: sticky;
            top: 10px;
            z-index: 100;
            margin-bottom: 25px;
        }

        .search-input {
            width: 100%;
            padding: 16px 55px 16px 25px;
            border-radius: var(--radius);
            border: 2px solid transparent;
            background: var(--white);
            box-shadow: var(--shadow);
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        .search-input:focus { 
            border-color: var(--primary-light);
            box-shadow: 0 0 0 4px rgba(255, 64, 129, 0.1);
        }

        .search-icon {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary);
            font-size: 28px;
        }

        .asset-card {
            background: rgba(255, 255, 255, 0.85);
            margin-bottom: 15px;
            padding: 18px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 18px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid transparent;
        }

        .asset-card:active { transform: scale(0.97); }

        .asset-img-thumb {
            width: 70px;
            height: 70px;
            border-radius: 12px;
            background: #fce4ec;
            object-fit: cover;
            border: 2px solid var(--white);
        }

        .asset-info h4 { margin: 0; font-size: 17px; color: var(--text-dark); }
        .asset-info p { margin: 6px 0 0; font-size: 13px; color: var(--text-muted); }

        .highlight { background: #fffde7; font-weight: bold; color: var(--primary-dark); padding: 0 2px; border-radius: 4px; }

        #reader {
            width: 100%;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            background: #000;
            border: 4px solid var(--white);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 2000;
            justify-content: center;
            align-items: flex-end;
        }

        .modal.active { display: flex; }

        .modal-content {
            background: var(--white);
            width: 100%;
            max-width: 600px;
            border-radius: 25px 25px 0 0;
            padding: 30px;
            max-height: 92vh;
            overflow-y: auto;
            animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .detail-img {
            width: 100%;
            height: 220px;
            border-radius: var(--radius);
            object-fit: cover;
            margin-bottom: 20px;
            border: 3px solid var(--secondary);
        }

        .status-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 25px;
            font-size: 12px;
            font-weight: 600;
            background: #e8f5e9;
            color: #2e7d32;
            text-transform: uppercase;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 25px;
        }

        .btn {
            flex: 1;
            padding: 15px;
            border-radius: var(--radius);
            border: none;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.2s;
            font-size: 15px;
        }

        .btn-primary { 
            background: linear-gradient(45deg, var(--primary), var(--primary-dark));
            color: white; 
            box-shadow: 0 4px 15px rgba(255, 64, 129, 0.3);
        }

        .btn-outline { 
            background: var(--white); 
            border: 2px solid var(--primary-light); 
            color: var(--primary-dark); 
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: space-around;
            padding: 12px 0 25px 0;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.05);
            z-index: 1000;
            border-radius: 25px 25px 0 0;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 500;
            flex: 1;
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-item.active { color: var(--primary-dark); }
        .nav-item .material-icons-round { font-size: 28px; margin-bottom: 4px; }

        .scan-fab {
            background: linear-gradient(45deg, var(--primary), var(--primary-dark));
            color: white !important;
            width: 64px;
            height: 64px;
            border-radius: 50%;
            margin-top: -40px;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(255, 64, 129, 0.4);
            border: 4px solid var(--white);
        }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <p style="margin-top: 15px; color: var(--primary-dark); font-weight: 600;">IT MAINTENANCE TEAM</p>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="page active">
        <h2><span class="material-icons-round">analytics</span> Dashboard</h2>
        <div class="dashboard-grid">
            <div class="stat-card">
                <span class="material-icons-round icon">inventory_2</span>
                <span id="totalAssets" class="number">0</span>
                <span class="label">ครุภัณฑ์ทั้งหมด</span>
            </div>
            <div class="stat-card">
                <span class="material-icons-round icon" style="color:#ffb300">history_edu</span>
                <span id="todayRepairs" class="number">0</span>
                <span class="label">งานซ่อมวันนี้</span>
            </div>
        </div>
    </div>

    <!-- Search -->
    <div id="search" class="page">
        <h2><span class="material-icons-round">manage_search</span> ค้นหา</h2>
        <div class="search-container">
            <input type="text" id="searchInput" class="search-input" placeholder="ค้นหา NOID หรือ ชื่อ...">
            <span class="material-icons-round search-icon">search</span>
        </div>
        <div id="assetList"></div>
    </div>

    <!-- Scan -->
    <div id="scan" class="page">
        <h2><span class="material-icons-round">qr_code_scanner</span> สแกน</h2>
        <div id="reader"></div>
        <p id="scanStatus" style="text-align:center; margin-top:20px; color:var(--primary-dark);">พร้อมสแกน...</p>
    </div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
        <div class="nav-item active" onclick="navTo('dashboard')">
            <span class="material-icons-round">dashboard</span>
            <span>หน้าหลัก</span>
        </div>
        <div class="nav-item" onclick="navTo('search')">
            <span class="material-icons-round">search</span>
            <span>ค้นหา</span>
        </div>
        <div class="nav-item scan-fab" onclick="navTo('scan')">
            <span class="material-icons-round">qr_code_scanner</span>
        </div>
    </nav>

    <!-- Modal -->
    <div id="assetModal" class="modal">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3 id="modalTitle" style="margin:0; color:var(--primary-dark);">ข้อมูลครุภัณฑ์</h3>
                <span class="material-icons-round" onclick="closeModal()" style="cursor:pointer; color:var(--text-muted); font-size: 30px;">cancel</span>
            </div>
            <div style="margin-top: 20px;">
                <img id="assetImg" src="" alt="Asset" class="detail-img" onerror="this.src='https://via.placeholder.com/400x220?text=ไม่มีรูปภาพ'">
                <h4 id="assetName" style="margin: 0 0 5px; font-size: 20px;">-</h4>
                <p id="assetId" style="font-size: 14px; color: var(--primary); font-weight: 700; margin: 0;">NOID: -</p>
                <div style="margin-top:15px; background:var(--secondary); padding:15px; border-radius:15px; font-size:14px;">
                    <p><b>ยี่ห้อ:</b> <span id="assetBrand">-</span></p>
                    <p><b>สถานที่:</b> <span id="assetLoc">-</span></p>
                    <p><b>สถานะ:</b> <span id="assetStatus">-</span></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // *** ตรวจสอบ URL นี้ให้ถูกต้องตามที่คุณ Deploy ใน Google Apps Script ***
        const API_URL = "https://script.google.com/macros/s/AKfycbzhlc0yAeCjPvX6uwtXyFPxQWFk2llo-Yc7KWIsFkXGbl3EtAUjMZPY38TN4Hi2SoI/exec";
        
        let allAssets = [];
        let html5QrCode = null;

        function showLoading(show) {
            document.getElementById('loading-overlay').style.display = show ? 'flex' : 'none';
        }

        function navTo(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if(pageId === 'dashboard') document.querySelectorAll('.nav-item')[0].classList.add('active');
            if(pageId === 'search') document.querySelectorAll('.nav-item')[1].classList.add('active');
            if(pageId === 'scan') startScanner(); else stopScanner();
        }

        async function loadData() {
            showLoading(true);
            try {
                const response = await fetch(`${API_URL}?action=getAllAssets`);
                const data = await response.json();
                allAssets = data.assets || [];
                document.getElementById('totalAssets').innerText = allAssets.length;
                renderAssets(allAssets);
                
                // ตรวจสอบ Parameter จาก URL หลังโหลดข้อมูลเสร็จ
                const urlParams = new URLSearchParams(window.location.search);
                const id = urlParams.get('id');
                if (id) {
                    showAssetDetail(id);
                }
            } catch (e) {
                console.error("Fetch error", e);
            } finally {
                showLoading(false);
            }
        }

        function renderAssets(data, keyword = '') {
            const list = document.getElementById('assetList');
            list.innerHTML = '';
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'asset-card';
                const noid = item.NOID || item.id;
                card.onclick = () => showAssetDetail(noid);
                card.innerHTML = `
                    <div class="asset-info">
                        <h4>${item.itemName || item.name}</h4>
                        <p>NOID: ${noid} | ${item.location || item.loc}</p>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        async function showAssetDetail(noid) {
            showLoading(true);
            try {
                const response = await fetch(`${API_URL}?action=getAsset&noid=${noid}`);
                const asset = await response.json();
                if (asset && !asset.error) {
                    document.getElementById('assetName').innerText = asset.itemName || "-";
                    document.getElementById('assetId').innerText = "NOID: " + asset.NOID;
                    document.getElementById('assetBrand').innerText = asset.brand || "-";
                    document.getElementById('assetLoc').innerText = asset.location || "-";
                    document.getElementById('assetStatus').innerText = asset.status || "-";
                    document.getElementById('assetImg').src = asset.imgUrl || "";
                    document.getElementById('assetModal').classList.add('active');
                } else {
                    alert("ไม่พบข้อมูล NOID: " + noid);
                }
            } catch (e) {
                alert("การเชื่อมต่อมีปัญหา");
            } finally {
                showLoading(false);
            }
        }

        function closeModal() {
            document.getElementById('assetModal').classList.remove('active');
        }

        function startScanner() {
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, 
                (text) => {
                    stopScanner();
                    showAssetDetail(text);
                }
            );
        }

        function stopScanner() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => html5QrCode.clear());
            }
        }

        window.onload = loadData;

        document.getElementById('searchInput').oninput = (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = allAssets.filter(a => 
                (a.NOID || "").toString().toLowerCase().includes(val) || 
                (a.itemName || "").toLowerCase().includes(val)
            );
            renderAssets(filtered, val);
        };
    </script>
</body>
</html>
