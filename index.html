<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบตรวจสอบข้อมูลครุภัณฑ์คอมพิวเตอร์ - โรงพยาบาลอุดรธานี</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sarabun: ['Sarabun', 'sans-serif'],
                    },
                    colors: {
                        hospital: {
                            primary: '#ec4899', // pink-500
                            secondary: '#fb7185', // rose-400
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@100;300;400;700;800&display=swap" rel="stylesheet">
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- QR Code Scanner Library -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'kanit', sans-serif; -webkit-tap-highlight-color: transparent; }
        .animate-spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .icon-container { display: inline-flex; align-items: center; justify-content: center; vertical-align: middle; }
        .highlight {
            background-color: #fce7f3;
            color: #db2777;
            padding: 0 2px;
            border-radius: 4px;
            font-weight: 800;
        }
        /* QR Scanner Styling */
        #reader { border: none !important; }
        #reader video { border-radius: 1.5rem !important; object-fit: cover !important; }
    </style>
</head>
<body class="bg-[#FFF5F7]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, useRef } = React;

        const Icon = ({ name, className = "", size = 24 }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({
                        attrs: { class: className, style: `width: ${size}px; height: ${size}px;` },
                        nameAttr: 'data-lucide'
                    });
                }
            }, [name, className, size]);
            return <span ref={iconRef} className="icon-container"></span>;
        };

        const HighlightText = ({ text, highlight }) => {
            if (!highlight.trim()) return <span>{text}</span>;
            const regex = new RegExp(`(${highlight})`, 'gi');
            const parts = text.split(regex);
            return (
                <span>
                    {parts.map((part, i) => regex.test(part) ? <mark key={i} className="highlight">{part}</mark> : <span key={i}>{part}</span>)}
                </span>
            );
        };

        const App = () => {
            const [view, setView] = useState('dashboard');
            const [allAssets, setAllAssets] = useState([]);
            const [loading, setLoading] = useState(true);
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedAsset, setSelectedAsset] = useState(null);
            const [modalOpen, setModalOpen] = useState(false);
            const [isScanning, setIsScanning] = useState(false);
            
            const scannerRef = useRef(null);
            const LOGO_URL = "https://raw.githubusercontent.com/itudh/asset/main/logo.png";
            const API_URL = "https://script.google.com/macros/s/AKfycbzhlc0yAeCjPvX6uwtXyFPxQWFk2llo-Yc7KWIsFkXGbl3EtAUjMZPY38TN4Hi2SoI/exec";

            useEffect(() => {
                fetchData();
                const params = new URLSearchParams(window.location.search);
                const id = params.get('id');
                if (id) handleViewDetail(id);
            }, []);

            const fetchData = async () => {
                setLoading(true);
                try {
                    const resp = await fetch(`${API_URL}?action=getAllAssets`);
                    const data = await resp.json();
                    setAllAssets(data.assets || []);
                } catch (err) { console.error(err); }
                finally { setLoading(false); }
            };

            const handleViewDetail = async (noid) => {
                setLoading(true);
                try {
                    const resp = await fetch(`${API_URL}?action=getAsset&noid=${noid}`);
                    const data = await resp.json();
                    if (data.success) {
                        setSelectedAsset(data);
                        setModalOpen(true);
                    }
                } catch (err) { console.error(err); }
                finally { setLoading(false); }
            };

            // ฟังก์ชันเริ่มสแกน
            const startScanner = () => {
                setIsScanning(true);
                setTimeout(() => {
                    const html5QrCode = new Html5Qrcode("reader");
                    scannerRef.current = html5QrCode;
                    
                    const config = { fps: 10, qrbox: { width: 250, height: 250 } };
                    
                    html5QrCode.start(
                        { facingMode: "environment" }, 
                        config, 
                        (decodedText) => {
                            // เมื่อสแกนเจอ (สมมติว่าผลที่ได้คือ NOID หรือ AssetID)
                            stopScanner();
                            // ลองหาว่าในรายการมี ID นี้ไหม
                            const found = allAssets.find(a => a.AssetID === decodedText || a.NOID.toString() === decodedText);
                            if (found) {
                                handleViewDetail(found.NOID);
                            } else {
                                // ถ้าไม่เจอก็เอาไปใส่ช่องค้นหา
                                setView('search');
                                setSearchTerm(decodedText);
                            }
                        },
                        (errorMessage) => { /* สแกนไม่เจอในเฟรมนี้ */ }
                    ).catch(err => {
                        console.error("Scanner error:", err);
                        setIsScanning(false);
                    });
                }, 300);
            };

            const stopScanner = () => {
                if (scannerRef.current) {
                    scannerRef.current.stop().then(() => {
                        setIsScanning(false);
                    }).catch(err => console.error(err));
                } else {
                    setIsScanning(false);
                }
            };

            const filteredAssets = useMemo(() => {
                if (!searchTerm.trim()) return [];
                const term = searchTerm.toLowerCase();
                return allAssets.filter(asset => 
                    (asset.AssetID || "").toString().toLowerCase().includes(term)
                ).slice(0, 20);
            }, [searchTerm, allAssets]);

            const stats = useMemo(() => {
                const normal = allAssets.filter(a => a.maStatus === 'ปกติ' || a.maStatus === 'ใช้งานได้').length;
                const repair = allAssets.filter(a => ['ชำรุด', 'รอซ่อม', 'แจ้งซ่อม'].includes(a.maStatus)).length;
                return { normal, repair, total: allAssets.length };
            }, [allAssets]);

            return (
                <div className="min-h-screen pb-32 text-slate-700 select-none">
                    {loading && (
                        <div className="fixed inset-0 bg-white/80 backdrop-blur-sm z-[9999] flex flex-col items-center justify-center">
                            <div className="w-12 h-12 border-4 border-pink-100 border-t-pink-500 rounded-full animate-spin"></div>
                            <p className="mt-4 text-pink-600 font-bold">กำลังโหลดข้อมูล...</p>
                        </div>
                    )}

                    {/* Scanner Overlay */}
                    {isScanning && (
                        <div className="fixed inset-0 z-[10001] bg-black flex flex-col items-center justify-center p-6">
                            <div className="w-full max-w-md relative">
                                <div id="reader" className="w-full overflow-hidden rounded-[2rem] border-4 border-pink-500"></div>
                                <button 
                                    onClick={stopScanner}
                                    className="mt-8 w-full bg-white text-black py-4 rounded-2xl font-bold flex items-center justify-center gap-2"
                                >
                                    <Icon name="x" size={20} /> ยกเลิกการสแกน
                                </button>
                                <div className="mt-4 text-white text-center text-sm opacity-70">
                                    วาง QR Code ให้อยู่ในกรอบสีชมพู
                                </div>
                            </div>
                        </div>
                    )}

                    <header className="bg-gradient-to-br from-pink-500 to-rose-400 text-white pt-6 pb-14 px-6 shadow-xl shadow-pink-100 rounded-b-[3.5rem] sticky top-0 z-40 border-b-4 border-white/30">
                        <div className="max-w-4xl mx-auto flex flex-col gap-4">
                            <div className="flex justify-between items-start">
                                <div className="flex items-center gap-4">
                                    <div className="bg-white p-1.5 rounded-2xl shadow-lg border-2 border-pink-200 w-16 h-16 flex items-center justify-center overflow-hidden">
                                        <img src={LOGO_URL} alt="UDH Logo" className="w-full h-full object-contain" />
                                    </div>
                                    <div className="flex flex-col">
                                        <h1 className="text-xl font-black tracking-tight leading-none">โรงพยาบาลอุดรธานี</h1>
                                        <p className="text-[10px] font-bold text-pink-100 opacity-90 mt-1 uppercase tracking-widest">UDONTHANI HOSPITAL</p>
                                        <h2 className="text-lg font-black leading-tight">กลุ่มงาน : เทคโนโลยีสารสนเทศทางการแพทย์</h2>
                                    </div>
                                </div>
                            </div>
                            <div className="mt-2 pl-2 border-l-4 border-white/40">
                                <h2 className="text-lg font-black leading-tight">ระบบตรวจสอบข้อมูลครุภัณฑ์คอมพิวเตอร์</h2>
                            </div>
                        </div>
                    </header>

                    <main className="p-5 -mt-10 max-w-4xl mx-auto space-y-6 relative z-10">
                        {view === 'dashboard' ? (
                            <div className="space-y-6">
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="bg-white p-5 rounded-[2.5rem] shadow-sm border-2 border-pink-50 flex flex-col items-center justify-center">
                                        <div className="bg-green-50 text-green-500 p-2.5 rounded-2xl mb-2"><Icon name="check-circle" size={24} /></div>
                                        <p className="text-slate-400 text-[10px] font-bold uppercase">ใช้งานปกติ</p>
                                        <h3 className="text-3xl font-black text-slate-800 mt-1">{stats.normal}</h3>
                                    </div>
                                    <div className="bg-white p-5 rounded-[2.5rem] shadow-sm border-2 border-pink-50 flex flex-col items-center justify-center">
                                        <div className="bg-rose-50 text-rose-500 p-2.5 rounded-2xl mb-2"><Icon name="alert-circle" size={24} /></div>
                                        <p className="text-slate-400 text-[10px] font-bold uppercase">แจ้งซ่อม/ชำรุด</p>
                                        <h3 className="text-3xl font-black text-rose-500 mt-1">{stats.repair}</h3>
                                    </div>
                                </div>
                                <div onClick={() => setView('search')} className="bg-white p-6 rounded-[2.5rem] shadow-xl flex items-center justify-between cursor-pointer active:scale-95 transition-all">
                                    <div className="flex items-center gap-4">
                                        <div className="bg-pink-500 text-white p-4 rounded-3xl shadow-lg"><Icon name="search" size={24} /></div>
                                        <div>
                                            <h4 className="font-black text-slate-800">ค้นหาครุภัณฑ์</h4>
                                            <p className="text-slate-400 text-xs">ระบุ AssetID เพื่อตรวจสอบ</p>
                                        </div>
                                    </div>
                                    <Icon name="chevron-right" className="text-pink-300" size={24} />
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-5">
                                <div className="relative">
                                    <input
                                        type="text"
                                        placeholder="ระบุหมายเลขครุภัณฑ์ หรือ เลขท้าย ..."
                                        className="w-full p-5 pl-14 rounded-[2.5rem] bg-white border-2 border-transparent shadow-xl focus:border-pink-300 outline-none font-bold"
                                        value={searchTerm}
                                        onChange={(e) => setSearchTerm(e.target.value)}
                                    />
                                    <span className="absolute left-6 top-1/2 -translate-y-1/2 text-pink-400"><Icon name="search" size={20} /></span>
                                </div>
                                <div className="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border-2 border-white">
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left text-sm">
                                            <thead className="bg-pink-50 text-pink-600">
                                                <tr>
                                                    <th className="p-5 font-black text-[11px]">AssetID</th>
                                                    <th className="p-5 font-black text-[11px]">รายการ</th>
                                                    <th className="p-5 text-center font-black text-[11px]">ดูข้อมูล</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-pink-50">
                                                {filteredAssets.length > 0 ? filteredAssets.map((asset, idx) => (
                                                    <tr key={idx} className="hover:bg-pink-50/50">
                                                        <td className="p-5 font-mono font-bold text-slate-600 italic">
                                                            <HighlightText text={asset.AssetID || ""} highlight={searchTerm} />
                                                        </td>
                                                        <td className="p-5 leading-tight">
                                                            <p className="font-bold text-slate-700">{asset.itemName}</p>
                                                            <p className="text-[10px] text-slate-400 truncate max-w-[120px]">{asset.spec}</p>
                                                        </td>
                                                        <td className="p-5 text-center">
                                                            <button onClick={() => handleViewDetail(asset.NOID)} className="bg-pink-500 text-white w-10 h-10 rounded-2xl flex items-center justify-center mx-auto shadow-md">
                                                                <Icon name="chevron-right" size={20} />
                                                            </button>
                                                        </td>
                                                    </tr>
                                                )) : (
                                                    <tr><td colSpan="3" className="p-16 text-center opacity-30 font-bold">ไม่พบข้อมูลหรือกรุณาระบุคำค้นหา</td></tr>
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {modalOpen && selectedAsset && (
                        <div className="fixed inset-0 z-[10000] flex items-end sm:items-center justify-center bg-slate-900/60 backdrop-blur-sm animate-in fade-in duration-300">
                            <div className="bg-white w-full max-w-lg rounded-t-[3.5rem] sm:rounded-[3.5rem] p-8 max-h-[90vh] overflow-y-auto border-t-8 border-pink-500 shadow-2xl animate-in slide-in-from-bottom-8">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="text-xl font-black flex items-center gap-3"><div className="w-2 h-8 bg-pink-500 rounded-full"></div>รายละเอียด</h3>
                                    <button onClick={() => setModalOpen(false)} className="bg-slate-100 p-2 rounded-xl text-slate-400"><Icon name="x" size={20} /></button>
                                </div>
                                <div className="space-y-6">
                                    <div className="aspect-video bg-pink-50 rounded-[2.5rem] overflow-hidden border-4 border-white shadow-lg">
                                        <img src={selectedAsset.imgUrl || "https://via.placeholder.com/600x450?text=No+Image"} className="w-full h-full object-cover" />
                                    </div>
                                    <div>
                                        <h2 className="text-2xl font-black text-slate-800 leading-tight">{selectedAsset.itemName}</h2>
                                        <span className="inline-block mt-2 bg-pink-50 text-pink-600 px-4 py-1 rounded-xl text-sm font-mono font-bold border border-pink-100">ID: {selectedAsset.AssetID}</span>
                                    </div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <div className="bg-slate-50 p-4 rounded-3xl"><p className="text-[10px] font-black text-pink-400 uppercase mb-1">สถานะบำรุงรักษา</p><p className="font-bold">{selectedAsset.maStatus || "-"}</p></div>
                                        <div className="bg-slate-50 p-4 rounded-3xl"><p className="text-[10px] font-black text-pink-400 uppercase mb-1">สถานะคอมฯ</p><p className="font-bold">{selectedAsset.coStatus || "-"}</p></div>
                                    </div>
                                    <div className="bg-slate-50 p-6 rounded-[2.5rem] border border-slate-100">
                                        <p className="text-[10px] font-black text-slate-400 uppercase mb-2">รายละเอียดทางเทคนิค</p>
                                        <p className="text-sm text-slate-600 leading-relaxed">{selectedAsset.spec || "ไม่มีข้อมูล"}</p>
                                    </div>
                                    <button onClick={() => setModalOpen(false)} className="w-full bg-pink-500 text-white py-5 rounded-[2.5rem] font-black shadow-lg shadow-pink-200">ปิดหน้าต่าง</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <nav className="fixed bottom-6 left-6 right-6 bg-white/90 backdrop-blur-xl border-2 border-white shadow-2xl flex justify-around items-center p-4 rounded-[3rem] z-50">
                        <button onClick={() => setView('dashboard')} className={`p-3 rounded-2xl ${view === 'dashboard' ? 'text-pink-500 bg-pink-50' : 'text-slate-300'}`}><Icon name="layout-dashboard" /></button>
                        <div className="relative -top-10">
                            <button 
                                onClick={startScanner}
                                className="bg-gradient-to-tr from-pink-500 to-rose-400 p-6 rounded-[2.5rem] text-white shadow-2xl shadow-pink-300 border-4 border-white active:scale-90 transition-transform"
                            >
                                <Icon name="qr-code" size={32} />
                            </button>
                        </div>
                        <button onClick={() => setView('search')} className={`p-3 rounded-2xl ${view === 'search' ? 'text-pink-500 bg-pink-50' : 'text-slate-300'}`}><Icon name="search" /></button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
