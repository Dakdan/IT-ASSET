<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบตรวจสอบข้อมูลครุภัณฑ์คอมพิวเตอร์ - โรงพยาบาลอุดรธานี</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Sarabun -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@100;300;400;700;800&display=swap" rel="stylesheet">
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Sarabun', sans-serif; }
        .animate-spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        
        // Mocking Lucide Icons for standalone usage
        const Icon = ({ name, size = 24, className = "", strokeWidth = 2 }) => {
            const [iconSvg, setIconSvg] = useState("");
            useEffect(() => {
                if (window.lucide) {
                    const svg = window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const App = () => {
            const [view, setView] = useState('dashboard');
            const [allAssets, setAllAssets] = useState([]);
            const [loading, setLoading] = useState(true);
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedAsset, setSelectedAsset] = useState(null);
            const [modalOpen, setModalOpen] = useState(false);

            const LOGO_URL = "https://raw.githubusercontent.com/itudh/asset/main/logo.png";
            const API_URL = "https://script.google.com/macros/s/AKfycbzhlc0yAeCjPvX6uwtXyFPxQWFk2llo-Yc7KWIsFkXGbl3EtAUjMZPY38TN4Hi2SoI/exec";

            useEffect(() => {
                fetchData();
                const params = new URLSearchParams(window.location.search);
                const id = params.get('id');
                if (id) handleViewDetail(id);
                
                // Initialize Lucide icons
                setTimeout(() => window.lucide.createIcons(), 500);
            }, []);

            useEffect(() => {
                window.lucide.createIcons();
            }, [view, modalOpen, loading, searchTerm]);

            const fetchData = async () => {
                setLoading(true);
                try {
                    const resp = await fetch(`${API_URL}?action=getAllAssets`);
                    const data = await resp.json();
                    setAllAssets(data.assets || []);
                } catch (err) {
                    console.error("Fetch Error:", err);
                } finally {
                    setTimeout(() => setLoading(false), 500); 
                }
            };

            const handleViewDetail = async (noid) => {
                setLoading(true);
                try {
                    const resp = await fetch(`${API_URL}?action=getAsset&noid=${noid}`);
                    const data = await resp.json();
                    if (data.success) {
                        setSelectedAsset(data);
                        setModalOpen(true);
                    } else {
                        alert("ไม่พบข้อมูล NOID: " + noid);
                    }
                } catch (err) {
                    alert("เกิดข้อผิดพลาดในการดึงข้อมูล");
                } finally {
                    setLoading(false);
                }
            };

            const filteredAssets = useMemo(() => {
                if (!searchTerm) return [];
                return allAssets.filter(asset => 
                    (asset.AssetID || "").toString().toLowerCase().includes(searchTerm.toLowerCase())
                );
            }, [searchTerm, allAssets]);

            const stats = useMemo(() => {
                const normal = allAssets.filter(a => a.maStatus === 'ปกติ' || a.maStatus === 'ใช้งานได้').length;
                const repair = allAssets.filter(a => ['ชำรุด', 'รอซ่อม', 'แจ้งซ่อม'].includes(a.maStatus)).length;
                return { normal, repair, total: allAssets.length };
            }, [allAssets]);

            return (
                <div className="min-h-screen bg-[#FFF5F7] pb-32 text-slate-700">
                    {/* Loading Overlay */}
                    {loading && (
                        <div className="fixed inset-0 bg-white/60 backdrop-blur-md z-[9999] flex flex-col items-center justify-center">
                            <div className="relative">
                                <div className="w-16 h-16 border-4 border-pink-100 border-t-pink-500 rounded-full animate-spin"></div>
                            </div>
                            <p className="mt-6 text-pink-600 font-bold animate-bounce">กำลังประมวลผล...</p>
                        </div>
                    )}

                    {/* Header */}
                    <header className="bg-gradient-to-br from-pink-500 to-rose-400 text-white pt-6 pb-14 px-6 shadow-xl shadow-pink-100 rounded-b-[3.5rem] sticky top-0 z-40 border-b-4 border-white/30">
                        <div className="max-w-4xl mx-auto flex flex-col gap-4">
                            <div className="flex justify-between items-start">
                                <div className="flex items-center gap-4">
                                    <div className="bg-white p-1.5 rounded-2xl shadow-lg border-2 border-pink-200 w-16 h-16 flex items-center justify-center overflow-hidden">
                                        <img src={LOGO_URL} alt="UDH Logo" className="w-full h-full object-contain" onError={(e) => { e.target.src = "https://via.placeholder.com/150?text=UDH"; }} />
                                    </div>
                                    <div className="flex flex-col">
                                        <h1 className="text-xl font-black tracking-tight leading-none">โรงพยาบาลอุดรธานี</h1>
                                        <p className="text-[10px] font-bold text-pink-100 opacity-90 mt-1 uppercase tracking-widest">UDONTHANI HOSPITAL</p>
                                    </div>
                                </div>
                                <div className="bg-white/20 p-2 rounded-2xl backdrop-blur-md border border-white/30">
                                    <i data-lucide="settings" className="w-5 h-5"></i>
                                </div>
                            </div>
                            
                            <div className="mt-2 pl-2 border-l-4 border-white/40">
                                <h2 className="text-lg font-black leading-tight">ระบบตรวจสอบข้อมูลครุภัณฑ์คอมพิวเตอร์</h2>
                                <div className="flex flex-wrap gap-x-4 gap-y-1 mt-1">
                                    <p className="text-pink-50 text-[11px] font-medium flex items-center gap-1">
                                        <i data-lucide="info" className="w-3 h-3"></i> กลุ่มงาน : เทคโนโลยีสารสนเทศทางการแพทย์
                                    </p>
                                    <p className="text-pink-50 text-[11px] font-bold flex items-center gap-1">
                                        <i data-lucide="wrench" className="w-3 h-3"></i> ทีมช่าง IT UDH
                                    </p>
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="p-5 -mt-10 max-w-4xl mx-auto space-y-6 relative z-10">
                        {view === 'dashboard' ? (
                            <div className="space-y-6">
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="bg-white p-5 rounded-[2.5rem] shadow-sm border-2 border-pink-50 flex flex-col items-center justify-center">
                                        <div className="bg-green-50 text-green-500 p-2.5 rounded-2xl mb-2"><i data-lucide="check-circle"></i></div>
                                        <p className="text-slate-400 text-[10px] font-bold uppercase">ใช้งานปกติ</p>
                                        <h3 className="text-3xl font-black text-slate-800 mt-1">{stats.normal}</h3>
                                    </div>
                                    <div className="bg-white p-5 rounded-[2.5rem] shadow-sm border-2 border-pink-50 flex flex-col items-center justify-center">
                                        <div className="bg-rose-50 text-rose-500 p-2.5 rounded-2xl mb-2"><i data-lucide="alert-circle"></i></div>
                                        <p className="text-slate-400 text-[10px] font-bold uppercase">แจ้งซ่อม/ชำรุด</p>
                                        <h3 className="text-3xl font-black text-rose-500 mt-1">{stats.repair}</h3>
                                    </div>
                                </div>

                                <div onClick={() => setView('search')} className="bg-white p-6 rounded-[2.5rem] shadow-xl border-2 border-white flex items-center justify-between cursor-pointer active:scale-95 transition-all">
                                    <div className="flex items-center gap-4">
                                        <div className="bg-pink-500 text-white p-4 rounded-3xl shadow-lg border-2 border-white/20"><i data-lucide="search"></i></div>
                                        <div>
                                            <h4 className="font-black text-slate-800">ค้นหาครุภัณฑ์</h4>
                                            <p className="text-slate-400 text-xs">ระบุ AssetID เพื่อตรวจสอบ</p>
                                        </div>
                                    </div>
                                    <i data-lucide="chevron-right" className="text-pink-300"></i>
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-5">
                                <div className="relative">
                                    <input
                                        type="text"
                                        placeholder="ระบุหมายเลขครุภัณฑ์ (AssetID)..."
                                        className="w-full p-5 pl-14 rounded-[2.5rem] bg-white border-2 border-transparent shadow-xl focus:border-pink-300 outline-none font-bold"
                                        value={searchTerm}
                                        onChange={(e) => setSearchTerm(e.target.value)}
                                    />
                                    <i data-lucide="search" className="absolute left-6 top-1/2 -translate-y-1/2 text-pink-400"></i>
                                </div>
                                
                                {searchTerm && (
                                    <div className="bg-white/90 rounded-[2.5rem] shadow-2xl overflow-hidden border-2 border-white">
                                        <table className="w-full text-left text-sm">
                                            <thead className="bg-pink-50 text-pink-600">
                                                <tr>
                                                    <th className="p-5 font-black text-[11px]">AssetID</th>
                                                    <th className="p-5 font-black text-[11px]">รายการ</th>
                                                    <th className="p-5 font-black text-[11px] text-center">Action</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-pink-50">
                                                {filteredAssets.length > 0 ? filteredAssets.map((asset, idx) => (
                                                    <tr key={idx} className="hover:bg-pink-50/50 transition-colors">
                                                        <td className="p-5 font-mono font-bold text-slate-600">{asset.AssetID}</td>
                                                        <td className="p-5">
                                                            <p className="font-bold text-slate-700">{asset.itemName}</p>
                                                            <p className="text-[10px] text-slate-400 truncate max-w-[120px]">{asset.spec}</p>
                                                        </td>
                                                        <td className="p-5 text-center">
                                                            <button onClick={() => handleViewDetail(asset.NOID)} className="bg-pink-500 text-white w-10 h-10 rounded-2xl flex items-center justify-center mx-auto active:scale-90">
                                                                <i data-lucide="chevron-right" className="w-5 h-5"></i>
                                                            </button>
                                                        </td>
                                                    </tr>
                                                )) : (
                                                    <tr><td colSpan="3" className="p-16 text-center text-slate-400 font-bold">ไม่พบข้อมูล</td></tr>
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    {/* Modal */}
                    {modalOpen && selectedAsset && (
                        <div className="fixed inset-0 z-[10000] flex items-end sm:items-center justify-center p-0 sm:p-4 bg-slate-900/40 backdrop-blur-sm">
                            <div className="bg-white w-full max-w-lg rounded-t-[3.5rem] sm:rounded-[3.5rem] p-8 max-h-[95vh] overflow-y-auto border-t-8 border-pink-500 sm:border-t-0">
                                <div className="flex justify-between items-center mb-8">
                                    <h3 className="text-xl font-black text-slate-800">รายละเอียดครุภัณฑ์</h3>
                                    <button onClick={() => setModalOpen(false)} className="bg-slate-100 p-2 rounded-2xl"><i data-lucide="x"></i></button>
                                </div>
                                <div className="space-y-6">
                                    <div className="aspect-[4/3] bg-pink-50 rounded-[3rem] overflow-hidden border-4 border-white shadow-xl">
                                        <img src={selectedAsset.imgUrl || "https://via.placeholder.com/600x450"} className="w-full h-full object-cover" />
                                    </div>
                                    <h2 className="text-2xl font-black text-slate-800 leading-tight">{selectedAsset.itemName}</h2>
                                    <p className="bg-pink-50 text-pink-600 px-4 py-2 rounded-2xl inline-block font-mono font-bold">ID: {selectedAsset.AssetID}</p>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="bg-pink-50/50 p-4 rounded-3xl border-2 border-pink-100">
                                            <p className="text-[10px] font-black text-pink-400 uppercase">สถานะบำรุงรักษา</p>
                                            <p className="font-bold">{selectedAsset.maStatus || "-"}</p>
                                        </div>
                                        <div className="bg-pink-50/50 p-4 rounded-3xl border-2 border-pink-100">
                                            <p className="text-[10px] font-black text-pink-400 uppercase">สถานะคอมฯ</p>
                                            <p className="font-bold">{selectedAsset.coStatus || "-"}</p>
                                        </div>
                                    </div>
                                    <button onClick={() => setModalOpen(false)} className="w-full bg-pink-500 text-white py-5 rounded-[2.5rem] font-black shadow-lg">ปิดหน้าต่าง</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Navigation */}
                    <nav className="fixed bottom-6 left-6 right-6 bg-white border-2 border-white shadow-2xl flex justify-around items-center p-4 rounded-[3rem] z-50">
                        <button onClick={() => setView('dashboard')} className={`flex flex-col items-center ${view === 'dashboard' ? 'text-pink-500' : 'text-slate-300'}`}>
                            <i data-lucide="layout-dashboard"></i>
                        </button>
                        <div className="relative -top-12">
                            <button className="bg-gradient-to-tr from-pink-500 to-rose-400 p-5 rounded-[2.5rem] text-white shadow-2xl border-4 border-white active:scale-90">
                                <i data-lucide="qr-code" className="w-8 h-8"></i>
                            </button>
                        </div>
                        <button onClick={() => setView('search')} className={`flex flex-col items-center ${view === 'search' ? 'text-pink-500' : 'text-slate-300'}`}>
                            <i data-lucide="search"></i>
                        </button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
