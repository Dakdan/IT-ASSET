<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบตรวจสอบครุภัณฑ์คอมพิวเตอร์ - โรงพยาบาลอุดรธานี</title>
    
    <link rel="icon" type="image/png" href="https://img2.pic.in.th/-227e4f6f84f29f020.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sarabun: ['Sarabun', 'sans-serif'] },
                    colors: {
                        hospital: { primary: '#e91e63', accent: '#db2777', light: '#fdf2f8' }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@100;300;400;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { 
            font-family: 'Sarabun', sans-serif; 
            background: #fdf2f8; 
            min-height: 100vh; 
            margin: 0; 
            display: flex;
            justify-content: center; /* จัดกลางสำหรับ PC */
        }
        
        /* ปรับ Container หลักให้รองรับ PC/Smartphone */
        .app-shell {
            width: 100%;
            max-width: 500px; /* คุมขนาดไว้ไม่ให้บานปลายใน PC */
            min-height: 100vh;
            background: white;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }

        .header-pink-vibrant { 
            background: linear-gradient(180deg, #ad1457 0%, #d81b60 40%, #f472b6 100%); 
            border-bottom-left-radius: 32px;
            border-bottom-right-radius: 32px;
            box-shadow: 0 10px 30px rgba(173, 20, 87, 0.3);
            border-bottom: 5px solid #880e4f;
            position: relative;
            z-index: 10;
            min-height: 160px;
            padding-bottom: 60px;
        }

        .sticky-search-container {
            position: sticky;
            top: 15px;
            z-index: 1000;
            margin-top: -50px; 
            padding: 0 16px;
        }

        .glass-search-card { 
            background: rgba(255, 255, 255, 0.98); 
            backdrop-filter: blur(10px); 
            border: 5px solid #e91e63;
            box-shadow: 0 20px 40px rgba(233, 30, 99, 0.25);
            border-radius: 24px;
        }

        .nav-container { 
            position: fixed; 
            bottom: 0; 
            width: 100%;
            max-width: 500px; /* ให้เท่ากับตัวแอป */
            padding: 12px; 
            z-index: 2000; 
            display: flex; 
            justify-content: center;
        }

        .nav-bar { 
            width: 100%; 
            height: 64px; 
            border-radius: 32px; 
            background: rgba(15, 23, 42, 0.95); 
            border: 2px solid #334155;
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 0 20px;
        }

        .scan-fab { 
            background: linear-gradient(135deg, #ff4081 0%, #e91e63 100%); 
            width: 60px; 
            height: 60px; 
            border-radius: 50%; 
            border: 4px solid #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: -30px;
            box-shadow: 0 8px 20px rgba(233, 30, 99, 0.4);
            cursor: pointer;
        }

        /* ตารางรองรับการเลื่อนกรณีจอเล็กมาก */
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .dash-table { width: 100%; border-collapse: separate; border-spacing: 0; min-width: 300px; }
        .dash-table th { background: #f8fafc; padding: 12px 8px; font-size: 11px; text-transform: uppercase; border-bottom: 2px solid #e2e8f0; }
        .dash-table td { padding: 12px 8px; font-size: 13px; border-bottom: 1px solid #f1f5f9; text-align: center; font-weight: bold; }

        #reader {
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
        }

        .search-highlight {
            background-color: #ff007f;
            color: #ffffff;
            font-weight: 900;
            padding: 2px 6px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const Icon = ({ name, className = "", size = 24, onClick }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({
                        attrs: { class: className, style: `width: ${size}px; height: ${size}px;` },
                        nameAttr: 'data-lucide'
                    });
                }
            }, [name, className, size]);
            return <span ref={iconRef} className={`inline-flex items-center ${onClick ? 'cursor-pointer' : ''}`} onClick={onClick}></span>;
        };

        const App = () => {
            const [view, setView] = useState('dashboard');
            const [allAssets, setAllAssets] = useState([]);
            const [dashData, setDashData] = useState([]);
            const [loading, setLoading] = useState(true);
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedAsset, setSelectedAsset] = useState(null);
            const [modalOpen, setModalOpen] = useState(false);
            const [scannerOpen, setScannerOpen] = useState(false);
            const [alertMsg, setAlertMsg] = useState('');
            const [showSearch, setShowSearch] = useState(false);
            
            const API_URL = "https://script.google.com/macros/s/AKfycbzhlc0yAeCjPvX6uwtXyFPxQWFk2llo-Yc7KWIsFkXGbl3EtAUjMZPY38TN4Hi2SoI/exec";
            const scannerRef = useRef(null);

            const fetchInitialData = async () => {
                setLoading(true);
                try {
                    const [assetsResp, dashResp] = await Promise.all([
                        fetch(`${API_URL}?action=getAllAssets`),
                        fetch(`${API_URL}?action=getDashboard`)
                    ]);
                    const assetsJson = await assetsResp.json();
                    const dash = await dashResp.json();
                    setAllAssets(assetsJson.assets || []);
                    setDashData(dash || []);
                } catch (err) { 
                    setAlertMsg('ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้');
                } finally { 
                    setLoading(false); 
                }
            };

            useEffect(() => {
                fetchInitialData();
            }, []);

            const filteredAssets = useMemo(() => {
                const term = searchTerm.trim().toLowerCase();
                if (!term) return [];
                return allAssets.filter(asset => String(asset.AssetID || "").toLowerCase().endsWith(term)).slice(0, 30); 
            }, [searchTerm, allAssets]);

            const verifiedCount = useMemo(() => {
                return allAssets.filter(a => a.note4 == 1 || a.note4 == "1").length;
            }, [allAssets]);

            const handleViewDetail = async (noid) => {
                setLoading(true);
                try {
                    const resp = await fetch(`${API_URL}?action=getAsset&noid=${noid}`);
                    const data = await resp.json();
                    if (data && data.success) {
                        setSelectedAsset(data);
                        setModalOpen(true);
                    } else {
                        setAlertMsg('ไม่พบข้อมูลครุภัณฑ์นี้');
                    }
                } catch (err) { console.error(err); } 
                finally { setLoading(false); }
            };

            const stopScanner = async () => {
                if (scannerRef.current) {
                    try { await scannerRef.current.stop(); scannerRef.current = null; } catch (e) {}
                }
                setScannerOpen(false);
            };

            const startScanner = () => {
                setScannerOpen(true);
                setTimeout(async () => {
                    try {
                        const html5QrCode = new Html5Qrcode("reader");
                        scannerRef.current = html5QrCode;
                        await html5QrCode.start(
                            { facingMode: "environment" },
                            { fps: 15, qrbox: { width: 250, height: 250 } },
                            (decodedText) => {
                                let rawId = decodedText.trim();
                                let targetId = rawId;
                                if (rawId.startsWith('http')) {
                                    try {
                                        if (rawId.includes('/IcmAssetDetail/')) {
                                            targetId = rawId.split('/IcmAssetDetail/')[1].split('/')[0];
                                        } else {
                                            const urlParts = rawId.split('/');
                                            targetId = urlParts.pop() || urlParts.pop();
                                        }
                                    } catch(e) { targetId = rawId; }
                                }
                                stopScanner();
                                handleViewDetail(targetId);
                            }
                        );
                    } catch (err) {
                        setAlertMsg('กรุณาอนุญาตการเข้าถึงกล้อง');
                        setScannerOpen(false);
                    }
                }, 300);
            };

            return (
                <div className="app-shell">
                    {loading && (
                        <div className="absolute inset-0 bg-white/70 backdrop-blur-sm z-[9999] flex items-center justify-center">
                            <div className="text-pink-500 flex flex-col items-center gap-2">
                                <div className="w-10 h-10 border-4 border-pink-200 border-t-pink-600 rounded-full animate-spin"></div>
                                <span className="font-bold text-sm">กำลังโหลด...</span>
                            </div>
                        </div>
                    )}

                    <header className="header-pink-vibrant p-5 flex flex-col justify-center">
                        <div className="flex items-center gap-3">
                            <div className="w-12 h-12 bg-white rounded-xl p-1 shadow-md flex-shrink-0">
                                <img src="https://img2.pic.in.th/-227e4f6f84f29f020.png" className="w-full h-full object-contain" />
                            </div>
                            <div className="flex-1 min-w-0">
                                <h1 className="text-white text-lg sm:text-xl font-black truncate shadow-sm">ระบบตรวจสอบครุภัณฑ์</h1>
                                <p className="text-[10px] text-pink-100 font-bold opacity-90">กลุ่มงานเทคโนโลยีสารสนเทศทางการแพทย์</p>
                            </div>
                            <button onClick={fetchInitialData} className="w-8 h-8 bg-white/20 rounded-lg flex items-center justify-center text-white active:scale-90">
                                <Icon name="rotate-cw" size={18} />
                            </button>
                        </div>
                    </header>

                    {showSearch && (
                        <div className="sticky-search-container animate-in slide-in-from-top duration-300">
                            <div className="glass-search-card flex items-center px-4 py-3 gap-3">
                                <Icon name="search" size={20} className="text-pink-500" />
                                <input 
                                    type="text" 
                                    className="flex-1 bg-transparent outline-none font-black text-slate-700 placeholder:text-slate-300"
                                    placeholder="รหัส 4 ตัวท้าย..."
                                    autoFocus
                                    value={searchTerm}
                                    onChange={(e) => {
                                        setSearchTerm(e.target.value);
                                        if(view !== 'search') setView('search');
                                    }}
                                />
                                <Icon name="x" size={18} className="text-slate-300" onClick={() => { setSearchTerm(''); setShowSearch(false); setView('dashboard'); }} />
                            </div>
                        </div>
                    )}

                    <main className="flex-1 px-4 py-6 pb-24 overflow-y-auto">
                        {view === 'dashboard' ? (
                            <div className="space-y-6 animate-in fade-in duration-500">
                                <div className="grid grid-cols-2 gap-3">
                                    <div className="bg-pink-50 p-4 rounded-3xl border-2 border-pink-100">
                                        <p className="text-[10px] font-black text-pink-400 uppercase mb-1">จำนวนทั้งหมด</p>
                                        <p className="text-2xl font-black text-slate-800">{allAssets.length}</p>
                                    </div>
                                    <div className="bg-emerald-50 p-4 rounded-3xl border-2 border-emerald-100">
                                        <p className="text-[10px] font-black text-emerald-400 uppercase mb-1">ตรวจแล้ว 2569</p>
                                        <p className="text-2xl font-black text-slate-800">{verifiedCount}</p>
                                    </div>
                                </div>

                                <div className="bg-white rounded-3xl border-2 border-slate-100 shadow-sm overflow-hidden">
                                    <div className="p-4 bg-slate-800 text-white text-[11px] font-black uppercase tracking-widest text-center">สถิติจำแนกกลุ่มงาน</div>
                                    <div className="table-responsive">
                                        <table className="dash-table">
                                            <thead>
                                                <tr>
                                                    <th className="text-left pl-4">กลุ่มงาน</th>
                                                    <th>OPD</th>
                                                    <th>IPD</th>
                                                    <th>Back</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {dashData.map((row, i) => (
                                                    <tr key={i} className={row.PIORITY_NAME === 'รวม' ? 'bg-slate-50' : ''}>
                                                        <td className="text-left pl-4 text-slate-500">{row.PIORITY_NAME}</td>
                                                        <td className="text-emerald-600">{row.OPD}</td>
                                                        <td className="text-cyan-600">{row.IPD}</td>
                                                        <td className="text-amber-600">{row['Back Office']}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-3 animate-in slide-in-from-right duration-300">
                                {filteredAssets.length > 0 ? filteredAssets.map((asset, idx) => (
                                    <div key={idx} onClick={() => handleViewDetail(asset.NOID)} className="p-5 bg-white rounded-3xl border-2 border-pink-100 shadow-sm flex items-center justify-between active:scale-95 transition-transform">
                                        <div className="min-w-0 pr-4 flex-1">
                                            <p className="text-[15px] font-extrabold text-pink-500 mb-1">{asset.AssetID}</p>
                                            <p className="font-black text-slate-800 text-xl truncate">{asset.itemName}</p>
                                        </div>
                                        <Icon name="chevron-right" size={24} className="text-pink-400" />
                                    </div>
                                )) : (
                                    <div className="text-center py-20 text-slate-300 font-bold italic">ไม่พบข้อมูลที่ค้นหา</div>
                                )}
                            </div>
                        )}
                    </main>

                    <div className="nav-container">
                        <nav className="nav-bar">
                            <button onClick={() => { setView('dashboard'); setShowSearch(false); }} className={`flex flex-col items-center gap-1 ${view === 'dashboard' ? 'text-pink-500' : 'text-slate-500'}`}>
                                <Icon name="home" size={20} />
                                <span className="text-[8px] font-black uppercase">Home</span>
                            </button>
                            <div className="scan-fab" onClick={startScanner}>
                                <Icon name="scan" size={24} className="text-white" />
                            </div>
                            <button onClick={() => { setShowSearch(true); setView('search'); }} className={`flex flex-col items-center gap-1 ${view === 'search' ? 'text-pink-500' : 'text-slate-500'}`}>
                                <Icon name="search-check" size={20} />
                                <span className="text-[8px] font-black uppercase">Verify</span>
                            </button>
                        </nav>
                    </div>

                    {/* Scanner Modal & Asset Detail Modal คงเดิมตามโครงสร้างคุณ */}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
