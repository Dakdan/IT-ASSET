<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบตรวจสอบครุภัณฑ์คอมพิวเตอร์ - โรงพยาบาลอุดรธานี</title>
    
    <link rel="icon" type="image/png" href="https://img2.pic.in.th/-227e4f6f84f29f020.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sarabun: ['Sarabun', 'sans-serif'] },
                    colors: {
                        hospital: { primary: '#e91e63', accent: '#db2777', light: '#fdf2f8' }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@100;300;400;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        body { 
            font-family: 'Sarabun', sans-serif; 
            background: #fdf2f8; 
            min-height: 100vh; 
            margin: 0; 
        }
        .header-pink-vibrant { 
            background: linear-gradient(180deg, #ad1457 0%, #d81b60 40%, #f472b6 100%); 
            border-bottom-left-radius: 32px;
            border-bottom-right-radius: 32px;
            box-shadow: 0 10px 30px rgba(173, 20, 87, 0.3);
            border-bottom: 5px solid #880e4f;
            position: relative;
            z-index: 10;
            min-height: 160px;
            padding-bottom: 60px;
        }
        .header-title { 
            color: #ffffff; 
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3); 
            line-height: 1.2;
        }
        .sticky-search-container {
            position: sticky;
            top: 15px;
            z-index: 1000;
            margin-top: -50px; 
            padding: 0 16px;
        }
        .glass-search-card { 
            background: rgba(255, 255, 255, 0.98); 
            backdrop-filter: blur(10px); 
            border: 5px solid #e91e63;
            box-shadow: 0 20px 40px rgba(233, 30, 99, 0.25);
            border-radius: 24px;
        }
        .nav-container { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            padding: 12px; 
            z-index: 2000; 
            display: flex; 
            justify-content: center;
        }
        .nav-bar { 
            width: 100%; 
            max-width: 400px; 
            height: 64px; 
            border-radius: 32px; 
            background: rgba(15, 23, 42, 0.95); 
            border: 2px solid #334155;
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 0 20px;
        }
        .scan-fab { 
            background: linear-gradient(135deg, #ff4081 0%, #e91e63 100%); 
            width: 60px; 
            height: 60px; 
            border-radius: 50%; 
            border: 4px solid #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: -30px;
            box-shadow: 0 8px 20px rgba(233, 30, 99, 0.4);
            cursor: pointer;
        }
        .search-highlight {
            background-color: #ff007f;
            color: #ffffff;
            font-weight: 900;
            padding: 2px 6px;
            border-radius: 4px;
        }
    </style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const { useState, useEffect, useMemo, useRef } = React;

const Icon = ({ name, className = "", size = 24, onClick }) => {
    const iconRef = useRef(null);
    useEffect(() => {
        if (window.lucide && iconRef.current) {
            iconRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
            window.lucide.createIcons({
                attrs: { class: className, style: `width:${size}px;height:${size}px;` },
                nameAttr: 'data-lucide'
            });
        }
    }, [name, className, size]);
    return <span ref={iconRef} onClick={onClick}></span>;
};

const App = () => {

const [view,setView]=useState('dashboard');
const [allAssets,setAllAssets]=useState([]);
const [loading,setLoading]=useState(true);
const [searchTerm,setSearchTerm]=useState('');
const [showSearch,setShowSearch]=useState(false);

const API_URL="https://script.google.com/macros/s/AKfycbzhlc0yAeCjPvX6uwtXyFPxQWFk2llo-Yc7KWIsFkXGbl3EtAUjMZPY38TN4Hi2SoI/exec";

useEffect(()=>{ fetchInitialData(); },[]);

const fetchInitialData=async()=>{
setLoading(true);
try{
const resp=await fetch(`${API_URL}?action=getAllAssets`);
const json=await resp.json();
setAllAssets(json.assets || []);
}catch(e){console.error(e)}
finally{setLoading(false);}
};


/* ===== จุดที่แก้ (1 จุดเท่านั้น) ===== */

const filteredAssets = useMemo(() => {
    const term = searchTerm.trim().toLowerCase();
    if (!term) return [];
    return allAssets.filter(asset => 
        String(asset.AssetID || "").toLowerCase().endsWith(term)
    ).slice(0, 30); 
}, [searchTerm, allAssets]);

/* ==================================== */

return(
<div className="flex flex-col min-h-screen max-w-md mx-auto bg-white">

<header className="header-pink-vibrant p-5">
<h1 className="header-title text-lg font-black">
ระบบตรวจสอบครุภัณฑ์คอมพิวเตอร์
</h1>
</header>

{showSearch && (
<div className="sticky-search-container">
<div className="glass-search-card flex items-center px-4 py-3 gap-3">
<Icon name="search"/>
<input 
type="text"
className="flex-1 bg-transparent outline-none font-black"
placeholder="ระบุรหัสครุภัณฑ์เพื่อตรวจสอบ..."
value={searchTerm}
onChange={(e)=>{
setSearchTerm(e.target.value);
if(view!=='search') setView('search');
}}
/>
</div>
</div>
)}

<main className="flex-1 p-4 pb-24">

{view==='search' && (
<div className="space-y-3">
{filteredAssets.map((asset,i)=>(
<div key={i} className="p-4 border rounded-xl">
<p className="text-pink-500 font-bold">{asset.AssetID}</p>
<p className="font-bold text-lg">{asset.itemName}</p>
</div>
))}
</div>
)}

</main>

<div className="nav-container">
<nav className="nav-bar">

<button onClick={()=>{
setView('dashboard');
setShowSearch(false);
}}>
<Icon name="home"/>
</button>

<button onClick={()=>{
setShowSearch(true);
setView('search');
}}>
<Icon name="search"/>
</button>

</nav>
</div>

</div>
);
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);

</script>
</body>
</html>
