<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบตรวจสอบข้อมูลครุภัณฑ์คอมพิวเตอร์ - โรงพยาบาลอุดรธานี</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://img2.pic.in.th/-227e4f6f84f29f020.png">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sarabun: ['Sarabun', 'sans-serif'],
                    },
                    colors: {
                        hospital: {
                            lightPink: '#fdf2f8', // pink-50
                            softPink: '#ffc107',  // pink-200
                            primary: '#e91e63',   // new primary color
                            accent: '#db2777',    // pink-600
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@100;300;400;700;800&display=swap" rel="stylesheet">
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- QR Code Scanner Library -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Sarabun', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #fff9fb; position: relative; min-height: 100vh; }
        .animate-spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .icon-container { display: inline-flex; align-items: center; justify-content: center; vertical-align: middle; }
        
        /* New Header Gradient: #e91e63 from top-left diagonally */
        .header-soft-gradient {
            background: linear-gradient(135deg, #e91e63 0%, #f06292 100%);
        }
        
        .glass-nav {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }
        
        .search-shadow {
            box-shadow: 0 10px 25px -5px rgba(233, 30, 99, 0.15);
        }

        .active-tab {
            background-color: #fdf2f8;
            color: #e91e63;
            transform: scale(1.1);
        }

        /* Highlight Style */
        .highlight {
            background-color: #fce7f3;
            color: #db2777;
            padding: 0 2px;
            border-radius: 4px;
            font-weight: 800;
        }

        /* Watermark Background */
        .watermark-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            opacity: 0.03;
            user-select: none;
        }
        .watermark-item {
            font-size: 24px;
            font-weight: 800;
            transform: rotate(-30deg);
            padding: 50px;
            white-space: nowrap;
        }
    </style>
</head>
<body class="text-slate-700">
    <!-- ลายน้ำพื้นหลัง -->
    <div class="watermark-container">
        {[...Array(15)].map((_, i) => (
            <div key={i} className="watermark-item">ช่างคอม ทีม</div>
        ))}
    </div>

    <div id="root" style="position: relative; z-index: 1;"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const Icon = ({ name, className = "", size = 24 }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({
                        attrs: { class: className, style: `width: ${size}px; height: ${size}px;` },
                        nameAttr: 'data-lucide'
                    });
                }
            }, [name, className, size]);
            return <span ref={iconRef} className="icon-container"></span>;
        };

        const HighlightText = ({ text, highlight }) => {
            if (!highlight || !highlight.trim()) return <span>{text}</span>;
            const regex = new RegExp(`(${highlight})`, 'gi');
            const parts = text.split(regex);
            return (
                <span>
                    {parts.map((part, i) => 
                        regex.test(part) ? <mark key={i} className="highlight">{part}</mark> : <span key={i}>{part}</span>
                    )}
                </span>
            );
        };

        const App = () => {
            const [view, setView] = useState('dashboard');
            const [allAssets, setAllAssets] = useState([]);
            const [loading, setLoading] = useState(true);
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedAsset, setSelectedAsset] = useState(null);
            const [modalOpen, setModalOpen] = useState(false);
            const [isScanning, setIsScanning] = useState(false);
            
            const scannerRef = useRef(null);
            const LOGO_URL = "https://img2.pic.in.th/-227e4f6f84f29f020.png";
            const API_URL = "https://script.google.com/macros/s/AKfycbzhlc0yAeCjPvX6uwtXyFPxQWFk2llo-Yc7KWIsFkXGbl3EtAUjMZPY38TN4Hi2SoI/exec";

            useEffect(() => {
                fetchData();
            }, []);

            const fetchData = async () => {
                setLoading(true);
                try {
                    const resp = await fetch(`${API_URL}?action=getAllAssets`);
                    const data = await resp.json();
                    setAllAssets(data.assets || []);
                } catch (err) { 
                    console.error("Fetch Error:", err); 
                    setAllAssets([]);
                }
                finally { setLoading(false); }
            };

            const handleViewDetail = async (noid) => {
                setLoading(true);
                try {
                    const resp = await fetch(`${API_URL}?action=getAsset&noid=${noid}`);
                    const data = await resp.json();
                    if (data.success) {
                        setSelectedAsset(data);
                        setModalOpen(true);
                    }
                } catch (err) { console.error(err); }
                finally { setLoading(false); }
            };

            const startScanner = () => {
                setIsScanning(true);
                setTimeout(() => {
                    const html5QrCode = new Html5Qrcode("reader");
                    scannerRef.current = html5QrCode;
                    html5QrCode.start(
                        { facingMode: "environment" }, 
                        { fps: 10, qrbox: 250 }, 
                        (decodedText) => {
                            stopScanner();
                            const found = allAssets.find(a => a.AssetID === decodedText || a.NOID.toString() === decodedText);
                            if (found) {
                                handleViewDetail(found.NOID);
                            } else {
                                setView('search');
                                setSearchTerm(decodedText);
                            }
                        },
                        () => {}
                    ).catch(() => setIsScanning(false));
                }, 300);
            };

            const stopScanner = () => {
                if (scannerRef.current) {
                    scannerRef.current.stop().then(() => setIsScanning(false));
                } else setIsScanning(false);
            };

            const filteredAssets = useMemo(() => {
                if (!searchTerm.trim()) return [];
                const term = searchTerm.toLowerCase();
                return allAssets.filter(asset => 
                    (asset.AssetID || "").toString().toLowerCase().includes(term)
                ).slice(0, 20);
            }, [searchTerm, allAssets]);

            const stats = useMemo(() => {
                const normal = allAssets.filter(a => a.maStatus === 'ปกติ' || a.maStatus === 'ใช้งานได้').length;
                const repair = allAssets.filter(a => ['ชำรุด', 'รอซ่อม', 'แจ้งซ่อม'].includes(a.maStatus)).length;
                return { normal, repair, total: allAssets.length };
            }, [allAssets]);

            return (
                <div className="min-h-screen pb-32">
                    {loading && (
                        <div className="fixed inset-0 bg-white/70 backdrop-blur-md z-[9999] flex flex-col items-center justify-center">
                            <div className="w-10 h-10 border-4 border-pink-100 border-t-pink-500 rounded-full animate-spin"></div>
                        </div>
                    )}

                    {isScanning && (
                        <div className="fixed inset-0 z-[10001] bg-black flex flex-col items-center justify-center p-6">
                            <div id="reader" className="w-full max-w-md rounded-3xl overflow-hidden border-4 border-pink-400"></div>
                            <button onClick={stopScanner} className="mt-8 bg-white px-8 py-3 rounded-full font-bold">ยกเลิก</button>
                        </div>
                    )}

                    {/* Header: ไล่เฉดสีทแยงมุมด้วย #e91e63 */}
                    <header className="header-soft-gradient pt-10 pb-20 px-6 rounded-b-[4rem] shadow-lg">
                        <div className="max-w-4xl mx-auto">
                            <div className="flex justify-between items-start">
                                <div className="flex items-center gap-4">
                                    <div className="bg-white p-1 rounded-2xl shadow-md w-14 h-14 flex items-center justify-center">
                                        <img src={LOGO_URL} className="w-full h-full object-contain" alt="Logo" />
                                    </div>
                                    <div>
                                        <h1 className="text-xl font-black text-white leading-none">โรงพยาบาลอุดรธานี</h1>
                                        <p className="text-[9px] font-bold text-pink-100 uppercase tracking-widest mt-1">UDONTHANI HOSPITAL</p>
                                    </div>
                                </div>
                                <button className="bg-white/20 p-2.5 rounded-2xl text-white shadow-sm backdrop-blur-sm">
                                    <Icon name="settings" size={20} />
                                </button>
                            </div>
                            <div className="mt-8 pl-4 border-l-4 border-white">
                                <h2 className="text-lg font-black text-white">ระบบตรวจสอบข้อมูลครุภัณฑ์</h2>
                                <p className="text-[10px] font-bold text-pink-100 mt-1 uppercase">Medical IT Department</p>
                            </div>
                        </div>
                    </header>

                    <main className="px-5 -mt-10 max-w-4xl mx-auto space-y-6 relative z-10">
                        {view === 'dashboard' ? (
                            <div className="grid grid-cols-2 gap-4 animate-in fade-in slide-in-from-bottom-4 duration-500">
                                <div className="bg-white p-6 rounded-[2.5rem] shadow-sm border border-pink-50 flex flex-col items-center">
                                    <div className="bg-green-50 text-green-500 p-3 rounded-2xl mb-2"><Icon name="check-circle" size={24} /></div>
                                    <p className="text-[10px] font-bold text-slate-400 uppercase">ปกติ</p>
                                    <h3 className="text-3xl font-black text-slate-800">{stats.normal}</h3>
                                </div>
                                <div className="bg-white p-6 rounded-[2.5rem] shadow-sm border border-pink-50 flex flex-col items-center">
                                    <div className="bg-rose-50 text-rose-500 p-3 rounded-2xl mb-2"><Icon name="alert-circle" size={24} /></div>
                                    <p className="text-[10px] font-bold text-slate-400 uppercase">แจ้งซ่อม</p>
                                    <h3 className="text-3xl font-black text-rose-500">{stats.repair}</h3>
                                </div>
                                <div onClick={() => setView('search')} className="col-span-2 bg-white p-6 rounded-[2.5rem] shadow-xl shadow-pink-100/50 flex items-center justify-between cursor-pointer border border-pink-50">
                                    <div className="flex items-center gap-4">
                                        <div className="bg-[#e91e63] text-white p-4 rounded-3xl shadow-lg shadow-pink-200"><Icon name="search" size={24} /></div>
                                        <div>
                                            <h4 className="font-black text-slate-800 text-lg">ค้นหาข้อมูล</h4>
                                            <p className="text-slate-400 text-[10px] font-bold uppercase">Search by Asset ID</p>
                                        </div>
                                    </div>
                                    <Icon name="arrow-right" className="text-pink-300" size={20} />
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-5 animate-in fade-in slide-in-from-bottom-4 duration-500">
                                <div className="relative search-shadow">
                                    <input
                                        type="text"
                                        placeholder="ระบุรหัสครุภัณฑ์..."
                                        className="w-full p-5 pl-14 rounded-full bg-white border-2 border-transparent shadow-xl focus:border-[#e91e63] outline-none font-bold text-slate-600"
                                        value={searchTerm}
                                        onChange={(e) => setSearchTerm(e.target.value)}
                                    />
                                    <span className="absolute left-6 top-1/2 -translate-y-1/2 text-[#e91e63]"><Icon name="search" size={20} /></span>
                                </div>
                                
                                <div className="bg-white rounded-[2.5rem] shadow-xl overflow-hidden border border-pink-50">
                                    <div className="bg-pink-50/50 px-6 py-4 flex justify-between">
                                        <span className="text-[10px] font-black text-[#e91e63] uppercase tracking-widest">AssetID</span>
                                        <span className="text-[10px] font-black text-[#e91e63] uppercase tracking-widest">Action</span>
                                    </div>
                                    <div className="divide-y divide-pink-50">
                                        {filteredAssets.length > 0 ? filteredAssets.map((asset, idx) => (
                                            <div key={idx} className="p-6 flex items-center justify-between hover:bg-pink-50/20 transition-colors">
                                                <div>
                                                    <p className="font-mono font-black text-slate-600 text-sm">
                                                        <HighlightText text={asset.AssetID || ""} highlight={searchTerm} />
                                                    </p>
                                                    <p className="text-sm font-bold text-slate-800 line-clamp-1">{asset.itemName}</p>
                                                </div>
                                                <button onClick={() => handleViewDetail(asset.NOID)} className="bg-[#e91e63] text-white w-10 h-10 rounded-2xl flex items-center justify-center shadow-lg active:scale-90 transition-transform">
                                                    <Icon name="chevron-right" size={20} />
                                                </button>
                                            </div>
                                        )) : (
                                            <div className="p-20 text-center text-slate-300 font-bold italic">ไม่พบข้อมูล</div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Navigation Bar */}
                    <nav className="fixed bottom-8 left-8 right-8 glass-nav border border-white shadow-2xl flex justify-between items-center px-10 py-5 rounded-full z-50">
                        <button 
                            onClick={() => { setView('dashboard'); setSearchTerm(''); }} 
                            className={`p-3 rounded-2xl transition-all duration-300 ${view === 'dashboard' ? 'active-tab shadow-sm' : 'text-slate-300 hover:text-pink-300'}`}
                        >
                            <Icon name="layout-grid" size={26} />
                        </button>
                        
                        <div className="absolute left-1/2 -translate-x-1/2 -top-10">
                            <button 
                                onClick={startScanner}
                                className="bg-gradient-to-tr from-[#e91e63] to-rose-400 p-6 rounded-[2.2rem] text-white shadow-2xl shadow-pink-200 border-4 border-white active:scale-90 transition-transform"
                            >
                                <Icon name="qr-code" size={32} />
                            </button>
                        </div>
                        
                        <button 
                            onClick={() => setView('search')} 
                            className={`p-3 rounded-2xl transition-all duration-300 ${view === 'search' ? 'active-tab shadow-sm' : 'text-slate-300 hover:text-pink-300'}`}
                        >
                            <Icon name="search" size={26} />
                        </button>
                    </nav>

                    {/* Modal Details */}
                    {modalOpen && selectedAsset && (
                        <div className="fixed inset-0 z-[10000] flex items-end sm:items-center justify-center bg-slate-900/40 backdrop-blur-sm p-4 animate-in fade-in duration-300">
                            <div className="bg-white w-full max-w-lg rounded-[3rem] p-8 max-h-[85vh] overflow-y-auto shadow-2xl animate-in slide-in-from-bottom-8">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="text-xl font-black text-slate-800">รายละเอียด</h3>
                                    <button onClick={() => setModalOpen(false)} className="bg-slate-100 p-2 rounded-xl text-slate-400 hover:text-rose-500 transition-colors">
                                        <Icon name="x" size={20} />
                                    </button>
                                </div>
                                <div className="space-y-6">
                                    <div className="aspect-video bg-pink-50 rounded-[2.5rem] overflow-hidden border-4 border-white shadow-inner">
                                        <img src={selectedAsset.imgUrl || "https://via.placeholder.com/600x450?text=No+Image"} className="w-full h-full object-cover" alt="Asset" />
                                    </div>
                                    <div>
                                        <h2 className="text-2xl font-black text-slate-800 leading-tight">{selectedAsset.itemName}</h2>
                                        <div className="flex gap-2 mt-3">
                                            <span className="bg-pink-100 text-[#e91e63] px-3 py-1 rounded-lg text-xs font-black italic">ID: {selectedAsset.AssetID}</span>
                                            <span className={`px-3 py-1 rounded-lg text-xs font-black uppercase ${selectedAsset.maStatus === 'ปกติ' ? 'bg-green-100 text-green-600' : 'bg-rose-100 text-rose-600'}`}>
                                                {selectedAsset.maStatus}
                                            </span>
                                        </div>
                                    </div>
                                    <div className="bg-pink-50/30 p-6 rounded-[2.5rem] border border-pink-100">
                                        <p className="text-[10px] font-black text-pink-400 uppercase mb-2 tracking-widest">Specification</p>
                                        <p className="text-sm text-slate-600 leading-relaxed font-bold">{selectedAsset.spec || "ไม่มีข้อมูล"}</p>
                                    </div>
                                    <button onClick={() => setModalOpen(false)} className="w-full bg-[#e91e63] text-white py-5 rounded-full font-black shadow-lg shadow-pink-100 active:scale-95 transition-transform">ตกลง</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
