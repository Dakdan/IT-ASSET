<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบตรวจสอบครุภัณฑ์คอมพิวเตอร์ - โรงพยาบาลอุดรธานี</title>
    
    <link rel="icon" type="image/png" href="https://img2.pic.in.th/-227e4f6f84f29f020.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sarabun: ['Sarabun', 'sans-serif'] },
                    colors: {
                        hospital: { primary: '#e91e63', accent: '#db2777', light: '#fdf2f8' }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@100;300;400;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { 
            font-family: 'Sarabun', sans-serif; 
            background: linear-gradient(180deg, #f0f4f8 0%, #e2e8f0 100%); 
            min-height: 100vh; 
            margin: 0; 
        }
        /* Header */
        .header-pink { 
            background: linear-gradient(135deg, #d81b60 0%, #ad1457 50%, #880e4f 100%); 
            border-bottom-left-radius: 24px;
            border-bottom-right-radius: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            border-bottom: 4px solid #880e4f;
        }
        .glass-card { 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px); 
            border: 2px solid #e91e63;
        }
        
        .sticky-search {
            position: sticky;
            top: 80px;
            z-index: 40;
            background: transparent;
            padding-bottom: 1rem;
        }

        .highlight-match { 
            color: #ffffff; 
            font-weight: 800; 
            background-color: #e91e63;
            padding: 0 4px;
            border-radius: 4px;
        }
        
        .scan-fab { 
            background: linear-gradient(135deg, #ff4081 0%, #e91e63 100%); 
            color: white; 
            width: 72px; 
            height: 72px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-radius: 50%; 
            box-shadow: 0 10px 25px rgba(233, 30, 99, 0.5);
            border: 4px solid #ffffff;
            position: absolute;
            top: -36px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .nav-container { position: fixed; bottom: 0; left: 0; right: 0; padding: 16px; display: flex; justify-content: center; z-index: 1000; }
        .nav-bar { 
            width: 100%; 
            max-width: 420px; 
            height: 72px; 
            border-radius: 32px; 
            position: relative; 
            background: rgba(15, 23, 42, 0.98); 
            border: 3px solid #334155;
            backdrop-filter: blur(15px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }
        
        .active-nav { color: #f472b6; filter: drop-shadow(0 0 8px rgba(244, 114, 182, 0.5)); }
        .inactive-nav { color: #94a3b8; }

        /* Dashboard Table Colors - New Neon Styles */
        .dash-table th { 
            padding: 14px 8px; 
            font-size: 0.75rem; 
            font-weight: 900;
            text-transform: uppercase;
            border-bottom: 4px solid rgba(0,0,0,0.1);
        }
        
        /* Column Specific Colors */
        .col-opd { background-color: #00ff88; color: #004d2c; } /* Neon Green */
        .col-ipd { background-color: #00d4ff; color: #00404d; } /* Neon Blue */
        .col-backoffice { background-color: #ffaa00; color: #4d3300; } /* Neon Orange/Gold */
        .col-group { background-color: #f8fafc; color: #475569; text-align: left !important; padding-left: 16px !important; }

        .dash-table td { 
            padding: 12px 8px; 
            font-size: 0.85rem; 
            font-weight: 700;
            border-bottom: 2px solid #f1f5f9; 
            border-right: 1px solid rgba(0,0,0,0.05);
            text-align: center; 
        }

        /* Asset Card */
        .asset-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid #f472b6;
            background: white;
        }

        /* Scan Overlay */
        .scan-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 11000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .scan-frame {
            width: 260px;
            height: 260px;
            border: 4px solid #e91e63;
            position: relative;
            border-radius: 24px;
            overflow: hidden;
        }
        .scan-line {
            width: 100%;
            height: 3px;
            background: #ff4081;
            position: absolute;
            top: 0;
            left: 0;
            box-shadow: 0 0 20px #ff4081;
            animation: scanAnim 2s infinite linear;
        }
        @keyframes scanAnim {
            0% { top: 0; }
            50% { top: 100%; }
            100% { top: 0; }
        }

        @media (min-width: 1024px) {
            .asset-grid {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const Icon = ({ name, className = "", size = 24, onClick }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({
                        attrs: { class: className, style: `width: ${size}px; height: ${size}px;` },
                        nameAttr: 'data-lucide'
                    });
                }
            }, [name, className, size]);
            return <span ref={iconRef} className={`inline-flex items-center justify-center ${onClick ? 'cursor-pointer' : ''}`} onClick={onClick}></span>;
        };

        const App = () => {
            const [view, setView] = useState('dashboard');
            const [allAssets, setAllAssets] = useState([]);
            const [dashData, setDashData] = useState([]);
            const [loading, setLoading] = useState(true);
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedAsset, setSelectedAsset] = useState(null);
            const [modalOpen, setModalOpen] = useState(false);
            const [alertMsg, setAlertMsg] = useState('');
            const [isScanning, setIsScanning] = useState(false);
            
            const API_URL = "https://script.google.com/macros/s/AKfycbzhlc0yAeCjPvX6uwtXyFPxQWFk2llo-Yc7KWIsFkXGbl3EtAUjMZPY38TN4Hi2SoI/exec";

            useEffect(() => {
                fetchInitialData();
            }, []);

            const fetchInitialData = async () => {
                setLoading(true);
                try {
                    const [assetsResp, dashResp] = await Promise.all([
                        fetch(`${API_URL}?action=getAllAssets`),
                        fetch(`${API_URL}?action=getDashboard`)
                    ]);
                    const assets = await assetsResp.json();
                    const dash = await dashResp.json();
                    setAllAssets(Array.isArray(assets) ? assets : (assets.assets || []));
                    setDashData(dash || []);
                } catch (err) { 
                    console.error(err); 
                } finally { 
                    setLoading(false); 
                }
            };

            const handleViewDetail = async (noid) => {
                setLoading(true);
                try {
                    const resp = await fetch(`${API_URL}?action=getAsset&noid=${noid}`);
                    const data = await resp.json();
                    if (data && data.success) {
                        setSelectedAsset(data);
                        setModalOpen(true);
                    }
                } catch (err) { 
                    console.error("Fetch error:", err); 
                } finally { 
                    setLoading(false); 
                }
            };

            const showDevAlert = (msg = 'ระบบอยู่ในขั้นตอนพัฒนา จะสามารถใช้งานได้เร็วๆ นี้') => {
                setAlertMsg(msg);
                setTimeout(() => setAlertMsg(''), 3000);
            };

            const handleScanClick = () => {
                setIsScanning(true);
                setTimeout(() => {
                    setIsScanning(false);
                    showDevAlert('ไม่สามารถเข้าถึงกล้องได้ในขณะนี้ กรุณาตรวจสอบสิทธิ์การเข้าถึง');
                }, 3500);
            };

            const filteredAssets = useMemo(() => {
                const term = searchTerm.trim().toLowerCase();
                if (!term) return [];
                const filtered = allAssets.filter(asset => String(asset.AssetID || "").toLowerCase().includes(term));
                return filtered.slice(0, 50); 
            }, [searchTerm, allAssets]);

            const highlightText = (text, target) => {
                if (!target.trim()) return text;
                const fullText = String(text);
                const parts = fullText.split(new RegExp(`(${target})`, 'gi'));
                return parts.map((part, i) => 
                    part.toLowerCase() === target.toLowerCase() 
                    ? <span key={i} className="highlight-match">{part}</span> 
                    : part
                );
            };

            const DetailRow = ({ label, value, icon, highlight = false }) => (
                <div className={`py-3.5 border-b-2 border-slate-100 ${highlight ? 'bg-gradient-to-r from-pink-50 to-transparent px-4 rounded-2xl border-l-4 border-l-pink-500' : ''}`}>
                    <div className="flex items-center gap-2 mb-1">
                        {icon && <Icon name={icon} size={12} className="text-pink-400" />}
                        <p className="text-[10px] font-bold text-pink-400 uppercase tracking-widest">{label}</p>
                    </div>
                    <p className={`text-[13px] font-bold ${highlight ? 'text-hospital-primary' : 'text-slate-700'} pl-5`}>
                        {value || "-"}
                    </p>
                </div>
            );

            return (
                <div className="flex flex-col min-h-screen">
                    {loading && (
                        <div className="fixed inset-0 bg-white/80 backdrop-blur-md z-[9999] flex items-center justify-center">
                            <div className="flex flex-col items-center gap-4">
                                <div className="w-14 h-14 border-4 border-pink-100 border-t-pink-500 rounded-full animate-spin shadow-inner"></div>
                                <p className="text-pink-500 font-bold text-sm animate-pulse tracking-wide">กำลังเข้าถึงข้อมูลระบบ...</p>
                            </div>
                        </div>
                    )}

                    {isScanning && (
                        <div className="scan-overlay animate-in fade-in duration-300">
                            <div className="mb-10 text-center">
                                <Icon name="qr-code" size={48} className="text-pink-500 mb-4" />
                                <h2 className="text-xl font-black tracking-tight">สแกน QR Code ครุภัณฑ์</h2>
                                <p className="text-xs text-slate-400 font-bold mt-1">วางรหัส QR Code ให้อยู่ในกรอบ</p>
                            </div>
                            <div className="scan-frame shadow-[0_0_50px_rgba(233,30,99,0.3)]">
                                <div className="scan-line"></div>
                                <div className="w-full h-full flex items-center justify-center bg-slate-800">
                                     <Icon name="camera" size={40} className="text-slate-600 animate-pulse" />
                                </div>
                            </div>
                            <button onClick={() => setIsScanning(false)} className="mt-12 bg-white/10 hover:bg-white/20 px-8 py-3 rounded-full font-bold text-sm border-2 border-white/20 backdrop-blur transition-all">
                                ยกเลิกการสแกน
                            </button>
                        </div>
                    )}

                    <header className="header-pink px-5 py-6 text-white sticky top-0 z-50">
                        <div className="max-w-6xl mx-auto flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <div className="w-12 h-12 bg-white rounded-2xl p-1 shadow-lg flex-shrink-0 flex items-center justify-center border-2 border-pink-200">
                                    <img src="https://img2.pic.in.th/-227e4f6f84f29f020.png" className="w-full h-full object-contain" />
                                </div>
                                <div className="overflow-hidden">
                                    <h1 className="text-base font-black leading-tight text-white drop-shadow-sm truncate">โรงพยาบาลอุดรธานี</h1>
                                    <p className="text-[10px] opacity-95 font-bold tracking-wider uppercase text-pink-100 truncate flex items-center gap-1">
                                        <Icon name="building-2" size={10} /> กลุ่มงาน : เทคโนโลยีสารสนเทศทางการแพทย์
                                    </p>
                                </div>
                            </div>
                            <button onClick={fetchInitialData} className="w-10 h-10 bg-white/10 hover:bg-white/20 rounded-full flex items-center justify-center transition-all border-2 border-white/30">
                                <Icon name="rotate-cw" size={20} className="text-white" />
                            </button>
                        </div>
                    </header>

                    <main className="flex-1 px-4 pt-6 pb-32 max-w-6xl mx-auto w-full">
                        {view === 'dashboard' ? (
                            <div className="space-y-6 animate-in fade-in duration-500">
                                <div className="flex items-center justify-between px-1">
                                    <div className="flex items-center gap-2">
                                        <Icon name="bar-chart-3" size={20} className="text-pink-500" />
                                        <h2 className="text-xl font-black text-slate-800 tracking-tight">สรุปข้อมูลภาพรวม</h2>
                                    </div>
                                    <div className="bg-white border-2 border-pink-400 text-pink-600 px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest shadow-sm">Dashboard</div>
                                </div>

                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
                                    {[
                                        { label: "รวมครุภัณฑ์", val: allAssets.length.toLocaleString(), unit: "ชิ้น", icon: "monitor", color: "blue", border: "border-blue-500" },
                                        { label: "กำลังใช้งาน", val: "100", unit: "%", icon: "activity", color: "pink", border: "border-pink-500" },
                                        { label: "สถานะปกติ", val: "98.5", unit: "%", icon: "check-circle", color: "green", border: "border-green-500" }
                                    ].map((stat, i) => (
                                        <div key={i} className={`bg-white p-6 rounded-[32px] shadow-sm flex items-center gap-5 border-2 ${stat.border}`}>
                                            <div className={`w-14 h-14 bg-${stat.color}-50 text-${stat.color}-500 rounded-[22px] flex items-center justify-center flex-shrink-0 border-2 border-${stat.color}-100`}>
                                                <Icon name={stat.icon} size={28} />
                                            </div>
                                            <div>
                                                <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-0.5">{stat.label}</p>
                                                <p className="text-2xl font-black text-slate-800">{stat.val} <span className="text-sm font-bold text-slate-300 ml-1">{stat.unit}</span></p>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <div className="bg-white rounded-[36px] shadow-sm border-4 border-slate-800 overflow-hidden">
                                    <div className="p-5 bg-slate-800 flex items-center justify-between">
                                        <div className="flex items-center gap-2 text-white">
                                            <Icon name="list-checks" size={18} className="text-pink-400" />
                                            <span className="text-[11px] font-black tracking-widest uppercase">สถิติจำแนกตามกลุ่มงานระดับสเปค</span>
                                        </div>
                                    </div>
                                    <div className="overflow-x-auto">
                                        <table className="dash-table w-full border-collapse">
                                            <thead>
                                                <tr>
                                                    <th className="col-group border-r-4 border-slate-200">กลุ่มลำดับ</th>
                                                    <th className="col-opd">OPD</th>
                                                    <th className="col-ipd">IPD</th>
                                                    <th className="col-backoffice">Back Office</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {dashData.map((row, idx) => {
                                                    const isTotal = row.PIORITY_NAME === 'รวม';
                                                    return (
                                                        <tr key={idx} className={isTotal ? 'bg-slate-100 font-black' : 'hover:bg-slate-50'}>
                                                            <td className="col-group font-bold border-r-4 border-slate-200">{row.PIORITY_NAME}</td>
                                                            <td className="bg-[#00ff88]/10 text-[#004d2c] border-r border-white">{row.OPD}</td>
                                                            <td className="bg-[#00d4ff]/10 text-[#00404d] border-r border-white">{row.IPD}</td>
                                                            <td className="bg-[#ffaa00]/10 text-[#4d3300]">{row['Back Office']}</td>
                                                        </tr>
                                                    );
                                                })}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-4 animate-in slide-in-from-right duration-300">
                                <div className="sticky-search">
                                    <div className="relative glass-card rounded-[24px] shadow-2xl overflow-hidden border-4 border-pink-600">
                                        <span className="absolute left-5 top-1/2 -translate-y-1/2 text-pink-500">
                                            <Icon name="search" size={22} />
                                        </span>
                                        <input 
                                            autoFocus
                                            type="text" 
                                            className="w-full py-6 pl-14 pr-14 outline-none font-bold text-slate-800 placeholder:text-slate-400 bg-transparent text-base"
                                            placeholder="ระบุเลขรหัสครุภัณฑ์..."
                                            value={searchTerm}
                                            onChange={(e) => setSearchTerm(e.target.value)}
                                        />
                                    </div>
                                </div>

                                <div className="asset-grid space-y-4 lg:space-y-0 pb-10">
                                    {filteredAssets.length > 0 ? (
                                        filteredAssets.map((asset, idx) => (
                                            <div key={idx} 
                                                 onClick={() => handleViewDetail(asset.NOID)}
                                                 className="asset-card p-6 rounded-[30px] flex items-center justify-between group cursor-pointer shadow-sm border-2 border-pink-400">
                                                <div className="flex-1 pr-6 overflow-hidden">
                                                    <div className="flex items-center gap-2 mb-2">
                                                        <div className="w-2.5 h-2.5 rounded-full bg-pink-500"></div>
                                                        <span className="text-[12px] font-black text-slate-500 font-mono tracking-wider">
                                                            {highlightText(asset.AssetID, searchTerm)}
                                                        </span>
                                                    </div>
                                                    <p className="text-[14px] font-black text-slate-800 leading-tight">
                                                        {asset.itemName}
                                                    </p>
                                                </div>
                                                <div className="w-10 h-10 bg-pink-50 text-pink-500 rounded-xl flex items-center justify-center border-2 border-pink-100">
                                                    <Icon name="chevron-right" size={20} />
                                                </div>
                                            </div>
                                        ))
                                    ) : null}
                                </div>
                            </div>
                        )}
                    </main>

                    <div className="nav-container">
                        <nav className="nav-bar flex items-center justify-around px-8 relative">
                            <button onClick={() => setView('dashboard')} className={`flex flex-col items-center gap-1.5 transition-all ${view === 'dashboard' ? 'active-nav scale-110' : 'inactive-nav'}`}>
                                <Icon name="layout-dashboard" size={24} />
                                <span className="text-[9px] font-black uppercase tracking-tighter">Summary</span>
                            </button>
                            
                            <div className="scan-fab border-4 border-white" onClick={handleScanClick}>
                                <Icon name="qr-code" size={32} />
                            </div>

                            <button onClick={() => setView('search')} className={`flex flex-col items-center gap-1.5 transition-all ${view === 'search' ? 'active-nav scale-110' : 'inactive-nav'}`}>
                                <Icon name="zoom-in" size={24} />
                                <span className="text-[9px] font-black uppercase tracking-tighter">Verify</span>
                            </button>
                        </nav>
                    </div>

                    {modalOpen && selectedAsset && (
                        <div className="fixed inset-0 z-[10000] bg-slate-900/70 backdrop-blur-md flex items-end sm:items-center justify-center p-0 sm:p-4">
                            <div className="bg-white w-full max-w-xl rounded-t-[48px] sm:rounded-[48px] overflow-hidden flex flex-col max-h-[92vh] shadow-2xl border-t-8 border-pink-600">
                                <div className="p-7 flex justify-between items-center border-b-2 border-slate-100">
                                    <div className="flex items-center gap-4">
                                        <div className="w-2 h-8 bg-pink-500 rounded-full"></div>
                                        <div>
                                            <h3 className="text-lg font-black text-slate-800">ข้อมูลครุภัณฑ์แบบละเอียด</h3>
                                            <p className="text-[10px] text-slate-400 font-black uppercase mt-1 tracking-widest">Digital Asset Specification</p>
                                        </div>
                                    </div>
                                    <button onClick={() => setModalOpen(false)} className="w-10 h-10 flex items-center justify-center bg-slate-50 rounded-xl border-2 border-slate-100">
                                        <Icon name="x" size={20} />
                                    </button>
                                </div>
                                
                                <div className="p-7 overflow-y-auto space-y-6 pb-10">
                                    <div className="aspect-video bg-slate-100 rounded-[36px] overflow-hidden border-4 border-pink-200 shadow-inner flex items-center justify-center">
                                        {selectedAsset.imgUrl ? (
                                            <img src={selectedAsset.imgUrl} className="w-full h-full object-cover" alt="asset" />
                                        ) : (
                                            <Icon name="image-off" size={48} className="text-slate-300" />
                                        )}
                                    </div>

                                    <div className="space-y-1 bg-slate-50 p-4 rounded-[32px] border-2 border-slate-200">
                                        <DetailRow label="รหัสครุภัณฑ์" value={selectedAsset.AssetID} icon="hash" highlight={true} />
                                        <DetailRow label="ชื่อรายการ" value={selectedAsset.itemName} icon="monitor" highlight={true} />
                                        <DetailRow label="สเปค/ยี่ห้อ" value={selectedAsset.spec} icon="cpu" />
                                        <DetailRow label="สถานที่อยู่" value={selectedAsset.location} icon="map-pin" />
                                        <DetailRow label="อายุการใช้งาน" value={`${selectedAsset.age} ปี`} icon="clock" />
                                        
                                        {selectedAsset.logData && (
                                            <div className="mt-4 p-5 bg-white rounded-3xl border-2 border-pink-400 shadow-sm">
                                                <div className="flex items-center gap-2 mb-3">
                                                    <Icon name="clipboard-check" size={18} className="text-pink-500" />
                                                    <p className="text-[11px] font-black text-pink-500 uppercase tracking-widest">ข้อมูลการใช้งาน (Log)</p>
                                                </div>
                                                <p className="text-xs font-bold text-slate-500 mb-1 uppercase tracking-tighter">วัตถุประสงค์:</p>
                                                <p className="text-sm font-black text-slate-800 mb-3">{selectedAsset.logData.g}</p>
                                                <p className="text-xs font-bold text-slate-500 mb-1 uppercase tracking-tighter">ผู้ดูแล:</p>
                                                <p className="text-sm font-black text-slate-800">{selectedAsset.logData.i}</p>
                                            </div>
                                        )}
                                    </div>
                                    
                                    <div className="grid grid-cols-2 gap-4">
                                        <button onClick={() => showDevAlert()} className="bg-white border-4 border-pink-500 text-pink-500 py-4 rounded-2xl font-black text-sm flex items-center justify-center gap-2">
                                            <Icon name="edit-3" size={18} /> แก้ไข
                                        </button>
                                        <button onClick={() => showDevAlert()} className="bg-slate-800 text-white py-4 rounded-2xl font-black text-sm flex items-center justify-center gap-2 border-4 border-slate-700">
                                            <Icon name="printer" size={18} /> พิมพ์ QR
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {alertMsg && (
                        <div className="fixed top-24 left-1/2 -translate-x-1/2 z-[10001] bg-slate-800 text-white px-6 py-3 rounded-2xl shadow-2xl text-xs font-bold animate-bounce flex items-center gap-2 border-2 border-pink-500">
                            <Icon name="info" size={16} className="text-pink-400" />
                            {alertMsg}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
