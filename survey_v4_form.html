<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Asset Audit System - Udon Hospital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&family=Anuphan:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Anuphan', 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #ec4899;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .priority-box:checked + label, .shift-box:checked + label {
            background-color: #ec4899;
            color: white;
            border-color: #ec4899;
        }

        .pac-radio:checked + label {
            background-color: #1e293b;
            color: white;
            border-color: #1e293b;
        }

        .btn-disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(1); }
    </style>
</head>
<body class="pb-24">

    <!-- Header -->
    <header class="sticky top-0 z-40 bg-white/80 backdrop-blur-md border-b border-gray-100 p-4">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-lg font-bold text-gray-800">Asset Audit</h1>
                <p id="statusIndicator" class="text-[10px] font-bold text-pink-500 tracking-widest uppercase">Connecting...</p>
            </div>
            <div class="flex items-center gap-2">
                <span id="auditCount" class="bg-pink-500 text-white text-[10px] font-bold px-2 py-1 rounded-full">0</span>
                <button onclick="updateQueueUI(); document.getElementById('queueModal').classList.remove('hidden')" class="p-2 bg-gray-50 rounded-xl text-gray-400">
                    <i data-lucide="shopping-cart" class="w-5 h-5"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-6">

        <!-- Section 1: Location Picker -->
        <section id="locationPickerSection" class="space-y-4">
            <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-gray-50">
                <h2 class="text-sm font-bold text-gray-700 mb-4 flex items-center gap-2">
                    <i data-lucide="map-pin" class="w-4 h-4 text-pink-500"></i> เลือกสถานที่ตรวจสอบ
                </h2>
                <div class="space-y-3">
                    <select id="selBuilding" onchange="onBuildingChange()" class="w-full p-4 bg-gray-50 border-none rounded-2xl text-sm font-semibold text-gray-600 focus:ring-2 focus:ring-pink-500/20">
                        <option value="" disabled selected>-- เลือกอาคาร --</option>
                    </select>
                    <select id="selFloor" onchange="renderDeptList()" class="w-full p-4 bg-gray-50 border-none rounded-2xl text-sm font-semibold text-gray-600 focus:ring-2 focus:ring-pink-500/20">
                        <option value="" disabled selected>-- เลือกชั้น --</option>
                    </select>
                </div>
            </div>
            <div id="deptList" class="grid gap-2"></div>
        </section>

        <!-- Section 2: Selected Dept Header -->
        <section id="selectedDeptSection" class="hidden animate-in fade-in slide-in-from-top-4">
            <div class="bg-gradient-to-br from-pink-500 to-rose-500 p-6 rounded-[2.5rem] text-white shadow-lg shadow-pink-200 relative overflow-hidden">
                <div class="relative z-10">
                    <p class="text-[10px] font-bold opacity-80 uppercase tracking-widest mb-1">กำลังตรวจสอบหน่วยงาน</p>
                    <h2 id="displayDeptName" class="text-xl font-bold leading-tight mb-1">---</h2>
                    <p id="displayDeptLoc" class="text-xs opacity-90">---</p>
                </div>
                <button onclick="resetDeptSelection()" class="absolute top-6 right-6 p-2 bg-white/20 rounded-full backdrop-blur-md">
                    <i data-lucide="x" class="w-4 h-4"></i>
                </button>
            </div>
        </section>

        <!-- Section 3: Search & Add Non-Register Area -->
        <section id="searchAreaSection" class="hidden space-y-4">
            <div class="flex gap-2">
                <div class="relative flex-grow">
                    <input type="text" id="assetQuery" oninput="debouncedSearch()" placeholder="ค้นหา รหัสสินทรัพย์..." 
                        class="w-full p-5 pl-12 bg-white border border-gray-100 rounded-3xl shadow-sm text-sm font-semibold focus:ring-4 focus:ring-pink-500/5 transition-all">
                    <i data-lucide="search" class="absolute left-5 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-300"></i>
                </div>
                <button onclick="openScanner('assetQuery')" class="p-4 bg-pink-50 text-pink-500 rounded-3xl active:scale-90 transition-transform">
                    <i data-lucide="qr-code" class="w-6 h-6"></i>
                </button>
            </div>
            
            <button onclick="openNonRegisterModal()" class="w-full py-4 bg-gray-100 text-gray-600 rounded-3xl text-xs font-bold flex items-center justify-center gap-2 border border-dashed border-gray-300">
                <i data-lucide="plus-circle" class="w-4 h-4"></i> เพิ่มครุภัณฑ์นอกทะเบียน
            </button>

            <div id="resultsArea" class="hidden space-y-2"></div>
        </section>

    </main>

    <!-- Modal: Audit Form (For Existing Assets) -->
    <div id="auditFormModal" class="fixed inset-0 z-50 hidden bg-black/60 backdrop-blur-sm flex items-end">
        <div class="w-full bg-white rounded-t-[3rem] max-h-[92vh] overflow-y-auto p-8 animate-in slide-in-from-bottom-full duration-300">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <p id="modalAssetId" class="text-[10px] font-bold text-pink-500 tracking-widest uppercase">ASSET ID: ---</p>
                    <h3 id="modalAssetName" class="text-xl font-bold text-gray-800">Asset Name</h3>
                </div>
                <button onclick="closeModal('auditFormModal')" class="p-2 bg-gray-50 rounded-full text-gray-400"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>

            <div class="space-y-5">
                <!-- PAC System Radio -->
                <div>
                    <label class="text-[11px] font-bold text-gray-400 uppercase tracking-widest block mb-3">ใช้งานระบบ PAC?</label>
                    <div class="grid grid-cols-2 gap-2">
                        <input type="radio" id="pac_yes" name="is_pac" value="YES" class="hidden pac-radio">
                        <label for="pac_yes" class="block text-center p-3 rounded-2xl border border-gray-100 bg-gray-50 text-xs font-bold text-gray-500 cursor-pointer">ใช่ (แนบ /PAC)</label>
                        <input type="radio" id="pac_no" name="is_pac" value="NO" class="hidden pac-radio" checked>
                        <label for="pac_no" class="block text-center p-3 rounded-2xl border border-gray-100 bg-gray-50 text-xs font-bold text-gray-500 cursor-pointer">ไม่ใช่</label>
                    </div>
                </div>

                <div>
                    <label class="text-[11px] font-bold text-gray-400 uppercase tracking-widest block mb-2">ประเภทอุปกรณ์ (Asset Type ID)</label>
                    <select id="assetTypeId" class="w-full p-4 bg-gray-50 border-none rounded-2xl text-sm font-semibold text-gray-600 focus:ring-2 focus:ring-pink-500/20"></select>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[11px] font-bold text-gray-400 uppercase tracking-widest block mb-2">ลำดับความสำคัญ</label>
                        <select id="priorityId" class="w-full p-4 bg-gray-50 border-none rounded-2xl text-sm font-semibold text-gray-600 focus:ring-2 focus:ring-pink-500/20"></select>
                    </div>
                    <div>
                        <label class="text-[11px] font-bold text-gray-400 uppercase tracking-widest block mb-2">ช่วงเวลาทำงาน</label>
                        <select id="shiftWork" class="w-full p-4 bg-gray-50 border-none rounded-2xl text-sm font-semibold text-gray-600 focus:ring-2 focus:ring-pink-500/20">
                            <option value="เช้า">เช้า</option>
                            <option value="บ่าย">บ่าย</option>
                            <option value="ดึก">ดึก</option>
                            <option value="24 ชม.">24 ชม.</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="text-[11px] font-bold text-gray-400 uppercase tracking-widest block mb-2">หมายเหตุเพิ่มเติม (Note2)</label>
                    <textarea id="note2" rows="2" placeholder="ระบุรายละเอียดเพิ่มเติม..." class="w-full p-4 bg-gray-50 border-none rounded-2xl text-sm text-gray-600"></textarea>
                </div>

                <div class="grid grid-cols-2 gap-3 pt-4">
                    <button onclick="closeModal('auditFormModal')" class="py-4 bg-gray-100 text-gray-500 rounded-2xl font-bold">ยกเลิก</button>
                    <button onclick="submitAudit('EXISTING')" class="py-4 bg-pink-500 text-white rounded-2xl font-bold shadow-lg shadow-pink-100">บันทึก</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal: Add Non-Register Asset -->
    <div id="nonRegisterModal" class="fixed inset-0 z-50 hidden bg-black/60 backdrop-blur-sm flex items-end">
        <div class="w-full bg-white rounded-t-[3rem] max-h-[92vh] overflow-y-auto p-8 animate-in slide-in-from-bottom-full duration-300">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <p class="text-[10px] font-bold text-orange-500 tracking-widest uppercase">NEW ASSET</p>
                    <h3 class="text-xl font-bold text-gray-800">เพิ่มครุภัณฑ์นอกทะเบียน</h3>
                </div>
                <button onclick="closeModal('nonRegisterModal')" class="p-2 bg-gray-50 rounded-full text-gray-400"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="text-[11px] font-bold text-gray-400 uppercase tracking-widest block mb-2">รหัสครุภัณฑ์</label>
                    <input type="text" id="nr_asset_id" placeholder="Ex. 7440-001-XXXX" class="w-full p-4 bg-gray-50 border-none rounded-2xl text-sm font-semibold">
                </div>
                
                <div>
                    <label class="text-[11px] font-bold text-gray-400 uppercase tracking-widest block mb-2">Serial Number</label>
                    <div class="flex gap-2">
                        <input type="text" id="nr_serial" placeholder="S/N..." class="flex-grow p-4 bg-gray-50 border-none rounded-2xl text-sm font-semibold">
                        <button onclick="openScanner('nr_serial')" class="p-4 bg-gray-100 text-gray-500 rounded-2xl"><i data-lucide="scan" class="w-5 h-5"></i></button>
                    </div>
                </div>

                <div>
                    <label class="text-[11px] font-bold text-gray-400 uppercase tracking-widest block mb-2">ยี่ห้อ + รายละเอียด</label>
                    <input type="text" id="nr_brand_detail" placeholder="ยี่ห้อ, รุ่น, สเปค..." class="w-full p-4 bg-gray-50 border-none rounded-2xl text-sm font-semibold">
                </div>

                <div>
                    <label class="text-[11px] font-bold text-gray-400 uppercase tracking-widest block mb-3">ใช้งานระบบ PAC?</label>
                    <div class="grid grid-cols-2 gap-2">
                        <input type="radio" id="nr_pac_yes" name="nr_is_pac" value="YES" class="hidden pac-radio">
                        <label for="nr_pac_yes" class="block text-center p-3 rounded-2xl border border-gray-100 bg-gray-50 text-xs font-bold text-gray-500 cursor-pointer">ใช่ (แนบ /PAC)</label>
                        <input type="radio" id="nr_pac_no" name="nr_is_pac" value="NO" class="hidden pac-radio" checked>
                        <label for="nr_pac_no" class="block text-center p-3 rounded-2xl border border-gray-100 bg-gray-50 text-xs font-bold text-gray-500 cursor-pointer">ไม่ใช่</label>
                    </div>
                </div>

                <div>
                    <label class="text-[11px] font-bold text-gray-400 uppercase tracking-widest block mb-2">ประเภทอุปกรณ์</label>
                    <select id="nr_asset_type_id" class="w-full p-4 bg-gray-50 border-none rounded-2xl text-sm font-semibold text-gray-600"></select>
                </div>

                <div class="grid grid-cols-2 gap-3 pt-4">
                    <button onclick="closeModal('nonRegisterModal')" class="py-4 bg-gray-100 text-gray-500 rounded-2xl font-bold">ยกเลิก</button>
                    <button onclick="submitAudit('NON_REGISTER')" class="py-4 bg-orange-500 text-white rounded-2xl font-bold shadow-lg shadow-orange-100">บันทึกเพิ่ม</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal: Queue List -->
    <div id="queueModal" class="fixed inset-0 z-50 hidden bg-black/60 backdrop-blur-sm flex items-end">
        <div class="w-full bg-white rounded-t-[3rem] max-h-[80vh] overflow-y-auto p-8">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-gray-800">รายการที่รอการบันทึก</h3>
                <button onclick="closeModal('queueModal')" class="p-2 bg-gray-50 rounded-full text-gray-400"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div id="auditListItems" class="space-y-2 mb-8"></div>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="openConfirmModal('DRAFT')" class="py-4 border-2 border-gray-100 text-gray-600 rounded-2xl font-bold">บันทึกร่าง</button>
                <button onclick="openConfirmModal('FINAL')" class="py-4 bg-pink-500 text-white rounded-2xl font-bold shadow-lg shadow-pink-100">ยืนยันและลงชื่อ</button>
            </div>
        </div>
    </div>

    <!-- Modal: Signature -->
    <div id="confirmModal" class="fixed inset-0 z-[60] hidden bg-black/80 backdrop-blur-md flex items-center justify-center p-4">
        <div class="w-full max-w-sm bg-white rounded-[2.5rem] p-8 text-center animate-in zoom-in-95 duration-200">
            <h3 id="confirmTitle" class="text-lg font-bold text-gray-800 mb-6">ลงลายมือชื่อยืนยัน</h3>
            <div class="bg-gray-50 rounded-2xl p-2 mb-6 border border-gray-100">
                <canvas id="signature-pad" class="w-full h-48 bg-white rounded-xl"></canvas>
                <button onclick="signaturePad.clear()" class="mt-2 text-[10px] font-bold text-gray-400 uppercase tracking-widest">ล้างลายเซ็น</button>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="closeModal('confirmModal')" class="py-4 text-sm font-bold text-gray-400">ยกเลิก</button>
                <button onclick="handleFinalSubmit()" class="py-4 bg-gray-900 text-white rounded-2xl text-sm font-bold">ส่งข้อมูล</button>
            </div>
        </div>
    </div>

    <!-- Scanner & Overlay -->
    <div id="scannerModal" class="fixed inset-0 z-[70] hidden bg-black flex flex-col">
        <div class="p-6 flex justify-between items-center text-white">
            <p class="text-xs font-bold tracking-widest">SCANNER</p>
            <button onclick="closeScanner()" class="p-2 bg-white/10 rounded-full"><i data-lucide="x" class="w-5 h-5"></i></button>
        </div>
        <div id="reader" class="flex-grow"></div>
    </div>

    <div id="processOverlay" class="fixed inset-0 z-[100] hidden bg-white/90 backdrop-blur-md flex flex-col items-center justify-center">
        <div class="spinner mb-6"></div>
        <p id="processMessage" class="text-xs font-bold text-gray-400 uppercase tracking-widest">Processing...</p>
    </div>

    <!-- Alert Modal -->
    <div id="customAlert" class="fixed inset-0 z-[110] hidden bg-black/40 backdrop-blur-sm flex items-center justify-center p-6">
        <div class="bg-white rounded-[2rem] p-8 w-full max-w-xs text-center shadow-2xl">
            <div id="alertIcon" class="w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4"></div>
            <h4 id="alertTitle" class="text-lg font-bold text-gray-800 mb-2"></h4>
            <p id="alertMsg" class="text-sm text-gray-500 mb-6"></p>
            <button onclick="closeAlert()" class="w-full py-4 bg-gray-900 text-white rounded-2xl font-bold">ตกลง</button>
        </div>
    </div>

    <input type="hidden" id="selectedDeptId">

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwb_1Yppy3h_hy4dX1RkN3-l_YKKlC3FWKewmzCHM-q6SHrlbxsm-U-SGMUj1mYXwkMuQ/exec";
        
        let masterDeptList = [];
        let configData = { priorities: [], assetTypes: [] };
        let currentAsset = null;
        let auditQueue = [];
        let signaturePad = null;
        let html5QrCode = null;
        let submitMode = 'FINAL';

        window.onload = () => {
            lucide.createIcons();
            initApp();
            signaturePad = new SignaturePad(document.getElementById('signature-pad'));
            html5QrCode = new Html5Qrcode("reader");
        };

        async function initApp() {
            showProcess("กำลังเตรียมข้อมูล...");
            try {
                const [resConfig, resDept] = await Promise.all([
                    fetch(`${API_URL}?action=getInitialData`),
                    fetch(`${API_URL}?action=getDeptList`)
                ]);
                configData = await resConfig.json();
                masterDeptList = await resDept.json();
                
                populateSelects();

                const buildings = [...new Set(masterDeptList.map(item => item.BUILDING))].filter(Boolean).sort();
                const bSel = document.getElementById('selBuilding');
                buildings.forEach(b => bSel.add(new Option(b, b)));
                
                document.getElementById('statusIndicator').innerText = "ONLINE";
                document.getElementById('statusIndicator').classList.replace('text-pink-500', 'text-green-500');
            } catch (e) {
                showAlert('Error', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้', 'error');
            } finally { hideProcess(); }
        }

        function populateSelects() {
            const atSels = [document.getElementById('assetTypeId'), document.getElementById('nr_asset_type_id')];
            const pSel = document.getElementById('priorityId');
            
            atSels.forEach(s => {
                s.innerHTML = '<option value="" disabled selected>-- เลือกประเภท --</option>';
                configData.assetTypes.forEach(a => s.add(new Option(a.name, a.id)));
            });

            pSel.innerHTML = '<option value="" disabled selected>-- เลือกความสำคัญ --</option>';
            configData.priorities.forEach(p => pSel.add(new Option(p.name, p.id)));
        }

        function onBuildingChange() {
            const b = document.getElementById('selBuilding').value;
            const floors = [...new Set(masterDeptList.filter(i => i.BUILDING === b).map(i => i.FL))].sort((a,b)=>a-b);
            const fSel = document.getElementById('selFloor');
            fSel.innerHTML = '<option value="" disabled selected>-- เลือกชั้น --</option>';
            floors.forEach(f => fSel.add(new Option(`ชั้น ${f}`, f)));
        }

        function renderDeptList() {
            const b = document.getElementById('selBuilding').value;
            const f = document.getElementById('selFloor').value;
            const container = document.getElementById('deptList');
            container.innerHTML = '';
            masterDeptList.filter(d => d.BUILDING === b && String(d.FL) === String(f)).forEach(dept => {
                const card = document.createElement('div');
                card.className = "p-5 bg-white rounded-[2rem] border border-gray-100 flex justify-between items-center cursor-pointer active:scale-95 transition-all shadow-sm";
                card.innerHTML = `<p class="text-[13px] font-bold text-gray-700">${dept.DEPNAME}</p><i data-lucide="chevron-right" class="w-4 h-4 text-pink-300"></i>`;
                card.onclick = () => selectDept(dept);
                container.appendChild(card);
            });
            lucide.createIcons();
        }

        function selectDept(dept) {
            document.getElementById('selectedDeptId').value = dept.DEP_ID;
            document.getElementById('displayDeptName').innerText = dept.DEPNAME;
            document.getElementById('displayDeptLoc').innerText = `${dept.BUILDING} • ชั้น ${dept.FL}`;
            document.getElementById('locationPickerSection').classList.add('hidden');
            document.getElementById('selectedDeptSection').classList.remove('hidden');
            document.getElementById('searchAreaSection').classList.remove('hidden');
            lucide.createIcons();
        }

        function resetDeptSelection() {
            document.getElementById('locationPickerSection').classList.remove('hidden');
            document.getElementById('selectedDeptSection').classList.add('hidden');
            document.getElementById('searchAreaSection').classList.add('hidden');
            auditQueue = []; updateQueueUI();
        }

        function debouncedSearch() {
            clearTimeout(window.sTimeout);
            const q = document.getElementById('assetQuery').value.trim();
            if (q.length >= 2) window.sTimeout = setTimeout(searchAsset, 500);
            else document.getElementById('resultsArea').classList.add('hidden');
        }

        async function searchAsset() {
            const q = document.getElementById('assetQuery').value.trim();
            const area = document.getElementById('resultsArea');
            area.innerHTML = '<div class="p-8 text-center"><div class="spinner mx-auto scale-50 mb-2"></div></div>';
            area.classList.remove('hidden');
            try {
                const res = await fetch(`${API_URL}?action=searchAsset&query=${encodeURIComponent(q)}`);
                const data = await res.json();
                area.innerHTML = '';
                if (data.length === 0) area.innerHTML = '<p class="text-center p-4 text-xs text-gray-400">ไม่พบข้อมูล</p>';
                else {
                    data.forEach(item => {
                        const d = document.createElement('div');
                        d.className = "p-4 bg-white rounded-2xl border border-gray-100 flex justify-between items-center cursor-pointer shadow-sm active:scale-95";
                        d.innerHTML = `<div><p class="text-[10px] font-bold text-pink-500">${item.AssetID}</p><p class="text-xs font-bold text-gray-700">${item.AssetName}</p></div><i data-lucide="plus" class="w-4 h-4 text-pink-200"></i>`;
                        d.onclick = () => { currentAsset = item; openAuditModal(item); };
                        area.appendChild(d);
                    });
                }
                lucide.createIcons();
            } catch (e) { area.innerHTML = '<p class="text-center p-4 text-xs text-red-400">Search Error</p>'; }
        }

        function openAuditModal(asset) {
            document.getElementById('modalAssetName').innerText = asset.AssetName;
            document.getElementById('modalAssetId').innerText = `ASSET ID: ${asset.AssetID}`;
            document.getElementById('auditFormModal').classList.remove('hidden');
            lucide.createIcons();
        }

        function openNonRegisterModal() {
            document.getElementById('nonRegisterModal').classList.remove('hidden');
            lucide.createIcons();
        }

        function submitAudit(type) {
            let data = {};
            if (type === 'EXISTING') {
                const isPac = document.querySelector('input[name="is_pac"]:checked').value === 'YES';
                const assetTypeId = document.getElementById('assetTypeId').value;
                if (!assetTypeId) return showAlert('คำเตือน', 'กรุณาเลือกประเภทอุปกรณ์', 'warning');

                data = {
                    NOID: currentAsset.NoID,
                    Asset_ID: currentAsset.AssetID,
                    Serial: currentAsset.Serial,
                    Asset_Type_ID: isPac ? assetTypeId + "/PAC" : assetTypeId,
                    PIORITY_ID: document.getElementById('priorityId').value,
                    Shift_Work: document.getElementById('shiftWork').value,
                    Note1: document.getElementById('note2').value, // Map Note2 -> คอลัมน์ U (Note1 ใน Payload)
                    AssetName: currentAsset.AssetName
                };
                closeModal('auditFormModal');
            } else {
                const isPac = document.querySelector('input[name="nr_is_pac"]:checked').value === 'YES';
                const assetId = document.getElementById('nr_asset_id').value;
                const assetTypeId = document.getElementById('nr_asset_type_id').value;
                if (!assetId || !assetTypeId) return showAlert('คำเตือน', 'กรุณากรอกข้อมูลให้ครบถ้วน', 'warning');

                data = {
                    NOID: "",
                    Asset_ID: assetId,
                    Serial: document.getElementById('nr_serial').value,
                    Asset_Type_ID: isPac ? assetTypeId + "/PAC" : assetTypeId,
                    PIORITY_ID: "PIO-004", // Default for Non-Reg
                    Shift_Work: "เช้า",
                    Note1: document.getElementById('nr_brand_detail').value,
                    AssetName: "[นอกทะเบียน] " + document.getElementById('nr_brand_detail').value
                };
                closeModal('nonRegisterModal');
            }

            auditQueue.unshift({ DisplayName: data.AssetName, data: data });
            updateQueueUI();
            showAlert('สำเร็จ', 'เพิ่มรายการลงในคิวเรียบร้อย', 'success');
            resetSearchState();
        }

        function updateQueueUI() {
            const list = document.getElementById('auditListItems');
            document.getElementById('auditCount').innerText = auditQueue.length;
            if (auditQueue.length === 0) {
                list.innerHTML = '<p class="text-xs text-gray-300 text-center py-12">ไม่มีรายการ</p>';
                return;
            }
            list.innerHTML = auditQueue.map((a, i) => `
                <div class="p-4 bg-gray-50 rounded-2xl border border-gray-100 flex justify-between items-center">
                    <div>
                        <p class="text-[10px] font-bold text-gray-800 mb-1">${a.DisplayName}</p>
                        <p class="text-[9px] text-pink-500 font-bold uppercase">${a.data.Asset_ID}</p>
                    </div>
                    <button onclick="auditQueue.splice(${i},1);updateQueueUI()" class="p-2 text-gray-300 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function openConfirmModal(mode) {
            if (auditQueue.length === 0) return showAlert('คำเตือน', 'ไม่มีรายการให้บันทึก', 'warning');
            submitMode = mode;
            document.getElementById('confirmTitle').innerText = mode === 'DRAFT' ? 'บันทึกฉบับร่าง' : 'ยืนยันการบันทึก';
            document.getElementById('confirmModal').classList.remove('hidden');
            setTimeout(() => {
                const c = document.getElementById('signature-pad');
                c.width = c.parentElement.offsetWidth - 16;
                c.height = 200;
                signaturePad.clear();
            }, 300);
        }

        async function handleFinalSubmit() {
            if (signaturePad.isEmpty()) return showAlert('คำเตือน', 'กรุณาลงลายมือชื่อ', 'warning');
            showProcess("กำลังบันทึกข้อมูล...");
            
            const payload = {
                action: 'saveBulkSurvey',
                data: {
                    items: auditQueue.map(item => item.data),
                    deptId: document.getElementById('selectedDeptId').value,
                    IT_User_Mail: "staff_it@udonhospital.com",
                    signature: signaturePad.toDataURL(),
                    isDraft: submitMode === 'DRAFT' ? 1 : 0,
                    activityId: "ANNUAL_2026"
                }
            };

            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
                const result = await res.json();
                if (result.status === 'success') {
                    auditQueue = []; updateQueueUI();
                    closeModal('confirmModal'); closeModal('queueModal');
                    showAlert('สำเร็จ', `บันทึกข้อมูลเรียบร้อยแล้ว`, 'success');
                } else throw new Error(result.message);
            } catch (e) {
                showAlert('Error', 'เกิดข้อผิดพลาดในการส่งข้อมูล', 'error');
            } finally { hideProcess(); }
        }

        function showAlert(title, msg, type) {
            const modal = document.getElementById('customAlert');
            const icon = document.getElementById('alertIcon');
            document.getElementById('alertTitle').innerText = title;
            document.getElementById('alertMsg').innerText = msg;
            
            icon.className = "w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 ";
            if (type === 'success') { icon.classList.add('bg-green-50', 'text-green-500'); icon.innerHTML = '<i data-lucide="check-circle" class="w-8 h-8"></i>'; }
            else if (type === 'error') { icon.classList.add('bg-red-50', 'text-red-500'); icon.innerHTML = '<i data-lucide="alert-triangle" class="w-8 h-8"></i>'; }
            else { icon.classList.add('bg-orange-50', 'text-orange-500'); icon.innerHTML = '<i data-lucide="info" class="w-8 h-8"></i>'; }
            
            modal.classList.remove('hidden');
            lucide.createIcons();
        }

        function closeAlert() { document.getElementById('customAlert').classList.add('hidden'); }
        function showProcess(m) { document.getElementById('processMessage').innerText = m; document.getElementById('processOverlay').classList.remove('hidden'); }
        function hideProcess() { document.getElementById('processOverlay').classList.add('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function resetSearchState() { document.getElementById('assetQuery').value = ''; document.getElementById('resultsArea').classList.add('hidden'); }

        async function openScanner(id) {
            document.getElementById('scannerModal').classList.remove('hidden');
            try {
                await html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
                    document.getElementById(id).value = text;
                    closeScanner();
                    if(id === 'assetQuery') searchAsset();
                });
            } catch (e) { showAlert('Error', 'ไม่สามารถเปิดกล้องได้', 'error'); closeScanner(); }
        }
        async function closeScanner() { if(html5QrCode.isScanning) await html5QrCode.stop(); document.getElementById('scannerModal').classList.add('hidden'); }
    </script>
</body>
</html>
