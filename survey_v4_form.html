<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Asset Audit System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        .pink-gradient { background: linear-gradient(135deg, #ec4899 0%, #be185d 100%); }
        .signature-pad { border: 2px dashed #e2e8f0; border-radius: 1rem; background: #fff; width: 100%; height: 200px; touch-action: none; }
        
        .selectable-box:checked + label { background-color: #ec4899; color: white; border-color: #ec4899; }
        .priority-box:checked + label { background-color: #1e293b; color: white; border-color: #1e293b; }

        @keyframes spinner { to { transform: rotate(360deg); } }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid rgba(236, 72, 153, 0.1);
            border-left-color: #ec4899;
            border-radius: 50%;
            animation: spinner 0.8s linear infinite;
        }
        .image-preview { width: 100%; height: 160px; object-fit: cover; border-radius: 1rem; border: 2px solid #f1f5f9; }
        .btn-disabled { opacity: 0.5; cursor: not-allowed; pointer-events: none; }
    </style>
</head>
<body class="min-h-screen pb-24">

    <!-- Header -->
    <header class="bg-white/80 backdrop-blur-md shadow-sm border-b border-pink-100 sticky top-0 z-40 px-4 py-4">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="pink-gradient p-2 rounded-xl text-white shadow-lg shadow-pink-200">
                    <i data-lucide="shield-check" class="w-6 h-6"></i>
                </div>
                <div>
                    <h1 class="text-lg font-bold text-gray-800 leading-tight">IT Audit System</h1>
                    <p id="statusIndicator" class="text-[10px] text-pink-500 font-bold uppercase tracking-wider">Connecting...</p>
                </div>
            </div>
            <button onclick="location.reload()" class="p-2 text-gray-400 hover:text-pink-500 transition-colors">
                <i data-lucide="refresh-cw" class="w-5 h-5"></i>
            </button>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-6">

        <!-- Section 1: Dept Selection -->
        <section id="locationPickerSection" class="space-y-4">
            <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-pink-50">
                <h2 class="text-sm font-bold text-gray-700 mb-4 flex items-center gap-2">
                    <i data-lucide="map-pin" class="w-4 h-4 text-pink-500"></i>เลือกสถานที่ตรวจสอบ
                </h2>
                <div class="space-y-3">
                    <select id="selBuilding" onchange="onBuildingChange()" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl text-sm outline-none appearance-none">
                        <option value="" disabled selected>-- เลือกตึก/อาคาร --</option>
                    </select>
                    <select id="selFloor" onchange="renderDeptList()" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl text-sm outline-none appearance-none">
                        <option value="" disabled selected>-- เลือกชั้น --</option>
                    </select>
                </div>
            </div>
            <div id="deptList" class="grid grid-cols-1 gap-3"></div>
        </section>

        <!-- Section 2: Selected Dept Info -->
        <section id="selectedDeptSection" class="hidden">
            <div class="pink-gradient p-6 rounded-[2.5rem] text-white shadow-xl relative overflow-hidden">
                <div class="relative z-10">
                    <button onclick="resetDeptSelection()" class="absolute top-0 right-0 p-2 bg-white/20 rounded-full hover:bg-white/30 transition-all">
                        <i data-lucide="rotate-ccw" class="w-4 h-4"></i>
                    </button>
                    <h2 id="displayDeptName" class="text-xl font-bold mb-1">ชื่อหน่วยงาน</h2>
                    <p id="displayDeptLoc" class="text-xs opacity-90 flex items-center gap-1">ตึก • ชั้น</p>
                    <input type="hidden" id="selectedDeptId">
                </div>
                <div class="absolute -right-4 -bottom-4 opacity-10">
                    <i data-lucide="building-2" class="w-32 h-32"></i>
                </div>
            </div>
        </section>

        <!-- Section 3: Search & Actions -->
        <section id="searchAreaSection" class="hidden space-y-4">
            <div class="flex gap-2">
                <div class="relative flex-1">
                    <input type="text" id="assetQuery" oninput="debouncedSearch()" placeholder="ค้นหา Asset ID / Serial..." class="w-full p-5 pl-12 bg-white border border-gray-100 rounded-2xl shadow-sm text-sm outline-none focus:ring-2 focus:ring-pink-100 transition-all">
                    <i data-lucide="search" class="absolute left-4 top-5 text-gray-300 w-5 h-5"></i>
                </div>
                <button onclick="openScanner('assetQuery')" class="p-5 bg-pink-500 text-white rounded-2xl shadow-lg shadow-pink-100 active:scale-95 transition-all">
                    <i data-lucide="scan-barcode" class="w-6 h-6"></i>
                </button>
            </div>

            <div id="resultsArea" class="space-y-3 hidden"></div>

            <!-- Queue Area -->
            <div class="bg-white p-6 rounded-[2.5rem] border border-gray-100 shadow-sm">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em]">รายการตรวจสอบที่รอส่ง</h3>
                    <span id="auditCount" class="text-xs font-bold text-white bg-pink-500 px-3 py-1 rounded-full">0</span>
                </div>
                <div id="auditListItems" class="space-y-3 max-h-72 overflow-y-auto pr-1">
                    <p class="text-xs text-gray-300 italic text-center py-12">ยังไม่มีรายการในคิว</p>
                </div>
                
                <div class="grid grid-cols-1 gap-3 mt-8">
                    <button id="btnDraftSubmit" onclick="openConfirmModal('DRAFT')" class="py-4 bg-gray-100 text-gray-600 font-bold rounded-2xl btn-disabled transition-all" disabled>
                        บันทึกฉบับร่าง
                    </button>
                    <button id="btnFinalSubmit" onclick="openConfirmModal('FINAL')" class="py-4 pink-gradient text-white font-bold rounded-2xl shadow-xl shadow-pink-100 btn-disabled transition-all" disabled>
                        ยืนยันการตรวจสอบ
                    </button>
                </div>
            </div>
        </section>
    </main>

    <!-- Modal: Form -->
    <div id="auditFormModal" class="fixed inset-0 z-50 bg-black/60 hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] overflow-hidden shadow-2xl animate-in fade-in zoom-in duration-300">
            <div class="p-6 bg-gray-50 border-b border-gray-100 flex justify-between items-start">
                <div>
                    <h3 id="modalAssetName" class="text-lg font-bold text-gray-800 leading-tight">ชื่อครุภัณฑ์</h3>
                    <p id="modalAssetId" class="text-[10px] font-bold text-pink-500 tracking-wider mt-1">ID: -</p>
                </div>
                <button onclick="closeModal('auditFormModal')" class="p-2 text-gray-400"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div class="p-6 space-y-6 max-h-[65vh] overflow-y-auto">
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase mb-3 block tracking-widest">0. รูปภาพหลักฐาน</label>
                    <div id="photoPreviewContainer" class="hidden mb-3 relative">
                        <img id="photoPreview" src="" class="image-preview">
                        <button onclick="clearPhoto()" class="absolute top-3 right-3 bg-black/50 text-white p-2 rounded-full backdrop-blur-md"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </div>
                    <button onclick="document.getElementById('photoInput').click()" class="w-full py-4 border-2 border-dashed border-gray-200 rounded-2xl flex flex-col items-center justify-center gap-2 text-gray-400 hover:bg-gray-50 transition-all">
                        <i data-lucide="camera" class="w-6 h-6"></i>
                        <span class="text-[11px] font-bold">ถ่ายภาพครุภัณฑ์</span>
                    </button>
                    <input type="file" id="photoInput" accept="image/*" capture="environment" class="hidden" onchange="handlePhoto(this)">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase mb-3 block tracking-widest">1. ประเภทอุปกรณ์ *</label>
                    <select id="assetTypeId" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100 text-sm outline-none appearance-none"></select>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase mb-3 block tracking-widest">2. เวรการทำงาน *</label>
                    <div id="shiftContainer" class="grid grid-cols-3 gap-2"></div>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase mb-3 block tracking-widest">3. ระดับความสำคัญ *</label>
                    <div id="priorityContainer" class="grid grid-cols-2 gap-2"></div>
                </div>
                <div class="pt-4">
                    <button onclick="validateAndSubmitAudit()" class="w-full py-4 pink-gradient text-white font-bold rounded-2xl shadow-lg shadow-pink-100">บันทึกลงคิว</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal: Confirmation & Signature -->
    <div id="confirmModal" class="fixed inset-0 z-50 bg-black/70 hidden flex items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white w-full max-w-sm rounded-[3rem] overflow-hidden shadow-2xl">
            <div class="p-8 text-center">
                <div id="confirmIcon" class="w-16 h-16 bg-pink-100 text-pink-600 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i data-lucide="pen-tool" class="w-8 h-8"></i>
                </div>
                <h3 id="confirmTitle" class="text-xl font-bold text-gray-800">ยืนยันข้อมูล</h3>
                <p id="confirmSub" class="text-xs text-gray-400 mt-2">กรุณาลงลายมือชื่อรับรองการตรวจสอบ</p>
            </div>
            <div class="px-8 pb-8 space-y-4">
                <div class="relative bg-gray-50 rounded-[2rem] p-2 border border-gray-100">
                    <canvas id="signature-pad" class="signature-pad"></canvas>
                    <button onclick="signaturePad.clear()" class="absolute bottom-4 right-4 text-[10px] text-pink-500 font-bold bg-white/80 shadow-sm border px-3 py-1.5 rounded-full backdrop-blur-sm">ล้างชื่อ</button>
                </div>
                <button onclick="processFinalSubmit()" id="btnExecuteSubmit" class="w-full py-4 pink-gradient text-white font-bold rounded-2xl shadow-xl shadow-pink-100">บันทึกและส่งข้อมูล</button>
                <button onclick="closeModal('confirmModal')" class="w-full py-2 text-gray-300 font-bold text-xs uppercase tracking-widest">ยกเลิก</button>
            </div>
        </div>
    </div>

    <!-- Modal: Success & Actions -->
    <div id="successModal" class="fixed inset-0 z-[100] bg-black/80 hidden flex items-center justify-center p-6 backdrop-blur-xl">
        <div class="bg-white p-10 rounded-[3.5rem] text-center max-w-xs w-full shadow-2xl animate-in zoom-in duration-500">
            <div id="successIconBox" class="w-20 h-20 bg-green-100 text-green-500 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">
                <i data-lucide="check-circle-2" class="w-10 h-10"></i>
            </div>
            <h3 id="successStatusTitle" class="text-2xl font-bold text-gray-800 mb-2">บันทึกสำเร็จ!</h3>
            
            <div class="bg-gray-50 rounded-2xl p-4 mb-8 text-left border border-gray-100">
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">รายละเอียดรายการ</p>
                <div id="successDetailList" class="space-y-1">
                    <!-- จะถูกเขียนทับด้วย JS -->
                </div>
            </div>
            
            <div class="space-y-3">
                <button onclick="printSlip()" class="w-full py-4 bg-pink-50 text-pink-600 font-bold rounded-2xl border border-pink-100 flex items-center justify-center gap-3 active:scale-95 transition-all">
                    <i data-lucide="printer" class="w-5 h-5"></i> พิมพ์สลิปรายการ
                </button>
                <button id="btnCertDoc" onclick="printCert()" class="w-full py-4 bg-blue-50 text-blue-600 font-bold rounded-2xl border border-blue-100 flex items-center justify-center gap-3 hidden active:scale-95 transition-all">
                    <i data-lucide="file-text" class="w-5 h-5"></i> พิมพ์เอกสารรับรอง
                </button>
                <button onclick="location.reload()" class="w-full py-4 bg-gray-900 text-white font-bold rounded-2xl mt-6 shadow-xl shadow-gray-200">
                    กลับหน้าหลัก
                </button>
            </div>
        </div>
    </div>

    <!-- Overlays -->
    <div id="scannerModal" class="fixed inset-0 z-[60] bg-black hidden flex flex-col">
        <div class="p-6 flex justify-between items-center text-white"><h3>Scan QR/Barcode</h3><button onclick="closeScanner()"><i data-lucide="x"></i></button></div>
        <div id="reader" class="flex-1 bg-gray-900"></div>
    </div>

    <div id="processOverlay" class="fixed inset-0 z-[110] bg-white/95 hidden flex flex-col items-center justify-center text-center p-10">
        <div class="spinner mb-6"></div>
        <p id="processMessage" class="text-sm font-bold text-pink-600 uppercase tracking-[0.3em] mb-2">กำลังประมวลผล...</p>
        <p class="text-[10px] text-gray-400 uppercase tracking-widest font-medium">Please wait while we sync your data</p>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwb_1Yppy3h_hy4dX1RkN3-l_YKKlC3FWKewmzCHM-q6SHrlbxsm-U-SGMUj1mYXwkMuQ/exec";
        
        let masterDeptList = [];
        let configData = { priorities: [], assetTypes: [] };
        let currentAsset = null;
        let auditQueue = [];
        let signaturePad = null;
        let html5QrCode = null;
        let submitMode = 'FINAL';
        let currentPhotoBase64 = null;

        window.onload = () => {
            lucide.createIcons();
            initApp();
            signaturePad = new SignaturePad(document.getElementById('signature-pad'));
            html5QrCode = new Html5Qrcode("reader");
        };

        async function initApp() {
            showProcess("กำลังโหลดข้อมูลพื้นฐาน...");
            try {
                const [resConfig, resDept] = await Promise.all([
                    fetch(`${API_URL}?action=getInitialData`),
                    fetch(`${API_URL}?action=getDeptList`)
                ]);
                configData = await resConfig.json();
                masterDeptList = await resDept.json();
                renderConfigUI();
                
                const buildings = [...new Set(masterDeptList.map(item => item.BUILDING))].filter(Boolean).sort();
                const bSel = document.getElementById('selBuilding');
                buildings.forEach(b => bSel.add(new Option(b, b)));
                
                document.getElementById('statusIndicator').innerText = "ONLINE";
                document.getElementById('statusIndicator').classList.replace('text-pink-500', 'text-green-500');

                const urlParams = new URLSearchParams(window.location.search);
                const deptIdFromUrl = urlParams.get('dept_id');
                if (deptIdFromUrl) {
                    const found = masterDeptList.find(d => String(d.DEP_ID) === String(deptIdFromUrl));
                    if (found) selectDept(found);
                }

            } catch (e) {
                document.getElementById('statusIndicator').innerText = "CONNECTION ERROR";
            } finally { hideProcess(); }
        }

        function renderConfigUI() {
            renderSelectionGroup('priorityContainer', configData.priorities, 'priority_select', 'radio', 'priority-box');
            renderSelectionGroup('shiftContainer', ["เช้า", "บ่าย", "ดึก"], 'shift_check', 'checkbox', 'selectable-box');
            const atSel = document.getElementById('assetTypeId');
            atSel.innerHTML = '<option value="" disabled selected>-- เลือกประเภท --</option>';
            configData.assetTypes.forEach(a => atSel.add(new Option(a.name, a.id)));
        }

        function renderSelectionGroup(containerId, data, name, type, className) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            data.forEach((item, idx) => {
                const val = typeof item === 'string' ? item : item.id;
                const label = typeof item === 'string' ? item : item.name;
                const div = document.createElement('div');
                div.innerHTML = `
                    <input type="${type}" id="${name}_${idx}_${containerId}" name="${name}" value="${val}" class="hidden ${className}">
                    <label for="${name}_${idx}_${containerId}" class="block text-center p-3.5 rounded-2xl border border-gray-100 bg-gray-50 text-[11px] font-bold text-gray-500 cursor-pointer transition-all">
                        ${label}
                    </label>
                `;
                container.appendChild(div);
            });
        }

        function handlePhoto(input) {
            const file = input.files[0];
            if (!file) return;
            showProcess("กำลังประมวลผลรูปภาพ...");
            const reader = new FileReader();
            reader.onload = (e) => {
                currentPhotoBase64 = e.target.result;
                document.getElementById('photoPreview').src = currentPhotoBase64;
                document.getElementById('photoPreviewContainer').classList.remove('hidden');
                hideProcess();
            };
            reader.readAsDataURL(file);
        }

        function clearPhoto() {
            currentPhotoBase64 = null;
            document.getElementById('photoInput').value = '';
            document.getElementById('photoPreviewContainer').classList.add('hidden');
        }

        function openConfirmModal(mode) {
            submitMode = mode;
            document.getElementById('confirmTitle').innerText = mode === 'DRAFT' ? 'บันทึกฉบับร่าง' : 'ยืนยันการรับรอง';
            document.getElementById('confirmSub').innerText = mode === 'DRAFT' ? 'ลงชื่อเพื่อเก็บรายการเป็นฉบับร่าง' : 'รับรองว่าข้อมูลการตรวจสอบถูกต้องครบถ้วน';
            document.getElementById('confirmModal').classList.remove('hidden');
            setTimeout(() => {
                const c = document.getElementById('signature-pad');
                c.width = c.parentElement.offsetWidth - 16;
                c.height = 200;
                signaturePad.clear();
            }, 300);
        }

        async function processFinalSubmit() {
            if (signaturePad.isEmpty()) return alert("กรุณาลงลายมือชื่อก่อนบันทึก");
            
            showProcess("กำลังนำส่งข้อมูล...");
            try {
                let lastActionId = "";
                for (let i = 0; i < auditQueue.length; i++) {
                    showProcess(`บันทึกรายการที่ ${i+1}/${auditQueue.length}`);
                    const res = await fetch(API_URL, { 
                        method: 'POST', 
                        body: JSON.stringify({ action: auditQueue[i].Action, data: auditQueue[i].data }) 
                    });
                    const result = await res.json();
                    lastActionId = result.actionId;
                }

                showProcess("บันทึกการยืนยันและลายเซ็น...");
                await fetch(API_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ 
                        action: 'saveConfirm', 
                        data: { 
                            Action_ID: lastActionId, 
                            Activity_ID: "ACT-ANNUAL-2024", 
                            Con_Signature: signaturePad.toDataURL(),
                            Is_Draft: submitMode === 'DRAFT' ? 1 : 0
                        } 
                    }) 
                });

                closeModal('confirmModal');
                
                // ปรับปรุง Success Modal
                const detailBox = document.getElementById('successDetailList');
                detailBox.innerHTML = `
                    <div class="flex justify-between text-xs"><span class="text-gray-400">หน่วยงาน:</span> <span class="font-bold text-gray-700">${document.getElementById('displayDeptName').innerText}</span></div>
                    <div class="flex justify-between text-xs"><span class="text-gray-400">จำนวนรายการ:</span> <span class="font-bold text-gray-700">${auditQueue.length} รายการ</span></div>
                    <div class="flex justify-between text-xs"><span class="text-gray-400">สถานะ:</span> <span class="font-bold ${submitMode === 'DRAFT' ? 'text-orange-500' : 'text-green-500'}">${submitMode === 'DRAFT' ? 'บันทึกฉบับร่าง' : 'ตรวจสอบสมบูรณ์'}</span></div>
                `;

                const iconBox = document.getElementById('successIconBox');
                if(submitMode === 'DRAFT') {
                    document.getElementById('successStatusTitle').innerText = "บันทึกฉบับร่างแล้ว";
                    iconBox.className = "w-20 h-20 bg-orange-100 text-orange-500 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner";
                    iconBox.innerHTML = '<i data-lucide="file-edit" class="w-10 h-10"></i>';
                    document.getElementById('btnCertDoc').classList.add('hidden');
                } else {
                    document.getElementById('successStatusTitle').innerText = "บันทึกสำเร็จ!";
                    iconBox.className = "w-20 h-20 bg-green-100 text-green-500 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner";
                    iconBox.innerHTML = '<i data-lucide="check-circle-2" class="w-10 h-10"></i>';
                    document.getElementById('btnCertDoc').classList.remove('hidden');
                }
                
                document.getElementById('successModal').classList.remove('hidden');
                lucide.createIcons();

            } catch (e) {
                alert("เกิดข้อผิดพลาด: ระบบไม่สามารถเชื่อมต่อได้");
            } finally { hideProcess(); }
        }

        function validateAndSubmitAudit() {
            const typeId = document.getElementById('assetTypeId').value;
            const priorityId = document.querySelector('input[name="priority_select"]:checked')?.value;
            const shifts = Array.from(document.querySelectorAll('input[name="shift_check"]:checked')).map(c => c.value);

            if (!typeId || !priorityId || shifts.length === 0) return alert("กรุณาระบุข้อมูลที่จำเป็นให้ครบถ้วน");

            auditQueue.unshift({
                Action: 'saveSurvey',
                DisplayName: currentAsset.AssetName,
                data: {
                    Asset_ID: currentAsset.AssetID,
                    Serial: currentAsset.Serial,
                    Asset_Type_ID: typeId,
                    DEPT_ID: document.getElementById('selectedDeptId').value,
                    PIORITY_ID: priorityId,
                    Shift_Work: shifts.join(','),
                    Asset_Photo: currentPhotoBase64
                }
            });
            closeModal('auditFormModal');
            updateQueueUI();
            resetSearchState();
        }

        function updateQueueUI() {
            const list = document.getElementById('auditListItems');
            const count = document.getElementById('auditCount');
            const bDraft = document.getElementById('btnDraftSubmit');
            const bFinal = document.getElementById('btnFinalSubmit');
            
            count.innerText = auditQueue.length;
            if (auditQueue.length === 0) {
                list.innerHTML = '<p class="text-xs text-gray-300 italic text-center py-12">ไม่มีรายการในคิว</p>';
                bDraft.disabled = bFinal.disabled = true;
                bDraft.classList.add('btn-disabled'); bFinal.classList.add('btn-disabled');
                return;
            }
            bDraft.disabled = bFinal.disabled = false;
            bDraft.classList.remove('btn-disabled'); bFinal.classList.remove('btn-disabled');
            
            list.innerHTML = auditQueue.map((a, i) => `
                <div class="p-4 bg-gray-50 rounded-2xl border border-gray-100 flex justify-between items-center group transition-all">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-xl overflow-hidden bg-white border border-gray-200 shadow-sm flex-shrink-0">
                            ${a.data.Asset_Photo ? `<img src="${a.data.Asset_Photo}" class="w-full h-full object-cover">` : `<div class="w-full h-full flex items-center justify-center text-gray-200"><i data-lucide="image" class="w-5 h-5"></i></div>`}
                        </div>
                        <div>
                            <p class="text-[10px] font-bold text-gray-800 leading-none mb-1">${a.DisplayName}</p>
                            <p class="text-[9px] text-pink-500 font-bold uppercase tracking-wider">${a.data.Asset_ID}</p>
                        </div>
                    </div>
                    <button onclick="auditQueue.splice(${i},1);updateQueueUI()" class="p-2 text-gray-300 hover:text-red-500 hover:bg-red-50 rounded-xl transition-all">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function printSlip() { alert("ระบบกำลังสร้างสลิปรายการตรวจสอบ " + auditQueue.length + " รายการ..."); }
        function printCert() { alert("ระบบกำลังสร้างใบรับรองการตรวจสอบประจำปี..."); }

        function showProcess(m) { document.getElementById('processMessage').innerText = m; document.getElementById('processOverlay').classList.remove('hidden'); }
        function hideProcess() { document.getElementById('processOverlay').classList.add('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function resetSearchState() { clearPhoto(); document.getElementById('assetQuery').value = ''; document.getElementById('resultsArea').classList.add('hidden'); }

        function onBuildingChange() {
            const b = document.getElementById('selBuilding').value;
            const floors = [...new Set(masterDeptList.filter(i => i.BUILDING === b).map(i => i.FL))].sort((a,b)=>a-b);
            const fSel = document.getElementById('selFloor');
            fSel.innerHTML = '<option value="" disabled selected>-- เลือกชั้น --</option>';
            floors.forEach(f => fSel.add(new Option(`ชั้น ${f}`, f)));
        }

        function renderDeptList() {
            const b = document.getElementById('selBuilding').value;
            const f = document.getElementById('selFloor').value;
            const container = document.getElementById('deptList');
            container.innerHTML = '';
            masterDeptList.filter(d => d.BUILDING === b && String(d.FL) === String(f)).forEach(dept => {
                const card = document.createElement('div');
                card.className = "p-5 bg-white rounded-[2rem] border border-gray-100 cursor-pointer active:scale-95 shadow-sm transition-all flex justify-between items-center";
                card.innerHTML = `<p class="text-[13px] font-bold text-gray-700">${dept.DEPNAME}</p><i data-lucide="chevron-right" class="w-4 h-4 text-pink-300"></i>`;
                card.onclick = () => selectDept(dept);
                container.appendChild(card);
            });
            lucide.createIcons();
        }

        function selectDept(dept) {
            document.getElementById('selectedDeptId').value = dept.DEP_ID;
            document.getElementById('displayDeptName').innerText = dept.DEPNAME;
            document.getElementById('displayDeptLoc').innerText = `${dept.BUILDING} • ชั้น ${dept.FL}`;
            document.getElementById('locationPickerSection').classList.add('hidden');
            document.getElementById('selectedDeptSection').classList.remove('hidden');
            document.getElementById('searchAreaSection').classList.remove('hidden');
            lucide.createIcons();
        }

        function resetDeptSelection() {
            document.getElementById('locationPickerSection').classList.remove('hidden');
            document.getElementById('selectedDeptSection').classList.add('hidden');
            document.getElementById('searchAreaSection').classList.add('hidden');
            auditQueue = []; updateQueueUI();
        }

        function debouncedSearch() {
            clearTimeout(window.sTimeout);
            const q = document.getElementById('assetQuery').value.trim();
            if (q.length >= 2) window.sTimeout = setTimeout(searchAsset, 500);
            else document.getElementById('resultsArea').classList.add('hidden');
        }

        async function searchAsset() {
            const q = document.getElementById('assetQuery').value.trim();
            const area = document.getElementById('resultsArea');
            area.innerHTML = '<div class="p-8 text-center"><div class="spinner mx-auto scale-50 mb-2"></div><p class="text-[10px] font-bold text-gray-400">SEARCHING...</p></div>';
            area.classList.remove('hidden');
            try {
                const res = await fetch(`${API_URL}?action=searchAsset&query=${encodeURIComponent(q)}`);
                const data = await res.json();
                area.innerHTML = '';
                if (data.length === 0) {
                    area.innerHTML = '<p class="p-8 text-center text-xs text-red-400 font-bold">ไม่พบข้อมูลในระบบ</p>';
                } else {
                    data.forEach(item => {
                        const d = document.createElement('div');
                        d.className = "p-5 bg-white rounded-2xl border border-pink-50 mb-2 cursor-pointer shadow-sm active:scale-95 transition-all flex justify-between items-center";
                        d.innerHTML = `<div><p class="text-[9px] font-bold text-pink-500 uppercase">${item.AssetID}</p><p class="text-xs font-bold text-gray-800">${item.AssetName}</p></div><i data-lucide="plus-circle" class="w-5 h-5 text-pink-100"></i>`;
                        d.onclick = () => { currentAsset = item; openAuditModal(item); };
                        area.appendChild(d);
                    });
                }
                lucide.createIcons();
            } catch (e) { area.innerHTML = '<p class="p-8 text-[10px] text-red-500 text-center uppercase font-bold">Search Failure</p>'; }
        }

        function openAuditModal(asset) {
            document.getElementById('modalAssetName').innerText = asset.AssetName;
            document.getElementById('modalAssetId').innerText = `ASSET ID: ${asset.AssetID}`;
            document.getElementById('auditFormModal').classList.remove('hidden');
        }

        async function openScanner(id) {
            document.getElementById('scannerModal').classList.remove('hidden');
            try {
                await html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (text) => {
                    document.getElementById(id).value = text;
                    closeScanner();
                    if(id === 'assetQuery') searchAsset();
                });
            } catch (e) { alert("ไม่สามารถเข้าถึงกล้องได้"); closeScanner(); }
        }
        async function closeScanner() { 
            if(html5QrCode.isScanning) await html5QrCode.stop(); 
            document.getElementById('scannerModal').classList.add('hidden'); 
        }
    </script>
</body>
</html>
