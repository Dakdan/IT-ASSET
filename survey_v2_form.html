<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Asset Audit</title>
  <script>
    const API_URL = "YOUR_SCRIPT_URL_HERE";

    let configData = {};
    let masterDeptList = [];

    async function initApp() {
      const res = await fetch(API_URL + "?action=getInitialData");
      configData = await res.json();

      const res2 = await fetch(API_URL + "?action=getDeptList");
      masterDeptList = await res2.json();

      fillSelect();
    }

    function fillSelect() {
      const pri = document.getElementById("priorityId");
      const type = document.getElementById("assetTypeId");

      configData.priorities.forEach(p => {
        pri.innerHTML += `<option value="${p.id}">${p.name}</option>`;
      });

      configData.assetTypes.forEach(t => {
        type.innerHTML += `<option value="${t.id}">${t.name}</option>`;
      });
    }

    async function searchAsset() {
      const q = document.getElementById("assetQuery").value;

      const res = await fetch(API_URL + "?action=searchAsset&query=" + q);
      const data = await res.json();

      console.log(data);
    }

    async function submitAudit() {
      const payload = {
        action: "saveBulkSurvey",
        data: {
          deptId: document.getElementById("selectedDeptId").value,
          gps: "",
          items: [{
            Asset_ID: "TEST",
            AssetName: "TEST",
            Asset_Type_ID: "COM",
            PIORITY_ID: "PIO-001",
            Shift_Work: "เช้า",
            Note2: ""
          }]
        }
      };

      await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify(payload)
      });

      alert("saved");
    }

    window.onload = initApp;
  </script>
</head>

<body>
  <input id="assetQuery" placeholder="search">
  <button onclick="searchAsset()">ค้นหา</button>

  <select id="priorityId"></select>
  <select id="assetTypeId"></select>

  <button onclick="submitAudit()">บันทึก</button>

  <input type="hidden" id="selectedDeptId">
</body>
</html>
