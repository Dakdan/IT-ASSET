<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT AUDIT SYSTEM 2569</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body { font-family: 'Prompt', sans-serif; }
        /* สไตล์เพิ่มเติมสำหรับแอนิเมชั่น */
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { 
            Search, MapPin, RefreshCw, PlusCircle, X, Scan, Camera, Package, 
            History, LayoutDashboard, ChevronRight, Send, CheckCircle2, 
            AlertCircle, Loader2, Building2, Trash2, Clock, User, Printer, Monitor
        } = lucide;

        const API_URL = "https://script.google.com/macros/s/AKfycbzlwkwuMk9Y7qpEqT7JlnDFjWwlmvYVpW0NOuaEBcS6_3iocDVC6Jpc2ZL9P1qvbHM/exec";

        function App() {
            const [view, setView] = useState('home');
            const [loading, setLoading] = useState(false);
            const [statusMsg, setStatusMsg] = useState(null);
            const [auditLogs, setAuditLogs] = useState([]);
            const [selectedDept, setSelectedDept] = useState(null);
            const [searchQuery, setSearchQuery] = useState('');
            const [searchResults, setSearchResults] = useState([]);
            const [selectedAsset, setSelectedAsset] = useState(null);
            
            const [auditForm, setAuditForm] = useState({
                Asset_ID: '', Serial: '', BrandDetail: '', MAStatus: 'ตรวจสอบแล้ว',
                ImageData: '', gps: '', Note1: '', Asset_Type_ID: '',
                Priority_ID: '', Shift_Work: [], IsPac: false, IsRent: false, ASS_ON_OUT: '1'
            });

            // 🛠️ ฟังก์ชันแจ้งเตือน (Status Toast)
            const showStatus = (msg, type) => {
                setStatusMsg({ msg, type });
                setTimeout(() => setStatusMsg(null), 3000);
            };

            // 🛠️ ฟังก์ชันบันทึกข้อมูล (อ้างอิงตามที่คุณต้องการ)
            const handleFinalSubmit = async () => {
                if (!auditForm.ImageData) return showStatus('กรุณาถ่ายรูปยืนยัน', 'error');
                
                setLoading(true);
                const isNonNumber = !selectedAsset;
                const payload = {
                    action: isNonNumber ? 'saveNonNumber' : 'saveSurvey',
                    data: {
                        NoID: isNonNumber ? "" : selectedAsset.NoID,
                        Asset_ID: isNonNumber ? auditForm.Asset_ID : selectedAsset.AssetID,
                        Serial: isNonNumber ? auditForm.Serial : (selectedAsset.Serial || "-"),
                        Asset_Type_ID: auditForm.Asset_Type_ID,
                        DEPT_ID: selectedDept?.DEP_ID,
                        Shift_Work: auditForm.Shift_Work.join(','),
                        ImageData: auditForm.ImageData,
                        Activity_ID: "Ac-2569",
                        Note2: (auditForm.IsPac ? "PAC" : "") + (auditForm.IsRent ? "/RENT" : ""),
                        ASS_ON_OUT: isNonNumber ? "0" : "1",
                        IT_User_Mail: "it_checker@system.com"
                    }
                };

                try {
                    const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
                    const result = await res.json();
                    if (result.status === 'success') {
                        showStatus('บันทึกเรียบร้อย!', 'success');
                        setView('logs');
                    }
                } catch (err) {
                    showStatus('เกิดข้อผิดพลาดในการเชื่อมต่อ', 'error');
                } finally {
                    setLoading(false);
                }
            };

            // --- ส่วนของ UI Components ---
            return (
                <div className="max-w-md mx-auto min-h-screen bg-white shadow-2xl relative pb-20">
                    {/* Header */}
                    <header className="p-4 border-b flex justify-between items-center bg-white sticky top-0 z-50">
                        <div className="flex items-center gap-2">
                            <div className="bg-indigo-600 p-2 rounded-xl text-white"><Package size={20}/></div>
                            <span className="font-bold text-slate-800">IT AUDIT 2569</span>
                        </div>
                        {loading && <Loader2 className="animate-spin text-indigo-600" size={20}/>}
                    </header>

                    {/* Main Content */}
                    <main className="p-5">
                        {view === 'home' && (
                            <div className="fade-in space-y-4 text-center py-10">
                                <div className="bg-indigo-50 p-10 rounded-[3rem] inline-block mb-4">
                                    <Building2 size={48} className="text-indigo-600 mx-auto"/>
                                </div>
                                <h2 className="font-bold text-xl">ยินดีต้อนรับ</h2>
                                <p className="text-slate-400 text-sm">เลือกแผนกเพื่อเริ่มต้นการสำรวจ</p>
                                <button onClick={() => setView('search')} className="w-full bg-indigo-600 text-white p-4 rounded-2xl font-bold">เริ่มสแกนอุปกรณ์</button>
                            </div>
                        )}

                        {/* คุณสามารถยกโค้ด View ต่างๆ จาก React ตัวก่อนหน้ามาวางในรูปแบบเดียวกันได้เลย */}
                    </main>

                    {/* Bottom Nav */}
                    <nav className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t p-4 flex justify-around">
                        <button onClick={() => setView('home')} className={`flex flex-col items-center ${view !== 'logs' ? 'text-indigo-600' : 'text-slate-300'}`}>
                            <LayoutDashboard size={24}/>
                            <span className="text-[10px] font-bold">Home</span>
                        </button>
                        <button onClick={() => setView('logs')} className={`flex flex-col items-center ${view === 'logs' ? 'text-indigo-600' : 'text-slate-300'}`}>
                            <History size={24}/>
                            <span className="text-[10px] font-bold">History</span>
                        </button>
                    </nav>

                    {/* Notification */}
                    {statusMsg && (
                        <div className={`fixed top-5 left-1/2 -translate-x-1/2 p-4 rounded-2xl shadow-xl text-white ${statusMsg.type==='success'?'bg-indigo-600':'bg-red-500'} flex items-center gap-2 z-[100]`}>
                            <AlertCircle size={18}/>
                            <span className="text-xs font-bold">{statusMsg.msg}</span>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
