<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT AUDIT SYSTEM v2.0</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; -webkit-tap-highlight-color: transparent; }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* Sticky positioning for Headers */
        .sticky-search { position: sticky; top: 72px; z-index: 50; }
        .sticky-dept { position: sticky; top: 155px; z-index: 45; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>
   
    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;
        
        const Icon = ({ name, size = 20, className = "", strokeWidth = 2, ...props }) => {
            const spanRef = useRef(null);
            useEffect(() => {
                if (spanRef.current && window.lucide) {
                    const tempDiv = document.createElement('div');
                    tempDiv.innerHTML = `<i data-lucide="${name}" stroke-width="${strokeWidth}"></i>`;
                    window.lucide.createIcons({ root: tempDiv });
                    const svg = tempDiv.querySelector('svg');
                    if (svg) {
                        svg.setAttribute('width', size);
                        svg.setAttribute('height', size);
                        if (className) svg.setAttribute('class', className);
                        spanRef.current.innerHTML = '';
                        spanRef.current.appendChild(svg);
                    }
                }
            }, [name, size, className, strokeWidth]);
            return <span ref={spanRef} style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }} {...props}></span>;
        };

        const API_URL = "https://script.google.com/macros/s/AKfycbzlwkwuMk9Y7qpEqT7JlnDFjWwlmvYVpW0NOuaEBcS6_3iocDVC6Jpc2ZL9P1qvbHM/exec";

        const App = () => {
            const [view, setView] = useState('home');
            const [loading, setLoading] = useState(false);
            const [statusMsg, setStatusMsg] = useState(null);

            const [initialData, setInitialData] = useState({ priorities: [], assetTypes: [] });
            const [rawDeptList, setRawDeptList] = useState([]);
            const [buildings, setBuildings] = useState([]);
            const [floors, setFloors] = useState([]);
            
            const [selectedBuilding, setSelectedBuilding] = useState('');
            const [selectedFloor, setSelectedFloor] = useState('');
            const [filteredDepts, setFilteredDepts] = useState([]);
            const [selectedDept, setSelectedDept] = useState(null);

            const [searchQuery, setSearchQuery] = useState('');
            const [searchResults, setSearchResults] = useState([]);
            const [selectedAsset, setSelectedAsset] = useState(null);
            const [auditLogs, setAuditLogs] = useState([]);
            
            // Logs View States
            const [logSearchDept, setLogSearchDept] = useState('');
            const [showDeptDropdown, setShowDeptDropdown] = useState(false);

            const [auditForm, setAuditForm] = useState({
                Asset_ID: '', Serial: '', BrandDetail: '', MAStatus: 'ตรวจสอบแล้ว',
                ImageData: '', gps: '', Note1: '', Asset_Type_ID: '',
                Priority_ID: '', Shift_Work: [], IsPac: false, IsRent: false, ASS_ON_OUT: '1'
            });

            const videoRef = useRef(null);
            const [cameraActive, setCameraActive] = useState(false);
            const [scanTarget, setScanTarget] = useState(null);
            const searchTimeoutRef = useRef(null);

            useEffect(() => {
                const init = async () => {
                    setLoading(true);
                    try {
                        const [resInit, resDept, resLogs] = await Promise.all([
                            fetch(`${API_URL}?action=getInitialData`).then(r => r.json()),
                            fetch(`${API_URL}?action=getDeptList`).then(r => r.json()),
                            fetch(`${API_URL}?action=getAuditLogs`).then(r => r.json())
                        ]);
                        setInitialData(resInit);
                        setRawDeptList(resDept);
                        setAuditLogs(resLogs);
                        const bldgs = [...new Set(resDept.map(item => item.BUILDING))].filter(Boolean).sort();
                        setBuildings(bldgs);
                    } catch (err) {
                        showStatus('ไม่สามารถเชื่อมต่อฐานข้อมูลได้', 'error');
                    } finally {
                        setLoading(false);
                    }
                };
                init();
            }, []);

            useEffect(() => {
                if (selectedBuilding) {
                    const availableFloors = rawDeptList
                        .filter(item => item.BUILDING === selectedBuilding)
                        .map(item => String(item.FL))
                        .filter((v, i, a) => v && v !== "undefined" && a.indexOf(v) === i)
                        .sort();
                    setFloors(availableFloors);
                }
            }, [selectedBuilding, rawDeptList]);

            useEffect(() => {
                if (selectedBuilding && selectedFloor) {
                    const depts = rawDeptList.filter(
                        item => item.BUILDING === selectedBuilding && String(item.FL) === selectedFloor
                    );
                    setFilteredDepts(depts);
                }
            }, [selectedFloor, selectedBuilding, rawDeptList]);

            // ค้นหาหน่วยงานที่ไม่ซ้ำใน Logs เพื่อทำ Dropdown
            const uniqueLogDepts = useMemo(() => {
                const depts = auditLogs.map(l => l.Department).filter(Boolean);
                return [...new Set(depts)].sort();
            }, [auditLogs]);

            const groupedLogs = useMemo(() => {
                let filtered = auditLogs;
                if (logSearchDept) {
                    filtered = auditLogs.filter(log => 
                        (log.Department || "").toLowerCase().includes(logSearchDept.toLowerCase())
                    );
                }
                const groups = {};
                filtered.forEach(log => {
                    const dName = log.Department || "ทั่วไป / ไม่ระบุ";
                    const aType = log.AssetTypeName || "ไม่ระบุประเภท";
                    if (!groups[dName]) groups[dName] = {};
                    if (!groups[dName][aType]) groups[dName][aType] = [];
                    groups[dName][aType].push(log);
                });
                return groups;
            }, [auditLogs, logSearchDept]);

            const executeSearch = async (queryValue) => {
                let q = queryValue.trim();
                if (!q) { setSearchResults([]); return; }
                setLoading(true);
                try {
                    const res = await fetch(`${API_URL}?action=searchAsset&query=${encodeURIComponent(q)}`);
                    const data = await res.json();
                    setSearchResults(data);
                } catch (err) {
                    showStatus('ค้นหาขัดข้อง', 'error');
                } finally {
                    setLoading(false);
                }
            };

            const handleInputChange = (val) => {
                setSearchQuery(val);
                clearTimeout(searchTimeoutRef.current);
                if (val.trim()) {
                    searchTimeoutRef.current = setTimeout(() => executeSearch(val), 500);
                } else {
                    setSearchResults([]);
                }
            };

            const startCamera = (mode) => {
                setCameraActive(true);
                setScanTarget(mode);
                navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
                    .then(stream => { if (videoRef.current) videoRef.current.srcObject = stream; })
                    .catch(() => { showStatus('เปิดกล้องไม่ได้', 'error'); setCameraActive(false); });
            };

            const captureAction = () => {
                const canvas = document.createElement('canvas');
                canvas.width = videoRef.current.videoWidth;
                canvas.height = videoRef.current.videoHeight;
                canvas.getContext('2d').drawImage(videoRef.current, 0, 0);
                
                if (scanTarget === 'photo') {
                    setAuditForm({...auditForm, ImageData: canvas.toDataURL('image/jpeg', 0.6)});
                } else {
                    const mockResult = "SCN-" + Math.floor(Math.random() * 100000);
                    if (scanTarget === 'serial') setAuditForm({...auditForm, Serial: mockResult});
                    if (scanTarget === 'asset_id') setAuditForm({...auditForm, Asset_ID: mockResult});
                    if (scanTarget === 'search') handleInputChange(mockResult);
                }
                if (videoRef.current.srcObject) videoRef.current.srcObject.getTracks().forEach(t => t.stop());
                setCameraActive(false);
            };

            const handleFinalSubmit = async () => {
                if (!auditForm.ImageData) { showStatus('กรุณาถ่ายรูปเพื่อยืนยัน', 'error'); return; }
                if (!auditForm.Asset_Type_ID) { showStatus('กรุณาเลือกประเภทอุปกรณ์', 'error'); return; }
                setLoading(true);
                const isNonNumber = !selectedAsset;
                const payload = {
                    action: isNonNumber ? 'saveNonNumber' : 'saveSurvey',
                    data: {
                        ...auditForm,
                        NoID: isNonNumber ? "" : selectedAsset.NoID,
                        Asset_ID: isNonNumber ? auditForm.Asset_ID : selectedAsset.AssetID,
                        DEPT_ID: selectedDept?.DEP_ID,
                        Shift_Work: auditForm.Shift_Work.join(','),
                        Note2: (auditForm.IsPac ? "PAC" : "") + (auditForm.IsRent ? "/RENT" : "")
                    }
                };
                try {
                    const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
                    const result = await res.json();
                    if (result.status === 'success') {
                        showStatus('บันทึกสำเร็จ', 'success');
                        setView('search');
                        clearAuditForm();
                        fetch(`${API_URL}?action=getAuditLogs`).then(r => r.json()).then(setAuditLogs);
                    }
                } catch (err) {
                    showStatus('เกิดข้อผิดพลาด', 'error');
                } finally {
                    setLoading(false);
                }
            };

            const handleDelete = async (logId) => {
                if (!confirm("ต้องการลบข้อมูลหรือไม่?")) return;
                setLoading(true);
                try {
                    await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'deleteLog', data: logId }) });
                    setAuditLogs(prev => prev.filter(l => l.AL_ID !== logId));
                    showStatus('ลบสำเร็จ', 'success');
                } catch (e) { showStatus('ลบไม่สำเร็จ', 'error'); }
                setLoading(false);
            };

            const clearAuditForm = () => {
                setAuditForm({
                    Asset_ID: '', Serial: '', BrandDetail: '', MAStatus: 'ตรวจสอบแล้ว',
                    ImageData: '', gps: '', Note1: '', Asset_Type_ID: '',
                    Priority_ID: '', Shift_Work: [], IsPac: false, IsRent: false, ASS_ON_OUT: '1'
                });
            };

            const showStatus = (msg, type) => {
                setStatusMsg({ msg, type });
                setTimeout(() => setStatusMsg(null), 3000);
            };

            return (
                <div className="min-h-screen max-w-md mx-auto bg-slate-50 shadow-2xl relative pb-28">
                    <header className="bg-white px-6 py-4 sticky top-0 z-[60] flex items-center justify-between border-b border-slate-100 shadow-sm">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-lg shadow-indigo-100">
                                <Icon name="package" className="text-white" />
                            </div>
                            <div>
                                <h1 className="font-bold text-slate-800 leading-tight tracking-tight">IT AUDIT SYSTEM</h1>
                                <p className="text-[9px] text-indigo-500 font-bold uppercase tracking-widest">Asset Management v2.0</p>
                            </div>
                        </div>
                        {loading && <Icon name="loader-2" className="animate-spin text-indigo-500" />}
                    </header>

                    <main className="p-6">
                        {view === 'home' && (
                            <div className="space-y-6 animate-in">
                                <div className="bg-white p-7 rounded-[2.5rem] border border-slate-100 shadow-sm">
                                    <div className="flex items-center gap-2 mb-6 text-slate-700">
                                        <Icon name="map-pin" size={18} />
                                        <span className="font-bold">Location Selection</span>
                                    </div>
                                    <div className="space-y-5">
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-bold text-slate-400 ml-2 uppercase">Building / อาคาร</label>
                                            <select value={selectedBuilding} onChange={(e) => setSelectedBuilding(e.target.value)} className="w-full p-4 bg-slate-50 rounded-2xl text-sm font-bold border-none outline-none appearance-none">
                                                <option value="">-- เลือกอาคาร --</option>
                                                {buildings.map(b => <option key={b} value={b}>{b}</option>)}
                                            </select>
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-bold text-slate-400 ml-2 uppercase">Floor / ชั้น</label>
                                            <select value={selectedFloor} onChange={(e) => setSelectedFloor(e.target.value)} disabled={!selectedBuilding} className="w-full p-4 bg-slate-50 rounded-2xl text-sm font-bold border-none outline-none disabled:opacity-50 appearance-none">
                                                <option value="">-- เลือกชั้น --</option>
                                                {floors.map(f => <option key={f} value={f}>ชั้น {f}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                </div>
                                <div className="space-y-3">
                                    <p className="text-[10px] font-bold text-slate-400 ml-2 uppercase tracking-widest">Departments ({filteredDepts.length})</p>
                                    {filteredDepts.map(dept => (
                                        <button key={dept.DEP_ID} onClick={() => { setSelectedDept(dept); setView('search'); }} className="w-full bg-white p-5 rounded-3xl border border-slate-100 flex items-center justify-between active:scale-95 transition-all shadow-sm">
                                            <div className="text-left">
                                                <p className="text-[10px] font-bold text-indigo-500">{dept.DEP_ID}</p>
                                                <p className="font-bold text-slate-700">{dept.DEPNAME}</p>
                                            </div>
                                            <div className="w-9 h-9 rounded-2xl bg-slate-50 flex items-center justify-center text-slate-400"><Icon name="chevron-right" /></div>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'search' && (
                            <div className="space-y-5 animate-in">
                                <div className="bg-slate-900 p-6 rounded-[2.5rem] text-white shadow-xl relative overflow-hidden">
                                    <div className="relative z-10">
                                        <p className="text-[10px] font-bold text-indigo-400 mb-1 uppercase tracking-tighter">{selectedDept?.DEPNAME}</p>
                                        <p className="text-xs opacity-60">{selectedBuilding} | Floor {selectedFloor}</p>
                                    </div>
                                    <button onClick={() => setView('home')} className="absolute right-4 top-1/2 -translate-y-1/2 p-3 bg-white/10 rounded-2xl active:scale-90"><Icon name="refresh-cw" size={18}/></button>
                                </div>
                                <div className="relative">
                                    <input type="text" value={searchQuery} onChange={(e) => handleInputChange(e.target.value)} placeholder="พิมพ์รหัสครุภัณฑ์..." className="w-full p-5 pr-16 bg-white rounded-3xl border border-slate-100 font-bold text-sm outline-none shadow-sm" />
                                    <button onClick={() => startCamera('search')} className="absolute right-2 top-2 bottom-2 px-4 bg-indigo-50 text-indigo-600 rounded-2xl"><Icon name="scan" /></button>
                                </div>
                                <div className="space-y-4">
                                    <button onClick={() => { setSelectedAsset(null); clearAuditForm(); setAuditForm(p => ({...p, Asset_ID: searchQuery})); setView('audit'); }} className="w-full py-5 bg-white border-2 border-dashed border-slate-200 text-slate-400 rounded-3xl text-xs font-bold flex items-center justify-center gap-2 hover:border-orange-300 hover:text-orange-500 transition-all">
                                        <Icon name="plus-circle" size={16}/> ครุภัณฑ์นอกระบบ (Non-Number)
                                    </button>
                                    {searchResults.map(item => (
                                        <div key={item.AssetID} onClick={() => { setSelectedAsset(item); clearAuditForm(); setView('audit'); }} className="bg-white p-5 rounded-3xl border-l-4 border-l-indigo-600 shadow-sm active:scale-[0.98] transition-all">
                                            <p className="font-black text-indigo-600 text-sm">{item.AssetID}</p>
                                            <p className="text-xs font-bold text-slate-600 leading-snug">{item.FullDescription}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'audit' && (
                            <div className="space-y-6 animate-in">
                                <div className="flex items-center justify-between">
                                    <div className="flex items-center gap-4">
                                        <button onClick={() => setView('search')} className="p-3 bg-white rounded-2xl text-slate-400 shadow-sm active:scale-90"><Icon name="chevron-left" /></button>
                                        <h2 className="font-bold text-slate-700">Audit Check {selectedAsset ? '' : '(นอกระบบ)'}</h2>
                                    </div>
                                    <button onClick={clearAuditForm} className="text-[10px] font-bold text-rose-500 bg-rose-50 px-3 py-2 rounded-xl">ล้างฟอร์ม</button>
                                </div>

                                {!selectedAsset ? (
                                    <div className="bg-orange-50/50 p-6 rounded-[2.5rem] border border-orange-100 space-y-5">
                                        <div className="flex items-center gap-2 text-orange-600">
                                            <Icon name="alert-circle" size={16}/>
                                            <span className="text-[11px] font-black uppercase tracking-widest">ข้อมูลครุภัณฑ์นอกระบบ</span>
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-bold text-slate-400 uppercase ml-1 block">Asset ID (ถ้ามี)</label>
                                            <div className="flex gap-2">
                                                <input type="text" value={auditForm.Asset_ID} onChange={(e) => setAuditForm({...auditForm, Asset_ID: e.target.value})} placeholder="รหัสครุภัณฑ์..." className="flex-1 p-4 bg-white border border-orange-100 rounded-2xl text-sm font-semibold outline-none focus:ring-1 focus:ring-orange-200" />
                                                <button onClick={() => startCamera('asset_id')} className="p-4 bg-white text-orange-500 border border-orange-100 rounded-2xl active:scale-90"><Icon name="scan" size={18}/></button>
                                            </div>
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-bold text-slate-400 uppercase ml-1 block">Serial Number</label>
                                            <div className="flex gap-2">
                                                <input type="text" value={auditForm.Serial} onChange={(e) => setAuditForm({...auditForm, Serial: e.target.value})} placeholder="Serial No..." className="flex-1 p-4 bg-white border border-orange-100 rounded-2xl text-sm font-semibold outline-none focus:ring-1 focus:ring-orange-200" />
                                                <button onClick={() => startCamera('serial')} className="p-4 bg-white text-orange-500 border border-orange-100 rounded-2xl active:scale-90"><Icon name="scan" size={18}/></button>
                                            </div>
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-bold text-slate-400 uppercase ml-1 block">Brand & Model</label>
                                            <input type="text" value={auditForm.BrandDetail} onChange={(e) => setAuditForm({...auditForm, BrandDetail: e.target.value})} placeholder="เช่น Dell Optiplex 7090" className="w-full p-4 bg-white border border-orange-100 rounded-2xl text-sm font-semibold outline-none focus:ring-1 focus:ring-orange-200" />
                                        </div>
                                    </div>
                                ) : (
                                    <div className="p-6 bg-indigo-50/50 rounded-[2.5rem] border border-indigo-100 shadow-sm">
                                        <div className="flex items-center gap-2 mb-3 text-indigo-600">
                                            <Icon name="check-circle-2" size={16}/>
                                            <span className="text-[11px] font-black uppercase">Master Data</span>
                                        </div>
                                        <p className="text-[13px] font-bold text-slate-800 leading-snug">{selectedAsset.FullDescription}</p>
                                        <div className="grid grid-cols-2 gap-4 mt-4 pt-4 border-t border-indigo-100/50">
                                            <div>
                                                <span className="text-[8px] font-bold text-slate-400 uppercase block">Asset ID</span>
                                                <span className="text-xs font-black text-indigo-600">{selectedAsset.AssetID}</span>
                                            </div>
                                            <div>
                                                <span className="text-[8px] font-bold text-slate-400 uppercase block">Serial</span>
                                                <span className="text-xs font-bold text-slate-600">{selectedAsset.Serial || '-'}</span>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                <div className="space-y-2">
                                    <label className="text-[11px] font-bold text-slate-400 ml-1 uppercase block tracking-widest">Asset Photo</label>
                                    <div onClick={() => startCamera('photo')} className="aspect-video w-full bg-white rounded-[2.5rem] border-2 border-dashed border-slate-200 flex flex-col items-center justify-center overflow-hidden cursor-pointer relative shadow-inner">
                                        {auditForm.ImageData ? (
                                            <img src={auditForm.ImageData} className="w-full h-full object-cover" />
                                        ) : (
                                            <div className="text-center text-slate-300">
                                                <Icon name="camera" size={32} className="mx-auto mb-2" />
                                                <span className="text-[10px] font-bold uppercase tracking-widest">แตะเพื่อถ่ายรูปยืนยัน</span>
                                            </div>
                                        )}
                                    </div>
                                </div>

                                <div className="grid grid-cols-2 gap-4">
                                    <div className="space-y-2">
                                        <label className="text-[11px] font-bold text-slate-400 uppercase ml-1">Asset Type</label>
                                        <select value={auditForm.Asset_Type_ID} onChange={(e) => setAuditForm({...auditForm, Asset_Type_ID: e.target.value})} className="w-full p-4 bg-white border border-slate-100 rounded-2xl text-[10px] font-bold outline-none shadow-sm appearance-none">
                                            <option value="">-- เลือก --</option>
                                            {initialData.assetTypes.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
                                        </select>
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-[11px] font-bold text-slate-400 uppercase ml-1">Priority</label>
                                        <select value={auditForm.Priority_ID} onChange={(e) => setAuditForm({...auditForm, Priority_ID: e.target.value})} className="w-full p-4 bg-white border border-slate-100 rounded-2xl text-[10px] font-bold outline-none shadow-sm appearance-none">
                                            <option value="">-- เลือก --</option>
                                            {initialData.priorities.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                                        </select>
                                    </div>
                                </div>

                                <div className="space-y-3">
                                    <label className="text-[11px] font-bold text-slate-400 uppercase ml-1">Working Shift</label>
                                    <div className="grid grid-cols-3 gap-3">
                                        {['เช้า', 'บ่าย', 'ดึก'].map((shift) => (
                                            <button key={shift} onClick={() => {
                                                const cur = auditForm.Shift_Work;
                                                setAuditForm({ ...auditForm, Shift_Work: cur.includes(shift) ? cur.filter(s => s !== shift) : [...cur, shift] });
                                            }} className={`py-4 rounded-2xl text-xs font-bold border transition-all ${auditForm.Shift_Work.includes(shift) ? 'bg-indigo-600 border-indigo-600 text-white shadow-lg shadow-indigo-100' : 'bg-white border-slate-100 text-slate-400'}`}>
                                                {shift}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <button disabled={loading} onClick={handleFinalSubmit} className="w-full py-5 mt-4 bg-indigo-600 text-white rounded-[2.5rem] font-bold text-sm shadow-xl shadow-indigo-100 flex items-center justify-center gap-3 active:scale-95 disabled:opacity-50 transition-all">
                                    {loading ? <Icon name="loader-2" className="animate-spin" /> : <><Icon name="send" size={18} /> ยืนยันการตรวจสอบ</>}
                                </button>
                            </div>
                        )}

                        {view === 'logs' && (
                            <div className="animate-in space-y-6">
                                {/* ส่วนตัวกรอง ตรึงไว้ด้านบน (Sticky Search) */}
                                <div className="sticky-search bg-slate-50/95 backdrop-blur-md pt-2 pb-6 -mx-6 px-6">
                                    <div className="flex justify-between items-center mb-4 px-2">
                                        <h2 className="font-bold text-slate-700">Audit Timeline Today</h2>
                                        <div className="px-3 py-1 bg-indigo-50 text-indigo-600 rounded-full text-[10px] font-bold">{auditLogs.length} Records</div>
                                    </div>
                                    
                                    <div className="relative">
                                        <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
                                            <Icon name="search" size={16} />
                                        </div>
                                        <input 
                                            type="text" 
                                            value={logSearchDept} 
                                            onFocus={() => setShowDeptDropdown(true)}
                                            onChange={(e) => {
                                                setLogSearchDept(e.target.value);
                                                setShowDeptDropdown(true);
                                            }} 
                                            placeholder="พิมพ์ชื่อหน่วยงานที่ต้องการค้นหา..." 
                                            className="w-full p-4 pl-12 bg-white rounded-2xl border border-slate-100 text-sm font-bold outline-none shadow-sm focus:ring-2 focus:ring-indigo-100 transition-all"
                                        />
                                        
                                        {/* Custom Dropdown สำหรับเลือกหน่วยงาน */}
                                        {showDeptDropdown && (
                                            <div className="absolute top-full left-0 right-0 mt-2 bg-white rounded-[1.5rem] border border-slate-100 shadow-2xl z-[100] max-h-60 overflow-y-auto custom-scrollbar">
                                                <div className="p-2">
                                                    <button 
                                                        onClick={() => { setLogSearchDept(''); setShowDeptDropdown(false); }}
                                                        className="w-full text-left px-4 py-3 text-[11px] font-bold text-slate-400 hover:bg-slate-50 rounded-xl uppercase tracking-widest"
                                                    >
                                                        แสดงทั้งหมด
                                                    </button>
                                                    {uniqueLogDepts
                                                        .filter(d => (d || "").toLowerCase().includes(logSearchDept.toLowerCase()))
                                                        .map((d, i) => (
                                                            <button 
                                                                key={i}
                                                                onClick={() => { setLogSearchDept(d); setShowDeptDropdown(false); }}
                                                                className="w-full text-left px-4 py-3 text-sm font-bold text-slate-700 hover:bg-indigo-50 hover:text-indigo-600 rounded-xl transition-colors border-b border-slate-50 last:border-0"
                                                            >
                                                                {d}
                                                            </button>
                                                        ))
                                                    }
                                                    {uniqueLogDepts.filter(d => (d || "").toLowerCase().includes(logSearchDept.toLowerCase())).length === 0 && (
                                                        <div className="px-4 py-3 text-xs text-slate-400 text-center italic">ไม่พบข้อมูลหน่วยงานนี้</div>
                                                    )}
                                                </div>
                                            </div>
                                        )}
                                        
                                        {logSearchDept && (
                                            <button 
                                                onClick={() => { setLogSearchDept(''); setShowDeptDropdown(false); }}
                                                className="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-300 hover:text-slate-500"
                                            >
                                                <Icon name="x-circle" size={16} />
                                            </button>
                                        )}
                                    </div>
                                </div>

                                {/* พื้นที่แสดงผลรายการจัดกลุ่ม */}
                                <div className="space-y-10" onClick={() => setShowDeptDropdown(false)}>
                                    {Object.keys(groupedLogs).length > 0 ? (
                                        Object.entries(groupedLogs).map(([deptName, assetTypeGroups], dIdx) => (
                                            <div key={dIdx} className="space-y-4">
                                                {/* Header หน่วยงาน (Sticky Dept) */}
                                                <div className="sticky-dept bg-slate-50 py-2 flex items-center gap-3">
                                                    <div className="p-2 bg-indigo-600 text-white rounded-xl shadow-md shadow-indigo-100 flex-shrink-0">
                                                        <Icon name="building-2" size={14} />
                                                    </div>
                                                    <h3 className="font-black text-slate-800 text-sm uppercase tracking-tight truncate">{deptName}</h3>
                                                </div>

                                                <div className="ml-4 border-l-2 border-slate-200 pl-6 space-y-8">
                                                    {Object.entries(assetTypeGroups).map(([typeName, logs], tIdx) => (
                                                        <div key={tIdx} className="space-y-4">
                                                            {/* Header ประเภทครุภัณฑ์ */}
                                                            <div className="flex items-center gap-2">
                                                                <div className="w-2 h-2 rounded-full bg-indigo-500 shadow-[0_0_8px_rgba(99,102,241,0.5)]"></div>
                                                                <span className="text-[11px] font-black text-indigo-500 uppercase tracking-widest">{typeName} ({logs.length})</span>
                                                            </div>

                                                            {/* รายการตรวจสอบ */}
                                                            <div className="grid gap-4">
                                                                {logs.map((log, lIdx) => (
                                                                    <div key={lIdx} className="bg-white p-5 rounded-[2rem] border border-slate-100 shadow-sm relative group hover:border-indigo-300 hover:shadow-indigo-50 transition-all">
                                                                        <div className="flex justify-between items-start mb-2">
                                                                            <span className="px-2 py-0.5 bg-slate-50 text-slate-500 text-[9px] font-bold rounded-lg border border-slate-100">
                                                                                {log.AssetID || "นอกระบบ"}
                                                                            </span>
                                                                            <button onClick={() => handleDelete(log.AL_ID)} className="text-slate-200 hover:text-rose-500 p-1 active:scale-90 transition-all">
                                                                                <Icon name="trash-2" size={14}/>
                                                                            </button>
                                                                        </div>
                                                                        <h4 className="text-[13px] font-bold text-slate-700 leading-tight">{log.FullDescription || log.BrandDetail}</h4>
                                                                        
                                                                        <div className="flex flex-wrap gap-2 mt-3">
                                                                            {log.Serial && (
                                                                                <div className="flex items-center gap-1.5 text-[9px] font-bold text-slate-500 bg-slate-100/50 px-2.5 py-1 rounded-full">
                                                                                    <Icon name="hash" size={10}/> {log.Serial}
                                                                                </div>
                                                                            )}
                                                                            <div className="flex items-center gap-1.5 text-[9px] font-black text-indigo-500 bg-indigo-50 px-2.5 py-1 rounded-full uppercase tracking-tighter">
                                                                                <Icon name="clock" size={10}/> {log.Shift_Work || '-'}
                                                                            </div>
                                                                        </div>

                                                                        <div className="mt-4 pt-4 border-t border-slate-50 flex justify-between items-center text-[10px] font-bold text-slate-400">
                                                                            <div className="flex items-center gap-1.5"><Icon name="calendar" size={12}/> {new Date(log.DATE).toLocaleDateString()}</div>
                                                                            <div className="flex items-center gap-1.5"><Icon name="user-check" size={12}/> {log.StaffName}</div>
                                                                        </div>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        ))
                                    ) : (
                                        <div className="text-center py-24 opacity-30 text-slate-400">
                                            <Icon name="clipboard-list" size={56} className="mx-auto mb-4 stroke-1" />
                                            <p className="text-sm font-bold uppercase tracking-widest">ไม่พบรายการข้อมูล</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </main>

                    {statusMsg && (
                        <div className={`fixed top-24 left-6 right-6 p-4 rounded-2xl shadow-2xl flex items-center gap-3 z-[110] animate-in ${statusMsg.type === 'success' ? 'bg-indigo-600 text-white' : 'bg-rose-500 text-white'}`}>
                            <Icon name={statusMsg.type === 'success' ? 'check-circle-2' : 'alert-circle'} />
                            <span className="font-bold text-xs">{statusMsg.msg}</span>
                        </div>
                    )}

                    {cameraActive && (
                        <div className="fixed inset-0 bg-black z-[100] flex flex-col">
                            <div className="absolute top-10 left-8 flex items-center gap-4 text-white z-[110]">
                                <button onClick={() => { if (videoRef.current?.srcObject) videoRef.current.srcObject.getTracks().forEach(t => t.stop()); setCameraActive(false); }} className="p-4 bg-white/10 rounded-full"><Icon name="x" size={24}/></button>
                                <span className="font-bold text-sm tracking-wide uppercase">{scanTarget} Mode</span>
                            </div>
                            <video ref={videoRef} autoPlay playsInline className="flex-1 object-cover" />
                            <div className="p-12 bg-slate-900 flex justify-center rounded-t-[3.5rem]">
                                <button onClick={captureAction} className="w-20 h-20 bg-white rounded-full border-[6px] border-white/20 active:scale-90 transition-transform" />
                            </div>
                        </div>
                    )}

                    <nav className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/80 backdrop-blur-xl border-t border-slate-100 p-5 px-12 flex justify-between items-center z-[60] rounded-t-[2.5rem] shadow-[0_-10px_25px_-5px_rgba(0,0,0,0.05)]">
                        <button onClick={() => setView('home')} className={`flex flex-col items-center gap-1.5 transition-all ${view !== 'logs' ? 'text-indigo-600' : 'text-slate-300'}`}>
                            <Icon name="layout-dashboard" size={22} strokeWidth={view !== 'logs' ? 2.5 : 2} />
                            <span className="text-[9px] font-black uppercase tracking-tight">Dashboard</span>
                        </button>
                        <button onClick={() => setView('logs')} className={`flex flex-col items-center gap-1.5 transition-all ${view === 'logs' ? 'text-indigo-600' : 'text-slate-300'}`}>
                            <Icon name="history" size={22} strokeWidth={view === 'logs' ? 2.5 : 2} />
                            <span className="text-[9px] font-black uppercase tracking-tight">Timeline Logs</span>
                        </button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
