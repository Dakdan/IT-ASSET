<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IT ASSET INVENTORY SYSTEM v2.0</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; -webkit-tap-highlight-color: transparent; }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .glass-morphism { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>

<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>
   
    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;
        
        const Icon = ({ name, size = 20, className = "", strokeWidth = 2, ...props }) => {
            const spanRef = useRef(null);
            useEffect(() => {
                if (spanRef.current && window.lucide) {
                    const tempDiv = document.createElement('div');
                    tempDiv.innerHTML = `<i data-lucide="${name}" stroke-width="${strokeWidth}"></i>`;
                    window.lucide.createIcons({ root: tempDiv });
                    const svg = tempDiv.querySelector('svg');
                    if (svg) {
                        svg.setAttribute('width', size);
                        svg.setAttribute('height', size);
                        if (className) svg.setAttribute('class', className);
                        spanRef.current.innerHTML = '';
                        spanRef.current.appendChild(svg);
                    }
                }
            }, [name, size, className, strokeWidth]);
            return <span ref={spanRef} style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }} {...props}></span>;
        };

        const LoadingOverlay = () => (
            <div className="fixed inset-0 z-[100] flex items-center justify-center bg-white/60 backdrop-blur-sm">
                <div className="flex flex-col items-center gap-3">
                    <Icon name="loader-2" size={48} className="animate-spin text-indigo-600" />
                    <p className="text-sm font-bold text-slate-600 animate-pulse">กำลังส่งข้อมูลและบันทึกรูปภาพ...</p>
                </div>
            </div>
        );

        const API_URL = "https://script.google.com/macros/s/AKfycbzlwkwuMk9Y7qpEqT7JlnDFjWwlmvYVpW0NOuaEBcS6_3iocDVC6Jpc2ZL9P1qvbHM/exec";

        const App = () => {
            const [view, setView] = useState('home');
            const [loading, setLoading] = useState(false);
            const [statusMsg, setStatusMsg] = useState(null);

            const [initialData, setInitialData] = useState({ priorities: [], assetTypes: [], shifts: [] });
            const [rawDeptList, setRawDeptList] = useState([]);
            const [buildings, setBuildings] = useState([]);
            const [floors, setFloors] = useState([]);
            const [auditLogs, setAuditLogs] = useState([]);
            
            const [selectedBuilding, setSelectedBuilding] = useState('');
            const [selectedFloor, setSelectedFloor] = useState('');
            const [filteredDepts, setFilteredDepts] = useState([]);
            const [selectedDept, setSelectedDept] = useState(null);

            const [searchQuery, setSearchQuery] = useState('');
            const [searchResults, setSearchResults] = useState([]);
            const [selectedAsset, setSelectedAsset] = useState(null);
            const [logSearchQuery, setLogSearchQuery] = useState('');

            const [auditForm, setAuditForm] = useState({
                Asset_ID: '', 
                Serial: '', 
                BrandDetail: '', 
                MAStatus: '',
                ImageData: '', 
                gps: '', 
                Asset_Type_ID: '',
                PIORITY_ID: '', 
                Shift_Work: [], 
                IsPac: false, 
                IsRent: false, 
                ASS_ON_OUT: '1',
                IT_User_Mail: 'demo@it.audit',
                Activity_ID: 'Ac-2569'
            });

            const videoRef = useRef(null);
            const [cameraActive, setCameraActive] = useState(false);
            const [scanTarget, setScanTarget] = useState(null);
            const searchTimeoutRef = useRef(null);

            useEffect(() => {
                fetchGlobalData();
            }, []);

            const fetchGlobalData = async () => {
                setLoading(true);
                try {
                    const [resInit, resDept, resLogs] = await Promise.all([
                        fetch(`${API_URL}?action=getInitialData`).then(r => r.json()),
                        fetch(`${API_URL}?action=getDeptList`).then(r => r.json()),
                        fetch(`${API_URL}?action=getAuditLogs`).then(r => r.json())
                    ]);
                    
                    setInitialData(resInit || { priorities: [], assetTypes: [], shifts: [] });
                    setRawDeptList(resDept || []);
                    setAuditLogs(resLogs || []);
                    
                    if (resDept && Array.isArray(resDept)) {
                        const bldgs = [...new Set(resDept.map(item => item.BUILDING))].filter(Boolean).sort();
                        setBuildings(bldgs);
                    }
                } catch (err) {
                    showStatus('ไม่สามารถเชื่อมต่อ Server ได้', 'error');
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => {
                if (selectedBuilding) {
                    const availableFloors = rawDeptList
                        .filter(item => item.BUILDING === selectedBuilding)
                        .map(item => String(item.FL))
                        .filter((v, i, a) => v && v !== "undefined" && a.indexOf(v) === i)
                        .sort();
                    setFloors(availableFloors);
                    setSelectedFloor('');
                } else {
                    setFloors([]);
                }
            }, [selectedBuilding, rawDeptList]);

            useEffect(() => {
                if (selectedBuilding && selectedFloor) {
                    const depts = rawDeptList.filter(
                        item => item.BUILDING === selectedBuilding && String(item.FL) === selectedFloor
                    );
                    setFilteredDepts(depts);
                } else {
                    setFilteredDepts([]);
                }
            }, [selectedFloor, selectedBuilding, rawDeptList]);

            const showStatus = (msg, type) => {
                setStatusMsg({ msg, type });
                setTimeout(() => setStatusMsg(null), 4000);
            };

            const executeSearch = async (queryValue) => {
                let q = queryValue.trim();
                if (!q) { setSearchResults([]); return; }
                setLoading(true);
                try {
                    const res = await fetch(`${API_URL}?action=searchAsset&query=${encodeURIComponent(q)}`);
                    const data = await res.json();
                    setSearchResults(data || []);
                    if (data && data.length === 0) {
                        showStatus('ไม่พบข้อมูลครุภัณฑ์นี้', 'error');
                    }
                } catch (err) {
                    showStatus('การค้นหาล้มเหลว', 'error');
                    setSearchResults([]);
                } finally {
                    setLoading(false);
                }
            };

            const handleInputChange = (val) => {
                setSearchQuery(val);
                clearTimeout(searchTimeoutRef.current);
                if (val.trim()) {
                    searchTimeoutRef.current = setTimeout(() => executeSearch(val), 500);
                } else {
                    setSearchResults([]);
                }
            };

            const startCamera = (mode) => {
                setCameraActive(true);
                setScanTarget(mode);
                navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
                    .then(stream => { if (videoRef.current) videoRef.current.srcObject = stream; })
                    .catch(() => { showStatus('เปิดกล้องไม่ได้', 'error'); setCameraActive(false); });
            };

            const captureAction = () => {
                const canvas = document.createElement('canvas');
                const video = videoRef.current;
                
                // Resize for Better Performance & Storage (Max 800px)
                const MAX_WIDTH = 800;
                const scale = Math.min(1, MAX_WIDTH / video.videoWidth);
                canvas.width = video.videoWidth * scale;
                canvas.height = video.videoHeight * scale;
                
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                // Get Base64 with compression (jpeg reduces size significantly)
                const base64Img = canvas.toDataURL('image/jpeg', 0.6);
                
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        (pos) => {
                            const gpsStr = `${pos.coords.latitude}, ${pos.coords.longitude}`;
                            if (scanTarget === 'photo') {
                                setAuditForm(prev => ({...prev, ImageData: base64Img, gps: gpsStr}));
                            }
                        },
                        (err) => {
                            if (scanTarget === 'photo') setAuditForm(prev => ({...prev, ImageData: base64Img, gps: 'Unknown'}));
                        },
                        { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
                    );
                } else {
                    if (scanTarget === 'photo') setAuditForm(prev => ({...prev, ImageData: base64Img, gps: 'Not Supported'}));
                }

                stopCamera();
            };

            const stopCamera = () => {
                if (videoRef.current && videoRef.current.srcObject) {
                    videoRef.current.srcObject.getTracks().forEach(t => t.stop());
                }
                setCameraActive(false);
            };

            const toggleShift = (shiftId) => {
                setAuditForm(prev => {
                    const currentShifts = [...prev.Shift_Work];
                    if (currentShifts.includes(shiftId)) {
                        return { ...prev, Shift_Work: currentShifts.filter(id => id !== shiftId) };
                    } else {
                        return { ...prev, Shift_Work: [...currentShifts, shiftId] };
                    }
                });
            };

            const handleFinalSubmit = async () => {
                if (!auditForm.ImageData) { showStatus('กรุณาถ่ายรูปเพื่อยืนยันการตรวจสอบ', 'error'); return; }
                if (!auditForm.Asset_Type_ID) { showStatus('กรุณาเลือกประเภทอุปกรณ์', 'error'); return; }
                if (!auditForm.Piority_ID) { showStatus('กรุณาเลือกการใช้งาน', 'error'); return; }
                if (auditForm.Shift_Work.length === 0) { showStatus('กรุณาเลือกอย่างน้อย 1 กะ', 'error'); return; }
                
                setLoading(true);
                const isNonNumber = !selectedAsset;
                const note2Value = (auditForm.IsPac ? "PAC" : "") + (auditForm.IsRent ? (auditForm.IsPac ? "/RENT" : "RENT") : "");

                // Map fields to match exactly what your writeAssetImageLog expects
                // data.noid, data.assetId, data.imageName, data.activityId
                const finalAssetId = isNonNumber ? auditForm.Asset_ID : selectedAsset.AssetID;
                const finalNoId = isNonNumber ? "" : (selectedAsset.NoID || "");
                
                const payloadData = {
                    ...auditForm,
                    // ฟิลด์สำหรับ Log ทั่วไป
                    NoID: finalNoId,
                    Asset_ID: finalAssetId,
                    DEPT_ID: selectedDept?.DEP_ID || "",
                    Shift_Work: auditForm.Shift_Work.join(','), 
                    Detail_ID: auditForm.BrandDetail || "-",
                    Note1: "2569", 
                    Note2: note2Value,
                    
                    // ฟิลด์สำคัญที่ Script ใช้ (Mapping ตาม writeAssetImageLog)
                    noid: finalNoId,
                    assetId: finalAssetId,
                    imageName: auditForm.ImageData, // หรือตั้งชื่อไฟล์ที่ต้องการ
                    activityId: auditForm.Activity_ID,
                    actionId: "SURVEY-" + Date.now(),
                    
                    // ฟิลด์สำหรับบันทึก Base64 ลง Drive
                    ImageData: auditForm.ImageData 
                };

                try {
                    // ใช้ fetch แบบปกติ
                    const res = await fetch(API_URL, { 
                        method: 'POST', 
                        // เนื่องจาก GAS Web App ต้องการ text/plain หรือ JSON String
                        body: JSON.stringify({
                            action: isNonNumber ? 'saveNonNumber' : 'saveSurvey',
                            data: payloadData
                        }) 
                    });

                    // ในกรณี Google Apps Script การทำ POST มักจะเกิด CORS
                    // แต่ข้อมูลมักจะถึงฝั่ง Server แล้วถ้าเราส่งสำเร็จ
                    setTimeout(() => {
                        successFlow();
                    }, 2000);

                } catch (err) {
                    showStatus('ส่งข้อมูลไม่สำเร็จ กรุณาลองใหม่อีกครั้ง', 'error');
                    setLoading(false);
                }
            };

            const successFlow = () => {
                showStatus('บันทึกข้อมูลและรูปภาพสำเร็จ', 'success');
                setSearchQuery('');
                setSearchResults([]);
                // รีเฟรชประวัติ
                fetch(`${API_URL}?action=getAuditLogs`).then(r => r.json()).then(setAuditLogs).catch(() => {});
                clearAuditForm();
                setView('search');
                setLoading(false);
            };

            const clearAuditForm = () => {
                setAuditForm({
                    Asset_ID: '', Serial: '', BrandDetail: '', MAStatus: 'ตรวจสอบแล้ว',
                    ImageData: '', gps: '', Asset_Type_ID: '',
                    PIORITY_ID: '', Shift_Work: [], IsPac: false, IsRent: false, ASS_ON_OUT: '1',
                    IT_User_Mail: 'demo@it.audit',
                    Activity_ID: 'Ac-2569'
                });
                setSelectedAsset(null);
            };

            const groupedLogs = useMemo(() => {
                if (!auditLogs || !Array.isArray(auditLogs)) return [];
                let filtered = auditLogs;
                if (logSearchQuery) {
                    const q = logSearchQuery.toLowerCase();
                    filtered = auditLogs.filter(log => 
                        (log.DEPT_NAME || log.Department || "").toLowerCase().includes(q) ||
                        (log.AssetID || log.Asset_ID || "").toLowerCase().includes(q) ||
                        (log.FullDescription || "").toLowerCase().includes(q)
                    );
                }
                const groups = {};
                filtered.forEach(log => {
                    const dName = log.DEPT_NAME || log.Department || "ทั่วไป / ไม่ทราบหน่วยงาน";
                    if (!groups[dName]) groups[dName] = [];
                    groups[dName].push(log);
                });
                return Object.entries(groups)
                    .map(([name, data]) => ({ name, data }))
                    .sort((a, b) => a.name.localeCompare(b.name, 'th'));
            }, [auditLogs, logSearchQuery]);

            return (
                <div className="min-h-screen w-full sm:max-w-md sm:mx-auto bg-slate-50 shadow-2xl relative pb-28 flex flex-col">
                    {loading && <LoadingOverlay />}
                    
                    {statusMsg && (
                        <div className={`fixed top-20 left-1/2 -translate-x-1/2 z-[110] px-6 py-3 rounded-2xl shadow-xl flex items-center gap-3 animate-in whitespace-nowrap ${statusMsg.type === 'error' ? 'bg-rose-500 text-white' : 'bg-emerald-500 text-white'}`}>
                            <Icon name={statusMsg.type === 'error' ? 'alert-circle' : 'check-circle-2'} size={20} />
                            <span className="font-bold text-sm">{statusMsg.msg}</span>
                        </div>
                    )}

                    {cameraActive && (
                        <div className="fixed inset-0 z-[120] bg-black flex flex-col sm:max-w-md sm:mx-auto">
                            <div className="p-6 flex justify-between items-center text-white glass-morphism border-b border-white/10">
                                <span className="font-bold text-sm tracking-tight">
                                    {scanTarget === 'photo' ? 'ถ่ายภาพครุภัณฑ์' : 'สแกน Barcode/QR'}
                                </span>
                                <button onClick={stopCamera} className="p-2 bg-white/20 rounded-full"><Icon name="x" size={16} /></button>
                            </div>
                            <div className="flex-1 flex items-center justify-center relative overflow-hidden">
                                <video ref={videoRef} autoPlay playsInline muted className="w-full h-full object-cover" />
                                <div className="absolute inset-0 border-[40px] border-black/40 pointer-events-none">
                                    <div className="w-full h-full border-2 border-dashed border-white/50 rounded-lg"></div>
                                </div>
                            </div>
                            <div className="p-10 flex justify-center bg-black/80">
                                <button onClick={captureAction} className="w-20 h-20 bg-white rounded-full flex items-center justify-center shadow-2xl active:scale-90 transition-transform">
                                    <div className="w-16 h-16 border-4 border-slate-900 rounded-full"></div>
                                </button>
                            </div>
                        </div>
                    )}

                    <header className="bg-white px-6 py-4 sticky top-0 z-[60] flex items-center justify-between border-b border-slate-100 shadow-sm">
                        <div className="flex items-center gap-3">
                            <div className="w-11 h-11 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-lg shadow-indigo-100 p-2 overflow-hidden">
                                <Icon name="monitor-smartphone" className="text-white" size={24} />
                            </div>
                            <div>
                                <h1 className="font-bold text-slate-800 leading-tight uppercase tracking-tight text-sm">IT Asset System</h1>
                                <p className="text-[9px] text-indigo-500 font-black uppercase tracking-widest">v2.0 Inventory Mapping</p>
                            </div>
                        </div>
                    </header>

                    <main className="flex-1 p-6 overflow-y-auto">
                        
                        {view === 'home' && (
                            <div className="space-y-6 animate-in">
                                <div className="bg-white p-7 rounded-[2.5rem] border border-slate-100 shadow-sm">
                                    <div className="flex items-center gap-2 mb-6 text-slate-700">
                                        <Icon name="map-pin" size={18} className="text-indigo-500" />
                                        <span className="font-bold text-lg">ระบุสถานที่ปฏิบัติงาน</span>
                                    </div>
                                    <div className="space-y-5">
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-bold text-slate-400 ml-2 uppercase">อาคาร (Building)</label>
                                            <div className="relative">
                                                <select value={selectedBuilding} onChange={(e) => setSelectedBuilding(e.target.value)} className="w-full p-4 bg-slate-50 rounded-2xl text-sm font-bold border-none outline-none appearance-none cursor-pointer">
                                                    <option value="">-- เลือกอาคาร --</option>
                                                    {buildings.map(b => <option key={b} value={b}>{b}</option>)}
                                                </select>
                                                <Icon name="chevron-down" size={16} className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none" />
                                            </div>
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-bold text-slate-400 ml-2 uppercase">ชั้น (Floor)</label>
                                            <div className="relative">
                                                <select value={selectedFloor} onChange={(e) => setSelectedFloor(e.target.value)} disabled={!selectedBuilding} className="w-full p-4 bg-slate-50 rounded-2xl text-sm font-bold border-none outline-none disabled:opacity-50 appearance-none cursor-pointer">
                                                    <option value="">-- เลือกชั้น --</option>
                                                    {floors.map(f => <option key={f} value={f}>ชั้น {f}</option>)}
                                                </select>
                                                <Icon name="chevron-down" size={16} className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none" />
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div className="space-y-3">
                                    <p className="text-[11px] font-bold text-slate-400 uppercase tracking-widest px-2">หน่วยงานที่พบ ({filteredDepts.length})</p>
                                    <div className="grid gap-3">
                                        {filteredDepts.map(dept => (
                                            <button key={dept.DEP_ID} onClick={() => { setSelectedDept(dept); setView('search'); }} className="w-full bg-white p-5 rounded-3xl border border-slate-100 flex items-center justify-between active:scale-[0.97] transition-all shadow-sm group">
                                                <div className="text-left">
                                                    <p className="text-[10px] font-bold text-indigo-500 mb-0.5 tracking-tight">{dept.DEP_ID}</p>
                                                    <p className="font-bold text-slate-700">{dept.DEPNAME}</p>
                                                </div>
                                                <Icon name="arrow-right" size={18} className="text-slate-300 group-hover:text-indigo-500" />
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'search' && (
                            <div className="space-y-5 animate-in">
                                <div className="bg-slate-900 p-6 rounded-[2.5rem] text-white shadow-xl relative overflow-hidden">
                                    <div className="relative z-10 pr-12">
                                        <div className="flex items-center gap-2 mb-2">
                                            <Icon name="building-2" size={14} className="text-indigo-400" />
                                            <p className="text-[10px] font-bold text-indigo-400 uppercase">{selectedDept?.DEPNAME}</p>
                                        </div>
                                        <p className="text-xs opacity-60"> อาคาร {selectedBuilding} | ชั้น {selectedFloor}</p>
                                    </div>
                                    <button onClick={() => setView('home')} className="absolute right-6 top-1/2 -translate-y-1/2 p-3 bg-white/10 rounded-2xl active:scale-90 transition-transform">
                                        <Icon name="refresh-cw" size={18}/>
                                    </button>
                                </div>
                                <div className="space-y-2">
                                    <label className="text-[10px] font-bold text-slate-400 ml-3 uppercase">ค้นหาครุภัณฑ์</label>
                                    <div className="relative">
                                        <input type="text" value={searchQuery} onChange={(e) => handleInputChange(e.target.value)} placeholder="พิมพ์รหัสครุภัณฑ์..." className="w-full p-5 pr-16 bg-white rounded-3xl border border-slate-100 font-bold text-sm outline-none shadow-sm focus:ring-2 focus:ring-indigo-100" />
                                        <button onClick={() => startCamera('search')} className="absolute right-2 top-2 bottom-2 px-4 bg-indigo-50 text-indigo-600 rounded-2xl active:scale-95"><Icon name="scan" /></button>
                                    </div>
                                </div>
                                <div className="space-y-4 pt-2">
                                    <button onClick={() => { setSelectedAsset(null); clearAuditForm(); setAuditForm(p => ({...p, Asset_ID: searchQuery})); setView('audit'); }} className="w-full py-5 bg-white border-2 border-dashed border-slate-200 text-slate-400 rounded-3xl text-xs font-bold flex flex-col items-center justify-center gap-2 hover:border-indigo-300 hover:text-indigo-500 shadow-sm transition-all active:bg-slate-50">
                                        <div className="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center"><Icon name="plus" size={20}/></div>
                                        เพิ่มครุภัณฑ์นอกระบบ (Non-Number)
                                    </button>
                                    {searchResults.map((item, idx) => (
                                        <div key={item.AssetID || idx} onClick={() => { setSelectedAsset(item); setView('audit'); }} className="bg-white p-5 rounded-3xl border-l-4 border-l-indigo-600 shadow-sm active:scale-[0.98] cursor-pointer transition-transform">
                                            <p className="font-black text-indigo-600 text-sm mb-1">{item.AssetID}</p>
                                            <p className="text-xs font-bold text-slate-600 leading-snug mb-2">{item.FullDescription}</p>
                                            <div className="flex items-center gap-3 text-[10px] text-slate-400">
                                                <span className="flex items-center gap-1 font-bold"><Icon name="clock" size={10} /> {item.AgeInfo || 'ไม่ระบุอายุ'}</span>
                                                <span className="flex items-center gap-1 font-bold"><Icon name="tag" size={10} /> SN: {item.Serial || '-'}</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'audit' && (
                            <div className="space-y-6 animate-in pb-8">
                                <div className="flex items-center justify-between">
                                    <button onClick={() => setView('search')} className="p-3 bg-white rounded-2xl text-slate-400 shadow-sm active:scale-90"><Icon name="chevron-left" /></button>
                                    <h2 className="font-black text-slate-700 tracking-tight">แบบสำรวจ</h2>
                                    <button onClick={clearAuditForm} className="text-[10px] font-bold text-rose-500 bg-rose-50 px-3 py-2 rounded-xl active:scale-95 uppercase">Reset</button>
                                </div>

                                {!selectedAsset ? (
                                    <div className="bg-amber-50/50 p-6 rounded-[2.5rem] border border-amber-100 space-y-4">
                                        <div className="flex items-center gap-2 mb-2 text-amber-600">
                                            <Icon name="alert-triangle" size={16} />
                                            <span className="text-xs font-bold">บันทึกนอกระบบ (Non-Number)</span>
                                        </div>
                                        <div className="space-y-1.5">
                                            <label className="text-[10px] font-bold text-slate-400 uppercase ml-1">Asset ID</label>
                                            <div className="flex gap-2">
                                                <input type="text" value={auditForm.Asset_ID} onChange={(e) => setAuditForm({...auditForm, Asset_ID: e.target.value})} className="flex-1 p-4 bg-white border border-amber-200 rounded-2xl text-sm font-semibold outline-none focus:border-amber-400" placeholder="ระบุเลขที่พบ..." />
                                                <button onClick={() => startCamera('asset_id')} className="p-4 bg-white text-amber-600 border border-amber-200 rounded-2xl active:scale-90"><Icon name="scan" size={18}/></button>
                                            </div>
                                        </div>
                                        <div className="space-y-1.5">
                                            <label className="text-[10px] font-bold text-slate-400 uppercase ml-1">Serial Number</label>
                                            <div className="flex gap-2">
                                                <input type="text" value={auditForm.Serial} onChange={(e) => setAuditForm({...auditForm, Serial: e.target.value})} className="flex-1 p-4 bg-white border border-amber-200 rounded-2xl text-sm font-semibold outline-none focus:border-amber-400" placeholder="ระบุ SN..." />
                                                <button onClick={() => startCamera('serial')} className="p-4 bg-white text-amber-600 border border-amber-200 rounded-2xl active:scale-90"><Icon name="scan" size={18}/></button>
                                            </div>
                                        </div>
                                        <input type="text" value={auditForm.BrandDetail} onChange={(e) => setAuditForm({...auditForm, BrandDetail: e.target.value})} placeholder="ยี่ห้อ / รุ่น / สเปค" className="w-full p-4 bg-white border border-amber-200 rounded-2xl text-sm font-semibold outline-none shadow-sm focus:border-amber-400" />
                                    </div>
                                ) : (
                                    <div className="p-6 bg-indigo-50/50 rounded-[2.5rem] border border-indigo-100 shadow-sm relative overflow-hidden">
                                        <div className="absolute top-0 right-0 bg-indigo-600 text-white text-[9px] font-bold px-3 py-1 rounded-bl-xl uppercase tracking-tighter">In System</div>
                                        <p className="text-[13px] font-bold text-slate-800 leading-snug mb-4 mt-2">{selectedAsset.FullDescription}</p>
                                        <div className="grid grid-cols-2 gap-4 pt-4 border-t border-indigo-100/50">
                                            <div><span className="text-[8px] font-black text-slate-400 uppercase block">Asset ID</span><span className="text-xs font-black text-indigo-600">{selectedAsset.AssetID}</span></div>
                                            <div><span className="text-[8px] font-black text-slate-400 uppercase block">Age Info</span><span className="text-xs font-bold text-slate-600">{selectedAsset.AgeInfo || 'ไม่ระบุอายุ'}</span></div>
                                        </div>
                                    </div>
                                )}

                                <div className="space-y-3">
                                    <label className="text-[11px] font-bold text-slate-400 ml-1 uppercase tracking-widest">ยืนยันภาพถ่าย <span className="text-rose-500">*</span></label>
                                    <div onClick={() => startCamera('photo')} className="aspect-video w-full bg-white rounded-[2.5rem] border-2 border-dashed border-slate-200 flex flex-col items-center justify-center overflow-hidden cursor-pointer relative shadow-inner">
                                        {auditForm.ImageData ? <img src={auditForm.ImageData} className="w-full h-full object-cover" /> : (
                                            <div className="text-center"><Icon name="camera" size={32} className="text-slate-300 mx-auto mb-2" /><p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">แตะเพื่อถ่ายรูป</p></div>
                                        )}
                                        {auditForm.ImageData && <div className="absolute bottom-3 right-3 bg-black/60 backdrop-blur-sm text-white text-[9px] px-3 py-1.5 rounded-xl flex items-center gap-1"><Icon name="refresh-ccw" size={10} /> ถ่ายใหม่</div>}
                                    </div>
                                </div>

                                <div className="space-y-4">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-2">
                                            <label className="text-[11px] font-bold text-slate-400 uppercase ml-1">ประเภท <span className="text-rose-500">*</span></label>
                                            <div className="relative">
                                                <select value={auditForm.Asset_Type_ID} onChange={(e) => setAuditForm({...auditForm, Asset_Type_ID: e.target.value})} className="w-full p-4 bg-white border border-slate-100 rounded-2xl text-xs font-bold outline-none appearance-none cursor-pointer">
                                                    <option value="">- เลือก -</option>
                                                    {initialData.assetTypes?.map(type => <option key={type.id} value={type.id}>{type.name}</option>)}
                                                </select>
                                                <Icon name="chevron-down" size={14} className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none" />
                                            </div>
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-[11px] font-bold text-slate-400 uppercase ml-1">ความสำคัญ</label>
                                            <div className="relative">
                                                <select value={auditForm.PIORITY_ID} onChange={(e) => setAuditForm({...auditForm, PIORITY_ID: e.target.value})} className="w-full p-4 bg-white border border-slate-100 rounded-2xl text-xs font-bold outline-none appearance-none cursor-pointer">
                                                    <option value="">- เลือก -</option>
                                                    {initialData.priorities?.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                                                </select>
                                                <Icon name="chevron-down" size={14} className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none" />
                                            </div>
                                        </div>
                                    </div>

                                    <div className="space-y-3">
                                        <label className="text-[11px] font-bold text-slate-400 uppercase ml-1 tracking-widest">เวร/กะ (Shift) <span className="text-rose-500">*</span></label>
                                        <div className="flex flex-wrap gap-2">
                                            {initialData.shifts?.map(shift => {
                                                const isSelected = auditForm.Shift_Work.includes(shift.id);
                                                return (
                                                    <button
                                                        key={shift.id}
                                                        type="button"
                                                        onClick={() => toggleShift(shift.id)}
                                                        className={`flex-1 min-w-[100px] p-3 rounded-2xl border-2 font-bold text-[11px] transition-all flex items-center justify-center gap-2 ${
                                                            isSelected ? 'bg-indigo-600 border-indigo-600 text-white shadow-md' : 'bg-white border-slate-100 text-slate-500 shadow-sm'
                                                        }`}
                                                    >
                                                        {isSelected ? <Icon name="check-circle" size={14} /> : <Icon name="circle" size={14} className="opacity-30" />}
                                                        {shift.name}
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    </div>
                                </div>

                                <div className="flex gap-4">
                                    <label className={`flex items-center justify-center gap-2 p-4 rounded-2xl border-2 flex-1 cursor-pointer transition-all ${auditForm.IsPac ? 'border-indigo-500 bg-indigo-50' : 'border-slate-100 bg-white'}`}>
                                        <input type="checkbox" checked={auditForm.IsPac} onChange={(e) => setAuditForm({...auditForm, IsPac: e.target.checked})} className="hidden" />
                                        <div className={`w-5 h-5 rounded flex items-center justify-center border-2 ${auditForm.IsPac ? 'bg-indigo-500 border-indigo-500 text-white' : 'border-slate-300'}`}>{auditForm.IsPac && <Icon name="check" size={14} />}</div>
                                        <span className={`text-xs font-bold ${auditForm.IsPac ? 'text-indigo-700' : 'text-slate-500'}`}>PAC</span>
                                    </label>
                                    <label className={`flex items-center justify-center gap-2 p-4 rounded-2xl border-2 flex-1 cursor-pointer transition-all ${auditForm.IsRent ? 'border-amber-500 bg-amber-50' : 'border-slate-100 bg-white'}`}>
                                        <input type="checkbox" checked={auditForm.IsRent} onChange={(e) => setAuditForm({...auditForm, IsRent: e.target.checked})} className="hidden" />
                                        <div className={`w-5 h-5 rounded flex items-center justify-center border-2 ${auditForm.IsRent ? 'bg-amber-500 border-amber-500 text-white' : 'border-slate-300'}`}>{auditForm.IsRent && <Icon name="check" size={14} />}</div>
                                        <span className={`text-xs font-bold ${auditForm.IsRent ? 'text-amber-700' : 'text-slate-500'}`}>RENT</span>
                                    </label>
                                </div>

                                <button onClick={handleFinalSubmit} disabled={loading} className="w-full bg-slate-900 text-white font-bold p-5 rounded-[2rem] shadow-xl shadow-slate-300 active:scale-95 transition-all flex items-center justify-center gap-2 mt-4">
                                    {loading ? <Icon name="loader-2" className="animate-spin" /> : <Icon name="save" />}
                                    {loading ? 'กำลังส่งข้อมูล...' : 'บันทึกผลการตรวจสอบ'}
                                </button>
                            </div>
                        )}

                        {view === 'logs' && (
                            <div className="space-y-5 animate-in">
                                <div className="bg-indigo-600 p-6 rounded-[2.5rem] text-white shadow-xl relative overflow-hidden">
                                    <div className="relative z-10"><h2 className="text-xl font-bold mb-1">ประวัติการบันทึก</h2><p className="text-xs text-indigo-200">ข้อมูลที่ตรวจสอบล่าสุด</p></div>
                                    <Icon name="clipboard-check" size={100} className="absolute -right-6 -bottom-6 text-white opacity-10" />
                                </div>
                                <div className="relative">
                                    <Icon name="search" size={18} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" />
                                    <input type="text" value={logSearchQuery} onChange={(e) => setLogSearchQuery(e.target.value)} placeholder="ค้นหาประวัติ..." className="w-full p-4 pl-12 bg-white rounded-2xl border border-slate-100 text-sm font-bold outline-none shadow-sm" />
                                </div>
                                <div className="space-y-6 pb-6">
                                    {groupedLogs.length === 0 ? (
                                        <div className="text-center py-10 opacity-40">
                                            <Icon name="inbox" size={48} className="mx-auto mb-2" />
                                            <p className="text-xs font-bold uppercase">ไม่พบข้อมูล</p>
                                        </div>
                                    ) : groupedLogs.map(group => (
                                        <div key={group.name} className="space-y-3">
                                            <h3 className="text-[11px] font-black text-indigo-500 uppercase tracking-widest px-2">{group.name}</h3>
                                            {group.data.map((log, idx) => (
                                                <div key={idx} className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 flex justify-between items-center group cursor-default">
                                                    <div className="pr-4">
                                                        <p className="font-black text-sm text-slate-800 mb-1">{log.Asset_ID || log.AssetID}</p>
                                                        <p className="text-xs font-semibold text-slate-500 leading-snug line-clamp-2">{log.FullDescription}</p>
                                                        {log.Timestamp && <p className="text-[9px] text-slate-400 mt-2"><Icon name="clock" size={10} className="inline mr-1" />{log.Timestamp}</p>}
                                                    </div>
                                                    <div className="flex flex-col items-center gap-1 shrink-0">
                                                        <div className="w-8 h-8 rounded-full bg-emerald-50 text-emerald-500 flex items-center justify-center"><Icon name="check" size={16} strokeWidth={3} /></div>
                                                        <span className="text-[9px] font-bold text-emerald-600">สำเร็จ</span>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-slate-100 pb-safe pt-2 z-50">
                        <div className="flex justify-around items-center px-4 py-2 sm:max-w-md sm:mx-auto">
                            <button onClick={() => setView('home')} className={`flex flex-col items-center gap-1 p-2 px-6 rounded-2xl transition-all ${view === 'home' || view === 'search' || view === 'audit' ? 'bg-indigo-50 text-indigo-600' : 'text-slate-400 hover:text-slate-600'}`}>
                                <Icon name="home" size={24} className={view === 'home' || view === 'search' || view === 'audit' ? "fill-indigo-100" : ""} />
                                <span className="text-[10px] font-bold">หน้าแรก</span>
                            </button>
                            <button onClick={() => setView('logs')} className={`flex flex-col items-center gap-1 p-2 px-6 rounded-2xl transition-all ${view === 'logs' ? 'bg-indigo-50 text-indigo-600' : 'text-slate-400 hover:text-slate-600'}`}>
                                <Icon name="clipboard-list" size={24} className={view === 'logs' ? "fill-indigo-100" : ""} />
                                <span className="text-[10px] font-bold">ประวัติ</span>
                            </button>
                        </div>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
