<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>IT Asset Survey UDH - Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    :root {
        --pink-soft: #fdf2f8;
        --pink-main: #ec4899;
        --pink-dark: #be185d;
        --slate-body: #f1f5f9; /* ปรับพื้นหลังให้ออกโทนเทาขึ้นเพื่อให้การ์ดสีขาวเด่น */
    }

    body {
        font-family: 'Kanit', sans-serif;
        background-color: var(--slate-body);
        min-height: 100vh;
    }

    .pink-gradient {
        background: linear-gradient(135deg, #f472b6 0%, #db2777 100%);
    }

    /* สไตล์ Navbar */
    .main-nav-head {
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(20px);
        position: sticky;
        top: 0;
        z-index: 100;
        border-bottom: 2px solid #fce7f3;
    }

    .nav-search-anchor {
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translate(-50%, 50%);
        width: 100%;
        max-width: 600px;
        padding: 0 1.5rem;
        z-index: 110;
    }

    .search-input-box {
        background: white;
        border-radius: 1.5rem;
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        border: 2px solid transparent;
        display: flex;
        align-items: center;
        transition: all 0.3s ease;
    }

    .search-input-box:focus-within {
        transform: translateY(2px);
        border-color: var(--pink-main);
        box-shadow: 0 20px 25px -5px rgba(236, 72, 153, 0.2);
    }

    /* การ์ดตึก - เน้นเส้นขอบและเงา */
    .building-container {
        background: white;
        border-radius: 2rem;
        border: 2px solid #e2e8f0; /* เส้นขอบเด่นชัดขึ้น */
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        margin-bottom: 4rem;
        overflow: hidden;
    }

    .building-header {
        background: linear-gradient(to right, #f8fafc, #fff1f2);
        padding: 1.75rem 2.5rem;
        border-bottom: 2px solid #f1f5f9;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    /* การ์ดหน่วยงาน - ปรับเส้นขอบให้เข้มขึ้น */
    .dept-card {
        background: white;
        border: 2px solid #f1f5f9;
        border-radius: 1.25rem;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        cursor: pointer;
    }

    .dept-card:hover {
        border-color: var(--pink-main);
        box-shadow: 0 12px 20px -8px rgba(236, 72, 153, 0.3);
        transform: scale(1.02);
    }

    /* ปรับปรุง Floor Separator */
    .floor-section-header {
        background: #f8fafc;
        border-left: 4px solid var(--pink-main);
        padding: 0.5rem 1rem;
        border-radius: 0 0.75rem 0.75rem 0;
        margin-bottom: 1.5rem;
        display: inline-flex;
        align-items: center;
        gap: 0.75rem;
    }

    .floor-badge {
        background: var(--pink-main);
        color: white;
        font-weight: 800;
        padding: 0.25rem 0.85rem;
        border-radius: 0.5rem;
        font-size: 0.85rem;
        box-shadow: 0 2px 4px rgba(236, 72, 153, 0.2);
    }

    .custom-scroll::-webkit-scrollbar { width: 8px; }
    .custom-scroll::-webkit-scrollbar-track { background: #f1f5f9; }
    .custom-scroll::-webkit-scrollbar-thumb { background: #f472b6; border-radius: 10px; border: 2px solid #f1f5f9; }

    @media print {
        .no-print { display: none !important; }
        body { background: white !important; }
        .building-container { border: 2px solid #000 !important; break-inside: avoid; margin-bottom: 1rem; }
    }
</style>
</head>

<body class="text-slate-700">

<!-- Navigation -->
<nav class="main-nav-head no-print">
    <div class="max-w-[1400px] mx-auto px-6 h-20 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <img src="https://img2.pic.in.th/-227e4f6f84f29f020.png" alt="Logo" class="h-10">
            <div>
                <h1 class="text-lg font-black text-slate-800 leading-none">IT ASSET <span class="text-pink-500">AUDIT</span></h1>
                <p class="text-[9px] text-pink-400 font-bold tracking-[0.1em] mt-0.5">Udonthani Hospital</p>
            </div>
        </div>

        <div class="flex items-center gap-2">
            <button onclick="init()" class="w-9 h-9 flex items-center justify-center text-slate-400 hover:text-pink-500 transition-all rounded-lg hover:bg-pink-50">
                <i id="refreshIcon" class="fas fa-sync-alt text-sm"></i>
            </button>
            <button onclick="window.location.href='survey_v4_form.html'" class="pink-gradient px-5 py-2 rounded-xl text-white font-bold text-xs shadow-lg shadow-pink-200 hover:scale-105 transition-all">
                <i class="fas fa-plus mr-1.5"></i> ตรวจพัสดุ
            </button>
        </div>

        <div class="nav-search-anchor">
            <div class="search-input-box px-5 py-3.5">
                <i class="fas fa-search text-pink-400 mr-3 text-lg"></i>
                <input id="searchInput" oninput="renderDashboard()" placeholder="ค้นหาตามชื่อตึก, ชั้น หรือชื่อหน่วยงาน..." class="w-full outline-none text-sm font-semibold placeholder:text-slate-300">
                <span id="lastUpdate" class="text-[10px] text-slate-400 font-bold ml-2 hidden md:inline">...</span>
            </div>
        </div>
    </div>
</nav>

<main class="max-w-[1400px] mx-auto px-6 pt-20 pb-20">
    <!-- Header Stats -->
    <div class="flex flex-col md:flex-row justify-between items-end mb-12 gap-6">
        <div class="border-l-4 border-pink-500 pl-6">
            <h2 class="text-4xl font-black text-slate-800 tracking-tight">รายการแยกตาม <span class="text-pink-500">พื้นที่</span></h2>
            <p class="text-slate-500 text-sm mt-2 font-medium">ภาพรวมการสำรวจครุภัณฑ์คอมพิวเตอร์ ประจำปี 2569</p>
        </div>
        <div class="flex gap-4">
            <div class="bg-white border-2 border-slate-200 px-6 py-4 rounded-2xl shadow-sm text-center">
                <p id="statDepts" class="text-3xl font-black text-slate-800 leading-none">-</p>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-2">หน่วยงาน</p>
            </div>
            <div class="pink-gradient px-6 py-4 rounded-2xl shadow-xl shadow-pink-200 text-center">
                <p id="statAssets" class="text-3xl font-black text-white leading-none">-</p>
                <p class="text-[10px] font-bold text-pink-100 uppercase tracking-widest mt-2">รายการทั้งหมด</p>
            </div>
        </div>
    </div>

    <!-- Main Content Area -->
    <div id="contentArea" class="space-y-12">
        <div class="text-center py-20">
            <i class="fas fa-circle-notch animate-spin text-pink-400 text-4xl"></i>
            <p class="mt-4 text-slate-400 font-bold text-sm tracking-widest uppercase">Initializing Dashboard...</p>
        </div>
    </div>
</main>

<!-- Modal -->
<div id="modalDept" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md hidden items-center justify-center z-[200] p-4 no-print" onclick="closeModal()">
    <div class="bg-white w-full max-w-5xl max-h-[90vh] rounded-[2.5rem] shadow-2xl flex flex-col overflow-hidden border-2 border-white" onclick="event.stopPropagation()">
        <div class="p-6 md:p-8 border-b-2 border-slate-100 flex justify-between items-center bg-white sticky top-0 z-10">
            <div class="flex items-center gap-5">
                <div id="mDeptPic" class="w-20 h-20 rounded-2xl overflow-hidden bg-slate-50 border-2 border-pink-100 shadow-sm flex-shrink-0">
                    <img src="" class="w-full h-full object-cover">
                </div>
                <div>
                    <h3 id="mDeptName" class="text-2xl font-black text-slate-800 leading-tight"></h3>
                    <div id="mDeptLoc" class="mt-2 flex items-center gap-3"></div>
                </div>
            </div>
            <button onclick="closeModal()" class="w-12 h-12 rounded-full bg-slate-50 hover:bg-pink-50 text-slate-400 hover:text-pink-500 transition-all border border-slate-100">
                <i class="fas fa-times text-lg"></i>
            </button>
        </div>
        <div id="mAssetGroupContainer" class="p-6 md:p-10 overflow-y-auto flex-1 bg-slate-50/50 custom-scroll"></div>
    </div>
</div>

<script>
    const APP_URL = "https://script.google.com/macros/s/AKfycbwb_1Yppy3h_hy4dX1RkN3-l_YKKlC3FWKewmzCHM-q6SHrlbxsm-U-SGMUj1mYXwkMuQ/exec";
    let state = { logs: [], depts: [], assetTypes: [], priorities: [] };

    async function init() {
        const icon = document.getElementById('refreshIcon');
        icon?.classList.add('animate-spin');
        try {
            const ts = new Date().getTime();
            const [logRes, deptRes, initRes] = await Promise.all([
                fetch(`${APP_URL}?action=getAuditLogs&_=${ts}`).then(r => r.json()),
                fetch(`${APP_URL}?action=getDeptList&_=${ts}`).then(r => r.json()),
                fetch(`${APP_URL}?action=getInitialData&_=${ts}`).then(r => r.json())
            ]);
            state.logs = logRes || [];
            state.depts = deptRes || [];
            state.assetTypes = initRes.assetTypes || [];
            state.priorities = initRes.priorities || [];
            document.getElementById('lastUpdate').innerText = `อัปเดต: ${new Date().toLocaleTimeString('th-TH')}`;
            renderDashboard();
        } catch (err) {
            document.getElementById('contentArea').innerHTML = `<div class='text-center py-20 text-red-500 font-bold'><i class='fas fa-exclamation-triangle mr-2'></i>เกิดข้อผิดพลาดในการโหลดข้อมูล</div>`;
        } finally {
            icon?.classList.remove('animate-spin');
        }
    }

    function getTypeName(typeId) {
        return state.assetTypes.find(x => String(x.id).trim() === String(typeId).trim())?.name || 'อื่นๆ';
    }

    function renderDashboard() {
        const area = document.getElementById('contentArea');
        const search = document.getElementById('searchInput').value.toLowerCase();
        
        const activeDeptIds = [...new Set(state.logs.map(l => String(l.DEPT_ID).trim()))];
        const filteredDepts = state.depts.filter(d => 
            activeDeptIds.includes(String(d.DEP_ID).trim()) && 
            (d.DEPNAME.toLowerCase().includes(search) || (d.BUILDING && d.BUILDING.toLowerCase().includes(search)))
        );

        document.getElementById('statDepts').innerText = filteredDepts.length;
        document.getElementById('statAssets').innerText = state.logs.length.toLocaleString();

        const structure = {};
        filteredDepts.forEach(d => {
            const b = d.BUILDING || "ไม่ระบุตึก";
            const f = d.FL || "ไม่ระบุชั้น";
            if (!structure[b]) structure[b] = {};
            if (!structure[b][f]) structure[b][f] = [];
            structure[b][f].push(d);
        });

        let html = "";
        const buildings = Object.keys(structure).sort();

        if (buildings.length === 0) {
            area.innerHTML = `<div class="text-center py-24 text-slate-400 font-bold italic bg-white rounded-3xl border-2 border-dashed border-slate-200">--- ไม่พบข้อมูลพื้นที่ที่ค้นหา ---</div>`;
            return;
        }

        buildings.forEach(building => {
            const floors = Object.keys(structure[building]).sort((a,b) => {
                const na = parseInt(a), nb = parseInt(b);
                return (isNaN(na) || isNaN(nb)) ? a.localeCompare(b) : na - nb;
            });

            const buildingTotalAssets = filteredDepts
                .filter(d => d.BUILDING === building)
                .reduce((acc, curr) => acc + state.logs.filter(l => String(l.DEPT_ID).trim() === String(curr.DEP_ID).trim()).length, 0);

            html += `
                <div class="building-container">
                    <div class="building-header">
                        <div class="flex items-center gap-5">
                            <div class="w-14 h-14 pink-gradient rounded-2xl flex items-center justify-center text-white shadow-lg shadow-pink-100">
                                <i class="fas fa-hospital text-2xl"></i>
                            </div>
                            <div>
                                <h3 class="text-2xl font-black text-slate-800 uppercase tracking-tight">${building}</h3>
                                <p class="text-[10px] font-bold text-pink-500 uppercase tracking-[0.2em] mt-1">อาคาร / บริเวณ</p>
                            </div>
                        </div>
                        <div class="bg-white border-2 border-pink-100 px-5 py-2 rounded-2xl text-right">
                            <p class="text-2xl font-black text-slate-800 leading-none">${buildingTotalAssets}</p>
                            <p class="text-[9px] font-bold text-slate-400 uppercase mt-1">จำนวนรวม</p>
                        </div>
                    </div>
                    
                    <div class="p-6 md:p-10 space-y-12">
                        ${floors.map(floor => {
                            const depts = structure[building][floor];
                            return `
                                <div>
                                    <div class="floor-section-header">
                                        <span class="floor-badge">ชั้น ${floor}</span>
                                        <span class="text-[11px] font-black text-slate-400 uppercase tracking-widest">${depts.length} หน่วยงาน</span>
                                    </div>
                                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                                        ${depts.map(dept => {
                                            const deptLogs = state.logs.filter(l => String(l.DEPT_ID).trim() === String(dept.DEP_ID).trim());
                                            const deptImg = dept.PIC_ID ? `https://lh3.googleusercontent.com/d/${dept.PIC_ID}` : `https://placehold.co/100x100/f1f5f9/94a3b8?text=${dept.DEPNAME.charAt(0)}`;
                                            return `
                                                <div onclick="showDetail('${dept.DEP_ID}')" class="dept-card p-5 flex items-center gap-5">
                                                    <div class="w-14 h-14 rounded-2xl overflow-hidden bg-slate-50 flex-shrink-0 border-2 border-slate-50 shadow-inner">
                                                        <img src="${deptImg}" class="w-full h-full object-cover">
                                                    </div>
                                                    <div class="min-w-0 flex-1">
                                                        <h4 class="text-sm font-bold text-slate-800 leading-tight truncate mb-1.5" title="${dept.DEPNAME}">${dept.DEPNAME}</h4>
                                                        <div class="flex justify-between items-center">
                                                            <span class="text-[11px] font-extrabold text-pink-500 bg-pink-50 px-2 py-0.5 rounded-md border border-pink-100">${deptLogs.length} ชิ้น</span>
                                                            <i class="fas fa-arrow-right text-[10px] text-slate-300"></i>
                                                        </div>
                                                    </div>
                                                </div>
                                            `;
                                        }).join('')}
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;
        });
        area.innerHTML = html;
    }

    function showDetail(deptId) {
        const dept = state.depts.find(d => String(d.DEP_ID).trim() === String(deptId).trim());
        const logs = state.logs.filter(l => String(l.DEPT_ID).trim() === String(deptId).trim());
        if(!dept) return;
        
        document.getElementById('mDeptName').innerText = dept.DEPNAME;
        document.getElementById('mDeptLoc').innerHTML = `
            <span class="text-[12px] font-bold px-3 py-1.5 bg-pink-100 text-pink-600 rounded-xl border border-pink-200">
                <i class="fas fa-building mr-1.5"></i> ${dept.BUILDING}
            </span>
            <span class="text-[12px] font-bold px-3 py-1.5 bg-slate-100 text-slate-600 rounded-xl border border-slate-200">
                <i class="fas fa-layer-group mr-1.5"></i> ชั้น ${dept.FL}
            </span>
        `;
        document.getElementById('mDeptPic').querySelector('img').src = dept.PIC_ID ? `https://lh3.googleusercontent.com/d/${dept.PIC_ID}` : `https://placehold.co/100x100/f1f5f9/94a3b8?text=D`;
        
        const byType = {};
        logs.forEach(l => { const t = getTypeName(l.Asset_Type_ID); if(!byType[t]) byType[t] = []; byType[t].push(l); });
        
        document.getElementById('mAssetGroupContainer').innerHTML = Object.keys(byType).sort().map(type => `
            <div class="mb-12">
                <div class="flex items-center gap-4 mb-6">
                    <div class="w-2 h-8 pink-gradient rounded-full"></div>
                    <h4 class="text-xl font-black text-slate-800">${type} <span class="text-pink-400 font-bold ml-2 text-sm bg-pink-50 px-2 py-0.5 rounded-lg border border-pink-100">${byType[type].length} รายการ</span></h4>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    ${byType[type].map(a => {
                        const aImg = a.ASSET_IMG_DB ? `https://lh3.googleusercontent.com/d/${a.ASSET_IMG_DB}` : 'https://placehold.co/300x300/f1f5f9/cbd5e1?text=NO+IMAGE'; 
                        return `
                            <div class="bg-white border-2 border-slate-100 rounded-[1.5rem] p-5 flex gap-5 hover:border-pink-300 transition-all shadow-sm hover:shadow-md">
                                <div class="w-24 h-24 rounded-2xl overflow-hidden bg-slate-50 flex-shrink-0 border border-slate-100 shadow-inner">
                                    <img src="${aImg}" class="w-full h-full object-cover">
                                </div>
                                <div class="min-w-0 flex flex-col justify-between py-1">
                                    <div>
                                        <p class="text-[10px] font-black text-pink-500 uppercase tracking-widest mb-1">ID: ${a.AssetID || 'N/A'}</p>
                                        <h5 class="text-[13px] font-bold text-slate-800 leading-snug line-clamp-2 mb-2">${a.FullDescription}</h5>
                                    </div>
                                    <div class="flex items-center gap-3">
                                        <span class="text-[10px] font-black text-slate-400 bg-slate-50 px-2 py-1 rounded-md border border-slate-100 uppercase">S/N: ${a.Serial || '-'}</span>
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            </div>
        `).join('') || `<div class="text-center py-16 text-slate-400 font-bold italic bg-white rounded-3xl border-2 border-dashed">ไม่พบข้อมูลครุภัณฑ์ในหน่วยงานนี้</div>`;
        
        document.getElementById('modalDept').classList.remove('hidden'); 
        document.getElementById('modalDept').classList.add('flex'); 
        document.body.style.overflow = 'hidden';
    }

    function closeModal() { 
        document.getElementById('modalDept').classList.add('hidden'); 
        document.body.style.overflow = 'auto'; 
    }
    
    window.onload = init;
</script>
</body>
</html>
