<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IT UDON HOSP</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --pink1:#f8bbd0;
  --pink2:#fce4ec;
  --main:#d81b60;
}

*{font-family:'Kanit';box-sizing:border-box}

body{
  margin:0;
  background:linear-gradient(135deg,var(--pink1),#fff,var(--pink2));
  min-height:100vh;
}

/* WATERMARK */
body::after{
  content:"IT UDON HOSP";
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-size:60px;
  color:rgba(0,0,0,0.05);
  pointer-events:none;
}

/* HEADER */
.header{
  background:linear-gradient(135deg,#ad1457,#f06292);
  color:#fff;
  padding:20px;
  text-align:center;
  border-radius:0 0 25px 25px;
}

.header img{
  width:70px;
  background:#fff;
  border-radius:50%;
  padding:5px;
}

.container{
  padding:15px;
  max-width:900px;
  margin:auto;
}

/* CARD */
.card{
  background:#fff;
  padding:15px;
  border-radius:20px;
  margin-bottom:10px;
  box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

/* BUTTON */
.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#d81b60,#f06292);
  color:#fff;
  margin-top:10px;
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
}

/* LOADER */
.loader{
  position:fixed;
  inset:0;
  display:none;
  background:rgba(255,255,255,0.8);
  justify-content:center;
  align-items:center;
}

.spinner{
  width:40px;height:40px;
  border:4px solid #eee;
  border-top:4px solid #d81b60;
  border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* PRINT */
@media print{
  body{background:#fff}
  .btn{display:none}
}
</style>

</head>
<body>

<!-- HEADER -->
<div class="header">
  <img src="https://cdn-icons-png.flaticon.com/512/2921/2921222.png">
  <h2>ระบบตรวจสอบครุภัณฑ์คอมพิวเตอร์</h2>
  <p>โรงพยาบาลอุดรธานี</p>
  <small>กลุ่มงานเทคโนโลยีสารสนเทศทางการแพทย์</small>
</div>

<div class="container">

<!-- DASHBOARD -->
<div class="card">
  <h3>Dashboard</h3>
  <p>Goal: <span id="goal"></span></p>
  <p>Total: <span id="sum"></span></p>
</div>

<!-- DEPT -->
<div id="dept"></div>

<!-- SEARCH -->
<div class="card">
  <input id="search" placeholder="ค้นหา Asset">
  <button class="btn" onclick="search()">ค้นหา</button>
  <div id="results"></div>
</div>

<!-- SELECTED -->
<div class="card">
  <h3>รายการที่เลือก</h3>
  <div id="selected"></div>
  <button class="btn" onclick="save()">บันทึก</button>
</div>

</div>

<!-- LOADER -->
<div class="loader" id="loader">
  <div class="spinner"></div>
</div>

<script>
const API_URL="YOUR_WEBAPP_URL";
let selected=[];

function showLoader(){loader.style.display="flex"}
function hideLoader(){loader.style.display="none"}

/* LOAD */
async function load(){
  showLoader();

  const res=await fetch(API_URL+"?action=getInitialData");
  const data=await res.json();

  goal.innerText=data.dashboard.goal;
  sum.innerText=data.dashboard.totalSum;

  dept.innerHTML=data.filtered.map(d=>`
    <div class="card">
      <b>${d.deptName}</b>
    </div>
  `).join("");

  hideLoader();
}

/* SEARCH */
async function search(){
  showLoader();
  const res=await fetch(API_URL+"?action=searchAssets&q="+search.value);
  const data=await res.json();

  results.innerHTML=data.map(x=>`
    <div class="card" onclick='add(${JSON.stringify(x)})'>
      ${x.AssetID}
    </div>
  `).join("");

  hideLoader();
}

/* ADD */
function add(x){
  if(selected.find(i=>i.AssetID===x.AssetID))return;
  selected.push(x);
  render();
}

/* RENDER */
function render(){
  selected.innerHTML="";
  document.getElementById("selected").innerHTML=
    selected.map(x=>`<div>${x.AssetID}</div>`).join("");
}

/* SAVE */
async function save(){
  showLoader();

  await fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({
      action:"saveSurvey",
      assets:selected
    })
  });

  hideLoader();
  alert("บันทึกแล้ว");
}

load();
</script>

</body>
</html>
