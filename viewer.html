<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IT Asset Survey</title>

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">

<!-- STYLE (ของคุณ) -->
<link rel="stylesheet" href="style.css">

<!-- 🔥 FIX สำคัญ -->
<style>
.hidden{display:none !important;}
</style>

</head>
<body>

<!-- LOADING -->
<div id="loading" class="loading-overlay">
  <div class="loading-spinner"></div>
  <p class="mt-4">กำลังโหลด...</p>
</div>

<!-- HEADER -->
<div class="pink-gradient-header p-4 text-white text-center">
  <h1 class="text-lg font-bold">ระบบตรวจสอบครุภัณฑ์คอมพิวเตอร์</h1>
  <p class="text-sm">IT UDON HOSP</p>
</div>

<!-- ================= PAGE: DEPARTMENT ================= -->
<div id="page-dept" class="p-4">
  <div id="deptList" class="space-y-3"></div>
</div>

<!-- ================= PAGE: SURVEY ================= -->
<div id="page-survey" class="p-4 hidden">
  <button onclick="showPage('dept')" class="btn-pink px-4 py-2 mb-4">← กลับ</button>

  <div class="card p-4 mb-4">
    <h2 id="deptName" class="font-bold text-lg"></h2>
    <p id="deptId" class="text-sm text-gray-500"></p>
  </div>

  <input id="searchBox" type="text" placeholder="ค้นหา AssetID..."
    class="w-full p-3 rounded-xl border mb-3">

  <button onclick="searchAsset()" class="btn-pink w-full py-2 mb-4">
    ค้นหา
  </button>

  <div id="searchResult" class="space-y-2"></div>

  <button onclick="saveSurvey()" class="btn-pink w-full py-3 mt-4">
    💾 บันทึก
  </button>
</div>

<!-- ================= SCRIPT ================= -->
<script src="js/api.js"></script>

<script>
let CURRENT_DEPT = null;
let SELECTED_ASSETS = [];

// ================= INIT =================
window.onload = () => {
  showPage('dept');
};

// ================= PAGE =================
function showPage(page){
  document.querySelectorAll('[id^=page-]')
    .forEach(p => p.classList.add('hidden'));

  document.getElementById('page-' + page)
    .classList.remove('hidden');

  if(page === 'dept') loadDepartments();
}

// ================= LOADING =================
function showLoading(v=true){
  document.getElementById('loading')
    .classList.toggle('show', v);
}

// ================= LOAD DEPT =================
async function loadDepartments(){
  showLoading(true);

  const res = await api('getDepartmentsFast');

  const data = res.data || res; // 🔥 FIX รองรับ 2 แบบ

  renderDepartments(data);

  showLoading(false);
}

// ================= RENDER DEPT =================
function renderDepartments(list){
  const box = document.getElementById('deptList');
  box.innerHTML = '';

  list.forEach(d=>{
    box.innerHTML += `
      <div class="card p-4 cursor-pointer"
        onclick="openDept('${d.deptId}','${d.deptName}')">

        <h3 class="font-bold">${d.deptName}</h3>
        <p class="text-sm text-gray-500">
          ${d.building || '-'} ชั้น ${d.floor || '-'}
        </p>
      </div>
    `;
  });
}

// ================= OPEN DEPT =================
function openDept(id,name){
  CURRENT_DEPT = {id,name};
  SELECTED_ASSETS = [];

  document.getElementById('deptName').innerText = name;
  document.getElementById('deptId').innerText = id;

  document.getElementById('searchResult').innerHTML = '';

  showPage('survey');
}

// ================= SEARCH =================
async function searchAsset(){
  const q = document.getElementById('searchBox').value.trim();
  if(!q) return;

  showLoading(true);

  const res = await api('searchAssetsSafe&query='+q);

  const data = res.data || res;

  const box = document.getElementById('searchResult');
  box.innerHTML = '';

  data.forEach(a=>{
    box.innerHTML += `
      <div class="card p-3 flex justify-between items-center">
        <span>${a.AssetID}</span>
        <button class="btn-pink px-3 py-1"
          onclick="addAsset('${a.AssetID}')">
          +
        </button>
      </div>
    `;
  });

  showLoading(false);
}

// ================= ADD =================
function addAsset(id){
  if(!SELECTED_ASSETS.includes(id)){
    SELECTED_ASSETS.push(id);
    alert('เพิ่มแล้ว: ' + id);
  }
}

// ================= SAVE =================
async function saveSurvey(){
  if(!CURRENT_DEPT) return;

  showLoading(true);

  await apiPost({
    action:'saveSurvey',
    deptId: CURRENT_DEPT.id,
    deptName: CURRENT_DEPT.name,
    assets: SELECTED_ASSETS.map(a=>({AssetID:a}))
  });

  showLoading(false);

  alert('บันทึกสำเร็จ');
  showPage('dept');
}
</script>

</body>
</html>
