<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IT Asset Viewer</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">

<!-- ใช้ style กลางของคุณ -->
<link rel="stylesheet" href="style.css">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
.search-highlight {
  background: #ffe4ec;
  padding: 2px 4px;
  border-radius: 6px;
}
</style>

</head>

<body>

<!-- LOADING -->
<div id="loading" class="loading-overlay">
  <div class="loading-spinner"></div>
  <div class="mt-3 text-pink-600">กำลังโหลด...</div>
</div>

<!-- HEADER -->
<div class="pink-gradient-header p-5 text-white text-center">
  <h1 class="text-xl font-bold">ระบบตรวจสอบครุภัณฑ์</h1>
</div>

<!-- CONTENT -->
<div class="p-4 space-y-4">

  <!-- SEARCH -->
  <div class="card p-4">
    <input id="searchInput" class="w-full p-3 border rounded-xl"
      placeholder="ค้นหา Asset ID...">
      
    <button onclick="handleSearch()" class="btn-pink w-full mt-3 p-3">
      ค้นหา
    </button>

    <button onclick="startScanner()" class="btn-pink w-full mt-3 p-3">
      📷 สแกน QR Code
    </button>
  </div>

  <!-- RESULT -->
  <div id="result" class="space-y-3"></div>

</div>

<!-- MODAL SCANNER -->
<div id="scannerModal" class="modal-overlay">
  <div class="modal-card">
    <div id="reader"></div>
    <button onclick="stopScanner()" class="btn-pink w-full mt-3 p-2">
      ปิด
    </button>
  </div>
</div>

<!-- POPUP -->
<div id="popup" class="popup-overlay">
  <div id="popupBox" class="popup-box">
    <div id="popupText"></div>
    <button onclick="closePopup()" class="btn-pink mt-3 p-2 w-full">ตกลง</button>
  </div>
</div>

<script src="js/api.js"></script>

<script>
let scanner = null;

function showLoading(show){
  document.getElementById('loading').classList.toggle('show', show);
}

function showPopup(msg, type="error"){
  const box = document.getElementById("popupBox");
  box.className = "popup-box " + type;
  document.getElementById("popupText").innerText = msg;
  document.getElementById("popup").classList.add("show");
}

function closePopup(){
  document.getElementById("popup").classList.remove("show");
}

/* ================= SEARCH ================= */
async function handleSearch(){
  const q = document.getElementById("searchInput").value.trim();
  if(!q) return showPopup("กรุณากรอกคำค้น");

  const data = await api('searchAssetsSafe', { query: q });

  renderResult(data);
}

/* ================= RESULT ================= */
function renderResult(data){
  const el = document.getElementById("result");
  el.innerHTML = "";

  if(!data || data.length === 0){
    el.innerHTML = `<div class="text-center text-gray-500">ไม่พบข้อมูล</div>`;
    return;
  }

  data.forEach(item=>{
    const div = document.createElement("div");
    div.className = "card p-4";
    div.innerHTML = `
      <div class="font-bold text-pink-700">${item.AssetID}</div>
    `;
    el.appendChild(div);
  });
}

/* ================= SCANNER ================= */
function startScanner(){
  document.getElementById("scannerModal").classList.add("show");

  setTimeout(async ()=>{
    try{
      scanner = new Html5Qrcode("reader");

      await scanner.start(
        { facingMode: "environment" },
        { fps: 15, qrbox: 250 },
        (decodedText)=>{

          let raw = decodedText.trim();
          let id = raw;

          if(raw.includes('IcmAssetDetail/')){
            id = raw.split('IcmAssetDetail/')[1].split('/')[0];
          }

          document.getElementById("searchInput").value = id;

          stopScanner();

          handleSearch(); // 🔥 ยิงค้นหาทันที
        }
      );

    }catch(err){
      showPopup("กรุณาอนุญาตกล้อง");
      stopScanner();
    }
  },300);
}

async function stopScanner(){
  try{
    if(scanner){
      await scanner.stop();
      scanner.clear();
      scanner = null;
    }
  }catch(e){}
  document.getElementById("scannerModal").classList.remove("show");
}
</script>

</body>
</html>
