<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IT UDON HOSP</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Kanit';
  background:linear-gradient(135deg,#f8bbd0,#fff,#fce4ec);
}

/* HEADER */
.header{
  background:linear-gradient(135deg,#d81b60,#f06292);
  color:#fff;
  text-align:center;
  padding:20px;
}

/* CARD */
.card{
  background:#fff;
  margin:10px;
  padding:15px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* BUTTON */
.btn{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#d81b60;
  color:#fff;
  margin-top:10px;
}

/* INPUT */
input{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
}

/* LOADER */
.loader{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(255,255,255,0.7);
  justify-content:center;
  align-items:center;
}
</style>
</head>

<body>

<div class="header">
  <h2>ระบบตรวจสอบครุภัณฑ์คอมพิวเตอร์</h2>
  <p>โรงพยาบาลอุดรธานี</p>
</div>

<!-- DASHBOARD -->
<div class="card">
  <h3>Dashboard</h3>
  <div>Goal: <span id="goal"></span></div>
  <div>Total: <span id="total"></span></div>
</div>

<!-- SEARCH -->
<div class="card">
  <input id="searchInput" placeholder="ค้นหา Asset">
  <button class="btn" onclick="search()">ค้นหา</button>
  <div id="results"></div>
</div>

<!-- SELECT -->
<div class="card">
  <h3>รายการที่เลือก</h3>
  <div id="selected"></div>
  <button class="btn" onclick="save()">บันทึก</button>
</div>

<div class="loader" id="loader">Loading...</div>

<script src="js/api.js"></script>

<script>
let selected = [];

/* ===== UI ===== */
function showLoader(){ loader.style.display="flex"; }
function hideLoader(){ loader.style.display="none"; }

/* ===== LOAD ===== */
async function load(){
  showLoader();

  const data = await apiGet("getInitialData");

  if(data.error){
    alert("โหลดข้อมูลไม่สำเร็จ");
    return;
  }

  goal.innerText = data.dashboard.goal;
  total.innerText = data.dashboard.totalSum;

  hideLoader();
}

/* ===== SEARCH ===== */
async function search(){
  showLoader();

  const q = document.getElementById("searchInput").value;

  const data = await apiGet("searchAssets",{ q });

  if(data.error){
    alert("ค้นหาไม่สำเร็จ");
    return;
  }

  results.innerHTML = data.map(x=>`
    <div class="card" onclick='add(${JSON.stringify(x)})'>
      ${x.AssetID}
    </div>
  `).join("");

  hideLoader();
}

/* ===== ADD ===== */
function add(item){
  if(selected.find(x=>x.AssetID===item.AssetID)){
    alert("มีแล้ว");
    return;
  }

  selected.push(item);
  renderSelected();
}

/* ===== RENDER ===== */
function renderSelected(){
  document.getElementById("selected").innerHTML =
    selected.map(x=>`<div>${x.AssetID}</div>`).join("");
}

/* ===== SAVE ===== */
async function save(){
  if(selected.length === 0){
    alert("ไม่มีข้อมูล");
    return;
  }

  showLoader();

  const res = await apiPost("saveSurvey",{
    assets:selected
  });

  hideLoader();

  if(res.error){
    alert("บันทึกไม่สำเร็จ");
    return;
  }

  alert("บันทึกสำเร็จ");
}

load();
</script>

</body>
</html>
