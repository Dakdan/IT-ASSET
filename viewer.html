<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบตรวจสอบครุภัณฑ์คอมพิวเตอร์</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<script src="js/api.js"></script>

</head>
<body>

<!-- HEADER -->
<div class="login-header">
  <img src="logo.png" class="header-logo">
  <h1>ระบบตรวจสอบครุภัณฑ์คอมพิวเตอร์</h1>
  <p>โรงพยาบาลอุดรธานี</p>
</div>

<div class="login-card">

  <!-- SEARCH -->
  <div class="form-group">
    <input type="text" id="searchInput" placeholder="ค้นหา Asset ID..." onkeyup="search()">
  </div>

  <!-- RESULT -->
  <div id="result"></div>

</div>

<!-- LOADING -->
<div id="loading" class="loading-overlay">
  <div class="loading-spinner"></div>
</div>

<!-- MODAL -->
<div id="modal" class="modal-overlay">
  <div class="modal-card modal-card-lg" id="modalContent"></div>
</div>

<script>

async function search(){
  const q = document.getElementById("searchInput").value;
  if(!q) return;

  setLoading(true);

  const data = await apiGet("searchAssets",{q});

  setLoading(false);

  if(data.error){
    alert("โหลดข้อมูลไม่ได้");
    return;
  }

  renderList(data);
}

function renderList(list){
  const el = document.getElementById("result");

  el.innerHTML = list.map(i=>`
    <div class="card" style="padding:15px;margin-bottom:10px;cursor:pointer"
      onclick="openDetail('${i.ASSETID}')">

      <b>${i.ASSETID}</b><br>
      <span>${i.NAME || '-'}</span><br>
      <small>${i.DEPARTMENT || '-'}</small>

    </div>
  `).join('');
}

async function openDetail(id){
  setLoading(true);

  const data = await apiGet("searchAssets",{q:id});

  setLoading(false);

  const item = data[0];

  document.getElementById("modalContent").innerHTML = `
    <h2>${item.ASSETID}</h2>
    <p>${item.NAME || '-'}</p>
    <p>${item.DEPARTMENT || '-'}</p>

    <button class="btn-login" onclick="goEdit('${item.ASSETID}')">แก้ไข</button>
    <button class="btn-login" onclick="closeModal()">ปิด</button>
  `;

  document.getElementById("modal").classList.add("show");
}

function closeModal(){
  document.getElementById("modal").classList.remove("show");
}

function goEdit(id){
  window.location.href = `edit.html?id=${id}`;
}

function setLoading(s){
  document.getElementById("loading").classList.toggle("show",s);
}

</script>

</body>
</html>
