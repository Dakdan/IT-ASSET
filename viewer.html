<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Viewer</title>
<link rel="stylesheet" href="css/style.css">

</head>
<body>

<div class="login-wrapper">

  <!-- HEADER -->
  <div class="login-header">
    <h1>Dashboard</h1>
    <p>ภาพรวมข้อมูล</p>
  </div>

  <!-- CARD -->
  <div class="login-card">

    <div class="form-group">
      <label>Goal</label>
      <input id="goal" disabled>
    </div>

    <div class="form-group">
      <label>Total</label>
      <input id="sum" disabled>
    </div>

    <div id="dept-list"></div>

  </div>
</div>

<!-- LOADER -->
<div class="loader-overlay" id="loader">
  <div class="spinner"></div>
</div>

<!-- POPUP -->
<div class="popup-overlay" id="popup">
  <div class="popup-box" id="popupBox">
    <h3 id="popupTitle"></h3>
    <p id="popupMsg"></p>
    <button class="btn-login" onclick="closePopup()">ตกลง</button>
  </div>
</div>

<script src="js/api.js"></script>

<script>
async function loadDashboard(){
  showLoader();

  try{
    const data = await API.getInitialData();

    document.getElementById("goal").value = data.dashboard.goal || 0;
    document.getElementById("sum").value = data.dashboard.totalSum || 0;

    const container = document.getElementById("dept-list");

    container.innerHTML = data.filtered.map(d => `
      <div class="form-group">
        <button class="btn-login" onclick="goEdit('${d.deptId}')">
          ${d.deptName}
        </button>
      </div>
    `).join("");

  }catch(err){
    showPopup("error","Error","โหลดข้อมูลไม่สำเร็จ");
  }

  hideLoader();
}

function goEdit(deptId){
  window.location.href = `edit.html?deptId=${deptId}`;
}

/* ===== UI ===== */

function showLoader(){
  document.getElementById("loader").style.display = "flex";
}

function hideLoader(){
  document.getElementById("loader").style.display = "none";
}

function showPopup(type,title,msg){
  const popup = document.getElementById("popup");
  const box = document.getElementById("popupBox");

  box.className = "popup-box " + type;
  document.getElementById("popupTitle").innerText = title;
  document.getElementById("popupMsg").innerText = msg;

  popup.style.display = "flex";
}

function closePopup(){
  document.getElementById("popup").style.display = "none";
}

loadDashboard();
</script>

</body>
</html>
