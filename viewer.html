<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IT Asset Viewer</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
.search-highlight {
  background: #ffe4ec;
  padding: 2px 4px;
  border-radius: 6px;
}
</style>

</head>

<body>

<!-- LOADING -->
<div id="loading" class="loading-overlay">
  <div class="loading-spinner"></div>
  <div class="mt-3 text-pink-600">กำลังโหลด...</div>
</div>

<!-- HEADER -->
<div class="pink-gradient-header p-5 text-white text-center">
  <h1 class="text-xl font-bold">ระบบตรวจสอบครุภัณฑ์</h1>
</div>

<!-- CONTENT -->
<div class="p-4 space-y-4">

  <!-- SEARCH -->
  <div class="card p-4">
    <input id="searchInput" class="w-full p-3 border rounded-xl"
      placeholder="ค้นหา Asset ID...">

    <button onclick="handleSearch()" class="btn-pink w-full mt-3 p-3">
      🔍 ค้นหา
    </button>

    <button onclick="startScanner()" class="btn-pink w-full mt-3 p-3">
      📷 สแกน QR Code
    </button>
  </div>

  <!-- RESULT -->
  <div id="result" class="space-y-3"></div>

  <!-- DEPARTMENT -->
  <div class="card p-4">
    <div class="font-bold text-pink-700 mb-2">หน่วยงาน</div>
    <div id="deptList" class="space-y-2"></div>
  </div>

</div>

<!-- MODAL SCANNER -->
<div id="scannerModal" class="modal-overlay">
  <div class="modal-card">
    <div id="reader"></div>
    <button onclick="stopScanner()" class="btn-pink w-full mt-3 p-2">
      ปิด
    </button>
  </div>
</div>

<!-- POPUP -->
<div id="popup" class="popup-overlay">
  <div id="popupBox" class="popup-box">
    <div id="popupText"></div>
    <button onclick="closePopup()" class="btn-pink mt-3 p-2 w-full">ตกลง</button>
  </div>
</div>

<script src="js/api.js"></script>

<script>
let scanner = null;

/* ================= LOADING ================= */
function showLoading(show){
  document.getElementById('loading').classList.toggle('show', show);
}

/* ================= POPUP ================= */
function showPopup(msg, type="error"){
  const box = document.getElementById("popupBox");
  box.className = "popup-box " + type;
  document.getElementById("popupText").innerText = msg;
  document.getElementById("popup").classList.add("show");
}

function closePopup(){
  document.getElementById("popup").classList.remove("show");
}

/* ================= NORMALIZE API ================= */
function normalize(res){
  if(res && res.data) return res.data;
  return res;
}

/* ================= SEARCH ================= */
async function handleSearch(){
  const q = document.getElementById("searchInput").value.trim();
  if(!q) return showPopup("กรุณากรอกคำค้น");

  let res = await api('searchAssetsSafe', { query: q });
  const data = normalize(res);

  renderResult(data);
}

/* ================= RESULT ================= */
function renderResult(data){
  const el = document.getElementById("result");
  el.innerHTML = "";

  if(!data || data.length === 0){
    el.innerHTML = `<div class="text-center text-gray-500">ไม่พบข้อมูล</div>`;
    return;
  }

  data.forEach(item=>{
    const div = document.createElement("div");
    div.className = "card p-4 cursor-pointer active:scale-95";

    div.innerHTML = `
      <div class="font-bold text-pink-700">
        ${highlight(item.AssetID)}
      </div>
      <div class="text-sm text-gray-500 mt-1">กดเพื่อดูรายละเอียด</div>
    `;

    div.onclick = () => handleViewDetail(item.AssetID);

    el.appendChild(div);
  });
}

/* ================= VIEW DETAIL ================= */
function handleViewDetail(id){
  showPopup("เลือก Asset: " + id, "success");
}

/* ================= HIGHLIGHT ================= */
function highlight(text){
  const q = document.getElementById("searchInput").value.trim();
  if(!q) return text;

  const reg = new RegExp(`(${q})`, 'gi');
  return text.replace(reg, `<span class="search-highlight">$1</span>`);
}

/* ================= DEPARTMENT ================= */
async function loadDepartments(){
  let res = await api('getDepartmentsFast');
  const data = normalize(res);

  renderDepartments(data);
}

function renderDepartments(data){
  const el = document.getElementById("deptList");
  el.innerHTML = "";

  if(!data || data.length === 0){
    el.innerHTML = `<div class="text-gray-500 text-center">ไม่พบหน่วยงาน</div>`;
    return;
  }

  data.forEach(d=>{
    const div = document.createElement("div");
    div.className = "card p-3 cursor-pointer active:scale-95";

    div.innerHTML = `
      <div class="font-bold text-pink-700">${d.deptName}</div>
      <div class="text-sm text-gray-500">
        ${d.building || ''} ชั้น ${d.floor || ''}
      </div>
    `;

    div.onclick = () => handleSelectDept(d.deptId);

    el.appendChild(div);
  });
}

async function handleSelectDept(deptId){
  let res = await api('getSurveyDetailByDept', { deptId });
  const data = normalize(res);

  if(!data || data.error){
    showPopup("ไม่พบข้อมูลหน่วยงาน");
    return;
  }

  showPopup("เลือกหน่วยงาน: " + deptId, "success");
}

/* ================= SCANNER ================= */
function startScanner(){
  document.getElementById("scannerModal").classList.add("show");

  setTimeout(async ()=>{
    try{
      scanner = new Html5Qrcode("reader");

      await scanner.start(
        { facingMode: "environment" },
        { fps: 15, qrbox: 250 },
        (decodedText)=>{

          let raw = decodedText.trim();
          let id = raw;

          if(raw.includes('IcmAssetDetail/')){
            id = raw.split('IcmAssetDetail/')[1].split('/')[0];
          }

          document.getElementById("searchInput").value = id;

          stopScanner();

          handleSearch();
        }
      );

    }catch(err){
      showPopup("กรุณาอนุญาตกล้อง");
      stopScanner();
    }
  },300);
}

async function stopScanner(){
  try{
    if(scanner){
      await scanner.stop();
      scanner.clear();
      scanner = null;
    }
  }catch(e){}

  document.getElementById("scannerModal").classList.remove("show");
}

/* ================= INIT ================= */
window.onload = () => {
  loadDepartments();
};
</script>

</body>
</html>
