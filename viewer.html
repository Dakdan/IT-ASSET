<!-- ======================= asset_survey.html ======================= -->
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asset Survey</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="loading-overlay">
  <div class="loading-spinner"></div>
  <div>กำลังโหลด...</div>
</div>

<div id="popup" class="popup-overlay"><div class="popup-box"></div></div>

<main class="p-4">

<section id="department" class="page"></section>
<section id="survey" class="page hidden"></section>
<section id="detail" class="page hidden"></section>

</main>

<script src="api.js"></script>
<script>
const state={deptId:null,deptName:null,activityId:null}

function showLoading(s){document.querySelector('.loading-overlay').classList.toggle('show',s)}

function showPage(p){
 document.querySelectorAll('.page').forEach(el=>el.classList.add('hidden'))
 document.getElementById(p).classList.remove('hidden')
 if(p==='department')loadDepartments()
 if(p==='detail')loadDetail()
}

function showPopup(type,msg){
 const el=document.getElementById('popup')
 const box=el.querySelector('.popup-box')
 box.className='popup-box '+type
 box.innerHTML=msg
 el.classList.add('show')
 setTimeout(()=>el.classList.remove('show'),2000)
}

async function loadDepartments(){
 const res=await api('getDepartments')
 const el=document.getElementById('department')
 el.innerHTML=res.data.map(d=>`
 <div class="card p-4 mb-3">
 ${d.deptName}
 <button class="btn-pink" onclick="openDept('${d.deptId}','${d.deptName}')">เลือก</button>
 </div>`).join('')
}

function openDept(id,name){
 state.deptId=id
 state.deptName=name
 showPage('survey')
 renderSurvey()
}

function renderSurvey(){
 document.getElementById('survey').innerHTML=`
 <div class="card p-4">
 <h2>${state.deptName}</h2>
 <input id="searchInput" placeholder="ค้นหา">
 <button class="btn-pink" onclick="searchAsset()">ค้นหา</button>
 <div id="result"></div>
 <button class="btn-pink" onclick="saveSurvey()">บันทึก</button>
 </div>`
}

async function searchAsset(){
 const q=document.getElementById('searchInput').value
 const res=await api('searchAssets',{query:q})
 document.getElementById('result').innerHTML=JSON.stringify(res.data)
}

async function saveSurvey(){
 const res=await apiPost('saveSurvey',{deptId:state.deptId,deptName:state.deptName,assets:[]})
 state.activityId=res.data.activityId
 showPage('detail')
}

async function loadDetail(){
 const res=await api('getSurveyDetail',{activityId:state.activityId})
 document.getElementById('detail').innerHTML=`
 <div class="card p-4">
 <pre>${JSON.stringify(res.data,null,2)}</pre>
 <button class="btn-pink" onclick="confirmSurvey()">ยืนยัน</button>
 </div>`
}

async function confirmSurvey(){
 await apiPost('confirmSurvey',{activityId:state.activityId,signer:'user',signature:'base64'})
 showPopup('success','บันทึกสำเร็จ')
}

showPage('department')
</script>
</body>
</html>
